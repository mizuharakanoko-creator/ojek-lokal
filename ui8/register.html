<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN GUILD | REGISTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script> <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 320px; background: #111; padding: 30px; border: 1px solid #333; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }
        h2 { color:#00ffff; text-align: center; margin-top: 0; letter-spacing: 2px; font-size: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0 15px 0; box-sizing: border-box; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; outline: none; }
        input:focus, select:focus { border-color: #00ffff; }
        button { background: #ff0055; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .link { display: block; text-align: center; color: #00ffff; font-size: 12px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ADVENTURER REGISTRY</h2>
        
        <label>Nickname (ID Login)</label>
        <input type="text" id="regNick" placeholder="Contoh: astra_kng" autocomplete="off">
        
        <label>Password</label>
        <input type="password" id="regPass" placeholder="******">

        <label>Kategori Kendaraan</label>
        <select id="regCategory">
            <option value="MOTOR">MOTOR (RODA 2)</option>
            <option value="CAR">MOBIL (RODA 4)</option>
        </select>

        <label>Wilayah Tugas (Domisili)</label>
        <select id="regShard">
            <option value="IDN-JABAR-KNG-KUNINGAN">KAB. KUNINGAN - KEC. KUNINGAN</option>
            <option value="IDN-JABAR-KNG-JALAKSANA">KAB. KUNINGAN - KEC. JALAKSANA</option>
            <option value="IDN-JABAR-KNG-CIGUGUR">KAB. KUNINGAN - KEC. CIGUGUR</option>
        </select>

        <button id="btnReg" onclick="registerUser()">AJUKAN LISENSI</button>
        <a href="login.html" class="link">Sudah punya lisensi? Login di sini</a>
    </div>

    <script>
        async function registerUser() {
            const nick = document.getElementById('regNick').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;
            const category = document.getElementById('regCategory').value;
            const shard = document.getElementById('regShard').value;
            const btn = document.getElementById('btnReg');

            if(!nick || !pass) return alert("Nickname dan Password wajib diisi!");
            if(nick.includes(" ")) return alert("Nickname tidak boleh menggunakan spasi!");

            btn.disabled = true;
            btn.innerText = "MEMERIKSA DATABASE...";

            try {
                // Efisiensi: Gunakan .get() untuk pengecekan satu kali
                const checkReg = await db.ref(`users_registry/${nick}`).get();
                const checkPending = await db.ref(`pendaftaran_pending/${nick}`).get();

                if(checkReg.exists() || checkPending.exists()) {
                    alert("Nickname sudah digunakan atau sedang dalam antrean evaluasi!");
                    btn.disabled = false;
                    btn.innerText = "AJUKAN LISENSI";
                    return;
                }

                btn.innerText = "MENGIRIM BERKAS...";
                await db.ref(`pendaftaran_pending/${nick}`).set({
                    nick: nick,
                    password: pass,
                    category: category,
                    shard_id: shard,
                    status: "pending",
                    created_at: Date.now()
                });

                alert("Lisensi diajukan! Silakan tunggu persetujuan Admin Guild.");
                window.location.href = "login.html";

            } catch (error) {
                alert("Terjadi kesalahan koneksi: " + error.message);
                btn.disabled = false;
                btn.innerText = "AJUKAN LISENSI";
            }
        }
    </script>
</body>
</html>
