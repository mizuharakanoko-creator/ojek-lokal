<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVENTURER | RADAR</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="router_lokal.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; margin: 0; padding-bottom: 50px; }
        .stats-bar { background: #111; padding: 15px; display: flex; justify-content: space-around; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .stat-item { text-align: center; }
        .stat-item b { color: #00ffff; font-size: 16px; display: block; }
        .stat-item small { color: #888; font-size: 10px; }
        .radar-box { background: #1a1a1a; margin: 15px; padding: 15px; border-radius: 8px; border: 1px solid #00ffff; }
        .quest-card { background: #111; border: 1px solid #333; margin: 15px; padding: 15px; border-radius: 8px; border-left: 4px solid #00ffff; position: relative; }
        .quest-price { color: #ffaa00; font-size: 18px; font-weight: bold; position: absolute; right: 15px; top: 15px; }
        .bid-area { display: flex; gap: 10px; margin-top: 15px; border-top: 1px dashed #333; padding-top: 15px; }
        .bid-area input { flex: 1; padding: 10px; background: #000; color: #fff; border: 1px solid #444; }
        button { background: #ff0055; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-item"><small>NICK</small><b id="stNick">-</b></div>
        <div class="stat-item"><small>CAT</small><b id="stCat">-</b></div>
        <div class="stat-item"><small>VIT</small><b id="stVit">-</b></div>
    </div>

    <div class="radar-box">
        <span style="color:#00ffff; font-size: 12px;">📍 RADAR: <b id="stArea">...</b></span>
        <button style="width:100%; margin-top:10px; background:#00ffff; color:#000;" onclick="initRadar()">🔁 REFRESH RADAR</button>
        <button style="width:100%; margin-top:5px; background:#ffaa00; color:#000;" onclick="manualCheckInvite()">🔎 CEK UNDANGAN MANUAL</button>
    </div>

    <div id="questBoard"></div>

    <script>
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        if(!session) window.location.href = "login.html";

        const myProfilPath = `adventurer-${session.shard_id.toLowerCase()}/${session.nick}`;

        // 1. Load Data Profil
        db.ref(myProfilPath).once('value').then(snap => {
            const d = snap.val();
            if(!d) return alert("Profil tidak ditemukan!");
            
            document.getElementById('stNick').innerText = d.nick.toUpperCase();
            document.getElementById('stCat').innerText = d.category;
            document.getElementById('stVit').innerText = d.vitality;
            document.getElementById('stArea').innerText = session.shard_id.split('-').pop();
            
            initRadar();
            listenForInvites(); // Mulai mendengarkan undangan otomatis
        });

        // 2. Radar Misi
        function initRadar() {
            const board = document.getElementById('questBoard');
            board.innerHTML = "<p style='text-align:center; color:#555;'>Scanning...</p>";
            const kec = session.shard_id.split('-').pop();
            const path = `${session.category}-KUNINGAN-PUSAT-${kec}`;

            db.ref(path).on('value', snap => {
                board.innerHTML = "";
                if(!snap.exists()) return board.innerHTML = "<p style='text-align:center;'>No Quests Found.</p>";
                snap.forEach(desaSnap => {
                    desaSnap.forEach(misiSnap => {
                        const m = misiSnap.val();
                        if(m.status === "open") renderCard(m, desaSnap.key, `${path}/${desaSnap.key}/${m.id}`);
                    });
                });
            });
        }

        function renderCard(m, desa, fullPath) {
            document.getElementById('questBoard').innerHTML += `
                <div class="quest-card">
                    <span class="quest-price">${m.price} G</span>
                    <div style="font-size:12px; color:#00ffff;">📍 ${desa}</div>
                    <div style="margin:10px 0;">${m.tujuan}</div>
                    <div class="bid-area">
                        <input type="number" id="bid-${m.id}" placeholder="G">
                        <button onclick="ajukanKontrak('${m.id}', '${fullPath}')">BID</button>
                    </div>
                </div>
            `;
        }

        async function ajukanKontrak(id, path) {
            const price = document.getElementById(`bid-${id}`).value;
            if(!price) return alert("Isi harga!");
            await db.ref(`${path}/bids/${session.nick}`).set({
                adventurer: session.nick,
                price: parseInt(price),
                shard_id: session.shard_id, // KRUSIAL: Agar requester tahu alamat shard kita
                timestamp: Date.now()
            });
            alert("Bid terkirim!");
        }

        // 3. Logika Undangan (Otomatis & Manual)
        function listenForInvites() {
            db.ref(`${myProfilPath}/undangan_aktif`).on('value', snap => {
                if(snap.exists()) processInvite(snap.val());
            });
        }

        async function manualCheckInvite() {
            const snap = await db.ref(`${myProfilPath}/undangan_aktif`).get();
            if(snap.exists()) processInvite(snap.val());
            else alert("Tidak ada undangan.");
        }

        function processInvite(data) {
            if(confirm(`📢 TUGAS MASUK!\nRequester menerima tawaran Anda.\n\nMasuk ke Briefing?`)) {
                sessionStorage.setItem('active_quest', data.id_misi);
                sessionStorage.setItem('active_quest_path', data.path_misi);
                db.ref(`${myProfilPath}/undangan_aktif`).remove(); // Bersihkan
                window.location.href = "briefing.html";
            }
        }
    </script>
</body>
</html>
