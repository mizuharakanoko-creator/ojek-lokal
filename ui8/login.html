<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATEWAY | LOGIN SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #000; color: #00ffff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 40px; border: 2px solid #00ffff; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        h2 { color: #ff0055; letter-spacing: 5px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #050505; border: 1px solid #333; color: #fff; text-align: center; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #00ffff; outline: none; }
        button { width: 100%; padding: 15px; background: #00ffff; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        button:disabled { background: #333; color: #666; }
        .status-text { font-size: 11px; margin-top: 15px; color: #ffaa00; height: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>GATEWAY</h2>
    <input type="text" id="nick" placeholder="NICKNAME">
    <input type="password" id="pass" placeholder="PASSWORD">
    <div id="status" class="status-text"></div>
    <button id="btnEnter" onclick="executeLogin()">AUTHENTICATE</button>
</div>

<script>
    async function executeLogin() {
        const nickInput = document.getElementById('nick').value.trim();
        const nick = nickInput.toLowerCase(); // Nickname di DB users_registry biasanya kecil
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnEnter');
        const status = document.getElementById('status');

        if (!nick || !pass) {
            status.innerText = "Masukkan Nickname & Password!";
            return;
        }

        btn.disabled = true;
        status.innerText = "Verifying Credentials...";

        try {
            // 1. Ambil data dari tabel pusat (users_registry)
            const snap = await db.ref(`users_registry/${nick}`).get();

            if (!snap.exists()) {
                throw new Error("Nickname tidak terdaftar!");
            }

            const user = snap.val();

            // 2. Validasi Password (diubah ke string agar aman)
            if (user.password.toString() !== pass.toString()) {
                throw new Error("Password salah!");
            }

            // 3. Validasi Shard ID (Data krusial untuk Sharding)
            if (!user.shard_id) {
                throw new Error("User tidak memiliki Shard ID!");
            }

            // 4. Susun data sesi untuk LocalStorage
            // shard_id disimpan apa adanya (Besar/Kecil tidak masalah karena diolah nanti)
            const sessionData = {
                nick: nick,
                role: user.role,
                shard_id: user.shard_id, 
                category: user.category || "MOTOR",
                login_time: Date.now()
            };

            localStorage.setItem('pickme_session', JSON.stringify(sessionData));
            
            status.innerText = "Access Granted. Redirecting...";

            // 5. Pengalihan Halaman berdasarkan Role
            setTimeout(() => {
                if (user.role === "adventurer") {
                    window.location.href = "dashboard_adventurer.html";
                } else {
                    window.location.href = "index.html";
                }
            }, 800);

        } catch (e) {
            status.innerText = "";
            alert(e.message);
            btn.disabled = false;
        }
    }

    // Fungsi tambahan agar menekan 'Enter' bisa login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') executeLogin();
    });
</script>

</body>
</html>
