<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN | MULTI-DB SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #000; color: #00ffff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 30px; border: 1px solid #00ffff; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; text-align: center; }
        button { width: 100%; padding: 12px; background: #00ffff; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .error-msg { color: #ff0055; font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h3>GUILD LOGIN</h3>
    <div id="error" class="error-msg"></div>
    <input type="text" id="nick" placeholder="NICKNAME">
    <input type="password" id="pass" placeholder="PASSWORD">
    <button id="btnEnter" onclick="executeLogin()">ENTER SYSTEM</button>
</div>

<script>
    // Cek apakah sudah login
    if(localStorage.getItem('pickme_session')) {
        const s = JSON.parse(localStorage.getItem('pickme_session'));
        redirectUser(s.role);
    }

    async function executeLogin() {
        const nick = document.getElementById('nick').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnEnter');
        const err = document.getElementById('error');

        if(!nick || !pass) return;

        btn.disabled = true;
        btn.innerText = "SYNCHRONIZING...";

        try {
            // SELALU CEK KE DATABASE UTAMA (Registry)
            const snap = await db.ref(`users_registry/${nick}`).get();

            if(!snap.exists()) {
                throw new Error("Nickname tidak terdaftar!");
            }

            const user = snap.val();

            if(user.password !== pass) {
                throw new Error("Password tidak cocok!");
            }

            // Validasi Shard ID (Mencegah undefined)
            if(!user.shard_id) {
                throw new Error("Data wilayah (Shard) hilang. Hubungi Admin.");
            }

            // SIMPAN SESI DENGAN DATA VALID
            const sessionData = {
                nick: user.nick,
                role: user.role,
                shard_id: user.shard_id.toLowerCase(), // Pastikan lowercase
                category: user.category || "MOTOR",
                login_time: Date.now()
            };

            localStorage.setItem('pickme_session', JSON.stringify(sessionData));
            redirectUser(user.role);

        } catch (e) {
            err.innerText = e.message;
            err.style.display = "block";
            btn.disabled = false;
            btn.innerText = "ENTER SYSTEM";
        }
    }

    function redirectUser(role) {
        if(role === "adventurer") window.location.href = "dashboard_adventurer.html";
        else window.location.href = "index.html";
    }
</script>
</body>
</html>
