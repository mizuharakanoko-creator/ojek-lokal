<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION ACTIVE | PROGRESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #00ffff; display: flex; justify-content: space-between; align-items: center; }
        
        /* Chat UI */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0a0a0a; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; font-size: 13px; position: relative; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: #00ffff; color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .msg small { display: block; font-size: 9px; opacity: 0.6; margin-top: 5px; text-align: right; }

        .input-area { background: #111; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; outline: none; }
        
        .action-bar { background: #111; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: center; text-decoration: none; font-size: 11px; text-transform: uppercase; }
        .btn-wa { background: #25d366; color: white; }
        .btn-map { background: #4285f4; color: white; }
        .btn-finish { background: #ff0055; color: white; grid-column: span 2; font-size: 14px; margin-top: 5px; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <small style="color:#888;">TARGET OPERASI:</small>
        <div id="targetName" style="font-weight:bold; color:#00ffff;">MENUNGGU...</div>
    </div>
    <div id="roleBadge" style="font-size:10px; background:#222; padding:3px 8px; border-radius:10px; border:1px solid #444;">ROLE: ?</div>
</div>

<div id="chatBox">
    <p style="text-align:center; color:#444; font-size:11px; margin-top:20px;">Memulai enkripsi chat P2P...</p>
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Ketik pesan...">
    <button onclick="sendChat()" style="background:#00ffff; border:none; padding:10px 15px; border-radius:4px; font-weight:bold;">KIRIM</button>
</div>

<div class="action-bar">
    <a id="btnWA" href="#" target="_blank" class="btn btn-wa">WHATSAPP</a>
    <a id="btnMap" href="#" target="_blank" class="btn btn-map">GOOGLE MAPS</a>
    <button id="finishAction" class="btn btn-finish" onclick="completeMission()">SELESAIKAN MISI</button>
</div>

<script>
    // 1. DATA RECOVERY (PENGAMBILAN DATA)
    const session = JSON.parse(localStorage.getItem('pickme_session')) || { nick: "GUEST", shard_id: "IDN-JABAR-KNG-KUNINGAN" };
    
    // AMBIL DARI SESSION ATAU URL JIKA PERLU (BACKUP)
    const qId = sessionStorage.getItem('active_quest');
    const qPath = sessionStorage.getItem('active_quest_path');

    // DEBUGGING: Cek apakah data masuk
    console.log("Session:", session);
    console.log("Quest ID:", qId);
    console.log("Quest Path:", qPath);

    if(!qId || !qPath) {
        alert("ANOMALI DATA: ID Misi Hilang! Kembali ke Dashboard.");
        window.location.href = "index.html";
    }

    const targetDb = getDatabaseByShard(session.shard_id);

    // 2. PENENTUAN ROLE & LISTENER KONTRAK
    targetDb.ref(`kontrak_aktif/${qId}`).on('value', snap => {
        if(!snap.exists()) return;
        const data = snap.val();
        
        // Cek Siapa Saya?
        const imAdventurer = (session.nick.toLowerCase() === data.adventurer.toLowerCase());
        const lawan = imAdventurer ? data.requester : data.adventurer;

        document.getElementById('targetName').innerText = lawan.toUpperCase();
        document.getElementById('roleBadge').innerText = imAdventurer ? "ROLE: ADVENTURER" : "ROLE: REQUESTER";
        document.getElementById('roleBadge').style.borderColor = imAdventurer ? "#00ffff" : "#ffaa00";

        // Proteksi Tombol Selesaikan: Hanya untuk Adventurer
        const finishBtn = document.getElementById('finishAction');
        if(!imAdventurer) {
            finishBtn.disabled = true;
            finishBtn.innerText = "MENUNGGU ADVENTURER SELESAI";
            finishBtn.style.opacity = "0.5";
        }

        // Jika status berubah jadi completed (oleh lawan), pindah ke rating
        if(data.status === "completed") {
            window.location.href = "rating.html";
        }
    });

    // 3. CHAT P2P REAL-TIME
    function sendChat() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        targetDb.ref(`chats/${qId}`).push({
            sender: session.nick,
            text: text,
            timestamp: Date.now()
        }).then(() => {
            input.value = "";
        }).catch(e => alert("Gagal kirim chat: " + e.message));
    }

    // Listener Chat Baru
    targetDb.ref(`chats/${qId}`).on('child_added', snap => {
        const c = snap.val();
        const box = document.getElementById('chatBox');
        const isMe = (c.sender.toLowerCase() === session.nick.toLowerCase());
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMe ? 'me' : 'them'}`;
        msgDiv.innerHTML = `${c.text}<small>${new Date(c.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>`;
        
        box.appendChild(msgDiv);
        box.scrollTop = box.scrollHeight; // Auto scroll ke bawah
    });

    // Enter Key Support
    document.getElementById('msgInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendChat();
    });

    // 4. TOMBOL SELESAIKAN MISI
    async function completeMission() {
        if(!confirm("Konfirmasi: Misi telah selesai dikerjakan?")) return;

        try {
            // Update Kontrak
            await targetDb.ref(`kontrak_aktif/${qId}`).update({ status: "completed" });
            
            // Update Radar Asli agar statusnya sinkron
            await targetDb.ref(qPath).update({ status: "completed" });

            window.location.href = "rating.html";
        } catch (e) {
            alert("Gagal update status: " + e.message);
        }
    }

    // Set Link WA & Maps (Dummy/Contoh)
    document.getElementById('btnWA').href = "https://wa.me/628123456789"; 
    document.getElementById('btnMap').href = "https://www.google.com/maps";

</script>

</body>
</html>
