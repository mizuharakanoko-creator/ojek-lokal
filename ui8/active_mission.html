<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION ACTIVE | PROGRESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .mission-header { background: #111; padding: 15px; border-bottom: 2px solid #00ffff; display: flex; justify-content: space-between; align-items: center; }
        .target-info div { font-weight: bold; color: #00ffff; font-size: 16px; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #080808; }
        .msg { max-width: 75%; padding: 10px; border-radius: 8px; font-size: 14px; position: relative; }
        .msg.me { align-self: flex-end; background: #00ffff; color: #000; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border: 1px solid #333; }
        .input-area { background: #111; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #333; }
        #msgInput { flex: 1; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; outline: none; }
        .action-bar { background: #111; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: center; text-decoration: none; font-size: 12px; }
        .btn-wa { background: #25d366; color: white; }
        .btn-map { background: #4285f4; color: white; }
        .btn-finish { background: #ff0055; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div class="mission-header">
    <div class="target-info">
        <small style="color:#888;">TARGET:</small>
        <div id="targetName">MENYAMBUNGKAN...</div>
    </div>
    <div id="roleBadge" style="font-size:10px; border:1px solid #444; padding:2px 5px;">ROLE: ?</div>
</div>

<div id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Ketik pesan...">
    <button onclick="sendChat()" style="background:#00ffff; border:none; padding:10px 15px; border-radius:4px; font-weight:bold;">KIRIM</button>
</div>

<div class="action-bar">
    <a id="btnWA" href="#" target="_blank" class="btn btn-wa">WHATSAPP</a>
    <a id="btnMap" href="#" target="_blank" class="btn btn-map">MAPS</a>
    <button id="finishAction" class="btn btn-finish" onclick="completeMission()">SELESAIKAN MISI</button>
</div>

<script>
    // 1. DATA RECOVERY (Penyelamatan Sesi)
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    let qId = sessionStorage.getItem('active_quest');
    let qPath = sessionStorage.getItem('active_quest_path');

    if (!session) window.location.href = "index.html";

    const targetDb = getDatabaseByShard(session.shard_id);

    // FUNGSI UTAMA UNTUK MENJALANKAN HALAMAN
    function initMission() {
        // Listener Kontrak
        targetDb.ref(`kontrak_aktif/${qId}`).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();

            // Jika qPath kosong di Requester, selamatkan dari data Firebase
            if(!qPath && data.path_asli) {
                qPath = data.path_asli;
                sessionStorage.setItem('active_quest_path', qPath);
            }

            const myNick = session.nick.toLowerCase();
            const isAdv = (myNick === data.adventurer.toLowerCase());
            const lawan = isAdv ? data.requester : data.adventurer;

            document.getElementById('targetName').innerText = lawan.toUpperCase();
            document.getElementById('roleBadge').innerText = isAdv ? "ADVENTURER" : "REQUESTER";

            const finishBtn = document.getElementById('finishAction');
            if(!isAdv) {
                finishBtn.disabled = true;
                finishBtn.innerText = "MENUNGGU ADVENTURER SELESAI";
                finishBtn.style.opacity = "0.5";
            }

            if(data.status === "completed") window.location.href = "rating.html";
        });

        // Listener Chat
        targetDb.ref(`chats/${qId}`).on('child_added', snap => {
            const c = snap.val();
            const isMe = c.sender.toLowerCase() === session.nick.toLowerCase();
            const box = document.getElementById('chatBox');
            box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${c.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    // CEK VALIDASI DENGAN TOLERANSI
    if (!qId) {
        // Jika qId hilang, kita coba cari di tabel kontrak_aktif berdasarkan nama user
        // Ini adalah "Jaring Pengaman" terakhir
        targetDb.ref('kontrak_aktif').once('value', snap => {
            let found = false;
            snap.forEach(child => {
                const d = child.val();
                if(d.adventurer.toLowerCase() === session.nick.toLowerCase() || d.requester.toLowerCase() === session.nick.toLowerCase()) {
                    qId = d.id_misi;
                    qPath = d.path_asli;
                    sessionStorage.setItem('active_quest', qId);
                    sessionStorage.setItem('active_quest_path', qPath);
                    found = true;
                }
            });

            if(found) {
                initMission();
            } else {
                alert("SESI MISI BERAKHIR / TIDAK VALID");
                window.location.href = "index.html";
            }
        });
    } else {
        initMission();
    }

    function sendChat() {
        const txt = document.getElementById('msgInput').value;
        if(!txt) return;
        targetDb.ref(`chats/${qId}`).push({ sender: session.nick, text: txt, timestamp: Date.now() });
        document.getElementById('msgInput').value = "";
    }

    async function completeMission() {
        if(!confirm("Misi selesai?")) return;
        await targetDb.ref(`kontrak_aktif/${qId}`).update({ status: "completed" });
        await targetDb.ref(qPath).update({ status: "completed" });
        window.location.href = "rating.html";
    }
</script>
</body>
</html>
