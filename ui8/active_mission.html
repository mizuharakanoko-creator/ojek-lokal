<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MISSION IN PROGRESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; text-align: center; padding: 50px 20px; }
        .radar-ring { width: 100px; height: 100px; border: 4px solid #00ffff; border-radius: 50%; margin: 0 auto 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); } }
        button { background: #ff0055; color: white; padding: 15px 30px; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="radar-ring"></div>
    <h2 style="color:#00ffff;">MISI SEDANG BERJALAN</h2>
    <p id="statusTxt" style="color:#888;">Adventurer sedang dalam perjalanan...</p>

    <button id="btnFinish" style="display:none;" onclick="selesaikanMisi()">BARANG DITERIMA (SELESAI)</button>

    <script>
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        const questId = sessionStorage.getItem('active_quest');

        // Hanya Requester (Citizen) yang boleh menyelesaikan misi
        if(session.role !== "adventurer") {
            document.getElementById('btnFinish').style.display = "inline-block";
        }

        // Adventurer dipantau, jika kontrak dihapus/selesai, kembali ke radar
        db.ref(`kontrak_aktif/${questId}`).on('value', snap => {
            if(!snap.exists() && session.role === "adventurer") {
                alert("Misi telah diselesaikan oleh Requester!");
                sessionStorage.removeItem('active_quest');
                window.location.href = "dashboard_adventurer.html";
            }
        });

        function selesaikanMisi() {
            window.location.href = "completion_rating.html";
        }
    </script>
</body>
</html>
