<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION ROOM | DEBUG MODE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #00ffff; display: flex; justify-content: space-between; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0a0a0a; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 13px; margin: 2px 0; }
        .msg.me { align-self: flex-end; background: #00ffff; color: #000; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border: 1px solid #333; }
        .input-area { background: #111; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; }
        .action-bar { background: #111; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-align: center; font-size: 11px; text-decoration: none; color: white; }
        .btn-finish { background: #ff0055; grid-column: span 2; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div id="missionTarget">TARGET: LOADING...</div>
    <div id="myRole" style="color: #00ffff;">ROLE: ?</div>
</div>

<div id="chatBox">
    <div style="color: #555; font-size: 10px; text-align: center;">-- DEBUG CONSOLE ACTIVE --</div>
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Ketik pesan...">
    <button onclick="sendChat()" style="background:#00ffff; border:none; padding:10px 20px; font-weight:bold; border-radius:4px;">KIRIM</button>
</div>

<div class="action-bar">
    <a id="linkWA" href="#" target="_blank" class="btn" style="background:#25d366;">WHATSAPP</a>
    <a id="linkMap" href="#" target="_blank" class="btn" style="background:#4285f4;">MAPS</a>
    <button id="btnFinish" class="btn btn-finish" onclick="completeMission()">SELESAIKAN MISI</button>
</div>

<script>
    // 1. CEK DATA DENGAN ALERT (Audit System)
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const qId = sessionStorage.getItem('active_quest');
    const qPath = sessionStorage.getItem('active_quest_path');

    if (!session) alert("DANGER: Session User Hilang!");
    if (!qId) alert("DANGER: ID Misi (active_quest) Hilang!");
    if (!qPath) alert("WARNING: Path Misi (active_quest_path) Hilang!");

    const targetDb = getDatabaseByShard(session.shard_id);

    // 2. LOGIKA SYNC KONTRAK
    targetDb.ref(`kontrak_aktif/${qId}`).on('value', snap => {
        if (!snap.exists()) {
            console.log("Kontrak tidak terbaca di Firebase");
            document.getElementById('missionTarget').innerText = "KONTRAK TIDAK DITEMUKAN";
            return;
        }

        const data = snap.val();
        const myNick = session.nick.toLowerCase();
        const isAdv = (myNick === data.adventurer.toLowerCase());
        const lawan = isAdv ? data.requester : data.adventurer;

        // Update UI
        document.getElementById('missionTarget').innerText = "TARGET: " + lawan.toUpperCase();
        document.getElementById('myRole').innerText = "ROLE: " + (isAdv ? "ADVENTURER" : "REQUESTER");

        // Role Power: Adventurer bisa klik, Requester cuma nonton
        const finishBtn = document.getElementById('btnFinish');
        if (isAdv) {
            finishBtn.disabled = false;
            finishBtn.innerText = "SELESAIKAN MISI";
            finishBtn.style.opacity = "1";
        } else {
            finishBtn.disabled = true;
            finishBtn.innerText = "MENUNGGU ADVENTURER SELESAI...";
            finishBtn.style.opacity = "0.5";
        }

        // Auto pindah kalau status 'completed'
        if (data.status === "completed") {
            window.location.href = "rating.html";
        }
    });

    // 3. LOGIKA CHAT
    targetDb.ref(`chats/${qId}`).on('child_added', snap => {
        const c = snap.val();
        const isMe = c.sender.toLowerCase() === session.nick.toLowerCase();
        const box = document.getElementById('chatBox');
        
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'me' : 'them'}`;
        div.innerText = c.text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });

    function sendChat() {
        const val = document.getElementById('msgInput').value;
        if (!val || !qId) return;
        targetDb.ref(`chats/${qId}`).push({
            sender: session.nick,
            text: val,
            timestamp: Date.now()
        });
        document.getElementById('msgInput').value = "";
    }

    async function completeMission() {
        if (!confirm("Konfirmasi misi selesai?")) return;
        
        try {
            // Kita buat urutan eksekusi yang jelas
            await targetDb.ref(`kontrak_aktif/${qId}`).update({ status: "completed" });
            
            // Kalau qPath ada, kita update, kalau gak ada kita skip biar gak error
            if (qPath) {
                await targetDb.ref(qPath).update({ status: "completed" });
            }

            window.location.href = "rating.html";
        } catch (e) {
            alert("Gagal Update: " + e.message);
        }
    }
</script>

</body>
</html>
