<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION ACTIVE | PROGRESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header Stats */
        .mission-header { background: #111; padding: 15px; border-bottom: 2px solid #00ffff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,255,255,0.1); }
        .target-info small { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .target-info div { font-weight: bold; color: #00ffff; font-size: 16px; }
        #roleBadge { font-size: 10px; padding: 4px 10px; border-radius: 4px; border: 1px solid #444; background: #222; text-transform: uppercase; }

        /* Chat Area */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #080808; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #00ffff; color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .msg small { display: block; font-size: 9px; opacity: 0.6; margin-top: 4px; text-align: right; }

        /* Input Area */
        .input-area { background: #111; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #333; }
        #msgInput { flex: 1; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 6px; outline: none; font-family: inherit; }
        #msgInput:focus { border-color: #00ffff; }
        .btn-send { background: #00ffff; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }

        /* Quick Action Buttons */
        .action-bar { background: #111; padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; text-align: center; text-decoration: none; font-size: 12px; transition: 0.2s; }
        .btn-wa { background: #25d366; color: white; }
        .btn-map { background: #4285f4; color: white; }
        .btn-finish { background: #ff0055; color: white; grid-column: span 2; font-size: 14px; margin-top: 5px; box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

<div class="mission-header">
    <div class="target-info">
        <small>Target Operasi</small>
        <div id="targetName">Menghubungkan...</div>
    </div>
    <div id="roleBadge">ROLE: ?</div>
</div>

<div id="chatBox">
    <div style="text-align:center; color:#444; font-size:11px; margin-top:50px;">-- Jalur komunikasi terenkripsi aktif --</div>
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Kirim instruksi..." autocomplete="off">
    <button class="btn-send" onclick="sendChat()">KIRIM</button>
</div>

<div class="action-bar">
    <a id="btnWA" href="#" target="_blank" class="btn btn-wa">WHATSAPP</a>
    <a id="btnMap" href="#" target="_blank" class="btn btn-map">GOOGLE MAPS</a>
    <button id="finishAction" class="btn btn-finish" onclick="completeMission()">SELESAIKAN MISI</button>
</div>

<script>
    // 1. Inisialisasi Data Sesi
    const rawSession = localStorage.getItem('pickme_session');
    const session = rawSession ? JSON.parse(rawSession) : null;
    
    const qId = sessionStorage.getItem('active_quest');
    const qPath = sessionStorage.getItem('active_quest_path');

    if(!session || !qId || !qPath) {
        alert("Sesi Misi Berakhir atau Tidak Valid.");
        window.location.href = "index.html";
    }

    const targetDb = getDatabaseByShard(session.shard_id);

    // 2. Listener Kontrak & Penentuan Role
    targetDb.ref(`kontrak_aktif/${qId}`).on('value', snap => {
        if(!snap.exists()) {
            // Jika data dihapus oleh proses clearchance
            window.location.href = "index.html";
            return;
        }
        
        const data = snap.val();
        
        // Normalisasi untuk pengecekan role
        const myNick = session.nick.toLowerCase();
        const advNick = data.adventurer.toLowerCase();
        const reqNick = data.requester.toLowerCase();

        const imAdventurer = (myNick === advNick);
        
        // Update UI berdasarkan Role
        const lawan = imAdventurer ? data.requester : data.adventurer;
        document.getElementById('targetName').innerText = lawan.toUpperCase();
        
        const badge = document.getElementById('roleBadge');
        badge.innerText = imAdventurer ? "ADVENTURER" : "REQUESTER";
        badge.style.color = imAdventurer ? "#00ffff" : "#ffaa00";
        badge.style.borderColor = imAdventurer ? "#00ffff" : "#ffaa00";

        // Kontrol Tombol Selesaikan (Hanya Adventurer yang bisa klik)
        const finishBtn = document.getElementById('finishAction');
        if(!imAdventurer) {
            finishBtn.disabled = true;
            finishBtn.innerText = "MENUNGGU ADVENTURER SELESAI";
            document.getElementById('btnMap').style.opacity = "0.3";
            document.getElementById('btnMap').style.pointerEvents = "none";
        } else {
            finishBtn.disabled = false;
            finishBtn.innerText = "KONFIRMASI SELESAI";
        }

        // Redirect Otomatis jika status berubah ke completed
        if(data.status === "completed") {
            window.location.href = "rating.html";
        }
    });

    // 3. Sistem Chat P2P
    function sendChat() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        targetDb.ref(`chats/${qId}`).push({
            sender: session.nick,
            text: text,
            timestamp: Date.now()
        }).then(() => {
            input.value = "";
        });
    }

    // Listener Pesan Masuk
    targetDb.ref(`chats/${qId}`).on('child_added', snap => {
        const c = snap.val();
        const box = document.getElementById('chatBox');
        const isMe = (c.sender.toLowerCase() === session.nick.toLowerCase());
        
        const time = new Date(c.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        const msgHtml = `
            <div class="msg ${isMe ? 'me' : 'them'}">
                ${c.text}
                <small>${time}</small>
            </div>
        `;
        
        box.insertAdjacentHTML('beforeend', msgHtml);
        box.scrollTop = box.scrollHeight;
    });

    // Support Enter Key
    document.getElementById('msgInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendChat();
    });

    // 4. Fungsi Selesaikan Misi (Update Firebase)
    async function completeMission() {
        if(!confirm("Apakah Anda yakin misi telah selesai? Ini akan mengalihkan Requester ke halaman rating.")) return;

        try {
            // Update Status di Kontrak Aktif (Trigger Redirect Lawan)
            await targetDb.ref(`kontrak_aktif/${qId}`).update({ 
                status: "completed",
                end_time: Date.now() 
            });
            
            // Update Status di Radar Wilayah
            await targetDb.ref(qPath).update({ status: "completed" });

            // Pindah ke Rating (Diri Sendiri)
            window.location.href = "rating.html";
        } catch (e) {
            alert("Gagal mengupdate status: " + e.message);
        }
    }

    // Link WhatsApp & Maps
    // Tips: Anda bisa mengisi nomor WA dari data profil jika ada
    document.getElementById('btnWA').href = "https://wa.me/"; 
    document.getElementById('btnMap').href = "https://www.google.com/maps";

</script>

</body>
</html>
