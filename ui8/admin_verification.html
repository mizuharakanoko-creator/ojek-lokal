<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | GUILD VERIFICATION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        h2 { color: #00ffff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .row { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ff0055; }
        .info b { color: #fff; font-size: 18px; display: block; }
        .info span { color: #888; font-size: 12px; }
        .badge { display: inline-block; padding: 2px 8px; background: #00ffff22; border: 1px solid #00ffff; color: #00ffff; font-size: 10px; font-weight: bold; border-radius: 4px; margin-top: 5px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #00cc00; }
        button.reject { background: #ff0055; color: white; margin-left: 10px; }
        button.reject:hover { background: #cc0044; }
    </style>
</head>
<body>
    <h2>PENDING APPROVAL LIST</h2>
    <div id="pendingList"><p style="color:#666;">Memeriksa antrean...</p></div>

    <script>
        db.ref('pendaftaran_pending').on('value', snap => {
            const listDiv = document.getElementById('pendingList');
            listDiv.innerHTML = "";

            if(!snap.exists()) {
                listDiv.innerHTML = "<p style='color:#666;'>Tidak ada berkas pendaftaran baru.</p>";
                return;
            }

            snap.forEach(child => {
                const u = child.val();
                const nick = child.key;
                const cat = u.category || "MOTOR";

                listDiv.innerHTML += `
                    <div class="row" id="row-${nick}">
                        <div class="info">
                            <b>${nick.toUpperCase()}</b>
                            <span>SHARD: ${u.shard_id}</span>
                            <div class="badge">${cat}</div>
                        </div>
                        <div>
                            <button onclick="approveUser('${nick}')">APPROVE</button>
                            <button class="reject" onclick="rejectUser('${nick}')">REJECT</button>
                        </div>
                    </div>
                `;
            });
        });

        async function approveUser(nick) {
            if(!confirm(`Terima ${nick.toUpperCase()} sebagai Adventurer resmi?`)) return;

            const pendingRef = db.ref(`pendaftaran_pending/${nick}`);
            const snap = await pendingRef.get();
            if(!snap.exists()) return alert("Data hilang dari antrean!");
            
            const data = snap.val();
            const shardId = data.shard_id; 
            const category = data.category || "MOTOR";
            // Memformat shard_id ke format folder database (huruf kecil semua)
            const shardFolder = `adventurer-${shardId.toLowerCase()}`; 

            try {
                // 1. Buat Data Login Global
                await db.ref(`users_registry/${nick}`).set({
                    password: data.password,
                    shard_id: shardId,
                    role: "adventurer",
                    status: "active"
                });

                // 2. Buat Profil Permanen di Shard Wilayah
                await db.ref(`${shardFolder}/${nick}`).set({
                    nick: nick,
                    category: category,
                    rating: 5.0,
                    level: 1,
                    exp: 0,
                    vitality: 1000,
                    is_busy: false,
                    joined_at: Date.now()
                });

                // 3. Hapus dari pending
                await pendingRef.remove();
                
            } catch (e) {
                alert("Gagal memproses persetujuan: " + e.message);
            }
        }

        async function rejectUser(nick) {
            if(confirm(`Tolak dan hapus berkas ${nick}?`)) {
                await db.ref(`pendaftaran_pending/${nick}`).remove();
            }
        }
    </script>
</body>
</html>
