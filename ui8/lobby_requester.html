<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY | SELEKSI</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #ff0055; padding-bottom: 10px; margin-bottom: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00ffff; }
        .info b { color: #fff; font-size: 16px; display: block; }
        .info span { color: #ffaa00; }
        button { background: #00ffff; color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color:#ff0055; margin:0;">TERMINAL BIDS</h2>
    <small id="misiInfo">Menunggu penawaran...</small>
</div>

<div id="listBids"></div>

<script>
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const questId = sessionStorage.getItem('active_quest');
    const questPath = sessionStorage.getItem('active_quest_path');
    
    if(!questId) window.location.href = "index.html";
    const targetDb = getDatabaseByShard(session.shard_id);

    document.getElementById('misiInfo').innerText = "QUEST ID: " + questId;

    // 1. Pantau penawaran di tabel TERPISAH (terminal_bids)
    targetDb.ref(`terminal_bids/${questId}`).on('value', snap => {
        const box = document.getElementById('listBids');
        box.innerHTML = "";
        if(!snap.exists()) return box.innerHTML = "<p style='text-align:center; color:#555;'>Belum ada tawaran masuk...</p>";

        snap.forEach(child => {
            const b = child.val();
            box.innerHTML += `
                <div class="card">
                    <div class="info">
                        <b>${b.adventurer.toUpperCase()}</b>
                        <span>Tawaran: ${b.price} G</span>
                    </div>
                    <button onclick="terima('${b.adventurer}', ${b.price}, '${b.shard_id}')">PILIH</button>
                </div>`;
        });
    });

    async function terima(advNick, price, advShard) {
        if(!confirm(`Rekrut ${advNick}?`)) return;

        try {
            // A. Update status misi di Radar
            await targetDb.ref(questPath).update({ 
                status: "taken", 
                assigned_to: advNick, 
                final_price: price 
            });

            // B. Kirim Undangan ke Database Shard si Adventurer
            const advDb = getDatabaseByShard(advShard);
            const pathUndangan = `adventurer-${advShard.toLowerCase()}/${advNick}/undangan_aktif`;
            await advDb.ref(pathUndangan).set({
                id_misi: questId,
                path_misi: questPath
            });

            // C. Buat Kontrak Aktif di Database Lokal
            await targetDb.ref(`kontrak_aktif/${questId}`).set({
                id_misi: questId,
                requester: session.nick,
                adventurer: advNick,
                status: "briefing",
                timestamp: Date.now()
            });

            // D. BERSIHKAN TERMINAL (Hapus semua bid yang masuk untuk misi ini)
            await targetDb.ref(`terminal_bids/${questId}`).remove();

            window.location.href = "briefing.html";
        } catch (e) { alert(e.message); }
    }
</script>
</body>
</html>
