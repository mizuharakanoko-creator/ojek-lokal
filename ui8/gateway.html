<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN | GATEWAY</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; padding: 20px; width: 100%; max-width: 400px; }
        h1 { color: #00ffff; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 10px #00ffff; }
        
        .choice-card {
            background: #111;
            border: 1px solid #333;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .choice-card:hover { border-color: #ff0055; background: #1a1a1a; transform: translateY(-5px); }
        .choice-card h3 { margin: 0; color: #fff; text-transform: uppercase; }
        .choice-card p { font-size: 12px; color: #888; margin: 10px 0 0 0; }
        
        .nuclear-status {
            font-size: 10px;
            color: #ff0055;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SOVEREIGN</h1>

    <div class="choice-card" onclick="startFresh('QUEST')">
        <h3>Pesan Jasa (Quest)</h3>
        <p>Gunakan aplikasi tanpa akun. Cepat & Langsung.</p>
    </div>

    <div class="choice-card" onclick="startFresh('LOGIN')">
        <h3>Masuk Akun / Driver</h3>
        <p>Login sebagai Adventurer atau Requester Terdaftar.</p>
    </div>

    <div id="status" class="nuclear-status">Sistem Sedang Sterilisasi...</div>
</div>

<script>
    function startFresh(mode) {
        // Tampilkan indikator loading
        document.getElementById('status').style.display = "block";
        
        // --- NUCLEAR RESET DIMULAI ---
        console.log("Memulai Nuclear Reset...");
        
        // 1. Hapus semua data di Local Storage
        localStorage.clear();
        
        // 2. Hapus semua data di Session Storage
        sessionStorage.clear();
        
        // 3. Hapus Cookie (Opsional tapi bagus untuk sterilisasi total)
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i];
            const eqPos = cookie.indexOf("=");
            const name = eqPos > -1 ? cookie.substring(0, eqPos) : cookie;
            document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        }

        // Berikan jeda sebentar agar browser selesai menghapus (milidetik)
        setTimeout(() => {
            if (mode === 'QUEST') {
                // Inisialisasi Identitas Gelas Kosong untuk Guest
                const guestData = {
                    nick: "GUEST-" + Math.floor(1000 + Math.random() * 9000),
                    role: "guest",
                    shard_id: "IDN-JABAR-KNG-KUNINGAN" // Default Shard
                };
                localStorage.setItem('pickme_session', JSON.stringify(guestData));
                
                // Direct ke halaman buat misi
                window.location.href = "publish.html";
            } else {
                // Direct ke halaman login
                window.location.href = "login.html";
            }
        }, 800);
    }
</script>

</body>
</html>
