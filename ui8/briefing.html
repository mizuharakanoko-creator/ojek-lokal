<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GUILD | BRIEFING ROOM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .doc { background: #111; border: 1px solid #444; padding: 20px; max-width: 400px; margin: auto; border-radius: 8px; }
        h3 { color: #00ffff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .detail { text-align: left; margin-bottom: 20px; color: #ccc; line-height: 1.6; }
        button { background: #00ff00; color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="doc">
        <h3>DOKUMEN KONTRAK AKTIF</h3>
        <div class="detail" id="contractData">Memuat data briefing...</div>
        
        <button id="btnStart" style="display:none;" onclick="mulaiMisi()">MULAI PERJALANAN</button>
        <p id="waitText" style="color:#ffaa00; display:none;">Menunggu Adventurer memulai perjalanan...</p>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        const questId = sessionStorage.getItem('active_quest');
        
        db.ref(`kontrak_aktif/${questId}`).on('value', snap => {
            if(!snap.exists()) return window.location.href = "index.html";
            const k = snap.val();

            document.getElementById('contractData').innerHTML = `
                <b>ID Kontrak:</b> ${k.id_misi} <br>
                <b>Requester:</b> ${k.requester.toUpperCase()} <br>
                <b>Adventurer:</b> ${k.adventurer.toUpperCase()} <br>
                <hr style="border-color:#333;">
                Status: <span style="color:#00ffff">${k.status.toUpperCase()}</span>
            `;

            if(session.role === "adventurer") {
                document.getElementById('btnStart').style.display = "block";
            } else {
                document.getElementById('waitText').style.display = "block";
            }

            // Jika Adventurer menekan mulai, Requester otomatis pindah halaman
            if(k.status === "on_mission") {
                window.location.href = "mission_active.html";
            }
        });

        function mulaiMisi() {
            db.ref(`kontrak_aktif/${questId}`).update({ status: "on_mission" });
            window.location.href = "mission_active.html";
        }
    </script>
</body>
</html>
