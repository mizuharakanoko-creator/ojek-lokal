<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD | BRIEFING</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .doc { background: #111; border: 1px solid #444; padding: 25px; max-width: 400px; margin: 40px auto; border-radius: 8px; border-top: 5px solid #00ff00; }
        .info { text-align: left; margin: 20px 0; font-size: 14px; line-height: 1.8; color: #ccc; }
        button { background: #00ff00; color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="doc">
        <h2 style="margin:0; color:#00ff00;">DOKUMEN KONTRAK</h2>
        <div class="info" id="boxDetail">Menghubungkan ke server...</div>
        <button id="btnAction" style="display:none;" onclick="startQuest()">MULAI PERJALANAN</button>
        <p id="msgWait" style="display:none; color:#ffaa00;">Menunggu Adventurer memulai...</p>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        const questId = sessionStorage.getItem('active_quest');

        if(!questId) window.location.href = "login.html";

        db.ref(`kontrak_aktif/${questId}`).on('value', snap => {
            if(!snap.exists()) return;
            const k = snap.val();

            document.getElementById('boxDetail').innerHTML = `
                <b>ID:</b> ${k.id_misi}<br>
                <b>Requester:</b> ${k.requester.toUpperCase()}<br>
                <b>Adventurer:</b> ${k.adventurer.toUpperCase()}<br>
                <hr style="border-color:#333">
                <b>STATUS:</b> <span style="color:#00ffff">${k.status.toUpperCase()}</span>
            `;

            if(k.status === "on_mission") {
                window.location.href = "mission_active.html";
            }

            if(session.role === "adventurer") {
                document.getElementById('btnAction').style.display = "block";
            } else {
                document.getElementById('msgWait').style.display = "block";
            }
        });

        async function startQuest() {
            try {
                await db.ref(`kontrak_aktif/${questId}`).update({ status: "on_mission" });
            } catch (e) { alert(e.message); }
        }
    </script>
</body>
</html>
