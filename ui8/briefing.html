<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD | BRIEFING</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .paper { background: #111; border: 1px solid #444; padding: 30px; border-radius: 12px; max-width: 400px; margin: 40px auto; border-top: 6px solid #00ff00; }
        .detail { text-align: left; margin: 20px 0; color: #ccc; font-size: 14px; line-height: 1.8; }
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
        button { background: #00ff00; color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .wait-msg { color: #ffaa00; font-style: italic; }
    </style>
</head>
<body>

<div class="paper">
    <h2 style="margin:0; color:#00ff00;">SURAT KONTRAK</h2>
    <div id="content" class="detail">Menghubungkan ke Shard...</div>
    
    <button id="btnMulai" style="display:none;" onclick="start()">MULAI MISI SEKARANG</button>
    <p id="txtWait" style="display:none;" class="wait-msg">Menunggu Adventurer memulai perjalanan...</p>
</div>

<script>
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const questId = sessionStorage.getItem('active_quest');
    const targetDb = getDatabaseByShard(session.shard_id);

    if(!questId) window.location.href = "index.html";

    // Pantau status kontrak
    targetDb.ref(`kontrak_aktif/${questId}`).on('value', snap => {
        if(!snap.exists()) return;
        const k = snap.val();

        document.getElementById('content').innerHTML = `
            <b>ID MISI:</b> ${k.id_misi}<br>
            <b>REQUESTER:</b> ${k.requester.toUpperCase()}<br>
            <b>ADVENTURER:</b> ${k.adventurer.toUpperCase()}<br>
            <hr>
            <b>STATUS:</b> <span style="color:#00ffff">${k.status.toUpperCase()}</span>
        `;

        if(k.status === "on_mission") {
            window.location.href = "mission_active.html";
        }

        if(session.role === "adventurer") {
            document.getElementById('btnMulai').style.display = "block";
        } else {
            document.getElementById('txtWait').style.display = "block";
        }
    });

    async function start() {
        try {
            await targetDb.ref(`kontrak_aktif/${questId}`).update({ status: "on_mission" });
        } catch (e) { alert(e.message); }
    }
</script>

</body>
</html>
