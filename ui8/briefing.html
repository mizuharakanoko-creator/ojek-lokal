<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRACT | BRIEFING ROOM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Courier New', Courier, monospace; padding: 20px; margin: 0; }
        .contract-frame { 
            border: 2px solid #00ff00; padding: 25px; border-radius: 15px; 
            background: linear-gradient(145deg, #0a1a0a, #050505);
            box-shadow: 0 0 20px rgba(0,255,0,0.3); max-width: 400px; margin: 40px auto;
        }
        h2 { text-align: center; color: #00ff00; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-top: 0; }
        .detail-row { margin: 15px 0; font-size: 14px; display: flex; justify-content: space-between; border-bottom: 1px dashed #222; padding-bottom: 8px; }
        .label { color: #888; text-transform: uppercase; font-size: 11px; }
        .value { color: #fff; font-weight: bold; }
        .status-badge { background: #00ff00; color: #000; padding: 2px 10px; font-weight: bold; border-radius: 3px; font-size: 12px; }
        
        #btnAction { 
            width: 100%; padding: 18px; background: #fff; color: #000; border: none; 
            font-weight: bold; margin-top: 30px; cursor: pointer; border-radius: 8px;
            transition: 0.3s; text-transform: uppercase; font-size: 16px;
        }
        #btnAction:hover { background: #00ff00; transform: translateY(-2px); }
        #btnAction:disabled { background: #222; color: #555; cursor: not-allowed; }
        
        #loadingArea { text-align: center; margin-top: 100px; color: #00ff00; }
        .loader { border: 4px solid #111; border-top: 4px solid #00ff00; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingArea">
    <div class="loader"></div>
    <h3 id="loadingMsg">MENGHUBUNGKAN KE SHARD...</h3>
</div>

<div class="contract-frame" id="contractUI" style="display: none;">
    <h2>SURAT KONTRAK</h2>
    
    <div class="detail-row">
        <span class="label">ID MISI</span>
        <span class="value" id="cId">-</span>
    </div>
    <div class="detail-row">
        <span class="label">REQUESTER</span>
        <span class="value" id="cReq">-</span>
    </div>
    <div class="detail-row">
        <span class="label">ADVENTURER</span>
        <span class="value" id="cAdv">-</span>
    </div>
    <div class="detail-row">
        <span class="label">STATUS SYSTEM</span>
        <span class="value"><span class="status-badge" id="cStatus">WAITING</span></span>
    </div>

    <button id="btnAction" onclick="startMission()">MULAI MISI SEKARANG</button>
</div>

<script>
    // 1. Ambil Sesi & Data Misi
    const rawSession = localStorage.getItem('pickme_session');
    const session = rawSession ? JSON.parse(rawSession) : null;
    
    const qId = sessionStorage.getItem('active_quest');
    const qPath = sessionStorage.getItem('active_quest_path');

    // Validasi Dasar
    if(!session || !qId || !qPath) {
        alert("Sesi atau Data Misi tidak ditemukan. Kembali ke Dashboard.");
        window.location.href = "index.html";
    }

    const targetDb = getDatabaseByShard(session.shard_id);

    // 2. Real-time Listener
    targetDb.ref(`kontrak_aktif/${qId}`).on('value', snap => {
        if(!snap.exists()) {
            document.getElementById('loadingMsg').innerText = "KONTRAK TIDAK DITEMUKAN / SUDAH SELESAI.";
            return;
        }

        const data = snap.val();
        
        // Render UI
        document.getElementById('loadingArea').style.display = "none";
        document.getElementById('contractUI').style.display = "block";
        
        document.getElementById('cId').innerText = data.id_misi;
        document.getElementById('cReq').innerText = data.requester;
        document.getElementById('cAdv').innerText = data.adventurer;
        document.getElementById('cStatus').innerText = data.status.toUpperCase();

        // CEK APAKAH STATUS BERUBAH KE 'ON_PROGRESS'
        if(data.status === "on_progress") {
            // Re-sync storage sebelum pindah untuk memastikan data aman
            sessionStorage.setItem('active_quest', qId);
            sessionStorage.setItem('active_quest_path', qPath);

            const btn = document.getElementById('btnAction');
            btn.innerText = "MENGALIHKAN KE HALAMAN MISI...";
            btn.style.background = "#ffaa00";
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = "active_mission.html";
            }, 1000);
        }
    });

    // 3. Fungsi Start (Khusus Adventurer)
    async function startMission() {
        try {
            const snap = await targetDb.ref(`kontrak_aktif/${qId}`).get();
            if(!snap.exists()) return;
            const d = snap.val();

            // NORMALISASI NAMA (Cegah Case Sensitive)
            const myNick = session.nick.toLowerCase();
            const advNick = d.adventurer.toLowerCase();

            if(myNick !== advNick) {
                alert("Hanya Adventurer (" + d.adventurer + ") yang bisa menekan tombol ini!");
                return;
            }

            const btn = document.getElementById('btnAction');
            btn.disabled = true;
            btn.innerText = "MEMPROSES KONTRAK...";

            // UPDATE DUA TEMPAT: Kontrak & Radar Utama
            const updates = {};
            updates[`kontrak_aktif/${qId}/status`] = "on_progress";
            updates[`kontrak_aktif/${qId}/start_time`] = Date.now();
            
            // Gunakan qPath untuk update radar asli
            await targetDb.ref().update(updates);
            await targetDb.ref(qPath).update({ status: "on_progress" });

        } catch (e) {
            alert("Gagal Memulai: " + e.message);
            document.getElementById('btnAction').disabled = false;
            document.getElementById('btnAction').innerText = "MULAI MISI SEKARANG";
        }
    }
</script>

</body>
</html>
