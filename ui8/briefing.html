<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRACT | BRIEFING ROOM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Courier New', Courier, monospace; padding: 20px; margin: 0; }
        .contract-frame { 
            border: 2px solid #00ff00; padding: 25px; border-radius: 15px; 
            background: linear-gradient(145deg, #0a1a0a, #050505);
            box-shadow: 0 0 20px rgba(0,255,0,0.3); max-width: 400px; margin: 40px auto;
        }
        h2 { text-align: center; color: #00ff00; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-top: 0; }
        .detail-row { margin: 15px 0; font-size: 14px; display: flex; justify-content: space-between; border-bottom: 1px dashed #222; padding-bottom: 8px; }
        .label { color: #888; text-transform: uppercase; font-size: 11px; }
        .value { color: #fff; font-weight: bold; }
        .status-badge { background: #00ff00; color: #000; padding: 2px 10px; font-weight: bold; border-radius: 3px; font-size: 12px; }
        
        #btnAction { 
            width: 100%; padding: 18px; background: #fff; color: #000; border: none; 
            font-weight: bold; margin-top: 30px; cursor: pointer; border-radius: 8px;
            transition: 0.3s; text-transform: uppercase; font-size: 16px;
        }
        #btnAction:hover { background: #00ff00; }
        #btnAction:disabled { background: #222; color: #555; cursor: not-allowed; }
        #loadingArea { text-align: center; margin-top: 100px; color: #00ff00; }
    </style>
</head>
<body>

<div id="loadingArea">
    <h3 id="loadingMsg">MENGHUBUNGKAN KE SHARD...</h3>
</div>

<div class="contract-frame" id="contractUI" style="display: none;">
    <h2>SURAT KONTRAK</h2>
    <div class="detail-row"><span class="label">ID MISI</span><span class="value" id="cId">-</span></div>
    <div class="detail-row"><span class="label">REQUESTER</span><span class="value" id="cReq">-</span></div>
    <div class="detail-row"><span class="label">ADVENTURER</span><span class="value" id="cAdv">-</span></div>
    <div class="detail-row"><span class="label">STATUS</span><span class="value"><span class="status-badge" id="cStatus">-</span></span></div>
    <button id="btnAction" onclick="startMission()">MULAI MISI SEKARANG</button>
</div>

<script>
    // 1. Ambil Identitas
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    let qId = sessionStorage.getItem('active_quest');
    let qPath = sessionStorage.getItem('active_quest_path');

    // PERBAIKAN: Jika data hilang tapi ada di URL, coba selamatkan (opsional)
    // Untuk saat ini, kita pastikan proteksi tidak terlalu agresif
    if(!session) {
        alert("Sesi berakhir");
        window.location.href = "index.html";
    }

    const targetDb = getDatabaseByShard(session.shard_id);

    // 2. Listener Utama
    targetDb.ref(`kontrak_aktif/${qId}`).on('value', snap => {
        if(!snap.exists()) {
            // JANGAN langsung terpental jika statusnya cuma delay loading
            console.log("Menunggu data kontrak...");
            return;
        }

        const data = snap.val();
        
        // Tampilkan UI
        document.getElementById('loadingArea').style.display = "none";
        document.getElementById('contractUI').style.display = "block";
        
        document.getElementById('cId').innerText = data.id_misi;
        document.getElementById('cReq').innerText = data.requester;
        document.getElementById('cAdv').innerText = data.adventurer;
        document.getElementById('cStatus').innerText = data.status.toUpperCase();

        // LOGIKA REDIRECT
        if(data.status === "on_progress") {
            // Pastikan data penting dikunci kembali ke session sebelum pindah
            sessionStorage.setItem('active_quest', data.id_misi);
            if(data.path_asli) sessionStorage.setItem('active_quest_path', data.path_asli);

            document.getElementById('btnAction').innerText = "MENYIAPKAN HALAMAN...";
            document.getElementById('btnAction').disabled = true;

            setTimeout(() => {
                window.location.href = "active_mission.html";
            }, 800);
        }

        // Cek Role untuk Tombol
        if(session.nick.toLowerCase() !== data.adventurer.toLowerCase()) {
            document.getElementById('btnAction').innerText = "MENUNGGU ADVENTURER...";
            document.getElementById('btnAction').disabled = true;
            document.getElementById('btnAction').style.background = "#111";
            document.getElementById('btnAction').style.color = "#444";
        }
    });

    async function startMission() {
        try {
            const snap = await targetDb.ref(`kontrak_aktif/${qId}`).get();
            const d = snap.val();

            if(session.nick.toLowerCase() !== d.adventurer.toLowerCase()) return;

            // Update status dengan tambahan 'path_asli' untuk jaga-jaga jika Requester kehilangan path
            await targetDb.ref(`kontrak_aktif/${qId}`).update({
                status: "on_progress",
                path_asli: qPath, 
                start_time: Date.now()
            });

            // Update radar utama
            await targetDb.ref(qPath).update({ status: "on_progress" });

        } catch (e) {
            alert("Error: " + e.message);
        }
    }
</script>
</body>
</html>
