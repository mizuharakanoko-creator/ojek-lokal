<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REQUESTER DASHBOARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .form-card { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff0055; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .warning-box { background: #442200; color: #ffaa00; padding: 10px; font-size: 12px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .logout { background: none; color: #555; border: none; margin-top: 20px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align:center; color:#00ffff;">CREATE MISSION</h2>
    
    <div id="roleWarning" class="warning-box">
        ⚠️ Terdeteksi Sesi Adventurer. Gunakan akun Requester agar misi terbit dengan benar.
    </div>

    <label>Armada</label>
    <select id="cat">
        <option value="MOTOR">MOTOR</option>
        <option value="MOBIL">MOBIL</option>
    </select>
    <input type="text" id="tujuan" placeholder="Lokasi Tujuan">
    <textarea id="desc" placeholder="Detail Tugas"></textarea>
    <input type="number" id="price" placeholder="Reward (G)">
    
    <button id="btnPublish" onclick="publishMisi()">PUBLISH MISSION</button>
    <center><button class="logout" onclick="logout()">LOGOUT / CLEAR SESSION</button></center>
</div>

<script>
    // 1. Ambil data sesi (Apapun yang ada di localhost)
    const rawSession = localStorage.getItem('pickme_session');
    const session = rawSession ? JSON.parse(rawSession) : null;

    // 2. Cek apakah role-nya cocok. Jika tidak, tampilkan peringatan saja (Jangan lempar/redirect)
    if (session && session.role !== "requester") {
        document.getElementById('roleWarning').style.display = "block";
        document.getElementById('btnPublish').innerText = "PUBLISH AS " + session.nick.toUpperCase();
    }

    async function publishMisi() {
        // Cek apakah ada sesi sama sekali
        if (!session) {
            alert("Sesi tidak ditemukan. Silakan login kembali.");
            window.location.href = "login.html";
            return;
        }

        const tujuan = document.getElementById('tujuan').value.trim();
        const price = document.getElementById('price').value;

        if (!tujuan || !price) {
            alert("Tujuan dan Harga wajib diisi!");
            return;
        }

        // Tentukan database berdasarkan Shard ID user (Apapun role-nya saat itu)
        const targetDb = getDatabaseByShard(session.shard_id);
        const idMisi = "MS-" + Date.now();
        
        // Ambil kecamatan dari Shard ID secara aman
        const shardParts = session.shard_id.split('-');
        const kec = shardParts[shardParts.length - 1].toUpperCase();
        
        const path = `${document.getElementById('cat').value}-KUNINGAN-PUSAT-${kec}/KEDUNGARUM/${idMisi}`;

        const data = {
            id: idMisi,
            requester: session.nick,
            shard_id: session.shard_id,
            tujuan: tujuan,
            description: document.getElementById('desc').value,
            price: parseInt(price),
            status: "open",
            timestamp: Date.now()
        };

        try {
            await targetDb.ref(path).set(data);
            
            // Gunakan sessionStorage agar tidak menimpa localStorage aplikasi lain
            sessionStorage.setItem('active_quest', idMisi);
            sessionStorage.setItem('active_quest_path', path);
            
            window.location.href = "lobby_requester.html";
        } catch (e) { 
            alert("Gagal terbit: " + e.message); 
        }
    }

    function logout() {
        localStorage.removeItem('pickme_session');
        window.location.href = "login.html";
    }
</script>
</body>
</html>
