<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBLISH DEBUG</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 20px; }
        .box { border: 2px solid #f00; padding: 20px; max-width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; display: block; box-sizing: border-box; }
        button { background: #0f0; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>DEBUG PUBLISH</h2>
    
    <label>Kirim Sebagai:</label>
    <select id="userSelect"></select>

    <input type="text" id="tujuan" placeholder="Tujuan">
    <input type="number" id="harga" placeholder="Harga">
    
    <button id="btnGas" onclick="gasKan()">PUBLISH SEKARANG</button>
</div>

<script>
    // 1. Ambil semua akun dari localStorage tanpa syarat
    function loadUsers() {
        const select = document.getElementById('userSelect');
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        
        if(session) {
            let opt = document.createElement('option');
            opt.value = JSON.stringify(session);
            opt.innerText = session.nick;
            select.appendChild(opt);
        }
        
        // Tambah opsi manual jika session kosong agar tidak error
        let guest = { nick: "TESTER", shard_id: "IDN-JABAR-KNG-KUNINGAN" };
        let opt2 = document.createElement('option');
        opt2.value = JSON.stringify(guest);
        opt2.innerText = "TESTER MODE";
        select.appendChild(opt2);
    }
    loadUsers();

    async function gasKan() {
        alert("Langkah 1: Fungsi gasKan dimulai");
        
        const tj = document.getElementById('tujuan').value;
        const hg = document.getElementById('harga').value;
        const user = JSON.parse(document.getElementById('userSelect').value);

        if(!tj || !hg) {
            alert("Error: Isi tujuan dan harga!");
            return;
        }

        try {
            alert("Langkah 2: Menghubungkan ke DB Shard: " + user.shard_id);
            const db = getDatabaseByShard(user.shard_id);
            
            if(!db) {
                alert("CRITICAL ERROR: Objek Database (db) TIDAK DITEMUKAN! Periksa firebase-config.js");
                return;
            }

            const idMisi = "MS-" + Date.now();
            // Path dibuat sangat sederhana untuk tes
            const pathMisi = "MOTOR-KUNINGAN-PUSAT-KUNINGAN/KEDUNGARUM/" + idMisi;

            alert("Langkah 3: Mencoba menulis ke Path: " + pathMisi);

            const data = {
                id: idMisi,
                requester: user.nick,
                tujuan: tj,
                price: parseInt(hg),
                status: "open",
                timestamp: Date.now()
            };

            // Gunakan .set tanpa 'await' dulu untuk melihat respon callback
            db.ref(pathMisi).set(data, (err) => {
                if(err) {
                    alert("Langkah 4 GAGAL: " + err.message);
                } else {
                    alert("Langkah 4 BERHASIL: Data masuk ke Firebase!");
                    
                    // Simpan data ke session untuk halaman berikutnya
                    sessionStorage.setItem('active_quest', idMisi);
                    sessionStorage.setItem('active_quest_path', pathMisi);
                    
                    alert("Langkah 5: Mencoba pindah halaman...");
                    window.location.href = "lobby_requester.html";
                }
            });

        } catch (e) {
            alert("CATCH ERROR: " + e.message);
        }
    }
</script>
</body>
</html>
