<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Create Mission</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #00ffff; color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .info { font-size: 10px; color: #ffaa00; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center; color: #00ffff;">CREATE MISSION</h2>
    
    <div class="info" id="statusUser">Mengecek Identitas...</div>

    <label>Kirim Sebagai:</label>
    <select id="userSelect"></select>

    <label>Pilih Armada:</label>
    <select id="cat">
        <option value="MOTOR">MOTOR</option>
        <option value="MOBIL">MOBIL</option>
    </select>

    <input type="text" id="tujuan" placeholder="Ke mana kita pergi?">
    <input type="number" id="harga" placeholder="Harga (G)">
    <textarea id="desc" placeholder="Detail tugas..."></textarea>
    
    <button id="btnPublish" onclick="eksekusiHajar()">PUBLISH MISSION</button>
</div>

<script>
    // Load semua user dari storage tanpa filter "Adventurer"
    function loadIdentity() {
        const select = document.getElementById('userSelect');
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        
        // 1. Ambil dari session aktif (Bodo amat dia Adventurer atau bukan)
        if(session) {
            let opt = document.createElement('option');
            opt.value = JSON.stringify(session);
            opt.innerText = `${session.nick.toUpperCase()} (${session.role})`;
            select.appendChild(opt);
            document.getElementById('statusUser').innerText = "Identitas Terdeteksi: " + session.role;
        }
        
        // 2. Opsi Tester/Guest (Cadangan)
        let guest = { nick: "GUEST-" + Math.floor(Math.random()*100), shard_id: "IDN-JABAR-KNG-KUNINGAN", role: "guest" };
        let optGuest = document.createElement('option');
        optGuest.value = JSON.stringify(guest);
        optGuest.innerText = "GUEST MODE";
        select.appendChild(optGuest);
    }
    loadIdentity();

    async function eksekusiHajar() {
        const btn = document.getElementById('btnPublish');
        const user = JSON.parse(document.getElementById('userSelect').value);
        const tj = document.getElementById('tujuan').value;
        const hg = document.getElementById('harga').value;

        if(!tj || !hg) return alert("Isi data dulu!");

        btn.disabled = true;
        btn.innerText = "MEMAKSA KIRIM...";

        try {
            // Kita bypass getDatabaseByShard yang mungkin bermasalah di role adventurer
            // Dengan cara memastikan shard_id selalu terkirim dengan benar
            const db = getDatabaseByShard(user.shard_id);
            
            if(!db) throw new Error("Database Shard tidak merespon!");

            const idMisi = "MS-" + Date.now();
            const category = document.getElementById('cat').value;
            
            // Path universal
            const path = `${category}-KUNINGAN-PUSAT-KUNINGAN/KEDUNGARUM/${idMisi}`;

            alert("Mencoba kirim ke: " + path);

            const data = {
                id: idMisi,
                requester: user.nick,
                role_asal: user.role, // Kita catat dia sbg apa saat kirim
                tujuan: tj,
                price: parseInt(hg),
                description: document.getElementById('desc').value || "-",
                status: "open",
                timestamp: Date.now()
            };

            // Gunakan metode Direct Set
            db.ref(path).set(data)
            .then(() => {
                alert("SUKSES! Misi Terbit.");
                sessionStorage.setItem('active_quest', idMisi);
                sessionStorage.setItem('active_quest_path', path);
                window.location.href = "lobby_requester.html";
            })
            .catch(e => {
                alert("FIREBASE ERROR: " + e.message);
                btn.disabled = false;
            });

        } catch (e) {
            alert("SISTEM ERROR: " + e.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
