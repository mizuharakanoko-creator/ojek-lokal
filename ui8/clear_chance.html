<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM | CLEAR CHANCE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .console { width: 90%; max-width: 500px; padding: 20px; border: 1px solid #ff0000; background: rgba(20, 0, 0, 0.9); box-shadow: 0 0 20px #ff000055; }
        .line { margin: 5px 0; font-size: 12px; white-space: nowrap; overflow: hidden; border-right: 2px solid #ff0000; animation: typing 2s steps(40, end), blink .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #ff0000 } }
        .status-ok { color: #00ff00; float: right; }
    </style>
</head>
<body>

<div class="console" id="logConsole">
    <div style="text-align:center; font-weight:bold; margin-bottom:15px;">--- TERMINAL DESTRUKSI ---</div>
    <div id="logs">
        <div class="line">Menginisialisasi protokol pembersihan...</div>
    </div>
</div>

<script>
    // 1. Ambil Data Sesi & Target
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const qId = sessionStorage.getItem('active_quest');
    const qPath = sessionStorage.getItem('active_quest_path');
    
    // Pastikan database terhubung ke shard yang benar
    const targetDb = getDatabaseByShard(session.shard_id);

    async function addLog(text, color = "#ff0000") {
        const logs = document.getElementById('logs');
        const div = document.createElement('div');
        div.className = "line";
        div.style.color = color;
        div.innerHTML = `${text} <span class="status-ok">[DONE]</span>`;
        logs.appendChild(div);
        await new Promise(r => setTimeout(r, 600)); // Delay efek dramatis
    }

    async function burnEverything() {
        if (!qId || !qPath) {
            await addLog("Data tidak ditemukan. Sistem sudah bersih.", "#00ff00");
            setTimeout(() => window.location.href = "dashboard_adventurer.html", 2000);
            return;
        }

        try {
            // A. Hapus Misi dari Radar Wilayah (Papan Utama)
            await targetDb.ref(qPath).remove();
            await addLog(`Menghapus Radar: ${qPath}`);

            // B. Hapus Terminal Bids (Hapus semua tawaran yang masuk)
            await targetDb.ref(`terminal_bids/${qId}`).remove();
            await addLog(`Membersihkan Terminal Bids: ${qId}`);

            // C. Hapus Kontrak Aktif (Hapus surat perjanjian)
            await targetDb.ref(`kontrak_aktif/${qId}`).remove();
            await addLog(`Menghancurkan Kontrak: ${qId}`);

            // D. Hapus Chat (Hapus riwayat pesan P2P)
            await targetDb.ref(`chats/${qId}`).remove();
            await addLog(`Wiping Chat History...`);

            // E. Bersihkan Undangan di Profil Adventurer (Jika masih nyangkut)
            // Kita coba bersihkan di shard manapun profil itu berada
            const shardKecil = session.shard_id.toLowerCase();
            await targetDb.ref(`adventurer-${shardKecil}/${session.nick}/undangan_aktif`).remove();
            await addLog(`Resetting Profile Status...`);

            // F. Clear Local Memory (HP User jadi murni lagi)
            sessionStorage.removeItem('active_quest');
            sessionStorage.removeItem('active_quest_path');
            await addLog("Sistem Storage Dibersihkan...", "#00ff00");

            await addLog("DESTRUKSI TOTAL BERHASIL.", "#00ff00");

            // Redirect ke halaman utama setelah selesai
            setTimeout(() => {
                // Jika dia adventurer balik ke radar, jika requester balik ke index/dashboard
                window.location.href = "index.html"; 
            }, 2500);

        } catch (e) {
            await addLog("ERROR: " + e.message);
            console.error(e);
        }
    }

    // Jalankan otomatis saat halaman dibuka
    burnEverything();
</script>

</body>
</html>
