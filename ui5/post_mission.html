<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REQUESTER TERMINAL</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// POST MISSION ///</h2>
        
        <div class="card">
            <div class="badge">NEW CONTRACT</div>
            <input type="text" id="title" placeholder="Nama Pekerjaan...">
            <input type="number" id="reward" placeholder="Reward (Stone)...">
            <button class="btn" onclick="postMission()">TERBITKAN MISI</button>
        </div>

        <h2 class="title" style="margin-top: 40px;">/// APPLICANT TRACKER ///</h2>
        <div id="applicantBox">
            <p style="text-align:center; color:#444;">Menunggu kontrak diterbitkan...</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        if(!user || user.role !== 'requester') window.location.href = 'index.html';

        function postMission() {
            const t = document.getElementById('title').value;
            const r = document.getElementById('reward').value;
            if(!t || !r) return alert("Lengkapi data misi!");

            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const newMsn = {
                id: "MSN-" + Date.now(),
                requesterId: user.id,
                requesterName: user.name,
                title: t,
                reward: r,
                applicants: [],
                status: "OPEN",
                acceptedAdv: null
            };
            missions.push(newMsn);
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Kontrak dipajang di Papan Guild!");
            document.getElementById('title').value = "";
            document.getElementById('reward').value = "";
            renderTracker();
        }

        function renderTracker() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const myMsn = missions.find(m => m.requesterId === user.id && m.status === "OPEN");
            const box = document.getElementById('applicantBox');

            if(!myMsn) {
                box.innerHTML = "<p style='text-align:center; color:#444;'>Tidak ada misi aktif.</p>";
                return;
            }

            let html = `<div class="card"><b>MISI: ${myMsn.title}</b><hr style="border:0; border-top:1px solid #333; margin:10px 0;">`;
            if(myMsn.applicants.length === 0) {
                html += "<p style='font-size:12px; color:var(--gold)'>[!] Menunggu pelamar merespon...</p>";
            } else {
                myMsn.applicants.forEach(app => {
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <span>${app.name}</span>
                            <button class="btn" style="width:auto; padding:5px 15px;" onclick="accept('${myMsn.id}', '${app.id}')">TERIMA</button>
                        </div>
                    `;
                });
            }
            box.innerHTML = html + "</div>";

            // AUTO REDIRECT jika status sudah berubah (Sinkronisasi dengan Adventurer)
            const acceptedMsn = missions.find(m => m.requesterId === user.id && m.status === "ACTIVE");
            if(acceptedMsn) {
                window.location.href = "briefing.html?id=" + acceptedMsn.id;
            }
        }

        function accept(msnId, advId) {
            let missions = JSON.parse(localStorage.getItem('global_missions'));
            let m = missions.find(x => x.id === msnId);
            m.status = "ACTIVE";
            m.acceptedAdv = advId;
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Adventurer Terpilih! Membuka Dokumen Briefing...");
            window.location.href = "briefing.html?id=" + msnId;
        }

        setInterval(renderTracker, 1500);
        renderTracker();
    </script>
</body>
</html>
