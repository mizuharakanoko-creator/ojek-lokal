<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD - POST MISSION</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// NEW CONTRACT ///</h2>
        
        <div class="card" id="limitNotice" style="display:none; border-color:var(--danger); color:var(--danger); font-size:11px; text-align:center;">
            [!] LIMIT TERCAPAI: SELESAIKAN MISI AKTIF ANDA TERLEBIH DAHULU.
        </div>

        <div class="card">
            <label>JUDUL KONTRAK</label>
            <input type="text" id="mTitle" placeholder="Contoh: Pengawalan ke Hutan Terlarang...">
            
            <label>REWARD (STONE)</label>
            <input type="number" id="mReward" placeholder="Jumlah imbalan...">
            
            <label>DESKRIPSI SINGKAT</label>
            <textarea id="mDesc" style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:10px; font-family:monospace;" rows="3" placeholder="Detail tugas..."></textarea>
            
            <button class="btn" id="btnPost" style="margin-top:15px;" onclick="publishMission()">TERBITKAN KONTRAK</button>
        </div>

        <button class="btn" style="border-color:var(--gold); color:var(--gold);" onclick="location.href='my_mission_list.html'">LIHAT TRACKER PELAMAR</button>
        <button class="btn" style="margin-top:10px; border-color:#333; color:#555;" onclick="location.href='profile.html'">KEMBALI KE PROFIL</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        if(!user || user.role !== 'requester') window.location.href = 'index.html';

        function checkPostLimit() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const myActive = missions.filter(m => m.requesterId === user.id && m.status !== "COMPLETED");

            if(user.tier === 'standard' && myActive.length >= 1) {
                document.getElementById('btnPost').disabled = true;
                document.getElementById('limitNotice').style.display = 'block';
            }
        }

        function publishMission() {
            const title = document.getElementById('mTitle').value;
            const reward = document.getElementById('mReward').value;
            const desc = document.getElementById('mDesc').value;

            if(!title || !reward) return alert("Data misi tidak lengkap!");

            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const newMission = {
                id: "MSN-" + Date.now(),
                requesterId: user.id,
                requesterName: user.name,
                shard: user.shard, // Misi otomatis masuk ke wilayah si pembuat
                title: title,
                reward: reward,
                desc: desc,
                status: "OPEN",
                applicants: [],
                acceptedAdv: null,
                createdAt: new Date().toLocaleString()
            };

            missions.push(newMission);
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Misi telah dipajang di Papan Guild " + user.shard);
            window.location.href = 'my_mission_list.html';
        }

        checkPostLimit();
    </script>
</body>
</html>
