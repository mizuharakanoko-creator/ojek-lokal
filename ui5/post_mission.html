<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE CONTRACT</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// NEW CONTRACT ///</h2>
        
        <div class="card" id="tierInfo" style="border-color: var(--gold); font-size: 11px; text-align: center; color: var(--gold);">
            </div>

        <div class="card">
            <label>JUDUL MISI</label>
            <input type="text" id="title" placeholder="Contoh: Antar Paket Cepat...">
            
            <label>REWARD (STONE)</label>
            <input type="number" id="reward" placeholder="Jumlah imbalan...">
            
            <button class="btn" id="btnPost" onclick="postMission()">TERBITKAN KONTRAK</button>
        </div>

        <button class="btn" style="border-color: var(--gold); color: var(--gold); margin-bottom: 10px;" 
                onclick="location.href='my_mission_list.html'">
            🔍 LIHAT PELAMAR (TRACKER)
        </button>
        
        <button class="btn" style="border-color: #555; color: #888;" 
                onclick="location.href='active_mission.html'">
            ⚔️ MISI SEDANG BERJALAN
        </button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        
        // Simulasi Sistem Tier (Bisa diubah manual di console untuk tes)
        // Default: 'standard', Ubah ke 'premium' untuk unlimited
        if(!user.tier) user.tier = 'standard'; 

        function checkLimit() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const myActiveMissions = missions.filter(m => m.requesterId === user.id && m.status !== "COMPLETED");
            
            const info = document.getElementById('tierInfo');
            const btn = document.getElementById('btnPost');

            if(user.tier === 'standard') {
                const remaining = 1 - myActiveMissions.length;
                info.innerText = `TIER: STANDARD (Limit: ${myActiveMissions.length}/1 Misi Aktif)`;
                if(remaining <= 0) {
                    btn.disabled = true;
                    btn.innerText = "LIMIT TIER TERCAPAI";
                }
            } else {
                info.innerText = `TIER: PREMIUM (UNLIMITED POST)`;
                info.style.borderColor = "var(--neon)";
                info.style.color = "var(--neon)";
            }
        }

        function postMission() {
            const t = document.getElementById('title').value;
            const r = document.getElementById('reward').value;
            if(!t || !r) return alert("Data kontrak tidak lengkap!");

            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            
            const newMsn = {
                id: "MSN-" + Date.now(),
                requesterId: user.id,
                requesterName: user.name,
                title: t,
                reward: r,
                applicants: [],
                status: "OPEN",
                acceptedAdv: null
            };

            missions.push(newMsn);
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Kontrak Berhasil Dipajang!");
            window.location.href = 'my_mission_list.html';
        }

        checkLimit();
    </script>
</body>
</html>
