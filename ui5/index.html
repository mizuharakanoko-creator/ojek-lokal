<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD REGISTRY</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// GUILD REGISTRY ///</h2>
        <div class="card">
            <label style="font-size: 12px; color: var(--neon);">ASSIGNED ID:</label>
            <div id="displayId" style="font-size: 20px; font-weight: bold; margin-bottom: 15px;"></div>
            
            <label>NAMA IDENTITAS:</label>
            <input type="text" id="username" placeholder="Masukkan nama...">
            
            <label>PERAN DALAM GUILD:</label>
            <select id="role">
                <option value="requester">PEMBERI MISI (Requester)</option>
                <option value="adventurer">PELAKSANA (Adventurer)</option>
            </select>
            
            <button class="btn" onclick="register()">MASUK KE TERMINAL</button>
        </div>
    </div>

    <script>
        const randomId = "ID-" + Math.floor(Math.random() * 9999);
        document.getElementById('displayId').innerText = randomId;

        function register() {
            const name = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            if(!name) return alert("Identitas wajib diisi!");

            const userData = { id: randomId, name: name, role: role };
            localStorage.setItem('guild_session', JSON.stringify(userData));
            
            if(role === 'requester') window.location.href = 'post_mission.html';
            else window.location.href = 'board.html';
        }
    </script>
</body>
</html>
