<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD REGISTRY - GATEWAY</title>
    <link rel="stylesheet" href="guild_style.css">
    <style>
        .tier-select, .shard-select { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .opt { flex: 1; padding: 10px; border: 1px solid #333; text-align: center; font-size: 11px; cursor: pointer; background: #000; color: #666; }
        .opt.active { border-color: var(--neon); color: var(--neon); background: rgba(0,217,255,0.1); }
        .desc { font-size: 10px; color: #444; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">/// GUILD REGISTRY ///</h2>
        <div class="card">
            <label>NAMA IDENTITAS</label>
            <input type="text" id="username" placeholder="Nama Adventurer/Requester...">

            <label>PERAN (ROLE)</label>
            <select id="role">
                <option value="requester">PEMBERI MISI (Requester)</option>
                <option value="adventurer">PELAKSANA (Adventurer)</option>
            </select>

            <label>WILAYAH OPERASI (SHARD)</label>
            <div class="shard-select">
                <div class="opt active" onclick="setShard(this, 'Jakarta')">JAKARTA</div>
                <div class="opt" onclick="setShard(this, 'Bandung')">BANDUNG</div>
                <div class="opt" onclick="setShard(this, 'Surabaya')">SURABAYA</div>
            </div>

            <label>MEMBERSHIP TIER</label>
            <div class="tier-select">
                <div class="opt active" onclick="setTier(this, 'standard')"><b>STANDARD</b><br>1 Active Post</div>
                <div class="opt" onclick="setTier(this, 'premium')"><b style="color:var(--gold)">PREMIUM</b><br>Unlimited Post</div>
            </div>

            <button class="btn" style="margin-top:20px;" onclick="joinGuild()">INISIALISASI DATA</button>
        </div>
    </div>

    <script>
        let selectedShard = 'Jakarta';
        let selectedTier = 'standard';

        function setShard(el, val) {
            document.querySelectorAll('.shard-select .opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            selectedShard = val;
        }

        function setTier(el, val) {
            document.querySelectorAll('.tier-select .opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            selectedTier = val;
        }

        function joinGuild() {
            const name = document.getElementById('username').value;
            if(!name) return alert("Identitas wajib diisi!");

            const userData = {
                id: "USR-" + Math.floor(Math.random() * 99999),
                name: name,
                role: document.getElementById('role').value,
                shard: selectedShard,
                tier: selectedTier,
                rating: 5.0, // Initial Rating
                successRate: 100, // Initial Success Rate
                completedMissions: 0,
                joinedAt: new Date().toLocaleDateString()
            };

            localStorage.setItem('guild_session', JSON.stringify(userData));
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
