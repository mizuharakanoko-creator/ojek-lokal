<link rel="stylesheet" href="guild_style.css">
<div class="container">
    <h2 class="title">Guild Registry</h2>
    <div class="card">
        <label>IDENTITY ID</label>
        <div id="genId" style="color:var(--neon); font-weight:bold; margin-bottom:10px;"></div>
        <input type="text" id="uname" placeholder="Nama Adventurer/Requester">
        <select id="urole">
            <option value="requester">PEMBERI MISI (Requester)</option>
            <option value="adventurer">PELAKSANA (Adventurer)</option>
        </select>
        <button class="btn" onclick="join()">MASUK KE SISTEM</button>
    </div>
</div>

<script>
    const id = "ID-" + Math.floor(Math.random() * 9999);
    document.getElementById('genId').innerText = id;
    function join() {
        const name = document.getElementById('uname').value;
        if(!name) return alert("Identitas belum diisi!");
        localStorage.setItem('guild_session', JSON.stringify({id, name, role: document.getElementById('urole').value}));
        window.location.href = (document.getElementById('urole').value === 'requester') ? 'post_mission.html' : 'board.html';
    }
</script>
