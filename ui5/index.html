<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD REGISTRY | TIER SYSTEM</title>
    <link rel="stylesheet" href="guild_style.css">
    <style>
        .tier-select {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .tier-option {
            flex: 1;
            padding: 10px;
            border: 1px solid #333;
            text-align: center;
            font-size: 10px;
            cursor: pointer;
            background: #000;
        }
        .tier-option.active {
            border-color: var(--neon);
            color: var(--neon);
            background: rgba(0,217,255,0.1);
        }
        .info-text { font-size: 10px; color: #555; margin-top: 5px; line-height: 1.3; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">/// GUILD REGISTRY ///</h2>
        <div class="card">
            <label style="font-size: 10px; color: var(--neon);">SYSTEM ASSIGNED ID:</label>
            <div id="displayId" style="font-size: 18px; font-weight: bold; margin-bottom: 15px; letter-spacing: 2px;"></div>
            
            <label>NAMA IDENTITAS:</label>
            <input type="text" id="username" placeholder="Masukkan nama...">
            
            <label>PERAN GUILD:</label>
            <select id="role">
                <option value="requester">REQUESTER (Pemberi Misi)</option>
                <option value="adventurer">ADVENTURER (Pelaksana)</option>
            </select>

            <label>MEMBERSHIP TIER:</label>
            <div class="tier-select">
                <div class="tier-option active" id="tierStandard" onclick="setTier('standard')">
                    <b>STANDARD</b><br>Limit: 1 Post
                </div>
                <div class="tier-option" id="tierPremium" onclick="setTier('premium')">
                    <b style="color:var(--gold)">PREMIUM</b><br>Unlimited Post
                </div>
            </div>
            <p id="tierInfo" class="info-text">* Akun Standard hanya diperbolehkan memiliki 1 misi aktif dalam satu waktu.</p>
            
            <button class="btn" style="margin-top: 20px;" onclick="register()">INISIALISASI TERMINAL</button>
        </div>
    </div>

    <script>
        // Generate ID Random
        const randomId = "USR-" + Math.floor(Math.random() * 9999);
        document.getElementById('displayId').innerText = randomId;

        // Default Tier
        let selectedTier = 'standard';

        function setTier(tier) {
            selectedTier = tier;
            document.getElementById('tierStandard').classList.remove('active');
            document.getElementById('tierPremium').classList.remove('active');
            
            if(tier === 'standard') {
                document.getElementById('tierStandard').classList.add('active');
                document.getElementById('tierInfo').innerText = "* Akun Standard hanya diperbolehkan memiliki 1 misi aktif dalam satu waktu.";
            } else {
                document.getElementById('tierPremium').classList.add('active');
                document.getElementById('tierInfo').innerText = "* Akun Premium mendapatkan akses tanpa batas untuk memposting misi (Guild VIP).";
            }
        }

        function register() {
            const name = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            
            if(!name) return alert("Identitas tidak boleh kosong!");

            // Simpan sesi user lengkap dengan Tier-nya
            const userData = { 
                id: randomId, 
                name: name, 
                role: role,
                tier: selectedTier 
            };
            
            localStorage.setItem('guild_session', JSON.stringify(userData));
            
            // Arahkan ke halaman awal masing-masing role
            if(role === 'requester') {
                window.location.href = 'post_mission.html';
            } else {
                window.location.href = 'board.html';
            }
        }
    </script>
</body>
</html>
