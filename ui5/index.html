<!DOCTYPE html>
<html>
<head>
    <title>GUILD REGISTRY</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 20px; max-width: 300px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="box">
        <h3>GUILD REGISTRY</h3>
        <p>Generated ID: <span id="displayId">...</span></p>
        <input type="text" id="username" placeholder="Masukkan Nama Anda">
        <select id="role">
            <option value="requester">REQUESTER (Pemberi Misi)</option>
            <option value="adventurer">ADVENTURER (Pelaksana)</option>
        </select>
        <button onclick="register()">MASUK GUILD</button>
    </div>

    <script>
        const randomId = "USR-" + Math.floor(Math.random() * 10000);
        document.getElementById('displayId').innerText = randomId;

        function register() {
            const name = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            if(!name) return alert("Isi nama!");

            const userData = { id: randomId, name: name, role: role };
            localStorage.setItem('guild_session', JSON.stringify(userData));
            
            // Redirect sesuai role
            if(role === 'requester') window.location.href = 'post_mission.html';
            else window.location.href = 'board.html';
        }
    </script>
</body>
</html>
