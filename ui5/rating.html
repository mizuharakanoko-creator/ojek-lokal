<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD - MISSION RATING</title>
    <link rel="stylesheet" href="guild_style.css">
    <style>
        .star-rating { display: flex; justify-content: center; gap: 15px; margin: 20px 0; font-size: 30px; }
        .star { cursor: pointer; color: #222; transition: 0.3s; }
        .star.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">/// MISSION CLEAR ///</h2>
        <div class="card" style="text-align:center;">
            <p style="font-size:12px; color:#555;">BERIKAN PENILAIAN UNTUK ADVENTURER:</p>
            <h2 id="advName" style="color:var(--neon); margin:10px 0;">...</h2>
            
            <div class="star-rating" id="starBox">
                <span class="star" onclick="setRating(1)">★</span>
                <span class="star" onclick="setRating(2)">★</span>
                <span class="star" onclick="setRating(3)">★</span>
                <span class="star" onclick="setRating(4)">★</span>
                <span class="star" onclick="setRating(5)">★</span>
            </div>
            <p id="ratingText" style="font-size:12px; color:var(--gold);">Pilih Bintang</p>
            
            <button class="btn" style="margin-top:20px;" onclick="submitRating()">SIMPAN REPUTASI</button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');
        let currentRating = 0;
        let targetAdvId = "";

        function loadRatingData() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const m = missions.find(x => x.id === questId);
            if(!m) return window.location.href = 'profile.html';

            // Ambil nama pelaksana dari list pelamar atau acceptedAdv
            targetAdvId = m.acceptedAdv;
            document.getElementById('advName').innerText = "ADVENTURER ID: " + targetAdvId;
        }

        function setRating(n) {
            currentRating = n;
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
            const texts = ["", "Buruk", "Kurang", "Cukup", "Bagus", "Sempurna!"];
            document.getElementById('ratingText').innerText = texts[n];
        }

        function submitRating() {
            if(currentRating === 0) return alert("Berikan rating terlebih dahulu!");

            // LOGIKA UPDATE REPUTASI GLOBAL (Simulasi)
            // Dalam database nyata, kita akan mengupdate field rating di profile targetAdvId
            alert("Rating " + currentRating + " telah dicatat dalam sejarah Guild.");
            
            // JALANKAN PROTOKOL CLEARANCE SEBELUM PULANG
            runClearance();
        }

        function runClearance() {
            // Menghapus chat misi ini agar tidak menumpuk di storage
            localStorage.removeItem('chats_' + questId);
            
            // Tandai misi sebagai ARSIP (agar tidak muncul di Board/Tracker lagi)
            let missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            let m = missions.find(x => x.id === questId);
            if(m) m.status = "ARCHIVED"; 
            localStorage.setItem('global_missions', JSON.stringify(missions));

            window.location.href = 'profile.html';
        }

        loadRatingData();
    </script>
</body>
</html>
