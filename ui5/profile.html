<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD PROFILE</title>
    <link rel="stylesheet" href="guild_style.css">
    <style>
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: #000; border: 1px solid #222; padding: 10px; text-align: center; }
        .stat-val { display: block; font-size: 18px; color: var(--gold); font-weight: bold; }
        .stat-lab { font-size: 10px; color: #555; text-transform: uppercase; }
        .history-item { font-size: 12px; padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">/// USER DOSSIER ///</h2>
        
        <div class="card">
            <div class="badge" id="uTier" style="margin-bottom:10px;">-</div>
            <h2 id="uName" style="margin:0; color:var(--neon);">...</h2>
            <p id="uId" style="font-size:10px; color:#444; margin:5px 0;"></p>
            <p id="uShard" style="font-size:12px; color:var(--gold);"></p>

            <div class="stat-grid">
                <div class="stat-box">
                    <span class="stat-val" id="uRating">0.0</span>
                    <span class="stat-lab">Trust Rating</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="uSuccess">0%</span>
                    <span class="stat-lab">Success Rate</span>
                </div>
            </div>
        </div>

        <h3 class="title" style="font-size:14px;">MISSION HISTORY</h3>
        <div class="card" id="historyList">
            <p style="text-align:center; color:#333;">Belum ada rekam jejak misi.</p>
        </div>

        <button class="btn" onclick="startActivity()" id="btnAction">MASUK KE TERMINAL</button>
        <button class="btn" style="margin-top:10px; border-color:var(--danger); color:var(--danger);" onclick="logout()">LOGOUT</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        if(!user) window.location.href = 'index.html';

        function loadProfile() {
            document.getElementById('uName').innerText = user.name;
            document.getElementById('uId').innerText = "SYSTEM_ID: " + user.id;
            document.getElementById('uShard').innerText = "OPERATIONAL AREA: " + user.shard;
            document.getElementById('uTier').innerText = user.tier.toUpperCase() + " MEMBER";
            document.getElementById('uRating').innerText = user.rating.toFixed(1);
            document.getElementById('uSuccess').innerText = user.successRate + "%";
            document.getElementById('uTier').style.background = user.tier === 'premium' ? 'var(--gold)' : 'var(--neon)';

            document.getElementById('btnAction').innerText = user.role === 'requester' ? "POST A MISSION" : "VIEW MISSION BOARD";
        }

        function startActivity() {
            window.location.href = (user.role === 'requester') ? 'post_mission.html' : 'board.html';
        }

        function logout() {
            localStorage.removeItem('guild_session');
            window.location.href = 'index.html';
        }

        loadProfile();
    </script>
</body>
</html>
