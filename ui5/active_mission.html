<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD - ACTIVE MISSION</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <div class="card" style="text-align:center; border-color:var(--neon);">
            <span style="color:var(--neon); font-size:10px; letter-spacing:2px;">• MISSION ACTIVE •</span>
            <h3 id="mTitle" style="margin:5px 0;">...</h3>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
            <div id="chatBox" style="height:250px; overflow-y:auto; padding:15px; background:#050505; font-size:13px;">
                </div>
            <div style="display:flex; border-top:1px solid #222;">
                <input type="text" id="chatInput" placeholder="Ketik pesan koordinasi..." style="border:0; margin:0; flex:1;">
                <button class="btn" style="width:70px; margin:0; border-radius:0;" onclick="sendChat()">KIRIM</button>
            </div>
        </div>

        <div id="controlArea" style="margin-top:20px;">
            </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');

        
        function updateMission() {
    const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
    const m = missions.find(x => x.id === questId);
    if(!m) return;

    const area = document.getElementById('controlArea');

    // LOGIKA SINKRONISASI STATUS
    if(m.status === "ON_PROGRESS") {
        if(user.role === 'adventurer') {
            area.innerHTML = `<button class="btn" onclick="changeStatus('WAITING_CONFIRM')">LAPORKAN SELESAI</button>`;
        } else {
            area.innerHTML = `<p style="text-align:center; color:#555;">Adventurer sedang bekerja...</p>`;
        }
    } 
    else if(m.status === "WAITING_CONFIRM") {
        if(user.role === 'requester') {
            area.innerHTML = `
                <p style="text-align:center; color:var(--gold);">Adventurer melapor selesai. Konfirmasi?</p>
                <button class="btn" onclick="changeStatus('COMPLETED')">TERIMA & BAYAR</button>
            `;
        } else {
            area.innerHTML = `<p style="text-align:center; color:var(--neon);">Menunggu konfirmasi Requester...</p>`;
        }
    }
    else if(m.status === "COMPLETED") {
        // Jika sudah selesai, kedua pihak pindah ke halaman Rating
        window.location.href = "rating.html?id=" + questId;
    }

    renderChat(); // Update chat secara real-time
}

function changeStatus(newStatus) {
    let missions = JSON.parse(localStorage.getItem('global_missions'));
    let m = missions.find(x => x.id === questId);
    m.status = newStatus;
    localStorage.setItem('global_missions', JSON.stringify(missions));
}

// JALANKAN SETIAP 1 DETIK
setInterval(updateMission, 1000);


        function finishMission() {
            setStatus('COMPLETED');
            alert("Misi Selesai! Silakan berikan penilaian.");
        }

        // --- CHAT LOGIC ---
        function sendChat() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;

            let chats = JSON.parse(localStorage.getItem('chats_' + questId) || '[]');
            chats.push({ sender: user.name, text: input.value, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            localStorage.setItem('chats_' + questId, JSON.stringify(chats));
            input.value = "";
            renderChat();
        }

        function renderChat() {
            const box = document.getElementById('chatBox');
            const chats = JSON.parse(localStorage.getItem('chats_' + questId) || '[]');
            box.innerHTML = chats.map(c => `
                <div style="margin-bottom:10px;">
                    <small style="color:${c.sender === user.name ? 'var(--neon)' : 'var(--gold)'}; font-weight:bold;">${c.sender}</small>
                    <div style="background:${c.sender === user.name ? '#111' : '#1a1a00'}; padding:8px; border-radius:5px; margin-top:2px;">
                        ${c.text} <small style="float:right; color:#444; font-size:9px; margin-top:5px;">${c.time}</small>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        setInterval(updateMission, 2000);
        updateMission();
    </script>
</body>
</html>
