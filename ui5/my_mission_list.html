<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD - TRACKER</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// MISSION TRACKER ///</h2>
        <div id="activeMissions"></div>

        <h2 class="title" style="margin-top:30px; font-size:14px;">RADAR: NEARBY ADVENTURERS</h2>
        <div class="card" id="radarList" style="border-style:dashed;">
            <p style="text-align:center; color:#444; font-size:11px;">Mencari sinyal di wilayah ${user.shard}...</p>
        </div>

        <button class="btn" onclick="location.href='post_mission.html'">BUAT MISI BARU</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));

        function renderTracker() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const myMissions = missions.filter(m => m.requesterId === user.id && m.status === "OPEN");
            const container = document.getElementById('activeMissions');

            if(myMissions.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#444;'>Tidak ada misi aktif.</p>";
                return;
            }

            container.innerHTML = myMissions.map(m => `
                <div class="card">
                    <div class="badge">${m.id}</div>
                    <h3 style="margin:5px 0;">${m.title}</h3>
                    <p style="font-size:11px; color:var(--gold);">PELAMAR (${m.applicants.length}):</p>
                    ${m.applicants.length === 0 ? '<small style="color:#444;">Menunggu respon...</small>' : 
                        m.applicants.map(app => `
                            <div style="display:flex; justify-content:space-between; align-items:center; background:#000; padding:8px; margin-top:5px; border-left:2px solid var(--neon);">
                                <span style="font-size:12px;">${app.name} <br><small style="color:var(--gold);">⭐ ${app.rating || '5.0'}</small></span>
                                <button class="btn" style="width:auto; padding:5px 12px; font-size:10px;" onclick="accept('${m.id}', '${app.id}')">TERIMA</button>
                            </div>
                        `).join('')
                    }
                </div>
            `).join('');
        }

        function renderRadar() {
            const locations = JSON.parse(localStorage.getItem('active_locations') || '{}');
            const radarBox = document.getElementById('radarList');
            
            // Filter: Hanya yang satu Shard, sedang Online, dan bukan diri sendiri
            const nearby = Object.values(locations).filter(adv => 
                adv.shard === user.shard && 
                adv.id !== user.id && 
                (Date.now() - adv.lastSeen < 30000)
            );

            if(nearby.length === 0) {
                radarBox.innerHTML = `<p style="text-align:center; color:#444; font-size:11px;">Tidak ada Adventurer aktif di ${user.shard}.</p>`;
                return;
            }

            radarBox.innerHTML = nearby.map(adv => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
                    <span style="font-size:12px;">📍 ${adv.name} <br><small style="color:var(--neon);">Seksama: ${adv.successRate}% | ⭐ ${adv.rating}</small></span>
                    <button class="btn" style="width:auto; padding:5px 10px; font-size:10px;" onclick="invite('${adv.id}')">UNDANG</button>
                </div>
            `).join('');
        }

        function accept(msnId, advId) {
            let missions = JSON.parse(localStorage.getItem('global_missions'));
            let m = missions.find(x => x.id === msnId);
            m.status = "ACTIVE";
            m.acceptedAdv = advId;
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Kontrak disetujui! Membuka Dokumen Briefing...");
            window.location.href = "briefing.html?id=" + msnId;
        }

        function invite(advId) {
            let invites = JSON.parse(localStorage.getItem('global_invites') || '[]');
            invites.push({ from: user.name, fromId: user.id, toId: advId, status: "PENDING", time: Date.now() });
            localStorage.setItem('global_invites', JSON.stringify(invites));
            alert("Undangan dikirim!");
        }

        setInterval(() => { renderTracker(); renderRadar(); }, 2000);
        renderTracker(); renderRadar();
    </script>
</body>
</html>
