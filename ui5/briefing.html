<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD - BRIEFING ROOM</title>
    <link rel="stylesheet" href="guild_style.css">
    <style>
        .doc-paper { background: #111; border: 1px dashed #444; padding: 20px; font-family: 'Courier New', Courier, monospace; line-height: 1.6; position: relative; }
        .seal { position: absolute; bottom: 20px; right: 20px; border: 2px double var(--gold); color: var(--gold); padding: 5px; transform: rotate(-15deg); opacity: 0.5; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">/// CONTRACT BRIEFING ///</h2>
        
        <div class="doc-paper">
            <h3 id="mTitle" style="color:var(--gold); margin-top:0;">...</h3>
            <p style="font-size:12px;">CONTRACT ID: <span id="mId">-</span></p>
            <hr style="border:0; border-top:1px solid #333;">
            <p style="font-size:13px;" id="mDesc">Memuat instruksi...</p>
            <p style="font-size:14px; color:var(--neon);">REWARD: <span id="mReward">0</span> STONE</p>
            
            <div id="statusInfo" style="margin-top:20px; font-size:11px; color:#555;">
                STATUS: MENUNGGU TANDA TANGAN ADVENTURER...
            </div>
            <div class="seal" id="sealDone">SIGNED</div>
        </div>

        <div id="actionArea" style="margin-top:20px;">
            </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('guild_session'));
        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');

        function updateBriefing() {
    const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
    const m = missions.find(x => x.id === questId);

    if(!m) return;

    // Tampilkan data misi
    document.getElementById('mTitle').innerText = m.title;
    document.getElementById('mId').innerText = m.id;
    document.getElementById('mReward').innerText = m.reward;

    // LOGIKA SINKRONISASI: 
    // Jika status sudah berubah jadi "ON_PROGRESS", 
    // kedua belah pihak (Requester & Adventurer) harus pindah ke Active Mission
    if(m.status === "ON_PROGRESS") {
        window.location.href = "active_mission.html?id=" + questId;
        return; 
    }

    // Tampilan Tombol sesuai Role
    const area = document.getElementById('actionArea');
    if(user.role === 'adventurer') {
        area.innerHTML = `<button class="btn" onclick="signContract()">TANDA TANGANI KONTRAK</button>`;
    } else {
        area.innerHTML = `<div class="card" style="border-color:#333; color:#555; text-align:center;">
                            MENUNGGU ADVENTURER MEMULAI...
                          </div>`;
    }
}

// JALANKAN SETIAP 1 DETIK (Ini kuncinya agar sinkron)
setInterval(updateBriefing, 1000);
updateBriefing();

function signContract() {
    let missions = JSON.parse(localStorage.getItem('global_missions'));
    let m = missions.find(x => x.id === questId);
    
    m.status = "ON_PROGRESS"; // Merubah status di "Buku Besar"
    localStorage.setItem('global_missions', JSON.stringify(missions));

            document.getElementById('sealDone').style.display = 'block';
            alert("Kontrak Ditandatangani! Portal Komunikasi Dibuka.");
            window.location.href = "active_mission.html?id=" + questId;
        }

        setInterval(updateBriefing, 2000);
        updateBriefing();
    </script>
</body>
</html>
