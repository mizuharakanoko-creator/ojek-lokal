<!DOCTYPE html>
<html>
<head>
    <title>MISSION BRIEFING</title>
    <style>
        body { background: #000; color: #00d9ff; font-family: monospace; padding: 20px; text-align: center; }
        .contract-box { border: 2px double #00d9ff; padding: 20px; display: inline-block; text-align: left; max-width: 400px; }
        .stamp { color: #ff0044; font-weight: bold; border: 2px solid #ff0044; padding: 5px; transform: rotate(-10deg); display: inline-block; margin-top: 20px; }
        button { background: #00d9ff; color: #000; border: none; padding: 15px; width: 100%; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="contract-box">
        <h3>[ KONTRAK KERJA GUILD ]</h3>
        <hr border="1" color="#00d9ff">
        <p>ID MISI: <span id="mId">...</span></p>
        <p>JUDUL: <span id="mTitle">...</span></p>
        <p>REQUESTER: <span id="mReq">...</span></p>
        <p>ADVENTURER: <span id="mAdv">...</span></p>
        <p>REWARD: <b id="mPrice">0</b> STONE</p>
        
        <div id="briefingText" style="font-size: 10px; color: #555;">
            * Dengan menekan tombol di bawah, Anda setuju untuk mematuhi SOP Guild. 
            Pelanggaran akan mengakibatkan pengurangan Trust Rating.
        </div>

        <div class="stamp">OFFICIAL GUILD DOCUMENT</div>
        
        <button onclick="startBattlefield()">[ TANDA TANGANI & MULAI ]</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');

        function loadContract() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            const m = missions.find(x => x.id === questId);

            if(m) {
                document.getElementById('mId').innerText = m.id;
                document.getElementById('mTitle').innerText = m.title;
                document.getElementById('mReq').innerText = m.requesterId;
                document.getElementById('mAdv').innerText = m.acceptedAdventurer;
                document.getElementById('mPrice').innerText = m.reward;
            }
        }

        function startBattlefield() {
            alert("Sinyal Terhubung. Membuka Jalur Komunikasi...");
            window.location.href = "active_mission.html?id=" + questId;
        }

        loadContract();
    </script>
</body>
</html>
