<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD MISSION BOARD</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// MISSION BOARD ///</h2>
        <div id="boardBox"></div>
    </div>

    <script>

        // Simulasi Koordinat (Bisa diganti navigator.geolocation nanti)
const myLat = -6.2000 + (Math.random() * 0.01); 
const myLng = 106.8166 + (Math.random() * 0.01);

function updateMyLocation() {
    let locals = JSON.parse(localStorage.getItem('active_locations') || '{}');
    locals[user.id] = {
        id: user.id,
        name: user.name,
        lat: myLat,
        lng: myLng,
        lastSeen: Date.now()
    };
    localStorage.setItem('active_locations', JSON.stringify(locals));
}
setInterval(updateMyLocation, 5000); // Lapor lokasi tiap 5 detik


        
        const user = JSON.parse(localStorage.getItem('guild_session'));
        if(!user || user.role !== 'adventurer') window.location.href = 'index.html';

        function renderBoard() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            
            // 1. CEK NOTIFIKASI TERPILIH (Auto-Teleport)
            const chosen = missions.find(m => m.acceptedAdv === user.id && m.status === "ACTIVE");
            if(chosen) {
                alert("!!! PERINGATAN: KONTRAK ANDA DISETUJUI !!!");
                window.location.href = "briefing.html?id=" + chosen.id;
                return;
            }

            // 2. TAMPILKAN DAFTAR MISI
            const openMissions = missions.filter(m => m.status === "OPEN");
            const box = document.getElementById('boardBox');

            if(openMissions.length === 0) {
                box.innerHTML = "<p style='text-align:center; color:#444;'>Papan misi kosong...</p>";
                return;
            }

            let html = "";
            openMissions.forEach(m => {
                const isApplied = m.applicants.some(a => a.id === user.id);
                html += `
                    <div class="card">
                        <div class="badge">REWARD: ${m.reward} STONE</div>
                        <h3 style="margin:5px 0; color:var(--neon);">${m.title}</h3>
                        <p style="font-size:11px; color:#666;">Requester: ${m.requesterName}</p>
                        <button class="btn" onclick="apply('${m.id}')" ${isApplied ? 'disabled' : ''}>
                            ${isApplied ? 'MENUNGGU KONFIRMASI' : 'AMBIL KONTRAK'}
                        </button>
                    </div>
                `;
            });
            box.innerHTML = html;
        }

        function apply(msnId) {
            let missions = JSON.parse(localStorage.getItem('global_missions'));
            let m = missions.find(x => x.id === msnId);
            m.applicants.push({ id: user.id, name: user.name });
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Lamaran dikirim ke Requester!");
            renderBoard();
        }

        function checkInvites() {
    let invites = JSON.parse(localStorage.getItem('global_invites') || '[]');
    // Cari undangan untuk saya yang belum dijawab
    const myInvite = invites.find(inv => inv.toId === user.id && inv.status === "PENDING");

    if(myInvite) {
        if(confirm(`[UNDANGAN GUILD]\n\n${myInvite.from} mengundang Anda.\nTerima tawaran ini?`)) {
            // Logika jika diterima: Arahkan ke Post Mission milik si pengundang
            myInvite.status = "ACCEPTED";
            localStorage.setItem('global_invites', JSON.stringify(invites));
            alert("Menuju lokasi Requester...");
        } else {
            myInvite.status = "REJECTED";
            localStorage.setItem('global_invites', JSON.stringify(invites));
        }
    }
}
setInterval(checkInvites, 4000);


        // --- LOGIKA HEARTBEAT ---
function updateHeartbeat() {
    let locations = JSON.parse(localStorage.getItem('active_locations') || '{}');
    
    // Kirim sinyal aktif saya
    locations[user.id] = {
        id: user.id,
        name: user.name,
        lat: -6.2, // Koordinat simulasi
        lng: 106.8,
        lastSeen: Date.now() 
    };

    // Bersihkan User Hantu (yang tidak lapor lebih dari 30 detik)
    const now = Date.now();
    for (let id in locations) {
        if (now - locations[id].lastSeen > 30000) {
            delete locations[id];
        }
    }
    localStorage.setItem('active_locations', JSON.stringify(locations));
}

// --- LOGIKA LIMIT SATU MISI ---
function checkMissionLimit() {
    const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
    // Cari apakah saya punya misi yang statusnya sedang berjalan (bukan OPEN atau COMPLETED)
    const imBusy = missions.find(m => 
        m.acceptedAdv === user.id && 
        (m.status === "ACTIVE" || m.status === "ON_PROGRESS" || m.status === "WAITING_CONFIRM")
    );

    const btnAmbil = document.querySelectorAll('.btn-ambil'); // Asumsi tombol ambil punya class ini
    if (imBusy) {
        btnAmbil.forEach(b => {
            b.disabled = true;
            b.innerText = "ANDA SEDANG DALAM MISI";
        });
    }
}

setInterval(() => {
    updateHeartbeat();
    checkMissionLimit();
}, 2000);



        setInterval(renderBoard, 1500);
        renderBoard();
    </script>
</body>
</html>
