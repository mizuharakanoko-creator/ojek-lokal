<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUILD MISSION BOARD</title>
    <link rel="stylesheet" href="guild_style.css">
</head>
<body>
    <div class="container">
        <h2 class="title">/// MISSION BOARD ///</h2>
        <div id="boardBox"></div>
    </div>

    <script>

        // Simulasi Koordinat (Bisa diganti navigator.geolocation nanti)
const myLat = -6.2000 + (Math.random() * 0.01); 
const myLng = 106.8166 + (Math.random() * 0.01);

function updateMyLocation() {
    let locals = JSON.parse(localStorage.getItem('active_locations') || '{}');
    locals[user.id] = {
        id: user.id,
        name: user.name,
        lat: myLat,
        lng: myLng,
        lastSeen: Date.now()
    };
    localStorage.setItem('active_locations', JSON.stringify(locals));
}
setInterval(updateMyLocation, 5000); // Lapor lokasi tiap 5 detik


        
        const user = JSON.parse(localStorage.getItem('guild_session'));
        if(!user || user.role !== 'adventurer') window.location.href = 'index.html';

        function renderBoard() {
            const missions = JSON.parse(localStorage.getItem('global_missions') || '[]');
            
            // 1. CEK NOTIFIKASI TERPILIH (Auto-Teleport)
            const chosen = missions.find(m => m.acceptedAdv === user.id && m.status === "ACTIVE");
            if(chosen) {
                alert("!!! PERINGATAN: KONTRAK ANDA DISETUJUI !!!");
                window.location.href = "briefing.html?id=" + chosen.id;
                return;
            }

            // 2. TAMPILKAN DAFTAR MISI
            const openMissions = missions.filter(m => m.status === "OPEN");
            const box = document.getElementById('boardBox');

            if(openMissions.length === 0) {
                box.innerHTML = "<p style='text-align:center; color:#444;'>Papan misi kosong...</p>";
                return;
            }

            let html = "";
            openMissions.forEach(m => {
                const isApplied = m.applicants.some(a => a.id === user.id);
                html += `
                    <div class="card">
                        <div class="badge">REWARD: ${m.reward} STONE</div>
                        <h3 style="margin:5px 0; color:var(--neon);">${m.title}</h3>
                        <p style="font-size:11px; color:#666;">Requester: ${m.requesterName}</p>
                        <button class="btn" onclick="apply('${m.id}')" ${isApplied ? 'disabled' : ''}>
                            ${isApplied ? 'MENUNGGU KONFIRMASI' : 'AMBIL KONTRAK'}
                        </button>
                    </div>
                `;
            });
            box.innerHTML = html;
        }

        function apply(msnId) {
            let missions = JSON.parse(localStorage.getItem('global_missions'));
            let m = missions.find(x => x.id === msnId);
            m.applicants.push({ id: user.id, name: user.name });
            localStorage.setItem('global_missions', JSON.stringify(missions));
            alert("Lamaran dikirim ke Requester!");
            renderBoard();
        }

        setInterval(renderBoard, 1500);
        renderBoard();
    </script>
</body>
</html>
