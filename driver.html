<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Ojek Kuningan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan khusus driver untuk membedakan visual */
        .header-main { background: linear-gradient(135deg, #10b981, #059669) !important; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-dashboard" class="active-screen">
        <div class="card header-main">
            <h1>Driver Dashboard</h1>
            <div class="stats-grid">
                <div class="stat-box"><small>Pendapatan</small><br><b id="stat-income">Rp 0</b></div>
                <div class="stat-box"><small>Order Selesai</small><br><b id="stat-count">0</b></div>
            </div>
            <button class="btn-gps" onclick="toggleOnline()" id="btn-status">MASUK ONLINE</button>
        </div>

        <div id="status-info" class="text-center" style="margin: 20px 0;">
            <p class="text-muted">Status: <b id="text-status" style="color:var(--danger)">OFFLINE</b></p>
        </div>

        <div id="list-order-masuk">
            <p class="text-center text-muted">Belum ada orderan masuk...</p>
        </div>
    </div>

    <div id="screen-trip-driver" class="screen">
        <div class="card">
            <div class="status-badge" style="background:var(--warning); color:white; padding:5px 10px; border-radius:10px; display:inline-block; font-size:12px;">Sedang Menjalankan Order</div>
            <h3 id="trip-destinasi" style="margin:10px 0;">--</h3>
            <p id="trip-upah" style="font-weight:bold; color:var(--success);"></p>
            
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-group">
                    <input type="text" id="input-pesan-driver" placeholder="Balas pelanggan...">
                    <button onclick="driverKirimChat()">Kirim</button>
                </div>
            </div>

            <div id="timer-box" style="margin-bottom: 10px; font-weight: bold; color: var(--danger);">
                Estimasi Sampai: <span id="timer-text">--</span>
            </div>
            
            <button id="btn-selesai-order" class="btn-finish" style="opacity: 0.5;" disabled onclick="driverKlikSelesai()">SELESAI PESANAN</button>
            <button class="btn-cancel-trip" onclick="driverBatalkanPesanan()">BATALKAN (KENDALA)</button>
        </div>
    </div>
</div>

<script src="core.js"></script>
<script src="driver-logic.js"></script>

</body>
</html>
