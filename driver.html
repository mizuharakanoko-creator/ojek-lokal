<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - Ojek Kuningan</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --bg: #f8fafc; --dark: #1e293b; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        
        #registration-screen, #main-dashboard { display: none; padding: 20px; max-width: 500px; margin: auto; }

        .header-card { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; padding: 25px; border-radius: 0 0 30px 30px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin: -20px -20px 20px -20px; position: relative; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: -25px 5px 15px 5px; }
        .stat-card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .stat-card small { color: #64748b; font-size: 10px; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 15px; margin-top: 4px; }

        .rating-box { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .rating-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #f8fafc; padding-bottom: 4px; }
        .stars { color: var(--warning); font-weight: bold; }

        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 8px 12px rgba(0,0,0,0.05); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .trip-panel { background: #eff6ff; border: 2px solid var(--primary); padding: 20px; border-radius: 20px; text-align: center; }

        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: bold; }
        
        .review-alert { background: #fff7ed; border: 1px solid #fdba74; padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 12px; font-style: italic; display: none; }
    </style>
</head>
<body>

<div id="registration-screen">
    <div style="text-align: center; margin-top: 50px;">
        <h2 style="color: var(--primary);">Daftar Driver</h2>
        <input type="text" id="reg-nama" placeholder="Nama Lengkap">
        <input type="number" id="reg-nik" placeholder="Nomor NIK">
        <input type="text" id="reg-plat" placeholder="Nomor Plat Kendaraan">
        <input type="text" id="reg-motor" placeholder="Jenis Motor">
        <button class="btn-main" onclick="daftarDriver()">MASUK DASHBOARD</button>
    </div>
</div>

<div id="main-dashboard">
    <div class="header-card">
        <h3 id="dash-nama" style="margin:0">Nama Driver</h3>
        <small id="dash-motor">Motor • Plat</small>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>Bulan Ini</small><div id="stat-order">0</div></div>
        <div class="stat-card"><small>Pendapatan</small><div id="stat-duit" style="color: var(--success)">Rp 0</div></div>
    </div>

    <div class="rating-box">
        <div class="rating-item"><span>🚀 Kecepatan</span> <span class="stars" id="star-kecepatan">★★★★★</span></div>
        <div class="rating-item"><span>🎯 Ketelitian</span> <span class="stars" id="star-ketelitian">★★★★★</span></div>
        <div class="rating-item"><span>🛡️ Kepercayaan</span> <span class="stars" id="star-kepercayaan">★★★★★</span></div>
        <div class="rating-item"><span>😊 Kesopanan</span> <span class="stars" id="star-kesopanan">★★★★★</span></div>
        <div class="rating-item"><span>❤️ Kepuasan</span> <span class="stars" id="star-kepuasan">★★★★★</span></div>
    </div>

    <div id="order-section">
        <h4 id="status-title">📦 Orderan Tersedia</h4>
        <div id="order-list">Mencari orderan...</div>
    </div>

    <div id="review-delayed" class="review-alert"></div>
</div>

<script>
    const DB_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    let myNik = localStorage.getItem('driver_nik');
    let onTrip = false;

    if (myNik) { muatAplikasi(); } else { document.getElementById('registration-screen').style.display = 'block'; }

    async function muatAplikasi() {
        const res = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await res.json();
        if (!d) return;

        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('dash-nama').innerText = d.nama;
        document.getElementById('dash-motor').innerText = `${d.motor} (${d.plat})`;
        document.getElementById('stat-order').innerText = d.history.bulan_1.order;
        document.getElementById('stat-duit').innerText = "Rp " + (d.history.bulan_1.pendapatan || 0).toLocaleString();

        const s = (v) => "★".repeat(v || 5) + "☆".repeat(5-(v || 5));
        document.getElementById('star-kecepatan').innerText = s(d.stats.kecepatan);
        document.getElementById('star-ketelitian').innerText = s(d.stats.ketelitian);
        document.getElementById('star-kepercayaan').innerText = s(d.stats.kepercayaan);
        document.getElementById('star-kesopanan').innerText = s(d.stats.kesopanan);
        document.getElementById('star-kepuasan').innerText = s(d.stats.kepuasan);

        // Pantau Orderan
        muatOrderan();
        setInterval(muatOrderan, 4000);

        // Pantau Ulasan (Delay 5 Menit)
        if(d.ulasan_terbaru) {
            setTimeout(() => {
                const rBox = document.getElementById('review-delayed');
                rBox.innerText = `Ulasan Konsumen: "${d.ulasan_terbaru}"`;
                rBox.style.display = 'block';
            }, 300000);
        }
    }

    async function muatOrderan() {
        if (onTrip) return;

        try {
            const res = await fetch(`${DB_URL}/orders.json`);
            const data = await res.json();
            const list = document.getElementById('order-list');
            const sekarang = new Date().getTime();

            if (!data) {
                list.innerHTML = "<p style='color:grey; font-size:12px; text-align:center;'>Belum ada orderan masuk di Kuningan.</p>";
                return;
            }

            let html = "";
            for (const id in data) {
                const o = data[id];

                // 1. AUTO-CLEANUP DATABASE (Data > 5 Menit dihapus)
                if (!o.timestamp || (sekarang - o.timestamp > 300000)) {
                    fetch(`${DB_URL}/orders/${id}.json`, { method: 'DELETE' });
                    continue;
                }

                if (o.status === "mencari_driver") {
                    html += `
                    <div class="order-card">
                        <b>📍 Ke: ${o.tujuan}</b><br>
                        <small>Jarak: ${o.jarak} km • Harga: Rp ${o.upah.toLocaleString()}</small>
                        <input type="number" id="nego-${id}" placeholder="Tawar harga? (Kosongkan jika setuju)">
                        <button class="btn-main" onclick="ambilOrder('${id}', ${o.upah})">AMBIL SEKARANG</button>
                    </div>`;
                }
            }
            list.innerHTML = html || "<p style='color:grey; text-align:center;'>Menunggu orderan baru...</p>";
        } catch (e) { console.log("Offline..."); }
    }

    async function ambilOrder(orderId, hargaAsli) {
        const nego = document.getElementById(`nego-${orderId}`).value || hargaAsli;
        const resD = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await resD.json();

        // Kirim Tawaran ke User
        await fetch(`${DB_URL}/orders/${orderId}/tawaran.json`, {
            method: 'POST',
            body: JSON.stringify({ nama_driver: d.nama, driver_nik: myNik, plat_nomor: d.plat, harga_tawar: parseInt(nego) })
        });

        const btn = document.querySelector(`#nego-${orderId}`).nextElementSibling;
        btn.innerText = "MENUNGGU PERSETUJUAN USER...";
        btn.disabled = true;

        // Pantau apakah user memilih kita
        const cekTawaran = setInterval(async () => {
            const r = await fetch(`${DB_URL}/orders/${orderId}.json`);
            const order = await r.json();
            if (!order) { clearInterval(cekTawaran); location.reload(); }

            if (order.status === "diambil") {
                clearInterval(cekTawaran);
                if (order.driver_nik === myNik) { panelJalan(order, orderId, nego); } 
                else { alert("User memilih driver lain."); location.reload(); }
            }
        }, 3000);
    }

    function panelJalan(order, orderId, hargaFix) {
        onTrip = true;
        document.getElementById('status-title').innerText = "🚀 TRIP BERJALAN";
        document.getElementById('order-list').innerHTML = `
            <div class="trip-panel">
                <p>Mengantar ke: <b>${order.tujuan}</b></p>
                <button class="btn-main" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${order.jemput_lat},${order.jemput_lon}')">LIHAT MAPS JEMPUTAN</button>
                <button class="btn-success" style="margin-top:10px;" onclick="selesaiNarik('${orderId}', ${hargaFix})">SELESAI MENGANTAR</button>
            </div>`;
    }

    async function selesaiNarik(orderId, pendapatan) {
        if(!confirm("Selesaikan perjalanan ini?")) return;
        
        // Tambah Statistik Driver
        const res = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await res.json();
        const newOrder = (d.history.bulan_1.order || 0) + 1;
        const newDuit = (d.history.bulan_1.pendapatan || 0) + parseInt(pendapatan);

        await fetch(`${DB_URL}/drivers/${myNik}/history/bulan_1.json`, {
            method: 'PATCH',
            body: JSON.stringify({ order: newOrder, pendapatan: newDuit })
        });

        alert("Berhasil! Halaman akan kembali ke Dashboard.");
        location.reload(); 
    }

    async function daftarDriver() {
        const n = document.getElementById('reg-nama').value, nik = document.getElementById('reg-nik').value, p = document.getElementById('reg-plat').value, m = document.getElementById('reg-motor').value;
        if(!n || !nik) return alert("NIK dan Nama wajib diisi!");
        const payload = { nama:n, nik:nik, plat:p, motor:m, status_donasi:"active", stats:{kecepatan:5, ketelitian:5, kepercayaan:5, kesopanan:5, kepuasan:5}, history:{bulan_1:{order:0, pendapatan:0}, bulan_2:{order:0, pendapatan:0}, bulan_3:{order:0, pendapatan:0}} };
        await fetch(`${DB_URL}/drivers/${nik}.json`, { method: 'PUT', body: JSON.stringify(payload) });
        localStorage.setItem('driver_nik', nik);
        location.reload();
    }
</script>
</body>
</html>
