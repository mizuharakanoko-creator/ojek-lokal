<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Ojek Kuningan - Partner</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div id="screen-register" class="screen">
        <div class="card header-driver">
            <h1 style="margin: 0;">Pendaftaran Mitra</h1>
            <p style="margin: 5px 0 0 0; opacity: 0.9;">Ojek Lokal Kuningan - Versi Beta</p>
        </div>
        
        <div class="card">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
                <input type="text" id="reg-plat" placeholder="Plat Nomor (E 1234 XX)" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
                <input type="text" id="reg-motor" placeholder="Jenis Motor & Warna" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
                <button onclick="prosesDaftar()" class="btn-confirm" style="padding: 15px;">GABUNG SEKARANG</button>
            </div>
        </div>
    </div>

    <div id="screen-dashboard" class="screen active-screen">
        <div class="header-driver">
            <div style="display: flex; justify-content: space-between; align-items: start;">
                <div>
                    <h2 id="disp-nama" style="margin:0;">Driver</h2>
                    <small id="disp-plat">E 0000 XX</small><br>
                    <span style="font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px;">VERSI BETA 1.0</span>
                </div>
                <div class="badge-order" style="background: white; color: var(--primary); padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 12px;">
                    <span id="total-order-badge">0 Order</span>
                </div>
            </div>

            <div class="stat-box" style="margin-top: 20px;">
                <div style="text-align: left;"><small>PENDAPATAN</small><br><b id="stat-income" style="font-size: 20px;">Rp 0</b></div>
                <div style="text-align: right;"><small>RATING</small><br><b id="stat-rating" style="font-size: 20px;">⭐ 5.0</b></div>
            </div>

            <button id="btn-status" class="btn-status" onclick="toggleOnline()" style="margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                MASUK ONLINE
            </button>
        </div>

        <div class="card">
            <details>
                <summary style="font-size: 13px; font-weight: 800; color: var(--gray); cursor: pointer; list-style: none; display: flex; justify-content: space-between;">
                    📊 PERFORMA & KEPUASAN <span>▼</span>
                </summary>
                <div class="stat-grid" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="stat-mini">🚀 Kecepatan <br><b id="stat-speed">100%</b></div>
                    <div class="stat-mini">🛡️ Ketelitian <br><b id="stat-accuracy">100%</b></div>
                    <div class="stat-mini">😊 Attitude <br><b id="stat-attitude">100%</b></div>
                    <div class="stat-mini">🏆 Ranking <br><b id="stat-rank">#--</b></div>
                </div>
            </details>
        </div>

        <div id="list-order-masuk" style="padding: 10px 0;">
            <p style="text-align: center; color: #94a3b8; font-size: 12px;">Menunggu status Online...</p>
        </div>

        <div style="padding: 20px; text-align: center;">
            <button onclick="window.open('https://saweria.co/', '_blank')" style="background: #f8fafc; border: 1px dashed #cbd5e1; padding: 10px 20px; border-radius: 12px; color: #64748b; font-size: 12px; width: 100%;">
                ☕ Dukung Pengembangan (Donate)
            </button>
        </div>
    </div>

    <div id="screen-trip-driver" class="screen">
        <div class="card header-driver" style="padding: 20px; text-align: center;">
            <h2 style="margin:0;">🛵 Perjalanan Aktif</h2>
            <p id="info-tujuan-trip" style="font-size: 14px; opacity: 0.9; margin-top: 5px;">Tujuan: -</p>
        </div>

        <div class="card">
            <div id="info-user-trip"></div>

            <button class="btn-confirm" id="link-navigasi" style="background: #4285F4; margin-bottom: 15px;">
                📍 BUKA NAVIGASI MAPS
            </button>

            <div id="chat-container" style="border: 1px solid #eee; border-radius: 12px; overflow: hidden;">
                <div id="chat-messages" style="height: 150px; overflow-y: auto; padding: 15px; background: #fdfdfd; display: flex; flex-direction: column; gap: 8px;"></div>
                <div style="display: flex; padding: 10px; background: #eee; gap: 5px;">
                    <input type="text" id="input-pesan" placeholder="Ketik pesan..." style="flex:1; padding: 8px; border: none; border-radius: 5px;">
                    <button onclick="driverKirimChat()" style="background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold;">Kirim</button>
                </div>
            </div>

            <button id="btn-selesai-order" class="btn-confirm" onclick="driverKlikSelesai()" style="background: #10b981; margin-top: 20px;">
                ✅ KONFIRMASI SELESAI
            </button>
        </div>
    </div>

</div>

<script src="config.js"></script>
<script src="core.js"></script>
<script src="driver-logic.js"></script>

</body>
            </html>
