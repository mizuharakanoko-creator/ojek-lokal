<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Pro - Ojek Kuningan</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --bg: #f1f5f9; --dark: #1e293b; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        
        #registration-screen, #main-dashboard, #trip-screen { display: none; padding: 15px; max-width: 480px; margin: auto; }

        /* Header & Info */
        .header-card { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; padding: 25px; border-radius: 0 0 30px 30px; margin: -15px -15px 15px -15px; display: flex; align-items: center; gap: 15px; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background: #fff; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: -20px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .stat-card div { font-weight: bold; font-size: 14px; margin-top: 4px; }

        /* Order & Trip */
        .order-card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; border-left: 5px solid var(--primary); animation: notify 0.5s infinite alternate; }
        @keyframes notify { from { transform: scale(1); } to { transform: scale(1.02); } }
        
        .trip-panel { background: white; padding: 25px; border-radius: 20px; text-align: center; border: 3px solid var(--success); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-finish:disabled { background: #ccc; cursor: not-allowed; }

        .dropdown-rank { background: white; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .dropdown-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<audio id="audio-notif" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div id="registration-screen">
    </div>

<div id="main-dashboard">
    <div class="header-card">
        <img id="driver-img" class="profile-pic">
        <div>
            <h3 id="dash-nama" style="margin:0">Driver</h3>
            <small id="dash-motor">Motor • Plat</small>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>Order Bulan Ini</small><div id="stat-order">0</div></div>
        <div class="stat-card"><small>Pendapatan</small><div id="stat-duit" style="color:var(--success)">Rp 0</div></div>
    </div>

    <div class="dropdown-rank">
        <div class="dropdown-header" onclick="toggle('rank-box')">⭐ PERFORMA <span>▼</span></div>
        <div id="rank-box" style="display:none; padding:10px;">
            <div id="rating-text" style="font-weight:bold; color:var(--warning); text-align:center; font-size:18px;">5.0 / 5.0</div>
        </div>
    </div>

    <div id="order-section">
        <h4 style="margin:10px 0">📦 Orderan Tersedia</h4>
        <div id="order-list">Mencari...</div>
    </div>
</div>

<div id="trip-screen">
    <div class="trip-panel">
        <h2 style="color:var(--success)">Pesanan Aktif!</h2>
        <p id="trip-dest" style="font-weight:bold; font-size:18px;"></p>
        <p id="trip-price" style="color:var(--primary); font-weight:bold;"></p>
        <button class="btn-main" id="btn-maps" style="margin-bottom:10px">BUKA GOOGLE MAPS JEMPUTAN</button>
        <hr>
        <div id="timer-text" style="font-size:12px; color:var(--danger); margin-bottom:5px">Proteksi: Tunggu 15 menit untuk selesai</div>
        <button class="btn-finish" id="btn-selesai" disabled onclick="konfirmasiSelesai()">SELESAI MENGANTAR</button>
    </div>
</div>

<script>
    const DB_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    let myNik = localStorage.getItem('driver_nik');
    let onTrip = false;
    let currentActiveId = "";
    let lastOrderCount = 0;

    if (myNik) { muatAplikasi(); } else { document.getElementById('registration-screen').style.display='block'; }

    async function muatAplikasi() {
        const res = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await res.json();
        if(!d) return;

        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('dash-nama').innerText = d.nama;
        document.getElementById('dash-motor').innerText = `${d.motor} (${d.plat})`;
        document.getElementById('driver-img').src = `https://ui-avatars.com/api/?background=6366f1&color=fff&name=${d.nama}`;
        
        // Update Stats
        document.getElementById('stat-order').innerText = d.history?.bulan_1?.order || 0;
        document.getElementById('stat-duit').innerText = "Rp " + (d.history?.bulan_1?.pendapatan || 0).toLocaleString();
        document.getElementById('rating-text').innerText = (d.stats?.kepuasan_rata_rata || 5.0) + " / 5.0";

        muatOrderan();
        setInterval(muatOrderan, 4000);
    }

    async function muatOrderan() {
        if (onTrip) return;
        const res = await fetch(`${DB_URL}/orders.json`);
        const data = await res.json();
        const list = document.getElementById('order-list');
        
        if(!data) { list.innerHTML = "Menunggu order..."; return; }

        let html = "";
        let newCount = 0;
        for (const id in data) {
            const o = data[id];
            if (o.status === "mencari_driver") {
                newCount++;
                html += `
                <div class="order-card">
                    <b>📍 Tujuan: ${o.tujuan}</b><br>
                    <small>Untung: Rp ${o.upah.toLocaleString()}</small>
                    <button class="btn-main" onclick="ambilJob('${id}', ${o.upah})">AMBIL SEKARANG</button>
                </div>`;
            }
        }
        
        // Bunyi klakson jika ada orderan baru masuk
        if (newCount > lastOrderCount) { document.getElementById('audio-notif').play(); }
        lastOrderCount = newCount;
        list.innerHTML = html;
    }

    async function ambilJob(id, upah) {
        // Kirim tawaran
        await fetch(`${DB_URL}/orders/${id}/tawaran.json`, {
            method: 'POST',
            body: JSON.stringify({ nama_driver: document.getElementById('dash-nama').innerText, driver_nik: myNik, harga_tawar: upah })
        });

        alert("Tawaran Terkirim! Jangan tutup aplikasi, menunggu pilihan user...");

        // Monitoring Pilihan User
        const cek = setInterval(async () => {
            const r = await fetch(`${DB_URL}/orders/${id}.json`);
            const ord = await r.json();
            if(!ord) { clearInterval(cek); location.reload(); }
            
            if (ord.status === "diambil") {
                clearInterval(cek);
                if (ord.driver_nik === myNik) {
                    mulaiTrip(ord, id);
                } else {
                    alert("User memilih driver lain.");
                    location.reload();
                }
            }
        }, 3000);
    }

    function mulaiTrip(ord, id) {
        onTrip = true;
        currentActiveId = id;
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('trip-screen').style.display = 'block';
        document.getElementById('trip-dest').innerText = "Tujuan: " + ord.tujuan;
        document.getElementById('trip-price').innerText = "Ongkos: Rp " + ord.upah_final.toLocaleString();
        
        // Redirect ke Maps Otomatis
        const urlMaps = `https://www.google.com/maps?q=${ord.jemput_lat},${ord.jemput_lon}`;
        document.getElementById('btn-maps').onclick = () => window.open(urlMaps);
        window.open(urlMaps); // Auto open

        // Timer Proteksi 15 Menit (Sederhana: 900 detik)
        let timeLeft = 900; 
        const t = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer-text').innerText = `Tunggu: ${min}m ${sec}s untuk selesai`;
            if (timeLeft <= 0) {
                clearInterval(t);
                document.getElementById('btn-selesai').disabled = false;
                document.getElementById('timer-text').innerText = "Trip bisa diselesaikan!";
                document.getElementById('timer-text').style.color = "var(--success)";
            }
        }, 1000);
    }

    async function konfirmasiSelesai() {
        if(!confirm("Pastikan Anda sudah sampai tujuan!")) return;

        // Ambil data order terakhir untuk update duit
        const resOrd = await fetch(`${DB_URL}/orders/${currentActiveId}.json`);
        const ord = await resOrd.json();
        
        // Update History Driver
        const resD = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await resD.json();
        
        const newOrder = (d.history?.bulan_1?.order || 0) + 1;
        const newDuit = (d.history?.bulan_1?.pendapatan || 0) + ord.upah_final;

        await fetch(`${DB_URL}/drivers/${myNik}/history/bulan_1.json`, {
            method: 'PATCH',
            body: JSON.stringify({ order: newOrder, pendapatan: newDuit })
        });

        alert("Order Berhasil Diselesaikan! Pendapatan diperbarui.");
        location.reload(); // Kembali ke dashboard utama
    }

    function toggle(id) {
        const x = document.getElementById(id);
        x.style.display = x.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
