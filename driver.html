<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - Ojek Kuningan</title>
    <style>
        :root { --primary: #0ea5e9; --success: #10b981; --bg: #f8fafc; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Dashboard Header */
        .header-card { background: linear-gradient(135deg, var(--primary), #6366f1); color: white; padding: 25px; border-radius: 0 0 30px 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; object-fit: cover; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: -20px; padding: 0 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card small { color: #64748b; font-size: 11px; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 16px; margin-top: 5px; }

        /* Rating Section */
        .rating-section { background: white; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .rating-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .stars { color: #f59e0b; }

        /* Order List */
        .order-section { padding: 0 20px 100px 20px; }
        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); }

        /* Form Styling */
        .form-group { background: white; padding: 20px; border-radius: 20px; margin: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        #registration-screen, #main-dashboard { display: none; }
    </style>
</head>
<body>

<div id="registration-screen">
    <div class="form-group">
        <h2 style="text-align:center">Pendaftaran Driver</h2>
        <input type="text" id="reg-nama" placeholder="Nama Lengkap">
        <input type="number" id="reg-nik" placeholder="Nomor NIK">
        <input type="text" id="reg-plat" placeholder="Nomor Plat Motor">
        <input type="text" id="reg-motor" placeholder="Jenis Motor (Misal: Vario 150)">
        <button class="btn-main" onclick="daftarDriver()">DAFTAR SEKARANG</button>
    </div>
</div>

<div id="main-dashboard">
    <div class="header-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://cdn-icons-png.flaticon.com/512/714/714424.png" class="profile-img">
            <div>
                <h3 id="dash-nama" style="margin:0">Nama Driver</h3>
                <small id="dash-motor">Vario 150 - E 1234 YX</small>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Order Bulan Ini</small>
            <div id="stat-order-ini">0</div>
        </div>
        <div class="stat-card">
            <small>Pendapatan</small>
            <div id="stat-duit-ini" style="color: var(--success)">Rp 0</div>
        </div>
    </div>

    <div class="rating-section">
        <div class="rating-item"><span>⚡ Kecepatan</span> <span class="stars" id="star-kecepatan">★★★★★</span></div>
        <div class="rating-item"><span>🛡️ Kepercayaan</span> <span class="stars" id="star-kepercayaan">★★★★★</span></div>
        <div class="rating-item"><span>😊 Kesopanan</span> <span class="stars" id="star-kesopanan">★★★★★</span></div>
        <div class="rating-item"><span>🎯 Ketelitian</span> <span class="stars" id="star-ketelitian">★★★★★</span></div>
    </div>

    <div class="order-section">
        <h4>📦 Orderan Tersedia</h4>
        <div id="order-list">Mencari orderan...</div>
    </div>
</div>

<script>
    const FIREBASE_DB = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    let myNik = localStorage.getItem('driver_nik');

    // CEK STATUS LOGIN
    if (myNik) {
        muatDataProfil();
    } else {
        document.getElementById('registration-screen').style.display = 'block';
    }

    async function daftarDriver() {
        const nama = document.getElementById('reg-nama').value;
        const nik = document.getElementById('reg-nik').value;
        const plat = document.getElementById('reg-plat').value;
        const motor = document.getElementById('reg-motor').value;

        if (!nama || !nik || !plat) return alert("Lengkapi data!");

        const payload = {
            nama, nik, plat, motor,
            stats: { kecepatan: 5, kepercayaan: 5, kesopanan: 5, ketelitian: 5 },
            history: { order_lalu: 0, order_ini: 0, duit_lalu: 0, duit_ini: 0 }
        };

        // Simpan ke database /drivers/NIK
        await fetch(`${FIREBASE_DB}/drivers/${nik}.json`, {
            method: 'PUT',
            body: JSON.stringify(payload)
        });

        localStorage.setItem('driver_nik', nik);
        location.reload();
    }

    async function muatDataProfil() {
        const res = await fetch(`${FIREBASE_DB}/drivers/${myNik}.json`);
        const d = await res.json();

        if (!d) {
            localStorage.removeItem('driver_nik');
            location.reload();
            return;
        }

        // Update Tampilan Dashboard
        document.getElementById('registration-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('dash-nama').innerText = d.nama;
        document.getElementById('dash-motor').innerText = `${d.motor} - ${d.plat}`;
        document.getElementById('stat-order-ini').innerText = d.history.order_ini;
        document.getElementById('stat-duit-ini').innerText = "Rp " + d.history.duit_ini.toLocaleString();
        
        // Tampilkan Rating (Bintang)
        updateStars('star-kecepatan', d.stats.kecepatan);
        updateStars('star-kepercayaan', d.stats.kepercayaan);
        updateStars('star-kesopanan', d.stats.kesopanan);
        updateStars('star-ketelitian', d.stats.ketelitian);

        muatOrderanAktif();
        setInterval(muatOrderanAktif, 5000);
    }

    function updateStars(id, value) {
        document.getElementById(id).innerText = "★".repeat(value) + "☆".repeat(5-value);
    }

    function muatOrderanAktif() {
        // Logika anti-refresh saat ngetik nego
        if (document.activeElement.tagName === 'INPUT') return;

        fetch(`${FIREBASE_DB}/orders.json`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                if (!data) return list.innerHTML = "Belum ada order.";

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    if (o.status !== "mencari_driver") return;
                    list.innerHTML += `
                        <div class="order-card">
                            <b>🏁 Ke: ${o.tujuan}</b> (${o.jarak} km)<br>
                            <small>Harga: Rp ${o.upah.toLocaleString()}</small><br>
                            <input type="number" id="nego-${id}" placeholder="Tawar harga...">
                            <button class="btn-main" style="padding:8px; margin-top:5px;" onclick="lamarJob('${id}', ${o.upah})">AMBIL ORDER</button>
                        </div>`;
                });
            });
    }

    async function lamarJob(orderId, hargaAsli) {
        const hargaNego = document.getElementById(`nego-${orderId}`).value || hargaAsli;
        
        // Ambil data profil terbaru untuk dikirim ke user
        const res = await fetch(`${FIREBASE_DB}/drivers/${myNik}.json`);
        const profil = await res.json();

        const tawaran = {
            nama_driver: profil.nama,
            plat_nomor: profil.plat,
            rating: profil.stats.kepercayaan, // Kirim rating kepercayaan
            harga_tawar: parseInt(hargaNego)
        };

        await fetch(`${FIREBASE_DB}/orders/${orderId}/tawaran.json`, { method: 'POST', body: JSON.stringify(tawaran) });
        alert("Tawaran Terkirim!");
    }
</script>
</body>
    </html>
