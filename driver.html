<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver - Ojek Lokal Kuningan</title>
    <style>
        :root { --primary: #10b981; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .order-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .price { font-size: 18px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-lamar { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="app">
    <h2 style="text-align:center">🚖 Orderan Kuningan</h2>
    <div id="order-list">Memuat orderan...</div>
</div>

<script>
    const BASE_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app/orders";
    let myName = "";

    function muatPesanan() {
        fetch(`${BASE_URL}.json`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                if (!data) return list.innerHTML = "<p style='text-align:center;'>Belum ada orderan.</p>";

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    if (o.status !== "mencari_driver") return;

                    list.innerHTML += `
                        <div class="order-card">
                            <p>🏁 <b>Tujuan:</b> ${o.tujuan} (${o.jarak}km)</p>
                            <div class="price">Harga: Rp ${o.upah.toLocaleString()}</div>
                            <input type="text" id="nama-${id}" placeholder="Nama Driver">
                            <input type="number" id="nego-${id}" placeholder="Tawar Harga (Nego)">
                            <button class="btn-lamar" onclick="lamarJob('${id}', ${o.upah})">LAMAR SEKARANG</button>
                        </div>
                    `;
                });
            });
    }

    async function lamarJob(orderId, hargaAsli) {
        const inputNama = document.getElementById(`nama-${orderId}`).value;
        const hargaNego = document.getElementById(`nego-${orderId}`).value || hargaAsli;
        if (!inputNama) return alert("Isi nama kamu!");
        myName = inputNama;

        const tawaran = { nama_driver: myName, harga_tawar: parseInt(hargaNego) };

        try {
            await fetch(`${BASE_URL}/${orderId}/tawaran.json`, { method: 'POST', body: JSON.stringify(tawaran) });
            alert("Tawaran dikirim! Menunggu dipilih user...");
            
            // Pantau apakah dipilih
            const check = setInterval(async () => {
                const res = await fetch(`${BASE_URL}/${orderId}.json`);
                const data = await res.json();
                if (!data) { alert("Orderan dibatalkan."); clearInterval(check); location.reload(); }
                else if (data.status === "diambil" && data.driver_pilihan === myName) {
                    alert("ANDA TERPILIH! Segera jemput.");
                    clearInterval(check);
                    window.location.href = `https://www.google.com/maps/search/?api=1&query=${data.jemput_lat},${data.jemput_lon}`;
                } else if (data.status === "diambil") {
                    alert("User memilih driver lain.");
                    clearInterval(check);
                    location.reload();
                }
            }, 3000);
        } catch (e) { alert("Gagal kirim tawaran."); }
    }

    setInterval(muatPesanan, 5000);
    muatPesanan();
</script>
</body>
</html>
