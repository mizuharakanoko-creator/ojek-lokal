<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver - Ojek Lokal</title>
    <style>
        :root { --primary: #10b981; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .order-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .price { font-size: 18px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-lamar { background: var(--primary); color: white; }
        .btn-maps { background: #3b82f6; color: white; text-decoration: none; display: block; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <h2 style="text-align:center">🚖 Orderan Tersedia</h2>
    <div id="order-list">Memuat...</div>
</div>

<script>
    const BASE_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app/orders";

    function muatPesanan() {
        fetch(`${BASE_URL}.json`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                if (!data) return list.innerHTML = "Tidak ada orderan.";

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    // Orderan hilang jika status bukan 'mencari_driver'
                    if (o.status !== "mencari_driver") return;

                    list.innerHTML += `
                        <div class="order-card">
                            <p>🏁 <b>Tujuan:</b> ${o.tujuan} (${o.jarak}km)</p>
                            <div class="price">Harga User: Rp ${o.upah.toLocaleString()}</div>
                            <hr>
                            <input type="text" id="nama-${id}" placeholder="Nama Kamu (Driver)">
                            <input type="number" id="nego-${id}" placeholder="Tawar Harga (Kosongkan jika setuju)">
                            <button class="btn-lamar" onclick="lamarJob('${id}', ${o.upah})">LAMAR SEKARANG</button>
                        </div>
                    `;
                });
            });
    }

    async function lamarJob(orderId, hargaAsli) {
        const nama = document.getElementById(`nama-${orderId}`).value;
        const hargaNego = document.getElementById(`nego-${orderId}`).value || hargaAsli;

        if (!nama) return alert("Isi nama kamu!");

        // Masukkan data lamaran ke sub-folder 'tawaran' di dalam orderan tersebut
        const tawaran = {
            nama_driver: nama,
            harga_tawar: parseInt(hargaNego),
            waktu: new Date().getTime()
        };

        try {
            await fetch(`${BASE_URL}/${orderId}/tawaran.json`, {
                method: 'POST',
                body: JSON.stringify(tawaran)
            });
            alert("Tawaran terkirim! Tunggu user memilih kamu.");
            muatPesanan();
        } catch (e) { alert("Gagal melamar"); }
    }

    setInterval(muatPesanan, 5000);
    muatPesanan();
</script>
</body>
</html>
