<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - Ojek Kuningan</title>
    <style>
        :root { --primary: #0ea5e9; --success: #10b981; --bg: #f8fafc; --dark: #1e293b; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        #registration-screen, #main-dashboard, #donation-screen { display: none; padding: 20px; max-width: 500px; margin: auto; }
        .header-card { background: linear-gradient(135deg, var(--primary), #6366f1); color: white; padding: 25px; border-radius: 0 0 30px 30px; margin: -20px -20px 20px -20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: -25px 5px 15px 5px; }
        .stat-card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .rating-section { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .rating-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .stars { color: var(--warning); font-weight: bold; }
        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="registration-screen">
    <h2>Daftar Driver</h2>
    <input type="text" id="reg-nama" placeholder="Nama Lengkap">
    <input type="number" id="reg-nik" placeholder="Nomor NIK">
    <input type="text" id="reg-plat" placeholder="Nomor Plat">
    <input type="text" id="reg-motor" placeholder="Jenis Motor">
    <button class="btn-main" onclick="daftarDriver()">DAFTAR</button>
</div>

<div id="main-dashboard">
    <div class="header-card">
        <h3 id="dash-nama" style="margin:0">Driver</h3>
        <small id="dash-motor">Memuat...</small>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>Bulan Ini</small><div id="stat-order-1">0</div></div>
        <div class="stat-card"><small>Pendapatan</small><div id="stat-duit-1">Rp 0</div></div>
    </div>

    <div class="rating-section">
        <div class="rating-item"><span>🚀 Kecepatan</span> <span class="stars" id="star-kecepatan">★★★★★</span></div>
        <div class="rating-item"><span>🎯 Ketelitian</span> <span class="stars" id="star-ketelitian">★★★★★</span></div>
        <div class="rating-item"><span>🛡️ Kepercayaan</span> <span class="stars" id="star-kepercayaan">★★★★★</span></div>
        <div class="rating-item"><span>😊 Kesopanan</span> <span class="stars" id="star-kesopanan">★★★★★</span></div>
        <div class="rating-item"><span>❤️ Kepuasan</span> <span class="stars" id="star-kepuasan">★★★★★</span></div>
    </div>

    <div id="order-section">
        <h4>📦 Orderan Masuk</h4>
        <div id="order-list">Mencari...</div>
    </div>
</div>

<script>
    // PASTIKAN URL INI BENAR (Cek di Firebase Console Anda)
    const DB_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    let myNik = localStorage.getItem('driver_nik');

    if (myNik) { muatData(); } else { document.getElementById('registration-screen').style.display = 'block'; }

    async function daftarDriver() {
        const n = document.getElementById('reg-nama').value, nik = document.getElementById('reg-nik').value, p = document.getElementById('reg-plat').value, m = document.getElementById('reg-motor').value;
        if(!n || !nik) return alert("Isi Nama & NIK!");
        const data = { nama:n, nik:nik, plat:p, motor:m, status_donasi:"active", stats:{kecepatan:5, ketelitian:5, kepercayaan:5, kesopanan:5, kepuasan:5}, history:{bulan_1:{order:0, pendapatan:0}, bulan_2:{order:0, pendapatan:0}, bulan_3:{order:0, pendapatan:0}} };
        await fetch(`${DB_URL}/drivers/${nik}.json`, { method: 'PUT', body: JSON.stringify(data) });
        localStorage.setItem('driver_nik', nik);
        location.reload();
    }

    async function muatData() {
        const res = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await res.json();
        if(!d) return;

        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('dash-nama').innerText = d.nama;
        document.getElementById('dash-motor').innerText = `${d.motor} (${d.plat})`;
        
        const s = (v) => "★".repeat(v || 5) + "☆".repeat(5-(v || 5));
        document.getElementById('star-kecepatan').innerText = s(d.stats.kecepatan);
        document.getElementById('star-ketelitian').innerText = s(d.stats.ketelitian);
        document.getElementById('star-kepercayaan').innerText = s(d.stats.kepercayaan);
        document.getElementById('star-kesopanan').innerText = s(d.stats.kesopanan);
        document.getElementById('star-kepuasan').innerText = s(d.stats.kepuasan);

        // MULAI PANTAU ORDERAN
        muatOrderan();
        setInterval(muatOrderan, 3000); 
    }

    async function muatOrderan() {
        try {
            const res = await fetch(`${DB_URL}/orders.json`);
            const data = await res.json();
            const list = document.getElementById('order-list');
            
            if (!data || Object.keys(data).length === 0) {
                list.innerHTML = "<p style='color:grey; font-size:12px;'>Belum ada orderan masuk...</p>";
                return;
            }

            let html = "";
            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                if (o.status === "mencari_driver") {
                    html += `
                    <div class="order-card">
                        <b>📍 Ke: ${o.tujuan}</b><br>
                        <small>Jarak: ${o.jarak} km • Upah: Rp ${o.upah.toLocaleString()}</small>
                        <input type="number" id="nego-${id}" placeholder="Tawar harga (Opsional)">
                        <button class="btn-main" onclick="lamarJob('${id}', ${o.upah})">AMBIL ORDER</button>
                    </div>`;
                }
            });
            list.innerHTML = html || "<p style='color:grey;'>Orderan sedang kosong.</p>";
        } catch (e) {
            console.error("Error Fetch Order:", e);
        }
    }

    async function lamarJob(orderId, hargaAsli) {
        const negoVal = document.getElementById(`nego-${orderId}`).value;
        const hargaFix = negoVal || hargaAsli;
        
        // Ambil Nama Driver terbaru
        const resD = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const prof = await resD.json();

        const tawaran = {
            nama_driver: prof.nama,
            driver_nik: myNik,
            plat_nomor: prof.plat,
            harga_tawar: parseInt(hargaFix)
        };

        // Kirim Tawaran
        await fetch(`${DB_URL}/orders/${orderId}/tawaran.json`, { method: 'POST', body: JSON.stringify(tawaran) });
        alert("Tawaran terkirim! Menunggu User memilih...");

        // Pantau apakah terpilih
        const cek = setInterval(async () => {
            const r = await fetch(`${DB_URL}/orders/${orderId}.json`);
            const order = await r.json();
            if(!order) { clearInterval(cek); location.reload(); }

            if(order.status === "diambil") {
                clearInterval(cek);
                if(order.driver_nik === myNik) {
                    alert("ANDA TERPILIH!");
                    window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${order.jemput_lat},${order.jemput_lon}`;
                } else {
                    alert("User memilih driver lain.");
                    location.reload();
                }
            }
        }, 3000);
    }
</script>
</body>
</html>
