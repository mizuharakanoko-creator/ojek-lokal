<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Ojek Kuningan</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div id="lock-overlay">
        <div class="lock-card">
            <div style="font-size: 50px;">🔒</div>
            <h2>Akses Terkunci</h2>
            <p>Selesaikan iuran pengembangan dari pendapatan bulan lalu untuk kembali online.</p>
            <button onclick="window.open('https://saweria.co/', '_blank')" class="btn-confirm" style="background: var(--accent);">
                BAYAR SEKARANG
            </button>
        </div>
    </div>

    <div id="screen-dashboard" class="screen active-screen">
        <div class="header-driver">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <h2 id="disp-nama">Memuat...</h2>
                    <small id="disp-plat">E 0000 XX</small>
                </div>
                <div id="total-order-badge" class="badge-order">0 Order</div>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <div class="card-mini-stat" style="flex:1; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px;">
                    <small>PENDAPATAN</small>
                    <div id="stat-income">Rp 0</div>
                </div>
                <div class="card-mini-stat" style="flex:1; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px;">
                    <small>RATING</small>
                    <div id="stat-rating">⭐ 5.0</div>
                </div>
            </div>

            <button id="btn-status" class="btn-status-toggle" onclick="toggleOnline()">MASUK ONLINE</button>
        </div>

        <details class="performa-dropdown">
            <summary>
                <span>📊 STATISTIK PERFORMA</span>
                <span>▼</span>
            </summary>
            <div class="stat-grid">
                <div class="stat-mini"><small>SPEED</small><b id="stat-speed">100%</b></div>
                <div class="stat-mini"><small>TELITI</small><b id="stat-accuracy">100%</b></div>
                <div class="stat-mini"><small>ATTITUDE</small><b id="stat-attitude">100%</b></div>
                <div class="stat-mini"><small>RANK</small><b id="stat-rank">#--</b></div>
            </div>
        </details>

        <div id="list-order-masuk" style="padding: 0 20px 100px 20px;"></div>
    </div>
</div>

<script src="config.js"></script>
<script src="core.js"></script>
<script src="driver-logic.js"></script>
</body>
</html>
