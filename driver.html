<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Pro - Ojek Kuningan Beta</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --bg: #f1f5f9; --dark: #1e293b; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); overflow-x: hidden; }
        
        #registration-screen, #main-dashboard, #trip-screen { display: none; padding: 15px; max-width: 480px; margin: auto; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Loader Smooth */
        .sync-loader { width: 12px; height: 12px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 5px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header Profil */
        .header-card { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; padding: 25px; border-radius: 0 0 30px 30px; margin: -15px -15px 15px -15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .profile-pic { width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; background: #fff; object-fit: cover; }
        
        /* Statistik Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: -20px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .stat-card small { color: #64748b; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .stat-card div { font-weight: bold; font-size: 14px; margin-top: 4px; }

        /* Chat System */
        #chat-box { background: #fff; border-radius: 15px; height: 150px; overflow-y: auto; padding: 10px; margin: 15px 0; border: 1px solid #e2e8f0; text-align: left; font-size: 13px; }
        .msg-user { color: var(--primary); font-weight: bold; }
        .msg-driver { color: var(--success); font-weight: bold; }

        /* Order & Trip */
        .order-card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; border-left: 5px solid var(--primary); animation: notify 0.6s infinite alternate; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        @keyframes notify { from { transform: scale(1); } to { transform: scale(1.01); } }
        
        .trip-panel { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 2px solid var(--success); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-finish { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-finish:disabled { background: #cbd5e1; cursor: not-allowed; }

        .dropdown-rank { background: white; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
        .dropdown-header { padding: 12px 15px; background: #f8fafc; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; }
        .dropdown-content { padding: 12px 15px; display: none; }
    </style>
</head>
<body>

<audio id="audio-notif" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div id="registration-screen">
    <div style="text-align: center; margin-top: 50px;">
        <h2 style="color:var(--primary)">Pendaftaran Driver</h2>
        <input type="text" id="reg-nama" style="width:100%; padding:10px; margin:5px 0;" placeholder="Nama Lengkap">
        <input type="number" id="reg-nik" style="width:100%; padding:10px; margin:5px 0;" placeholder="NIK">
        <button class="btn-main" onclick="daftarDriver()">MULAI</button>
    </div>
</div>

<div id="main-dashboard">
    <div class="header-card">
        <img id="driver-img" class="profile-pic">
        <div>
            <h3 id="dash-nama" style="margin:0">Driver</h3>
            <small id="dash-motor">Motor • Plat</small>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>Bulan Ini</small><div id="stat-order">0</div></div>
        <div class="stat-card"><small>Pendapatan</small><div id="stat-duit" style="color:var(--success)">Rp 0</div></div>
    </div>

    <div class="dropdown-rank">
        <div class="dropdown-header" onclick="toggle('rank-box')">⭐ PERFORMA <span>▼</span></div>
        <div id="rank-box" class="dropdown-content">
            <div id="star-list">Memuat...</div>
            <div style="text-align:center; font-weight:bold; color:var(--warning);" id="rating-avg">5.0</div>
        </div>
    </div>

    <div class="dropdown-rank">
        <div class="dropdown-header" onclick="toggle('history-box')">📅 RIWAYAT <span>▼</span></div>
        <div id="history-box" class="dropdown-content">
            <div id="hist-prev-1">Bulan Lalu: Rp 0</div>
            <div id="hist-prev-2">2 Bulan Lalu: Rp 0</div>
        </div>
    </div>

    <div id="order-section">
        <h4 style="margin:10px 0"><span class="sync-loader"></span> Mencari Orderan...</h4>
        <div id="order-list"></div>
    </div>
</div>

<div id="trip-screen">
    <div class="trip-panel">
        <h3 style="color:var(--success); margin:0;">ORDER AKTIF</h3>
        <p id="trip-dest" style="font-weight:bold; font-size:14px;"></p>
        <button class="btn-main" id="btn-maps" style="background:#4285F4">BUKA PETA JEMPUTAN</button>
        
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Kirim pesan ke user...">
            <button onclick="kirimChat()" style="background:var(--primary); color:#fff; border:none; padding:10px; border-radius:10px;">KIRIM</button>
        </div>

        <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">
        <div id="timer-text" style="font-size:11px; color:var(--danger); margin-bottom:8px">Keamanan: Sinkronisasi Server...</div>
        <button class="btn-finish" id="btn-selesai" disabled onclick="konfirmasiSelesai()">SELESAI MENGANTAR</button>
    </div>
</div>

<script>
    const DB_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    let myNik = localStorage.getItem('driver_nik');
    let onTrip = false;
    let currentId = "";
    let lastOrderCount = 0;

    if (myNik) { muatAplikasi(); } else { document.getElementById('registration-screen').style.display='block'; }

    async function muatAplikasi() {
        const res = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await res.json();
        if(!d) return;

        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('dash-nama').innerText = d.nama;
        document.getElementById('dash-motor').innerText = `${d.motor} (${d.plat})`;
        document.getElementById('driver-img').src = `https://ui-avatars.com/api/?background=6366f1&color=fff&name=${d.nama}`;
        
        document.getElementById('stat-order').innerText = d.history?.bulan_1?.order || 0;
        document.getElementById('stat-duit').innerText = "Rp " + (d.history?.bulan_1?.pendapatan || 0).toLocaleString();
        document.getElementById('hist-prev-1').innerText = "Bulan Lalu: Rp " + (d.history?.bulan_2?.pendapatan || 0).toLocaleString();
        document.getElementById('hist-prev-2').innerText = "2 Bulan Lalu: Rp " + (d.history?.bulan_3?.pendapatan || 0).toLocaleString();
        document.getElementById('rating-avg').innerText = d.stats?.kepuasan_rata_rata || "5.0";

        muatOrderan();
        setInterval(muatOrderan, 4000);
    }

    async function muatOrderan() {
        if (onTrip) { pantauStatusTrip(); return; }
        const res = await fetch(`${DB_URL}/orders.json`);
        const data = await res.json();
        const list = document.getElementById('order-list');
        
        let html = "";
        let newCount = 0;
        for (const id in data) {
            if (data[id].status === "mencari_driver") {
                newCount++;
                html += `<div class="order-card">
                    <b>📍 Ke: ${data[id].tujuan}</b><br>
                    <small>Rp ${data[id].upah.toLocaleString()}</small>
                    <button class="btn-main" style="margin-top:10px" onclick="ambilJob('${id}', ${data[id].upah})">TERIMA</button>
                </div>`;
            }
        }
        if (newCount > lastOrderCount) { document.getElementById('audio-notif').play(); }
        lastOrderCount = newCount;
        list.innerHTML = html || "<small>Belum ada orderan baru...</small>";
    }

    // PERBAIKAN POIN 1: Pantau jika user sudah klik selesai
    async function pantauStatusTrip() {
        const res = await fetch(`${DB_URL}/orders/${currentId}.json`);
        const ord = await res.json();
        
        // Jika data order sudah dihapus (User sudah klik selesai & rating)
        if (!ord && onTrip) {
            alert("User telah menyelesaikan pesanan & memberi rating. Kembali ke dashboard.");
            location.reload();
            return;
        }

        // Muat Chat
        if (ord && ord.chat) {
            let chatHtml = "";
            for (const cid in ord.chat) {
                const c = ord.chat[cid];
                chatHtml += `<div><span class="${c.sender === 'driver' ? 'msg-driver' : 'msg-user'}">${c.sender}:</span> ${c.txt}</div>`;
            }
            document.getElementById('chat-box').innerHTML = chatHtml;
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }
    }

    async function ambilJob(id, upah) {
        await fetch(`${DB_URL}/orders/${id}/tawaran.json`, {
            method: 'POST', body: JSON.stringify({ nama_driver: document.getElementById('dash-nama').innerText, driver_nik: myNik, harga_tawar: upah })
        });
        const cek = setInterval(async () => {
            const r = await fetch(`${DB_URL}/orders/${id}.json`);
            const ord = await r.json();
            if (ord && ord.status === "diambil" && ord.driver_nik === myNik) {
                clearInterval(cek); mulaiTrip(ord, id);
            } else if (!ord || (ord.status === "diambil" && ord.driver_nik !== myNik)) {
                clearInterval(cek); alert("Order tidak tersedia."); location.reload();
            }
        }, 3000);
    }

    function mulaiTrip(ord, id) {
        onTrip = true; currentId = id;
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('trip-screen').style.display = 'block';
        document.getElementById('trip-dest').innerText = "📍 Tujuan: " + ord.tujuan;
        
        document.getElementById('btn-maps').onclick = () => window.open(`http://maps.google.com/maps?q=${ord.jemput_lat},${ord.jemput_lon}`);

        // PERBAIKAN POIN 2: Tombol Selesai
        let s = 900; 
        const t = setInterval(() => {
            s--;
            let m = Math.floor(s/60), sec = s%60;
            document.getElementById('timer-text').innerText = `Tunggu ${m}m ${sec}s`;
            if(s <= 0) { 
                clearInterval(t); 
                document.getElementById('btn-selesai').disabled = false; 
                document.getElementById('timer-text').innerText = "Siap Selesai ✅";
            }
        }, 1000);
    }

    async function kirimChat() {
        const txt = document.getElementById('chat-input').value;
        if(!txt) return;
        await fetch(`${DB_URL}/orders/${currentId}/chat.json`, {
            method: 'POST', body: JSON.stringify({ sender: 'driver', txt: txt })
        });
        document.getElementById('chat-input').value = "";
    }

    async function konfirmasiSelesai() {
        if(!confirm("Selesaikan pesanan?")) return;
        // Update stats driver secara mandiri jika user lupa klik
        const resOrd = await fetch(`${DB_URL}/orders/${currentId}.json`);
        const ord = await resOrd.json();
        const resD = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await resD.json();
        
        await fetch(`${DB_URL}/drivers/${myNik}/history/bulan_1.json`, {
            method: 'PATCH', body: JSON.stringify({ 
                order: (d.history?.bulan_1?.order || 0) + 1, 
                pendapatan: (d.history?.bulan_1?.pendapatan || 0) + ord.upah_final 
            })
        });
        // Beri tahu user bahwa driver sudah anggap selesai
        await fetch(`${DB_URL}/orders/${currentId}.json`, { method: 'PATCH', body: JSON.stringify({ status_driver: "selesai" }) });
        alert("Berhasil!"); location.reload();
    }

    function toggle(id) {
        const x = document.getElementById(id);
        x.style.display = x.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
    </html>
