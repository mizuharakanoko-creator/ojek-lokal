<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Ojek Kuningan - Partner</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div id="screen-register" class="screen">
        <div class="card header-driver">
            <h1>Pendaftaran Mitra</h1>
            <p>Bergabung menjadi pahlawan jalanan Kuningan</p>
        </div>
        </div>

    <div id="screen-dashboard" class="active-screen">
        <div class="header-driver">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="text-align: left;">
                    <h2 id="disp-nama" style="margin:0;">Driver</h2>
                    <small id="disp-plat" style="opacity: 0.8;">E 0000 XX</small>
                </div>
                <div style="background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold;">
                    <span id="total-order-badge">0 Order</span>
                </div>
            </div>

            <div class="stat-box">
                <div class="stat-mini" style="background:none; border:none; color:white;">
                    <small>PENDAPATAN</small><br><b id="stat-income" style="color:white; font-size: 18px;">Rp 0</b>
                </div>
                <div class="stat-mini" style="background:none; border:none; color:white;">
                    <small>RATING</small><br><b id="stat-rating" style="color:white; font-size: 18px;">⭐ 5.0</b>
                </div>
            </div>

            <button id="btn-status" class="btn-status" onclick="toggleOnline()" style="margin-top: 20px;">
                MASUK ONLINE
            </button>
        </div>

        <div class="card">
            <details>
                <summary style="font-size: 13px; font-weight: bold; color: var(--gray);">
                    📊 PERFORMA & KEPUASAN <span class="dropdown-icon">▼</span>
                </summary>
                <div class="stat-grid" style="margin-top: 15px;">
                    <div class="stat-mini">🚀 Kecepatan <b id="stat-speed">100%</b></div>
                    <div class="stat-mini">😊 Sopan <b id="stat-accuracy">100%</b></div>
                    <div class="stat-mini">🏆 Ranking <b id="stat-rank">#--</b></div>
                </div>
            </details>
        </div>

        <div id="list-order-masuk" style="padding: 0 5px;">
            <p id="placeholder-order" style="text-align: center; color: #94a3b8; font-size: 12px; margin-top: 20px;">
                Menunggu orderan masuk...
            </p>
        </div>
    </div>

    <div id="screen-trip-driver" class="screen">
        <div class="card header-driver" style="padding: 20px;">
            <h2 style="margin:0;">Sedang Menarik...</h2>
            <p id="info-tujuan-trip" style="font-size: 13px; opacity: 0.9;">Tujuan: -</p>
        </div>

        <div class="card">
            <div id="info-user-trip" style="margin-bottom: 15px;">
                </div>

            <button class="btn-maps" id="link-navigasi" style="background: #4285F4; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
                <span>📍</span> BUKA NAVIGASI (MAPS)
            </button>

            <div id="chat-container">
                <div id="chat-messages" style="height: 150px;"></div>
                <div class="chat-input-group">
                    <input type="text" id="input-pesan" placeholder="Balas chat user...">
                    <button onclick="driverKirimChat()">Kirim</button>
                </div>
            </div>

            <button id="btn-selesai-order" class="btn-finish" onclick="driverKlikSelesai()" style="margin-top: 20px;">
                SELESAIKAN ORDERAN
            </button>
        </div>
    </div>

</div>

<script src="config.js"></script>
<script src="core.js"></script>
<script src="driver-logic.js"></script>

</body>
    </html>
