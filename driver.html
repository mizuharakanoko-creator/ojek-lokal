<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Ojek Kuningan</title>
    <link rel="stylesheet" href="style.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="screen-register" class="screen">
        </div>

    <div id="screen-dashboard" class="screen active">
        <div class="header-driver">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <h2 id="disp-nama">Driver</h2>
                    <small id="disp-plat">E 0000 XX</small>
                </div>
                <div class="badge-order"><span id="total-order-badge">0 Order</span></div>
            </div>

            <div class="stat-box">
                <div><small>PENDAPATAN</small><br><b id="stat-income">Rp 0</b></div>
                <div><small>RATING</small><br><b id="stat-rating">⭐ 5.0</b></div>
            </div>

            <button id="btn-status" class="btn-status" onclick="toggleOnline()">MASUK ONLINE</button>
        </div>

        <div class="card">
            <details>
                <summary>📊 PERFORMA & KEPUASAN <span>▼</span></summary>
                <div class="stat-grid">
                    <div class="stat-mini">🚀 Kecepatan <b id="stat-speed">100%</b></div>
                    <div class="stat-mini">🛡️ Ketelitian <b id="stat-accuracy">100%</b></div>
                    <div class="stat-mini">🏆 Ranking <b id="stat-rank">#--</b></div>
                </div>
            </details>
        </div>

        <div id="list-order-masuk" style="padding: 15px;">
            </div>
    </div>

    <div id="screen-trip-driver" class="screen">
        </div>

    <script src="config.js"></script>
    <script src="driver-logic.js"></script>
</body>
</html>
