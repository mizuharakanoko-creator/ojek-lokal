<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - Ojek Kuningan</title>
    <style>
        :root { --primary: #0ea5e9; --success: #10b981; --bg: #f8fafc; --dark: #1e293b; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        
        #registration-screen, #main-dashboard, #donation-screen { display: none; padding: 20px; max-width: 500px; margin: auto; }

        .header-card { background: linear-gradient(135deg, var(--primary), #6366f1); color: white; padding: 25px; border-radius: 0 0 30px 30px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin: -20px -20px 20px -20px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); object-fit: cover; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: -25px 5px 15px 5px; }
        .stat-card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .stat-card small { color: #64748b; font-size: 10px; text-transform: uppercase; }
        .stat-card div { font-weight: bold; font-size: 15px; margin-top: 4px; }

        .rating-section { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .rating-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #f8fafc; padding-bottom: 4px; }
        .stars { color: var(--warning); font-weight: bold; }

        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 8px 12px rgba(0,0,0,0.05); }
        .on-trip-card { background: #eff6ff; border: 2px solid var(--primary); padding: 20px; border-radius: 20px; text-align: center; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-secondary { background: #64748b; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .review-box { background: #fff7ed; border: 1px solid #fdba74; padding: 15px; border-radius: 15px; margin-top: 20px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="registration-screen">
    <div style="text-align: center; margin-top: 40px;">
        <h2 style="color: var(--primary);">Pendaftaran Driver</h2>
        <input type="text" id="reg-nama" placeholder="Nama Lengkap">
        <input type="number" id="reg-nik" placeholder="Nomor NIK">
        <input type="text" id="reg-plat" placeholder="Nomor Plat (E 1234 YX)">
        <input type="text" id="reg-motor" placeholder="Jenis Motor (NMAX, Vario, dll)">
        <button class="btn-main" onclick="daftarDriver()">DAFTAR SEKARANG</button>
    </div>
</div>

<div id="main-dashboard">
    <div class="header-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://cdn-icons-png.flaticon.com/512/714/714424.png" class="profile-img">
            <div>
                <h3 id="dash-nama" style="margin:0">Memuat...</h3>
                <small id="dash-motor">Sinkronisasi data...</small>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>Bulan Ini</small><div id="stat-order-1">0</div></div>
        <div class="stat-card"><small>Pendapatan</small><div id="stat-duit-1" style="color: var(--success)">Rp 0</div></div>
    </div>

    <div class="rating-section">
        <div class="rating-item"><span>🚀 Kecepatan</span> <span class="stars" id="star-kecepatan">★★★★★</span></div>
        <div class="rating-item"><span>🎯 Ketelitian</span> <span class="stars" id="star-ketelitian">★★★★★</span></div>
        <div class="rating-item"><span>🛡️ Kepercayaan</span> <span class="stars" id="star-kepercayaan">★★★★★</span></div>
        <div class="rating-item"><span>😊 Kesopanan</span> <span class="stars" id="star-kesopanan">★★★★★</span></div>
        <div class="rating-item"><span>❤️ Kepuasan</span> <span class="stars" id="star-kepuasan">★★★★★</span></div>
    </div>

    <div id="order-section">
        <h4 id="order-title">📦 Orderan Masuk</h4>
        <div id="order-list">Mencari orderan aktif...</div>
    </div>
    
    <div id="review-container"></div>
</div>

<script>
    const DB_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    let myNik = localStorage.getItem('driver_nik');
    let isTripActive = false;

    if (myNik) { muatData(); } else { document.getElementById('registration-screen').style.display = 'block'; }

    async function daftarDriver() {
        const n = document.getElementById('reg-nama').value, nik = document.getElementById('reg-nik').value, p = document.getElementById('reg-plat').value, m = document.getElementById('reg-motor').value;
        if(!n || !nik) return alert("Lengkapi data!");
        const payload = { nama:n, nik:nik, plat:p, motor:m, status_donasi:"active", stats:{kecepatan:5, ketelitian:5, kepercayaan:5, kesopanan:5, kepuasan:5}, history:{bulan_1:{order:0, pendapatan:0}, bulan_2:{order:0, pendapatan:0}, bulan_3:{order:0, pendapatan:0}}, last_active_month: `${new Date().getFullYear()}-${new Date().getMonth()+1}` };
        await fetch(`${DB_URL}/drivers/${nik}.json`, { method: 'PUT', body: JSON.stringify(payload) });
        localStorage.setItem('driver_nik', nik);
        location.reload();
    }

    async function muatData() {
        const res = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await res.json();
        if(!d) return;

        document.getElementById('main-dashboard').style.display = 'block';
        document.getElementById('dash-nama').innerText = d.nama;
        document.getElementById('dash-motor').innerText = `${d.motor} (${d.plat})`;
        document.getElementById('stat-order-1').innerText = d.history.bulan_1.order;
        document.getElementById('stat-duit-1').innerText = "Rp " + (d.history.bulan_1.pendapatan || 0).toLocaleString();

        const s = (v) => "★".repeat(v || 5) + "☆".repeat(5-(v || 5));
        document.getElementById('star-kecepatan').innerText = s(d.stats.kecepatan);
        document.getElementById('star-ketelitian').innerText = s(d.stats.ketelitian);
        document.getElementById('star-kepercayaan').innerText = s(d.stats.kepercayaan);
        document.getElementById('star-kesopanan').innerText = s(d.stats.kesopanan);
        document.getElementById('star-kepuasan').innerText = s(d.stats.kepuasan);

        // Pantau Ulasan (Muncul setelah 5 menit ulasan dibuat)
        if(d.ulasan_buruk) cekUlasanDelayed(d.ulasan_buruk);

        muatOrderan();
        setInterval(muatOrderan, 4000); 
    }

    function cekUlasanDelayed(teks) {
        // Simulasi delay 5 menit (300.000ms) agar tidak terjadi gesekan di lokasi
        setTimeout(() => {
            document.getElementById('review-container').innerHTML = `
                <div class="review-box">
                    <small style="color:#9a3412; font-weight:bold;">💬 ULASAN BARU (DITERIMA 5 MENIT LALU)</small>
                    <p style="font-size:13px; font-style:italic; margin:5px 0;">"${teks}"</p>
                </div>`;
        }, 300000); 
    }

    async function muatOrderan() {
        if (isTripActive) return;

        try {
            const res = await fetch(`${DB_URL}/orders.json`);
            const data = await res.json();
            const list = document.getElementById('order-list');
            const sekarang = new Date().getTime();

            if (!data) { list.innerHTML = "<p style='color:grey; font-size:12px;'>Belum ada orderan masuk.</p>"; return; }

            let html = "";
            for (const id in data) {
                const o = data[id];
                
                // HAPUS OTOMATIS JIKA > 5 MENIT
                if (sekarang - o.timestamp > 300000 && o.status === "mencari_driver") {
                    await fetch(`${DB_URL}/orders/${id}.json`, { method: 'DELETE' });
                    continue;
                }

                if (o.status === "mencari_driver") {
                    html += `
                    <div class="order-card">
                        <b>📍 Tujuan: ${o.tujuan}</b><br>
                        <small>Jarak: ${o.jarak} km • Harga: Rp ${o.upah.toLocaleString()}</small>
                        <input type="number" id="nego-${id}" placeholder="Nego harga? (Opsional)">
                        <button class="btn-main" onclick="lamarJob('${id}', ${o.upah})">AMBIL ORDER</button>
                    </div>`;
                }
            }
            list.innerHTML = html || "<p style='color:grey;'>Menunggu orderan baru...</p>";
        } catch (e) { console.error("Sync Error"); }
    }

    async function lamarJob(orderId, hargaAsli) {
        const nego = document.getElementById(`nego-${orderId}`).value || hargaAsli;
        const resD = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const prof = await resD.json();

        await fetch(`${DB_URL}/orders/${orderId}/tawaran.json`, { 
            method: 'POST', 
            body: JSON.stringify({ nama_driver: prof.nama, driver_nik: myNik, plat_nomor: prof.plat, harga_tawar: parseInt(nego) }) 
        });

        const btn = document.querySelector(`#nego-${orderId}`).nextElementSibling;
        btn.innerText = "MENUNGGU USER..."; btn.disabled = true;

        const cek = setInterval(async () => {
            const r = await fetch(`${DB_URL}/orders/${orderId}.json`);
            const order = await r.json();
            if(!order) { clearInterval(cek); location.reload(); }

            if(order.status === "diambil") {
                clearInterval(cek);
                if(order.driver_nik === myNik) { panelTripAktif(order, orderId, nego); } 
                else { alert("User memilih driver lain."); location.reload(); }
            }
        }, 3000);
    }

    function panelTripAktif(order, orderId, hargaFix) {
        isTripActive = true;
        document.getElementById('order-title').innerText = "🚀 PERJALANAN AKTIF";
        document.getElementById('order-list').innerHTML = `
            <div class="on-trip-card">
                <p style="margin:0 0 10px 0;">Menuju: <b>${order.tujuan}</b></p>
                <button class="btn-main" onclick="window.open('https://www.google.com/maps?q=${order.jemput_lat},${order.jemput_lon}')">BUKA MAPS (JEMPUT)</button>
                <button class="btn-secondary" onclick="selesaiTrip('${orderId}', ${hargaFix})">SELESAI MENGANTAR</button>
            </div>`;
    }

    async function selesaiTrip(orderId, harga) {
        if(!confirm("Pastikan Anda sudah sampai di tujuan?")) return;
        
        // Update Pendapatan di DB
        const resD = await fetch(`${DB_URL}/drivers/${myNik}.json`);
        const d = await resD.json();
        
        const newOrder = (d.history.bulan_1.order || 0) + 1;
        const newDuit = (d.history.bulan_1.pendapatan || 0) + parseInt(harga);

        await fetch(`${DB_URL}/drivers/${myNik}/history/bulan_1.json`, {
            method: 'PATCH',
            body: JSON.stringify({ order: newOrder, pendapatan: newDuit })
        });

        alert("Trip Selesai! Pendapatan telah ditambahkan.");
        location.reload(); // Kembali ke dashboard awal
    }
</script>
</body>
                                                              </html>
