<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | ACTIVE MISSION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffff;
            --bg-main: #050505;
            --bg-card: #0a0a0a;
            --border-color: #222;
            --text-main: #fff;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { background: var(--bg-main); color: var(--text-main); margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }

        header {
            padding: 15px; border-bottom: 1px solid var(--border-color); background: var(--bg-card);
            display: flex; justify-content: space-between; align-items: center;
        }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg.me { align-self: flex-end; background: var(--neon-pink); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .msg-sender { font-size: 9px; opacity: 0.7; margin-bottom: 3px; display: block; font-family: var(--font-terminal); }

        .chat-input-area {
            padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border-color);
            display: flex; gap: 10px;
        }
        .input-field { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px; outline: none; }
        
        .btn-send { background: var(--neon-cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        /* Action Modal */
        #finish-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; display: none;
            justify-content: center; align-items: center; text-align: center;
        }
        .modal-card { background: #0a0a0a; border: 1px solid var(--neon-cyan); padding: 30px; width: 80%; }
        .btn-choice { width: 100%; padding: 15px; margin-top: 10px; border: none; font-weight: bold; cursor: pointer; font-family: var(--font-terminal); }
    </style>
</head>
<body>

<header>
    <div>
        <small class="text-neon-pink" style="color:var(--neon-pink); font-family:var(--font-terminal); font-size:10px;">MISSION ON PROGRESS</small>
        <div id="mTitle" style="font-weight:bold; font-size:14px;">---</div>
    </div>
    <button onclick="confirmComplete()" style="background:var(--neon-cyan); border:none; padding:8px 12px; border-radius:4px; font-weight:bold; font-size:11px;">COMPLETE</button>
</header>

<div id="chat-box">
    </div>

<div class="chat-input-area">
    <input type="text" id="chatInput" class="input-field" placeholder="Kirim pesan ke rekan misi...">
    <button class="btn-send" onclick="sendMessage()">➤</button>
</div>

<div id="finish-modal">
    <div class="modal-card">
        <h3 class="text-neon-cyan" style="color:var(--neon-cyan)">MISSION COMPLETED</h3>
        <p style="font-size:13px; color:#888;">Bagaimana performa rekan Anda dalam misi ini?</p>
        <button class="btn-choice" style="background:var(--neon-pink); color:white;" onclick="goToRating()">BERI PENILAIAN</button>
        <button class="btn-choice" style="background:transparent; color:#555; border:1px solid #333;" onclick="skipRating()">SKIP (KEMBALI KE HOME)</button>
    </div>
</div>

<script>
    const mId = localStorage.getItem('active_mission_id');
    const server = localStorage.getItem('active_mission_server');
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    
    // Identitas Pengirim
    const myNick = session ? session.nick : "Requester";

    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initMission() {
        if(!mId) return window.location.href = "index.html";

        // Load Mission Info
        db.ref(`missions/${server}/${mId}`).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;
            document.getElementById('mTitle').innerText = m.title;

            // Jika status berubah jadi finished (oleh pihak sebelah)
            if(m.status === "finished") {
                document.getElementById('finish-modal').style.display = 'flex';
            }
        });

        // Load Chat
        db.ref(`missions/${server}/${mId}/chats`).on('child_added', (snap) => {
            const c = snap.val();
            const isMe = c.sender === myNick;
            const chatBox = document.getElementById('chat-box');
            
            const msgHtml = `
                <div class="msg ${isMe ? 'me' : 'them'}">
                    <span class="msg-sender">${c.sender}</span>
                    ${c.text}
                </div>
            `;
            chatBox.innerHTML += msgHtml;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;

        await db.ref(`missions/${server}/${mId}/chats`).push({
            sender: myNick,
            text: input.value,
            time: Date.now()
        });
        input.value = "";
    }

    async function confirmComplete() {
        if(!confirm("Yakin misi telah selesai 100%?")) return;
        
        await db.ref(`missions/${server}/${mId}`).update({ status: "finished" });
    }

    function goToRating() {
        window.location.href = "rating.html";
    }

    function skipRating() {
        localStorage.removeItem('active_mission_id');
        window.location.href = session ? "dashboard.html" : "index.html";
    }

    initMission();
</script>
</body>
</html>
