<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION EVALUATION</title>
    <style>
        :root { --neon: #00ffff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #111; padding: 30px 20px; border-radius: 24px; border: 1px solid #222; width: 90%; max-width: 380px; text-align: center; }
        .metric { margin: 20px 0; text-align: left; background: #000; padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; }
        .metric label { font-size: 10px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .stars { font-size: 30px; margin-top: 8px; display: flex; gap: 8px; }
        .star { color: #222; cursor: pointer; transition: 0.2s; }
        .star.active { color: #ffbb33; text-shadow: 0 0 10px rgba(255,187,51,0.5); }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #222; padding: 12px; border-radius: 12px; height: 70px; margin-top: 10px; outline: none; }
        button { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0;">Mission Clear</h2>
    <p id="targetName" style="color:#555; font-size:13px; margin: 5px 0 20px;">Menilai rekan...</p>
    
    <div class="metric">
        <label id="l1">Kualitas Kerja</label>
        <div class="stars" id="m1">
            <span class="star" onclick="set(1, 'm1')">★</span><span class="star" onclick="set(2, 'm1')">★</span><span class="star" onclick="set(3, 'm1')">★</span><span class="star" onclick="set(4, 'm1')">★</span><span class="star" onclick="set(5, 'm1')">★</span>
        </div>
    </div>

    <div class="metric">
        <label id="l2">Waktu Respon</label>
        <div class="stars" id="m2">
            <span class="star" onclick="set(1, 'm2')">★</span><span class="star" onclick="set(2, 'm2')">★</span><span class="star" onclick="set(3, 'm2')">★</span><span class="star" onclick="set(4, 'm2')">★</span><span class="star" onclick="set(5, 'm2')">★</span>
        </div>
    </div>

    <textarea id="comment" placeholder="Berikan kesan singkat..."></textarea>
    <button onclick="submit()">KIRIM PENILAIAN</button>
</div>

<script>
    const data = JSON.parse(localStorage.getItem('rating_target'));
    let scores = { m1: 0, m2: 0 };

    if(data) {
        document.getElementById('targetName').innerText = "Target: " + data.target;
        if(data.role === "adventurer") {
            document.getElementById('l1').innerText = "Kesopanan Requester";
            document.getElementById('l2').innerText = "Kejelasan Lokasi/Info";
        }
    }

    function set(n, mId) {
        scores[mId] = n;
        const stars = document.getElementById(mId).querySelectorAll('.star');
        stars.forEach((s, i) => s.classList.toggle('active', i < n));
    }

    function submit() {
        if(!scores.m1 || !scores.m2) return alert("Mohon isi semua penilaian!");
        alert("Penilaian Terkirim!");
        
        // Pembersihan Sesi
        localStorage.removeItem('on_contract_id');
        localStorage.removeItem('active_contract_id');
        localStorage.removeItem('rating_target');

        // NAVIGASI PULANG
        if(data && data.role === "adventurer") {
            window.location.href = "dashboard.html"; // Adventurer kembali ke kantor
        } else {
            window.location.href = "index.html"; // Requester kembali ke home
        }
    }
</script>
</body>
</html>
