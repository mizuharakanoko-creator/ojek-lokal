<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RATE YOUR EXPERIENCE</title>
    <style>
        :root { --neon: #00ffff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #222; max-width: 350px; margin: auto; }
        .stars { font-size: 35px; margin: 20px 0; }
        .star { color: #333; cursor: pointer; transition: 0.2s; }
        .star.active { color: #ffbb33; text-shadow: 0 0 8px #ffbb33; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2 id="title">Selesaikan Feedback</h2>
        <p id="targetName" style="color: #888; font-size: 14px;"></p>
        
        <div class="stars">
            <span class="star" onclick="setStar(1)">★</span>
            <span class="star" onclick="setStar(2)">★</span>
            <span class="star" onclick="setStar(3)">★</span>
            <span class="star" onclick="setStar(4)">★</span>
            <span class="star" onclick="setStar(5)">★</span>
        </div>

        <textarea id="comment" placeholder="Tulis kesan Anda..."></textarea>
        <button onclick="submit()">SUBMIT RATING</button>
    </div>

<script>
    const data = JSON.parse(localStorage.getItem('rating_target'));
    let score = 0;

    if(data) {
        document.getElementById('targetName').innerText = "Menilai: " + data.target;
    }

    function setStar(n) {
        score = n;
        const stars = document.querySelectorAll('.star');
        stars.forEach((s, i) => s.classList.toggle('active', i < n));
    }

    function submit() {
        if(score === 0) return alert("Pilih bintang dulu!");
        alert("Terima kasih! Reputasi " + data.target + " telah diperbarui.");
        
        // Cleanup localStorage
        localStorage.removeItem('on_contract_id');
        localStorage.removeItem('active_contract_id');
        localStorage.removeItem('rating_target');
        
        window.location.href = "index.html";
    }
</script>
</body>
</html>
