<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MISSION COMPLETE | RATING</title>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .rating-box { max-width: 400px; margin: auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; }
        .stars { font-size: 40px; margin: 20px 0; cursor: pointer; }
        .star { color: #333; transition: 0.3s; }
        .star.active { color: #ffbb33; text-shadow: 0 0 10px #ffbb33; }
        button { background: var(--neon); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="rating-box">
        <h1 style="color: var(--neon);">MISSION SUCCESS!</h1>
        <p id="summary">Terima kasih telah menggunakan layanan kami.</p>
        
        <div class="stars" id="starGrade">
            <span class="star" onclick="setRating(1)">★</span>
            <span class="star" onclick="setRating(2)">★</span>
            <span class="star" onclick="setRating(3)">★</span>
            <span class="star" onclick="setRating(4)">★</span>
            <span class="star" onclick="setRating(5)">★</span>
        </div>

        <textarea id="comment" placeholder="Berikan komentar singkat..." style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:10px; border-radius:5px; height:80px;"></textarea>
        
        <button onclick="submitRating()">SUBMIT FEEDBACK</button>
    </div>

<script>
    const missionData = JSON.parse(localStorage.getItem('last_mission_data'));
    let currentRating = 0;

    function setRating(n) {
        currentRating = n;
        const stars = document.querySelectorAll('.star');
        stars.forEach((s, index) => {
            s.classList.toggle('active', index < n);
        });
    }

    function submitRating() {
        if(currentRating === 0) return alert("Silakan pilih rating bintang!");
        
        // Di sini Anda bisa menambahkan logika push rating ke tabel 'history' atau 'reputation' di Shard
        alert("Terima kasih! Reputasi telah diperbarui.");
        
        // Bersihkan LocalStorage sisa misi
        localStorage.removeItem('on_mission_id');
        localStorage.removeItem('on_contract_id');
        localStorage.removeItem('active_mission_id');
        localStorage.removeItem('active_contract_id');
        
        window.location.href = "index.html";
    }
</script>
</body>
</html>
