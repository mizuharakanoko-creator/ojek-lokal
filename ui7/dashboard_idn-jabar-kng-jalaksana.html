<!DOCTYPE html>
<html>
<head>
    <title>PICK ME | JALAKSANA TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="shard-config.js"></script>
    <script src="dashboard-core.js"></script>

    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        header { border-bottom: 2px solid #ff0055; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h2 id="areaTitle">AREA: ---</h2>
        <small id="userNick">ADVENTURER: ---</small>
    </header>

    <div id="missionList">MENGHUBUNGKAN KE SHARD...</div>

    <script>
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        
        // Pastikan user mendarat di shard yang benar
        const currentShard = "IDN-JABAR-KNG-JALAKSANA";
        
        if (!session || session.shard_id !== currentShard) {
            alert("Akses Ilegal! Area tidak sesuai.");
            window.location.href = "router.html";
        } else {
            document.getElementById('areaTitle').innerText = "AREA: " + currentShard;
            document.getElementById('userNick').innerText = "ADVENTURER: " + session.nick;

            // Jalankan mesin utama dari dashboard-core.js
            const config = SHARD_MASTER[currentShard];
            startDashboard(config, session);
        }
    </script>
</body>
</html>
