<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVENTURER DASHBOARD | GUILD TERMINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Stats Bar */
        .stats-bar { 
            background: #111; padding: 15px; display: flex; justify-content: space-around; 
            border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10;
        }
        .stat-item { text-align: center; }
        .stat-item small { display: block; font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-item b { color: var(--neon); font-size: 16px; }

        /* Mission List */
        .feed { padding: 20px; max-width: 500px; margin: auto; }
        .mission-card { 
            background: var(--card); border: 1px solid #222; border-radius: 12px; 
            padding: 15px; margin-bottom: 15px; transition: 0.3s;
        }
        .mission-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 4px; background: #222; color: var(--neon); text-transform: uppercase; }
        .fare-tag { color: #ffbb33; font-weight: bold; }

        /* Modal Invitation */
        #inviteModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-box { 
            background: #000; border: 2px solid var(--neon); padding: 30px; 
            border-radius: 15px; text-align: center; width: 85%; max-width: 350px;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        .timer-ring { font-size: 40px; color: var(--pink); font-weight: bold; margin: 15px 0; font-family: monospace; }
        .btn-accept { background: var(--neon); color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 16px; }
        .btn-reject { background: none; border: 1px solid #444; color: #666; padding: 10px; margin-top: 20px; cursor: pointer; font-size: 11px; width: 100%; }

        /* Bidding Controls */
        .bid-input { margin-top: 15px; display: flex; gap: 8px; }
        .bid-input input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; }
        .btn-bid { background: var(--pink); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-item"><small>Nick</small><b id="st-nick">-</b></div>
        <div class="stat-item"><small>Stamina</small><b id="st-vit">-</b></div>
        <div class="stat-item"><small>Rank</small><b id="st-rank">-</b></div>
    </div>

    <div class="feed">
        <h4 style="color: var(--pink); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;">Quest Board</h4>
        <div id="missionList">Syncing with Shard...</div>
    </div>

    <div id="inviteModal">
        <div class="modal-box">
            <h2 style="color: var(--neon); margin: 0; font-size: 18px;">CONTRACT OFFERED!</h2>
            <p style="font-size: 11px; color: #555; margin-top: 5px;" id="invContractId">ID: -</p>
            <p style="font-size: 13px; color: #aaa; margin: 15px 0 5px;">Deal Price:</p>
            <div style="font-size: 28px; color: #ffbb33; font-weight: bold;" id="invPrice">Rp 0</div>
            <div class="timer-ring" id="invTimer">30</div>
            <button class="btn-accept" onclick="acceptMission()">ACCEPT CONTRACT</button>
            <button class="btn-reject" onclick="rejectMission()">REJECT (Sanksi -10 Stamina)</button>
        </div>
    </div>

<script>
    // 1. SESSION & INIT
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    if(!session) window.location.href = "login.html";

    document.getElementById('st-nick').innerText = session.nick.toUpperCase();
    
    const myShard = session.shard_id;
    const config = SHARD_MASTER[myShard];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let activeInvite = null;
    let inviteCounter = 30;
    let invInterval;

    // 2. STATS LISTENER
    db.ref(`adventurer-${myShard.toLowerCase()}/${session.nick}`).on('value', snap => {
        if(snap.exists()){
            const d = snap.val();
            document.getElementById('st-vit').innerText = d.vitality;
            document.getElementById('st-rank').innerText = "LV." + d.level;
        }
    });

    // 3. MISSION FEED (Hanya Misi Aktif)
    db.ref(`missions/${myShard}`).orderByChild('status').equalTo('posted').on('value', snap => {
        const list = document.getElementById('missionList');
        list.innerHTML = "";
        
        if(!snap.exists()) {
            list.innerHTML = "<p style='color:#333; text-align:center; margin-top:20px;'>No missions available in this area.</p>";
            return;
        }

        snap.forEach(child => {
            const m = child.val();
            list.innerHTML += `
                <div class="mission-card">
                    <div class="mission-header">
                        <span class="badge">${m.category}</span>
                        <span class="fare-tag">Est: Rp ${m.fare.toLocaleString()}</span>
                    </div>
                    <div style="font-size:15px; font-weight:bold; color:var(--neon);">${m.start} → ${m.destination}</div>
                    <div style="font-size:11px; color:#666; margin-top:5px;">Requester: ${m.requester}</div>
                    <div class="bid-input">
                        <input type="number" id="price-${child.key}" placeholder="Your Bid (Rp)">
                        <button class="btn-bid" onclick="placeBid('${child.key}')">SEND BID</button>
                    </div>
                </div>
            `;
        });
    });

    // 4. PLACE BID LOGIC
    async function placeBid(mId) {
        const pInput = document.getElementById(`price-${mId}`);
        const bidPrice = parseInt(pInput.value);
        if(!bidPrice) return alert("Enter your bid price!");

        const vitRef = db.ref(`adventurer-${myShard.toLowerCase()}/${session.nick}/vitality`);
        const vitSnap = await vitRef.get();
        const currentVit = vitSnap.val();

        if(currentVit < 5) return alert("Not enough Stamina! (Need 5)");

        try {
            // Kurangi Stamina
            await vitRef.set(currentVit - 5);
            
            // Kirim Bid ke Shard Misi
            await db.ref(`missions/${myShard}/${mId}/bids/${session.nick}`).set({
                price: bidPrice,
                timestamp: Date.now(),
                rating: 5.0
            });

            alert("Bid Placed! Stamina -5");
            pInput.disabled = true;
        } catch (e) { alert("Error: " + e.message); }
    }

    // 5. INVITATION LISTENER (SINKRON DENGAN KONTRAK BARU)
    db.ref(`invitations/${session.nick}`).on('value', snap => {
        if(snap.exists()) {
            activeInvite = snap.val();
            
            // Tampilkan Info Kontrak di Modal
            document.getElementById('invContractId').innerText = "CONTRACT: " + activeInvite.contract_id;
            document.getElementById('invPrice').innerText = "Rp " + activeInvite.price.toLocaleString();
            
            showInviteModal();
        }
    });

    function showInviteModal() {
        document.getElementById('inviteModal').style.display = 'flex';
        inviteCounter = 30;
        document.getElementById('invTimer').innerText = inviteCounter;

        clearInterval(invInterval);
        invInterval = setInterval(() => {
            inviteCounter--;
            document.getElementById('invTimer').innerText = inviteCounter;
            if(inviteCounter <= 0) {
                clearInterval(invInterval);
                rejectMission(true); // Auto-reject jika waktu habis
            }
        }, 1000);
    }

    // 6. ACCEPT/REJECT LOGIC
    async function acceptMission() {
        if(!activeInvite) return;
        clearInterval(invInterval);

        try {
            // Update Status Misi di Shard agar Requester pindah ke Briefing
            await db.ref(`missions/${myShard}/${activeInvite.mission_id}`).update({
                status: "contracted"
            });

            // Update Status di Tabel Kontrak
            await db.ref(`contracts/${activeInvite.contract_id}`).update({
                status: "accepted"
            });

            // Bersihkan undangan
            await db.ref(`invitations/${session.nick}`).remove();
            
            // Simpan ID Kontrak untuk Briefing
            localStorage.setItem('on_contract_id', activeInvite.contract_id);
            localStorage.setItem('on_mission_id', activeInvite.mission_id);
            localStorage.setItem('active_shard', myShard);

            window.location.href = "briefing.html";
        } catch (e) { console.error(e); }
    }

    async function rejectMission(isAuto = false) {
        clearInterval(invInterval);
        document.getElementById('inviteModal').style.display = 'none';

        // Sanksi Stamina -10
        const vitRef = db.ref(`adventurer-${myShard.toLowerCase()}/${session.nick}/vitality`);
        const vitSnap = await vitRef.get();
        await vitRef.set(Math.max(0, vitSnap.val() - 10));

        // Hapus Undangan
        await db.ref(`invitations/${session.nick}`).remove();
        
        // Update Status Kontrak Jadi Rejected
        if(activeInvite) {
            await db.ref(`contracts/${activeInvite.contract_id}`).update({ status: "rejected" });
        }

        alert(isAuto ? "Time Out! Stamina -10" : "Contract Rejected! Stamina -10");
        activeInvite = null;
    }
</script>
</body>
</html>
