<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELEASE MISSION | DATA PUSAT</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal-config.js"></script>
    <script src="shard-router.js"></script>

    <style>
        :root { --neon: #00ffff; --bg: #050505; --card: #0f0f0f; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid #222; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .logo { font-weight: bold; font-size: 22px; color: var(--neon); text-align: center; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Status Box */
        .status-box { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .acc-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .wait { background: #440; color: #ff0; border: 1px solid #aa0; }
        .ready { background: #044; color: #0ff; border: 1px solid #0aa; }
        
        .addr-text { font-size: 13px; line-height: 1.6; color: #eee; }
        .addr-text b { color: var(--neon); }

        /* Form */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; letter-spacing: 1px; }
        input, select { width: 100%; background: #151515; border: 1px solid #252525; color: white; padding: 14px; border-radius: 10px; outline: none; font-size: 14px; }
        input:focus { border-color: var(--neon); }

        .btn-post { 
            width: 100%; padding: 18px; background: var(--neon); color: black; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; margin-top: 10px; font-size: 14px;
        }
        .btn-post:disabled { background: #222; color: #444; cursor: not-allowed; box-shadow: none; }
        
        #footer-note { font-size: 9px; color: #333; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">Release Mission</div>

        <div class="status-box">
            <div id="statusBadge" class="acc-badge wait">📡 Mengunci Satelit...</div>
            <div id="locationInfo" class="addr-text">Harap tunggu, sistem sedang mencocokkan koordinat Anda dengan Data Pusat Wilayah.</div>
        </div>

        <div class="input-group">
            <label>Kategori Kendaraan</label>
            <select id="mCat">
                <option value="MOTOR">MOTOR (RODA 2)</option>
                <option value="CAR">MOBIL (RODA 4)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Judul Misi / Pesanan</label>
            <input type="text" id="mTitle" placeholder="Contoh: Titip Seblak Padarek">
        </div>

        <div class="input-group">
            <label>Hadiah (Bounty Rp)</label>
            <input type="number" id="mPrice" placeholder="Contoh: 15000">
        </div>

        <button class="btn-post" id="btnAction" onclick="postMission()" disabled>Menunggu Akurasi < 20m</button>
        
        <div id="footer-note">Sistem Geofencing Aktif: Data Administratif Terkunci</div>
    </div>

<script>
    // Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(TERMINAL_MASTER["PENGATURAN_PUSAT"]);
    }
    const db = firebase.database();

    let sessionLoc = { lat: 0, lng: 0, kab: "KUNINGAN", kec: "", desa: "", zona: "", isValid: false };

    // Konfigurasi GPS
    const watchOptions = {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
    };

    function initAutoDetection() {
        const badge = document.getElementById('statusBadge');
        const info = document.getElementById('locationInfo');
        const btn = document.getElementById('btnAction');

        navigator.geolocation.watchPosition((pos) => {
            const acc = pos.coords.accuracy;
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // 1. Validasi Akurasi 20 Meter
            if (acc > 20) {
                badge.className = "acc-badge wait";
                badge.innerText = `📡 Akurasi: ${Math.round(acc)}m (Lemah)`;
                info.innerText = "Sinyal kurang presisi. Pastikan Anda berada di area terbuka agar lokasi desa tidak tertukar.";
                btn.disabled = true;
                sessionLoc.isValid = false;
                return;
            }

            // 2. Ambil Data dari Data Pusat (shard-router.js)
            const mapping = getInternalLocation(lat, lng);

            sessionLoc.lat = lat;
            sessionLoc.lng = lng;
            sessionLoc.kec = mapping.kec;
            sessionLoc.desa = mapping.desa;
            sessionLoc.zona = mapping.zona;
            sessionLoc.isValid = true;

            // 3. Update UI UI
            badge.className = "acc-badge ready";
            badge.innerText = `✅ Terkunci: ${Math.round(acc)}m`;
            
            info.innerHTML = `
                <b>WILAYAH:</b> KUNINGAN (ZONA ${sessionLoc.zona})<br>
                <b>AREA:</b> KEC. ${sessionLoc.kec} - ${sessionLoc.desa}<br>
                <small style="color:#0f0">Lokasi sinkron dengan Database Pusat.</small>
            `;

            btn.disabled = false;
            btn.innerText = "RELEASE MISSION";

        }, (err) => {
            badge.innerText = "❌ GPS ERROR";
            info.innerText = "Gagal mengakses GPS. Periksa izin lokasi di browser Anda.";
        }, watchOptions);
    }

    async function postMission() {
        if (!sessionLoc.isValid) return;

        const title = document.getElementById('mTitle').value;
        const price = document.getElementById('mPrice').value;
        const cat = document.getElementById('mCat').value;
        const btn = document.getElementById('btnAction');

        if (!title || !price) return alert("Lengkapi data misi dan hadiah!");

        btn.disabled = true;
        btn.innerText = "UPDATING DATABASE...";

        // Penamaan Tabel Panjang Sesuai Permintaan
        const tableName = `${cat}-${sessionLoc.kab}-${sessionLoc.zona}-${sessionLoc.kec}-${sessionLoc.desa}`;
        const missionId = `STR-${Date.now()}`;

        try {
            const fullPath = `${tableName}/${missionId}`;
            
            // Simpan ke Tabel Wilayah
            await db.ref(fullPath).set({
                id: missionId,
                title: title,
                price: price,
                status: "open",
                created_at: Date.now(),
                coords: { lat: sessionLoc.lat, lng: sessionLoc.lng }
            });

            // Simpan ke Index Global
            await db.ref(`terminal_misi/${sessionLoc.kab}/${missionId}`).set({
                id: missionId,
                tabel: tableName
            });

            localStorage.setItem('active_mission_path', fullPath);
            window.location.href = "mission_waiting.html";

        } catch (e) {
            alert("Firebase Error: " + e.message);
            btn.disabled = false;
        }
    }

    // Jalankan deteksi saat masuk
    initAutoDetection();
</script>
</body>
</html>
