<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELEASE MISSION | ULTRA ACCURACY</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal-config.js"></script>
    <script src="shard-router.js"></script>

    <style>
        :root { --neon: #00ffff; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid #222; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 20px; margin: 0; color: var(--neon); letter-spacing: 3px; text-transform: uppercase; }
        
        /* Status GPS */
        .gps-box { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; position: relative; overflow: hidden; }
        .acc-indicator { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 10px; }
        .searching { background: #550; color: #ff0; animation: blink 1s infinite; }
        .locked { background: #055; color: #0ff; }
        
        .loc-details { font-size: 13px; line-height: 1.5; }
        .loc-details b { color: var(--neon); }
        
        /* Form Inputs */
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
        input, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 14px; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); background: #222; }

        .btn-main { 
            width: 100%; padding: 18px; background: var(--neon); color: black; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; font-size: 14px; margin-top: 10px;
        }
        .btn-main:disabled { background: #222; color: #444; cursor: not-allowed; }
        
        @keyframes blink { 50% { opacity: 0.6; } }
        #debug { font-size: 9px; color: #333; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Release Mission</h1>
        </div>

        <div class="gps-box">
            <div id="accLabel" class="acc-indicator searching">📡 MENGUNCI SATELIT...</div>
            <div id="addrDisplay" class="loc-details">Mendapatkan koordinat hardware GPS...</div>
        </div>

        <div class="field">
            <label>Kategori</label>
            <select id="mCat">
                <option value="MOTOR">MOTOR (RODA 2)</option>
                <option value="CAR">MOBIL (RODA 4)</option>
            </select>
        </div>

        <div class="field">
            <label>Apa yang ingin dipesan?</label>
            <input type="text" id="mTitle" placeholder="Contoh: Titip Seblak di Padarek">
        </div>

        <div class="field">
            <label>Bounty / Hadiah (Rp)</label>
            <input type="number" id="mPrice" placeholder="Rp">
        </div>

        <button class="btn-main" id="btnRelease" onclick="publishMission()" disabled>MENUNGGU SINYAL AKURAT</button>
        
        <div id="debug">System: GPS High Accuracy Mode (Target < 20m)</div>
    </div>

<script>
    // 1. Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(TERMINAL_MASTER["PENGATURAN_PUSAT"]);
    }
    const db = firebase.database();

    let finalLoc = { lat: 0, lng: 0, kab: "KUNINGAN", kec: "", desa: "", zona: "", ready: false };

    // 2. Konfigurasi GPS Akurasi Tinggi
    const geoOptions = {
        enableHighAccuracy: true, 
        timeout: 30000,           
        maximumAge: 0             
    };

    function initGPS() {
        const label = document.getElementById('accLabel');
        const display = document.getElementById('addrDisplay');
        const btn = document.getElementById('btnRelease');

        navigator.geolocation.watchPosition(async (pos) => {
            const acc = pos.coords.accuracy;
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // Kunci di 20 meter sesuai permintaan Anda
            if (acc > 20) {
                label.className = "acc-indicator searching";
                label.innerText = `📡 SINYAL: ${Math.round(acc)}m (LEMAH)`;
                display.innerText = "Mencari titik lebih presisi. Harap jangan bergerak atau cari tempat terbuka.";
                btn.disabled = true;
                finalLoc.ready = false;
                return;
            }

            try {
                // 3. Ambil Nama Tempat dari Satelit (Reverse Geocoding)
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                const addr = data.address;

                // Data mentah dari satelit
                const rawKec = addr.district || addr.suburb || addr.town || addr.city_district || "KUNINGAN";
                const rawDesa = addr.village || addr.neighbourhood || addr.suburb || "DESA";

                // 4. Verifikasi & Sinkronisasi dengan shard-router.js
                const verified = getVerifiedLocation("KUNINGAN", rawKec, rawDesa);

                finalLoc.lat = lat;
                finalLoc.lng = lng;
                finalLoc.kec = verified.kec;
                finalLoc.desa = verified.desa;
                finalLoc.zona = verified.zona;
                finalLoc.ready = true;

                // Update UI
                label.className = "acc-indicator locked";
                label.innerText = `✅ TERKUNCI: ${Math.round(acc)}m`;
                display.innerHTML = `
                    <b>ZONA:</b> ${finalLoc.zona}<br>
                    <b>AREA:</b> KEC. ${finalLoc.kec} - ${finalLoc.desa}<br>
                    <small style="color:#0f0">Lokasi sinkron dengan Data Pusat.</small>
                `;

                btn.disabled = false;
                btn.innerText = "RELEASE MISSION";

            } catch (e) {
                display.innerText = "Koneksi internet tidak stabil untuk sinkronisasi alamat.";
            }

        }, (err) => {
            label.innerText = "❌ GPS ERROR";
            display.innerText = "Harap aktifkan GPS High Accuracy dan izinkan lokasi di browser.";
        }, geoOptions);
    }

    async function publishMission() {
        if (!finalLoc.ready) return;

        const title = document.getElementById('mTitle').value;
        const price = document.getElementById('mPrice').value;
        const cat = document.getElementById('mCat').value;
        const btn = document.getElementById('btnRelease');

        if (!title || !price) return alert("Mohon lengkapi judul misi dan hadiah!");

        btn.disabled = true;
        btn.innerText = "MENGIRIM...";

        // Penamaan Tabel Panjang Sesuai Format Anda
        const tableName = `${cat}-${finalLoc.kab}-${finalLoc.zona}-${finalLoc.kec}-${finalLoc.desa}`;
        const missionId = `STR-${Date.now()}`;

        try {
            const path = `${tableName}/${missionId}`;
            
            // Simpan ke Tabel Spesifik
            await db.ref(path).set({
                id: missionId,
                title: title,
                price: price,
                status: "open",
                created_at: Date.now(),
                coords: { lat: finalLoc.lat, lng: finalLoc.lng }
            });

            // Simpan ke Indeks Global
            await db.ref(`terminal_misi/${finalLoc.kab}/${missionId}`).set({
                id: missionId,
                tabel: tableName
            });

            localStorage.setItem('active_mission_path', path);
            window.location.href = "mission_waiting.html";

        } catch (e) {
            alert("Gagal: " + e.message);
            btn.disabled = false;
        }
    }

    // Jalankan deteksi otomatis
    initGPS();
</script>
</body>
</html>
