<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN GUILD | AUTO-ROUTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <style>
        :root { --neon: #00ffff; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { font-weight: bold; font-size: 24px; color: var(--neon); margin: 20px 0; text-shadow: 0 0 10px var(--neon); }
        
        #roleOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .role-card { background: var(--card); border: 1px solid #222; width: 100%; max-width: 320px; padding: 20px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; }
        
        #mainUI { width: 100%; max-width: 400px; display: none; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea, select { width: 100%; background: #111; border: 1px solid #222; color: white; padding: 14px; border-radius: 10px; outline: none; }
        
        .loc-box { background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px dashed #333; font-size: 12px; margin-bottom: 15px; color: #888; }
        .btn-post { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: var(--neon); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 var(--neon), .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 var(--neon), .5em 0 0 var(--neon); } }
    </style>
</head>
<body>

    <div id="roleOverlay">
        <div class="logo">IDENTITY CHECK</div>
        <div class="role-card" onclick="selectRole('stranger')"><h3>STRANGER</h3><p>Fast mission, no login [STR]</p></div>
        <div class="role-card" onclick="selectRole('citizen')"><h3>CITIZEN</h3><p>Registered account [CTZ]</p></div>
    </div>

    <div id="mainUI">
        <div class="logo">RELEASE MISSION</div>
        
        <div class="loc-box" id="locStatus">Mendeteksi Lokasi...</div>

        <div class="input-group">
            <label>Kategori</label>
            <select id="mCat">
                <option value="MOTOR">MOTOR</option>
                <option value="CAR">CAR</option>
            </select>
        </div>

        <div class="input-group">
            <label>Judul Misi</label>
            <input type="text" id="mTitle" placeholder="Apa yang Anda butuhkan?">
        </div>

        <div class="input-group">
            <label>Bounty (Rp)</label>
            <input type="number" id="mPrice" placeholder="Rp. 0">
        </div>

        <button class="btn-post" id="btnRelease" onclick="postMission()">RELEASE MISSION</button>
    </div>

<script>
    let userData = { nick: "Guest", type: "stranger", prefix: "STR" };
    let currentPos = { lat: 0, lng: 0, kab: "", kec: "", desa: "" };

    // 1. DETEKSI LOKASI OTOMATIS (ROUTER)
    function autoDetectLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                currentPos.lat = pos.coords.latitude;
                currentPos.lng = pos.coords.longitude;

                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentPos.lat}&lon=${currentPos.lng}`);
                    const data = await res.json();
                    const addr = data.address;
                    
                    // Routing Logic berdasarkan data dari OpenStreetMap
                    currentPos.kab = (addr.city || addr.regency || "UNKNOWN").toUpperCase().replace("KABUPATEN ", "");
                    currentPos.kec = (addr.suburb || addr.district || addr.village || "UNKNOWN").toUpperCase();
                    currentPos.desa = (addr.village || addr.neighbourhood || "UNKNOWN").toUpperCase();

                    document.getElementById('locStatus').innerHTML = `
                        📍 <span style="color:var(--neon)">${currentPos.kab}</span><br>
                        🏘️ ${currentPos.kec} - ${currentPos.desa}
                    `;
                } catch (e) {
                    document.getElementById('locStatus').innerText = "Gagal memetakan lokasi secara detail.";
                }
            });
        }
    }

    function selectRole(role) {
        if (role === 'citizen') {
            const session = JSON.parse(localStorage.getItem('pickme_session'));
            if (!session) return alert("Silakan login dulu!");
            userData = { nick: session.nick, type: "citizen", prefix: "CTZ" };
        }
        document.getElementById('roleOverlay').style.display = "none";
        document.getElementById('mainUI').style.display = "block";
        autoDetectLocation();
    }

    // 2. LOGIKA POSTING DENGAN ROUTER SHARD & TABEL
    async function postMission() {
        const title = document.getElementById('mTitle').value;
        const price = document.getElementById('mPrice').value;
        const cat = document.getElementById('mCat').value;
        const btn = document.getElementById('btnRelease');

        if (!title || !price || !currentPos.kab) return alert("Lengkapi data dan tunggu lokasi!");

        btn.disabled = true;
        btn.innerText = "ROUTING DATA...";

        // Penentuan Shard & Path (Router)
        const targetShard = (currentPos.kab === "KUNINGAN") ? "S1" : "S2"; 
        const missionId = `${userData.prefix}-${Date.now()}`;
        
        // Struktur Tabel Terpisah sesuai keinginan Anda:
        // Tabel Utama di Shard: [KATEGORI]/[KABUPATEN]/[KECAMATAN]/[ID]
        const pathMisi = `${cat}/${currentPos.kab}/${currentPos.kec}/${missionId}`;

        try {
            // A. Regional Shard Connection
            const shardConfig = SHARD_MASTER[targetShard];
            const shardApp = firebase.initializeApp(shardConfig, "REGIONAL");
            const shardDb = shardApp.database();

            // B. Terminal Indexing (Agar Adventurer mudah search)
            const termConfig = SHARD_MASTER["TERMINAL"];
            const termApp = firebase.initializeApp(termConfig, "TERMINAL");
            const termDb = termApp.database();

            const payload = {
                id: missionId,
                title: title,
                price: price,
                requester: userData.nick,
                loc: { lat: currentPos.lat, lng: currentPos.lng, area: currentPos.kec },
                status: "open",
                shard: targetShard,
                path: pathMisi
            };

            // Simpan di Tabel Kategori Shard
            await shardDb.ref(`active_missions/${pathMisi}`).set(payload);

            // Simpan di Terminal Pusat (Router Search)
            await termDb.ref(`terminal_index/${currentPos.kab}/${currentPos.kec}/${missionId}`).set({
                id: missionId,
                title: title,
                cat: cat,
                shard: targetShard,
                path: pathMisi
            });

            localStorage.setItem('active_mission_path', pathMisi);
            localStorage.setItem('active_shard', targetShard);

            alert("Misi berhasil dilepas ke router " + currentPos.kec);
            window.location.href = "mission_waiting.html";

        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "RELEASE MISSION";
        }
    }
</script>
</body>
</html>
