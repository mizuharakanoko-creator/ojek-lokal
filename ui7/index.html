<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN GUILD | AUTO ROUTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal-config.js"></script>
    <script src="shard-router.js"></script>

    <style>
        :root { --neon: #00ffff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin: 20px 0; }
        .loc-box { background: #111; border: 1px dashed #333; padding: 15px; border-radius: 10px; width: 100%; max-width: 400px; font-size: 12px; margin-bottom: 20px; }
        .input-group { width: 100%; max-width: 400px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: white; border-radius: 8px; }
        .btn { width: 100%; max-width: 400px; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 class="logo">RELEASE MISSION</h2>

    <div class="loc-box" id="locDisplay">📡 Mencari Titik Koordinat...</div>

    <div class="input-group">
        <select id="mCat">
            <option value="MOTOR">🏍️ MOTOR</option>
            <option value="CAR">🚗 MOBIL</option>
        </select>
    </div>

    <div class="input-group">
        <input type="text" id="mTitle" placeholder="Judul Misi (Contoh: Titip Seblak)">
    </div>

    <div class="input-group">
        <input type="number" id="mPrice" placeholder="Bounty (Hadiah Rp)">
    </div>

    <button class="btn" id="btnRelease" onclick="postMission()">RELEASE MISSION</button>

<script>
    // Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(TERMINAL_MASTER["PENGATURAN_PUSAT"]);
    }
    const db = firebase.database();

    let locData = { kab: "", kec: "", desa: "", zona: "" };

    // AUTO DETECT GPS & ADDRESS
    function initGPS() {
        if (!navigator.geolocation) return alert("GPS Tidak Didukung!");

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            try {
                // Mengambil data alamat dari koordinat (OpenStreetMap API)
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                const addr = data.address;

                // Ekstraksi Data Alamat
                locData.kab = (addr.city || addr.regency || "KUNINGAN").toUpperCase().replace("KABUPATEN ", "");
                locData.kec = (addr.district || addr.suburb || addr.town || addr.city_district || "KRAMATMULYA").toUpperCase();
                locData.desa = (addr.village || addr.neighbourhood || addr.suburb || "DESA").toUpperCase();
                
                // Tentukan Zona Otomatis dari shard-router.js
                locData.zona = getZonaWilayah(locData.kab, locData.kec);

                document.getElementById('locDisplay').innerHTML = `
                    📍 <b>KAB:</b> ${locData.kab}<br>
                    🧭 <b>ZONA:</b> ${locData.zona}<br>
                    🏘️ <b>KEC:</b> ${locData.kec}<br>
                    🏠 <b>DESA:</b> ${locData.desa}
                `;
            } catch (e) {
                document.getElementById('locDisplay').innerText = "❌ Gagal memetakan alamat.";
            }
        }, () => {
            alert("Harap aktifkan Lokasi/GPS Anda!");
        });
    }

    async function postMission() {
        const title = document.getElementById('mTitle').value;
        const price = document.getElementById('mPrice').value;
        const cat = document.getElementById('mCat').value;
        const btn = document.getElementById('btnRelease');

        if (!title || !price || !locData.kab) return alert("Data lokasi belum siap!");

        btn.disabled = true;
        btn.innerText = "UPDATING DATABASE...";

        // PEMBUATAN NAMA TABEL SESUAI PERMINTAAN:
        // format: KATEGORI-KABUPATEN-ZONA-KECAMATAN-DESA
        const tableName = `${cat}-${locData.kab}-${locData.zona}-${locData.kec}-${locData.desa}`;
        const missionId = `STR-${Date.now()}`;

        try {
            // Simpan ke "Tabel" spesifik
            await db.ref(`${tableName}/${missionId}`).set({
                id: missionId,
                title: title,
                price: price,
                status: "open",
                created_at: Date.now(),
                path: tableName
            });

            // Simpan ke terminal_misi untuk tracking global
            await db.ref(`terminal_misi/${locData.kab}/${missionId}`).set({
                id: missionId,
                tabel: tableName,
                status: "open"
            });

            localStorage.setItem('active_mission_path', `${tableName}/${missionId}`);
            alert("Misi Berhasil Dirilis!");
            window.location.href = "mission_waiting.html";
        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
        }
    }

    // Jalankan GPS saat halaman dibuka
    initGPS();
</script>
</body>
</html>
