<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELEASE MISSION | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal-config.js"></script>
    <script src="shard-router.js"></script>

    <style>
        :root { --neon: #00ffff; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { font-weight: bold; font-size: 22px; color: var(--neon); margin: 20px 0; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon); }
        #mainUI { width: 100%; max-width: 400px; }
        .loc-box { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px dashed #333; font-size: 11px; margin-bottom: 20px; line-height: 1.5; color: #aaa; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; background: #111; border: 1px solid #222; color: white; padding: 14px; border-radius: 10px; outline: none; }
        .btn-post { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="mainUI">
        <div class="logo">RELEASE MISSION</div>
        <div class="loc-box" id="locStatus">📡 Mendeteksi Lokasi...</div>

        <div class="input-group">
            <label>Kategori</label>
            <select id="mCat">
                <option value="MOTOR">MOTOR</option>
                <option value="CAR">CAR</option>
            </select>
        </div>

        <div class="input-group">
            <label>Judul Misi</label>
            <input type="text" id="mTitle" placeholder="Titip apa?">
        </div>

        <div class="input-group">
            <label>Harga (Bounty)</label>
            <input type="number" id="mPrice" placeholder="Rp 0">
        </div>

        <button class="btn-post" id="btnRelease" onclick="postMission()">RELEASE MISSION</button>
    </div>

<script>
    // Inisialisasi Firebase langsung dari terminal-config (Satu Database Utama)
    if (!firebase.apps.length) {
        firebase.initializeApp(TERMINAL_MASTER["PENGATURAN_PUSAT"]);
    }
    const db = firebase.database();

    let currentPos = { lat: 0, lng: 0, kab: "", kec: "", desa: "" };

    // Mendeteksi Lokasi Otomatis
    function detectLocation() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            currentPos.lat = pos.coords.latitude;
            currentPos.lng = pos.coords.longitude;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentPos.lat}&lon=${currentPos.lng}`);
                const data = await res.json();
                const addr = data.address;
                
                // Normalisasi Data
                currentPos.kab = (addr.city || addr.regency || "KUNINGAN").toUpperCase().replace("KABUPATEN ", "").trim();
                currentPos.kec = (addr.district || addr.suburb || "JALAKSANA").toUpperCase().trim();
                currentPos.desa = (addr.village || addr.neighbourhood || "PADAREK").toUpperCase().trim();

                document.getElementById('locStatus').innerHTML = `📍 ${currentPos.kab} <br> 🏘️ ${currentPos.kec} - ${currentPos.desa}`;
            } catch (e) { console.error("Geocoding Error"); }
        });
    }

    async function postMission() {
        const title = document.getElementById('mTitle').value;
        const price = document.getElementById('mPrice').value;
        const cat = document.getElementById('mCat').value;
        const btn = document.getElementById('btnRelease');

        if (!title || !price || !currentPos.kab) return alert("Tunggu lokasi terdeteksi!");

        btn.disabled = true;
        btn.innerText = "UPDATING TABLES...";

        // Logika Penamaan Tabel Baru (Sesuai Permintaan)
        const areaZone = getAreaZone(currentPos.kab, currentPos.kec);
        
        // Contoh Tabel: MOTOR-KUNINGAN-UTARA-JALAKSANA-PADAREK
        const tableName = `${cat}-${currentPos.kab}-${areaZone}-${currentPos.kec}-${currentPos.desa}`;
        const missionId = `STR-${Date.now()}`;

        const payload = {
            id: missionId,
            title: title,
            price: price,
            status: "open",
            created_at: Date.now(),
            full_path: tableName
        };

        try {
            // Simpan ke "Tabel" Spesifik
            await db.ref(`${tableName}/${missionId}`).set(payload);

            // Simpan juga ke index global (Opsional, agar Adventurer bisa scan semua misi)
            await db.ref(`terminal_misi/${currentPos.kab}/${missionId}`).set({
                id: missionId,
                table: tableName,
                cat: cat
            });

            localStorage.setItem('active_mission_path', `${tableName}/${missionId}`);
            alert("Misi Berhasil Dilepas ke Tabel: " + tableName);
            window.location.href = "mission_waiting.html";

        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
        }
    }

    detectLocation();
</script>
</body>
</html>
