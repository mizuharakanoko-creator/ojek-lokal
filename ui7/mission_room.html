<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MISSION ACTIVE | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { height: 35%; width: 100%; border-bottom: 2px solid #222; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #080808; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--neon); color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }
        .controls { 
            background: #111; border-top: 1px solid #222; padding: 15px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom, 20px));
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
        .action-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; color: white; text-transform: uppercase; }
        .btn-gmaps { background: #4285F4; }
        .btn-wa { background: #25D366; }
        .btn-finish { background: var(--pink); }
        .btn-cancel { background: #333; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="chatBox"></div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="chatInput" placeholder="Ketik pesan...">
            <button onclick="sendChat()" style="background:var(--neon); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">➔</button>
        </div>
        <div class="action-row" id="roleActions"></div>
    </div>

<script>
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const cId = localStorage.getItem('active_contract_id') || localStorage.getItem('on_contract_id');
    const sId = localStorage.getItem('active_shard');

    const config = SHARD_MASTER[sId];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let myRole = ""; 
    let myNick = session ? session.nick : "Requester";
    let map, marker;

    // 1. INIT MAP
    map = L.map('map', { zoomControl: false }).setView([-6.9147, 107.6098], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([-6.9147, 107.6098]).addTo(map);

    // 2. ROLE & UI SETUP
    async function init() {
        const snap = await db.ref(`contracts/${cId}`).get();
        if(!snap.exists()) return;
        const contract = snap.val();

        if (session && session.nick === contract.adventurer_id) {
            myRole = "adventurer";
            document.getElementById('roleActions').innerHTML = `
                <button class="btn btn-gmaps" onclick="openGmaps()">🧭 G-Maps</button>
                <button class="btn btn-finish" onclick="finishMission()">Selesai Misi</button>`;
            
            navigator.geolocation.watchPosition(pos => {
                const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                db.ref(`contracts/${cId}/live_location`).set(loc);
                marker.setLatLng([loc.lat, loc.lng]);
            });
        } else {
            myRole = "requester";
            document.getElementById('roleActions').innerHTML = `
                <button class="btn btn-wa" onclick="openWA()">💬 WhatsApp</button>
                <button class="btn btn-cancel" onclick="cancelMission()">Batalkan</button>`;
            
            db.ref(`contracts/${cId}/live_location`).on('value', s => {
                if(s.exists()) marker.setLatLng([s.val().lat, s.val().lng]);
            });
        }
    }
    init();

    // 3. CHAT
    function sendChat() {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        db.ref(`contracts/${cId}/chats`).push({ sender: myNick, text: input.value });
        input.value = "";
    }
    db.ref(`contracts/${cId}/chats`).on('child_added', snap => {
        const m = snap.val();
        document.getElementById('chatBox').innerHTML += `<div class="msg ${m.sender === myNick ? 'me' : 'them'}">${m.text}</div>`;
        document.getElementById('chatBox').scrollTop = 9999;
    });

    // 4. ACTIONS
    function openGmaps() { window.open(`https://www.google.com/maps/search/?api=1&query=${marker.getLatLng().lat},${marker.getLatLng().lng}`); }
    function openWA() { window.open('https://wa.me/628123456789'); }

    async function finishMission() {
        if(!confirm("Misi selesai? Data akan dihapus.")) return;
        const snap = await db.ref(`contracts/${cId}`).get();
        const d = snap.val();

        localStorage.setItem('rating_target', JSON.stringify({ 
            target: "Requester", 
            role: "adventurer",
            shard: sId 
        }));

        await db.ref(`contracts/${cId}`).update({ status: "completed" });
        setTimeout(async () => {
            await db.ref(`missions/${sId}/${d.mission_id}`).remove();
            await db.ref(`contracts/${cId}`).remove();
            window.location.href = "rating.html";
        }, 2500);
    }

    async function cancelMission() {
        if(confirm("Batalkan misi?")) await db.ref(`contracts/${cId}`).update({ status: "cancelled" });
    }

    // REDIRECT LISTENER
    db.ref(`contracts/${cId}/status`).on('value', async snap => {
        if(snap.val() === "completed" && myRole === "requester") {
            const c = await db.ref(`contracts/${cId}`).get();
            localStorage.setItem('rating_target', JSON.stringify({ 
                target: c.val().adventurer_id, 
                role: "requester",
                shard: sId
            }));
            window.location.href = "rating.html";
        }
        if(snap.val() === "cancelled") { alert("Misi dibatalkan."); window.location.href = "index.html"; }
    });
</script>
</body>
</html>
