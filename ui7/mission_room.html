<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION ACTIVE | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Peta Area */
        #map { height: 40%; width: 100%; border-bottom: 2px solid #222; background: #111; }

        /* Chat Area */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0a0a0a; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--neon); color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }
        .msg small { display: block; font-size: 9px; opacity: 0.7; margin-top: 5px; }

        /* Controls Area */
        .controls { background: #111; padding: 10px; border-top: 1px solid #222; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-row input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        
        .action-row { display: flex; gap: 8px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .btn-gmaps { background: #4285F4; color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-finish { background: var(--pink); color: white; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="chatBox">
        <p style="text-align:center; color:#444; font-size:10px;">Enkripsi P2P Aktif - Selamat Bertugas</p>
    </div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="chatInput" placeholder="Kirim pesan ke rekan...">
            <button onclick="sendChat()" style="background:var(--neon); border:none; padding:10px 18px; border-radius:50%; cursor:pointer;">➔</button>
        </div>
        
        <div class="action-row" id="roleActions">
            </div>
    </div>

<script>
    // 1. DATA RECOVERY
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const cId = localStorage.getItem('active_contract_id') || localStorage.getItem('on_contract_id');
    const sId = localStorage.getItem('active_shard');

    const config = SHARD_MASTER[sId];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let myRole = session ? "adventurer" : "requester";
    let myNick = session ? session.nick : "Requester";
    let map, marker;

    // 2. INIT MAPS (Leaflet)
    function initMap() {
        map = L.map('map').setView([-6.9147, 107.6098], 15); // Default Bandung
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        marker = L.marker([-6.9147, 107.6098]).addTo(map).bindPopup("Adventurer Location");
    }
    initMap();

    // 3. TRACKING LOGIC
    if (myRole === "adventurer") {
        // Jika Adventurer: Kirim Lokasi tiap 5 detik
        navigator.geolocation.watchPosition(pos => {
            const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            db.ref(`contracts/${cId}/live_location`).set(coords);
            marker.setLatLng([coords.lat, coords.lng]);
            map.panTo([coords.lat, coords.lng]);
        }, err => console.error(err), { enableHighAccuracy: true });

        // Tampilkan Tombol Khusus Adventurer
        document.getElementById('roleActions').innerHTML = `
            <button class="btn-action btn-gmaps" onclick="openGmaps()">🧭 GOOGLE MAPS</button>
            <button class="btn-action btn-finish" onclick="finishMission()">SELESAI MISI</button>
        `;
    } else {
        // Jika Requester: Pantau Lokasi Adventurer
        db.ref(`contracts/${cId}/live_location`).on('value', snap => {
            if (snap.exists()) {
                const loc = snap.val();
                marker.setLatLng([loc.lat, loc.lng]);
                map.panTo([loc.lat, loc.lng]);
            }
        });

        // Tampilkan Tombol Khusus Requester
        document.getElementById('roleActions').innerHTML = `
            <button class="btn-action btn-wa" onclick="openWA()">💬 WHATSAPP</button>
            <button class="btn-action" style="background:#333; color:#aaa;">MENUNGGU SELESAI...</button>
        `;
    }

    // 4. CHAT LOGIC (P2P)
    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;

        db.ref(`contracts/${cId}/chats`).push({
            sender: myNick,
            text: input.value,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        input.value = "";
    }

    db.ref(`contracts/${cId}/chats`).on('child_added', snap => {
        const msg = snap.val();
        const chatBox = document.getElementById('chatBox');
        const isMe = msg.sender === myNick;

        chatBox.innerHTML += `
            <div class="msg ${isMe ? 'me' : 'them'}">
                ${msg.text}
                <small>${msg.time} - ${msg.sender}</small>
            </div>
        `;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // 5. EXTERNAL REDIRECTS
    function openGmaps() {
        // Membuka peta ke koordinat saat ini untuk navigasi
        const lat = marker.getLatLng().lat;
        const lng = marker.getLatLng().lng;
        window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
    }

    function openWA() {
        // WhatsApp dummy, idealnya ambil nomor dari database profile
        const phone = "628123456789"; 
        window.open(`https://wa.me/${phone}?text=Halo, saya Requester misi Anda.`, '_blank');
    }

    async function finishMission() {
        if (!confirm("Konfirmasi bahwa misi telah selesai dikerjakan?")) return;
        await db.ref(`contracts/${cId}`).update({ status: "completed" });
        alert("Misi Selesai! Menunggu Verifikasi Pembayaran.");
        window.location.href = "index.html"; // Atau ke halaman feedback
    }

    // Jika misi ditandai selesai oleh Adventurer, Requester juga pindah
    db.ref(`contracts/${cId}/status`).on('value', snap => {
        if (snap.val() === "completed" && myRole === "requester") {
            alert("Adventurer telah menyelesaikan misi!");
            window.location.href = "index.html";
        }
    });

</script>
</body>
</html>
