<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION ACTIVE | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { height: 35%; width: 100%; border-bottom: 2px solid #222; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #080808; }
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 13px; position: relative; }
        .msg.me { align-self: flex-end; background: var(--neon); color: #000; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; }
        .controls { background: #111; padding: 15px; border-top: 1px solid #222; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-row input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 20px; }
        .action-row { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; color: white; }
        .btn-gmaps { background: #4285F4; }
        .btn-finish { background: var(--pink); }
        .btn-wa { background: #25D366; }
        .btn-cancel { background: #444; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="chatBox"></div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="chatInput" placeholder="Kirim pesan...">
            <button onclick="sendChat()" style="background:var(--neon); border:none; padding:10px 15px; border-radius:50%;">➔</button>
        </div>
        <div class="action-row" id="roleActions"></div>
    </div>

<script>
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const cId = localStorage.getItem('active_contract_id') || localStorage.getItem('on_contract_id');
    const sId = localStorage.getItem('active_shard');

    const config = SHARD_MASTER[sId];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let myRole = session ? "adventurer" : "requester";
    let myNick = session ? session.nick : "Requester";
    let map, marker;

    // 1. MAP INIT
    map = L.map('map', { zoomControl: false }).setView([-6.9147, 107.6098], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([-6.9147, 107.6098]).addTo(map);

    // 2. ROLE LOGIC
    if (myRole === "adventurer") {
        navigator.geolocation.watchPosition(pos => {
            const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            db.ref(`contracts/${cId}/live_location`).set(loc);
            marker.setLatLng([loc.lat, loc.lng]);
            map.panTo([loc.lat, loc.lng]);
        });
        document.getElementById('roleActions').innerHTML = `
            <button class="btn btn-gmaps" onclick="window.open('https://maps.google.com')">GMAPS</button>
            <button class="btn btn-finish" onclick="finishMission()">SELESAI MISI</button>`;
    } else {
        db.ref(`contracts/${cId}/live_location`).on('value', snap => {
            if(snap.exists()) {
                marker.setLatLng([snap.val().lat, snap.val().lng]);
                map.panTo([snap.val().lat, snap.val().lng]);
            }
        });
        document.getElementById('roleActions').innerHTML = `
            <button class="btn btn-wa" onclick="window.open('https://wa.me/62812345')">WHATSAPP</button>
            <button class="btn btn-cancel" onclick="cancelMission()">BATALKAN</button>`;
    }

    // 3. CHAT LOGIC
    function sendChat() {
        const input = document.getElementById('chatInput');
        if(!input.value) return;
        db.ref(`contracts/${cId}/chats`).push({ sender: myNick, text: input.value });
        input.value = "";
    }
    db.ref(`contracts/${cId}/chats`).on('child_added', snap => {
        const m = snap.val();
        document.getElementById('chatBox').innerHTML += `<div class="msg ${m.sender === myNick ? 'me' : 'them'}">${m.text}</div>`;
        document.getElementById('chatBox').scrollTop = 9999;
    });

    // 4. FINISH & CANCEL LOGIC
    async function finishMission() {
        if(!confirm("Misi selesai? Data akan dihapus.")) return;
        const snap = await db.ref(`contracts/${cId}`).get();
        const d = snap.val();
        
        localStorage.setItem('rating_target', JSON.stringify({ target: "Requester", role: "adventurer" }));
        
        // Update status dulu agar requester ter-redirect
        await db.ref(`contracts/${cId}`).update({ status: "completed" });
        
        setTimeout(async () => {
            await db.ref(`missions/${sId}/${d.mission_id}`).remove();
            await db.ref(`contracts/${cId}`).remove();
            window.location.href = "rating.html";
        }, 2000);
    }

    async function cancelMission() {
        if(!confirm("Batalkan misi?")) return;
        await db.ref(`contracts/${cId}`).update({ status: "cancelled" });
    }

    // LISTENER REDIRECT
    db.ref(`contracts/${cId}/status`).on('value', async snap => {
        if(snap.val() === "completed" && myRole === "requester") {
            const c = await db.ref(`contracts/${cId}`).get();
            localStorage.setItem('rating_target', JSON.stringify({ target: c.val().adventurer_id, role: "requester" }));
            window.location.href = "rating.html";
        }
        if(snap.val() === "cancelled") {
            alert("Misi Dibatalkan.");
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
