<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | GUILD VERIFICATION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Courier New', monospace; padding: 20px; }
        h2 { color: #00ffff; border-bottom: 2px solid #222; padding-bottom: 15px; letter-spacing: 2px; }
        
        .row { 
            background: #111; border: 1px solid #333; padding: 20px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-radius: 8px;
            transition: 0.3s;
        }
        .row:hover { border-color: #00ffff; background: #151515; }

        .info b { color: #ff0055; font-size: 18px; display: block; margin-bottom: 5px; }
        .info i { color: #888; font-size: 12px; font-style: normal; display: block; }
        .badge-cat { 
            display: inline-block; padding: 2px 8px; border-radius: 4px; 
            font-size: 10px; font-weight: bold; margin-top: 5px;
            background: #00ffff22; color: #00ffff; border: 1px solid #00ffff;
        }

        .btn-approve { 
            background: #00ff00; color: #000; border: none; padding: 12px 25px; 
            font-weight: bold; cursor: pointer; border-radius: 6px;
            text-transform: uppercase;
        }
        .btn-approve:hover { background: #00cc00; transform: scale(1.05); }
        .btn-approve:active { transform: scale(0.95); }

        #pendingList { margin-top: 20px; }
        .empty-state { color: #444; text-align: center; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>

    <h2>PENDING APPROVAL LIST</h2>
    <div id="pendingList">Menganalisis data pendaftar...</div>

    <script>
        // CONFIG MASTER
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Monitor data pendaftaran_pending secara real-time
        db.ref('pendaftaran_pending').on('value', snap => {
            const listDiv = document.getElementById('pendingList');
            listDiv.innerHTML = "";

            if(!snap.exists()) {
                listDiv.innerHTML = "<div class="empty-state">-- TIDAK ADA PENDAFTAR BARU DALAM ANTREAN --</div>";
                return;
            }

            snap.forEach(child => {
                const u = child.val();
                // Menampilkan kategori (Motor/Car) agar admin tahu
                const cat = u.category || "NOT SET"; 
                
                listDiv.innerHTML += `
                    <div class="row">
                        <div class="info">
                            <b>${u.nick.toUpperCase()}</b>
                            <i>SHARD: ${u.shard_id}</i>
                            <span class="badge-cat">${cat}</span>
                        </div>
                        <button class="btn-approve" onclick="verifyUser('${u.nick}')">APPROVE</button>
                    </div>
                `;
            });
        });

        // 2. LOGIKA VERIFIKASI (FIXED: Mempertahankan Kategori)
        async function verifyUser(nick) {
            if(!confirm("Terima " + nick.toUpperCase() + " sebagai Adventurer resmi?")) return;

            const pendingRef = db.ref(`pendaftaran_pending/${nick}`);
            const snap = await pendingRef.get();
            
            if(!snap.exists()) return alert("Error: Data pendaftaran tidak ditemukan!");
            
            const data = snap.val();
            const shardId = data.shard_id;
            const category = data.category || "MOTOR"; // Ambil kategori dari pendaftaran

            try {
                // PROSES A: Buat entri di Registry Utama (Data Login Global)
                await db.ref(`users_registry/${nick}`).set({
                    password: data.password,
                    shard_id: shardId,
                    role: "adventurer",
                    status: "active"
                });

                // PROSES B: Buat Profil Permanen Wilayah (Statistik & Kategori)
                const shardTablePath = `adventurer-${shardId.toLowerCase()}`;
                await db.ref(`${shardTablePath}/${nick}`).set({
                    nick: nick,
                    category: category, // KATEGORI SEKARANG DISIMPAN PERMANEN
                    rating: 5.0,
                    level: 1,
                    exp: 0,
                    vitality: 1000,
                    is_busy: false,
                    joined_at: Date.now()
                });

                // PROSES C: Hapus dari antrean pendaftaran_pending
                await pendingRef.remove();

                alert(`SUCCESS!\nAdventurer ${nick.toUpperCase()} telah diaktifkan di kategori ${category}.`);
            } catch (e) {
                alert("Critical Error: " + e.message);
            }
        }
    </script>
</body>
</html>
