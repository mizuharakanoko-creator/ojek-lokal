<!DOCTYPE html>
<html>
<head>
    <title>ADMIN | GUILD VERIFICATION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body style="background:#111; color:white; font-family:monospace; padding:20px;">
    <h2>LIST PENDAFTAR PENDING</h2>
    <div id="pendingList"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('pendaftaran_pending').on('value', snap => {
            const div = document.getElementById('pendingList');
            div.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                div.innerHTML += `
                    <div style="border:1px solid #333; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between;">
                        <span>${u.nick} -> ${u.shard_id}</span>
                        <button onclick="verifyUser('${u.nick}')">APPROVE</button>
                    </div>
                `;
            });
        });

        async function verifyUser(nick) {
            const snap = await db.ref(`pendaftaran_pending/${nick}`).get();
            const data = snap.val();

            // Pindahkan ke Registry Utama (Router akan membaca ini)
            await db.ref(`users_registry/${nick}`).set({
                password: data.password,
                shard_id: data.shard_id,
                role: "adventurer"
            });

            // Hapus dari daftar tunggu
            await db.ref(`pendaftaran_pending/${nick}`).remove();
            alert(nick + " AKTIF!");
        }
    </script>
</body>
</html>
