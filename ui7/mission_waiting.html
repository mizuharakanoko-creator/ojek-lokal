<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAITING FOR ADVENTURER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #111; border-top: 4px solid #00ffff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p style="margin-top: 20px; color: #00ffff; letter-spacing: 2px;">WAITING FOR ADVENTURER...</p>
    <p id="pathStatus" style="font-size: 10px; color: #333;"></p>

<script>
    const path = localStorage.getItem('active_mission_path');
    const shardID = localStorage.getItem('active_shard');
    
    document.getElementById('pathStatus').innerText = path;

    const shardApp = firebase.initializeApp(SHARD_MASTER[shardID], "REGIONAL");
    const db = shardApp.database();

    // Listen status misi di Shard Regional
    db.ref(`active_missions/${path}`).on('value', snap => {
        const data = snap.val();
        if(data && data.adventurer_id) {
            localStorage.setItem('active_contract_id', data.id);
            window.location.href = "mission_active.html";
        }
    });
</script>
</body>
</html>
