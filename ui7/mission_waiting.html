<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAITING...</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
</head>
<body style="background:#000; color:#0ff; text-align:center; padding-top:100px;">
    <h2>MENUNGGU ADVENTURER...</h2>
    <div id="status">Menghubungkan ke Shard...</div>

<script>
    const path = localStorage.getItem('active_mission_path');
    const shardID = localStorage.getItem('active_shard');

    if (!path || !shardID) {
        alert("Data misi tidak ditemukan!");
        window.location.href = "index.html";
    }

    try {
        const shardApp = !firebase.apps.find(a => a.name === "REGIONAL") 
            ? firebase.initializeApp(SHARD_MASTER[shardID], "REGIONAL") 
            : firebase.app("REGIONAL");

        shardApp.database().ref(`active_missions/${path}`).on('value', snap => {
            const data = snap.val();
            if (data && data.adventurer_id) {
                alert("Misi diambil oleh Adventurer!");
                window.location.href = "mission_room.html";
            }
        });
    } catch (e) {
        document.getElementById('status').innerText = "Error: " + e.message;
    }
</script>
</body>
</html>
