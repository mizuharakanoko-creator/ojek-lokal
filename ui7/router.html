<!DOCTYPE html>
<html>
<head><title>ROUTING SYSTEM...</title></head>
<body style="background:#000; color:#00ffff; font-family:monospace; text-align:center; padding-top:20%;">
    <h2>SINKRONISASI AREA...</h2>
    <script>
        const session = JSON.parse(localStorage.getItem('pickme_session'));
        
        if (!session) {
            window.location.href = "login.html";
        } else {
            // Jika shard_id tersedia (Sudah di-Approve Admin)
            if (session.shard_id) {
                const targetPage = `dashboard_${session.shard_id.toLowerCase()}.html`;
                console.log("Redirecting to: " + targetPage);
                window.location.href = targetPage;
            } else {
                // Jika data ada tapi shard_id kosong (Belum Approve)
                window.location.href = "waiting_room.html";
            }
        }
    </script>
</body>
</html>
