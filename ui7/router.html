<script>
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    
    if (!session) {
        window.location.href = "login.html";
    } else {
        // Cek apakah user sudah punya shard_id (tanda sudah diverifikasi)
        if (session.shard_id) {
            // Lempar ke halaman dashboard spesifik wilayah
            // Contoh: dashboard_idn-jabar-kng-jalaksana.html
            const targetPage = `dashboard_${session.shard_id.toLowerCase()}.html`;
            window.location.href = targetPage;
        } else {
            window.location.href = "waiting_room.html";
        }
    }
</script>
