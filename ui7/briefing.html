<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION BRIEFING | CONTRACT SIGNING</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; --gold: #ffbb33; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .briefing-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .badge { display: inline-block; padding: 6px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .role-adv { background: rgba(0, 255, 255, 0.1); color: var(--neon); border: 1px solid var(--neon); }
        .role-req { background: rgba(255, 0, 85, 0.1); color: var(--pink); border: 1px solid var(--pink); }

        .contract-info { background: #000; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed #333; }
        .label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-family: monospace; color: var(--gold); font-size: 14px; }

        .status-area { margin-top: 25px; min-height: 60px; }
        .waiting-msg { color: #666; font-style: italic; font-size: 13px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn-sign { 
            width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; 
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); transition: 0.3s;
        }
        .btn-sign:hover { transform: scale(1.02); background: #fff; }
    </style>
</head>
<body>

<div class="briefing-card">
    <div id="roleDisplay" class="badge">Identifying...</div>
    <h2 style="margin: 0; font-size: 22px;">Mission Briefing</h2>
    <p style="font-size: 11px; color: #444; margin-top: 5px;" id="cIdDisplay">CONTRACT ID: -</p>

    <div class="contract-info">
        <span class="label">Adventurer Target</span>
        <span class="val" id="advNick">...</span>
        <hr style="border: 0; border-top: 1px solid #111; margin: 10px 0;">
        <span class="label">Deal Price</span>
        <span class="val" id="finalPrice">Calculating...</span>
    </div>

    <div class="status-area" id="actionArea">
        <div class="waiting-msg">Menghubungkan ke server...</div>
    </div>
</div>

<script>
    // 1. DATA RECOVERY
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const cId = localStorage.getItem('active_contract_id') || localStorage.getItem('on_contract_id');
    const sId = localStorage.getItem('active_shard');

    if (!cId || !sId) {
        alert("Sesi Kontrak Hilang!");
        window.location.href = "index.html";
    }

    // 2. FIREBASE INIT
    const config = SHARD_MASTER[sId];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    // 3. LOGIKA MONITORING KONTRAK
    db.ref(`contracts/${cId}`).on('value', snap => {
        if (!snap.exists()) {
            alert("Kontrak telah dibatalkan.");
            window.location.href = "index.html";
            return;
        }

        const data = snap.val();
        
        // Tampilkan Detail Kontrak
        document.getElementById('cIdDisplay').innerText = "CONTRACT: " + cId;
        document.getElementById('advNick').innerText = data.adventurer_id.toUpperCase();
        document.getElementById('finalPrice').innerText = "Rp " + data.final_price.toLocaleString();

        // CEK ROLE SECARA AKURAT
        const isAdventurer = (session && session.nick === data.adventurer_id);
        const actionArea = document.getElementById('actionArea');
        const roleDisplay = document.getElementById('roleDisplay');

        // Jika Status berubah menjadi 'executing', lempar ke halaman misi (Redirect Otomatis)
        if (data.status === "executing") {
            window.location.href = "mission_room.html";
            return;
        }

        if (isAdventurer) {
            // ROLE ADVENTURER: Tampilkan tombol Tanda Tangan
            roleDisplay.innerText = "YOUR ROLE: ADVENTURER";
            roleDisplay.className = "badge role-adv";
            actionArea.innerHTML = `
                <button class="btn-sign" onclick="signContract()">TANDA TANGANI KONTRAK</button>
                <p style="font-size: 10px; color: #555; margin-top: 10px;">Dengan menekan ini, Anda memulai misi secara resmi.</p>
            `;
        } else {
            // ROLE REQUESTER: Diam saja & Menonton
            roleDisplay.innerText = "YOUR ROLE: REQUESTER";
            roleDisplay.className = "badge role-req";
            actionArea.innerHTML = `
                <div class="waiting-msg">Menunggu Adventurer tanda tangan...</div>
                <p style="font-size: 10px; color: #555; margin-top: 10px;">Sistem akan otomatis memulai misi setelah disetujui pelaksana.</p>
            `;
        }
    });

    // 4. FUNGSI TANDA TANGAN (KHUSUS ADVENTURER)
    async function signContract() {
        try {
            // Update status kontrak menjadi 'executing'
            // Ini akan memicu listener di atas pada browser Requester juga
            await db.ref(`contracts/${cId}`).update({
                status: "executing",
                signed_at: Date.now()
            });

            // Juga update status misi di Shard agar tidak 'hiring' lagi
            const mId = localStorage.getItem('on_mission_id') || localStorage.getItem('active_mission_id');
            await db.ref(`missions/${sId}/${mId}`).update({
                status: "executing"
            });

        } catch (e) {
            alert("Gagal menandatangani: " + e.message);
        }
    }
</script>
</body>
</html>
