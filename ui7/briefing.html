<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MISSION BRIEFING | PRE-EXECUTION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .briefing-box { 
            max-width: 400px; margin: 40px auto; padding: 30px; 
            border: 1px solid #333; border-radius: 15px; background: #111;
        }
        .id-badge { font-family: monospace; font-size: 11px; color: #666; background: #000; padding: 5px; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        .status-msg { color: var(--neon); font-weight: bold; margin: 20px 0; }
        .btn-start { 
            width: 100%; padding: 15px; background: var(--neon); color: #000; 
            border: none; font-weight: bold; border-radius: 8px; cursor: pointer; display: none;
        }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: var(--neon); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 var(--neon), .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 var(--neon), .5em 0 0 var(--neon); } }
    </style>
</head>
<body>

    <div class="briefing-box">
        <h2 style="color: var(--pink)">CONTRACT BRIEFING</h2>
        <div class="id-badge" id="displayMId">VALIDATING IDs...</div>

        <div id="briefContent">
            <p style="font-size: 13px; color: #888;">Harap tunggu, sistem sedang mensinkronkan data kontrak antara Requester dan Adventurer.</p>
            <div class="status-msg loading-dots">Awaiting Final Confirmation</div>
        </div>

        <button id="btnExecution" class="btn-start" onclick="goMission()">START MISSION (Mulai)</button>
    </div>

<script>
    const mId = localStorage.getItem('on_mission_id') || localStorage.getItem('active_mission_id');
    const shardId = localStorage.getItem('active_shard');
    const session = JSON.parse(localStorage.getItem('pickme_session'));

    if(!mId || !shardId) {
        alert("Invalid Briefing Session!");
        window.location.href = "index.html";
    }

    document.getElementById('displayMId').innerText = "MISSION_ID: " + mId;

    const config = SHARD_MASTER[shardId];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    // MONITOR STATUS MISI
    db.ref(`missions/${shardId}/${mId}`).on('value', snap => {
        if(!snap.exists()) {
            alert("Misi telah dibatalkan oleh salah satu pihak.");
            window.location.href = "index.html";
            return;
        }

        const data = snap.val();
        // Jika status sudah 'contracted', tampilkan tombol Start
        if(data.status === "contracted") {
            document.querySelector('.status-msg').innerText = "CONTRACT VALIDATED!";
            document.querySelector('.status-msg').style.color = "#00ff00";
            document.getElementById('btnExecution').style.display = "block";
        }
    });

    function goMission() {
        // Pindah ke halaman pengerjaan misi
        alert("Entering Execution Phase...");
        window.location.href = "mission_room.html";
    }
</script>
</body>
</html>
