<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION BRIEFING | SYNC CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="shard-config.js"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff0055; --bg: #050505; --gold: #ffbb33; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; text-align: center; }
        
        /* Briefing Card */
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 30px; position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--neon), var(--pink)); }
        
        .role-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
        .role-req { background: rgba(255, 0, 85, 0.2); color: var(--pink); border: 1px solid var(--pink); }
        .role-adv { background: rgba(0, 255, 255, 0.2); color: var(--neon); border: 1px solid var(--neon); }

        .contract-id { font-family: monospace; color: #555; font-size: 11px; margin-bottom: 30px; display: block; }
        
        /* Status List */
        .sync-list { text-align: left; margin: 20px 0; }
        .sync-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 14px; color: #aaa; }
        .sync-item.done { color: #fff; }
        .sync-item.done i { color: #00ff00; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .dot.active { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        .btn-ready { 
            width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
            display: none; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="roleBadge" class="role-badge">Validating Role...</div>
        <span class="contract-id" id="displayCId">CONTRACT_ID: -</span>

        <h2 id="greetMsg" style="margin: 0; font-size: 20px;">Menunggu Sinkronisasi</h2>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">Memastikan kedua belah pihak masuk ke ruang briefing yang sama.</p>

        <div class="sync-list">
            <div class="sync-item"><div class="dot active"></div> Connection Established</div>
            <div class="sync-item"><div class="dot active"></div> Mission ID Verified</div>
            <div class="sync-item" id="advCheck"><div class="dot"></div> Adventurer Ready</div>
            <div class="sync-item" id="reqCheck"><div class="dot"></div> Requester Ready</div>
        </div>

        <button id="btnStart" class="btn-ready" onclick="startExecution()">GO TO EXECUTION ROOM</button>
    </div>
</div>

<script>
    // 1. DATA RECOVERY
    const session = JSON.parse(localStorage.getItem('pickme_session')); // Cek login
    const cId = localStorage.getItem('active_contract_id') || localStorage.getItem('on_contract_id');
    const sId = localStorage.getItem('active_shard');

    if (!cId || !sId) {
        alert("Contract Session Missing!");
        window.location.href = "index.html";
    }

    // 2. IDENTIFIKASI ROLE
    // Jika tidak ada session (nick), berarti dia adalah Requester (Stranger/Citizen)
    // Jika ada session dan dia pelamar di kontrak tersebut, berarti dia Adventurer
    let myRole = session ? "adventurer" : "requester";
    let myNick = session ? session.nick : "Requester";

    const badge = document.getElementById('roleBadge');
    badge.innerText = myRole;
    badge.className = "role-badge " + (myRole === "adventurer" ? "role-adv" : "role-req");
    document.getElementById('displayCId').innerText = "CONTRACT: " + cId;
    document.getElementById('greetMsg').innerText = "Hello, " + myNick;

    // 3. FIREBASE INIT
    const config = SHARD_MASTER[sId];
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    // 4. SYNC LOGIC
    const contractRef = db.ref(`contracts/${cId}`);

    // Tandai bahwa saya sudah masuk (Ready)
    if(myRole === "adventurer") {
        contractRef.update({ adv_ready: true });
    } else {
        contractRef.update({ req_ready: true });
    }

    // 5. MONITOR KEDUA BELAH PIHAK
    contractRef.on('value', snap => {
        if(!snap.exists()) return;
        const data = snap.val();

        // Update UI Checklist
        if(data.adv_ready) {
            document.getElementById('advCheck').querySelector('.dot').className = "dot active";
            document.getElementById('advCheck').style.color = "#fff";
        }
        if(data.req_ready) {
            document.getElementById('reqCheck').querySelector('.dot').className = "dot active";
            document.getElementById('reqCheck').style.color = "#fff";
        }

        // Jika keduanya ready, munculkan tombol Start
        if(data.adv_ready && data.req_ready) {
            document.getElementById('btnStart').style.display = "block";
            document.getElementById('greetMsg').innerText = "All Set! Ready?";
        }
    });

    async function startExecution() {
        // Update status kontrak menjadi 'executing'
        await contractRef.update({ status: "executing" });
        window.location.href = "mission_room.html";
    }

    // Otomatis hapus status ready jika tab ditutup (Clean up)
    window.onbeforeunload = function() {
        if(myRole === "adventurer") contractRef.update({ adv_ready: false });
        else contractRef.update({ req_ready: false });
    };
</script>
</body>
</html>
