<!DOCTYPE html>
<html lang="id">
<head>
    <title>PICK ME | LOGIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; text-align: center; padding-top: 50px; font-family: sans-serif; }
        .login-box { width: 300px; margin: auto; background: #111; padding: 30px; border: 1px solid #222; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; }
        button { width: 100%; padding: 10px; background: #00ffff; color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color:#ff0055">LOGIN TERMINAL</h2>
        <input type="text" id="logNick" placeholder="Nickname">
        <input type="password" id="logPass" placeholder="Password">
        <button onclick="login()">ENTER SYSTEM</button>
        <br><br>
        <a href="register.html" style="color:#888; font-size:12px">Banyak pendaftar? Klik Registrasi</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function login() {
            const nick = document.getElementById('logNick').value;
            const pass = document.getElementById('logPass').value;

            const snap = await db.ref(`users_registry/${nick}`).get();
            
            if(snap.exists() && snap.val().password === pass) {
                const userData = snap.val();
                userData.nick = nick; // Tambahkan nick ke objek session
                
                // Simpan session ke LocalStorage
                localStorage.setItem('pickme_session', JSON.stringify(userData));
                
                alert("Login Sukses! Mengarahkan ke Shard...");
                
                // DISINI LOGIKA ROUTER NANTI:
                // Sementera kita lempar ke dashboard standar, 
                // tapi kedepannya akan ke dashboard_[shard_id].html
                window.location.href = "router.html"; 
            } else {
                alert("Akun tidak ditemukan atau password salah!");
            }
        }
    </script>
</body>
</html>
