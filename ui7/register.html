<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JOIN GUILD | REGISTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 350px; background: #111; padding: 30px; border: 1px solid #222; border-radius: 8px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; background: #000; color: #fff; border: 1px solid #333; }
        button { background: #ff0055; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #444; }
        label { font-size: 11px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#00ffff; margin-top: 0;">ADVENTURER REGISTER</h2>
        <label>Nickname</label>
        <input type="text" id="regNick" placeholder="Contoh: Astra">
        
        <label>Password</label>
        <input type="password" id="regPass" placeholder="******">

        <label>Wilayah Tugas</label>
        <select id="regShard">
            <option value="IDN-JABAR-KNG-JALAKSANA">JALAKSANA</option>
            <option value="IDN-JABAR-KNG-KRAMATMULYA">KRAMATMULYA</option>
            <option value="IDN-JABAR-KNG-KUNINGAN">KUNINGAN</option>
            <option value="IDN-JABAR-KNG-CIGUGUR">CIGUGUR</option>
        </select>

        <button id="btnReg" onclick="register()">KIRIM PERMOHONAN</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function register() {
            const nick = document.getElementById('regNick').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;
            const shard = document.getElementById('regShard').value;
            const btn = document.getElementById('btnReg');

            if(!nick || !pass) return alert("Data tidak lengkap!");

            btn.disabled = true;

            // CEK APAKAH NICK SUDAH TERDAFTAR (DI REGISTRY ATAU PENDING)
            const checkReg = await db.ref(`users_registry/${nick}`).get();
            const checkPending = await db.ref(`pendaftaran_pending/${nick}`).get();

            if(checkReg.exists() || checkPending.exists()) {
                alert("Nickname ini sudah digunakan atau sedang dalam tinjauan!");
                btn.disabled = false;
                return;
            }

            await db.ref(`pendaftaran_pending/${nick}`).set({
                nick: nick,
                password: pass,
                shard_id: shard,
                status: "pending",
                created_at: Date.now()
            });

            alert("Pendaftaran berhasil! Silakan tunggu verifikasi admin.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
