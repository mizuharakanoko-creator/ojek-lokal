<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIN GUILD | ADVENTURER REGISTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: #111; padding: 20px; border: 1px solid #222; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; background: #000; color: #fff; border: 1px solid #333; }
        button { background: #ff0055; font-weight: bold; border: none; cursor: pointer; }
        label { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#00ffff">REGISTRASI ADVENTURER</h2>
        <label>NICKNAME</label>
        <input type="text" id="regNick" placeholder="Ex: Astra">
        
        <label>PASSWORD</label>
        <input type="password" id="regPass" placeholder="******">

        <label>WILAYAH TUGAS (SHARD)</label>
        <select id="regShard">
            <option value="IDN-JABAR-KNG-JALAKSANA">JALAKSANA (KUNINGAN)</option>
            <option value="IDN-JABAR-KNG-KRAMATMULYA">KRAMATMULYA (KUNINGAN)</option>
        </select>

        <button onclick="register()">AJUKAN PENDAFTARAN</button>
        <p style="font-size:10px; text-align:center">Status: <span id="statusText">Menunggu Input</span></p>
    </div>

    <script>
        // FIREBASE MASTER CONFIG (Tempat Buku Telepon/Registry)
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function register() {
            const nick = document.getElementById('regNick').value;
            const pass = document.getElementById('regPass').value;
            const shard = document.getElementById('regShard').value;

            if(!nick || !pass) return alert("Isi semua data!");

            document.getElementById('statusText').innerText = "Mengirim Data...";

            // Simpan ke tabel 'pendaftaran_pending'
            await db.ref(`pendaftaran_pending/${nick}`).set({
                nick: nick,
                password: pass,
                shard_id: shard,
                status: "pending",
                created_at: Date.now()
            });

            alert("Pendaftaran diajukan! Hubungi Admin untuk verifikasi.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
