<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIN GUILD | REGISTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 350px; background: #111; padding: 30px; border: 1px solid #222; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; box-sizing: border-box; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; outline: none; }
        input:focus, select:focus { border-color: #00ffff; }
        button { background: #ff0055; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        h2 { color:#00ffff; margin: 0 0 20px 0; font-size: 22px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ADVENTURER JOIN</h2>
        
        <label>Nickname</label>
        <input type="text" id="regNick" placeholder="Nama karakter Anda...">
        
        <label>Password</label>
        <input type="password" id="regPass" placeholder="******">

        <label>Kategori Kendaraan</label>
        <select id="regCategory">
            <option value="MOTOR">MOTOR (RODA 2)</option>
            <option value="CAR">MOBIL (RODA 4)</option>
        </select>

        <label>Wilayah Tugas</label>
        <select id="regShard">
            <option value="IDN-JABAR-KNG-KUNINGAN">KEC. KUNINGAN</option>
            <option value="IDN-JABAR-KNG-JALAKSANA">KEC. JALAKSANA</option>
            <option value="IDN-JABAR-KNG-KRAMATMULYA">KEC. KRAMATMULYA</option>
            <option value="IDN-JABAR-KNG-CIGUGUR">KEC. CIGUGUR</option>
        </select>

        <button id="btnReg" onclick="register()">KIRIM PERMOHONAN</button>
        <p style="font-size: 10px; color: #444; text-align: center; margin-top: 15px;">Data akan diverifikasi oleh Admin Guild.</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function register() {
            const nick = document.getElementById('regNick').value.trim().toLowerCase();
            const pass = document.getElementById('regPass').value;
            const category = document.getElementById('regCategory').value;
            const shard = document.getElementById('regShard').value;
            const btn = document.getElementById('btnReg');

            if(!nick || !pass) return alert("Nickname dan Password wajib diisi!");

            btn.disabled = true;
            btn.innerText = "MENGIRIM...";

            try {
                // 1. Cek duplikasi di registry utama dan antrean
                const checkReg = await db.ref(`users_registry/${nick}`).get();
                const checkPending = await db.ref(`pendaftaran_pending/${nick}`).get();

                if(checkReg.exists() || checkPending.exists()) {
                    alert("Nickname ini sudah digunakan atau sedang dalam tinjauan!");
                    btn.disabled = false;
                    btn.innerText = "KIRIM PERMOHONAN";
                    return;
                }

                // 2. Simpan data lengkap ke pendaftaran_pending
                await db.ref(`pendaftaran_pending/${nick}`).set({
                    nick: nick,
                    password: pass,
                    category: category, // Kategori tersimpan di sini
                    shard_id: shard,
                    status: "pending",
                    level: 1,
                    vitality: 100,
                    exp: 0,
                    created_at: Date.now()
                });

                alert("Pendaftaran berhasil! Tunggu verifikasi admin untuk mulai menjalankan misi.");
                window.location.href = "login.html";

            } catch (error) {
                alert("Terjadi kesalahan: " + error.message);
                btn.disabled = false;
                btn.innerText = "KIRIM PERMOHONAN";
            }
        }
    </script>
</body>
</html>
