<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SELECT ADVENTURER | SOVEREIGN GUILD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon-blue: #00d9ff; --neon-gold: #ffcc00; --bg: #020204; }
        body { margin: 0; padding: 20px; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; }
        
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #1a1a24; padding-bottom: 15px; }
        .title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 14px; letter-spacing: 2px; }

        .quest-info { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--neon-gold); }
        .quest-info h2 { margin: 0; font-size: 16px; color: var(--neon-gold); font-family: 'Orbitron'; }
        .quest-info p { margin: 8px 0 0; font-size: 12px; color: #888; }

        .list-container { display: flex; flex-direction: column; gap: 15px; }
        
        .adv-card {
            background: #0a0a0c; border: 1px solid #1a1a24; padding: 18px; border-radius: 12px;
            position: relative; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .adv-name { font-weight: bold; color: var(--neon-blue); font-size: 15px; font-family: 'Orbitron'; }
        .adv-meta { font-size: 10px; color: #555; margin-top: 4px; }
        .adv-nego { font-size: 14px; color: var(--neon-gold); font-weight: bold; margin-top: 10px; }
        .adv-note { font-size: 11px; color: #aaa; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; margin: 12px 0; border: 1px dashed #333; }

        .btn-select {
            width: 100%; padding: 12px; background: var(--neon-blue); color: #000;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 12px; font-family: 'Orbitron';
        }

        .waiting-msg { text-align: center; color: #444; font-size: 12px; margin-top: 50px; font-family: 'Orbitron'; letter-spacing: 1px; }
        .shimmer { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">/// APPLICANT RADAR ///</div>
    </div>

    <div id="questDetail" class="quest-info">
        <h2 id="mTitle">SCANNING...</h2>
        <p id="mReward">BOUNTY: --</p>
    </div>

    <div id="applicantsList" class="list-container">
        <div class="waiting-msg shimmer">MENUNGGU SINYAL PETUALANG...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');
        const srv = "SRV-JAKARTA"; // Shard default kita

        if(!mId) window.location.href = "create_mission.html";

        // 1. Ambil Detail Misi dari Regional Database
        db.ref(`database_regional/${srv}/missions/${mId}`).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;
            
            document.getElementById('mTitle').innerText = m.title;
            document.getElementById('mReward').innerText = "BOUNTY: " + m.bounty.toLocaleString() + " RP";
            
            // Cek jika sudah selesai diproses (misal sudah jalan)
            if(m.status === "TAKEN" || m.status === "PICKED") {
                alert("Kontrak Ditandatangani!");
                window.location.href = "mission_status.html?id=" + mId;
            }
        });

        // 2. Pantau Pelamar Secara Real-time di Path Regional
        db.ref(`database_regional/${srv}/missions/${mId}/applicants`).on('value', (snap) => {
            const applicants = snap.val();
            const container = document.getElementById('applicantsList');
            
            if(!applicants) {
                container.innerHTML = `<div class="waiting-msg shimmer">BELUM ADA PELAMAR MASUK...</div>`;
                return;
            }

            container.innerHTML = ""; 
            
            Object.keys(applicants).forEach(advId => {
                const adv = applicants[advId];
                const card = document.createElement('div');
                card.className = 'adv-card';
                card.innerHTML = `
                    <div class="adv-name">${adv.nickname}</div>
                    <div class="adv-meta">ADVENTURER RANK ${adv.rank || 'F'}</div>
                    <div class="adv-nego">PENAWARAN: ${parseInt(adv.price).toLocaleString()} RP</div>
                    <div class="adv-note">"${adv.note || 'Tidak ada pesan tambahan.'}"</div>
                    <button class="btn-select" onclick="selectAdventurer('${advId}', '${adv.nickname}')">PILIH PETUALANG INI</button>
                `;
                container.appendChild(card);
            });
        });

        async function selectAdventurer(advId, advName) {
            if(!confirm("Konfirmasi pemilihan " + advName + "?")) return;

            try {
                // Update status misi menjadi PICKED agar Adventurer tahu dia terpilih
                await db.ref(`database_regional/${srv}/missions/${mId}`).update({
                    executor: advId,
                    executorName: advName,
                    status: "PICKED" 
                });

                // Hapus dari Board Central agar tidak muncul lagi di radar orang lain
                await db.ref(`board_central/active_quests/${mId}`).remove();

                alert("Adventurer telah dikonfirmasi!");
            } catch (error) {
                alert("Gagal memilih: " + error.message);
            }
        }
    </script>
</body>
</html>
