<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SELECT ADVENTURER | PICK ME GUILD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00d9ff;
            --neon-gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 20px;
            background: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .title { color: var(--neon-blue); font-size: 16px; font-weight: bold; letter-spacing: 2px; }

        .quest-info { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 3px solid var(--neon-gold); }
        .quest-info h2 { margin: 0; font-size: 14px; color: var(--neon-gold); }
        .quest-info p { margin: 5px 0 0; font-size: 11px; color: #888; }

        .list-container { display: flex; flex-direction: column; gap: 15px; }
        
        .adv-card {
            background: var(--glass);
            border: 1px solid #222;
            padding: 15px;
            border-radius: 12px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .adv-name { font-weight: bold; color: var(--neon-blue); font-size: 14px; margin-bottom: 5px; }
        .adv-meta { font-size: 10px; color: #555; margin-bottom: 10px; }
        .adv-nego { font-size: 13px; color: var(--neon-gold); font-weight: bold; }
        .adv-note { font-size: 11px; color: #ccc; background: #111; padding: 8px; border-radius: 5px; margin: 10px 0; }

        .btn-select {
            width: 100%; padding: 10px; background: var(--neon-blue); color: #000;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 12px;
        }

        .waiting-msg { text-align: center; color: #444; font-size: 12px; margin-top: 50px; }
        
        /* Shimmer Effect for Loading */
        .shimmer { animation: pulse 1.5s infinite; color: #222; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">/// ADVENTURER SELECTION ///</div>
    </div>

    <div id="questDetail" class="quest-info">
        <h2 id="mTitle">Memuat Misi...</h2>
        <p id="mReward">Base Reward: 0 STONE</p>
    </div>

    <div id="applicantsList" class="list-container">
        <div class="waiting-msg shimmer">MENUNGGU PELAMAR MASUK...</div>
    </div>

    <script>
        // --- 1. CONFIG FIREBASE (Sama dengan index.html) ---
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_KAMU",
            authDomain: "ISI_DOMAIN_KAMU",
            databaseURL: "ISI_DATABASE_URL_KAMU",
            projectId: "ISI_PROJECT_ID_KAMU",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');

        if(!mId) window.location.href = "create_mission.html";

        // 1. Ambil Detail Misi
        db.ref('missions/' + mId).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;
            document.getElementById('mTitle').innerText = m.title;
            document.getElementById('mReward').innerText = "Base Reward: " + m.reward + " STONE";
            
            // JIKA STATUS SUDAH BERUBAH KE CONTRACT_SIGNED (Karena Adventurer ACC)
            if(m.status === "CONTRACT_SIGNED") {
                alert("Kontrak Disetujui! Memulai Briefing...");
                window.location.href = "mission_active.html?id=" + mId;
            }
        });

        // 2. Pantau Pelamar Secara Real-time
        db.ref(`missions/${mId}/applicants`).on('value', (snap) => {
            const applicants = snap.val();
            const container = document.getElementById('applicantsList');
            
            if(!applicants) {
                container.innerHTML = `<div class="waiting-msg shimmer">BELUM ADA PELAMAR. SINYAL TERPANCAR...</div>`;
                return;
            }

            container.innerHTML = ""; // Bersihkan list
            
            Object.values(applicants).forEach(adv => {
                const card = document.createElement('div');
                card.className = 'adv-card';
                card.innerHTML = `
                    <div class="adv-name">${adv.name} <span style="font-size:10px; color:#555;">[RANK ${adv.rank}]</span></div>
                    <div class="adv-nego">OFFER: ${adv.negoPrice} STONE</div>
                    <div class="adv-note">"${adv.note || 'Tidak ada catatan.'}"</div>
                    <button class="btn-select" onclick="selectAdventurer('${adv.id}', '${adv.name}', '${adv.negoPrice}')">PILIH ADVENTURER</button>
                `;
                container.appendChild(card);
            });
        });

        function selectAdventurer(advId, advName, finalPrice) {
            if(!confirm("Pilih " + advName + " untuk misi ini?")) return;

            // Update status misi di Cloud
            db.ref('missions/' + mId).update({
                selectedAdv: advId,
                selectedAdvName: advName,
                finalPrice: finalPrice,
                status: "WAITING_ACC" // Tahap menunggu Adventurer ACC Kontrak
            }).then(() => {
                alert("Adventurer Terpilih! Menunggu Konfirmasi Kontrak...");
            });
        }
    </script>
</body>
</html>
