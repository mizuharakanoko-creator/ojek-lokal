<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | CREATE MISSION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffff;
            --bg-main: #050505;
            --bg-card: #0a0a0a;
            --border-color: #222;
            --text-main: #fff;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { 
            background-color: var(--bg-main); color: var(--text-main); 
            margin: 0; font-family: 'Segoe UI', sans-serif; padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .card { 
            background: var(--bg-card); border: 1px solid var(--border-color); 
            padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-family: var(--font-terminal); font-size: 11px; color: #888; margin-bottom: 5px; }
        
        .input-field {
            width: 100%; background: #111; border: 1px solid var(--border-color);
            color: #fff; padding: 12px; border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        .input-field:focus { border-color: var(--neon-cyan); outline: none; }

        .btn-post {
            width: 100%; padding: 15px; background: var(--neon-cyan);
            color: #000; border: none; border-radius: 4px; cursor: pointer;
            font-family: var(--font-terminal); font-weight: bold; margin-top: 10px;
        }

        .nav-link {
            display: block; text-align: center; margin-top: 20px;
            font-size: 12px; color: var(--neon-pink); text-decoration: none;
            font-family: var(--font-terminal);
        }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: var(--neon-pink); letter-spacing: 5px; margin: 0;">PICK ME</h1>
    <p style="font-size: 10px; color: var(--neon-cyan); font-family: var(--font-terminal);">REQUESTER TERMINAL: POST A QUEST</p>
</div>

<div class="card">
    <div class="input-group">
        <label>YOUR NAME (REQUESTER)</label>
        <input type="text" id="reqName" class="input-field" placeholder="Ex: Merchant Joe">
    </div>

    <div class="input-group">
        <label>QUEST TITLE</label>
        <input type="text" id="mTitle" class="input-field" placeholder="Ex: Antar Paket Ramuan">
    </div>

    <div class="input-group">
        <label>MISSION DESCRIPTION</label>
        <textarea id="mDesc" class="input-field" style="height: 80px;" placeholder="Detail tugas..."></textarea>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>REWARD (RP)</label>
            <input type="number" id="mReward" class="input-field" placeholder="50000">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>SERVER AREA</label>
            <select id="mServer" class="input-field">
                <option value="KNG-01">KNG-01 (KUNINGAN)</option>
                <option value="CRB-01">CRB-01 (CIREBON)</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>PICKUP POINT</label>
        <input type="text" id="mPickup" class="input-field" placeholder="Lokasi Jemput">
    </div>

    <button class="btn-post" id="btnPost" onclick="postMission()">BROADCAST MISSION</button>
</div>

<a href="login.html" class="nav-link">SWITCH TO ADVENTURER LOGIN</a>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function postMission() {
        const btn = document.getElementById('btnPost');
        const server = document.getElementById('mServer').value;
        
        const missionData = {
            requester_name: document.getElementById('reqName').value,
            title: document.getElementById('mTitle').value,
            description: document.getElementById('mDesc').value,
            reward: parseInt(document.getElementById('mReward').value),
            pickup_point: document.getElementById('mPickup').value,
            status: "posted",
            created_at: Date.now(),
            applicants: {}
        };

        if(!missionData.title || !missionData.reward) return alert("Lengkapi data misi!");

        btn.innerText = "BROADCASTING...";
        btn.disabled = true;

        try {
            // Generate ID Unik untuk Misi
            const newMissionRef = db.ref(`missions/${server}`).push();
            const mId = newMissionRef.key;

            await newMissionRef.set(missionData);

            alert("Misi Berhasil di-Broadcast!");
            // Simpan ID misi di session agar bisa masuk ke Lobby
            localStorage.setItem('active_mission_id', mId);
            localStorage.setItem('active_mission_server', server);
            
            window.location.href = "lobby.html";
        } catch (e) {
            alert(e.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
