<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | REQUESTER TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffff;
            --bg-main: #050505;
            --bg-card: #0a0a0a;
            --border-color: #222;
            --text-main: #fff;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { 
            background-color: var(--bg-main); color: var(--text-main); 
            margin: 0; font-family: 'Segoe UI', sans-serif; padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .card { 
            background: var(--bg-card); border: 1px solid var(--border-color); 
            padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-family: var(--font-terminal); font-size: 11px; color: #888; margin-bottom: 5px; }
        
        .input-field {
            width: 100%; background: #111; border: 1px solid var(--border-color);
            color: #fff; padding: 12px; border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }

        .location-tag {
            font-size: 10px; color: var(--neon-cyan); margin-top: 5px; 
            font-family: var(--font-terminal); display: block;
        }

        .btn-post {
            width: 100%; padding: 15px; background: var(--neon-cyan);
            color: #000; border: none; border-radius: 4px; cursor: pointer;
            font-family: var(--font-terminal); font-weight: bold; margin-top: 10px;
        }

        .btn-post:disabled { background: #333; cursor: not-allowed; }

        .loader { font-size: 10px; color: var(--neon-pink); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: var(--neon-pink); letter-spacing: 5px; margin: 0;">PICK ME</h1>
    <p style="font-size: 10px; color: var(--neon-cyan); font-family: var(--font-terminal);">V2.0: AUTO-GEOTAGGING ENABLED</p>
</div>

<div class="card">
    <div id="locStatus" class="loader">MENDETEKSI KOORDINAT...</div>
    
    <div class="input-group">
        <label>NAMA REQUESTER</label>
        <input type="text" id="reqName" class="input-field" placeholder="Nama Anda">
    </div>

    <div class="input-group">
        <label>JUDUL MISI</label>
        <input type="text" id="mTitle" class="input-field" placeholder="Contoh: Antar Paket Urgent">
    </div>

    <div class="input-group">
        <label>DETAIL TUGAS</label>
        <textarea id="mDesc" class="input-field" style="height: 60px;" placeholder="Tulis instruksi singkat..."></textarea>
    </div>

    <div class="input-group">
        <label>HADIAH (CASH)</label>
        <input type="number" id="mReward" class="input-field" placeholder="Nominal Rp">
    </div>

    <div class="input-group">
        <label>LOKASI PENJEMPUTAN (DESA/KECAMATAN TERDETEKSI)</label>
        <input type="text" id="mPickup" class="input-field" readonly style="background: #000; color: var(--neon-cyan); border-color: #444;">
        <span id="geoDetail" class="location-tag">Mencari sinyal GPS...</span>
    </div>

    <button class="btn-post" id="btnPost" onclick="postMission()" disabled>MENUNGGU LOKASI...</button>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userLat, userLon, detectedServer = "GLOBAL-01";

    // --- 1. DETEKSI LOKASI (GPS + REVERSE GEOCODING) ---
    function initGeolocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                
                try {
                    // Pakai Nominatim (OpenStreetMap) API - Gratis & Tanpa Key
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`);
                    const data = await res.json();
                    
                    const desa = data.address.village || data.address.suburb || data.address.town || "Desa Tidak Dikenal";
                    const kecamatan = data.address.city_district || data.address.county || "";
                    
                    document.getElementById('mPickup').value = `${desa}, ${kecamatan}`;
                    document.getElementById('geoDetail').innerText = `KOORDINAT: ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
                    document.getElementById('locStatus').innerText = "SINYAL TERKUNCI";
                    document.getElementById('locStatus').style.color = "var(--neon-cyan)";
                    
                    // Logika Sharding Sederhana berdasarkan wilayah
                    if(data.address.city === "Kuningan" || data.address.county === "Kuningan") detectedServer = "KNG-01";
                    else if(data.address.city === "Cirebon") detectedServer = "CRB-01";

                    document.getElementById('btnPost').disabled = false;
                    document.getElementById('btnPost').innerText = "BROADCAST MISSION";
                } catch (e) {
                    document.getElementById('locStatus').innerText = "GAGAL ANALISA LOKASI";
                    document.getElementById('btnPost').disabled = false;
                    document.getElementById('btnPost').innerText = "POST (MANUAL)";
                }
            }, (err) => {
                alert("GPS Diblokir. Harap izinkan lokasi agar sistem bisa menentukan server.");
                document.getElementById('locStatus').innerText = "GPS DISABLED";
            });
        }
    }

    // --- 2. POST MISSION ---
    async function postMission() {
        const btn = document.getElementById('btnPost');
        
        const missionData = {
            requester_name: document.getElementById('reqName').value || "Anonim",
            title: document.getElementById('mTitle').value,
            description: document.getElementById('mDesc').value,
            reward: parseInt(document.getElementById('mReward').value),
            pickup_point: document.getElementById('mPickup').value,
            lat: userLat || 0,
            lon: userLon || 0,
            status: "posted",
            created_at: Date.now(), // Untuk sistem expiry
            server: detectedServer
        };

        if(!missionData.title || !missionData.reward) return alert("Lengkapi judul dan hadiah!");

        btn.innerText = "UPLOADING TO SHARD...";
        btn.disabled = true;

        try {
            const newRef = db.ref(`missions/${detectedServer}`).push();
            const mId = newRef.key;

            await newRef.set(missionData);

            // Sinyal Notifikasi Hemat Kuota (Langkah 4 Diskusi)
            db.ref(`notif_signal/${detectedServer}`).set(Date.now());

            localStorage.setItem('active_mission_id', mId);
            localStorage.setItem('active_mission_server', detectedServer);
            
            window.location.href = "lobby.html";
        } catch (e) {
            alert(e.message);
            btn.disabled = false;
        }
    }

    initGeolocation();
</script>
</body>
</html>
