<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATE REQUESTER</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; text-align: center; padding: 20px; }
        .rating-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #00d9ff; }
        select { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #333; }
        .btn-submit { width: 100%; padding: 15px; background: #ffcc00; color: #000; border: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>LAPORAN AKHIR ADVENTURER</h2>
    <div class="rating-box">
        <p>Bagaimana pengalaman bekerja dengan Requester ini?</p>
        <select id="rev">
            <option value="GOOD">Sangat Kooperatif</option>
            <option value="NORMAL">Normal</option>
            <option value="BAD">Sulit Dihubungi</option>
        </select>
        <button class="btn-submit" onclick="submitReview()">SIMPAN LAPORAN</button>
    </div>

    <script>
        function submitReview() {
            window.location.href = "clearchance.html";
        }
    </script>
</body>
</html>
