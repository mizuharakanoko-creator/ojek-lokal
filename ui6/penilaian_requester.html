<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATE REQUESTER | SOVEREIGN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #000; color: #fff; font-family: monospace; text-align: center; padding: 20px; }
        .rating-box { background: #0a0a0c; padding: 30px; border-radius: 15px; border: 1px solid #00d9ff; max-width: 400px; margin: 40px auto; }
        h2 { font-family: 'Orbitron'; color: #00d9ff; font-size: 16px; }
        select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; margin: 20px 0; }
        .btn-submit { width: 100%; padding: 15px; background: #ffcc00; color: #000; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>LAPORAN AKHIR PETUALANG</h2>
    <div class="rating-box">
        <p style="font-size: 11px; color: #666;">Kesan bekerja dengan Requester ini:</p>
        <select id="rev">
            <option value="5">Sangat Kooperatif (Bintang 5)</option>
            <option value="3">Normal (Bintang 3)</option>
            <option value="1">Sulit Dihubungi (Bintang 1)</option>
        </select>
        <button class="btn-submit" onclick="submitReview()">SUBMIT LOG</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');
        const srv = "SRV-JAKARTA";

        async function submitReview() {
            const val = document.getElementById('rev').value;
            
            await db.ref(`database_regional/${srv}/missions/${mId}`).update({
                ratingToClient: parseInt(val)
            });
            
            window.location.href = "clearchance.html";
        }
    </script>
</body>
</html>
