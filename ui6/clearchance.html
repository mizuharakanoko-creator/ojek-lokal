<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEAR CHANCE</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .stamp { border: 4px solid #fff; padding: 20px; font-size: 30px; font-weight: 900; letter-spacing: 5px; transform: rotate(-10deg); animation: stamp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
        @keyframes stamp { from { opacity: 0; transform: scale(3) rotate(-30deg); } to { opacity: 1; transform: scale(1) rotate(-10deg); } }
    </style>
</head>
<body>
    <div>
        <div class="stamp" id="stamp">MISSION CLEAR</div>
        <p id="msg" style="margin-top: 30px; font-size: 10px; color: #555;">RETURNING TO HOME BASE...</p>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('pickme_user'));
        setTimeout(() => {
            if(session.role === 'adventurer') window.location.href = "dashboard.html";
            else window.location.href = "create_mission.html";
        }, 3000);
    </script>
</body>
</html>
