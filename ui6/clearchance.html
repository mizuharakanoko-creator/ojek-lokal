<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION CLEAR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { background: #000; color: #fff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .stamp { 
            border: 6px solid #fff; padding: 20px 40px; font-family: 'Orbitron';
            font-size: 35px; font-weight: 900; letter-spacing: 5px; 
            transform: rotate(-10deg); color: #fff;
            animation: stamp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            opacity: 0; text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        @keyframes stamp { 
            from { opacity: 0; transform: scale(5) rotate(-40deg); filter: blur(10px); } 
            to { opacity: 1; transform: scale(1) rotate(-10deg); filter: blur(0); } 
        }
    </style>
</head>
<body>
    <div>
        <div class="stamp">MISSION CLEAR</div>
        <p id="msg" style="margin-top: 40px; font-size: 10px; color: #444; letter-spacing: 2px;">SYNCHRONIZING REPUTATION DATA...</p>
    </div>

    <script>
        // Menggunakan key yang benar dari login.html
        const myRole = localStorage.getItem('user_role');

        setTimeout(() => {
            if(myRole === 'adventurer') {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "create_mission.html";
            }
        }, 3500);
    </script>
</body>
</html>
