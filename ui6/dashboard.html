<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASHBOARD | PICK ME GUILD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00d9ff;
            --neon-gold: #ffcc00;
            --bg-card: #0f0f0f;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; padding: 15px; background: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .user-info { font-size: 12px; color: var(--neon-blue); }
        .rank-tag { background: var(--neon-gold); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }

        .board-title { font-size: 14px; letter-spacing: 3px; color: #444; margin-bottom: 15px; text-align: center; }

        .quest-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }

        .quest-card {
            background: var(--bg-card); border: 1px solid #1a1a1a; border-radius: 12px;
            padding: 15px; position: relative; transition: 0.3s;
        }
        .quest-card:active { transform: scale(0.98); }

        .q-title { font-size: 15px; font-weight: bold; color: var(--neon-gold); margin-bottom: 5px; }
        .q-reward { font-size: 12px; color: var(--neon-blue); margin-bottom: 10px; }
        .q-desc { font-size: 11px; color: #777; line-height: 1.4; margin-bottom: 15px; }

        .btn-apply {
            width: 100%; padding: 10px; background: transparent; color: var(--neon-blue);
            border: 1px solid var(--neon-blue); border-radius: 6px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; font-size: 11px;
        }

        /* Modal Nego */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--neon-blue);
            padding: 25px; border-radius: 15px; width: 85%; max-width: 350px;
        }
        .modal-title { color: var(--neon-gold); font-size: 16px; margin-bottom: 15px; }
        input, textarea {
            width: 100%; background: #111; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;
            font-family: monospace; outline: none;
        }
        .btn-send { width: 100%; background: var(--neon-blue); border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-close { width: 100%; background: transparent; color: #ff4444; border: none; margin-top: 10px; cursor: pointer; font-size: 11px; }

        .empty-state { text-align: center; color: #333; margin-top: 100px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="userName">Loading...</span> 
            <span class="rank-tag" id="userRank">F</span>
        </div>
        <div style="font-size: 10px; color: #444;" id="userShard">SHARD: -</div>
    </div>

    <div class="board-title">/// AVAILABLE MISSIONS ///</div>

    <div class="quest-list" id="questContainer">
        <div class="empty-state">MENCARI MISI DI RADAR...</div>
    </div>

    <div id="modalNego" class="modal">
        <div class="modal-content">
            <div class="modal-title">[ AJUKAN NEGO ]</div>
            <input type="hidden" id="targetMsnId">
            <label style="font-size: 10px; color: #555;">HARGA PENAWARAN (STONE)</label>
            <input type="number" id="negoPrice" placeholder="Contoh: 1500">
            <label style="font-size: 10px; color: #555;">CATATAN / SKILL</label>
            <textarea id="negoNote" placeholder="Kenapa kamu yang terbaik untuk misi ini?"></textarea>
            <button class="btn-send" onclick="submitNego()">KIRIM LAMARAN</button>
            <button class="btn-close" onclick="closeModal()">BATAL</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_KAMU",
            authDomain: "ISI_DOMAIN_KAMU",
            databaseURL: "ISI_DATABASE_URL_KAMU",
            projectId: "ISI_PROJECT_ID_KAMU",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const session = JSON.parse(localStorage.getItem('pickme_user'));
        if(!session || session.role !== 'adventurer') window.location.href = "index.html";

        document.getElementById('userName').innerText = session.name;
        document.getElementById('userRank').innerText = session.rank || 'F';
        document.getElementById('userShard').innerText = "SHARD: " + session.shard;

        // --- WATCHER: Cek Jika Saya Dipilih oleh Requester ---
        db.ref('missions').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            for(let id in data) {
                const m = data[id];
                // Jika ID saya terpilih dan status menunggu persetujuan (ACC)
                if(m.selectedAdv === session.id && m.status === "WAITING_ACC") {
                    window.location.href = "kontrak_mission.html?id=" + m.id;
                    return;
                }
            }
            renderBoard(data);
        });

        function renderBoard(data) {
            const container = document.getElementById('questContainer');
            container.innerHTML = "";

            const available = Object.values(data).filter(m => m.status === "OPEN" && m.shard === session.shard);

            if(available.length === 0) {
                container.innerHTML = `<div class="empty-state">TIDAK ADA MISI AKTIF DI WILAYAH INI.</div>`;
                return;
            }

            available.forEach(m => {
                const card = document.createElement('div');
                card.className = 'quest-card';
                card.innerHTML = `
                    <div class="q-title">${m.title}</div>
                    <div class="q-reward">${m.reward} STONE</div>
                    <div class="q-desc">${m.desc.substring(0, 80)}...</div>
                    <button class="btn-apply" onclick="openModal('${m.id}', ${m.reward})">AMBIL MISI / NEGO</button>
                `;
                container.appendChild(card);
            });
        }

        function openModal(id, baseReward) {
            document.getElementById('targetMsnId').value = id;
            document.getElementById('negoPrice').value = baseReward;
            document.getElementById('modalNego').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalNego').style.display = 'none'; }

        function submitNego() {
            const mId = document.getElementById('targetMsnId').value;
            const price = document.getElementById('negoPrice').value;
            const note = document.getElementById('negoNote').value;

            if(!price) return alert("Masukkan harga nego!");

            const application = {
                id: session.id,
                name: session.name,
                rank: session.rank || 'F',
                negoPrice: price,
                note: note,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref(`missions/${mId}/applicants/${session.id}`).set(application).then(() => {
                alert("Lamaran terkirim! Menunggu keputusan Requester...");
                closeModal();
            });
        }
    </script>
</body>
</html>
