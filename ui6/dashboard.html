<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | MISSION BOARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffff;
            --bg-main: #050505;
            --bg-card: #0a0a0a;
            --border-color: #222;
            --text-main: #fff;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { 
            background-color: var(--bg-main); color: var(--text-main); 
            margin: 0; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px;
        }

        header {
            background: var(--bg-card); padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .user-info { font-family: var(--font-terminal); font-size: 12px; }
        .user-nick { color: var(--neon-pink); font-weight: bold; }

        .mission-container { padding: 15px; }
        
        /* Mission Card Styles */
        .mission-card {
            background: #0f0f0f; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 15px; margin-bottom: 15px;
            position: relative; transition: 0.3s;
        }

        /* State: Applied (Dimatikan) */
        .mission-card.applied {
            filter: grayscale(1) opacity(0.5);
            pointer-events: none;
            border-style: dashed;
        }

        .mission-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .reward { color: #ffbb33; font-weight: bold; font-family: var(--font-terminal); }
        .m-title { font-size: 16px; font-weight: bold; margin: 0; color: var(--neon-cyan); }
        .m-desc { font-size: 13px; color: #aaa; margin: 5px 0; }
        
        .m-footer { 
            margin-top: 10px; padding-top: 10px; border-top: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-family: var(--font-terminal);
        }

        .btn-accept {
            background: var(--neon-cyan); color: #000; border: none;
            padding: 8px 15px; border-radius: 4px; font-weight: bold;
            cursor: pointer; font-family: var(--font-terminal);
        }

        /* Notification Overlay */
        #notification-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
        }
        .notif-box {
            border: 2px solid var(--neon-pink); padding: 30px;
            background: #000; box-shadow: 0 0 20px var(--neon-pink);
        }
        .btn-go {
            margin-top: 20px; padding: 15px 30px; background: var(--neon-pink);
            color: white; border: none; font-weight: bold; font-family: var(--font-terminal);
            cursor: pointer; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #empty-msg { text-align: center; padding: 50px 20px; color: #444; font-family: var(--font-terminal); }

        nav.bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: #000; border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { color: #555; font-size: 10px; text-align: center; text-decoration: none; }
        .nav-item.active { color: var(--neon-pink); }
    </style>
</head>
<body>

<div id="notification-overlay">
    <div class="notif-box">
        <h2 class="text-neon-pink" style="color:var(--neon-pink)">QUEST ACCEPTED!</h2>
        <p id="notif-text">Requester telah memilih Anda untuk menjalankan misi.</p>
        <button class="btn-go" onclick="goToBriefing()">BUKA KONTRAK & BRIEFING</button>
    </div>
</div>

<header>
    <div class="user-info">
        ADVENTURER: <span class="user-nick" id="displayNick">---</span><br>
        SERVER: <span style="color:var(--neon-cyan)" id="displayServer">---</span>
    </div>
    <button onclick="logout()" style="background:none; border:1px solid #333; color:#888; font-size:10px; padding:5px;">LOGOUT</button>
</header>

<div class="mission-container">
    <h3 style="font-family: var(--font-terminal); font-size: 14px; color: #555; margin-left: 5px;">AVAILABLE MISSIONS</h3>
    <div id="missionList">
        <div id="empty-msg">SCANNING FOR QUESTS...</div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active">BOARD</a>
    <a href="#" class="nav-item">MY QUEST</a>
    <a href="#" class="nav-item">PROFILE</a>
</nav>

<script>
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    if(!session) { window.location.href = "login.html"; }
    else {
        document.getElementById('displayNick').innerText = session.nick;
        document.getElementById('displayServer').innerText = session.server;
    }

    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadMissions() {
        const missionRef = db.ref(`missions/${session.server}`);

        missionRef.on('value', (snapshot) => {
            const missionListDiv = document.getElementById('missionList');
            missionListDiv.innerHTML = "";
            
            if(!snapshot.exists()) {
                missionListDiv.innerHTML = '<div id="empty-msg">NO MISSIONS AVAILABLE.</div>';
                return;
            }

            snapshot.forEach((child) => {
                const m = child.val();
                const mId = child.key;

                // Cek apakah user sudah melamar misi ini
                const hasApplied = m.applicants && m.applicants[session.nick];
                
                // Cek apakah user terpilih (Trigger Notif)
                if(m.selected_adventurer === session.nick && m.status === "briefing") {
                    showSelectionNotice(mId);
                }

                // Hanya tampilkan misi yang statusnya 'posted' (tersedia)
                if(m.status === "posted") {
                    const cardClass = hasApplied ? "mission-card applied" : "mission-card";
                    const btnLabel = hasApplied ? "WAITING..." : "TAKE QUEST";

                    const card = `
                        <div class="${cardClass}" id="card-${mId}">
                            <div class="mission-header">
                                <p class="m-title">${m.title}</p>
                                <span class="reward">Rp ${m.reward.toLocaleString()}</span>
                            </div>
                            <p class="m-desc">${m.description}</p>
                            <div class="m-footer">
                                <span>📍 ${m.pickup_point}</span>
                                <button class="btn-accept" onclick="applyMission('${mId}')">${btnLabel}</button>
                            </div>
                        </div>
                    `;
                    missionListDiv.innerHTML += card;
                }
            });
        });
    }

    function applyMission(mId) {
        if(!confirm("Ambil misi ini?")) return;

        const applyData = {
            nick: session.nick,
            timestamp: Date.now(),
            rating: 5.0
        };

        db.ref(`missions/${session.server}/${mId}/applicants/${session.nick}`).set(applyData)
        .then(() => {
            // Visual feedback instant
            document.getElementById(`card-${mId}`).classList.add('applied');
        })
        .catch(e => alert(e.message));
    }

    function showSelectionNotice(mId) {
        localStorage.setItem('active_mission_id', mId);
        localStorage.setItem('active_mission_server', session.server);
        document.getElementById('notification-overlay').style.display = 'flex';
    }

    function goToBriefing() {
        window.location.href = "briefing.html";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    loadMissions();
</script>

</body>
</html>
