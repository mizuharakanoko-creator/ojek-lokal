<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATE ADVENTURER</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; text-align: center; padding: 20px; }
        .rating-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--neon-gold); }
        .star-btn { font-size: 30px; background: none; border: none; color: #333; cursor: pointer; }
        .star-btn.active { color: #ffcc00; }
        .btn-submit { width: 100%; padding: 15px; background: #00d9ff; border: none; margin-top: 20px; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>PENILAIAN ADVENTURER</h2>
    <div class="rating-box">
        <p>Berikan Rating untuk Adventurer atas jasanya:</p>
        <div id="stars">
            <button class="star-btn" onclick="setRating(1)">★</button>
            <button class="star-btn" onclick="setRating(2)">★</button>
            <button class="star-btn" onclick="setRating(3)">★</button>
            <button class="star-btn" onclick="setRating(4)">★</button>
            <button class="star-btn" onclick="setRating(5)">★</button>
        </div>
        <button class="btn-submit" onclick="submitReview()">KIRIM & SELESAIKAN</button>
    </div>

    <script>
        let currentRating = 0;
        function setRating(r) {
            currentRating = r;
            const btns = document.querySelectorAll('.star-btn');
            btns.forEach((b, i) => b.classList.toggle('active', i < r));
        }
        function submitReview() {
            if(currentRating === 0) return alert("Pilih rating!");
            window.location.href = "clearchance.html";
        }
    </script>
</body>
</html>
