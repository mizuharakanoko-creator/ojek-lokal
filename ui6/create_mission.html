<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBUG MODE | FORGE MISSION</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; background: #111; color: #0f0; border: 1px solid #0f0; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: #00ff00; color: #000; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div class="box">
        <h3>/// SYSTEM DEBUG: MISSION FORGE ///</h3>
        <input type="text" id="mTitle" placeholder="Judul Misi">
        <textarea id="mDesc" placeholder="Deskripsi"></textarea>
        <input type="text" id="mPickup" placeholder="Lokasi">
        <input type="number" id="mBounty" placeholder="Bounty (Angka)">
        <button onclick="forcePublish()">EXECUTE TRANSMISSION</button>
    </div>

    <script>
        // 1. Inisialisasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase Initialized");
        }

        const db = firebase.database();

        async function forcePublish() {
            console.log("🚀 Memulai proses forcePublish...");
            
            const title = document.getElementById('mTitle').value;
            const bounty = document.getElementById('mBounty').value;
            const pickup = document.getElementById('mPickup').value;
            const myNick = localStorage.getItem('user_nickname') || "GUEST_USER";
            const srv = "SRV-JAKARTA";
            const mId = "MSN-" + Date.now();

            // Cek kelengkapan data
            if(!title || !bounty) {
                alert("❌ Gagal: Judul dan Bounty tidak boleh kosong!");
                return;
            }

            const payload = {
                id: mId,
                clientName: myNick,
                title: title,
                instructions: document.getElementById('mDesc').value || "-",
                bounty: parseInt(bounty),
                status: "OPEN",
                server: srv,
                pickupLocation: pickup,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            console.log("📦 Data yang akan dikirim:");
            console.table(payload);

            try {
                // Gunakan Path Global dulu untuk testing apakah koneksi masuk
                console.log("📡 Mencoba menulis ke: database_regional/" + srv + "/missions/" + mId);
                
                await db.ref(`database_regional/${srv}/missions/${mId}`).set(payload);
                
                console.log("✅ BERHASIL! Data masuk ke Firebase.");
                alert("TRANSMISI BERHASIL!\nCek Firebase sekarang.");
                
            } catch (error) {
                console.error("❌ FIREBASE ERROR:");
                console.error(error);
                alert("CRITICAL ERROR: " + error.message);
            }
        }
    </script>
</body>
</html>
