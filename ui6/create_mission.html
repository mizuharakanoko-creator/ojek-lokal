<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATE MISSION | SOVEREIGN GUILD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon-blue: #00d9ff; --neon-gold: #ffcc00; --bg: #020204; }
        body { margin: 0; padding: 20px; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; }
        .header { text-align: center; margin-bottom: 30px; }
        .title { font-family: 'Orbitron'; color: var(--neon-gold); font-size: 18px; letter-spacing: 3px; }
        .form-card { background: rgba(255,255,255,0.03); border: 1px solid #1a1a24; padding: 25px; border-radius: 15px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; font-size: 10px; color: var(--neon-blue); margin: 15px 0 5px; text-transform: uppercase; font-family: 'Orbitron'; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-family: inherit; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-blue); }
        .btn-publish { width: 100%; padding: 18px; margin-top: 30px; border-radius: 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border: 1px solid var(--neon-gold); background: rgba(255, 204, 0, 0.1); color: var(--neon-gold); text-transform: uppercase; letter-spacing: 2px; }
        .btn-publish:hover { background: var(--neon-gold); color: #000; }
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 11px; color: #555; text-decoration: none; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">/// FORGE NEW MISSION ///</div>
        <p style="font-size: 10px; color: #444; letter-spacing: 1px;">TRANSMITTING TO GLOBAL BOARD</p>
    </div>

    <div class="form-card">
        <label>JUDUL MISI (QUEST TITLE)</label>
        <input type="text" id="mTitle" placeholder="Misal: Pengawalan Barang Rahasia...">

        <label>DESKRIPSI (INSTRUCTIONS)</label>
        <textarea id="mDesc" placeholder="Jelaskan detail tugas..." style="height:80px;"></textarea>

        <label>LOKASI PENJEMPUTAN (PICKUP)</label>
        <input type="text" id="mPickup" placeholder="Nama Jalan / Gedung...">

        <label>BOUNTY (REWARD - RP)</label>
        <input type="number" id="mBounty" placeholder="Contoh: 50000">

        <label>REQUIRED RANK</label>
        <select id="mRank">
            <option value="F">RANK F</option>
            <option value="E">RANK E</option>
            <option value="D">RANK D</option>
        </select>

        <button class="btn-publish" onclick="publishMission()">PUBLISH TO BOARD</button>
    </div>

    <a href="login.html" class="back-link">[ ABORT MISSION ]</a>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil session yang benar dari login.html
        const myNick = localStorage.getItem('user_nickname');
        const myRole = localStorage.getItem('user_role');

        if(!myNick || myRole !== 'requester') {
            alert("Sesi Requester tidak ditemukan!");
            window.location.href = "login.html";
        }

        async function publishMission() {
            const title = document.getElementById('mTitle').value;
            const desc = document.getElementById('mDesc').value;
            const bounty = document.getElementById('mBounty').value;
            const rank = document.getElementById('mRank').value;
            const pickup = document.getElementById('mPickup').value;

            if(!title || !bounty || !pickup) return alert("Data wajib diisi!");

            const mId = "MSN-" + Date.now();
            const srv = "SRV-JAKARTA"; // Server default agar muncul di radar Adventurer

            // Struktur data yang sesuai dengan sistem Radar & Shard
            const missionData = {
                id: mId,
                clientName: myNick,
                category: "DELIVERY",
                title: title,
                instructions: desc,
                bounty: parseInt(bounty),
                requiredRank: rank,
                status: "OPEN",
                server: srv,
                route: {
                    pickup: pickup,
                    destination: "TBD",
                    lat: -6.2000, // Contoh Koordinat (Harus diisi agar muncul di radar 1km)
                    lng: 106.8166
                },
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            try {
                // 1. Simpan Detail Lengkap di Regional Database
                await db.ref(`database_regional/${srv}/missions/${mId}`).set(missionData);

                // 2. Simpan Ringkasan di Central Board (Agar Radar Adventurer bisa deteksi)
                await db.ref(`board_central/active_quests/${mId}`).set({
                    id: mId,
                    server: srv,
                    price: parseInt(bounty),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                alert("MISI BERHASIL DIPUBLIKASIKAN!");
                window.location.href = "waiting_approval.html?id=" + mId;

            } catch (error) {
                console.error(error);
                alert("Gagal posting misi: " + error.message);
            }
        }
    </script>
</body>
</html>
