<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTIVE MISSION | PICK ME GUILD</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon-blue: #00d9ff; --neon-gold: #ffcc00; }
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #222; text-align: center; background: #0a0a0a; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 80%; font-size: 12px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--neon-blue); color: #000; }
        .msg.them { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; }
        .input-area { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; outline: none; }
        .btn-send { background: var(--neon-blue); border: none; padding: 0 20px; border-radius: 5px; font-weight: bold; }
        .btn-complete { width: 100%; padding: 15px; background: var(--neon-gold); border: none; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 10px; color: var(--neon-gold);">MISSION IN PROGRESS</div>
        <div id="mTitle" style="font-size: 14px; margin-top: 5px;">-</div>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Ketik pesan ke rekan...">
        <button class="btn-send" onclick="sendChat()">KIRIM</button>
    </div>
    <button class="btn-complete" id="btnAction" onclick="finishMission()">SELESAIKAN MISI</button>

    <script>
        const firebaseConfig = { apiKey: "...", authDomain: "...", databaseURL: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');
        const session = JSON.parse(localStorage.getItem('pickme_user'));

        // Load Mission & Watch Status
        db.ref('missions/' + mId).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;
            document.getElementById('mTitle').innerText = m.title;
            
            // Logika Redirect Otomatis ke Penilaian
            if(m.status === "COMPLETED") {
                if(session.role === 'requester') window.location.href = "penilaian_adventurer.html?id=" + mId;
                else window.location.href = "penilaian_requester.html?id=" + mId;
            }
        });

        // Chat Logic
        db.ref(`chats/${mId}`).on('child_added', (snap) => {
            const c = snap.val();
            const div = document.createElement('div');
            div.className = `msg ${c.senderId === session.id ? 'me' : 'them'}`;
            div.innerText = c.text;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });

        function sendChat() {
            const text = document.getElementById('chatInput').value;
            if(!text) return;
            db.ref(`chats/${mId}`).push({ senderId: session.id, text: text, time: Date.now() });
            document.getElementById('chatInput').value = "";
        }

        function finishMission() {
            if(!confirm("Konfirmasi misi telah selesai?")) return;
            db.ref('missions/' + mId).update({ status: "COMPLETED" });
        }
    </script>
</body>
</html>
