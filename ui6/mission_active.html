<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTIVE MISSION | SOVEREIGN HUB</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon-blue: #00d9ff; --neon-gold: #ffcc00; --bg: #020204; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { padding: 15px; border-bottom: 1px solid #1a1a24; text-align: center; background: #0a0a0c; }
        .header-status { font-family: 'Orbitron'; font-size: 9px; color: var(--neon-gold); letter-spacing: 2px; }
        #mTitle { font-family: 'Orbitron'; font-size: 13px; margin-top: 5px; color: #eee; }

        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.5); }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 75%; font-size: 13px; line-height: 1.5; position: relative; }
        .msg.me { align-self: flex-end; background: var(--neon-blue); color: #000; font-weight: bold; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #1a1a24; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 8px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }

        .input-area { padding: 15px; background: #0a0a0c; display: flex; gap: 10px; border-top: 1px solid #111; align-items: center; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px 15px; border-radius: 10px; outline: none; font-family: inherit; }
        input:focus { border-color: var(--neon-blue); }
        .btn-send { background: var(--neon-blue); border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; }
        
        .btn-complete { width: 100%; padding: 18px; background: var(--neon-gold); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-status">/// LINK ESTABLISHED ///</div>
        <div id="mTitle">LOADING MISSION DATA...</div>
    </div>

    <div class="chat-box" id="chatBox">
        </div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Kirim instruksi/status...">
        <button class="btn-send" onclick="sendChat()">SEND</button>
    </div>

    <button class="btn-complete" id="btnAction" onclick="finishMission()">MARK AS COMPLETED</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');
        const myNick = localStorage.getItem('user_nickname');
        const myRole = localStorage.getItem('user_role');
        const srv = "SRV-JAKARTA";

        if(!mId || !myNick) window.location.href = "login.html";

        // 1. Load Mission & Watch Status di Shard Regional
        db.ref(`database_regional/${srv}/missions/${mId}`).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;
            document.getElementById('mTitle').innerText = m.title;
            
            // JIKA SELESAI: Arahkan ke Rating
            if(m.status === "COMPLETED") {
                const targetPage = (myRole === 'requester') ? "penilaian_adventurer.html" : "penilaian_requester.html";
                window.location.href = `${targetPage}?id=${mId}`;
            }
        });

        // 2. Chat Logic (Disimpan di folder khusus chat regional agar rapi)
        const chatRef = db.ref(`database_regional/${srv}/chats/${mId}`);
        
        chatRef.on('child_added', (snap) => {
            const c = snap.val();
            const div = document.createElement('div');
            div.className = `msg ${c.sender === myNick ? 'me' : 'them'}`;
            
            const time = new Date(c.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `${c.text} <span class="msg-time">${time}</span>`;
            
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });

        function sendChat() {
            const text = document.getElementById('chatInput').value.trim();
            if(!text) return;

            chatRef.push({
                sender: myNick,
                text: text,
                time: firebase.database.ServerValue.TIMESTAMP
            });
            document.getElementById('chatInput').value = "";
        }

        // Support Enter to Send
        document.getElementById('chatInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendChat();
        });

        async function finishMission() {
            if(!confirm("Apakah Anda yakin misi ini sudah selesai?")) return;

            try {
                // Update status di Shard Regional
                await db.ref(`database_regional/${srv}/missions/${mId}`).update({ 
                    status: "COMPLETED",
                    completedAt: firebase.database.ServerValue.TIMESTAMP
                });
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
