<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTRACT | SOVEREIGN GUILD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon-blue: #00d9ff; --neon-gold: #ffcc00; --bg: #050508; }
        body { margin: 0; padding: 20px; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; }
        .contract-frame { border: 1px solid #1a1a24; padding: 30px 25px; border-radius: 15px; background: var(--bg); max-width: 450px; margin: 0 auto; position: relative; overflow: hidden; }
        .header-logo { font-family: 'Orbitron'; text-align: center; color: var(--neon-gold); font-size: 14px; margin-bottom: 35px; letter-spacing: 4px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .section { margin-bottom: 20px; }
        .label { font-family: 'Orbitron'; font-size: 9px; color: #444; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 16px; font-weight: bold; color: #eee; }
        .highlight { color: var(--neon-blue); }
        .clause { font-size: 11px; color: #555; line-height: 1.6; margin-top: 30px; font-style: italic; }
        .btn-sign { width: 100%; padding: 20px; margin-top: 40px; border-radius: 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border: 1px solid var(--neon-blue); background: rgba(0, 217, 255, 0.05); color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; }
        .btn-sign:active { background: var(--neon-blue); color: #000; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 50px; color: rgba(255,255,255,0.01); pointer-events: none; white-space: nowrap; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div class="contract-frame">
        <div class="watermark">CONFIDENTIAL</div>
        <div class="header-logo">/// MISSION CONTRACT ///</div>

        <div class="section">
            <div class="label">TRANSACTION ID</div>
            <div class="value" id="viewId">MSN-SCANNING...</div>
        </div>

        <div class="section">
            <div class="label">ISSUED BY (CLIENT)</div>
            <div class="value" id="viewRequester">-</div>
        </div>

        <div class="section">
            <div class="label">EXECUTOR (ADVENTURER)</div>
            <div class="value highlight" id="viewAdventurer">-</div>
        </div>

        <div class="section">
            <div class="label">OBJECTIVE</div>
            <div class="value" id="viewTitle">-</div>
        </div>

        <div class="section">
            <div class="label">TOTAL BOUNTY</div>
            <div class="value highlight" style="color:var(--neon-gold)" id="viewPrice">Rp 0</div>
        </div>

        <div class="clause">
            DENGAN MENANDATANGANI INI, ANDA TERIKAT PADA ATURAN GUILD. KEGAGALAN MENYELESAIKAN TUGAS DAPAT MENGAKIBATKAN PENURUNAN RANK DAN PENALTI VITALITAS.
        </div>

        <button class="btn-sign" id="btnSign" onclick="confirmContract()">ACCEPT & SIGN</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');
        const myNick = localStorage.getItem('user_nickname');
        const srv = "SRV-JAKARTA";

        if(!mId || !myNick) window.location.href = "login.html";

        // Tarik Data dari Regional Shard
        db.ref(`database_regional/${srv}/missions/${mId}`).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;

            // Ambil harga penawaran dari pelamar (karena harga bisa dinego)
            const myApplication = m.applicants ? m.applicants[myNick] : null;
            const finalPrice = myApplication ? myApplication.price : m.bounty;

            document.getElementById('viewId').innerText = m.id;
            document.getElementById('viewRequester').innerText = m.clientName;
            document.getElementById('viewAdventurer').innerText = myNick;
            document.getElementById('viewTitle').innerText = m.title;
            document.getElementById('viewPrice').innerText = "Rp " + parseInt(finalPrice).toLocaleString();

            // Jika status sudah berubah ke TAKEN, pindah ke briefing
            if(m.status === "TAKEN") {
                window.location.href = "briefing.html?id=" + mId;
            }
        });

        async function confirmContract() {
            if(!confirm("Terima kontrak ini?")) return;

            document.getElementById('btnSign').innerText = "TRANSMITTING...";
            document.getElementById('btnSign').disabled = true;

            try {
                // Update status menjadi TAKEN (Misi resmi berjalan)
                await db.ref(`database_regional/${srv}/missions/${mId}`).update({
                    status: "TAKEN",
                    startedAt: firebase.database.ServerValue.TIMESTAMP
                });
            } catch (e) {
                alert("Gagal tanda tangan: " + e.message);
                document.getElementById('btnSign').disabled = false;
            }
        }
    </script>
</body>
</html>
