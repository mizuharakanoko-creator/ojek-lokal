<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIN | SOVEREIGN HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap');

        body {
            margin: 0; background: #020204; color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .login-card {
            width: 85%; max-width: 350px; padding: 40px 25px;
            background: rgba(10, 12, 16, 0.8);
            border: 1px solid #1a1a24; border-radius: 15px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        h2 { font-family: 'Orbitron'; font-size: 18px; color: #00f3ff; margin-bottom: 30px; letter-spacing: 2px; }

        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: #00f3ff; border-radius: 8px; margin-bottom: 20px;
            text-align: center; font-family: 'Orbitron'; font-size: 14px; outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: #00f3ff; }

        .btn-connect {
            width: 100%; padding: 15px; background: #00f3ff; color: #000;
            border: none; border-radius: 8px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .status { margin-top: 15px; font-size: 10px; color: #555; font-family: monospace; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ESTABLISH LINK</h2>
        <input type="text" id="nickInput" placeholder="ENTER NICKNAME" autocomplete="off">
        <button class="btn-connect" onclick="startNeuralLink()">CONNECT TO GUILD</button>
        <div id="statusMsg" class="status">SISTEM SIAP MENERIMA TRANSMISI</div>
    </div>

    <script>
        // --- CONFIG FIREBASE (Gunakan config yang sama dengan index.html) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function startNeuralLink() {
            const nick = document.getElementById('nickInput').value.trim().toUpperCase();
            const status = document.getElementById('statusMsg');

            if(!nick || nick.length < 3) {
                alert("NICKNAME TERLALU PENDEK!");
                return;
            }

            status.innerText = "MENGHUBUNGI SATELIT...";
            
            try {
                // 1. Cek apakah user sudah ada
                const snap = await db.ref(`users_adventurer/${nick}`).get();

                if(!snap.exists()) {
                    // 2. Jika BELUM ADA, buat data awal (Auto-Register)
                    status.innerText = "MENDAFTARKAN PETUALANG BARU...";
                    const defaultProfile = {
                        nickname: nick,
                        rank: "F",
                        vitality: {
                            stamina_current: 1000,
                            stamina_max: 1000,
                            apply_limit_daily: 50
                        },
                        stats: {
                            total_missions_today: 0,
                            balance_stone: 0
                        },
                        last_online: firebase.database.ServerValue.TIMESTAMP
                    };
                    await db.ref(`users_adventurer/${nick}`).set(defaultProfile);
                }

                // 3. Simpan Nickname ke LocalStorage & Pindah ke Index
                localStorage.setItem('user_nickname', nick);
                status.innerText = "LINK ESTABLISHED! REDIRECTING...";
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);

            } catch (error) {
                console.error(error);
                status.innerText = "GAGAL TERHUBUNG KE DATABASE.";
                alert("Koneksi Error. Cek Config Firebase Anda.");
            }
        }
    </script>
</body>
</html>
