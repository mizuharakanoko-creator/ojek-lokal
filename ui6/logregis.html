<!DOCTYPE html>
<html lang="en" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | ADVENTURER REGISTRATION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffff;
            --neon-cyan-dim: rgba(0, 255, 255, 0.1);
            --bg-main: #050505;
            --bg-card: #0a0a0a;
            --border-color: #222;
            --text-main: #fff;
            --text-muted: #888;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input, textarea { -webkit-user-select: text; user-select: text; outline: none; }
        
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        .text-neon-pink { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255,0,85,0.5); }
        .text-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,255,255,0.5); }

        .app-container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        
        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; padding: 20px; margin: 15px;
        }

        /* Step Progress */
        .step-indicator { display: flex; justify-content: space-between; padding: 20px 30px; position: relative; }
        .step-dot { width: 20px; height: 20px; border-radius: 50%; background: #222; border: 2px solid #444; z-index: 2; transition: 0.5s; }
        .step-dot.active { background: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink); }
        .step-line { position: absolute; top: 29px; left: 40px; right: 40px; height: 2px; background: #222; z-index: 1; }
        .step-line-fill { height: 100%; background: var(--neon-pink); width: 0%; transition: 0.5s; }

        .reg-section { display: none; }
        .reg-section.active { display: block; animation: slide 0.3s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-family: var(--font-terminal); font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }
        
        .input-field, .textarea-field {
            width: 100%; background: #111; border: 1px solid var(--border-color);
            color: #fff; padding: 12px; border-radius: 4px; font-size: 14px;
        }
        .input-field:focus { border-color: var(--neon-cyan); }

        .btn { 
            flex: 1; padding: 15px; border: none; border-radius: 4px; 
            font-family: var(--font-terminal); font-weight: bold; cursor: pointer;
        }
        .btn-primary { background: var(--neon-cyan); color: #000; }
        .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }

        /* Modal */
        #customModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-box { width: 85%; background: #0a0a0a; border: 2px solid var(--neon-cyan); padding: 20px; text-align: center; }

        /* Picker */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: #111; 
            border-top: 2px solid var(--neon-cyan); transition: 0.4s; z-index: 10000; padding: 20px;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-item { padding: 15px; border-bottom: 1px solid #222; color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align:center; padding: 40px 0 10px 0;">
        <h1 class="text-neon-pink" style="letter-spacing:5px; margin:0;">PICK ME</h1>
        <p class="text-neon-cyan" style="font-size:9px; font-family:var(--font-terminal);">ADVENTURER REGISTRATION TERMINAL</p>
    </div>

    <div class="step-indicator">
        <div class="step-line"><div class="step-line-fill" id="stepLine"></div></div>
        <div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div>
        <div class="step-dot"></div><div class="step-dot"></div><div class="step-dot"></div>
    </div>

    <form id="regForm">
        <div class="reg-section active" id="s1">
            <div class="card">
                <label>UNIQUE CODENAME</label>
                <input type="text" id="regNick" class="input-field" placeholder="ex: shadow_walker" oninput="this.value=this.value.toLowerCase().replace(/\s+/g,'')">
                <br><br>
                <label>ENCRYPTION KEY (PASSWORD)</label>
                <input type="password" id="regPass" class="input-field" placeholder="Min 8 characters">
            </div>
        </div>

        <div class="reg-section" id="s2">
            <div class="card">
                <label>FULL LEGAL NAME</label>
                <input type="text" id="regFullName" class="input-field" placeholder="Sesuai KTP" oninput="this.value=this.value.toUpperCase()">
                <br><br>
                <label>NATIONAL ID (NIK)</label>
                <input type="number" id="regNik" class="input-field" placeholder="16 Digit NIK">
            </div>
        </div>

        <div class="reg-section" id="s3">
            <div class="card">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="regEmail" class="input-field" placeholder="email@gmail.com">
                <br><br>
                <label>WHATSAPP NUMBER</label>
                <input type="tel" id="regPhone" class="input-field" placeholder="812345678">
            </div>
        </div>

        <div class="reg-section" id="s4">
            <div class="card">
                <label>OPERATIONAL SERVER</label>
                <div id="pArea" class="input-field" onclick="openPicker('SERVER', ['KNG-01 (KUNINGAN)', 'CRB-01 (CIREBON)'], 'regArea')">Select Server...</div>
                <input type="hidden" id="regArea">
                <br>
                <label>BASE ADDRESS</label>
                <textarea id="regAddress" class="input-field" style="height:80px;" placeholder="Alamat lengkap..."></textarea>
            </div>
        </div>

        <div class="reg-section" id="s5">
            <div class="card">
                <label>VEHICLE TYPE</label>
                <div id="pVehicle" class="input-field" onclick="openPicker('VEHICLE', ['MOTORCYCLE', 'CAR', 'BICYCLE', 'WALKER'], 'regVehicle')">Select Vehicle...</div>
                <input type="hidden" id="regVehicle">
                <br>
                <label>LICENSE PLATE</label>
                <input type="text" id="regPlate" class="input-field" placeholder="E 1234 XX" oninput="this.value=this.value.toUpperCase()">
            </div>
        </div>

        <div class="reg-section" id="s6">
            <div class="card">
                <label>RECOVERY QUESTION</label>
                <input type="text" id="q1" class="input-field" placeholder="Nama ibu kandung?">
                <br><br>
                <label>RECOVERY ANSWER</label>
                <input type="text" id="a1" class="input-field" placeholder="Jawaban rahasia">
            </div>
        </div>

        <div style="display:flex; gap:10px; padding:0 15px;">
            <button type="button" class="btn btn-secondary" id="btnPrev" style="display:none;" onclick="move(-1)">BACK</button>
            <button type="button" class="btn btn-primary" id="btnNext" onclick="move(1)">CONTINUE</button>
        </div>
    </form>
</div>

<div id="customModal"><div class="modal-box"><h3 id="mTitle" class="text-neon-pink"></h3><p id="mMsg"></p><button class="btn btn-primary" style="width:100%" onclick="closeModal()">OK</button></div></div>
<div id="bottomSheet"><div id="sheetList"></div></div>

<script>
    // 1. CONFIG FIREBASE (Sesuai kode Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. UI LOGIC
    let step = 1;
    const max = 6;

    function move(dir) {
        if (dir === 1 && !validate()) return;
        if (dir === 1 && step === max) return submit();

        step += dir;
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.reg-section').forEach((s, i) => s.classList.toggle('active', i === step - 1));
        document.querySelectorAll('.step-dot').forEach((d, i) => d.classList.toggle('active', i < step));
        document.getElementById('stepLine').style.width = ((step - 1) / (max - 1) * 100) + "%";
        document.getElementById('btnPrev').style.display = step === 1 ? 'none' : 'block';
        document.getElementById('btnNext').innerText = step === max ? 'FINALIZE' : 'CONTINUE';
    }

    function validate() {
        if (step === 1 && (document.getElementById('regNick').value.length < 3 || document.getElementById('regPass').value.length < 5)) { alert("Nick/Pass too short"); return false; }
        if (step === 2 && document.getElementById('regNik').value.length !== 16) { alert("NIK must be 16 digits"); return false; }
        return true;
    }

    function openPicker(title, items, target) {
        const list = document.getElementById('sheetList');
        list.innerHTML = `<h4 style="color:var(--neon-cyan)">SELECT ${title}</h4>`;
        items.forEach(it => {
            const d = document.createElement('div');
            d.className = 'sheet-item';
            d.innerText = it;
            d.onclick = () => {
                document.getElementById(target).value = it;
                document.getElementById('p' + target.replace('reg','')).innerText = it;
                document.getElementById('bottomSheet').classList.remove('active');
            };
            list.appendChild(d);
        });
        document.getElementById('bottomSheet').classList.add('active');
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    // 3. DATABASE SUBMIT LOGIC
    async function submit() {
        const btn = document.getElementById('btnNext');
        btn.innerText = "UPLOADING..."; btn.disabled = true;

        const nick = document.getElementById('regNick').value;
        const area = document.getElementById('regArea').value;
        const serverId = area.includes("KNG") ? "KNG-01" : "CRB-01";

        const data = {
            profile: {
                name: document.getElementById('regFullName').value,
                nik: document.getElementById('regNik').value,
                email: document.getElementById('regEmail').value,
                phone: "62" + document.getElementById('regPhone').value,
                address: document.getElementById('regAddress').value,
                vehicle: document.getElementById('regVehicle').value,
                plate: document.getElementById('regPlate').value
            },
            stats: { level: 1, reputation: 0, status: "WAITING_ROOM", join_date: Date.now() },
            security: { 
                password: document.getElementById('regPass').value,
                q: document.getElementById('q1').value,
                a: document.getElementById('a1').value
            }
        };

        try {
            // Cek Duplikat
            const check = await db.ref(`gateway/adventurers_lookup/${nick}`).once('value');
            if(check.exists()) throw new Error("Codename already taken!");

            // Simpan ke Lookup (Gateway)
            await db.ref(`gateway/adventurers_lookup/${nick}`).set({ server: serverId, status: "ACTIVE" });
            
            // Simpan Full Data ke Shard
            await db.ref(`identity_adventurer/${serverId}/${nick}`).set(data);

            document.getElementById('mTitle').innerText = "SUCCESS";
            document.getElementById('mMsg').innerText = "Adventurer terdaftar! Menuju login...";
            document.getElementById('customModal').style.display = 'flex';
            setTimeout(() => { window.location.reload(); }, 3000);

        } catch (e) {
            alert(e.message);
            btn.innerText = "FINALIZE"; btn.disabled = false;
        }
    }
</script>

</body>
</html>
