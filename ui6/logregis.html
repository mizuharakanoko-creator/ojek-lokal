<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIN | SOVEREIGN HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        body { margin: 0; background: #020204; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-card { width: 90%; max-width: 380px; padding: 40px 30px; background: rgba(10, 12, 16, 0.95); border: 1px solid #00f3ff; border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(0, 243, 255, 0.15); position: relative; }
        h2 { font-family: 'Orbitron'; font-size: 20px; color: #00f3ff; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }
        input { width: 100%; padding: 18px; background: #000; border: 1px solid #333; color: #00f3ff; border-radius: 10px; margin-bottom: 20px; text-align: center; font-family: 'Orbitron'; font-size: 14px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #00f3ff; box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .role-selection { display: flex; gap: 10px; margin-bottom: 25px; }
        .role-btn { flex: 1; padding: 15px; border: 1px solid #333; background: #050505; color: #555; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s; font-weight: bold; }
        .role-btn.active { border-color: #00f3ff; color: #00f3ff; background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 10px rgba(0, 243, 255, 0.1); }
        .btn-connect { width: 100%; padding: 20px; background: #00f3ff; color: #000; border: none; border-radius: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        #statusMsg { margin-top: 20px; font-size: 11px; color: #ffcc00; font-family: 'Orbitron'; min-height: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Neural Link</h2>
        <input type="text" id="nickInput" placeholder="ENTER NICKNAME" autocomplete="off">
        
        <div class="role-selection">
            <button id="btnAdv" class="role-btn active" onclick="setRole('adventurer')">ADVENTURER</button>
            <button id="btnReq" class="role-btn" onclick="setRole('requester')">REQUESTER</button>
        </div>

        <button class="btn-connect" onclick="startNeuralLink()">Initialise Link</button>
        <div id="statusMsg">READY FOR TRANSMISSION</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedRole = 'adventurer';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('btnAdv').classList.toggle('active', role === 'adventurer');
            document.getElementById('btnReq').classList.toggle('active', role === 'requester');
        }

        async function startNeuralLink() {
            const nick = document.getElementById('nickInput').value.trim().toUpperCase();
            const status = document.getElementById('statusMsg');

            if(nick.length < 3) return alert("NICKNAME TOO SHORT!");

            status.innerText = "SYNCHRONIZING WITH CLOUD...";
            
            try {
                const path = selectedRole === 'adventurer' ? `users_adventurer/${nick}` : `users_requester/${nick}`;
                const snap = await db.ref(path).get();
                
                if(!snap.exists()) {
                    status.innerText = "REGISTERING NEW IDENTITY...";
                    const baseData = {
                        nickname: nick,
                        role: selectedRole,
                        rank: "F",
                        vitality: { stamina_current: 1000, stamina_max: 1000 },
                        stats: { total_missions: 0, balance_stone: 0 },
                        shard: "SRV-JAKARTA",
                        last_seen: firebase.database.ServerValue.TIMESTAMP
                    };
                    await db.ref(path).set(baseData);
                }

                // Simpan Session ke LocalStorage
                localStorage.setItem('user_nickname', nick);
                localStorage.setItem('user_role', selectedRole);
                
                status.innerText = "LINK SUCCESSFUL!";
                setTimeout(() => {
                    window.location.href = (selectedRole === 'adventurer') ? "index.html" : "create_mission.html";
                }, 800);

            } catch (error) {
                console.error(error);
                status.innerText = "CONNECTION FAILED!";
                alert("DATABASE ERROR: Check your Firebase Rules!");
            }
        }
    </script>
</body>
</html>
