<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GATEWAY | PICK ME GUILD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00d9ff;
            --neon-gold: #ffcc00;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #111, #000);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container {
            width: 90%; max-width: 400px; text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-text { font-size: 40px; font-weight: 900; letter-spacing: 8px; color: var(--neon-blue); text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); margin: 0; }
        .sub-text { font-size: 10px; color: #555; letter-spacing: 3px; margin-bottom: 40px; }

        .card { background: var(--glass); border: 1px solid #222; padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); }
        
        label { display: block; text-align: left; font-size: 10px; color: var(--neon-blue); margin: 15px 0 5px; letter-spacing: 1px; }
        input, select {
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            padding: 12px; border-radius: 8px; font-family: monospace; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 217, 255, 0.2); }

        .btn-gate {
            width: 100%; padding: 15px; margin-top: 25px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            border: none; text-transform: uppercase; letter-spacing: 2px;
            background: var(--neon-blue); color: #000;
        }
        .btn-gate:active { transform: scale(0.95); }

        #gateLoader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { border: 3px solid #222; border-top: 3px solid var(--neon-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="gateLoader">
        <div class="spinner"></div>
        <div style="font-size:10px; letter-spacing:2px; color:var(--neon-blue);">ESTABLISHING SECURE CONNECTION...</div>
    </div>

    <div class="container">
        <h1 class="logo-text">PICK ME</h1>
        <div class="sub-text">GUILD GLOBAL NETWORK</div>

        <div class="card">
            <label>IDENTITAS (NAMA)</label>
            <input type="text" id="username" placeholder="Masukkan Nama...">

            <label>PERAN (ROLE)</label>
            <select id="role">
                <option value="adventurer">ADVENTURER (Pelaksana)</option>
                <option value="requester">REQUESTER (Pemberi Misi)</option>
            </select>

            <label>WILAYAH (SHARD)</label>
            <select id="shard">
                <option value="KNG_01">KUNINGAN (KNG_01)</option>
                <option value="JKT_02">JAKARTA (JKT_02)</option>
                <option value="BDG_03">BANDUNG (BDG_03)</option>
            </select>

            <button class="btn-gate" onclick="initSession()">INISIALISASI DATA</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIG FIREBASE (PASTE PUNYA KAMU DI SINI) ---
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_KAMU",
            authDomain: "ISI_DOMAIN_KAMU",
            databaseURL: "ISI_DATABASE_URL_KAMU",
            projectId: "ISI_PROJECT_ID_KAMU",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initSession() {
            const name = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            const shard = document.getElementById('shard').value;

            if(!name) return alert("Identitas wajib diisi!");

            // Menampilkan Loader
            document.getElementById('gateLoader').style.display = 'flex';

            const userData = {
                id: "USR-" + Date.now(),
                name: name,
                role: role,
                shard: shard,
                rank: "F", // Rank awal
                stone: 0,
                status: "online",
                last_seen: firebase.database.ServerValue.TIMESTAMP
            };

            // Simpan ke LocalStorage (Sesi HP)
            localStorage.setItem('pickme_user', JSON.stringify(userData));

            // Simpan ke Cloud (Firebase)
            db.ref('users/' + userData.id).set(userData).then(() => {
                setTimeout(() => {
                    // Routing berdasarkan Role
                    if(role === 'adventurer') {
                        window.location.href = "dashboard.html";
                    } else {
                        window.location.href = "create_mission.html";
                    }
                }, 1500);
            }).catch(err => {
                alert("Koneksi Gagal: " + err.message);
                document.getElementById('gateLoader').style.display = 'none';
            });
        }

        // Cek jika sudah ada sesi, langsung arahkan
        window.onload = () => {
            const session = JSON.parse(localStorage.getItem('pickme_user'));
            if(session) {
                document.getElementById('gateLoader').style.display = 'flex';
                if(session.role === 'adventurer') window.location.href = "dashboard.html";
                else window.location.href = "create_mission.html";
            }
        };
    </script>
</body>
</html>
