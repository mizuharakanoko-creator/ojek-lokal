<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADVENTURER HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon: #00f3ff; --bg: #020204; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        /* Loading Gate */
        #neural-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .ring { width: 80px; height: 80px; border: 3px solid transparent; border-top-color: var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* UI Header */
        .header { padding: 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid #111; }
        .stamina-bar { width: 100%; height: 10px; background: #111; border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid #222; }
        .stamina-fill { height: 100%; width: 0%; background: var(--neon); transition: 1s; box-shadow: 0 0 10px var(--neon); }
        
        .stats-row { display: flex; justify-content: space-between; margin-top: 15px; }
        .stat-box { background: #0a0a0a; padding: 10px 15px; border-radius: 8px; border-left: 3px solid var(--neon); }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; }
        .stat-val { font-family: 'Orbitron'; font-size: 14px; color: #fff; }

        .radar-box { text-align: center; margin-top: 50px; color: #222; font-family: 'Orbitron'; }
    </style>
</head>
<body onload="initSystem()">

    <div id="neural-gate">
        <div class="ring"></div>
        <p style="color:var(--neon); font-family:'Orbitron'; font-size:10px; margin-top:20px; letter-spacing:2px;">SYNCING IDENTITY...</p>
    </div>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="ui-nick" style="font-family:'Orbitron'; font-weight:900; color:var(--neon);">PLAYER</span>
            <span id="ui-rank" style="color:#ffcc00; font-weight:bold;">RANK -</span>
        </div>
        <div class="stamina-bar"><div id="stamina-fill" class="stamina-fill"></div></div>
        <div style="font-size:9px; color:#444; margin-top:5px; text-align:right;" id="stamina-text">0 / 0 VITALITY</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Balance</div>
                <div class="stat-val" id="ui-stone">0 STONE</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Missions</div>
                <div class="stat-val" id="ui-count">0</div>
            </div>
        </div>
    </div>

    <div class="radar-box">
        <p>RADAR STANDBY</p>
        <button onclick="location.reload()" style="background:none; border:1px solid #333; color:#555; padding:10px; border-radius:5px; font-family:'Orbitron'; font-size:10px;">RESCAN SECTOR</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initSystem() {
            const myNick = localStorage.getItem('user_nickname');
            const myRole = localStorage.getItem('user_role');

            if(!myNick || myRole !== 'adventurer') {
                window.location.href = "login.html";
                return;
            }

            // Listener Realtime ke Path users_adventurer
            db.ref(`users_adventurer/${myNick}`).on('value', snap => {
                const data = snap.val();
                
                if(data) {
                    // Update UI
                    document.getElementById('ui-nick').innerText = data.nickname;
                    document.getElementById('ui-rank').innerText = "RANK " + data.rank;
                    document.getElementById('ui-stone').innerText = (data.stats?.balance_stone || 0) + " STONE";
                    document.getElementById('ui-count').innerText = data.stats?.total_missions || 0;
                    
                    const cur = data.vitality?.stamina_current || 0;
                    const max = data.vitality?.stamina_max || 1000;
                    document.getElementById('stamina-fill').style.width = (cur/max*100) + "%";
                    document.getElementById('stamina-text').innerText = `${cur} / ${max} VITALITY`;

                    // HILANGKAN LOADING
                    setTimeout(() => {
                        document.getElementById('neural-gate').style.opacity = '0';
                        setTimeout(() => document.getElementById('neural-gate').style.display = 'none', 800);
                    }, 1000);
                } else {
                    alert("DATA TIDAK DITEMUKAN. SILAKAN LOGIN ULANG.");
                    localStorage.clear();
                    window.location.href = "login.html";
                }
            }, (error) => {
                console.error("Database Error:", error);
                alert("Koneksi ditolak! Cek Rules Firebase Anda.");
            });
        }
    </script>
</body>
</html>
