<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRIEFING | SOVEREIGN GUILD</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        :root { --neon: #00d9ff; --gold: #ffcc00; }
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .box { width: 80%; max-width: 400px; text-align: center; }
        .loading-text { font-family: 'Orbitron'; font-size: 10px; letter-spacing: 4px; color: var(--neon); margin-bottom: 30px; }
        .tip-card { background: rgba(255, 255, 255, 0.02); border: 1px solid #111; padding: 25px; border-radius: 15px; margin-bottom: 40px; position: relative; }
        .tip-title { color: var(--gold); font-family: 'Orbitron'; font-size: 11px; margin-bottom: 12px; }
        .tip-content { font-size: 12px; color: #666; line-height: 1.6; }
        .bar-bg { width: 100%; height: 2px; background: #111; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 10px var(--neon); }
        .scan { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0, 217, 255, 0.05), transparent); height: 100px; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="box">
        <div class="loading-text" id="status">INITIALIZING NEURAL LINK...</div>
        
        <div class="tip-card">
            <div class="scan"></div>
            <div class="tip-title">/// GUILD ADVICE ///</div>
            <div id="tipText" class="tip-content">Memuat data taktis...</div>
        </div>

        <div class="bar-bg"><div id="progress" class="bar-fill"></div></div>
    </div>

    <script>
        const tips = [
            "Selalu nyalakan GPS agar Guild bisa memantau koordinat keamanan Anda.",
            "Gunakan fitur 'S.O.S' jika terjadi kendala tak terduga di lapangan.",
            "Rating tinggi mempercepat promosi ke Rank B ke atas.",
            "Jangan lupa konfirmasi 'Mission Complete' setelah mencapai target.",
            "Reward Stone akan otomatis masuk ke Vault setelah Requester melakukan approval."
        ];

        document.getElementById('tipText').innerText = tips[Math.floor(Math.random() * tips.length)];

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');

        let p = 0;
        const interval = setInterval(() => {
            p += Math.random() * 3;
            if(p > 100) p = 100;
            
            document.getElementById('progress').style.width = p + "%";

            if (p >= 20) document.getElementById('status').innerText = "CONNECTING TO SHARD: JAKARTA...";
            if (p >= 50) document.getElementById('status').innerText = "DOWNLOADING MISSION PARAMETERS...";
            if (p >= 85) document.getElementById('status').innerText = "LINK STABLE - READY TO DEPLOY";

            if (p >= 100) {
                clearInterval(interval);
                // Pindah ke halaman kontrol misi utama
                window.location.href = "mission_status.html?id=" + mId;
            }
        }, 100);
    </script>
</body>
</html>
