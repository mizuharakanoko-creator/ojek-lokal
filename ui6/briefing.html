<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | MISSION CONTRACT</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon-pink: #ff0055; --neon-cyan: #00ffff; --bg-main: #050505; --bg-card: #0a0a0a; --font-terminal: 'Courier New', monospace; }
        body { background-color: var(--bg-main); color: #fff; margin: 0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .contract-box { max-width: 600px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--neon-cyan); padding: 25px; position: relative; }
        h2 { color: var(--neon-cyan); font-family: var(--font-terminal); border-bottom: 1px solid #222; }
        .mission-detail { background: #111; padding: 15px; border-radius: 4px; margin: 20px 0; font-size: 14px; }
        .label { color: #555; font-size: 10px; text-transform: uppercase; display: block; }
        .value { color: #fff; margin-bottom: 10px; display: block; }
        .education-section { background: rgba(0, 255, 255, 0.05); border-left: 4px solid var(--neon-cyan); padding: 15px; margin: 20px 0; font-size: 13px; }
        .status-waiting { text-align: center; padding: 20px; border: 1px dashed #444; color: #888; font-style: italic; animation: breathe 2s infinite; }
        @keyframes breathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .btn-sign { width: 100%; padding: 18px; background: var(--neon-pink); color: white; border: none; font-weight: bold; cursor: pointer; font-family: var(--font-terminal); margin-top: 15px; }
        #timer-display { color: var(--neon-pink); font-weight: bold; text-align: center; display: block; margin-top: 10px; font-family: var(--font-terminal); }
    </style>
</head>
<body>

<div class="contract-box">
    <h2>MISSION BRIEFING</h2>
    <div class="mission-detail">
        <span class="label">Quest Title</span><span class="value" id="mTitle">...</span>
        <span class="label">Requester</span><span class="value" id="mReq">...</span>
        <span class="label">Reward Gold</span><span class="value" id="mReward" style="color:#ffbb33;">...</span>
    </div>

    <div class="education-section">
        <strong style="color:var(--neon-cyan)">GUILD RULES:</strong>
        <ul style="padding-left: 15px;">
            <li>Selesaikan misi tepat waktu.</li>
            <li>Gunakan fitur Chat untuk koordinasi.</li>
            <li>Pembatalan sepihak mengurangi reputasi.</li>
        </ul>
    </div>

    <div id="actionArea">
        <p class="status-waiting">SINKRONISASI TERMINAL...</p>
    </div>
    <div id="timer-display"></div>
</div>

<script>
    const mId = localStorage.getItem('active_mission_id');
    const server = localStorage.getItem('active_mission_server');
    const session = JSON.parse(localStorage.getItem('pickme_session'));
    const isRequester = !session; 

    const firebaseConfig = { /* ... config Anda ... */ };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let countdown = 90;
    let timerInterval;

    function initBriefing() {
        if(!mId) { window.location.href = isRequester ? "index.html" : "dashboard.html"; return; }

        db.ref(`missions/${server}/${mId}`).on('value', (snap) => {
            const m = snap.val();
            if(!m) return;

            document.getElementById('mTitle').innerText = m.title;
            document.getElementById('mReq').innerText = m.requester_name;
            document.getElementById('mReward').innerText = "Rp " + m.reward.toLocaleString();

            if(m.status === "on_progress") {
                clearInterval(timerInterval);
                window.location.href = "mission_active.html";
            }
            renderActionArea(m);
        });
    }

    function renderActionArea(m) {
        const area = document.getElementById('actionArea');
        if(isRequester) {
            area.innerHTML = `<div class="status-waiting">Menunggu <b>${m.selected_adventurer}</b> menandatangani kontrak...</div>`;
        } else {
            if(m.status === "briefing") {
                area.innerHTML = `
                    <p style="font-size:11px; color:#666; text-align:center;">Waktu tersisa untuk setuju:</p>
                    <button class="btn-sign" onclick="acceptContract()">I ACCEPT THIS CONTRACT</button>
                    <button onclick="abortMission()" style="width:100%; background:none; border:none; color:#444; margin-top:10px; cursor:pointer;">REJECT</button>
                `;
                if(!timerInterval) startTimer();
            }
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            countdown--;
            document.getElementById('timer-display').innerText = "LOCKDOWN: " + countdown + "s";
            if(countdown <= 0) {
                clearInterval(timerInterval);
                abortMission();
            }
        }, 1000);
    }

    async function abortMission() {
        // Balikkan misi ke papan
        await db.ref(`missions/${server}/${mId}`).update({ status: "posted", selected_adventurer: null });
        window.location.href = "dashboard.html";
    }

    async function acceptContract() {
        if(!confirm("Setuju dengan kontrak?")) return;
        // Lock status kerja adventurer
        await db.ref(`identity_adventurer/${server}/${session.nick}/stats/is_working`).set(true);
        // Jalankan misi
        await db.ref(`missions/${server}/${mId}`).update({ status: "on_progress", accepted_at: Date.now() });
    }

    initBriefing();
</script>
</body>
</html>
