<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRIEFING | PICK ME GUILD</title>
    
    <style>
        :root {
            --neon-blue: #00d9ff;
            --neon-gold: #ffcc00;
        }

        body {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; text-align: center;
        }

        .briefing-box { width: 85%; max-width: 400px; position: relative; }

        .scan-line {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0, 217, 255, 0.1), transparent);
            height: 50px; width: 100%; animation: scan 2s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { 0% { top: -50px; } 100% { top: 100%; } }

        .loading-text { font-size: 10px; letter-spacing: 3px; color: var(--neon-blue); margin-bottom: 20px; }
        
        .tip-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid #222;
            padding: 20px; border-radius: 12px; margin-top: 20px;
            animation: fadeIn 1s ease-out;
        }

        .tip-title { color: var(--neon-gold); font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .tip-content { font-size: 11px; color: #888; line-height: 1.6; }

        .progress-container { width: 100%; height: 2px; background: #111; margin-top: 30px; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--neon-blue); width: 0%; transition: width 0.1s linear; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="scan-line"></div>

    <div class="briefing-box">
        <div class="loading-text" id="statusText">SYNCHRONIZING MISSION DATA...</div>
        
        <div class="tip-card">
            <div class="tip-title">[ GUILD ADVICE ]</div>
            <div class="tip-content" id="tipText">
                Selalu pastikan keselamatan adalah prioritas utama. Komunikasi yang jujur dengan Requester akan meningkatkan Rating keberhasilan Anda.
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <p style="font-size: 8px; color: #333; margin-top: 10px; letter-spacing: 1px;">SISTEM SEDANG MEMPERSIAPKAN MEDAN PERTEMPURAN...</p>
    </div>

    <script>
        const tips = [
            "Gunakan fitur Chat jika ada kendala di lokasi misi.",
            "Rating tinggi akan membuka akses ke misi Rank S dengan hadiah Stone lebih besar.",
            "Jangan pernah menyelesaikan misi tanpa konfirmasi dari Requester.",
            "Ketepatan waktu adalah kunci utama kenaikan Rank Adventurer.",
            "Guild memantau koordinat Anda untuk keamanan selama misi berlangsung."
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const mId = urlParams.get('id');

        // Random Tip
        document.getElementById('tipText').innerText = tips[Math.floor(Math.random() * tips.length)];

        // Progress Logic
        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');

        const interval = setInterval(() => {
            progress += 1.5;
            progressBar.style.width = progress + "%";

            if (progress >= 30) statusText.innerText = "UPLOADING CONTRACT TO SHARD...";
            if (progress >= 60) statusText.innerText = "ESTABLISHING P2P CONNECTION...";
            if (progress >= 90) statusText.innerText = "READY FOR DEPLOYMENT!";

            if (progress >= 100) {
                clearInterval(interval);
                // Pindah otomatis ke halaman misi utama
                window.location.href = "mission_active.html?id=" + mId;
            }
        }, 100);
    </script>
</body>
</html>
