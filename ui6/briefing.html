<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020813">
    <title>BRIEFING ROOM - CONTRACT SIGNATURE</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-gold: #ffcf00;
            --neon-red: #ff0055;
            --bg-deep: #020813;
            --panel-hex: rgba(10, 20, 35, 0.8);
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 50% 50%, #0a192f 0%, #020813 100%),
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        /* --- LOADING / TRANSITION OVERLAY --- */
        #warpOverlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .warp-grid {
            width: 200px; height: 200px; border: 2px solid var(--neon-cyan);
            position: relative; animation: rotate 2s linear infinite;
        }
        .warp-grid::before {
            content: ''; position: absolute; inset: 10px; border: 1px solid var(--neon-gold); animation: rotate 1s linear reverse infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .warp-text { margin-top: 20px; font-family: var(--font-mono); color: var(--neon-cyan); letter-spacing: 5px; font-size: 12px; }

        /* --- HEADER & STATUS --- */
        header {
            padding: 20px; border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 8, 19, 0.9);
        }
        .mission-id { font-family: var(--font-mono); color: var(--neon-gold); font-size: 18px; text-shadow: 0 0 10px rgba(255, 207, 0, 0.5); }
        .role-tag { font-size: 10px; padding: 3px 8px; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); text-transform: uppercase; }

        /* --- MAIN CONTENT LAYOUT --- */
        main { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow-y: auto; }

        /* CONTRACT PANEL */
        .panel {
            background: var(--panel-hex); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px; padding: 15px; position: relative;
        }
        .panel-label { font-family: var(--font-mono); font-size: 11px; color: var(--neon-cyan); margin-bottom: 10px; display: block; border-left: 3px solid var(--neon-cyan); padding-left: 8px; }

        .contract-data { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-family: var(--font-mono); }
        .data-item { font-size: 13px; margin-bottom: 5px; }
        .data-val { color: var(--neon-gold); display: block; font-size: 16px; margin-top: 2px; }

        /* STAFF ASSISTANTS CONSOLE */
        .staff-console { flex: 1; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 4px; padding: 10px; overflow-y: auto; }
        .staff-msg { margin-bottom: 12px; font-family: var(--font-mono); font-size: 12px; opacity: 0; transform: translateX(-10px); animation: fadeInMsg 0.5s forwards; }
        @keyframes fadeInMsg { 100% { opacity: 1; transform: translateX(0); } }

        .staff-name { font-weight: bold; margin-right: 8px; }
        .st-logistik { color: #50fa7b; } /* Hijau */
        .st-keamanan { color: #ff5555; } /* Merah */
        .st-finansial { color: #f1fa8c; } /* Kuning */
        .st-intel { color: #bd93f9; }    /* Ungu */

        .msg-body { color: #e6f1ff; line-height: 1.4; }

        /* --- FOOTER ACTIONS --- */
        footer { padding: 20px; background: rgba(2, 8, 19, 0.95); border-top: 1px solid rgba(255,255,255,0.05); }

        .btn-signature {
            width: 100%; padding: 18px; background: transparent;
            border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            font-family: var(--font-mono); font-size: 16px; font-weight: bold;
            letter-spacing: 2px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.3s;
        }
        .btn-signature:hover { background: rgba(0, 243, 255, 0.1); }
        .btn-signature:disabled { border-color: #333; color: #555; cursor: not-allowed; }

        /* Scanning effect on button */
        .btn-signature::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.4), transparent);
            animation: scan 2s infinite;
        }
        @keyframes scan { 100% { left: 100%; } }

        .wait-status { text-align: center; font-family: var(--font-mono); color: var(--neon-gold); font-size: 13px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    </style>
</head>
<body>

<div id="warpOverlay">
    <div class="warp-grid"></div>
    <div class="warp-text" id="warpStatus">INITIATING MISSION DEPLOYMENT...</div>
</div>

<header>
    <div>
        <div style="font-size: 9px; color: #8892b0; font-family: var(--font-mono);">CONTRACT_ID</div>
        <div class="mission-id" id="dispMId">-------</div>
    </div>
    <div class="role-tag" id="dispRole">IDENTIFYING...</div>
</header>

<main>
    <div class="panel">
        <span class="panel-label">CORE CONTRACT DATA</span>
        <div class="contract-data">
            <div class="data-item">ADVENTURER<span class="data-val" id="valAdv">---</span></div>
            <div class="data-item">REWARD<span class="data-val" id="valReward">Rp 0</span></div>
            <div class="data-item" style="grid-column: span 2;">PICKUP POINT<span class="data-val" id="valPickup" style="font-size:13px; color:#fff;">---</span></div>
        </div>
    </div>

    <div class="panel" style="flex:1; display:flex; flex-direction:column;">
        <span class="panel-label">STAF ASISTEN: BRIEFING LOG</span>
        <div class="staff-console" id="consoleLog">
            </div>
    </div>
</main>

<footer>
    <div id="actionArea">
        </div>
</footer>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- PARAMS & STATE ---
    const urlParams = new URLSearchParams(window.location.search);
    const mId = urlParams.get('mId');
    const role = urlParams.get('role'); // 'adventurer' atau 'requester'

    const State = {
        mId: mId,
        role: role,
        contractData: null
    };

    const App = {
        init: function() {
            if(!mId || !role) return alert("Invalid Access Token");
            
            document.getElementById('dispMId').innerText = mId;
            document.getElementById('dispRole').innerText = role;

            this.loadContract();
            this.setupWatchdog();
            this.renderActionArea();
        },

        loadContract: function() {
            db.ref(`contracts/${mId}`).once('value', snapshot => {
                if(!snapshot.exists()) return alert("Contract Not Found");
                
                const data = snapshot.val();
                State.contractData = data;

                document.getElementById('valAdv').innerText = data.adventurer_nick;
                document.getElementById('valReward').innerText = `Rp ${data.final_price.toLocaleString('id-ID')}`;
                
                // Ambil detail tambahan dari master misi (pickup point)
                this.fetchPickupDetail(data.mission_id || mId);
                
                // Mulai sequence asisten
                this.startStaffBriefing();
            });
        },

        fetchPickupDetail: function(origId) {
            // Karena kita merestrukturisasi, briefing membaca pickup dari node contract atau snapshot misi
            // Jika belum ada di contract, kita biarkan asisten Logistik yang memvalidasi
            document.getElementById('valPickup').innerText = "VERIFYING COORDINATES...";
        },

        // --- STAFF BRIEFING LOGIC (Automated NPCs) ---
        startStaffBriefing: function() {
            const msgs = [
                { staff: "INTEL", class: "st-intel", text: "Menganalisa enkripsi jalur transmisi... Jalur aman. Contract ID tervalidasi." },
                { staff: "LOGISTIK", class: "st-logistik", text: "Titik penjemputan telah dikunci. Rute optimal sedang dikirim ke modul navigasi." },
                { staff: "FINANSIAL", class: "st-finansial", text: `Reward sebesar Rp ${State.contractData.final_price.toLocaleString('id-ID')} telah dikarantina dalam sistem Escrow.` },
                { staff: "KEAMANAN", class: "st-keamanan", text: "Protokol keamanan aktif. Menunggu tanda tangan digital dari Adventurer untuk melepas kunci misi." }
            ];

            let delay = 800;
            msgs.forEach((m, index) => {
                setTimeout(() => {
                    this.addConsoleMsg(m.staff, m.class, m.text);
                    if(index === msgs.length - 1 && role === 'adventurer') {
                        document.getElementById('btnSign').disabled = false;
                    }
                }, delay);
                delay += 1500;
            });
        },

        addConsoleMsg: function(name, cls, text) {
            const consoleLog = document.getElementById('consoleLog');
            const div = document.createElement('div');
            div.className = 'staff-msg';
            div.innerHTML = `<span class="staff-name ${cls}">[${name}]</span><span class="msg-body">${text}</span>`;
            consoleLog.appendChild(div);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        },

        // --- WATCHDOG (Transisi Serempak) ---
        setupWatchdog: function() {
            db.ref(`contracts/${mId}/status`).on('value', snapshot => {
                const status = snapshot.val();
                if(status === "on_progress") {
                    this.triggerWarp();
                }
            });
        },

        renderActionArea: function() {
            const area = document.getElementById('actionArea');
            if(role === 'adventurer') {
                area.innerHTML = `<button id="btnSign" class="btn-signature" disabled onclick="App.signContract()">TANDA TANGAN & MULAI MISI</button>`;
            } else {
                area.innerHTML = `<div class="wait-status">MENUNGGU KONFIRMASI ADVENTURER...</div>`;
            }
        },

        signContract: async function() {
            const btn = document.getElementById('btnSign');
            btn.innerText = "ENCRYPTING SIGNATURE...";
            btn.disabled = true;

            try {
                // Update status kontrak menjadi on_progress
                // Ini akan memicu Watchdog di kedua belah pihak
                await db.ref(`contracts/${mId}`).update({
                    status: "on_progress",
                    started_at: Date.now()
                });
            } catch(e) {
                alert("Gagal melakukan verifikasi tanda tangan.");
                btn.disabled = false;
                btn.innerText = "TANDA TANGAN & MULAI MISI";
            }
        },

        triggerWarp: function() {
            const overlay = document.getElementById('warpOverlay');
            overlay.style.display = 'flex';
            
            let progress = 0;
            const statusTxt = document.getElementById('warpStatus');
            const tasks = ["SYNCING GPS...", "UPLOADING CONTRACT...", "OPENING NAV-LINK...", "DEPARTING!"];
            
            let taskIdx = 0;
            const interval = setInterval(() => {
                statusTxt.innerText = tasks[taskIdx];
                taskIdx++;
                if(taskIdx >= tasks.length) {
                    clearInterval(interval);
                    window.location.href = `mission_active.html?mId=${mId}&role=${role}`;
                }
            }, 800);
        }
    };

    window.onload = () => App.init();
</script>

</body>
</html>
