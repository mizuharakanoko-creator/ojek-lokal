<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | MISSION CLEARANCE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-cyan: #00ffff;
            --bg-main: #050505;
            --border-color: #222;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { background: var(--bg-main); color: white; margin: 0; font-family: sans-serif; padding: 20px; text-align: center; }
        
        .clearance-card {
            max-width: 400px; margin: 40px auto; background: #0a0a0a;
            border: 1px solid var(--neon-cyan); padding: 30px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .star-rating { font-size: 40px; margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        .star { cursor: pointer; color: #1a1a1a; transition: 0.2s; filter: drop-shadow(0 0 2px #000); }
        .star.active { color: #ffbb33; text-shadow: 0 0 15px #ffbb33; }

        .clearance-info {
            background: #000; border: 1px solid #333; padding: 15px;
            margin: 20px 0; font-family: var(--font-terminal); font-size: 13px;
            min-height: 50px; display: flex; align-items: center; justify-content: center;
        }

        .btn-submit {
            width: 100%; padding: 18px; background: var(--neon-cyan);
            color: black; border: none; font-weight: bold; cursor: pointer;
            font-family: var(--font-terminal); border-radius: 4px; font-size: 14px;
        }

        #gainText { font-weight: bold; }
        .status-danger { color: var(--neon-pink); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="clearance-card">
    <h2 style="color:var(--neon-pink); font-family:var(--font-terminal); letter-spacing:2px;">GUILD EVALUATION</h2>
    <p style="font-size:12px; color:#555;">Tentukan nasib Clearance Adventurer di lapangan.</p>

    <div class="star-rating" id="starContainer">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
    </div>

    <div class="clearance-info">
        <span id="gainText">SILAKAN BERI BINTANG...</span>
    </div>

    <button class="btn-submit" id="btnFinish" onclick="submitFinalReport()">SUBMIT TO GUILD</button>
</div>

<script>
    const mId = localStorage.getItem('active_mission_id');
    const server = localStorage.getItem('active_mission_server');
    let currentRating = 0;
    let targetAdv = "";

    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref(`missions/${server}/${mId}`).once('value', snap => {
        if(snap.exists()) targetAdv = snap.val().selected_adventurer;
    });

    function setRating(n) {
        currentRating = n;
        const stars = document.querySelectorAll('.star');
        stars.forEach((s, i) => s.classList.toggle('active', i < n));

        const gainText = document.getElementById('gainText');
        if (n <= 1) { gainText.innerText = "⚠️ CRITICAL FAILURE: -50 REP"; gainText.className = "status-danger"; }
        else if (n === 2) { gainText.innerText = "❌ POOR: -10 REP"; gainText.style.color = "#ff8800"; }
        else if (n === 3) { gainText.innerText = "⚖️ NEUTRAL: +5 REP"; gainText.style.color = "#fff"; }
        else if (n === 4) { gainText.innerText = "✅ GOOD: +25 REP"; gainText.style.color = "var(--neon-cyan)"; }
        else { gainText.innerText = "🔥 PERFECT: +100 REP"; gainText.style.color = "var(--neon-cyan)"; }
    }

    async function submitFinalReport() {
        if(currentRating === 0 || !targetAdv) return alert("Beri bintang dulu!");

        const btn = document.getElementById('btnFinish');
        btn.disabled = true;

        try {
            const advRef = db.ref(`identity_adventurer/${server}/${targetAdv}`);
            const snapshot = await advRef.once('value');
            const advData = snapshot.val();

            let rep = advData.stats.reputation || 0;
            let lvl = advData.stats.level || 1;

            // Kalkulasi Reputasi
            if(currentRating === 1) rep -= 50;
            else if(currentRating === 2) rep -= 10;
            else if(currentRating === 3) rep += 5;
            else if(currentRating === 4) rep += 25;
            else if(currentRating === 5) rep += 100;

            // Update Database secara massal
            const updates = {};
            updates[`identity_adventurer/${server}/${targetAdv}/stats/reputation`] = rep;
            updates[`identity_adventurer/${server}/${targetAdv}/stats/level`] = (rep >= lvl * 100) ? lvl + 1 : lvl;
            
            // PENTING: Reset status kerja agar bisa ambil misi lagi
            updates[`identity_adventurer/${server}/${targetAdv}/stats/is_working`] = false;
            
            updates[`missions/${server}/${mId}/status`] = "archived";
            updates[`missions/${server}/${mId}/final_rating`] = currentRating;

            await db.ref().update(updates);

            alert("Mission Archive Success. Adventurer is now Free.");
            localStorage.removeItem('active_mission_id');
            window.location.href = "index.html";

        } catch (e) {
            console.error(e);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
