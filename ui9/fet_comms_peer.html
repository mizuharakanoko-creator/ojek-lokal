<style>
    .comms-wrapper {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: var(--dark-bg);
    }

    /* Intel Inteligence Banner */
    .intel-banner {
        background: rgba(188, 19, 254, 0.1);
        border-bottom: 1px solid rgba(188, 19, 254, 0.3);
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Chat Area */
    #chat-display {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: radial-gradient(circle at center, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
    }

    .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 15px;
        font-size: 13px;
        line-height: 1.5;
        position: relative;
        animation: msgSlide 0.3s ease;
    }

    @keyframes msgSlide {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .msg-peer {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #eee;
        border-bottom-left-radius: 2px;
    }

    .msg-me {
        align-self: flex-end;
        background: rgba(0, 242, 255, 0.1);
        border: 1px solid var(--border-glow);
        color: var(--neon-blue);
        border-bottom-right-radius: 2px;
    }

    .msg-time {
        font-size: 9px;
        opacity: 0.5;
        margin-top: 5px;
        display: block;
        text-align: right;
    }

    /* Input Bar */
    .chat-input-area {
        background: rgba(10, 10, 15, 0.95);
        padding: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .input-box {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        padding: 12px 20px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
    }

    .input-box:focus {
        border-color: var(--neon-blue);
        background: rgba(0, 242, 255, 0.05);
    }

    .btn-send {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--neon-blue);
        color: #000;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 0 15px var(--border-glow);
    }

    /* Intel System Buttons */
    .intel-chip {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 10px;
        color: #aaa;
        cursor: pointer;
        white-space: nowrap;
    }
</style>

<div class="comms-wrapper">
    
    <div class="intel-banner">
        <div style="display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-bolt" style="color: var(--neon-purple);"></i>
            <span style="font-size: 10px; font-weight: 900; letter-spacing: 1px; color: #fff;">QUICK INTEL</span>
        </div>
        <div style="display: flex; gap: 8px; overflow-x: auto; padding-left: 10px;">
            <div class="intel-chip" onclick="sendQuickMsg('Lokasi sudah sesuai?')">LOKASI?</div>
            <div class="intel-chip" onclick="sendQuickMsg('Mohon tunggu sebentar')">TUNGGU</div>
            <div class="intel-chip" onclick="sendQuickMsg('Barang sudah saya terima')">DITERIMA</div>
            <div class="intel-chip" onclick="openIntelReport()"><i class="fa-solid fa-triangle-exclamation"></i> LAPOR</div>
        </div>
    </div>

    <div id="chat-display">
        <div style="text-align: center; padding: 20px;">
            <i class="fa-solid fa-lock" style="font-size: 10px; color: #444;"></i>
            <p style="font-size: 9px; color: #444; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;">End-to-End Shard Encryption Active</p>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chat-input" class="input-box" placeholder="Kirim pesan ke peer..." autocomplete="off">
        <button class="btn-send" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    window.chat_contractId = sessionStorage.getItem('active_contract_id');
    window.chat_user = (typeof Clearchance !== 'undefined') ? Clearchance.enforceIdentity() : {uid: 'test-uid'};
    
    // Inisialisasi Real-time Database untuk Chat
    // Menggunakan node 'chats' pada Shard Deal
    window.chat_ref = null;

    function initChatModule() {
        if (!window.chat_contractId || typeof firebase === 'undefined') return;

        // Mendapatkan reference ke node chat misi spesifik
        // Asumsi: window.db_deal adalah Firebase Realtime Database
        if(typeof getTerminal !== 'undefined') {
            const rtdb = getTerminal('FB5_DEAL');
            window.chat_ref = rtdb.ref(`chats/${window.chat_contractId}`);
            
            // Listen pesan baru
            window.chat_ref.limitToLast(50).on('child_added', (snap) => {
                renderMessage(snap.val());
                scrollToBottom();
            });
        }

        // Event listener enter key
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        
        if(!text || !window.chat_ref) return;

        const msgData = {
            sender_id: window.chat_user.uid,
            sender_name: window.chat_user.name || 'Anonymous',
            text: text,
            timestamp: Date.now()
        };

        window.chat_ref.push(msgData);
        input.value = "";
        
        if(navigator.vibrate) navigator.vibrate(10);
    }

    function sendQuickMsg(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }

    function renderMessage(data) {
        const display = document.getElementById('chat-display');
        const isMe = data.sender_id === window.chat_user.uid;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isMe ? 'msg-me' : 'msg-peer'}`;
        
        const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        msgDiv.innerHTML = `
            ${data.text}
            <span class="msg-time">${time}</span>
        `;
        
        display.appendChild(msgDiv);
    }

    function scrollToBottom() {
        const display = document.getElementById('chat-display');
        display.scrollTop = display.scrollHeight;
    }

    function openIntelReport() {
        // Memanggil modal nota_report atau modal khusus intel
        if(typeof window.openNota === 'function') {
            window.openNota();
        } else {
            alert("Intel Report System: Sektor ini memerlukan pengesahan manual.");
        }
    }

    // Jalankan init
    setTimeout(initChatModule, 300);
</script>
