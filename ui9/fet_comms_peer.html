<style>
    .comms-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--dark-bg);
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Header Chat */
    .chat-header {
        padding: 20px;
        background: rgba(10, 10, 15, 0.9);
        border-bottom: 1px solid var(--border-glow);
        backdrop-filter: blur(15px);
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .partner-status-dot {
        width: 8px;
        height: 8px;
        background: var(--neon-blue);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--neon-blue);
    }

    #chat-partner-name {
        font-weight: 700;
        font-size: 16px;
        color: #fff;
    }

    #chat-partner-status {
        font-size: 9px;
        color: var(--neon-blue);
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* Area Pesan */
    #chat-messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding-bottom: 100px; /* Ruang untuk input */
    }

    .message-row {
        display: flex;
        width: 100%;
    }

    .message-row.sent { justify-content: flex-end; }
    .message-row.received { justify-content: flex-end; flex-direction: row-reverse; }

    .message-bubble {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 15px;
        position: relative;
        font-size: 14px;
        line-height: 1.5;
    }

    .sent .message-bubble {
        background: var(--neon-blue);
        color: #000;
        border-bottom-right-radius: 2px;
        box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2);
    }

    .received .message-bubble {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom-left-radius: 2px;
    }

    .message-time {
        display: block;
        font-size: 8px;
        margin-top: 5px;
        opacity: 0.7;
        text-align: right;
    }

    /* Input Bar */
    .chat-input-bar {
        position: fixed;
        bottom: 90px; /* Di atas bubble nav */
        left: 20px;
        right: 20px;
        background: rgba(15, 15, 20, 0.95);
        border: 1px solid var(--border-glow);
        border-radius: 30px;
        padding: 8px 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(20px);
        box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
    }

    #chat-input-field {
        flex: 1;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 14px;
        padding: 10px 5px;
        outline: none;
    }

    #btn-send-chat {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--neon-blue);
        color: #000;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
    }

    #btn-send-chat:active {
        transform: scale(0.9);
        filter: brightness(1.2);
    }

    /* Custom Scrollbar */
    #chat-messages-container::-webkit-scrollbar { width: 4px; }
    #chat-messages-container::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); border-radius: 10px; }
</style>

<div class="comms-container">
    
    <header class="chat-header">
        <div class="partner-status-dot"></div>
        <div>
            <div id="chat-partner-name">PARTNER</div>
            <div id="chat-partner-status">LINK ESTABLISHED</div>
        </div>
    </header>

    <div id="chat-messages-container">
        <div style="text-align: center; padding: 40px; opacity: 0.3;">
            <i class="fa-solid fa-lock" style="font-size: 24px; margin-bottom: 10px;"></i>
            <p style="font-size: 10px; letter-spacing: 1px;">END-TO-END NEURAL ENCRYPTION ACTIVE</p>
        </div>
    </div>

    <div class="chat-input-bar">
        <input type="text" id="chat-input-field" placeholder="Kirim pesan..." autocomplete="off">
        <button id="btn-send-chat">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

</div>

<script>
    // Trigger inisialisasi modul Chat (Brain Social)
    if (typeof window.initCommsModule === 'function') {
        window.initCommsModule();
    } else {
        console.warn("Establishing Neural Connection...");
    }
</script>
