<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN | DEEP AUDIT COMMANDER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <style>
        :root {
            --neon-red: #ff1a1a;
            --bg-main: #050000;
            --bg-card: #0f0000;
            --border-color: #330000;
            --text-main: #ffffff;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { background: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* SHARD MONITOR */
        .shard-monitor { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .shard-box { background: #1a0000; border: 1px solid var(--border-color); padding: 10px; text-align: center; border-radius: 4px; border-bottom: 2px solid var(--neon-red); }
        .shard-box small { font-size: 9px; color: #888; display: block; }
        .shard-box b { font-family: var(--font-terminal); font-size: 18px; color: var(--neon-red); }

        /* SEARCH & FILTER */
        .controls { position: sticky; top: 0; z-index: 100; background: var(--bg-main); padding: 10px 0; display: flex; gap: 10px; border-bottom: 1px solid var(--border-color); }
        #uSearch { flex: 1; padding: 12px; background: #111; border: 1px solid var(--border-color); color: var(--neon-red); font-family: var(--font-terminal); }

        /* DOSSIER CARD */
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #444; transition: 0.3s; }
        .card.active { border-left-color: var(--neon-red); box-shadow: 0 0 15px rgba(255,0,0,0.1); }
        
        .card-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #0a0000; }
        .card-header:hover { background: #150000; }
        
        .main-info b { color: var(--neon-red); font-family: var(--font-terminal); font-size: 14px; }
        .main-info span { font-size: 11px; color: #888; margin-left: 10px; }

        /* DATA CONTENT (MINIMIZE LOGIC) */
        .card-content { display: none; padding: 20px; border-top: 1px solid #220000; animation: slideIn 0.3s ease; }
        .card.active .card-content { display: block; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* DATA GRID - FULL DISPLAY */
        .data-category { margin-bottom: 20px; }
        .cat-title { font-size: 10px; color: var(--neon-red); font-weight: bold; border-bottom: 1px dashed #440000; padding-bottom: 5px; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .data-node { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 3px; border: 1px solid transparent; }
        .data-node:hover { border-color: #440000; background: rgba(255,255,255,0.05); }
        .data-node label { display: block; font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        .data-node div { font-size: 12px; font-family: var(--font-terminal); color: #ddd; word-break: break-all; }

        /* FOOTER ACTIONS */
        .card-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #220000; display: flex; gap: 10px; align-items: flex-end; }
        .shard-select { background: #000; color: #fff; border: 1px solid var(--neon-red); padding: 10px; font-family: var(--font-terminal); flex: 1; }
        .btn { padding: 12px 20px; border: none; font-family: var(--font-terminal); font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .btn-ok { background: #00ff00; color: #000; flex: 2; }
        .btn-del { background: #444; color: #fff; font-size: 10px; }
        .btn-del:hover { background: var(--neon-red); }
    </style>
</head>
<body>

<div class="shard-monitor" id="monitors">
    <div class="shard-box"><small>FB2_RUNNER</small><b id="m_FB2_RUNNER">0</b></div>
    <div class="shard-box"><small>FBCIGUGUR</small><b id="m_FBCIGUGUR">0</b></div>
    <div class="shard-box"><small>FBKADUGEDE</small><b id="m_FBKADUGEDE">0</b></div>
</div>

<div class="controls">
    <input type="text" id="uSearch" placeholder="[ TERMINAL SEARCH: CARI APAPUN DALAM DATA... ]" onkeyup="doSearch()">
</div>

<div id="pList" style="margin-top: 20px;">
    <div style="text-align: center; color: #444; padding: 40px;">MENGHUBUNGKAN KE FB1_MASTER...</div>
</div>

<script>
    const db1 = getTerminal('FB1_MASTER');
    const ping = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');

    // 1. MONITOR POPULASI (FB1 INDEX)
    function syncMon() {
        db1.ref('adventurer_index').on('value', snap => {
            const counts = { "FB2_RUNNER": 0, "FBCIGUGUR": 0, "FBKADUGEDE": 0 };
            snap.forEach(c => { if(counts[c.val().shard_id] !== undefined) counts[c.val().shard_id]++; });
            for(let s in counts) document.getElementById(`m_${s}`).innerText = counts[s];
        });
    }

    // 2. RENDER SEMUA DATA (NO EXCEPTIONS)
    db1.ref('register_pending').on('value', snap => {
        const list = document.getElementById('pList');
        const oldSize = list.querySelectorAll('.card').length;
        list.innerHTML = "";
        
        if(!snap.exists()) {
            list.innerHTML = "<div style='text-align:center; padding:50px; color:#333;'>REGISTER_PENDING: EMPTY_ANTREAN</div>";
            return;
        }

        if(snap.numChildren() > oldSize && oldSize !== 0) ping.play();

        snap.forEach(child => {
            const u = child.val();
            const id = child.key;

            const div = document.createElement('div');
            div.className = 'card';
            div.id = `card_${id}`;
            
            // Rekursif Helper untuk bongkar semua object data (termasuk yang tidak terduga)
            const renderObject = (obj, label) => {
                if(!obj) return "";
                let html = `<span class="cat-title">${label}</span><div class="data-grid">`;
                for(let key in obj) {
                    const val = typeof obj[key] === 'object' ? JSON.stringify(obj[key]) : obj[key];
                    html += `<div class="data-node"><label>${key}</label><div>${val || 'NULL'}</div></div>`;
                }
                html += `</div><br>`;
                return html;
            };

            div.innerHTML = `
                <div class="card-header" onclick="document.getElementById('card_${id}').classList.toggle('active')">
                    <div class="main-info">
                        <b>${u.nickname || 'N/A'}</b>
                        <span>${u.id_adv || id}</span>
                        <span style="color:var(--neon-red)">[${u.domisili_lengkap?.area_tugas || u.domisili || 'NO_AREA'}]</span>
                    </div>
                    <div class="btn-toggle" style="color:#666; font-size:10px;">KLIK UNTUK AUDIT</div>
                </div>
                <div class="card-content">
                    <div class="data-category">
                        ${renderObject(u, "CORE_IDENTITY")}
                        ${renderObject(u.domisili_lengkap, "LOCATION_OBJECT")}
                        ${renderObject(u.arsenal, "ARSENAL_OBJECT")}
                        ${renderObject(u.vault, "VAULT_OBJECT")}
                        ${renderObject(u.metadata, "SYSTEM_METADATA (SAMPAH CHECK)")}
                    </div>

                    <div class="card-footer">
                        <div style="flex:1">
                            <label style="font-size:9px; color:var(--neon-red); display:block; margin-bottom:5px;">PILIH SHARD TUJUAN:</label>
                            <select id="s_${id}" class="shard-select">
                                <option value="FB2_RUNNER">FB2_RUNNER</option>
                                <option value="FB3_EXT">FB3_EXT</option>
                                <option value="FB4_LAB">FB4_LAB</option>
                            </select>
                        </div>
                        <button class="btn btn-ok" onclick="terima('${id}')">BANGKITKAN AGEN</button>
                        <button class="btn btn-del" onclick="hapus('${id}')">WIPE</button>
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    });

    // 3. SEARCH & ACTIONS
    function doSearch() {
        const s = document.getElementById('uSearch').value.toUpperCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toUpperCase().includes(s) ? "" : "none";
        });
    }

    async function terima(id) {
        const shard = document.getElementById(`s_${id}`).value;
        if(!confirm(`Kirim data ke ${shard}?`)) return;

        try {
            const dbTarget = getTerminal(shard);
            const snap = await db1.ref(`register_pending/${id}`).once('value');
            const u = snap.val();
            
            const areaMentah = u.domisili_lengkap?.area_tugas || u.domisili || "UNKNOWN";
            // Ubah "Kuningan" menjadi "KNG", "Kadugede" menjadi "KGD", dst.
            const areaSingkat = getShardDariKecamatan(areaMentah); 

 
            const p = {};
            p[`adventurer-${areaSingkat}/Umum/${id}`] = u;
            p[`adventurer_profile/${id}`] = { id_adventurer: id, gelar: "Novice Traveler", level: 1, rank: "TRAINER" };
            p[`adventurer_experience/${id}`] = { id_adventurer: id, exp: 0, max_exp: 100, current_stamina: 100, max_stamina: 100 };
            p[`adventurer_reputation/${id}`] = { id_adventurer: id, reputation_score: 0 };
            p[`adventurer_inventory/${id}`] = { id_adventurer: id, small_stamina_potion: 10 };
            p[`adventurer_contracts/${id}`] = { id_adventurer: id, kontrak_lusuh: 30, kontrak_normal: 30, kontrak_medium: 20, kontrak_premium: 5, kontrak_emas: 1 };

            await Promise.all([
                dbTarget.ref().update(p),
                db1.ref(`${u.role === 'adventurer' ? 'adventurer_index' : 'requester_index'}/${id}`).set({
                    id_adv: u.id_adv, nickname: u.nickname, password: u.password,
                    role: u.role, shard_id: shard, area_tugas: area
                }),
                db1.ref(`register_pending/${id}`).remove()
            ]);
            alert("Aktivasi Berhasil!");
        } catch(e) { alert("Transmisi Gagal: " + e.message); }
    }

    function hapus(id) { if(confirm("Wipe data pendaftaran?")) db1.ref(`register_pending/${id}`).remove(); }

    syncMon();
</script>
</body>
</html>
