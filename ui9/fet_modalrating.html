<style>
    .modal-rating-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 5, 8, 0.95);
        backdrop-filter: blur(10px);
        display: none; /* Diatur oleh showRatingScreen() */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 20px;
        animation: fadeInOverlay 0.3s ease;
    }

    @keyframes fadeInOverlay {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .rating-card {
        background: #111;
        border: 1px solid var(--neon-blue);
        border-radius: 20px;
        padding: 30px 20px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
    }

    .rating-header h2 {
        color: #fff;
        font-weight: 900;
        letter-spacing: -1px;
        margin-bottom: 10px;
    }

    .rating-header p {
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 25px;
    }

    /* Star System */
    .star-group {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
    }

    .star-icon {
        font-size: 32px;
        color: rgba(255,255,255,0.1);
        cursor: pointer;
        transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .star-icon.active {
        color: var(--neon-blue);
        transform: scale(1.2);
        text-shadow: 0 0 15px var(--neon-blue);
    }

    /* Input Field */
    .rating-comment-box {
        width: 100%;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 15px;
        color: #fff;
        font-size: 14px;
        margin-bottom: 25px;
        resize: none;
        outline: none;
    }

    .rating-comment-box:focus {
        border-color: var(--neon-blue);
    }

    /* Submit Button */
    #btn-submit-rating {
        width: 100%;
        padding: 15px;
        background: var(--neon-blue);
        color: #000;
        border: none;
        border-radius: 12px;
        font-weight: 900;
        letter-spacing: 1px;
        cursor: pointer;
        transition: 0.3s;
    }

    #btn-submit-rating:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
    }

    .rating-footer-note {
        font-size: 9px;
        color: var(--text-dim);
        margin-top: 15px;
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>

<div id="rating-modal-root" class="modal-rating-overlay">
    <div class="rating-card">
        <div class="rating-header">
            <h2>MISI SELESAI</h2>
            <p>Berikan evaluasi terhadap partner Anda untuk memperbarui Trust Score mereka.</p>
        </div>

        <div class="star-group">
            <i class="fa-solid fa-star star-icon" data-value="1"></i>
            <i class="fa-solid fa-star star-icon" data-value="2"></i>
            <i class="fa-solid fa-star star-icon" data-value="3"></i>
            <i class="fa-solid fa-star star-icon" data-value="4"></i>
            <i class="fa-solid fa-star star-icon" data-value="5"></i>
        </div>

        <textarea id="rating-comment-field" class="rating-comment-box" rows="3" placeholder="Tambahkan catatan misi (opsional)..."></textarea>

        <button id="btn-submit-rating">KIRIM EVALUASI</button>

        <div class="rating-footer-note">
            Sovereign Guild Rating System v3.0
        </div>
    </div>
</div>

<script>
    /**
     * Modal ini tidak memanggil init sendiri secara otomatis 
     * karena ia harus menunggu pemicu dari Slider atau AI.
     * * Namun kita siapkan jembatan agar Brain Rating tahu 
     * bahwa UI-nya sudah siap di DOM.
     */
    console.log("⭐ Rating Modal UI: Injected into Main Frame.");
    
    // Fungsi pembuka yang dipanggil oleh Brain Rating
    window.showRatingScreen = function() {
        const modal = document.getElementById('rating-modal-root');
        if (modal) {
            modal.style.display = 'flex';
            modal.style.pointerEvents = 'auto';
            
            // Panggil inisialisasi logika dari js_mission_progress_rating.js
            if (typeof window.initRatingModule === 'function') {
                window.initRatingModule();
            }
        }
    };
</script>
