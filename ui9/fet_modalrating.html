<style>
    .modal-rating-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 5, 8, 0.98);
        z-index: 3000;
        display: none; /* Dikontrol via JS */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(20px);
    }

    .modal-rating-overlay.open { display: flex; animation: modalZoom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    .rating-card {
        background: var(--card-bg);
        border: 1px solid var(--border-glow);
        border-radius: 24px;
        width: 100%;
        max-width: 350px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
    }

    .rating-stars {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 25px 0;
    }

    .star-btn {
        font-size: 32px;
        color: #1a1a1a;
        cursor: pointer;
        transition: 0.3s;
        filter: drop-shadow(0 0 0px transparent);
    }

    .star-btn.active {
        color: #ffcc00;
        filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.5));
        transform: scale(1.2);
    }

    .feedback-tags {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }

    .tag-chip {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 8px;
        border-radius: 10px;
        font-size: 11px;
        color: #888;
        cursor: pointer;
    }

    .tag-chip.selected {
        background: rgba(0, 243, 255, 0.1);
        border-color: var(--neon-blue);
        color: var(--neon-blue);
    }

    .comment-area {
        width: 100%;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 12px;
        color: #fff;
        font-size: 13px;
        margin-bottom: 20px;
        resize: none;
        outline: none;
    }

    @keyframes modalZoom {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }
</style>

<div id="modal-rating-ui" class="modal-rating-overlay">
    <div class="rating-card">
        <div style="font-size: 10px; color: var(--neon-blue); font-weight: 900; letter-spacing: 2px; margin-bottom: 10px;">MISSION ACCOMPLISHED</div>
        <h2 id="rating-target-name" style="font-size: 20px; margin-bottom: 5px;">Memberi Evaluasi</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Bagaimana performa partner Anda?</p>

        <div class="rating-stars" id="star-container">
            <i class="fa-solid fa-star star-btn" data-value="1"></i>
            <i class="fa-solid fa-star star-btn" data-value="2"></i>
            <i class="fa-solid fa-star star-btn" data-value="3"></i>
            <i class="fa-solid fa-star star-btn" data-value="4"></i>
            <i class="fa-solid fa-star star-btn" data-value="5"></i>
        </div>

        <div class="feedback-tags" id="tags-container">
            </div>

        <textarea id="rating-comment" class="comment-area" rows="3" placeholder="Tambahkan catatan tambahan..."></textarea>

        <button class="btn-main" id="btn-submit-rating" onclick="submitFinalEvaluation()" style="background: var(--neon-blue); color: #000; width: 100%;">
            KIRIM EVALUASI & TUTUP MISI
        </button>
        
        <div id="rating-loading" class="hide" style="margin-top: 15px; font-size: 11px; color: var(--neon-blue);">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Menyimpan ke Shard...
        </div>
    </div>
</div>

<script>
    window.eval_rating = 0;
    window.eval_tags = [];
    window.eval_contractId = sessionStorage.getItem('active_contract_id');
    window.eval_isAdv = (typeof Clearchance !== 'undefined' && Clearchance.enforceIdentity().role === 'adventurer');

    // 1. Fungsi Membuka Modal Penilaian untuk Requester (Menilai Adventurer)
    function openEvalAdv() {
        document.getElementById('rating-target-name').innerText = "Evaluasi Adventurer";
        setupTags(['Sangat Cepat', 'Komunikasi Baik', 'Sangat Sopan', 'Profesional']);
        document.getElementById('modal-rating-ui').classList.add('open');
    }

    // 2. Fungsi Membuka Modal Penilaian untuk Adventurer (Menilai Requester/Client)
    function openEvalReq() {
        document.getElementById('rating-target-name').innerText = "Evaluasi Client";
        setupTags(['Titik Akurat', 'Respon Cepat', 'Ramah', 'Instruksi Jelas']);
        document.getElementById('modal-rating-ui').classList.add('open');
    }

    function setupTags(tags) {
        const container = document.getElementById('tags-container');
        container.innerHTML = "";
        tags.forEach(t => {
            const chip = document.createElement('div');
            chip.className = 'tag-chip';
            chip.innerText = t;
            chip.onclick = () => {
                chip.classList.toggle('selected');
                updateTagsArray();
            };
            container.appendChild(chip);
        });
    }

    function updateTagsArray() {
        const selected = document.querySelectorAll('.tag-chip.selected');
        window.eval_tags = Array.from(selected).map(el => el.innerText);
    }

    // Star interaction
    document.querySelectorAll('.star-btn').forEach(star => {
        star.onclick = function() {
            const val = parseInt(this.getAttribute('data-value'));
            window.eval_rating = val;
            updateStars(val);
        };
    });

    function updateStars(val) {
        document.querySelectorAll('.star-btn').forEach((s, index) => {
            s.classList.toggle('active', index < val);
        });
    }

    async function submitFinalEvaluation() {
        if (window.eval_rating === 0) {
            alert("Mohon berikan rating bintang.");
            return;
        }

        const btn = document.getElementById('btn-submit-rating');
        const loader = document.getElementById('rating-loading');
        const comment = document.getElementById('rating-comment').value;

        btn.disabled = true;
        btn.style.opacity = "0.5";
        loader.classList.remove('hide');

        try {
            const rtdb = (typeof getTerminal !== 'undefined') ? getTerminal('FB5_DEAL') : null;
            if(!rtdb) throw new Error("Koneksi Database Gagal");

            const updatePath = window.eval_isAdv ? 'eval_for_requester' : 'eval_for_adventurer';
            const statusTarget = window.eval_isAdv ? 'completed_adv' : 'completed_req';

            // Simpan Evaluasi
            await rtdb.ref(`kontrak_detail/${window.eval_contractId}/${updatePath}`).set({
                rating: window.eval_rating,
                tags: window.eval_tags,
                comment: comment,
                ts: Date.now()
            });

            // Update Status Kontrak
            await rtdb.ref(`kontrak_detail/${window.eval_contractId}/status`).set(statusTarget);

            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // Redirect ke Hub Utama setelah sukses
            setTimeout(() => {
                window.location.href = "hub_main.html"; 
            }, 1500);

        } catch (e) {
            console.error(e);
            alert("Gagal mengirim evaluasi: " + e.message);
            btn.disabled = false;
            btn.style.opacity = "1";
            loader.classList.add('hide');
        }
    }

    // Daftarkan ke Global agar bisa dipanggil file lain
    window.openEvalAdv = openEvalAdv;
    window.openEvalReq = openEvalReq;
</script>
