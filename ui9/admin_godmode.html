<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD MODE - MASTER CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="terminal_router.js"></script> <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-panel { border: 2px solid #fbbf24; padding: 20px; border-radius: 12px; background: #0f172a; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #334155; color: #fff; border-radius: 6px; }
        .btn { padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .btn-gold { background: #fbbf24; color: #000; }
        
        .result-card { background: #1e293b; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2 style="color:#fbbf24; margin-bottom:10px;">👁️ GOD MODE: OVERRIDE SYSTEM</h2>
    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Pihak Ketiga: Kendali Penuh Lintas Shard</p>

    <div class="search-box">
        <input type="text" id="targetNickname" placeholder="Masukkan Nickname Adventurer...">
        <button class="btn btn-gold" onclick="GodMode.search()">CARI TARGET</button>
    </div>

    <div id="resultArea" class="result-card">
        <div style="border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px;">
            <h3 id="dispName" style="margin:0;">-</h3>
            <small id="dispID" style="color:#fbbf24;">ID: -</small> | 
            <small id="dispShard" style="color:#4ade80;">SHARD: -</small>
        </div>

        <div class="stats-grid">
            <div>
                <label>LEVEL</label>
                <input type="number" id="editLvl">
            </div>
            <div>
                <label>RANK</label>
                <select id="editRank" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #334155;">
                    <option value="S">Rank S</option><option value="A">Rank A</option>
                    <option value="B">Rank B</option><option value="C">Rank C</option>
                    <option value="D">Rank D</option><option value="E">Rank E</option>
                    <option value="F">Rank F</option>
                </select>
            </div>
            <div>
                <label>STAMINA AKTUAL</label>
                <input type="number" id="editStm">
            </div>
            <div>
                <label>KOIN EMAS</label>
                <input type="number" id="editKoin">
            </div>
        </div>

        <button class="btn btn-gold" style="width:100%; margin-top:20px; height:50px; font-size:16px;" onclick="GodMode.override()">
            SUNTIK DATA (OVERRIDE)
        </button>
    </div>
</div>

<script>
    const GodMode = {
        target: { id: "", shard: "", nick: "" },

        // 1. CARA AMBIL DATA (PELAJARI LOGIKA INI)
        search: async function() {
            const nick = document.getElementById('targetNickname').value.trim();
            if(!nick) return alert("Masukkan nickname!");

            // Admin akses FB1_MASTER untuk cari index (Alamat si User)
            const dbMaster = getTerminal('FB1_MASTER');
            
            dbMaster.ref('adventurer_index').once('value', async (snap) => {
                let foundID = null;
                let foundData = null;

                snap.forEach(child => {
                    if(child.val().nickname?.toLowerCase() === nick.toLowerCase()) {
                        foundID = child.key;
                        foundData = child.val();
                    }
                });

                if(!foundID) return alert("Adventurer tidak ditemukan di Buku Induk!");

                this.target.id = foundID;
                this.target.shard = foundData.shard_id || "FB2_RUNNER";
                this.target.nick = foundData.nickname;

                // Setelah dapat lokasi (Shard), ambil data Vitality & Profile asli di Shard tersebut
                const dbShard = getTerminal(this.target.shard);
                const vitalitySnap = await dbShard.ref(`adventurer_experience/${foundID}`).once('value');
                const profileSnap = await dbShard.ref(`adventurer_profile/${foundID}`).once('value');
                
                this.showResult(vitalitySnap.val(), profileSnap.val(), foundData.koin);
            });
        },

        showResult: function(vit, prof, koin) {
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('dispName').innerText = this.target.nick;
            document.getElementById('dispID').innerText = "ID: " + this.target.id;
            document.getElementById('dispShard').innerText = "SHARD: " + this.target.shard;

            // Masukkan data ke form untuk diubah
            document.getElementById('editLvl').value = vit?.level || 1;
            document.getElementById('editStm').value = vit?.current_stamina || 0;
            document.getElementById('editRank').value = prof?.rank || "F";
            document.getElementById('editKoin').value = koin || 0;
        },

        // 2. CARA UBAH SEGALA DATA (LOGIKA OVERRIDE)
        override: async function() {
            if(!confirm("ANDA YAKIN? Data akan diubah secara absolut sebagai Pihak Ketiga.")) return;

            const id = this.target.id;
            const shard = this.target.shard;
            const dbShard = getTerminal(shard);
            const dbMaster = getTerminal('FB1_MASTER');

            const payloadExperience = {
                level: parseInt(document.getElementById('editLvl').value),
                current_stamina: parseInt(document.getElementById('editStm').value)
            };

            const payloadProfile = {
                rank: document.getElementById('editRank').value
            };

            const newKoin = parseInt(document.getElementById('editKoin').value);

            try {
                // Ubah data di Shard
                await dbShard.ref(`adventurer_experience/${id}`).update(payloadExperience);
                await dbShard.ref(`adventurer_profile/${id}`).update(payloadProfile);
                
                // Ubah data di Master (Koin biasanya di index utama)
                await dbMaster.ref(`adventurer_index/${id}`).update({ koin: newKoin });

                alert("SUNTIKAN BERHASIL: Data " + this.target.nick + " telah diperbarui!");
            } catch (e) {
                alert("GAGAL: " + e.message);
            }
        }
    };
</script>

</body>
</html>
