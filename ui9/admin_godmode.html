<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN GUILD - ADVENTURER TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal_router.js"></script>
    <script src="router_lokal.js"></script>
    <script src="clearchance.js"></script>

    <style>
        /* ==========================================
           1. BASE & RANK THEME ENGINE (OLED UI)
           ========================================== */
        :root {
            --bg-main: #050505;
            --bg-card: #0f0f0f;
            --text-main: #ffffff;
            --font-terminal: 'Courier New', Courier, monospace;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --theme-color: #888888; 
            --theme-bg-glow: rgba(136, 136, 136, 0.05);
        }

        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg-main); color: var(--text-main); margin: 0; font-family: var(--font-sans); padding-bottom: 80px; transition: all 0.5s ease; }

        /* Dynamic Rank Themes */
        body.rank-trainer { --theme-color: #888888; }
        body.rank-e { --theme-color: #4ade80; }
        body.rank-d { --theme-color: #60a5fa; }
        body.rank-c { --theme-color: #a855f7; }
        body.rank-b { --theme-color: #facc15; }
        body.rank-a { --theme-color: #fb923c; }
        body.rank-s { --theme-color: #ff4500; background: linear-gradient(45deg, #1a0500, #050505); }

        header { background: var(--bg-card); padding: 15px; border-bottom: 2px solid var(--theme-color); position: sticky; top: 0; z-index: 100; }
        .user-info { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-terminal); font-size: 12px; }
        .user-nick { color: var(--text-main); font-weight: bold; font-size: 16px; letter-spacing: 1px;}
        .rank-badge { background: var(--theme-color); color: #000; padding: 2px 6px; border-radius: 3px; font-weight: 900; }

        /* RPG Status Bar */
        .status-rpg-container { background: #000; padding: 10px 15px; display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid #222; }
        .rpg-row { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-terminal); font-size: 10px; }
        .bar-outer { flex: 1; height: 6px; background: #222; margin: 0 10px; border-radius: 3px; overflow: hidden; }
        .bar-inner { height: 100%; width: 0%; transition: width 0.5s ease; }
        #staminaBar { background: #4ade80; }
        #expBar { background: #60a5fa; }
        .stat-val { color: var(--theme-color); font-weight: bold; }

        /* Radar & Mission Cards */
        .radar-box { border: 1px solid var(--theme-color); background: var(--bg-card); padding: 15px; border-radius: 8px; margin: 15px; position: relative; overflow: hidden; }
        .mission-card { background: #0a0a0a; border: 1px solid #1a1a1a; margin-bottom: 10px; border-left: 3px solid var(--theme-color); border-radius: 6px; padding: 12px; cursor: pointer; transition: 0.3s; }
        .mission-card.active-expand { background: #111; }
        .m-expand-body { display: none; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .active-expand .m-expand-body { display: block; }
        
        /* Modal Style */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-box { background: var(--bg-card); border: 2px solid var(--theme-color); padding: 25px; width: 90%; max-width: 400px; border-radius: 8px; }
        .btn-confirm { width: 100%; padding: 15px; background: var(--theme-color); color: #000; border: none; font-weight: 900; margin-top: 20px; border-radius: 6px; cursor: pointer; }

        /* Animation */
        @keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        #radarPulse { animation: pulseText 2s infinite; text-align: center; font-size: 11px; color: var(--theme-color); font-family: var(--font-terminal); margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <div class="user-info">
        <div>
            ID: <span class="user-nick" id="dispNick">---</span><br>
            <span id="dispGelar" style="color:var(--theme-color); font-size:10px;">LOADING...</span><br>
            <span style="color:#888; font-size:10px;">ZONE: <span id="dispZone" style="color:#fff;">-</span></span>
        </div>
        <div style="text-align: right;">
            RANK<br>
            <span class="rank-badge" id="dispRank">-</span>
        </div>
    </div>
</header>

<div class="status-rpg-container">
    <div class="rpg-row">
        <span>LVL.<span id="dispLvl">1</span></span>
        <div class="bar-outer"><div id="expBar" class="bar-inner"></div></div>
        <span class="stat-val" id="dispExp">0/0</span>
    </div>
    <div class="rpg-row">
        <span>STM</span>
        <div class="bar-outer"><div id="staminaBar" class="bar-inner"></div></div>
        <span class="stat-val" id="dispStm">0/0</span>
    </div>
    <div class="rpg-row">
        <span style="color:#666">LIMIT HARIAN</span>
        <span id="dispLimit" style="color:#f87171">0/0</span>
    </div>
</div>

<div class="radar-box">
    <div style="font-size: 11px; color: #888; display: flex; justify-content: space-between;">
        <span>LOC: <span id="locName" style="color:#fff;">MENUNGGU GPS...</span></span>
        <span>RADAR: <span id="radarType">LOCAL</span></span>
    </div>
    <div id="radarPulse">[ MENCARI SINYAL AKTIF... ]</div>
    <button onclick="App.UI.toggleRadar()" id="btnExpand" style="width:100%; background:transparent; border:1px solid var(--theme-color); color:var(--theme-color); padding:8px; font-size:10px; cursor:pointer;">+ PERLUAS RADAR</button>
</div>

<div id="missionList" style="padding: 0 15px;">
    </div>

<div id="sovBidModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle" style="margin:0; font-family:var(--font-terminal);">DETAIL KONTRAK</h3>
        <div id="modalInfo" style="margin-top: 15px; font-size: 13px; color: #ccc;"></div>
        
        <div style="background:#000; padding:15px; border-radius:8px; margin-top:15px; text-align:center;">
            <div style="font-size:10px; color:#666;">PENAWARAN (Rp)</div>
            <div style="font-size:24px; font-weight:bold; color:#4ade80;" id="dispBidAmt">0</div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="App.Bidding.adjust(-5000)" style="flex:1; background:#222; color:#fff; border:1px solid #444; padding:5px;">-5K</button>
                <button onclick="App.Bidding.adjust(5000)" style="flex:1; background:#222; color:#fff; border:1px solid #444; padding:5px;">+5K</button>
            </div>
        </div>

        <button class="btn-confirm" onclick="App.Bidding.submit()">AMBIL & TERBITKAN SINYAL</button>
        <button onclick="App.UI.closeModal()" style="width:100%; background:none; color:#666; border:none; margin-top:10px; cursor:pointer;">BATAL</button>
    </div>
</div>

<script>
    const App = {
        db1: null, db4: null, user: null,
        State: {
            idAdv: "", zone: "", rank: "Trainer",
            loc: { lat: 0, lng: 0, desa: "", shard: "" },
            rpg: { lvl: 1, exp: 0, expNext: 100, stm: 100, stmMax: 100, limit: 0, limitMax: 5 },
            isExpanded: false,
            appliedMissions: new Set()
        },
        BiddingData: { mid: "", basePrice: 0, currentPrice: 0, rpgData: null },

        init: async function() {
            try {
                // 1. Koneksi Terminal Router
                this.db1 = getTerminal('FB1_MASTER');
                this.db4 = getTerminal('FB4_BOARD');
                
                // 2. Identitas
                this.user = Clearchance.enforceIdentity();
                const nickname = this.user.nick || "Adventurer";

                // 3. Cari Data Lintas Terminal (Shard Mapping)
                const idAdv = await this.Core.getIdAdvByNickname(nickname);
                const indexSnap = await this.db1.ref(`adventurer_index/${idAdv}`).once('value');
                const index = indexSnap.val();
                
                if(!index) throw new Error("ID Adventurer tidak terdaftar.");

                const shardID = index.shard_id || "FB2_RUNNER";
                const dbShard = getTerminal(shardID);

                // 4. Load Data RPG dari Shard
                const xpSnap = await dbShard.ref(`adventurer_experience/${idAdv}`).once('value');
                const profSnap = await dbShard.ref(`adventurer_profile/${idAdv}`).once('value');
                
                this.State.idAdv = idAdv;
                this.State.zone = index.area_tugas;
                this.State.rank = profSnap.val()?.rank || "Trainer";
                
                // 5. Sinkronisasi Stats
                await this.Core.syncRPG(idAdv, shardID, xpSnap.val() || {});

                // 6. Jalankan Engine
                this.UI.updateHeader(nickname);
                this.Core.startGPS();
                this.Core.listenToContracts();

            } catch (e) {
                console.error("Initialization Failed:", e);
                alert("TERMINAL ERROR: " + e.message);
            }
        },

        Core: {
            getIdAdvByNickname: async function(nick) {
                const snap = await App.db1.ref('adventurer_index').once('value');
                let found = null;
                snap.forEach(c => { if(c.val().nickname?.toLowerCase() === nick.toLowerCase()) found = c.key; });
                return found;
            },

            syncRPG: async function(idAdv, shardID, data) {
                const now = Date.now();
                // Logika Reset Harian (Jika lewat tengah malam)
                if(now > (data.last_stamina_update || 0)) {
                    data.current_stamina = data.max_stamina || 100;
                    data.limit_harian = 0;
                    const tomorrow = new Date().setHours(24,0,0,0);
                    await getTerminal(shardID).ref(`adventurer_experience/${idAdv}`).update({
                        current_stamina: data.current_stamina,
                        limit_harian: 0,
                        last_stamina_update: tomorrow
                    });
                }
                App.State.rpg = {
                    lvl: data.level || 1,
                    exp: data.exp || 0,
                    expNext: data.max_exp || 100,
                    stm: data.current_stamina || 100,
                    stmMax: data.max_stamina || 100,
                    limit: data.limit_harian || 0,
                    limitMax: data.max_limit || 5
                };
                App.UI.updateRPG();
            },

            startGPS: function() {
                navigator.geolocation.getCurrentPosition(pos => {
                    App.State.loc.lat = pos.coords.latitude;
                    App.State.loc.lng = pos.coords.longitude;
                    const res = cariDesaTerdekat(App.State.loc.lat, App.State.loc.lng);
                    App.State.loc.desa = res.name;
                    App.State.loc.shard = getShardDariKecamatan(res.kec);
                    document.getElementById('locName').innerText = res.name;
                    this.startRadar();
                });
            },

            startRadar: function() {
                const shard = App.State.loc.shard || "FB2_RUNNER";
                let path = App.State.isExpanded ? `mission-${shard}` : `mission-${shard}/${App.State.loc.desa}`;
                
                App.db4.ref(path).on('value', snap => {
                    const list = document.getElementById('missionList');
                    list.innerHTML = "";
                    if(!snap.exists()) { list.innerHTML = "<div style='text-align:center; color:#444; padding:20px;'>AREA BERSIH (TIDAK ADA MISI)</div>"; return; }
                    
                    snap.forEach(mSnap => {
                        const m = mSnap.val();
                        if(App.State.isExpanded) {
                            mSnap.forEach(inner => App.UI.renderCard(inner.val(), list));
                        } else {
                            App.UI.renderCard(m, list);
                        }
                    });
                });
            },

            // LOGIKA ACCEPT TRANSACTION (PEMOTONGAN ITEM OTOMATIS)
            listenToContracts: function() {
                App.db4.ref(`kontrak_mission`).orderByChild('id_adventurer').equalTo(App.user.uid).on('child_added', async snap => {
                    const k = snap.val();
                    if(k.status === 'briefing') {
                        if(sessionStorage.getItem('processed_' + k.id_kontrak)) return;
                        sessionStorage.setItem('processed_' + k.id_kontrak, true);

                        // Proses Pemotongan di Shard
                        const dbShard = getTerminal(App.State.loc.shard || "FB2_RUNNER");
                        const jenis = k.contract_item || "kontrak_normal";
                        
                        const updates = {};
                        updates[`adventurer_contracts/${App.State.idAdv}/${jenis}`] = firebase.database.ServerValue.increment(-1);
                        updates[`adventurer_experience/${App.State.idAdv}/current_stamina`] = App.State.rpg.stm - (k.rpg_reward?.stamina_used || 10);
                        updates[`adventurer_experience/${App.State.idAdv}/limit_harian`] = App.State.rpg.limit + 1;

                        await dbShard.ref().update(updates);
                        
                        alert("KONTRAK DISETUJUI! Masuk ke Briefing Room...");
                        window.location.href = `briefing_room.html?id=${k.id_kontrak}`;
                    }
                });
            }
        },

        Bidding: {
            adjust: function(val) {
                App.BiddingData.currentPrice = Math.max(App.BiddingData.basePrice, App.BiddingData.currentPrice + val);
                document.getElementById('dispBidAmt').innerText = App.BiddingData.currentPrice.toLocaleString('id-ID');
            },
            submit: async function() {
                const b = App.BiddingData;
                const r = App.State.rpg;
                
                if(r.stm < b.rpgData.stamina) return alert("Stamina Tidak Cukup!");
                
                // Cek Stok Item di Shard sebelum Bid
                const dbShard = getTerminal(App.State.loc.shard || "FB2_RUNNER");
                const jenis = b.currentPrice > 60000 ? "kontrak_premium" : "kontrak_normal";
                const stok = await dbShard.ref(`adventurer_contracts/${App.State.idAdv}/${jenis}`).once('value');
                
                if((stok.val() || 0) <= 0) return alert(`Stok ${jenis.toUpperCase()} Habis!`);

                await App.db4.ref(`bids/${b.mid}/${App.user.uid}`).set({
                    adventurer_id: App.State.idAdv,
                    uid: App.user.uid,
                    nickname: App.user.nick,
                    offer_price: b.currentPrice,
                    contract_item: jenis,
                    rpg_reward: { stamina_used: b.rpgData.stamina },
                    timestamp: Date.now()
                });

                App.UI.closeModal();
                alert("Sinyal Terbit! Menunggu konfirmasi...");
            }
        },

        UI: {
            updateHeader: function(nick) {
                document.getElementById('dispNick').innerText = nick;
                document.getElementById('dispRank').innerText = App.State.rank;
                document.body.className = `rank-${App.State.rank.toLowerCase()}`;
                document.getElementById('dispGelar').innerText = App.State.rank.toUpperCase() + " ADVENTURER";
            },
            updateRPG: function() {
                const r = App.State.rpg;
                document.getElementById('dispLvl').innerText = r.lvl;
                document.getElementById('dispExp').innerText = `${r.exp}/${r.expNext}`;
                document.getElementById('expBar').style.width = (r.exp/r.expNext*100) + "%";
                document.getElementById('dispStm').innerText = `${r.stm}/${r.stmMax}`;
                document.getElementById('staminaBar').style.width = (r.stm/r.stmMax*100) + "%";
                document.getElementById('dispLimit').innerText = `${r.limit}/${r.limitMax}`;
            },
            renderCard: function(m, container) {
                const card = document.createElement('div');
                card.className = "mission-card";
                card.onclick = () => card.classList.toggle('active-expand');
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <b style="color:var(--theme-color)">${m.category || 'QUEST'}</b>
                        <span style="color:#4ade80; font-family:var(--font-terminal)">Rp ${m.reward?.toLocaleString()}</span>
                    </div>
                    <div style="font-size:14px; margin:5px 0;">📍 ${m.dest_desa || m.origin_name}</div>
                    <div class="m-expand-body">
                        <p style="font-size:12px; color:#888;">${m.note || 'Tidak ada catatan.'}</p>
                        <button onclick="App.UI.openModal('${m.id_misi}', ${m.reward}, '${m.note}', ${JSON.stringify(m.rpg_reward)})" style="width:100%; padding:10px; background:var(--theme-color); border:none; font-weight:bold; cursor:pointer;">AMBIL KONTRAK</button>
                    </div>
                `;
                container.appendChild(card);
            },
            openModal: function(mid, price, note, rpg) {
                App.BiddingData = { mid, basePrice: price, currentPrice: price, rpgData: rpg || {stamina:10} };
                document.getElementById('modalInfo').innerText = note;
                document.getElementById('dispBidAmt').innerText = price.toLocaleString('id-ID');
                document.getElementById('sovBidModal').style.display = 'flex';
            },
            closeModal: function() { document.getElementById('sovBidModal').style.display = 'none'; },
            toggleRadar: function() {
                App.State.isExpanded = !App.State.isExpanded;
                document.getElementById('radarType').innerText = App.State.isExpanded ? "DISTRICT" : "LOCAL";
                App.Core.startRadar();
            }
        }
    };

    window.onload = () => App.init();
</script>

</body>
</html>
