<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Guild - God Mode Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-dark); color: var(--text-main);
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Header & Nav */
        .header {
            background: linear-gradient(90deg, #1e293b, #000000);
            padding: 15px 20px; border-bottom: 2px solid var(--accent-gold);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.2rem; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px;}
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel-bg);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #334155; z-index: 100;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-muted); font-size: 0.9rem;
            display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }
        .nav-btn.active { color: var(--accent-gold); font-weight: bold; }

        /* Content Sections */
        .section { display: none; padding: 15px; }
        .section.active { display: block; }

        /* Search & Filter Tools */
        .tools-container {
            display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
        }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: var(--bg-dark); color: white; font-size: 1rem;
        }
        .search-box { flex: 1; min-width: 200px; }
        .filter-box { width: 100px; }

        /* Cards (Mobile Optimized) */
        .card {
            background: var(--panel-bg); border-radius: 12px; padding: 15px;
            margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 4px solid #334155;
        }
        .card.rank-S { border-left-color: var(--accent-gold); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-title { font-size: 1.1rem; font-weight: bold; }
        .card-subtitle { font-size: 0.8rem; color: var(--text-muted); }
        
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .stat-item span { color: var(--text-muted); display: block; font-size: 0.75rem;}
        
        /* Buttons */
        .btn {
            padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold;
            cursor: pointer; width: 100%; text-align: center;
        }
        .btn-gold { background: var(--accent-gold); color: black; }
        .btn-green { background: var(--accent-green); color: white; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-dark { background: #334155; color: white; }
        .btn-group { display: flex; gap: 10px; }

        /* Modal / God Mode Form */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal {
            background: var(--panel-bg); width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; border: 1px solid var(--accent-gold);
            max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { color: var(--accent-gold); margin-bottom: 15px; text-align: center;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;}
        
        /* Global Actions */
        .global-panel { border: 1px dashed var(--accent-red); padding: 15px; border-radius: 10px; margin-bottom:15px;}
    </style>
</head>
<body>

    <div class="header">
        <h1>👁️ God Mode Panel</h1>
        <div id="connectionStatus" style="color: var(--accent-green); font-size: 0.8rem;">Online</div>
    </div>

    <div id="tab-users" class="section active">
        <div class="tools-container">
            <input type="text" id="searchUser" class="search-box" placeholder="Cari Nama / ID Adventurer..." oninput="filterUsers()">
            <select id="filterRank" class="filter-box" onchange="filterUsers()">
                <option value="ALL">All Rank</option>
                <option value="S">Rank S</option>
                <option value="A">Rank A</option>
                <option value="B">Rank B</option>
                <option value="C">Rank C</option>
                <option value="D">Rank D</option>
                <option value="E">Rank E</option>
                <option value="F">Rank F</option>
            </select>
        </div>
        <div id="usersContainer">
            </div>
    </div>

    <div id="tab-topups" class="section">
        <div class="tools-container">
            <select id="filterTopup" class="search-box" onchange="loadTopups()">
                <option value="Pending">Menunggu Verifikasi (Pending)</option>
                <option value="Approved">Sudah Disetujui (Approved)</option>
                <option value="Rejected">Ditolak (Rejected)</option>
            </select>
        </div>
        <div id="topupsContainer">
            </div>
    </div>

    <div id="tab-global" class="section">
        <div class="global-panel">
            <h3 style="color: var(--accent-red); margin-bottom: 10px;">⚡ Mass Manipulation</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Tindakan ini akan mempengaruhi SELURUH akun di database.</p>
            
            <div class="form-group">
                <label>Suntik Stamina Massal</label>
                <div class="btn-group">
                    <input type="number" id="massStaminaAmount" placeholder="Jml Stamina" style="width: 60%;">
                    <button class="btn btn-gold" onclick="massInject('stamina')">SUNTIK</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Server EXP Multiplier (Aktifkan Event)</label>
                <div class="btn-group">
                    <select id="expMultiplier" style="width: 60%;">
                        <option value="1">Normal (1x)</option>
                        <option value="2">Double (2x)</option>
                        <option value="3">Triple (3x)</option>
                    </select>
                    <button class="btn btn-red" onclick="setGlobalMultiplier()">TERAPKAN</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('users', this)">
            <span>🛡️</span> Adventurers
        </button>
        <button class="nav-btn" onclick="switchTab('topups', this)">
            <span>💰</span> Laporan Top-up
        </button>
        <button class="nav-btn" onclick="switchTab('global', this)">
            <span>🌍</span> Global Event
        </button>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>⚙️ Edit Dewa</h2>
            <input type="hidden" id="editUserId">
            
            <div class="form-group">
                <label>Nama Adventurer</label>
                <input type="text" id="editName">
            </div>
            
            <div class="stats-grid">
                <div class="form-group">
                    <label>Level</label>
                    <input type="number" id="editLevel">
                </div>
                <div class="form-group">
                    <label>Rank</label>
                    <select id="editRank">
                        <option value="S">S</option><option value="A">A</option>
                        <option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option>
                        <option value="F">F</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stamina Aktual (Bisa Overcap)</label>
                    <input type="number" id="editStamina">
                </div>
                <div class="form-group">
                    <label>Koin Emas</label>
                    <input type="number" id="editKoin">
                </div>
            </div>

            <div class="form-group">
                <label>Status Akun</label>
                <select id="editStatus">
                    <option value="Active">Active</option>
                    <option value="Banned">Banned (Mati)</option>
                </select>
            </div>

            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-dark" onclick="closeModal()">Batal</button>
                <button class="btn btn-red" onclick="saveGodModeChanges()">OVERRIDE DATA</button>
            </div>
        </div>
    </div>

    <script>
    // 1. INTEGRASI TERMINAL ROUTER
    // Pastikan terminal_router.js sudah di-import di head
    
    const AdminApp = {
        state: {
            adventurers: [],
            activeTab: 'users'
        },

        init: function() {
            // Gunakan FB1_MASTER sebagai sumber indeks utama
            this.dbMaster = getTerminal('FB1_MASTER');
            this.loadAdventurers();
        },

        // 2. LOAD DATA DARI MULTI-FIREBASE
        loadAdventurers: function() {
            const container = document.getElementById('usersContainer');
            container.innerHTML = '<p style="padding:20px">Scanning Master Index...</p>';

            // Ambil Index dari FB1
            this.dbMaster.ref('adventurer_index').on('value', async (snapshot) => {
                const indexData = snapshot.val();
                container.innerHTML = '';
                this.state.adventurers = [];

                for (let id in indexData) {
                    const index = indexData[id];
                    // RUTE OTOMATIS: Ambil data Vitality dari Shard yang tepat (FB2/Lainnya)
                    const dbShard = getTerminal(index.shard_id || 'FB2_RUNNER');
                    
                    const vitalitySnap = await dbShard.ref(`adventurer_experience/${id}`).once('value');
                    const profileSnap = await dbShard.ref(`adventurer_profile/${id}`).once('value');
                    
                    const v = vitalitySnap.val() || {};
                    const p = profileSnap.val() || {};

                    const fullData = { 
                        id, ...index, ...v, ...p, 
                        shard: index.shard_id || 'FB2_RUNNER' 
                    };
                    this.state.adventurers.push(fullData);
                    this.renderCard(fullData, container);
                }
            });
        },

        renderCard: function(data, container) {
            const card = document.createElement('div');
            card.className = `card rank-${data.rank || 'F'}`;
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <div class="card-title">${data.nickname || 'Unknown'} [${data.rank || 'F'}]</div>
                        <div class="card-subtitle">SHARD: ${data.shard} | ID: ${data.id.substring(0,8)}</div>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item"><span>Level</span> ${data.level || 1}</div>
                    <div class="stat-item"><span>Stamina</span> ⚡ ${data.current_stamina || 0}/${data.max_stamina || 100}</div>
                    <div class="stat-item"><span>Koin</span> 🪙 ${data.koin || 0}</div>
                    <div class="stat-item"><span>Status</span> ${data.status || 'Active'}</div>
                </div>
                <button class="btn btn-gold" onclick='openEditModal(${JSON.stringify(data)})'>⚙️ OVERRIDE SHARD</button>
            `;
            container.appendChild(card);
        },

        // 3. GOD MODE OVERRIDE (Langsung ke Shard Database)
        saveGodModeChanges: async function() {
            const id = document.getElementById('editUserId').value;
            const shardID = document.getElementById('editUserShard').value; // Ambil dari data card
            
            const dbShard = getTerminal(shardID);
            
            const payloadExperience = {
                level: parseInt(document.getElementById('editLevel').value),
                current_stamina: parseInt(document.getElementById('editStamina').value)
            };

            const payloadProfile = {
                rank: document.getElementById('editRank').value,
                status: document.getElementById('editStatus').value
            };

            try {
                // Update di Shard (Experience & Vitality)
                await dbShard.ref(`adventurer_experience/${id}`).update(payloadExperience);
                await dbShard.ref(`adventurer_profile/${id}`).update(payloadProfile);
                
                // Update Koin di Master (FB1) jika koin disimpan di Master
                await this.dbMaster.ref(`adventurer_index/${id}`).update({
                    koin: parseInt(document.getElementById('editKoin').value)
                });

                alert('TANGGAPAN DEWA: Shard ' + shardID + ' berhasil di-override!');
                closeModal();
            } catch (e) {
                alert('Gagal Override: ' + e.message);
            }
        },

        // 4. MASS MANIPULATION (Looping Semua Shard)
        massInject: async function(type) {
            const amount = parseInt(document.getElementById('massStaminaAmount').value);
            if(!amount) return;

            if(confirm(`Suntik ${amount} Stamina ke SEMUA Shard?`)) {
                // Kita harus loop index di Master untuk tahu shard masing-masing user
                const snapshot = await this.dbMaster.ref('adventurer_index').once('value');
                const users = snapshot.val();

                for(let id in users) {
                    const shardID = users[id].shard_id || 'FB2_RUNNER';
                    const dbShard = getTerminal(shardID);
                    
                    // Gunakan transaction agar tidak bentrok
                    dbShard.ref(`adventurer_experience/${id}/current_stamina`).transaction(current => {
                        return (current || 0) + amount;
                    });
                }
                alert('Injeksi Massal Selesai!');
            }
        }
    };

    // Helper untuk Modal (Sesuaikan dengan field baru)
    function openEditModal(data) {
        document.getElementById('editUserId').value = data.id;
        document.getElementById('editUserShard').value = data.shard; // Tambahkan input hidden ini di HTML modal
        document.getElementById('editName').value = data.nickname || '';
        document.getElementById('editLevel').value = data.level || 1;
        document.getElementById('editRank').value = data.rank || 'F';
        document.getElementById('editStamina').value = data.current_stamina || 0;
        document.getElementById('editKoin').value = data.koin || 0;
        document.getElementById('editStatus').value = data.status || 'Active';
        document.getElementById('editModal').style.display = 'flex';
    }

    window.onload = () => AdminApp.init();
</script>

</body>
</html>
