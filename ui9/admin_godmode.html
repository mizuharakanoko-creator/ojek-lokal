<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Guild - God Mode Console</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-deep: #020617;
            --panel-glass: rgba(30, 41, 59, 0.7);
            --accent-gold: #fbbf24;
            --glow-gold: 0 0 15px rgba(251, 191, 36, 0.5);
            --accent-red: #f43f5e;
            --accent-cyan: #22d3ee;
            --text-system: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-system);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            min-height: 100vh;
        }

        /* --- UI SYSTEM ANIMATIONS --- */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px var(--accent-gold); }
            50% { box-shadow: 0 0 20px var(--accent-gold); }
            100% { box-shadow: 0 0 5px var(--accent-gold); }
        }

        @keyframes slide-in {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* --- HEADER SYSTEM --- */
        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-bottom: 2px solid var(--accent-gold);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 1rem; 
            color: var(--accent-gold); text-shadow: var(--glow-gold);
            letter-spacing: 2px;
        }

        /* --- SEARCH & LIST AREA --- */
        .main-container { padding: 15px; padding-bottom: 100px; }
        
        .search-container {
            position: relative; margin-bottom: 20px;
        }
        .search-input {
            width: 100%; background: var(--panel-glass);
            border: 1px solid var(--accent-cyan);
            padding: 15px; border-radius: 4px; color: white;
            font-family: 'Orbitron'; font-size: 0.9rem;
            box-shadow: inset 0 0 10px rgba(34, 211, 238, 0.2);
        }

        .adventurer-list {
            display: grid; gap: 12px;
        }
        .adv-card {
            background: var(--panel-glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; cursor: pointer;
        }
        .adv-card:active { transform: scale(0.95); border-color: var(--accent-gold); }
        .adv-card.selected { border-color: var(--accent-gold); background: rgba(251, 191, 36, 0.1); }
        
        .adv-info h3 { font-family: 'Orbitron'; color: var(--accent-cyan); font-size: 1rem; }
        .adv-info p { font-size: 0.8rem; color: #94a3b8; }

        .rank-tag {
            padding: 4px 10px; border-radius: 4px; font-weight: bold;
            font-family: 'Orbitron'; font-size: 0.7rem;
            border: 1px solid currentColor;
        }

        /* --- THE GOD SHEET (SIDE PANEL) --- */
        .side-panel {
            position: fixed; top: 0; right: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            z-index: 200; display: none;
            flex-direction: column;
            animation: slide-in 0.3s ease-out;
            border-left: 2px solid var(--accent-gold);
        }
        .panel-header {
            padding: 20px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-content {
            flex: 1; overflow-y: auto; padding: 20px;
        }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-family: 'Orbitron'; font-size: 0.7rem;
            color: var(--accent-gold); margin-bottom: 8px; text-transform: uppercase;
        }
        .god-input {
            width: 100%; background: #0f172a; border: 1px solid #334155;
            padding: 12px; color: white; border-radius: 4px;
            font-family: 'Rajdhani'; font-size: 1.1rem;
        }
        .god-input:focus { border-color: var(--accent-gold); outline: none; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* --- BUTTONS --- */
        .btn-execute {
            background: var(--accent-gold); color: black;
            border: none; padding: 18px; width: 100%;
            font-family: 'Orbitron'; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            box-shadow: var(--glow-gold);
            margin-top: 10px; border-radius: 4px;
        }
        .btn-execute:active { filter: brightness(1.2); }

        .btn-close {
            background: none; border: 1px solid var(--accent-red); color: var(--accent-red);
            padding: 5px 15px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron';
        }

        /* --- SYSTEM ALERT --- */
        #systemAlert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent-gold); color: black; padding: 10px 20px;
            border-radius: 4px; font-family: 'Orbitron'; font-weight: bold;
            z-index: 1000; display: none; box-shadow: 0 0 20px black;
        }
    </style>
</head>
<body>

    <div id="systemAlert">SYSTEM UPDATED</div>

    <div class="header">
        <h1>SOVEREIGN CONTROL</h1>
        <div id="status" style="color: var(--accent-cyan); font-size: 0.7rem;">[ADMIN_DEWA_ONLINE]</div>
    </div>

    <div class="main-container">
        <div class="search-container">
            <input type="text" id="masterSearch" class="search-input" 
                   placeholder="SEARCH NICKNAME / ID_ADV..." oninput="searchSovereign()">
        </div>

        <div id="adventurerList" class="adventurer-list">
            <p style="text-align:center; color:#475569;">Menunggu Input Dewa...</p>
        </div>
    </div>

    <div id="godSheet" class="side-panel">
        <div class="panel-header">
            <h2 id="targetName" style="font-family:'Orbitron'; color:var(--accent-gold);">EDITING_ID...</h2>
            <button class="btn-close" onclick="closeGodSheet()">X CLOSE</button>
        </div>

        <div class="panel-content">
            <input type="hidden" id="targetId">
            
            <div class="form-group">
                <label>Nickname</label>
                <input type="text" id="in-name" class="god-input">
            </div>

            <div class="stats-row">
                <div class="form-group">
                    <label>Level</label>
                    <input type="number" id="in-level" class="god-input">
                </div>
                <div class="form-group">
                    <label>Rank</label>
                    <select id="in-rank" class="god-input">
                        <option value="S">RANK S</option>
                        <option value="A">RANK A</option>
                        <option value="B">RANK B</option>
                        <option value="C">RANK C</option>
                        <option value="D">RANK D</option>
                        <option value="E">RANK E</option>
                        <option value="F">RANK F</option>
                    </select>
                </div>
            </div>

            <div class="stats-row">
                <div class="form-group">
                    <label>Stamina (Current)</label>
                    <input type="number" id="in-stamina" class="god-input" style="color:var(--accent-cyan);">
                </div>
                <div class="form-group">
                    <label>Max Stamina</label>
                    <input type="number" id="in-max-stamina" class="god-input">
                </div>
            </div>

            <div class="form-group">
                <label>Gold Coin (Koin Emas)</label>
                <input type="number" id="in-koin" class="god-input" style="color:var(--accent-gold);">
            </div>

            <div class="form-group">
                <label>Account Status</label>
                <select id="in-status" class="god-input">
                    <option value="Active">ACTIVE</option>
                    <option value="Banned">BANNED / DEAD</option>
                </select>
            </div>

            <div style="border: 1px dashed var(--accent-red); padding: 15px; margin-top: 20px;">
                <p style="color:var(--accent-red); font-size: 0.7rem; font-family:'Orbitron'; margin-bottom:10px;">DANGER_ZONE</p>
                <button class="btn-execute" onclick="executeOverride()">OVERRIDE DATABASE</button>
            </div>
        </div>
    </div>

    <div style="position:fixed; bottom:0; width:100%; background:black; border-top:1px solid var(--accent-gold); display:flex; justify-content:space-around; padding:10px;">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--accent-gold); font-family:'Orbitron'; font-size:0.8rem;">REFRESH_SYSTEM</button>
    </div>

    <script>
        // 1. CONFIG (PASTE PUNYA ANDA)
        const firebaseConfig = {
            apiKey: "API_KEY",
            authDomain: "PROJECT.firebaseapp.com",
            projectId: "PROJECT",
            storageBucket: "PROJECT.appspot.com",
            messagingSenderId: "ID",
            appId: "APPID"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. SEARCH ENGINE (Mencari di adventurer_index)
        function searchSovereign() {
            const query = document.getElementById('masterSearch').value.toLowerCase();
            const list = document.getElementById('adventurerList');

            if(query.length < 2) return;

            // Kita cari berdasarkan nickname (startAt untuk fitur search real-time)
            db.collection("adventurer_index")
              .orderBy("nickname_lowercase")
              .startAt(query)
              .endAt(query + "\uf8ff")
              .limit(10)
              .onSnapshot(snapshot => {
                  list.innerHTML = "";
                  if(snapshot.empty) {
                      list.innerHTML = `<p style="text-align:center; color:#475569;">No Data Found in Index.</p>`;
                      return;
                  }
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const card = document.createElement('div');
                      card.className = 'adv-card';
                      card.onclick = () => openGodSheet(data.id_adv);
                      card.innerHTML = `
                        <div class="adv-info">
                            <h3>${data.nickname || 'Unknown'}</h3>
                            <p>ID: ${data.id_adv}</p>
                        </div>
                        <div class="rank-tag" style="color: ${getRankColor(data.rank)}">${data.rank || 'F'}</div>
                      `;
                      list.appendChild(card);
                  });
              });
        }

        // 3. OPEN GOD SHEET (Menarik data sangat dalam)
        async function openGodSheet(id) {
            triggerAlert("PULLING DATA...");
            
            // Mencari data di terminal_router logic (Profile & Vitality)
            try {
                const profileDoc = await db.collection("adventurer_profiles").doc(id).get();
                const vitalityDoc = await db.collection("adventurer_vitality").doc(id).get();

                if(!profileDoc.exists) throw "Profile not found!";

                const p = profileDoc.data();
                const v = vitalityDoc.data() || {};

                // Isi Form
                document.getElementById('targetId').value = id;
                document.getElementById('targetName').innerText = p.nickname || id;
                document.getElementById('in-name').value = p.nickname || '';
                document.getElementById('in-level').value = p.level || 1;
                document.getElementById('in-rank').value = p.rank || 'F';
                document.getElementById('in-stamina').value = v.stamina || 0;
                document.getElementById('in-max-stamina').value = v.max_stamina || 100;
                document.getElementById('in-koin').value = p.koin || 0;
                document.getElementById('in-status').value = p.status || 'Active';

                document.getElementById('godSheet').style.display = 'flex';
            } catch (e) {
                alert("ERROR FETCHING: " + e);
            }
        }

        function closeGodSheet() {
            document.getElementById('godSheet').style.display = 'none';
        }

        // 4. EXECUTE OVERRIDE (Update Database Paksa)
        async function executeOverride() {
            const id = document.getElementById('targetId').value;
            triggerAlert("EXECUTING OVERRIDE...");

            const pData = {
                nickname: document.getElementById('in-name').value,
                level: parseInt(document.getElementById('in-level').value),
                rank: document.getElementById('in-rank').value,
                koin: parseInt(document.getElementById('in-koin').value),
                status: document.getElementById('in-status').value,
                last_god_update: firebase.firestore.FieldValue.serverTimestamp()
            };

            const vData = {
                stamina: parseInt(document.getElementById('in-stamina').value),
                max_stamina: parseInt(document.getElementById('in-max-stamina').value)
            };

            try {
                // Gunakan Batch agar update sekaligus ke dua tabel/shard
                const batch = db.batch();
                const pRef = db.collection("adventurer_profiles").doc(id);
                const vRef = db.collection("adventurer_vitality").doc(id);
                const iRef = db.collection("adventurer_index").doc(id); // Update index juga jika nama berubah

                batch.update(pRef, pData);
                batch.update(vRef, vData);
                batch.update(iRef, { 
                    nickname: pData.nickname, 
                    nickname_lowercase: pData.nickname.toLowerCase(),
                    rank: pData.rank 
                });

                await batch.commit();
                triggerAlert("DATABASE OVERRIDDEN!");
                setTimeout(closeGodSheet, 1000);
            } catch (e) {
                alert("OVERRIDE FAILED: " + e);
            }
        }

        // UTILS
        function getRankColor(rank) {
            const colors = { 'S': '#fbbf24', 'A': '#f87171', 'B': '#c084fc', 'C': '#60a5fa', 'D': '#4ade80', 'E': '#94a3b8', 'F': '#ffffff' };
            return colors[rank] || '#fff';
        }

        function triggerAlert(msg) {
            const el = document.getElementById('systemAlert');
            el.innerText = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
