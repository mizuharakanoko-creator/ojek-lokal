<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Guild - God Mode Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-dark); color: var(--text-main);
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Header & Nav */
        .header {
            background: linear-gradient(90deg, #1e293b, #000000);
            padding: 15px 20px; border-bottom: 2px solid var(--accent-gold);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.2rem; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px;}
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel-bg);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #334155; z-index: 100;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-muted); font-size: 0.9rem;
            display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }
        .nav-btn.active { color: var(--accent-gold); font-weight: bold; }

        /* Content Sections */
        .section { display: none; padding: 15px; }
        .section.active { display: block; }

        /* Search & Filter Tools */
        .tools-container {
            display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
        }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: var(--bg-dark); color: white; font-size: 1rem;
        }
        .search-box { flex: 1; min-width: 200px; }
        .filter-box { width: 100px; }

        /* Cards (Mobile Optimized) */
        .card {
            background: var(--panel-bg); border-radius: 12px; padding: 15px;
            margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 4px solid #334155;
        }
        .card.rank-S { border-left-color: var(--accent-gold); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-title { font-size: 1.1rem; font-weight: bold; }
        .card-subtitle { font-size: 0.8rem; color: var(--text-muted); }
        
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .stat-item span { color: var(--text-muted); display: block; font-size: 0.75rem;}
        
        /* Buttons */
        .btn {
            padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold;
            cursor: pointer; width: 100%; text-align: center;
        }
        .btn-gold { background: var(--accent-gold); color: black; }
        .btn-green { background: var(--accent-green); color: white; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-dark { background: #334155; color: white; }
        .btn-group { display: flex; gap: 10px; }

        /* Modal / God Mode Form */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal {
            background: var(--panel-bg); width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; border: 1px solid var(--accent-gold);
            max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { color: var(--accent-gold); margin-bottom: 15px; text-align: center;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;}
        
        /* Global Actions */
        .global-panel { border: 1px dashed var(--accent-red); padding: 15px; border-radius: 10px; margin-bottom:15px;}
    </style>
</head>
<body>

    <div class="header">
        <h1>👁️ God Mode Panel</h1>
        <div id="connectionStatus" style="color: var(--accent-green); font-size: 0.8rem;">Online</div>
    </div>

    <div id="tab-users" class="section active">
        <div class="tools-container">
            <input type="text" id="searchUser" class="search-box" placeholder="Cari Nama / ID Adventurer..." oninput="filterUsers()">
            <select id="filterRank" class="filter-box" onchange="filterUsers()">
                <option value="ALL">All Rank</option>
                <option value="S">Rank S</option>
                <option value="A">Rank A</option>
                <option value="B">Rank B</option>
                <option value="C">Rank C</option>
                <option value="D">Rank D</option>
                <option value="E">Rank E</option>
                <option value="F">Rank F</option>
            </select>
        </div>
        <div id="usersContainer">
            </div>
    </div>

    <div id="tab-topups" class="section">
        <div class="tools-container">
            <select id="filterTopup" class="search-box" onchange="loadTopups()">
                <option value="Pending">Menunggu Verifikasi (Pending)</option>
                <option value="Approved">Sudah Disetujui (Approved)</option>
                <option value="Rejected">Ditolak (Rejected)</option>
            </select>
        </div>
        <div id="topupsContainer">
            </div>
    </div>

    <div id="tab-global" class="section">
        <div class="global-panel">
            <h3 style="color: var(--accent-red); margin-bottom: 10px;">⚡ Mass Manipulation</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Tindakan ini akan mempengaruhi SELURUH akun di database.</p>
            
            <div class="form-group">
                <label>Suntik Stamina Massal</label>
                <div class="btn-group">
                    <input type="number" id="massStaminaAmount" placeholder="Jml Stamina" style="width: 60%;">
                    <button class="btn btn-gold" onclick="massInject('stamina')">SUNTIK</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Server EXP Multiplier (Aktifkan Event)</label>
                <div class="btn-group">
                    <select id="expMultiplier" style="width: 60%;">
                        <option value="1">Normal (1x)</option>
                        <option value="2">Double (2x)</option>
                        <option value="3">Triple (3x)</option>
                    </select>
                    <button class="btn btn-red" onclick="setGlobalMultiplier()">TERAPKAN</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('users', this)">
            <span>🛡️</span> Adventurers
        </button>
        <button class="nav-btn" onclick="switchTab('topups', this)">
            <span>💰</span> Laporan Top-up
        </button>
        <button class="nav-btn" onclick="switchTab('global', this)">
            <span>🌍</span> Global Event
        </button>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>⚙️ Edit Dewa</h2>
            <input type="hidden" id="editUserId">
            
            <div class="form-group">
                <label>Nama Adventurer</label>
                <input type="text" id="editName">
            </div>
            
            <div class="stats-grid">
                <div class="form-group">
                    <label>Level</label>
                    <input type="number" id="editLevel">
                </div>
                <div class="form-group">
                    <label>Rank</label>
                    <select id="editRank">
                        <option value="S">S</option><option value="A">A</option>
                        <option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option>
                        <option value="F">F</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stamina Aktual (Bisa Overcap)</label>
                    <input type="number" id="editStamina">
                </div>
                <div class="form-group">
                    <label>Koin Emas</label>
                    <input type="number" id="editKoin">
                </div>
            </div>

            <div class="form-group">
                <label>Status Akun</label>
                <select id="editStatus">
                    <option value="Active">Active</option>
                    <option value="Banned">Banned (Mati)</option>
                </select>
            </div>

            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-dark" onclick="closeModal()">Batal</button>
                <button class="btn btn-red" onclick="saveGodModeChanges()">OVERRIDE DATA</button>
            </div>
        </div>
    </div>

    <script>
        // 1. INISIALISASI FIREBASE (GANTI DENGAN CONFIG ANDA)
        const firebaseConfig = {
            apiKey: "API_KEY_ANDA",
            authDomain: "PROJECT_ANDA.firebaseapp.com",
            projectId: "PROJECT_ANDA",
            storageBucket: "PROJECT_ANDA.appspot.com",
            messagingSenderId: "MESSAGING_ID",
            appId: "APP_ID"
        };
        
        // Cek inisialisasi agar tidak error jika dijalankan ulang
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Variabel Global
        let adventurersData = [];

        // 2. NAVIGASI TABS
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            btnElement.classList.add('active');

            if(tabId === 'users') loadAdventurers();
            if(tabId === 'topups') loadTopups();
        }

        // 3. LOGIKA ADVENTURER & PENCARIAN (REALTIME)
        function loadAdventurers() {
            // Mengambil data dan mensimulasikan gabungan profile & vitality
            db.collection("adventurer_profiles").onSnapshot((snapshot) => {
                adventurersData = [];
                const container = document.getElementById('usersContainer');
                container.innerHTML = '';

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    data.id = doc.id;
                    adventurersData.push(data);
                    
                    // Render Card
                    const card = document.createElement('div');
                    card.className = `card rank-${data.rank || 'F'}`;
                    card.setAttribute('data-name', (data.name || '').toLowerCase());
                    card.setAttribute('data-rank', data.rank || 'F');
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <div class="card-title">${data.name || 'Unknown'} [${data.rank || 'F'}]</div>
                                <div class="card-subtitle">ID: ${doc.id.substring(0,8)}...</div>
                            </div>
                            <span style="color: ${data.status === 'Banned' ? 'var(--accent-red)' : 'var(--accent-green)'}">
                                ${data.status || 'Active'}
                            </span>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item"><span>Level</span> ${data.level || 1}</div>
                            <div class="stat-item"><span>Stamina</span> ⚡ ${data.stamina || 0}/${data.max_stamina || 100}</div>
                            <div class="stat-item"><span>Koin</span> 🪙 ${data.koin || 0}</div>
                            <div class="stat-item"><span>Total Misi</span> 📜 ${data.total_missions || 0}</div>
                        </div>
                        <button class="btn btn-gold" onclick='openEditModal(${JSON.stringify(data)})'>⚙️ OVERRIDE</button>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function filterUsers() {
            const searchText = document.getElementById('searchUser').value.toLowerCase();
            const rankFilter = document.getElementById('filterRank').value;
            const cards = document.querySelectorAll('#usersContainer .card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const rank = card.getAttribute('data-rank');
                
                const matchSearch = name.includes(searchText);
                const matchRank = (rankFilter === 'ALL') || (rank === rankFilter);

                if (matchSearch && matchRank) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // 4. LOGIKA GOD MODE MODAL (MENGUBAH DATA SEENAKNYA)
        function openEditModal(data) {
            document.getElementById('editUserId').value = data.id;
            document.getElementById('editName').value = data.name || '';
            document.getElementById('editLevel').value = data.level || 1;
            document.getElementById('editRank').value = data.rank || 'F';
            document.getElementById('editStamina').value = data.stamina || 0;
            document.getElementById('editKoin').value = data.koin || 0;
            document.getElementById('editStatus').value = data.status || 'Active';
            
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveGodModeChanges() {
            const id = document.getElementById('editUserId').value;
            const payload = {
                name: document.getElementById('editName').value,
                level: parseInt(document.getElementById('editLevel').value),
                rank: document.getElementById('editRank').value,
                stamina: parseInt(document.getElementById('editStamina').value),
                koin: parseInt(document.getElementById('editKoin').value),
                status: document.getElementById('editStatus').value,
                last_modified_by_admin: firebase.firestore.FieldValue.serverTimestamp()
            };

            // Paksa update tanpa peduli rules (karena security rules diabaikan)
            db.collection("adventurer_profiles").doc(id).set(payload, { merge: true })
            .then(() => {
                alert('TANGGAPAN DEWA: Data telah di-override secara absolut.');
                closeModal();
            })
            .catch(err => alert('Gagal: ' + err.message));
        }

        // 5. LOGIKA KEDALAMAN DATA TOP-UP
        function loadTopups() {
            const statusFilter = document.getElementById('filterTopup').value;
            const container = document.getElementById('topupsContainer');
            container.innerHTML = '<p>Memuat kedalaman data...</p>';

            db.collection("topup_reports")
              .where("status", "==", statusFilter)
              .onSnapshot((snapshot) => {
                container.innerHTML = '';
                if(snapshot.empty) {
                    container.innerHTML = `<p style="text-align:center; color:var(--text-muted);">Tidak ada data ${statusFilter}.</p>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const reqDate = data.timestamp ? data.timestamp.toDate().toLocaleString() : 'Unknown Time';
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <div class="card-title">Rp ${data.amount_rp ? data.amount_rp.toLocaleString() : 0}</div>
                                <div class="card-subtitle">${reqDate}</div>
                            </div>
                            <span style="font-size: 0.8rem; background: #334155; padding: 3px 8px; border-radius: 4px;">ID: ${doc.id.substring(0,6)}</span>
                        </div>
                        
                        <div style="background: var(--bg-dark); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                            <p style="font-size: 0.8rem; color: var(--accent-gold); margin-bottom: 5px;">[DATA INVESTIGASI]</p>
                            <div class="stats-grid" style="margin-bottom: 0;">
                                <div class="stat-item"><span>User ID</span> ${data.user_id}</div>
                                <div class="stat-item"><span>Metode</span> ${data.payment_method || 'Bank Transfer'}</div>
                                <div class="stat-item"><span>Saldo Awal Koin</span> 🪙 ${data.current_koin_snapshot || 0}</div>
                                <div class="stat-item"><span>Permintaan Koin</span> 🪙 +${data.koin_to_add || 0}</div>
                            </div>
                            <div class="stat-item" style="margin-top: 5px;"><span>Device Fingerprint</span> ${data.device_info || 'Mobile App Android'}</div>
                        </div>

                        ${statusFilter === 'Pending' ? `
                            <div class="btn-group">
                                <button class="btn btn-green" onclick="executeTopup('${doc.id}', '${data.user_id}', ${data.koin_to_add}, 'Approve')">✔️ SETUJUI & INJECT</button>
                                <button class="btn btn-red" onclick="executeTopup('${doc.id}', '${data.user_id}', 0, 'Reject')">❌ TOLAK</button>
                            </div>
                        ` : ''}
                    `;
                    container.appendChild(card);
                });
            });
        }

        function executeTopup(reportId, userId, koinToAdd, action) {
            if(!confirm(`Anda yakin akan melakukan ${action} pada laporan ini?`)) return;

            const reportRef = db.collection("topup_reports").doc(reportId);
            const userRef = db.collection("adventurer_profiles").doc(userId);

            db.runTransaction((transaction) => {
                return transaction.get(userRef).then((userDoc) => {
                    if (!userDoc.exists) {
                        throw "Adventurer tidak ditemukan!";
                    }

                    if(action === 'Approve') {
                        const newKoin = (userDoc.data().koin || 0) + parseInt(koinToAdd);
                        transaction.update(userRef, { koin: newKoin });
                    }
                    
                    // Catat riwayat audit
                    transaction.update(reportRef, { 
                        status: action === 'Approve' ? 'Approved' : 'Rejected',
                        processed_at: firebase.firestore.FieldValue.serverTimestamp(),
                        processed_by: "GOD_ADMIN"
                    });
                });
            }).then(() => {
                alert(`Eksekusi berhasil: Status telah diubah menjadi ${action}.`);
            }).catch((err) => {
                alert("Eksekusi gagal: " + err);
            });
        }

        // 6. GLOBAL MANIPULATION
        function massInject(type) {
            if(type === 'stamina') {
                const amount = document.getElementById('massStaminaAmount').value;
                if(!amount || amount <= 0) return alert('Masukkan jumlah stamina.');
                
                if(confirm(`YAKIN INGIN MENYUNTIKKAN ${amount} STAMINA KE SEMUA USER? (Proses ini berat)`)) {
                    // Logika: Ambil semua user, lakukan batch update
                    db.collection("adventurer_profiles").get().then(snapshot => {
                        let batch = db.batch();
                        snapshot.forEach(doc => {
                            const newStamina = (doc.data().stamina || 0) + parseInt(amount);
                            batch.update(doc.ref, { stamina: newStamina });
                        });
                        return batch.commit();
                    }).then(() => {
                        alert('Injeksi Massal Berhasil!');
                    });
                }
            }
        }

        function setGlobalMultiplier() {
            const val = document.getElementById('expMultiplier').value;
            db.collection("server_settings").doc("global_config").set({
                exp_multiplier: parseInt(val),
                updated_at: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(() => {
                alert(`Server Event Diaktifkan: EXP Multiplier x${val}`);
            });
        }

        // Init load
        window.onload = () => {
            loadAdventurers();
        };
    </script>
</body>
</html>
