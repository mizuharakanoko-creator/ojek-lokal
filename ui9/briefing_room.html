<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Briefing Room</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 20px; text-align: center; }
        .info-box { border: 1px solid #333; background: #111; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .status-pulse { color: #ffaa00; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .btn-start { background: #00ff00; color: #000; padding: 15px; width: 100%; font-weight: bold; border: none; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn-abort { background: none; color: #ff4444; border: 1px solid #ff4444; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 12px; }
        .warning-text { color: #888; font-size: 11px; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="info-box">
    <h2 style="color: #ffaa00; margin-top: 0;">BRIEFING ROOM</h2>
    <div id="statusMsg" class="status-pulse">MEMVERIFIKASI SINYAL...</div>
    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
    <div id="contractDetail" style="text-align: left; font-size: 13px; color: #ccc;">Menghubungkan...</div>
</div>

<div id="actionArea"></div>

<p class="warning-text">⚠️ <b>PERINGATAN:</b> Jangan menutup aplikasi agar koneksi kontrak tidak terputus secara permanen.</p>

<script>
    const user = Clearchance.enforceIdentity();
    const contractId = sessionStorage.getItem('active_contract_id');
    
    if (!contractId) {
        alert("Akses Ilegal.");
        window.location.href = "index.html";
    }

    const db4 = getTerminal('FB4_BOARD'); // Jalur utama FB4
    let isInitialLoad = true;

    // Monitor di FB4 sesuai alur lobby_adventurer
    const contractRef = db4.ref(`kontrak_mission/${contractId}`);

    contractRef.on('value', snap => {
        if (!snap.exists()) {
            if (isInitialLoad) { isInitialLoad = false; return; }
            alert("KONTRAK DIHANCURKAN: Requester membatalkan pesanan.");
            window.location.href = "index.html";
            return;
        }

        isInitialLoad = false;
        const c = snap.val();
        
        // Verifikasi identitas
        if (user.uid !== c.id_requester && user.uid !== c.id_adventurer) {
            alert("Akses Ditolak.");
            window.location.href = "index.html";
            return;
        }

        if (c.full_mission_data) {
            sessionStorage.setItem('current_mission_full', JSON.stringify(c.full_mission_data));
        }

        renderUI(c);

        if (c.is_started === true) {
            contractRef.off();
            window.location.href = "mission_progress.html";
        }
    });

    function renderUI(c) {
        const detailDiv = document.getElementById('contractDetail');
        const actionArea = document.getElementById('actionArea');
        const statusMsg = document.getElementById('statusMsg');

        detailDiv.innerHTML = `
            <b>ID Kontrak:</b> ${c.id_kontrak}<br>
            <b>Misi:</b> ${c.id_misi}<br>
            <b>Requester:</b> ${c.requester_nick}<br>
            <b>Adventurer:</b> ${c.adventurer_nick}<br>
            <b style="color:#00ff00;">Reward: Rp ${(c.reward || 0).toLocaleString()}</b>
        `;

        actionArea.innerHTML = "";
        if (user.role === 'adventurer') {
            statusMsg.innerText = "KONTRAK SIAP. EKSEKUSI?";
            actionArea.innerHTML = `<button class="btn-start" onclick="mulaiMisi()">MULAI MISI SEKARANG</button>`;
        } else {
            statusMsg.innerText = "MENUNGGU ADVENTURER MEMULAI...";
            actionArea.innerHTML = `<button class="btn-abort" onclick="batalkanKontrakTotal('${c.id_misi}', '${c.id_shard}', '${c.id_desa}')">BATALKAN & HAPUS MISI</button>`;
        }
    }

    async function mulaiMisi() {
        if (!confirm("Mulai perjalanan?")) return;
        try {
            await contractRef.update({ is_started: true, start_time: Date.now() });
        } catch (e) { alert("Gagal update: " + e.message); }
    }

    async function batalkanKontrakTotal(mid, shard, desa) {
        if (!confirm("Hapus total?")) return;
        try {
            await db4.ref(`mission-${shard}/${desa}/${mid}`).remove();
            await db4.ref(`bids/${mid}`).remove();
            await contractRef.remove();
            window.location.href = "lobby_requester.html";
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
