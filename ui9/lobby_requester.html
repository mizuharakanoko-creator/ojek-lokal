<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Requester Lobby</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 15px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 20px; border-top: 3px solid #ff0055; position: relative; }
        .bid-item { background: #222; padding: 10px; margin-top: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #00ffff; }
        .btn-acc { background: #00ffff; color: #000; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; }
        .btn-abort { background: #444; color: #ff4444; border: 1px solid #ff4444; padding: 5px 10px; font-size: 10px; cursor: pointer; float: right; margin-top: -5px; }
        .status-msg { color: #888; font-size: 11px; margin-top: 10px; letter-spacing: 1px; }
        .reward-tag { color: #00ff00; font-size: 18px; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <button class="btn-abort" onclick="hancurkanMisi()">[ HANCURKAN MISI ]</button>
    <h3 id="missionTitle" style="margin: 0; color: #ff0055;">MEMINDDAI SINYAL...</h3>
    
    <div id="missionDetail" style="margin-top: 15px; font-size: 13px; line-height: 1.6;"></div>
    <div class="status-msg" id="statusPulsing">MENUNGGU ADVENTURER MERESPON...</div>
</div>

<div id="bidSection">
    <h4 style="border-bottom: 1px solid #333; padding-bottom: 5px;">PENELUSURAN SINYAL (BIDS):</h4>
    <div id="bidList"></div>
</div>

<script>
    const user = Clearchance.enforceIdentity();
    const activeMid = sessionStorage.getItem('active_mission_id');
    const activeShard = sessionStorage.getItem('active_mission_shard');
    const activeDesa = sessionStorage.getItem('active_mission_desa');

    if (!activeMid || !activeShard || !activeDesa) {
        alert("Sesi misi tidak ditemukan.");
        window.location.href = "publish.html";
    }

    const db1 = getTerminal('FB1_MASTER');
    const db4 = getTerminal('FB4_BOARD');
    
    const missionRefPath = `mission-${activeShard}/${activeDesa}/${activeMid}`;

    // 2. Pantau Detail Misi secara Realtime
    db4.ref(missionRefPath).on('value', snap => {
        if (!snap.exists()) {
            alert("Sinyal misi terputus.");
            window.location.href = "publish.html";
            return;
        }
        const m = snap.val();
        document.getElementById('missionTitle').innerText = `ID: ${m.id_misi}`;
        document.getElementById('missionDetail').innerHTML = `
            <span style="color:#888">DARI:</span> ${m.origin_desa} (${m.origin_name})<br>
            <span style="color:#888">KE:</span> ${m.dest_desa} (${m.dest_name})<br>
            <span style="color:#888">INFO:</span> ${m.catatan || '-'}<br>
            <span class="reward-tag">Rp ${m.reward.toLocaleString()}</span>
        `;
    });

    // 3. Pantau Bids
    db4.ref(`bids/${activeMid}`).on('value', snap => {
        const list = document.getElementById('bidList');
        list.innerHTML = "";
        if (!snap.exists()) {
            list.innerHTML = "<p style='color:#444; font-style:italic;'>Belum ada sinyal masuk...</p>";
            return;
        }
        snap.forEach(child => {
            const b = child.val();
            const div = document.createElement('div');
            div.className = 'bid-item';
            div.innerHTML = `
                <div>
                    <b style="color:#00ffff">${b.adventurer_nick}</b><br>
                    <small style="color:#aaa">Penawaran: Rp ${b.offer_price.toLocaleString()}</small>
                </div>
                <button class="btn-acc" onclick="terimaPenawaran('${child.key}', '${b.adventurer_id}', '${b.adventurer_nick}', ${b.offer_price})">TERIMA</button>
            `;
            list.appendChild(div);
        });
    });

    // 4. Fungsi Terima Penawaran & Buat Kontrak (Sinkron dengan Adventurer Radar)
    async function terimaPenawaran(bidId, advenId, advenNick, finalPrice) {
        if (!confirm(`Terima penawaran dari ${advenNick}?`)) return;

        const contractId = "CTR-" + Date.now();
        const missionSnap = await db4.ref(missionRefPath).once('value');
        const m = missionSnap.val();
        
        const contractData = {
            id_kontrak: contractId,
            id_misi: activeMid,
            id_requester: user.uid,
            requester_nick: user.nick || "Requester",
            id_adventurer: advenId, // Kunci utama untuk listener adventurer
            adventurer_nick: advenNick,
            reward: finalPrice,
            id_shard: activeShard,
            id_desa: activeDesa,
            status: 'briefing',
            is_started: false,
            created_at: Date.now(),
            full_mission_data: m
        };

        try {
            // A. Simpan Kontrak ke FB4 (kontrak_mission) agar terdeteksi listenToContracts() adventurer
            await db4.ref(`kontrak_mission/${contractId}`).set(contractData);
            
            // B. Update status misi
            await db4.ref(missionRefPath).update({ 
                status: 'taken',
                active_contract_id: contractId,
                adventurer_id: advenId
            });

            // C. Hapus semua bids
            await db4.ref(`bids/${activeMid}`).remove();

            sessionStorage.setItem('active_contract_id', contractId);
            alert("Kontrak Terbentuk. Menuju Briefing Room...");
            window.location.href = "briefing_room.html";
        } catch (e) {
            alert("Kegagalan Sistem: " + e.message);
        }
    }

    async function hancurkanMisi() {
        if (!confirm("HANCURKAN MISI?")) return;
        try {
            await db1.ref(`misi_index/${activeMid}`).remove();
            await db4.ref(missionRefPath).remove();
            await db4.ref(`bids/${activeMid}`).remove();
            sessionStorage.clear();
            window.location.href = "publish.html";
        } catch (e) { alert("Gagal: " + e.message); }
    }
</script>
</body>
</html>
