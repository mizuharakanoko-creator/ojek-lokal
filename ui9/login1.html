<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | GATEWAY ACCESS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>

    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-cyan-dim: rgba(0, 255, 255, 0.3);
            --neon-pink: #ff0055;
            --neon-pink-dim: rgba(255, 0, 85, 0.3);
            --gold: #ffaa00;
        }

        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { overscroll-behavior-y: contain; background-color: #050505; color: #fff; min-height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        input { -webkit-user-select: text; user-select: text; }

        /* NETWORK STATUS */
        .network-status {
            position: fixed; top: 15px; left: 15px; display: flex; align-items: center; gap: 8px; font-size: 9px; letter-spacing: 1px; z-index: 1001;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
        .status-dot.online { background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }

        /* LOADING LAYER */
        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; margin-top: 20px; }
        .loader-progress { width: 0%; height: 100%; background: var(--neon-cyan); position: absolute; animation: loadAnim 2s infinite; }
        @keyframes loadAnim { 0% { width: 0%; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0%; left: 100%; } }

        /* UI ELEMENTS */
        .app-container { max-width: 400px; margin: 0 auto; padding: 20px; position: relative; }
        
        .theme-toggle {
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.6s;
        }

        .card { background: #111; padding: 25px; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; letter-spacing: 1px; }
        
        .input-field {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff;
            border-radius: 4px; outline: none; transition: 0.3s; font-family: monospace;
        }
        .input-field:focus { border-color: var(--gold); }

        .pass-wrapper { position: relative; }
        .toggle-pass { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            color: #555; font-size: 10px; font-weight: bold; cursor: pointer; 
        }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-family: monospace; letter-spacing: 1px;
        }
        .btn-primary { background: var(--gold); color: #000; }
        .btn-primary:disabled { background: #444; color: #888; }

        .extra-tools { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-size: 10px; color: #666; }
        .forgot-link { color: var(--neon-cyan); text-decoration: none; cursor: pointer; }

        /* MODAL */
        #customModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-box { width: 85%; max-width: 350px; padding: 30px; border: 1px solid var(--gold); background: #0a0a0a; text-align: center; }

        [data-theme="light"] { background-color: #f0f0f0; color: #000; }
        [data-theme="light"] .card { background: #fff; border-color: #ddd; }
        [data-theme="light"] .input-field { background: #eee; border-color: #ccc; color: #000; }
    </style>
</head>
<body>

<div class="network-status">
    <div id="netDot" class="status-dot"></div>
    <span id="netText">TERMINAL OFFLINE</span>
</div>

<div id="page-loader">
    <h2 style="letter-spacing: 5px; font-size: 14px; color: var(--gold);">AUTHENTICATING SYSTEM</h2>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="app-container">
    <div style="display:flex; justify-content: flex-end; padding:10px;">
        <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <svg id="sunIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffaa00" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </div>
    </div>

    <div style="text-align:center; margin-top: 20px;">
        <h1 style="font-size:32px; color: var(--gold); margin:0; letter-spacing:4px;">SOVEREIGN</h1>
        <p style="color:var(--neon-cyan); font-size:9px; letter-spacing:2px; margin-top:5px;">MISSION TERMINAL GATEWAY</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>NICKNAME / ACCESS ID</label>
            <input id="userInput" class="input-field" placeholder="Ketik ID Anda...">
        </div>

        <div class="input-group">
            <label>ACCESS PASSWORD</label>
            <div class="pass-wrapper">
                <input type="password" id="passInput" class="input-field" placeholder="******">
                <span class="toggle-pass" onclick="togglePass()">SHOW</span>
            </div>
        </div>

        <div class="extra-tools">
            <div style="display:flex; align-items:center; gap:5px;">
                <input type="checkbox" id="rememberMe"> <label for="rememberMe" style="margin:0;">INGAT SAYA</label>
            </div>
            <span class="forgot-link" onclick="forgotAccess()">LUPA PASSWORD?</span>
        </div>

        <div class="input-group" style="border: 1px solid rgba(255,170,0,0.2); padding:10px; border-radius:4px;">
            <label>VERIFIKASI MANUSIA: <span id="mathQ" style="color:var(--neon-cyan)"></span></label>
            <input type="number" id="mathA" class="input-field" placeholder="Hasil?">
        </div>

        <button class="btn btn-primary" onclick="prosesLogin()" id="btnLogin" style="margin-top:10px;">ENTER SYSTEM</button>

        <div style="text-align:center; margin-top:25px; font-size:11px;">
            <span style="color:#555;">BELUM TERDAFTAR?</span><br>
            <a href="register.html" style="color:var(--neon-cyan); text-decoration:none; font-weight:bold;">DAFTAR ADVENTURER</a>
        </div>
    </div>
</div>

<div id="customModal">
    <div class="modal-box">
        <h2 id="modalTitle" style="color: var(--gold); font-size: 16px; margin-top:0;">NOTICE</h2>
        <p id="modalMsg" style="font-size:12px; color:#ccc; line-height:1.6;"></p>
        <div id="modalExtra"></div> 
        <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
            <button class="btn btn-primary" style="padding:10px;" id="modalActionBtn" onclick="closeModal()">OK</button>
            <button class="btn btn-primary" style="padding:10px; background:#333; color:#fff;" id="modalCancelBtn" onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI & INIT ---
    if(typeof Clearchance !== 'undefined') {
        Clearchance.nuclearWipe();
    } else {
        sessionStorage.clear();
    }

    // Audio & Haptic Logic
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function hapticClick() { 
        if(navigator.vibrate) navigator.vibrate(20); 
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type="sine"; o.frequency.value=800; g.gain.value=0.05;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+0.05);
    }

    // Network Monitor
    function updateNet() {
        const dot = document.getElementById('netDot');
        const txt = document.getElementById('netText');
        if(navigator.onLine) {
            dot.className = "status-dot online"; txt.innerText = "TERMINAL ONLINE";
        } else {
            dot.className = "status-dot"; txt.innerText = "SYSTEM OFFLINE";
        }
    }
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);

    // Captcha Logic
    let n1, n2;
    function genCap() {
        n1 = Math.floor(Math.random()*10); n2 = Math.floor(Math.random()*10);
        document.getElementById('mathQ').innerText = n1 + " + " + n2;
    }

    function togglePass() {
        const p = document.getElementById('passInput');
        const t = document.querySelector('.toggle-pass');
        p.type = p.type === 'password' ? 'text' : 'password';
        t.innerText = p.type === 'password' ? 'SHOW' : 'HIDE';
    }

    function toggleTheme() {
        hapticClick();
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
    }

    // --- LOGIKA UTAMA SOVEREIGN ---

    async function prosesLogin() {
        hapticClick();
        const input = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const ans = document.getElementById('mathA').value;
        const btn = document.getElementById('btnLogin');
        const remember = document.getElementById('rememberMe').checked;

        if (!input || !pass) return showMsg("Harap isi semua bidang!");
        if (parseInt(ans) !== (n1+n2)) {
            genCap();
            return showMsg("Verifikasi Captcha Salah!");
        }

        btn.disabled = true;
        btn.innerText = "DECRYPTING...";

        const dbMaster = getTerminal('FB1_MASTER');

        try {
            // 1. Cek Tabel Adventurer
            let userFound = await findUserInTable(dbMaster, 'adventurer_index', input);
            if (userFound && userFound.password === pass) {
                handleSuccess(userFound, 'adventurer', "lobby_adventurer.html", remember);
                return;
            }

            // 2. Cek Tabel Requester
            userFound = await findUserInTable(dbMaster, 'requester_index', input);
            if (userFound && userFound.password === pass) {
                handleSuccess(userFound, 'requester', "lobby_requester.html", remember);
                return;
            }

            // 3. Cek Tabel Register Pending
            userFound = await findUserInTable(dbMaster, 'register_pending', input);
            if (userFound && userFound.password === pass) {
                handleSuccess(userFound, 'pending', "waiting_room.html", remember);
                return;
            }

            failLogin("Akses Ditolak: Kredensial tidak valid.");
        } catch (e) {
            console.error(e);
            failLogin("Kegagalan Transmisi Terminal.");
        }
    }

    async function findUserInTable(db, path, val) {
        // Cari ID/Key
        const snapById = await db.ref(`${path}/${val}`).once('value');
        if (snapById.exists()) return snapById.val();

        // Cari Nickname
        const snapByNick = await db.ref(path).orderByChild('nickname').equalTo(val).once('value');
        if (snapByNick.exists()) {
            const result = snapByNick.val();
            return result[Object.keys(result)[0]];
        }
        return null;
    }

    function handleSuccess(data, role, target, remember) {
        if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
        
        // Remember Me Logic
        if(remember) localStorage.setItem('saved_nick', data.nickname || data.nick);
        else localStorage.removeItem('saved_nick');

        const sessionData = {
            uid: data.uid || data.id_adventurer || data.id_requester || "USR-" + Date.now(),
            nick: data.nickname || data.nick,
            role: role,
            zone: data.area_tugas || data.zone || "KNG"
        };

        sessionStorage.setItem('user_identity', JSON.stringify(sessionData));
        
        // Loader Transition
        document.getElementById('page-loader').style.display = 'flex';
        document.getElementById('page-loader').style.opacity = '1';
        
        setTimeout(() => { window.location.href = target; }, 1000);
    }

    function failLogin(msg) {
        showMsg(msg);
        genCap();
        const btn = document.getElementById('btnLogin');
        btn.disabled = false;
        btn.innerText = "ENTER SYSTEM";
    }

    // Fitur Lupa Password dengan Security Question
    async function forgotAccess() {
        hapticClick();
        const input = document.getElementById('userInput').value.trim();
        if(!input) return showMsg("Masukkan Nickname/ID Anda terlebih dahulu.");

        const dbMaster = getTerminal('FB1_MASTER');
        showMsg("Mencari data identitas...");

        try {
            // Cari di adventurer saja untuk recovery (atau sesuaikan tabel lain)
            let user = await findUserInTable(dbMaster, 'adventurer_index', input);
            if(!user) user = await findUserInTable(dbMaster, 'requester_index', input);

            if(user && user.pertanyaan_lupa_password) {
                document.getElementById('modalTitle').innerText = "SECURITY CHALLENGE";
                document.getElementById('modalMsg').innerText = `PERTANYAAN: ${user.pertanyaan_lupa_password}`;
                
                const extra = document.getElementById('modalExtra');
                extra.innerHTML = `<input type="text" id="secAns" class="input-field" placeholder="Jawaban Anda..." style="text-align:center; margin-top:10px;">`;
                
                const actionBtn = document.getElementById('modalActionBtn');
                actionBtn.innerText = "VERIFIKASI";
                document.getElementById('modalCancelBtn').style.display = "block";

                actionBtn.onclick = () => {
                    const ans = document.getElementById('secAns').value;
                    if(ans && ans.toLowerCase() === user.jawaban_lupa_password.toLowerCase()) {
                        extra.innerHTML = "";
                        showMsg(`AKSES DIPULIHKAN. Password Anda: ${user.password}`);
                    } else {
                        alert("Jawaban Salah!");
                    }
                };
            } else {
                showMsg("ID tidak ditemukan atau tidak memiliki pertanyaan keamanan.");
            }
        } catch(e) { showMsg("Error: " + e.message); }
    }

    function showMsg(m) {
        document.getElementById('modalMsg').innerText = m;
        document.getElementById('customModal').style.display = 'flex';
    }

    function closeModal() {
        hapticClick();
        document.getElementById('customModal').style.display = 'none';
        document.getElementById('modalExtra').innerHTML = "";
        document.getElementById('modalCancelBtn').style.display = "none";
        document.getElementById('modalActionBtn').innerText = "OK";
        document.getElementById('modalActionBtn').onclick = closeModal;
    }

    window.onload = () => {
        updateNet();
        genCap();
        
        // Load Remembered ID
        const saved = localStorage.getItem('saved_nick');
        if(saved) {
            document.getElementById('userInput').value = saved;
            document.getElementById('rememberMe').checked = true;
        }

        setTimeout(() => {
            document.getElementById('page-loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('page-loader').style.display = 'none'; }, 500);
        }, 1200);
    };
</script>
</body>
</html>
