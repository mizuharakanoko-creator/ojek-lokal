<style>
    .pr-wrapper {
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Holographic Identity Frame Card */
    .pr-char-card {
        background: linear-gradient(135deg, rgba(0, 243, 255, 0.05), rgba(188, 19, 254, 0.05));
        border: 1px solid rgba(0, 243, 255, 0.2);
        border-radius: 12px;
        padding: 20px 15px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 0 25px rgba(0, 243, 255, 0.05);
    }
    
    .pr-char-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
        transform: translateX(-100%);
        animation: pr-holo-glare 3s infinite linear;
    }
    @keyframes pr-holo-glare {
        0% { transform: translateX(-100%); } 100% { transform: translateX(100%); }
    }

    /* Avatar Grid HUD */
    .pr-avatar-frame {
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 2px solid var(--neon-blue);
        padding: 4px;
        background: rgba(0,0,0,0.4);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        position: relative;
    }
    .pr-avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    
    .pr-lvl-tag {
        position: absolute; bottom: -5px; right: -5px;
        background: var(--neon-blue); color: #000;
        font-family: var(--font-mono); font-size: 10px; font-weight: 900;
        padding: 2px 6px; border-radius: 4px; border: 1px solid #000;
    }

    /* Quantum Experience Bar Component */
    .pr-exp-container {
        width: 100%; margin-top: 15px; display: flex; flex-direction: column; gap: 4px;
    }
    .pr-exp-labels {
        display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: #666;
    }
    .pr-exp-track {
        width: 100%; height: 6px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;
    }
    .pr-exp-bar {
        width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); box-shadow: 0 0 10px var(--neon-blue); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Parameter Grid Attributes */
    .pr-attr-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-top: 15px;
    }
    .pr-attr-node {
        background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.03); border-radius: 6px; padding: 10px 5px; text-align: center; display: flex; flex-direction: column; gap: 2px;
    }
    .pr-attr-val { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: #fff; }
    .pr-attr-lbl { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Achieved Badges & Emblem Deck */
    .pr-deck-box {
        background: var(--bg-panel); border: 1px solid var(--glass-border); border-radius: 8px; padding: 15px; backdrop-filter: blur(10px);
    }
    .pr-deck-title { font-family: var(--font-mono); font-size: 11px; color: var(--neon-purple); letter-spacing: 1px; font-weight: 700; margin-bottom: 12px; }
    
    .pr-badge-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pr-emblem {
        background: rgba(255,255,255,0.02); border: 1px solid #222; border-radius: 6px; padding: 6px 10px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #aaa; transition: 0.3s;
    }
    .pr-emblem.unlocked { border-color: var(--neon-yellow); color: #fff; background: rgba(255,204,0,0.03); box-shadow: 0 0 8px rgba(255,204,0,0.05); }
    .pr-emblem.unlocked i { color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }
</style>

<div class="pr-wrapper">

    <div class="pr-char-card">
        <div class="pr-avatar-frame">
            <img id="pr-core-avatar" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=150&q=80" class="pr-avatar-img" alt="Avatar">
            <div id="pr-core-lvl" class="pr-lvl-tag">LV 00</div>
        </div>

        <div id="pr-core-name" style="font-weight: 900; font-size: 18px; color: #fff; margin-top: 12px; letter-spacing: 0.5px;">--</div>
        <div id="pr-core-title" style="font-family: var(--font-mono); font-size: 11px; color: var(--neon-blue); letter-spacing: 1px; margin-top: 2px;">UNBOUND OPERATOR</div>

        <div class="pr-exp-container">
            <div class="pr-exp-labels">
                <span>EXPERIENCE MATRIX</span>
                <span id="pr-exp-text">0 / 0 EXP</span>
            </div>
            <div class="pr-exp-track">
                <div id="pr-exp-bar" class="pr-exp-bar"></div>
            </div>
        </div>

        <div class="pr-attr-grid">
            <div class="pr-attr-node">
                <span id="pr-attr-winrate" class="pr-attr-val">0%</span>
                <span class="pr-attr-lbl">Success Rate</span>
            </div>
            <div class="pr-attr-node">
                <span id="pr-attr-speed" class="pr-attr-val">0.0s</span>
                <span class="pr-attr-lbl">Avg Response</span>
            </div>
            <div class="pr-attr-node">
                <span id="pr-attr-integrity" class="pr-attr-val">100</span>
                <span class="pr-attr-lbl">Trust Score</span>
            </div>
        </div>
    </div>

    <div class="pr-deck-box">
        <div class="pr-deck-title"><i class="fa-solid fa-award"></i> GUILD ACHIEVED EMBLEMS</div>
        
        <div class="pr-badge-grid">
            <div class="pr-emblem unlocked">
                <i class="fa-solid fa-crown"></i> <span>FOUNDER</span>
            </div>
            <div class="pr-emblem unlocked" id="pr-badge-veteran">
                <i class="fa-solid fa-shield-halved"></i> <span>VETERAN</span>
            </div>
            <div class="pr-emblem" id="pr-badge-speedster">
                <i class="fa-solid fa-bolt"></i> <span>SPEEDSTER</span>
            </div>
            <div class="pr-emblem" id="pr-badge-millionaire">
                <i class="fa-solid fa-gem"></i> <span>ELITE EARNER</span>
            </div>
        </div>
    </div>

    <button class="btn-main" style="border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,51,102,0.02);" onclick="window.handleSecureDisconnectSession()">
        <i class="fa-solid fa-power-off"></i> TERMINATE SECURE SESSION
    </button>

</div>
