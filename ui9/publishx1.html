<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign - Publish Quest</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="router_lokal.js"></script>
    <script src="clearchance.js"></script>

    <style>
        :root {
            --primary: #ff0055;
            --primary-glow: rgba(255, 0, 85, 0.5);
            --secondary: #00f2ff;
            --bg-dark: #050505;
            --panel: #0f0f13;
            --border: rgba(255, 255, 255, 0.1);
            --emboss: inset 2px 2px 5px rgba(255,255,255,0.05), inset -2px -2px 5px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', monospace; 
            margin: 0; padding: 15px; 
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 480px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h2.title {
            color: var(--primary);
            text-align: center;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--primary-glow);
            margin: 10px 0 20px 0;
            text-transform: uppercase;
        }

        /* --- Tab System --- */
        .tab-container {
            display: flex; gap: 5px; background: #000; padding: 5px; border-radius: 12px; margin-bottom: 20px;
            box-shadow: var(--emboss);
        }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            font-size: 11px; font-weight: bold; border-radius: 8px; color: #666; transition: 0.3s;
        }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 0 15px var(--primary-glow); }

        /* --- Section Styling --- */
        .section-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--emboss);
        }
        .section-title {
            font-size: 11px; color: var(--secondary); font-weight: bold;
            text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
        }
        .section-title::before { content: ''; width: 3px; height: 12px; background: var(--secondary); display: inline-block; }

        /* --- GPS Display --- */
        .gps-status {
            background: #000; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px;
            font-family: monospace; font-size: 12px; margin-bottom: 10px;
            color: #00ff88; text-shadow: 0 0 5px rgba(0,255,136,0.3);
            display: flex; align-items: center; gap: 10px;
        }

        /* --- Inputs --- */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        select, input, textarea {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 14px; border-radius: 10px; outline: none; font-size: 14px;
            box-shadow: var(--emboss); transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--primary); }
        
        /* Hierarchy Hidden Logic */
        .hidden-select { display: none; margin-top: 10px; }

        /* --- AI & Voice Buttons --- */
        .ai-tools { display: flex; gap: 8px; margin-top: 10px; }
        .btn-tool {
            flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 11px; font-weight: bold;
            cursor: pointer; color: white; transition: 0.3s;
        }
        .btn-voice { background: #444; }
        .btn-ai { background: linear-gradient(90deg, #8a2be2, #4a00e0); }

        /* --- Action Button --- */
        .btn-publish {
            width: 100%; padding: 18px; background: var(--primary); color: white;
            border: none; border-radius: 15px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 20px var(--primary-glow); margin-top: 10px;
        }
        .btn-publish:disabled { background: #333; box-shadow: none; opacity: 0.5; }

        /* --- Toast & Overlay --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); padding: 12px 25px; border-radius: 50px;
            z-index: 1000; transition: 0.5s; font-size: 13px; font-weight: bold;
        }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <h2 class="title">[ Publish Quest ]</h2>

    <div class="tab-container">
        <div class="tab active" id="tabGps" onclick="switchMode('gps')">GPS OTOMATIS</div>
        <div class="tab" id="tabManual" onclick="switchMode('manual')">INPUT MANUAL</div>
    </div>

    <div class="section-box">
        <div class="section-title">A. Titik Jemput (Origin)</div>
        
        <div id="gpsDisplay" class="gps-status">
            <span>📡</span> <span id="gpsText">Inisialisasi Satelit...</span>
        </div>

        <div id="manualJemput" style="display: none;">
            <div class="form-group">
                <select id="selKecJemput" onchange="updateDesa('selKecJemput', 'selDesaJemput')">
                    <option value="">-- Pilih Kecamatan Jemput --</option>
                </select>
            </div>
            <div id="desaJemputWrapper" class="hidden-select">
                <select id="selDesaJemput">
                    <option value="">-- Pilih Desa Jemput --</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-top: 10px;">
            <input type="text" id="originDetail" placeholder="Nama Tempat / Patokan">
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">B. Tujuan Antar (Destination)</div>
        <div class="form-group">
            <select id="selKecAntar" onchange="updateDesa('selKecAntar', 'selDesaAntar')">
                <option value="">-- Pilih Kecamatan Tujuan --</option>
            </select>
        </div>
        <div id="desaAntarWrapper" class="hidden-select">
            <select id="selDesaAntar">
                <option value="">-- Pilih Desa Tujuan --</option>
            </select>
        </div>
        <div class="form-group" style="margin-top: 10px;">
            <input type="text" id="destDetail" placeholder="Blok M, Gang Jambu, dll">
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">C. Kompensasi & Catatan</div>
        <div class="form-group">
            <label>Reward (Emas / Rp):</label>
            <input type="number" id="reward" placeholder="Contoh: 15000">
        </div>
        <div class="form-group">
            <textarea id="note" rows="2" placeholder="Catatan tambahan untuk Adventurer..."></textarea>
            <div class="ai-tools">
                <button class="btn-tool btn-voice" onclick="startVoice()">🎤 Voice</button>
                <button class="btn-tool btn-ai" onclick="runAIPolish()">✨ AI Polish</button>
            </div>
        </div>
    </div>

    <button class="btn-publish" id="btnGo" onclick="publishAction()">Sebarkan Sinyal</button>
</div>

<script>
    // --- INITIALIZATION ---
    const user = Clearchance.enforceIdentity() || { uid: "GUEST-" + Date.now(), nick: "Guest", zone: "KNG" };
    let currentCoords = { lat: 0, lng: 0 };
    let modeJemput = 'gps';

    // --- UI UTILS ---
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // --- 1. HIERARCHY & DROPDOWN LOGIC ---
    function initKecamatan() {
        const selects = ['selKecJemput', 'selKecAntar'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if(el.options.length > 1) return; // Cegah duplikasi
            Object.keys(LOKASI_DB).forEach(kec => {
                let opt = document.createElement('option');
                opt.value = kec; opt.innerText = kec;
                el.appendChild(opt);
            });
        });
    }

    function updateDesa(idKec, idDesa) {
        const kec = document.getElementById(idKec).value;
        const desaSelect = document.getElementById(idDesa);
        const wrapper = idDesa === 'selDesaJemput' ? 
                        document.getElementById('desaJemputWrapper') : 
                        document.getElementById('desaAntarWrapper');

        desaSelect.innerHTML = '<option value="">-- Pilih Desa --</option>';
        
        if (kec && LOKASI_DB[kec]) {
            LOKASI_DB[kec].desa.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.name; opt.innerText = d.name;
                desaSelect.appendChild(opt);
            });
            // Tampilkan Dropdown Desa (Hierarchy Logic)
            wrapper.style.display = 'block';
            wrapper.style.animation = 'fadeIn 0.3s forwards';
        } else {
            wrapper.style.display = 'none';
        }
    }

    // --- 2. GPS & REVERSE GEOCODING ---
    function switchMode(mode) {
        if (mode === 'manual' && modeJemput === 'gps') {
            // Jika pindah ke manual, kita biarkan saja. Tapi jika reset total, gunakan confirm.
        }
        modeJemput = mode;
        document.getElementById('tabGps').classList.toggle('active', mode === 'gps');
        document.getElementById('tabManual').classList.toggle('active', mode === 'manual');
        document.getElementById('gpsDisplay').style.display = (mode === 'gps') ? 'flex' : 'none';
        document.getElementById('manualJemput').style.display = (mode === 'manual') ? 'block' : 'none';
        if(mode === 'gps') startGPS();
    }

    function startGPS() {
        const display = document.getElementById('gpsText');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentCoords.lat = pos.coords.latitude;
                currentCoords.lng = pos.coords.longitude;
                
                // Cari Desa Terdekat dari router_lokal.js
                const loc = cariDesaTerdekat(currentCoords.lat, currentCoords.lng);
                display.innerText = `${loc.name} (${currentCoords.lat.toFixed(5)})`;
                display.style.color = "#00ff88";
            }, err => {
                display.innerText = "⚠️ GPS Gagal. Gunakan Input Manual.";
                display.style.color = "#ff0055";
                showToast("Sinyal GPS Lemah");
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    }

    function cariDesaTerdekat(lat, lng) {
        let terdekat = { name: "Luar Jangkauan", kec: "KNG", dist: 999, diff: 1.0 };
        for (const kec in LOKASI_DB) {
            LOKASI_DB[kec].desa.forEach(d => {
                // Formula jarak sederhana
                const dist = Math.sqrt(Math.pow(lat - d.lat, 2) + Math.pow(lng - d.lng, 2));
                if (dist < terdekat.dist) {
                    terdekat = { name: d.name, kec: kec, dist: dist, diff: d.diff };
                }
            });
        }
        return terdekat;
    }

    // --- 3. VOICE & AI TOOLS ---
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return showToast("Browser tidak mendukung Voice");

        const rec = new SpeechRecognition();
        rec.lang = 'id-ID';
        showToast("🎤 Mendengarkan...");
        rec.onresult = (e) => {
            document.getElementById('note').value = e.results[0][0].transcript;
            showToast("Suara berhasil diproses");
        };
        rec.start();
    }

    function runAIPolish() {
        const noteEl = document.getElementById('note');
        let val = noteEl.value;
        if(!val) return showToast("Teks kosong!");
        
        showToast("✨ AI sedang bekerja...");
        setTimeout(() => {
            // Logic perbaikan teks manual (sebelum integrasi API AI nyata)
            let fixed = val.replace(/\bdpn\b/gi, "Depan")
                           .replace(/\bgk\b/gi, "Tidak")
                           .replace(/\bsbrng\b/gi, "Seberang")
                           .replace(/\bjln\b/gi, "Jalan")
                           .replace(/\bdkt\b/gi, "Dekat");
            
            if(fixed !== val) {
                if(confirm("Gunakan saran AI?\n\n" + fixed)) {
                    noteEl.value = fixed;
                }
            } else {
                showToast("Teks sudah optimal");
            }
        }, 800);
    }

    // --- 4. ACTION & FIREBASE SHARDING ---
    async function publishAction() {
        const btn = document.getElementById('btnGo');
        let jemputKec, jemputDesa, jemputLat, jemputLng, diff;

        // Validasi Origin
        if (modeJemput === 'gps') {
            if (currentCoords.lat === 0) return showToast("Menunggu GPS...");
            const loc = cariDesaTerdekat(currentCoords.lat, currentCoords.lng);
            jemputKec = loc.kec;
            jemputDesa = loc.name;
            jemputLat = currentCoords.lat;
            jemputLng = currentCoords.lng;
            diff = loc.diff;
        } else {
            jemputKec = document.getElementById('selKecJemput').value;
            jemputDesa = document.getElementById('selDesaJemput').value;
            if (!jemputDesa) return showToast("Lengkapi Lokasi Jemput!");
            
            // Ambil koordinat statis dari DB lokal
            const d = LOKASI_DB[jemputKec].desa.find(x => x.name === jemputDesa);
            jemputLat = d.lat; jemputLng = d.lng; diff = d.diff;
        }

        // Validasi Tujuan
        const antarKec = document.getElementById('selKecAntar').value;
        const antarDesa = document.getElementById('selDesaAntar').value;
        if (!antarDesa) return showToast("Pilih Tujuan Antar!");
        const dAntar = LOKASI_DB[antarKec].desa.find(x => x.name === antarDesa);

        // Validasi Reward
        const reward = document.getElementById('reward').value;
        if (!reward || reward < 5000) return showToast("Reward minimal Rp 5.000");

        // Proses Transmisi
        btn.disabled = true;
        btn.innerText = "TRANSMITTING...";

        const mid = "MS-" + Date.now();
        const shard = getShardDariKecamatan(jemputKec); // Dari terminal_router.js
        const db1 = getTerminal('FB1_MASTER');
        const db4 = getTerminal('FB4_BOARD');

        const boardData = {
            id_misi: mid,
            id_requester: user.uid,
            requester_nick: user.nick,
            reward: parseInt(reward),
            difficulty_rate: diff,
            zona: jemputKec,
            origin_name: document.getElementById('originDetail').value || "Titik Koordinat",
            origin_desa: jemputDesa,
            origin_coords: `${jemputLat},${jemputLng}`,
            dest_name: document.getElementById('destDetail').value || "Detail di Catatan",
            dest_desa: antarDesa,
            dest_coords: `${dAntar.lat},${dAntar.lng}`,
            catatan: document.getElementById('note').value,
            status: "open",
            created_at: Date.now()
        };

        try {
            // 1. Catat di Index Master (FB1)
            await db1.ref(`misi_index/${mid}`).set({ id_misi: mid, id_shard: shard, zona: jemputKec });
            
            // 2. Kirim ke Board Shard (FB4)
            await db4.ref(`mission-${shard}/${jemputDesa}/${mid}`).set(boardData);
            
            // 3. Simpan Session
            sessionStorage.setItem('active_mission_id', mid);
            sessionStorage.setItem('active_mission_shard', shard);
            sessionStorage.setItem('active_mission_desa', jemputDesa);

            showToast("SINYAL TERSEBAR!");
            setTimeout(() => { window.location.href = "lobby_requester.html"; }, 1500);
        } catch (e) {
            alert("Gagal Transmisi: " + e.message);
            btn.disabled = false;
            btn.innerText = "SEBARKAN SINYAL";
        }
    }

    // RESET FUNCTION (Fitur Baru)
    function triggerReset() {
        if(confirm("Reset semua pilihan lokasi?")) {
            document.getElementById('selKecJemput').value = "";
            document.getElementById('selKecAntar').value = "";
            updateDesa('selKecJemput', 'selDesaJemput');
            updateDesa('selKecAntar', 'selDesaAntar');
            showToast("Form Direset");
        }
    }

    // RUN INITIAL
    initKecamatan();
    startGPS();

</script>
</body>
</html>
