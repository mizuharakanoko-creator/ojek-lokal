<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Guild - Quest Publisher v2.1</title>
    <style>
        :root {
            --bg-dark: #020202;
            --panel-bg: #0d0d0d;
            --primary: #ff0055;
            --primary-glow: rgba(255, 0, 85, 0.6);
            --secondary: #00f2ff;
            --secondary-glow: rgba(0, 242, 255, 0.4);
            --success: #00ff88;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- Global Reset --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: var(--font-main); 
            margin: 0; 
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .quest-board {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* --- UI Components --- */
        .title-container { text-align: center; margin-bottom: 25px; }
        .main-title { font-size: 20px; font-weight: 900; letter-spacing: 3px; color: var(--primary); text-transform: uppercase; margin: 0; }
        .sub-title { font-size: 11px; color: var(--secondary); opacity: 0.8; }

        .step-page { display: none; animation: fadeInSlide 0.4s ease forwards; }
        .step-page.active { display: block; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Kategori Grid */
        .grid-kategori { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card-kat {
            background: #151515; border: 1px solid var(--border); border-radius: 16px;
            padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card-kat.unlocked { border-color: var(--primary); }
        .card-kat.locked { opacity: 0.4; filter: grayscale(1); }
        .card-kat .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .card-kat .label { font-size: 12px; font-weight: 800; text-transform: uppercase; }

        /* Radar Panel */
        .radar-panel {
            background: linear-gradient(145deg, #0a1a14, #050d0a);
            border: 2px solid var(--success); border-radius: 18px;
            padding: 25px; text-align: center; margin-bottom: 20px;
        }
        .radar-panel.disabled { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        .loc-desa { font-size: 22px; font-weight: 900; color: var(--success); margin: 5px 0; }
        .loc-kec { font-family: monospace; font-size: 11px; color: #88ccaa; }

        /* Manual & Nego Panel */
        .manual-panel { background: #111; border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: none; margin-bottom: 20px; }
        .manual-panel.active { display: block; }
        .tabs { display: flex; background: #000; padding: 5px; border-radius: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #555; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 7px; }
        .tab-btn.active { background: var(--secondary); color: #000; }

        /* Inputs */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--secondary); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select, textarea {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 10px; font-size: 14px; outline: none;
        }
        
        /* Hierarchy Visibility */
        .hidden-group { display: none; opacity: 0; transition: 0.3s; }
        .visible-group { display: block; opacity: 1; }

        /* Buttons */
        .btn-toggle-manual { width: 100%; padding: 12px; background: none; border: 1px solid var(--secondary); color: var(--secondary); border-radius: 10px; margin-bottom: 15px; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-reset { width: 100%; padding: 10px; background: #331111; color: #ff4444; border: 1px solid #ff4444; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: none; }
        
        /* Tool Buttons */
        .tool-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-voice { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-ai { flex: 1; background: linear-gradient(90deg, #8e2de2, #4a00e0); border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* Toast */
        .alert-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; z-index: 1000; transition: 0.5s;
        }
        .alert-toast.show { top: 30px; }
    </style>
</head>
<body>

<div id="toast" class="alert-toast">⚠️ Fitur Terkunci</div>

<div class="quest-board">
    <div class="title-container">
        <h2 class="main-title" id="displayHeader">Publish Quest</h2>
        <span class="sub-title">Sovereign Guild Terminal v2.1</span>
    </div>

    <div id="step1" class="step-page active">
        <p style="text-align:center; font-size:12px; color:#777; margin-bottom:20px;">Pilih kategori misi untuk memulai.</p>
        <div class="grid-kategori">
            <div class="card-kat unlocked" onclick="navStep(2, 'Motor Ride')">
                <span class="icon">🏍️</span><span class="label">Motor Ride</span>
            </div>
            <div class="card-kat locked" onclick="triggerLocked('Car Ride')">
                <span class="icon">🚗</span><span class="label">Car Ride</span>
            </div>
            <div class="card-kat locked" onclick="triggerLocked('Pick & Drop')">
                <span class="icon">📦</span><span class="label">Pick & Drop</span>
            </div>
            <div class="card-kat locked" onclick="triggerLocked('Titip Beli')">
                <span class="icon">🛍️</span><span class="label">Titip Beli</span>
            </div>
        </div>
    </div>

    <div id="step2" class="step-page">
        <div class="radar-panel" id="gpsRadar">
            <div class="loc-desa" id="resDesa">MENCARI SINYAL...</div>
            <div class="loc-kec" id="resKec">High Accuracy GPS Active</div>
        </div>

        <button class="btn-toggle-manual" id="btnToggle" onclick="toggleOriginMode()">Ubah Titik / Pesankan Orang Lain</button>

        <div class="manual-panel" id="manualPanel">
            <div class="tabs">
                <button class="tab-btn active" id="tab2" onclick="switchTab(2)">📍 PILIH DESA</button>
                <button class="tab-btn" id="tab3" onclick="switchTab(3)">✍️ KETIK BEBAS</button>
            </div>

            <div id="contentTab2">
                <div class="input-group">
                    <label>Pencarian Cepat</label>
                    <input type="text" id="smartSearch" placeholder="Ketik nama desa (Cijoho, dll)..." autocomplete="off">
                </div>
                
                <button class="btn-reset" id="btnReset2" onclick="triggerResetConfirm()">🔄 RESET PILIHAN LOKASI</button>

                <div class="input-group">
                    <label>Kecamatan</label>
                    <select id="manKec" onchange="handleKecChange()"></select>
                </div>

                <div class="input-group hidden-group" id="desaGroup">
                    <label>Desa / Kelurahan</label>
                    <select id="manDesa"></select>
                </div>

                <div class="input-group">
                    <label>Detail Patokan</label>
                    <input type="text" id="manDetail" placeholder="Contoh: Depan Toko Berkah">
                </div>
            </div>

            <div id="contentTab3" style="display:none">
                <div class="input-group">
                    <label>Alamat Lengkap & Nego</label>
                    <textarea id="negoText" rows="4" placeholder="Tulis alamat jemput atau permintaan khusus..."></textarea>
                </div>
                <div class="tool-row">
                    <button class="btn-voice" onclick="startVoice()">🎤 Suara</button>
                    <button class="btn-ai" onclick="polishWithAI()">✨ Rapihkan AI</button>
                </div>
            </div>
        </div>

        <button class="btn-main" onclick="validateStep2()">Lanjut ke Tujuan ➔</button>
    </div>
</div>

<script>
    // Lanjut ke Part 2 (JavaScript Logic)
    // ================= DATA LOKAL (DB KNG) =================
    // Data ini harus sinkron dengan router_lokal.js Anda
    const LOKASI_DB = {
        "Cigugur": {
            desa: [
                { name: "Kelurahan Cigugur", lat: -6.9754, lng: 108.4594, diff: 1.0 },
                { name: "Kelurahan Cigadung", lat: -6.9885, lng: 108.4612, diff: 1.0 },
                { name: "Desa Cisantana", lat: -6.9542, lng: 108.4254, diff: 1.4 },
                { name: "Babakan Cigadung", lat: -6.9912, lng: 108.4654, diff: 1.1 }
            ]
        },
        "Kuningan Kota": {
            desa: [
                { name: "Kuningan", lat: -6.9765, lng: 108.4841, diff: 1.0 },
                { name: "Purwawinangun", lat: -6.9721, lng: 108.4852, diff: 1.0 },
                { name: "Cijoho", lat: -6.9654, lng: 108.4832, diff: 1.0 },
                { name: "Cirendang", lat: -6.9542, lng: 108.4791, diff: 1.0 }
            ]
        }
        // Tambahkan kecamatan lain sesuai router_lokal.js
    };

    let selectedData = {
        category: '',
        mode: 'gps', 
        origin_kec: '',
        origin_desa: '',
        origin_detail: '',
        coords: { lat: 0, lng: 0 }
    };

    // ================= NAVIGATION & UI =================
    function navStep(num, title = null) {
        if(title) {
            selectedData.category = title;
            document.getElementById('displayHeader').innerText = "[" + title + "]";
            playSfx(600, 'sine', 0.2);
        }
        document.querySelectorAll('.step-page').forEach(p => p.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
        
        if(num === 2) startGPS();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ================= GPS LOGIC =================
    function startGPS() {
        if(!navigator.geolocation) return updateGPSUI("ERROR", "No GPS Support");
        
        showToast("📡 Mencari Satelit...");
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            selectedData.coords = { lat, lng };
            
            const found = reverseGeocode(lat, lng);
            updateGPSUI(found.name, "Kecamatan " + found.kec);
            
            selectedData.origin_desa = found.name;
            selectedData.origin_kec = found.kec;
            playSfx(800, 'sine', 0.1);
        }, err => {
            updateGPSUI("OFFLINE", "Gunakan Mode Manual");
            showToast("⚠️ GPS Gagal");
        }, { enableHighAccuracy: true });
    }

    function updateGPSUI(desa, kec) {
        document.getElementById('resDesa').innerText = desa;
        document.getElementById('resKec').innerText = kec;
    }

    function reverseGeocode(lat, lng) {
        let nearest = { name: "Luar Jangkauan", kec: "KNG", dist: 999 };
        for (const kec in LOKASI_DB) {
            LOKASI_DB[kec].desa.forEach(d => {
                const dist = Math.sqrt(Math.pow(lat - d.lat, 2) + Math.pow(lng - d.lng, 2));
                if(dist < nearest.dist) nearest = { name: d.name, kec: kec, dist: dist };
            });
        }
        return nearest;
    }

    // ================= MANUAL MODE & HIERARCHY =================
    function toggleOriginMode() {
        const panel = document.getElementById('manualPanel');
        const radar = document.getElementById('gpsRadar');
        const btn = document.getElementById('btnToggle');

        if(panel.classList.contains('active')) {
            panel.classList.remove('active');
            radar.classList.remove('disabled');
            btn.innerText = "Ubah Titik / Pesankan Orang Lain";
            selectedData.mode = 'gps';
        } else {
            panel.classList.add('active');
            radar.classList.add('disabled');
            btn.innerText = "Kembali ke GPS Otomatis";
            selectedData.mode = 'manual';
            initManualInputs();
        }
        playSfx(400, 'sine', 0.1);
    }

    function initManualInputs() {
        const selKec = document.getElementById('manKec');
        if(selKec.options.length > 0) return;
        
        selKec.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
        Object.keys(LOKASI_DB).forEach(k => {
            selKec.innerHTML += `<option value="${k}">${k}</option>`;
        });
    }

    // Fungsi Hierarchy: Desa hanya muncul setelah Kecamatan dipilih
    function handleKecChange() {
        const kec = document.getElementById('manKec').value;
        const desaGroup = document.getElementById('desaGroup');
        const selDesa = document.getElementById('manDesa');
        
        if(kec) {
            selDesa.innerHTML = '<option value="">-- Pilih Desa --</option>';
            LOKASI_DB[kec].desa.forEach(d => {
                selDesa.innerHTML += `<option value="${d.name}">${d.name}</option>`;
            });
            desaGroup.classList.add('visible-group');
            document.getElementById('btnReset2').style.display = 'block';
        } else {
            desaGroup.classList.remove('visible-group');
        }
    }

    function triggerResetConfirm() {
        if(confirm("Hapus semua pilihan lokasi manual?")) {
            document.getElementById('manKec').value = "";
            handleKecChange();
            document.getElementById('smartSearch').value = "";
            document.getElementById('btnReset2').style.display = 'none';
            showToast("Form Direset");
        }
    }

    // ================= VOICE & AI TOOLS =================
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return showToast("Browser tidak mendukung Voice");

        const rec = new SpeechRecognition();
        rec.lang = 'id-ID';
        showToast("🎤 Mendengarkan...");
        rec.onresult = (e) => {
            document.getElementById('negoText').value = e.results[0][0].transcript;
            showToast("Suara diterima");
        };
        rec.start();
    }

    function polishWithAI() {
        const area = document.getElementById('negoText');
        if(area.value.length < 5) return showToast("⚠️ Teks terlalu pendek");

        showToast("✨ Mengoptimasi...");
        setTimeout(() => {
            let p = area.value.replace(/\bdpn\b/gi, "Depan").replace(/\bgk\b/gi, "Tidak");
            if(confirm("Gunakan saran AI?\n\n" + p)) area.value = p;
        }, 800);
    }

    // ================= VALIDATION =================
    function validateStep2() {
        if(selectedData.mode === 'manual') {
            const d = document.getElementById('manDesa').value;
            if(!d) return showToast("⚠️ Pilih Desa!");
            selectedData.origin_desa = d;
            selectedData.origin_kec = document.getElementById('manKec').value;
        } else if(selectedData.mode === 'nego') {
            if(document.getElementById('negoText').value.length < 10) return showToast("⚠️ Detail Nego kurang!");
        }

        playSfx(1500, 'sine', 0.3);
        showToast("✅ Lokasi Terkunci");
        // Di sini Anda bisa melanjutkan ke Step 3 (Destination)
        console.log("Data Terkunci:", selectedData);
    }

    // ================= AUDIO ENGINE =================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d) {
        try {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        } catch(e) {}
    }

    function triggerLocked(name) {
        showToast("⚠️ " + name + " Segera Hadir");
        playSfx(150, 'sawtooth', 0.3);
    }

    function switchTab(n) {
        document.getElementById('tab2').classList.toggle('active', n===2);
        document.getElementById('tab3').classList.toggle('active', n===3);
        document.getElementById('contentTab2').style.display = n===2 ? 'block' : 'none';
        document.getElementById('contentTab3').style.display = n===3 ? 'block' : 'none';
        selectedData.mode = (n===2) ? 'manual' : 'nego';
    }
</script>
</body>
</html>
