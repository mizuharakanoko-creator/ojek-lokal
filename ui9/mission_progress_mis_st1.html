<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BATTLEFIELD HUB | PROGRESS MISI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#05060a">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>

    <style>
        /* === SOVEREIGN UI / CYBER-TACTICAL THEME === */
        :root {
            --bg-base: #05060a;
            --panel-bg: rgba(13, 16, 27, 0.8);
            --neon-blue: #00f3ff;
            --neon-red: #ff3366;
            --neon-green: #00ff88;
            --text-main: #e0e0e0;
            --text-muted: #68759e;
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: var(--font-ui);
            overflow-x: hidden;
        }

        /* --- ANIMATIONS --- */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.6); }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- MAIN LAYOUT --- */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* --- MAP CONTAINER --- */
        #map-container {
            flex: 1;
            position: relative;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.6s ease-out forwards;
            z-index: 1;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #0a0d14; /* Fallback before map loads */
        }
        /* Cyberpunk overlay effect for map */
        #map-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 243, 255, 0.05) 10%, transparent 10%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 400; /* Above Leaflet tiles */
        }

        /* --- DASHBOARD / INFO PANEL --- */
        .dashboard-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            margin-top: -20px;
            position: relative;
            z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            animation: slideUp 0.6s ease-out 0.2s forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Status Header */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        .status-title {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 900;
            color: var(--neon-blue);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-title i {
            animation: pulseGlow 2s infinite;
            border-radius: 50%;
        }

        /* Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .info-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .info-card:hover {
            border-color: var(--border-glow);
            background: rgba(0, 243, 255, 0.05);
        }
        .info-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }
        .info-value {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        /* --- EMERGENCY SLIDER SECTION --- */
        .emergency-zone {
            margin-top: 10px;
            padding: 15px;
            background: rgba(255, 51, 102, 0.05);
            border: 1px dashed rgba(255, 51, 102, 0.3);
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .emergency-zone.hide {
            display: none;
        }
        .em-timer-text {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--neon-red);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 50px;
            background: #111;
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 51, 102, 0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        
        /* Custom Input Range styling for elegance */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            position: absolute;
            top: 0; left: 0;
            z-index: 3;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px;
            width: 60px;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff3366, #cc0033);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.5);
            border: 2px solid #fff;
            position: relative;
            z-index: 4;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }
        
        .slider-text {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            z-index: 1;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* --- ACTION BUTTONS --- */
        .btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-refresh {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 11px;
            padding: 10px;
        }
        .btn-refresh:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="dashboard-panel">
        <div class="status-header">
            <div class="status-title">
                <i class="fa-solid fa-satellite-dish"></i> 
                SISTEM PELACAKAN AKTIF
            </div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <span class="info-label">Status Misi</span>
                <span class="info-value" id="statusMisiText" style="color: var(--neon-green);">ON-GOING</span>
            </div>
            <div class="info-card">
                <span class="info-label">Jarak Target</span>
                <span class="info-value" id="distanceText">Menghitung...</span>
            </div>
        </div>

        <div id="em-zone" class="emergency-zone hide">
            <div id="em-timer" class="em-timer-text">
                TOMBOL SELESAI DARURAT AKAN MUNCUL DALAM 10S... GUNAKAN INI APABILA PEMESAN AFK TANPA MENGKONFIRMASI SELESAI
            </div>
            
            <div id="slider-container-em" class="slider-wrapper" style="display: none;">
                <div class="slider-text">GESER UNTUK SELESAI PAKSA >></div>
                <input type="range" id="em-slider" min="0" max="100" value="0">
            </div>
        </div>

        <button class="btn-action btn-refresh" onclick="forceRefreshData()">
            <i class="fa-solid fa-rotate"></i> Refresh Koneksi Sinkronisasi
        </button>
    </div>

</div>

<script>
    // Inisialisasi dari cuplikan kode Anda
    const user = Clearchance.enforceIdentity();
    const contractId = sessionStorage.getItem('active_contract_id');
    const dbDeal = typeof getTerminal !== 'undefined' ? getTerminal('FB4_BOARD') : null;
    const dbMaster = typeof getTerminal !== 'undefined' ? getTerminal('FB1_MASTER') : null;

    // --- LOGIKA DARURAT (Sesuai Snippet Anda) ---
    function initEmergencyZone() {
        const emZone = document.getElementById('em-zone');
        const emTimer = document.getElementById('em-timer');
        const sliderCont = document.getElementById('slider-container-em');
        const emSlider = document.getElementById('em-slider');

        if (!emZone) return;
        emZone.classList.remove('hide'); 

        let countdown = 10; 
        
        let emInterval = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                emTimer.innerText = `TOMBOL SELESAI DARURAT AKAN MUNCUL DALAM ${countdown}S... GUNAKAN INI APABILA PEMESAN AFK TANPA MENGKONFIRMASI SELESAI`;
            } else {
                clearInterval(emInterval);
                emTimer.style.display = 'none';
                sliderCont.style.display = 'block';
                // updateAI("Protokol Selesai Paksa (AFK) telah diaktifkan.", "alert"); // Asumsi fungsi updateAI ada di file lain
            }
        }, 1000);

        emSlider.oninput = function() {
            if (this.value >= 98) {
                this.value = 100;
                executeEmergencyAction();
            }
        };
    }

    async function executeEmergencyAction() {
        if(typeof vibratePulse === 'function') vibratePulse();
        
        // Mock fungsi confirm jika sysConfirm belum di-load di snippet ini
        const yakin = confirm("AKTIFKAN SELESAI PAKSA?\n\nGunakan jika Requester tidak merespon/AFK. Anda akan diarahkan ke form laporan.");
        
        if (yakin) {
            const kodeMisiAsli = sessionStorage.getItem('eval_mission_code_id') || "";
            
            // PENGHANCURAN DATA DIMAJUKAN DI SINI UNTUK JALUR DARURAT (Pencegahan Bug Total)
            try {
                if(dbMaster && kodeMisiAsli) {
                    await dbMaster.ref(`index_misi/${kodeMisiAsli}`).remove();
                    await dbMaster.ref(`kode_misi/${kodeMisiAsli}`).remove();
                }
                if(typeof getTerminal !== 'undefined') {
                    await getTerminal('FB4_BOARD').ref(`kontrak_mission/${contractId}`).remove();
                }
            } catch(err) { console.warn("Pembersihan awal parsial:", err); }

            // Pemicu pelemparan halaman lewat status Firebase
            if(dbDeal) {
                await dbDeal.ref(`kontrak_detail/${contractId}`).update({ status: 'evaluating_emergency' });
            }
        } else { 
            document.getElementById('em-slider').value = 0; 
        }
    }

    function syncTracking() {
        if(navigator.geolocation && dbDeal) {
            navigator.geolocation.watchPosition(p => {
                dbDeal.ref(`kontrak_detail/${contractId}/tracking/${user.uid}`).set({ 
                    lat: p.coords.latitude, 
                    lng: p.coords.longitude, 
                    ts: Date.now() 
                });
            });
        }
    }

    function forceRefreshData() { 
        location.reload(); 
    }

    // Panggil Inisialisasi awal (Bisa disesuaikan jika di kode asli dipanggil di tempat lain)
    setTimeout(() => {
        initEmergencyZone();
        syncTracking();
    }, 2000);

</script>
</body>
</html>
