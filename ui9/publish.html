<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Publish Quest</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="router_lokal.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 15px; }
        .box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .gps-status { font-size: 11px; padding: 10px; margin-bottom: 10px; background: #222; border-left: 3px solid #ffaa00; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        .btn-publish { width: 100%; padding: 15px; background: #ff0055; color: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .manual-toggle { font-size: 11px; color: #00ffff; cursor: pointer; text-decoration: underline; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#ff0055; margin-top:0;">[ PUBLISH QUEST ]</h2>
    
    <div class="gps-status" id="gpsDisplay">Memulai GPS...</div>
    <span class="manual-toggle" onclick="toggleManual()">Gunakan Input Manual Lokasi</span>

    <div id="locationSection">
        <div class="form-group">
            <label>Pilih Kecamatan:</label>
            <select id="selKec" onchange="updateDesa()">
                <option value="">-- Pilih Kecamatan --</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pilih Desa Titik Jemput:</label>
            <select id="selDesa">
                <option value="">-- Pilih Desa --</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Detail Titik Jemput (Nama Tempat):</label>
        <input type="text" id="originName" placeholder="Contoh: Depan Toko A">
    </div>

    <div class="form-group">
        <label>Tujuan Antar:</label>
        <input type="text" id="destName" placeholder="Contoh: Alun-alun Kuningan">
    </div>

    <div class="form-group">
        <label>Reward (Rp):</label>
        <input type="number" id="reward" placeholder="15000">
    </div>

    <div class="form-group">
        <label>Catatan Tambahan:</label>
        <textarea id="note" rows="2" placeholder="Bawa uang pas, dll..."></textarea>
    </div>

    <button class="btn-publish" id="btnGo" onclick="publishAction()">SEBARKAN SINYAL</button>
</div>

<script>
    // 1. Inisialisasi User & GPS
    const user = Clearchance.enforceIdentity() || { uid: "str-" + Date.now(), nick: "Guest", zone: "KNG" };
    let currentCoords = { lat: 0, lng: 0 };

    // Isi Dropdown Kecamatan dari router_lokal.js
    const kecSelect = document.getElementById('selKec');
    Object.keys(LOKASI_DB).forEach(kec => {
        let opt = document.createElement('option');
        opt.value = kec;
        opt.innerText = kec;
        kecSelect.appendChild(opt);
    });

    function updateDesa() {
    const kec = document.getElementById('selKec').value;
    const desaSelect = document.getElementById('selDesa');
    desaSelect.innerHTML = '<option value="">-- Pilih Desa --</option>';
    
    if (LOKASI_DB[kec]) {
        // Karena format sekarang adalah LOKASI_DB[kec].desa
        LOKASI_DB[kec].desa.forEach(desaObj => {
            let opt = document.createElement('option');
            opt.value = desaObj.name; // Simpan namanya
            opt.innerText = desaObj.name;
            desaSelect.appendChild(opt);
        });
    }
}


    // Fungsi GPS Otomatis
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            currentCoords.lat = pos.coords.latitude;
            currentCoords.lng = pos.coords.longitude;
            document.getElementById('gpsDisplay').innerText = `GPS AKTIF: ${currentCoords.lat.toFixed(5)}, ${currentCoords.lng.toFixed(5)}`;
            document.getElementById('gpsDisplay').style.borderColor = "#00ff00";
        }, err => {
            document.getElementById('gpsDisplay').innerText = "GPS GAGAL: Gunakan Mode Manual";
        });
    }

    function toggleManual() {
        alert("Mode manual diaktifkan. Pastikan koordinat tetap aman.");
    }

    async function publishAction() {
    // 1. Ambil NILAI (Value) dari input, bukan elemennya saja
    const desaName = document.getElementById('selDesa').value; // Nama desa yg dipilih
    const kecName = document.getElementById('selKec').value;   // Nama kec yg dipilih
    const origin = document.getElementById('originName').value;
    const dest = document.getElementById('destName').value;
    const reward = document.getElementById('reward').value;
    const note = document.getElementById('note').value;
    const btn = document.getElementById('btnGo');

    // Validasi dasar
    if (!desaName || !reward || !dest) return alert("Lengkapi data!");

    btn.disabled = true;
    btn.innerText = "TRANSMITTING...";

    // 2. Tentukan ID Misi dan Shard ID (Gunakan fungsi dari router_lokal.js)
    const mid = "MS-" + Date.now();
    const shard = getShardDariKecamatan(kecName); // Contoh: "KNG", "CGR", dll
    
    // Ambil detail koordinat & difficulty dari database wilayah
    const detailDesa = getDetailDesa(kecName, desaName);
    const difficulty = detailDesa ? detailDesa.diff : 1.0;

    // 3. Hubungkan ke Terminal Firebase
    const db1 = getTerminal('FB1_MASTER');
    const db4 = getTerminal('FB4_BOARD');

    // Data Ringkas untuk Master Index (FB1)
    const indexData = {
        id_misi: mid,
        id_requester: user.uid,
        reward: parseInt(reward),
        zona: kecName,
        id_shard: shard // Agar sistem tahu misi ini ada di FB4 folder mana
    };

    // Data Detail untuk Board (FB4)
    const boardData = {
        id_misi: mid,
        id_requester: user.uid,
        reward: parseInt(reward),
        difficulty_rate: difficulty, // Skill level yang dibutuhkan
        zona: kecName,
        nama_titik_jemput: origin,
        desa_jemput: desaName,
        langleng_titik_jemput: `${currentCoords.lat},${currentCoords.lng}`,
        nama_titik_antar: dest,
        catatan: note,
        status: "open",
        created_at: Date.now()
    };

    try {
        // Simpan ke Master
        await db1.ref(`misi_index/${mid}`).set(indexData);
        
        // Simpan ke Shard spesifik (misal: mission-CGR/Desa Cisantana/MS-123)
        await db4.ref(`mission-${shard}/${desaName}/${mid}`).set(boardData);

        alert("Misi Berhasil Terbit!");
        window.location.href = "lobby_requester.html";
    } catch (e) {
        alert("Gagal: " + e.message);
        btn.disabled = false;
        btn.innerText = "PUBLISH";
    }
}

</script>
</body>
</html>
