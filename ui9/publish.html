<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Publish Quest</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="router_lokal.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 15px; }
        .box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        
        /* Tab Styling */
        .tab-container { display: flex; margin-bottom: 15px; border: 1px solid #333; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: #222; font-size: 12px; }
        .tab.active { background: #ff0055; color: white; font-weight: bold; }

        .gps-status { font-size: 11px; padding: 10px; margin-bottom: 10px; background: #000; border-left: 3px solid #00ff00; display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #ff0055; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; font-family: monospace; }
        
        .section-title { font-size: 12px; background: #222; padding: 5px 10px; margin-bottom: 10px; border-left: 3px solid #888; color: #ccc; }
        .btn-publish { width: 100%; padding: 15px; background: #ff0055; color: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#ff0055; margin:0 0 15px 0; text-align: center;">[ PUBLISH QUEST ]</h2>
    
    <label>Metode Titik Jemput:</label>
    <div class="tab-container">
        <div class="tab active" id="tabGps" onclick="switchMode('gps')">GPS OTOMATIS</div>
        <div class="tab" id="tabManual" onclick="switchMode('manual')">INPUT MANUAl</div>
    </div>

    <div class="section-title">A. TITIK JEMPUT (ORIGIN)</div>
    
    <div id="gpsDisplay" class="gps-status">Mencari Sinyal Satelit...</div>

    <div id="manualJemput" style="display: none;">
        <div class="form-group">
            <select id="selKecJemput" onchange="updateDesa('selKecJemput', 'selDesaJemput')">
                <option value="">-- Pilih Kecamatan Jemput --</option>
            </select>
        </div>
        <div class="form-group">
            <select id="selDesaJemput">
                <option value="">-- Pilih Desa Jemput --</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <input type="text" id="originDetail" placeholder="Nama Tempat/Patokan (Contoh: Depan Indomaret)">
    </div>

    <div class="section-title">B. TUJUAN ANTAR (DESTINATION)</div>
    <div class="form-group">
        <select id="selKecAntar" onchange="updateDesa('selKecAntar', 'selDesaAntar')">
            <option value="">-- Pilih Kecamatan Tujuan --</option>
        </select>
    </div>
    <div class="form-group">
        <select id="selDesaAntar">
            <option value="">-- Pilih Desa Tujuan --</option>
        </select>
    </div>
    <div class="form-group">
        <input type="text" id="destDetail" placeholder="Detail Tujuan (Contoh: Blok M, Gang Jambu)">
    </div>

    <div class="section-title">C. KOMPENSASI & CATATAN</div>
    <div class="form-group">
        <label>Reward (Rp):</label>
        <input type="number" id="reward" placeholder="15000">
    </div>

    <div class="form-group">
        <textarea id="note" rows="2" placeholder="Catatan tambahan (Contoh: Bawa helm dua, barang pecah belah)"></textarea>
    </div>

    <button class="btn-publish" id="btnGo" onclick="publishAction()">SEBARKAN SINYAL</button>
</div>

<script>
    const user = Clearchance.enforceIdentity() || { uid: "str-" + Date.now(), nick: "Guest", zone: "KNG" };
    let currentCoords = { lat: 0, lng: 0 };
    let modeJemput = 'gps'; // default

    // Inisialisasi Dropdown Kecamatan (Semua Select Kecamatan)
    function initKecamatan() {
        const selects = ['selKecJemput', 'selKecAntar'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            Object.keys(LOKASI_DB).forEach(kec => {
                let opt = document.createElement('option');
                opt.value = kec;
                opt.innerText = kec;
                el.appendChild(opt);
            });
        });
    }

    // Fungsi Update Desa dinamis berdasarkan ID Select
    function updateDesa(idKec, idDesa) {
        const kec = document.getElementById(idKec).value;
        const desaSelect = document.getElementById(idDesa);
        desaSelect.innerHTML = '<option value="">-- Pilih Desa --</option>';
        
        if (LOKASI_DB[kec]) {
            LOKASI_DB[kec].desa.forEach(desaObj => {
                let opt = document.createElement('option');
                opt.value = desaObj.name;
                opt.innerText = desaObj.name;
                desaSelect.appendChild(opt);
            });
        }
    }

    function switchMode(mode) {
        modeJemput = mode;
        document.getElementById('tabGps').classList.toggle('active', mode === 'gps');
        document.getElementById('tabManual').classList.toggle('active', mode === 'manual');
        
        document.getElementById('gpsDisplay').style.display = (mode === 'gps') ? 'block' : 'none';
        document.getElementById('manualJemput').style.display = (mode === 'manual') ? 'block' : 'none';
        
        if(mode === 'manual') {
            currentCoords = { lat: 0, lng: 0 }; // Reset GPS jika manual
        } else {
            startGPS();
        }
    }

    function startGPS() {
        if (navigator.geolocation) {
            document.getElementById('gpsDisplay').style.display = 'block';
            navigator.geolocation.getCurrentPosition(pos => {
                currentCoords.lat = pos.coords.latitude;
                currentCoords.lng = pos.coords.longitude;
                document.getElementById('gpsDisplay').innerText = `📡 GPS AKTIF: ${currentCoords.lat.toFixed(5)}, ${currentCoords.lng.toFixed(5)}`;
                document.getElementById('gpsDisplay').style.borderColor = "#00ff00";
            }, err => {
                document.getElementById('gpsDisplay').innerText = "⚠️ GPS GAGAL: Gunakan Mode Manual";
                document.getElementById('gpsDisplay').style.borderColor = "#ff0000";
            });
        }
    }

    async function publishAction() {
        const btn = document.getElementById('btnGo');
        
        // Data Jemput
        let jemputKec, jemputDesa, jemputLat, jemputLng;
        const originNote = document.getElementById('originDetail').value;

        if (modeJemput === 'gps') {
            if (currentCoords.lat === 0) return alert("Tunggu GPS mengunci lokasi!");
            // Gunakan fungsi router_lokal untuk deteksi kecamatan otomatis dari koordinat jika tersedia, 
            // atau paksa manual jika GPS kurang akurat. Di sini kita asumsikan manual untuk akurasi shard.
            jemputKec = user.zone; // Default ke zona user
            jemputDesa = "Titik GPS";
            jemputLat = currentCoords.lat;
            jemputLng = currentCoords.lng;
        } else {
            jemputKec = document.getElementById('selKecJemput').value;
            jemputDesa = document.getElementById('selDesaJemput').value;
            const detail = getDetailDesa(jemputKec, jemputDesa);
            if (!detail) return alert("Pilih lokasi jemput manual!");
            jemputLat = detail.lat;
            jemputLng = detail.lng;
        }

        // Data Antar
        const antarKec = document.getElementById('selKecAntar').value;
        const antarDesa = document.getElementById('selDesaAntar').value;
        const antarDetail = document.getElementById('destDetail').value;
        const detailAntar = getDetailDesa(antarKec, antarDesa);

        if (!detailAntar) return alert("Pilih desa tujuan antar!");

        const reward = document.getElementById('reward').value;
        if (!reward || reward < 5000) return alert("Reward minimal Rp 5.000");

        btn.disabled = true;
        btn.innerText = "TRANSMITTING...";

        const mid = "MS-" + Date.now();
        const shard = getShardDariKecamatan(jemputKec);
        
        const db1 = getTerminal('FB1_MASTER');
        const db4 = getTerminal('FB4_BOARD');

        const boardData = {
            id_misi: mid,
            id_requester: user.uid,
            reward: parseInt(reward),
            difficulty_rate: (getDetailDesa(jemputKec, jemputDesa)?.diff || 1.0),
            zona: jemputKec,
            // Koordinat Jemput
            origin_name: originNote,
            origin_desa: jemputDesa,
            origin_coords: `${jemputLat},${jemputLng}`,
            // Koordinat Antar
            dest_name: antarDetail,
            dest_desa: antarDesa,
            dest_coords: `${detailAntar.lat},${detailAntar.lng}`,
            catatan: document.getElementById('note').value,
            status: "open",
            created_at: Date.now()
        };

        try {
            await db1.ref(`misi_index/${mid}`).set({ id_misi: mid, id_shard: shard, zona: jemputKec });
            await db4.ref(`mission-${shard}/${jemputDesa}/${mid}`).set(boardData);
            alert("Sinyal Berhasil Disebarkan!");
            window.location.href = "lobby_requester.html";
        } catch (e) {
            alert("Gagal: " + e.message);
            btn.disabled = false;
        }
    }

    // Run
    initKecamatan();
    startGPS();
</script>
</body>
</html>
