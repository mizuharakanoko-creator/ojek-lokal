<style>
    .cm-layout {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 130px); /* Presisi memotong batas header dan nav footer global */
        background: rgba(5, 5, 8, 0.4);
    }

    /* Sub-header Intercom Status */
    .cm-intercom-status {
        background: rgba(15, 15, 25, 0.8);
        border-bottom: 1px solid var(--glass-border);
        padding: 10px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 11px;
    }
    .cm-indicator-secure {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--neon-green);
    }
    .cm-pulse-dot {
        width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%;
        box-shadow: 0 0 8px var(--neon-green);
        animation: cm-flash 1s infinite alternate;
    }
    @keyframes cm-flash { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    /* Feed Obrolan Matrix */
    .cm-chat-feed {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* Struktur Bubble Chat Modern */
    .cm-message-row {
        display: flex;
        flex-direction: column;
        max-width: 80%;
        animation: cm-fade-in 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes cm-fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .cm-message-row.incoming { align-self: flex-start; }
    .cm-message-row.outgoing { align-self: flex-end; }

    .cm-msg-sender {
        font-family: var(--font-mono);
        font-size: 9px;
        color: #777;
        margin-bottom: 3px;
        padding: 0 4px;
        text-transform: uppercase;
    }
    .cm-message-row.outgoing .cm-msg-sender { text-align: right; }

    .cm-bubble {
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.45;
        word-break: break-word;
    }
    .cm-message-row.incoming .cm-bubble {
        background: #151522;
        color: #e0e0e0;
        border-bottom-left-radius: 3px;
        border: 1px solid rgba(255, 255, 255, 0.03);
    }
    .cm-message-row.outgoing .cm-bubble {
        background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 243, 255, 0.05));
        color: #ffffff;
        border-bottom-right-radius: 3px;
        border: 1px solid rgba(0, 243, 255, 0.3);
        box-shadow: 0 4px 15px rgba(0, 243, 255, 0.05);
    }

    .cm-msg-meta {
        font-family: var(--font-mono);
        font-size: 8px;
        color: #555;
        margin-top: 4px;
        padding: 0 4px;
    }
    .cm-message-row.outgoing .cm-msg-meta { text-align: right; }

    /* Input Bar Komunikasi di Bagian Bawah */
    .cm-input-bar {
        background: #08080c;
        border-top: 1px solid var(--glass-border);
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .cm-btn-attachment {
        background: rgba(255,255,255,0.03);
        border: 1px solid #222; color: #aaa;
        width: 42px; height: 42px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; cursor: pointer; transition: 0.2s;
    }
    .cm-btn-attachment:active { background: rgba(255,255,255,0.1); color: #fff; }
    
    .cm-input-wrapper {
        flex: 1; position: relative;
    }
    .cm-text-input {
        width: 100%; background: #12121c;
        border: 1px solid #222; color: #fff;
        padding: 12px 14px; padding-right: 40px;
        border-radius: 10px; font-size: 13px;
        transition: border-color 0.3s;
    }
    .cm-text-input:focus { border-color: var(--neon-blue); }

    .cm-btn-send {
        background: var(--neon-blue); color: #000;
        border: none; width: 42px; height: 42px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; font-weight: bold; cursor: pointer;
        transition: 0.2s; box-shadow: 0 0 10px rgba(0,243,255,0.3);
    }
    .cm-btn-send:active { transform: scale(0.95); opacity: 0.8; }
</style>

<div class="cm-layout">
    
    <div class="cm-intercom-status">
        <div class="cm-indicator-secure">
            <div class="cm-pulse-dot"></div>
            <span>SECURE ENCRYPTED COMMS // LINK STEADY</span>
        </div>
        <div style="color: #555;" id="cm-channel-id">CH-MAIN</div>
    </div>

    <div id="cm-chat-container-feed" class="cm-chat-feed">
        
        <div class="cm-message-row incoming">
            <div class="cm-msg-sender">SYSTEM DISPATCH</div>
            <div class="cm-bubble">Selamat datang di enkripsi interkom satelit. Saluran aman diaktifkan secara otomatis.</div>
            <div class="cm-msg-meta">00:00 AM</div>
        </div>

    </div>

    <div class="cm-input-bar">
        <button class="cm-btn-attachment" onclick="window.handleCommsAttachmentTrigger()" title="Tactical Attachment">
            <i class="fa-solid fa-camera-retro"></i>
        </button>
        
        <div class="cm-input-wrapper">
            <input type="text" id="cm-input-message-text" class="cm-text-input" placeholder="Ketik pesan taktis..." autocomplete="off">
        </div>

        <button class="cm-btn-send" onclick="window.handleCommsSendMessageSubmit()" title="Transmit Message">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

</div>

<script>
    window.initCommsChat = function() {
        console.log("[SHARD] COMMS Chat Interface modules mapped successfully.");
        
        // Pemicu listener tombol "Enter" pada form input pesan agar otomatis mengirim tanpa klik kirim
        const chatInput = document.getElementById('cm-input-message-text');
        if(chatInput) {
            chatInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    if(window.handleCommsSendMessageSubmit) window.handleCommsSendMessageSubmit();
                }
            });
        }
    };
</script>
