<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Waiting Room</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .loader { border: 3px solid #222; border-top: 3px solid #ffaa00; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div>
    <div class="loader"></div>
    <h2 style="color: #ffaa00;">MENUNGGU VERIFIKASI</h2>
    <p id="msg" style="color: #888;">ID Anda sedang dalam peninjauan Admin...</p>
    <button onclick="Clearchance.nuclearWipe(); window.location.href='index.html'" style="margin-top:30px; background:none; border:1px solid #333; color:#555; padding:10px; cursor:pointer;">BATALKAN & KELUAR</button>
</div>

<script>
    const user = Clearchance.enforceIdentity();
    const masterDB = getTerminal('FB1_MASTER');

    // Real-time listener: Menunggu Admin klik "Verify"
    masterDB.ref(`users/${user.uid}/status`).on('value', snap => {
        const status = snap.val();
        if (status === 'active') {
            alert("Akun Terverifikasi! Memasuki Lobby...");
            
            // Update data session agar statusnya jadi active
            user.status = 'active';
            sessionStorage.setItem('pickme_user', JSON.stringify(user));
            
            window.location.href = "lobby_adventurer.html";
        }
    });
</script>
</body>
</html>
