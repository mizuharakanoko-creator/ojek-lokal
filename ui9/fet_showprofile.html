<style>
    .profile-page {
        padding: 25px;
        padding-bottom: 120px;
        min-height: 100vh;
        background: linear-gradient(180deg, rgba(0, 242, 255, 0.05) 0%, var(--dark-bg) 300px);
        animation: fadeIn 0.4s ease-out;
    }

    /* Header Profile */
    .p-header-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        margin-bottom: 30px;
        margin-top: 20px;
    }

    .p-avatar-large {
        width: 100px;
        height: 100px;
        border-radius: 20px;
        background: #0a0a0f;
        border: 2px solid var(--neon-blue);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: var(--neon-blue);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        margin-bottom: 15px;
    }

    #p-name {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.5px;
        color: #fff;
    }

    #p-location {
        font-size: 11px;
        color: var(--neon-blue);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 5px;
    }

    /* Rank Badge */
    .rank-badge-container {
        margin-top: 10px;
        background: rgba(255, 255, 255, 0.05);
        padding: 4px 15px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    #p-rank {
        font-weight: 900;
        color: var(--neon-purple);
        font-family: 'JetBrains Mono', monospace;
    }

    /* Stats Grid */
    .p-stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 25px;
    }

    .stat-box {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 15px;
    }

    .stat-label-small {
        font-size: 9px;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-bottom: 5px;
    }

    .stat-value-big {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
    }

    /* Trust Score Bar */
    .trust-section {
        background: rgba(0,0,0,0.2);
        padding: 20px;
        border-radius: 15px;
        border: 1px solid var(--border-glow);
        margin-bottom: 25px;
    }

    .trust-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .bar-bg {
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px;
        overflow: hidden;
    }

    #p-trust-bar {
        height: 100%;
        background: var(--neon-blue);
        box-shadow: 0 0 10px var(--neon-blue);
        width: 0%; /* Diisi oleh JS */
        transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Bio / Dossier Body */
    .dossier-info {
        background: rgba(255,255,255,0.02);
        padding: 20px;
        border-radius: 15px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-dim);
    }

    .dossier-label {
        font-family: 'JetBrains Mono', monospace;
        color: var(--neon-blue);
        font-size: 10px;
        margin-bottom: 10px;
        display: block;
        border-bottom: 1px solid rgba(0, 242, 255, 0.1);
        padding-bottom: 5px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="profile-page">
    <div class="p-header-section">
        <div class="p-avatar-large">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2 id="p-name">FETCHING IDENTITY...</h2>
        <div id="p-location">UNKNOWN COORDINATES</div>
        
        <div class="rank-badge-container">
            <span style="font-size: 9px; color: var(--text-dim);">GUILD RANK:</span>
            <span id="p-rank">--</span>
        </div>
    </div>

    <div class="p-stats-grid">
        <div class="stat-box">
            <div class="stat-label-small">Misi Selesai</div>
            <div class="stat-value-big" id="p-mission-count">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label-small">Bergabung</div>
            <div class="stat-value-big" id="p-joined" style="font-size: 13px;">---</div>
        </div>
    </div>

    <div class="trust-section">
        <div class="trust-header">
            <span class="stat-label-small" style="color: var(--neon-blue);">Tingkat Kepercayaan</span>
            <span id="p-trust-val" style="font-weight: 700; color: #fff;">0%</span>
        </div>
        <div class="bar-bg">
            <div id="p-trust-bar"></div>
        </div>
    </div>

    <div class="dossier-info">
        <span class="dossier-label">ARCHIVE_BIO_DATA</span>
        <p id="p-bio">Mengambil arsip dari database guild...</p>
    </div>

    <div style="margin-top: 30px; text-align: center; opacity: 0.3; font-family: 'JetBrains Mono'; font-size: 8px;">
        VERIFIED GUILD MEMBER SYSTEM ID: <span id="p-uid-display">---</span>
    </div>
</div>

<script>
    // Trigger inisialisasi modul Profil
    if (typeof window.initProfileModule === 'function') {
        window.initProfileModule();
    } else {
        console.warn("Dossier access in progress...");
    }
</script>
