<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 25px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #ffaa00; color: #000; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: #ffaa00;">TERMINAL AKSES</h2>
    <input type="text" id="uid" placeholder="ID ADVENTURER">
    <button id="btnLogin" onclick="prosesLogin()">MASUK SISTEM</button>
</div>

<script>
    Clearchance.nuclearWipe(); // Pastikan Gelas Kosong

    async function prosesLogin() {
        const id = document.getElementById('uid').value.trim().toLowerCase();
        const btn = document.getElementById('btnLogin');

        if (!id) return;
        btn.disabled = true;

        const masterDB = getTerminal('FB1_MASTER');

        try {
            const snap = await masterDB.ref(`users/${id}`).once('value');
            if (snap.exists()) {
                const user = snap.val();
                
                // Simpan identitas ke session
                sessionStorage.setItem('pickme_user', JSON.stringify(user));

                // LOGIKA FILTER STATUS
                if (user.status === 'pending') {
                    window.location.href = "waiting_room.html";
                } else if (user.status === 'active') {
                    window.location.href = "lobby_adventurer.html";
                } else {
                    alert("Akun Anda dinonaktifkan.");
                    btn.disabled = false;
                }
            } else {
                alert("ID tidak terdaftar!");
                btn.disabled = false;
            }
        } catch (e) {
            alert("Koneksi Master Gagal.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
