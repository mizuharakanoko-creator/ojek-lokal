<style>
    .maps-container {
        width: 100%;
        height: 100vh;
        position: relative;
        background: #0a0a0f;
    }

    /* Peta harus memenuhi layar */
    #map {
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    /* Overlay Overlay untuk nuansa Cyberpunk */
    .map-overlay-vignette {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        pointer-events: none;
        z-index: 2;
    }

    /* Floating Dashboard di atas Map */
    .map-stats-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .radar-card {
        background: rgba(10, 10, 15, 0.85);
        border: 1px solid var(--border-glow);
        backdrop-filter: blur(10px);
        padding: 12px 15px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .radar-ping {
        width: 10px;
        height: 10px;
        background: var(--neon-blue);
        border-radius: 50%;
        animation: pingAnimation 1.5s infinite;
    }

    @keyframes pingAnimation {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(3); opacity: 0; }
    }

    .radar-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--neon-blue);
        letter-spacing: 1px;
    }

    .radar-coord {
        font-size: 13px;
        font-weight: 700;
        color: #fff;
    }

    /* Tombol Fokus Lokasi */
    .map-controls {
        position: absolute;
        bottom: 120px;
        right: 20px;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .map-btn {
        width: 50px;
        height: 50px;
        background: rgba(10, 10, 15, 0.9);
        border: 1px solid var(--border-glow);
        border-radius: 12px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        backdrop-filter: blur(5px);
    }

    /* Kostumisasi Leaflet Dark Mode via CSS Filter */
    .leaflet-tile-container {
        filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    .leaflet-control-attribution { display: none !important; }
</style>

<div class="maps-container">
    <div id="map"></div>
    <div class="map-overlay-vignette"></div>

    <div class="map-stats-overlay">
        <div class="radar-card">
            <div class="radar-ping"></div>
            <div>
                <div class="radar-label">TARGET RADAR ACTIVE</div>
                <div class="radar-coord" id="radar-status-text">Mencari Sinyal Lokasi...</div>
            </div>
        </div>
    </div>

    <div class="map-controls">
        <div class="map-btn" onclick="focusTarget()" title="Fokus Target">
            <i class="fa-solid fa-crosshairs"></i>
        </div>
        <div class="map-btn" onclick="openExternalMaps()" title="G-Maps">
            <i class="fa-solid fa-location-arrow"></i>
        </div>
    </div>
</div>

<script>
    var tacticalMap;
    var targetMarker;
    var targetCoords = null;

    window.initMapsModule = function() {
        console.log("🗺️ Maps Module: Initializing Tactical Radar...");
        
        // Cek data dari Global State
        const state = window.SovereignState;
        const data = state.currentMissionData;
        
        if (data && data.mission && data.mission.full_mission_data) {
            const rawCoords = data.mission.full_mission_data.origin_coords;
            if (rawCoords && rawCoords !== "NEGO") {
                const parts = rawCoords.split(',');
                targetCoords = [parseFloat(parts[0]), parseFloat(parts[1])];
            }
        }

        // Jika map belum ada, buat baru
        if (!tacticalMap) {
            const initialView = targetCoords || [-6.2088, 106.8456]; // Default Jakarta
            tacticalMap = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView(initialView, 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(tacticalMap);
        }

        updateRadarUI();
    };

    function updateRadarUI() {
        if (!targetCoords) {
            document.getElementById('radar-status-text').innerText = "Lokasi: Nego / Tidak Terdeteksi";
            return;
        }

        document.getElementById('radar-status-text').innerText = "Sinyal Terkunci: " + targetCoords[0].toFixed(4) + ", " + targetCoords[1].toFixed(4);

        if (targetMarker) tacticalMap.removeLayer(targetMarker);

        // Icon Custom (Neon Blue)
        const neonIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div style="background-color: var(--neon-blue); width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px var(--neon-blue);"></div>`,
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });

        targetMarker = L.marker(targetCoords, {icon: neonIcon}).addTo(tacticalMap);
        tacticalMap.panTo(targetCoords);
    }

    function focusTarget() {
        if (targetCoords && tacticalMap) {
            tacticalMap.flyTo(targetCoords, 17);
            if(navigator.vibrate) navigator.vibrate(20);
        }
    }

    function openExternalMaps() {
        if (targetCoords) {
            window.open(`https://www.google.com/maps?q=${targetCoords[0]},${targetCoords[1]}`);
        }
    }

    // Jalankan init
    initMapsModule();
</script>
