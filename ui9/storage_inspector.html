<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Storage Inspector</title>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 20px; }
        h2 { color: #ffaa00; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .box { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 30px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; font-size: 13px; }
        th { background: #222; color: #00ffff; }
        tr:nth-child(even) { background: #151515; }
        .empty { color: #555; font-style: italic; }
        button { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; font-family: monospace; }
        button:hover { background: #ff0000; }
        .refresh-btn { background: #00ff00; color: black; padding: 10px 20px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>STORAGE INSPECTOR</h1>
    <button class="refresh-btn" onclick="renderAll()">🔄 REFRESH DATA</button>

    <div class="box">
        <h2>SESSION STORAGE</h2>
        <table id="sessionTable">
            <thead>
                <tr>
                    <th>Key</th>
                    <th>Value</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="box">
        <h2>LOCAL STORAGE</h2>
        <table id="localTable">
            <thead>
                <tr>
                    <th>Key</th>
                    <th>Value</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function renderStorage(storage, tableId) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = "";

            if (storage.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="empty">Tidak ada data tersimpan.</td></tr>`;
                return;
            }

            for (let i = 0; i < storage.length; i++) {
                const key = storage.key(i);
                const value = storage.getItem(key);
                
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td style="color: #00ffff">${key}</td>
                    <td style="word-break: break-all;">${value}</td>
                    <td><button onclick="deleteItem('${tableId}', '${key}')">HAPUS</button></td>
                `;
                tbody.appendChild(row);
            }
        }

        function deleteItem(type, key) {
            if (!confirm(`Hapus item "${key}"?`)) return;
            
            if (type === 'sessionTable') {
                sessionStorage.removeItem(key);
            } else {
                localStorage.removeItem(key);
            }
            renderAll();
        }

        function renderAll() {
            renderStorage(sessionStorage, "sessionTable");
            renderStorage(localStorage, "localTable");
        }

        // Jalankan saat load
        renderAll();
    </script>
</body>
</html>
