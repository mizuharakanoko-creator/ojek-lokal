<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN GUILD - ADVENTURER TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* ==========================================
           1. BASE & RANK THEME ENGINE
           ========================================== */
        :root {
            --bg-main: #050505;
            --bg-card: #0f0f0f;
            --text-main: #ffffff;
            --font-terminal: 'Courier New', Courier, monospace;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --theme-color: #888888; 
            --theme-bg-glow: rgba(136, 136, 136, 0.05);
        }

        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; outline: none; }
        
        body { 
            background-color: var(--bg-main); color: var(--text-main); 
            margin: 0; font-family: var(--font-sans); padding-bottom: 80px;
            transition: all 0.5s ease;
        }

        /* DYNAMIC RANK CLASSES */
        body.rank-trainer { --theme-color: #888888; --theme-bg-glow: rgba(136, 136, 136, 0.05); }
        body.rank-f { --theme-color: #a3a3a3; --theme-bg-glow: rgba(163, 163, 163, 0.05); }
        body.rank-e { --theme-color: #4ade80; --theme-bg-glow: rgba(74, 222, 128, 0.1); box-shadow: inset 0 0 15px var(--theme-bg-glow); }
        body.rank-d { --theme-color: #60a5fa; --theme-bg-glow: rgba(96, 165, 250, 0.1); box-shadow: inset 0 0 15px var(--theme-bg-glow); }
        body.rank-c { --theme-color: #a855f7; --theme-bg-glow: rgba(168, 85, 247, 0.15); box-shadow: inset 0 0 25px var(--theme-bg-glow); }
        body.rank-b { --theme-color: #facc15; --theme-bg-glow: rgba(250, 204, 21, 0.2); box-shadow: inset 0 0 35px var(--theme-bg-glow); }
        body.rank-a { --theme-color: #fb923c; --theme-bg-glow: rgba(251, 146, 60, 0.25); box-shadow: inset 0 0 45px var(--theme-bg-glow); text-shadow: 0 0 5px var(--theme-color); }
        body.rank-a-plus { --theme-color: #f87171; --theme-bg-glow: rgba(248, 113, 113, 0.3); animation: pulseRed 2s infinite; }
        body.rank-s { 
            --theme-color: #ff4500; 
            background: linear-gradient(45deg, #1a0500, #050505, #1a0500, #330d00); 
            background-size: 400% 400%; 
            animation: burnAnim 5s ease infinite; 
            box-shadow: inset 0 0 60px rgba(255, 69, 0, 0.3);
        }

        /* ==========================================
           2. HEADER & RPG STATUS
           ========================================== */
        header {
            background: var(--bg-card); padding: 15px;
            border-bottom: 2px solid var(--theme-color);
            position: sticky; top: 0; z-index: 100;
        }

        .user-info { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-terminal); font-size: 12px; }
        .user-nick { color: var(--text-main); font-weight: bold; font-size: 16px; letter-spacing: 1px;}
        .rank-badge { background: var(--theme-color); color: #000; padding: 2px 6px; border-radius: 3px; font-weight: 900; }

        .status-rpg-container {
            background: #000; padding: 5px 15px;
            display: flex; flex-direction: column; gap: 4px;
            border-bottom: 1px solid #222;
        }
        .rpg-row { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-terminal); font-size: 10px; }
        .bar-outer { flex: 1; height: 4px; background: #222; margin: 0 8px; border-radius: 2px; overflow: hidden; }
        .bar-inner { height: 100%; width: 0%; transition: width 0.5s ease; }
        
        #staminaBar { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
        #expBar { background: #60a5fa; box-shadow: 0 0 5px #60a5fa; }
        .stat-val { color: var(--theme-color); font-weight: bold; min-width: 35px; text-align: right; }

        /* ==========================================
           3. RADAR & FILTER SYSTEM
           ========================================== */
        .radar-container { padding: 15px; }
        .radar-box { 
            border: 1px solid var(--theme-color); background: var(--bg-card); 
            padding: 15px; border-radius: 8px; position: relative; overflow: hidden;
            box-shadow: 0 0 20px var(--theme-bg-glow); margin-bottom: 20px;
        }
        .radar-box::before { 
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: conic-gradient(from 0deg, transparent, var(--theme-bg-glow), transparent 30%); 
            animation: rotateRadar 4s linear infinite; pointer-events: none; 
        }

        #radarPulse { font-size: 11px; color: var(--theme-color); margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; animation: pulseText 2s infinite; font-family: var(--font-terminal); font-weight: bold; text-align: center;}

        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .btn-filter {
            background: #222; color: #888; border: 1px solid #444;
            padding: 8px 15px; border-radius: 4px; font-size: 11px; font-weight: bold;
            cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        .btn-filter.active { background: var(--theme-color); color: #000; border-color: var(--theme-color); }

        /* ==========================================
           4. MISSION CARDS
           ========================================== */
        .mission-card { 
            background: #111; border: 1px solid #333; padding: 16px; margin-bottom: 15px; 
            border-left: 4px solid var(--theme-color); border-radius: 6px;
            position: relative; z-index: 2; transition: all 0.3s ease; 
        }
        
        .m-title { color: #fff; font-weight: 900; font-size: 15px; letter-spacing: 0.5px; margin-bottom: 10px;}
        .m-reward { color: #00ff00; font-size: 18px; font-weight: 900; margin-top: 12px; font-family: var(--font-terminal); display: flex; justify-content: space-between; align-items: flex-end;}
        
        /* Box Rincian Belanja/Help */
        .special-detail-box {
            background: #0f0f0f; border: 1px solid #222; padding: 12px;
            margin: 10px 0; font-size: 13px; color: #bbb; line-height: 1.6; border-radius: 4px;
        }

        /* Bilah Info Tempat Tutup (Fitur Baru) */
        .closed-report-info {
            background: rgba(248, 113, 113, 0.1); border: 1px dashed #f87171;
            padding: 8px; margin: 10px 0; border-radius: 4px;
            font-size: 11px; color: #f87171; font-family: var(--font-terminal);
        }

        /* ==========================================
           5. MODALS & OVERLAYS
           ========================================== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-box { background: var(--bg-card); border: 2px solid var(--theme-color); padding: 25px; width: 90%; max-width: 400px; border-radius: 8px; }
        
        .btn-confirm { width: 100%; padding: 15px; background: var(--theme-color); color: #000; border: none; font-weight: 900; margin-top: 20px; border-radius: 6px; font-family: var(--font-terminal); cursor: pointer; }
        .btn-report-closed { width: 100%; padding: 10px; background: transparent; color: #f87171; border: 1px solid #f87171; margin-top: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* Animations */
        @keyframes rotateRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        /* Battery Saver Mode */
        body.saver-mode { background: #000 !important; }
        body.saver-mode * { text-shadow: none !important; box-shadow: none !important; animation: none !important; }
    </style>
</head>
<body>

<header>
    <div class="user-info">
        <div>
            ID: <span class="user-nick" id="dispNick">AWAITING...</span><br>
            <span style="color:#888; font-size:10px;">ZONE: <span id="dispZone" style="color:#fff;">-</span></span>
            <div style="margin-top: 5px;">
                <button id="btnSaver" class="btn-filter" style="padding: 3px 8px; font-size: 9px;">
                    BATTERY SAVER: OFF
                </button>
            </div>
        </div>
        <div style="text-align: right;">
            RANK<br>
            <span class="rank-badge" id="dispRank">-</span>
        </div>
    </div>
</header>

<div class="status-rpg-container">
    <div class="rpg-row">
        <span>LVL.<span id="dispLvl">1</span></span>
        <div class="bar-outer"><div id="expBar" class="bar-inner"></div></div>
        <span class="stat-val" id="dispExp">0/0</span>
    </div>
    <div class="rpg-row">
        <span>STM</span>
        <div class="bar-outer"><div id="staminaBar" class="bar-inner"></div></div>
        <span class="stat-val" id="dispStm">0/0</span>
    </div>
    <div class="rpg-row" style="margin-top: 2px; border-top: 1px solid #111; padding-top: 2px;">
        <span style="color:#666">LIMIT HARIAN</span>
        <span class="stat-val" id="dispLimit" style="font-size: 9px; color: #f87171;">CONTRACTS: 0/0</span>
    </div>
</div>

<div class="radar-container">
    <div class="radar-box">
        <div id="radarPulse">[ MEMINDAI AREA SEKITAR... ]</div>
        <button class="btn-confirm" id="btnExpand" style="margin-top: 0; padding: 10px; font-size: 11px; background: transparent; color: var(--theme-color); border: 1px solid var(--theme-color);">
            + PERLUAS RADAR KE SELURUH KABUPATEN
        </button>
    </div>

    <div class="filter-bar">
        <button class="btn-filter active" id="filterAll">ALL</button>
        <button class="btn-filter" id="filterReguler">REGULER</button>
        <button class="btn-filter" id="filterBelanja">BELANJA</button>
        <button class="btn-filter" id="filterHelp">HELP</button>
    </div>

    <div id="missionList">
        <div id="emptyState" style="text-align: center; color: #555; padding: 40px 20px; font-style: italic; font-size: 12px;">
            Menunggu sinyal GPS aktif...
        </div>
    </div>
</div>

<div id="sovBidModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle" style="color:var(--text-main); margin:0; font-family:var(--font-terminal); font-size: 16px;">DETAIL KONTRAK</h3>
        <div id="modalInfo" style="margin-top: 15px;">
            </div>

        <button id="btnReportClosed" class="btn-report-closed" style="display: none;">
            ⚠️ LAPORKAN TEMPAT TUTUP / BERMASALAH
        </button>

        <div style="background: #000; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #222;">
            <div style="font-size:10px; color:#666; text-align:center; margin-bottom:10px;">PENAWARAN ANDA (Rp)</div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <button class="btn-filter" style="width: 50px;">-5K</button>
                <input type="text" id="bidAmount" style="background: transparent; border: none; color: #fff; font-family: var(--font-terminal); font-size: 20px; text-align: center; width: 100px; font-weight: bold;" readonly value="0">
                <button class="btn-filter" style="width: 50px;">+5K</button>
            </div>
        </div>

        <button class="btn-confirm" id="btnSubmitBid">AMBIL & TERBITKAN SINYAL</button>
        <button id="btnCloseModal" style="width:100%; background:none; color:#666; border:none; margin-top:15px; cursor:pointer; font-size:12px;">KEMBALI KE RADAR</button>
    </div>
</div>

<div id="alertOverlay" class="modal-overlay" style="background: rgba(0,0,0,0.95);">
    <div class="modal-box" style="text-align: center;">
        <h3 style="color:var(--theme-color); margin-top:0;" id="alTitle">PEMBERITAHUAN</h3>
        <p style="color:#ccc; font-size:13px; line-height:1.5;" id="alMsg">-</p>
        <button id="btnAlertClose" class="btn-confirm">MENGERTI</button>
    </div>
</div>






    <script>
    // Audio Context (Sonar & Beeps)
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        play: function(type) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            
            if(type === 'sonar') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            } else if(type === 'click') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            } else if(type === 'alert') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            }
        }
    };

    // Global State App
    const App = {
        db1: null, db4: null, user: null,
        State: {
            loc: { lat: 0, lng: 0, desa: "", kec: "", shard: "" },
            areaTugas: "", rank: "Trainer",
            isExpanded: false, currentScanPath: null,
            currentFilter: 'All',
            renderedMissions: new Set(),
            closedReportsData: {}, // Menyimpan data report tempat tutup
            rpg: { lvl: 1, exp: 0, expNext: 100, stm: 100, stmMax: 100, limit: 0, limitMax: 5 }
        },
        BiddingData: { mid: "", basePrice: 0, currentPrice: 0 },

        init: async function() {
    try {
        // Cek Library Autentikasi
        if (typeof Clearchance === 'undefined') {
            throw new Error("Library Clearchance belum dimuat di HTML ini.");
        }
        
        this.user = Clearchance.enforceIdentity();
        this.db1 = getTerminal('FB1_MASTER'); 
        this.db4 = getTerminal('FB4_BOARD'); 

        // 1. CEK SUSPEND (Sesuai gambar database adventurer_judge)
        const judgeSnap = await this.db1.ref(`adventurer_judge/${this.user.uid}`).once('value');
        if (judgeSnap.exists() && judgeSnap.val().is_suspended === true) {
            document.body.innerHTML = `<div style="color:red; text-align:center; padding:50px;">ACCESS DENIED: ACCOUNT SUSPENDED</div>`;
            return;
        }

        // 2. AMBIL DATA USER & SYNC UI
        const userSnap = await this.db1.ref(`users/${this.user.uid}`).once('value');
        const data = userSnap.val() || {};
        
        this.State.areaTugas = data.area_tugas || this.user.zone || "KNG";
        this.State.rank = data.rank || "Trainer";
        
        // Sync RPG State dari Database
        this.State.rpg.lvl = data.level || 1;
        this.State.rpg.exp = data.exp || 0;
        this.State.rpg.stm = data.stamina || 100;
        this.State.rpg.limit = data.limit_harian || 0;

        // 3. UPDATE UI DASAR
        document.getElementById('dispNick').innerText = this.user.nick || "ADVENTURER";
        document.getElementById('dispZone').innerText = this.State.areaTugas;
        document.getElementById('dispRank').innerText = this.State.rank;

        this.UI.updateRPG();
        this.UI.applyRankTheme(this.State.rank);
        this.UI.loadSaverSettings();
        this.UI.bindEvents();
        
        // 4. JALANKAN SISTEM
        await this.Core.checkDailyLogin(); 
        this.Core.startGPS(); 
        this.Core.listenToContracts();
        this.Core.listenToClosedReports();

    } catch (e) {
        this.UI.showAlert("KONEKSI GAGAL", e.message);
    }
},


        UI: {
            bindEvents: function() {
                // Binding untuk Filter Bar
                const filters = {
                    'filterAll': 'All',
                    'filterReguler': 'Reguler',
                    'filterBelanja': 'Titip Beli',
                    'filterHelp': 'Help'
                };
                
                for (let id in filters) {
                    const btn = document.getElementById(id);
                    if(btn) {
                        btn.addEventListener('click', function() {
                            App.Core.setFilter(filters[id], this);
                        });
                    }
                }

                // Binding Tombol Lainnya
                const btnExpand = document.getElementById('btnExpand');
                if(btnExpand) btnExpand.addEventListener('click', () => App.UI.toggleRadar());

                const btnSaver = document.getElementById('btnSaver');
                if(btnSaver) btnSaver.addEventListener('click', () => App.UI.toggleSaver());

                const btnCloseModal = document.getElementById('btnCloseModal');
                if(btnCloseModal) btnCloseModal.addEventListener('click', () => App.UI.closeModal());

                const btnAlertClose = document.getElementById('btnAlertClose');
                if(btnAlertClose) btnAlertClose.addEventListener('click', () => {
                    document.getElementById('alertOverlay').style.display = 'none';
                });

                const btnReport = document.getElementById('btnReportClosed');
                if(btnReport) btnReport.addEventListener('click', () => App.Core.reportClosedShop());

                const btnSubmitBid = document.getElementById('btnSubmitBid');
                if(btnSubmitBid) btnSubmitBid.addEventListener('click', () => App.Bidding.submit());

const bidInput = document.getElementById('bidAmount');
document.querySelectorAll('.modal-box .btn-filter').forEach(btn => {
    btn.addEventListener('click', (e) => {
        let current = parseInt(bidInput.value.replace(/\./g, '')) || 0;
        if (e.target.innerText === '+5K') current += 5000;
        if (e.target.innerText === '-5K' && current > 5000) current -= 5000;
        
        App.BiddingData.currentPrice = current;
        bidInput.value = current.toLocaleString('id-ID');
        AudioEngine.play('click');
    });
});
                
            },

            updateRPG: function() {
                const r = App.State.rpg;
                document.getElementById('dispLvl').innerText = r.lvl;
                document.getElementById('dispExp').innerText = `${r.exp}/${r.expNext}`;
                document.getElementById('expBar').style.width = (r.exp / r.expNext * 100) + "%";
                document.getElementById('dispStm').innerText = `${r.stm}/${r.stmMax}`;
                document.getElementById('staminaBar').style.width = (r.stm / r.stmMax * 100) + "%";
                document.getElementById('dispLimit').innerText = `CONTRACTS: ${r.limit}/${r.limitMax}`;
            },

            applyRankTheme: function(rank) {
                const r = rank.toLowerCase().replace('+', '-plus');
                document.body.className = `rank-${r}`;
            },

            showAlert: function(title, msg) {
                AudioEngine.play('alert');
                if(navigator.vibrate) navigator.vibrate(200);
                document.getElementById('alTitle').innerText = title;
                document.getElementById('alMsg').innerHTML = msg; 
                document.getElementById('alertOverlay').style.display = 'flex';
            },

            showLoginModal: function(dayCount, rewardName) {
                AudioEngine.play('alert');
                const title = `DAILY LOGIN: DAY ${dayCount}`;
                const msg = `Sistem mendeteksi kehadiran Anda.<br><br>Reward diperoleh:<br><b style="color:var(--theme-color); font-size:18px;">[ ${rewardName} ]</b><br><br>Hadiah telah ditambahkan ke Inventory Anda.`;
                this.showAlert(title, msg);
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            },

            openModal: function(mid, basePrice, note, category, origin, dest) {
                App.BiddingData = { mid, basePrice, currentPrice: basePrice };
                const isSpecial = (category === 'Titip Beli' || category === 'Help' || dest.includes('[TITIK'));
                
                let formattedDest = dest;
                if(isSpecial && dest.includes('|')) {
                    formattedDest = dest.split('|').map(t => `<div style="padding: 6px 0; border-bottom: 1px solid #1a1a1a;">${t.trim()}</div>`).join('');
                }

                const infoDiv = document.getElementById('modalInfo');
                if(infoDiv) {
                    infoDiv.innerHTML = `
                        <div style="background: #333; color: #fff; padding: 2px 5px; border-radius: 3px; font-size: 9px; margin-bottom: 5px; display: inline-block;">${category.toUpperCase()}</div>
                        <div style="font-size: 14px; color: #fff; margin-bottom: 8px; text-align: left;">
                            <span style="font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block;">${isSpecial ? 'ALAMAT ANTAR / TUJUAN' : 'TUJUAN AKHIR'}</span>
                            ${isSpecial ? '📦 RINCIAN PERMINTAAN' : dest.toUpperCase()}
                        </div>
                        ${isSpecial ? `<div style="background: #000; border: 1px solid #333; padding: 12px; margin-bottom: 12px; font-size: 13px; color: #ccc; border-radius: 4px; max-height: 150px; overflow-y: auto;">${formattedDest}</div>` : ''}
                        <div style="background: #111; border-left: 3px solid #333; padding: 10px; font-size: 12px; color: #888; text-align: left; margin-bottom: 10px;">
                            <span style="font-size: 10px; color: #666; display: block;">DESKRIPSI / CATATAN</span>
                            ${note || "Tidak ada deskripsi tambahan untuk misi ini."}
                        </div>
                        <div style="font-size: 11px; color: #666; text-align: left; margin-bottom: 15px;">
                            <span style="font-size: 10px; display: block;">${isSpecial ? 'TITIK ORIGIN (BELANJA/HELP)' : 'TITIK JEMPUT (START)'}</span>
                            <b style="color:#eee; font-size:12px;">📍 ${origin}</b>
                        </div>
                    `;
                }

                // Tampilkan Tombol Lapor jika Belanja/Help
                const btnReport = document.getElementById('btnReportClosed');
                if(btnReport) {
                    btnReport.style.display = isSpecial ? 'block' : 'none';
                }

                document.getElementById('bidAmount').value = basePrice.toLocaleString('id-ID');
                document.getElementById('sovBidModal').style.display = 'flex';
            },

            closeModal: function() {
                document.getElementById('sovBidModal').style.display = 'none';
            },

            toggleRadar: function() {
                const btn = document.getElementById('btnExpand');
                const pulse = document.getElementById('radarPulse');
                
                AudioEngine.play('click');
                App.State.isExpanded = !App.State.isExpanded;
                
                if(App.State.isExpanded) {
                    btn.innerText = "- KEMBALI KE RADAR LOKAL (DESA)";
                    btn.style.color = "#888"; btn.style.borderColor = "#555";
                    pulse.innerText = "[ DEEP SCANNING: SELURUH SHARD/KABUPATEN ]";
                } else {
                    btn.innerText = "+ PERLUAS RADAR KE SELURUH KABUPATEN";
                    btn.style.color = "var(--theme-color)"; btn.style.borderColor = "var(--theme-color)";
                    pulse.innerText = "[ MEMINDAI AREA SEKITAR... ]";
                }
                
                document.getElementById('missionList').innerHTML = `<div id="emptyState">Menyesuaikan frekuensi satelit...</div>`;
                App.Core.startRadar();
            },

            toggleSaver: function() {
                const isActive = document.body.classList.toggle('saver-mode');
                const btn = document.getElementById('btnSaver');
                if (btn) {
                    btn.innerText = isActive ? "BATTERY SAVER: ON" : "BATTERY SAVER: OFF";
                    btn.style.color = isActive ? "#4ade80" : "#888";
                    btn.style.borderColor = isActive ? "#4ade80" : "#444";
                }
                localStorage.setItem('sov_saver_mode', isActive);
                AudioEngine.play('click');
            },

            loadSaverSettings: function() {
                const saved = localStorage.getItem('sov_saver_mode');
                if (saved === 'true') {
                    document.body.classList.add('saver-mode');
                    const btn = document.getElementById('btnSaver');
                    if(btn) {
                        btn.innerText = "BATTERY SAVER: ON";
                        btn.style.color = "#4ade80"; btn.style.borderColor = "#4ade80";
                    }
                }
            }
        },

        Bidding: {
            submit: async function() {
                const { mid, currentPrice } = App.BiddingData;
                const r = App.State.rpg;

                if (r.stm < 10) {
                    App.UI.showAlert("LELAH", "Stamina tidak cukup (Butuh 10 STM).");
                    return;
                }
                if (r.limit >= r.limitMax) {
                    App.UI.showAlert("LIMIT HABIS", `Jatah harian (${r.limitMax}) sudah tercapai.`);
                    return;
                }

                let tipeKontrak = "Kontrak Emas";
                if (currentPrice <= 10000) tipeKontrak = "Kontrak Lusuh";
                else if (currentPrice <= 30000) tipeKontrak = "Kontrak Normal";
                else if (currentPrice <= 60000) tipeKontrak = "Kontrak Medium";
                else if (currentPrice <= 100000) tipeKontrak = "Kontrak Premium";

                const btn = document.getElementById('btnSubmitBid');
                if(btn) { btn.innerText = "TRANSMISI..."; btn.disabled = true; }

                try {
                    await App.db4.ref(`bids/${mid}/${App.user.uid}`).set({
                        adventurer_id: App.user.uid,
                        adventurer_nick: App.user.nick || "Adventurer",
                        rank: App.State.rank,
                        offer_price: currentPrice,
                        contract_item: tipeKontrak,
                        timestamp: Date.now()
                    });

                    const newStm = r.stm - 10;
                    const newLimit = r.limit + 1;
                    await App.db1.ref(`users/${App.user.uid}`).update({ stamina: newStm, limit_harian: newLimit });

                    App.State.rpg.stm = newStm;
                    App.State.rpg.limit = newLimit;
                    App.UI.updateRPG();
                    App.State.renderedMissions.add(mid + "_applied");

                    App.UI.closeModal();
                    App.UI.showAlert("BERHASIL", `Sinyal terbit dengan tipe [${tipeKontrak.toUpperCase()}]. Stamina berkurang 10.`);
                    App.Core.startRadar(); 

                } catch (e) {
                    App.UI.showAlert("ERROR", "Gagal transmisi: " + e.message);
                } finally {
                    if(btn) { btn.innerText = "AMBIL & TERBITKAN SINYAL"; btn.disabled = false; }
                }
            }
        },

        Core: {
            startGPS: function() {
                const pulseText = document.getElementById('radarPulse');
                if (pulseText) pulseText.innerText = "[ MENGUNCI KOORDINAT GPS... ]";

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        
                        let hasil = { name: "Unknown", kec: "Unknown" };
                        if(typeof App.Core.cariDesaTerdekat === "function") {
                            hasil = App.Core.cariDesaTerdekat(lat, lng); 
                        }
                        
                        App.State.loc = { lat: lat, lng: lng, desa: hasil.name, kec: hasil.kec, shard: typeof getShardDariKecamatan === "function" ? getShardDariKecamatan(hasil.kec) : "" };

                        // Validasi Area Tugas
                        const kecGPS = (hasil.kec || "").trim().toUpperCase();
                        let namaKecTugas = App.State.areaTugas;
                        if(typeof ZONA_MAP !== 'undefined') namaKecTugas = (ZONA_MAP[App.State.areaTugas] || "").trim().toUpperCase();

                        if (namaKecTugas !== "" && kecGPS !== namaKecTugas && kecGPS !== "UNKNOWN") {
                            setTimeout(() => {
                                App.UI.showAlert("OUT OF SECTOR", `Sistem mendeteksi Anda di <b>${kecGPS}</b>.<br>Radar dikunci pada wilayah tugas: <b>${namaKecTugas}</b>.`);
                            }, 800);
                        }

                        App.Core.startRadar(); 
                    }, (err) => {
                        console.error("GPS Error:", err);
                        App.UI.showAlert("GPS ERROR", "Gagal mengunci lokasi. Menggunakan mode darurat.");
                        App.Core.startRadar();
                    }, { enableHighAccuracy: true, timeout: 10000 });
                } else {
                    App.UI.showAlert("SENSOR ERROR", "Browser tidak mendukung GPS.");
                }
            },

            cariDesaTerdekat: function(userLat, userLng) {
                let terdekat = { name: "Unknown", kec: "Unknown", dist: Infinity };
                if(typeof LOKASI_DB !== 'undefined') {
                    for (const [kecName, data] of Object.entries(LOKASI_DB)) {
                        data.desa.forEach(desa => {
                            const d = this.calcDist(userLat, userLng, desa.lat, desa.lng);
                            if (d < terdekat.dist) terdekat = { name: desa.name, kec: kecName, dist: d };
                        });
                    }
                }
                return terdekat;
            },

            calcDist: function(lat1, lon1, lat2, lon2) {
                if(!lat1 || !lat2) return 0;
                const R = 6371; 
                const dLat = (lat2-lat1)*Math.PI/180; 
                const dLon = (lon2-lon1)*Math.PI/180;
                const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },

            setFilter: function(cat, btnElement) {
                App.State.currentFilter = cat;
                document.querySelectorAll('.filter-bar .btn-filter').forEach(b => b.classList.remove('active'));
                if(btnElement) btnElement.classList.add('active');
                
                AudioEngine.play('click');
                this.startRadar();
            },

            listenToClosedReports: function() {
                // Mendengarkan laporan toko tutup secara global
                App.db4.ref('closed_shop_reports').on('value', snap => {
                    App.State.closedReportsData = snap.val() || {};
                    // Me-render ulang jika ada perubahan status laporan
                    if(document.getElementById('missionList').innerHTML.includes('mission-card')) {
                        App.Core.startRadar();
                    }
                });
            },

            reportClosedShop: async function() {
                const mid = App.BiddingData.mid;
                if(!mid) return;
                
                try {
                    await App.db4.ref(`closed_shop_reports/${mid}/${App.user.uid}`).set({
                        adventurer_nick: App.user.nick || "Adventurer",
                        timestamp: Date.now(),
                        status_info: "TUTUP/BERMASALAH"
                    });
                    App.UI.closeModal();
                    App.UI.showAlert("LAPORAN TERKIRIM", "Info tempat tutup telah diteruskan ke Guild. Notifikasi akan muncul di Terminal.");
                } catch(e) {
                    App.UI.showAlert("ERROR", "Gagal mengirim laporan.");
                }
            },

            startRadar: function() {
                const s = App.State;
                let targetShard = s.areaTugas;
                if(typeof ZONA_MAP !== 'undefined' && typeof getShardDariKecamatan === 'function') {
                    targetShard = getShardDariKecamatan(ZONA_MAP[s.areaTugas] || s.areaTugas);
                }
                
                const scanPath = s.isExpanded ? `mission-${targetShard}` : `mission-${targetShard}/${s.loc.desa}`;
                
                if (s.currentScanPath) App.db4.ref(s.currentScanPath).off();
                s.currentScanPath = scanPath;

                App.db4.ref(scanPath).once('value', snap => {
                    const listDiv = document.getElementById('missionList');
                    if(!listDiv) return;
                    listDiv.innerHTML = "";
                    
                    if (!snap.exists()) {
                        listDiv.innerHTML = `<div id="emptyState" style="text-align: center; color: #555; padding: 40px 20px; font-style: italic; font-size: 12px;">[ NO SIGNAL ]<br>Tidak ada misi aktif di sektor ini.</div>`;
                        return;
                    }

                    let allMissions = [];
                    const nowMs = Date.now();
                    const ONE_HOUR = 60 * 60 * 1000;
                    const TWELVE_HOURS = 12 * 60 * 60 * 1000;

                    const collect = (m) => {
                        if (m && m.status === 'open') {
                            // 1. FILTER WAKTU KEDALUWARSA
                            let age = nowMs - (m.timestamp || nowMs); 
                            let maxAge = (m.category === 'Help') ? TWELVE_HOURS : ONE_HOUR;
                            
                            if (age <= maxAge) {
                                // 2. FILTER EKSKLUSIF KATEGORI
                                if (s.currentFilter === 'All' || m.category === s.currentFilter) {
                                    allMissions.push(m);
                                }
                            }
                        }
                    };

                    if (s.isExpanded) {
                        snap.forEach(desaSnap => { desaSnap.forEach(misiSnap => collect(misiSnap.val())); });
                    } else {
                        snap.forEach(misiSnap => collect(misiSnap.val()));
                    }

                    if(allMissions.length === 0) {
                        listDiv.innerHTML = `<div id="emptyState" style="text-align: center; color: #555; padding: 40px 20px; font-style: italic; font-size: 12px;">Sinyal terdeteksi, tetapi tidak ada misi yang sesuai kriteria/waktu.</div>`;
                    } else {
                        AudioEngine.play('sonar');
                        
                        // 3. ACAK (SHUFFLE) UNTUK KEADILAN DISTRIBUSI
                        allMissions.sort(() => 0.5 - Math.random());
                        
                        // 4. BATASI HANYA 10 MISI
                        allMissions = allMissions.slice(0, 10);
                        
                        allMissions.forEach(m => this.renderMisi(m, listDiv));
                    }
                });
            },

            renderMisi: function(m, container) {
                let mLat = m.lat, mLng = m.lng;
                const jarak = this.calcDist(App.State.loc.lat, App.State.loc.lng, mLat, mLng);
                const jarakTeks = jarak > 0 ? `± ${jarak.toFixed(1)} KM` : `JARAK UNKNOWN`;
                
                let diffColor = "#4ade80";
                if (m.difficulty_rate > 1.5) diffColor = "#facc15";
                if (m.difficulty_rate > 2.0) diffColor = "#f87171";

                const isApplied = App.State.renderedMissions.has(m.id_misi + "_applied");
                const isSpecial = (m.category === 'Titip Beli' || m.category === 'Help');
                
                // Cek apakah ada laporan tempat tutup untuk ID misi ini
                const reports = App.State.closedReportsData[m.id_misi];
                let reportHtml = "";
                if (reports) {
                    const reporterNames = Object.values(reports).map(r => r.adventurer_nick).join(', ');
                    reportHtml = `<div class="closed-report-info">⚠️ INFO: Dilaporkan TUTUP/BERMASALAH oleh: ${reporterNames}</div>`;
                }
                
                // Format NEGO jika reward 0
                const rewardDisplay = (m.reward === 0 || !m.reward) ? 
                    '<span style="color:#facc15; font-weight:bold;">NEGO</span>' : 
                    `Rp ${m.reward.toLocaleString('id-ID')}`;

                const div = document.createElement('div');
                div.className = `mission-card ${isApplied ? 'applied-locked' : ''}`;
                if(isApplied) { div.style.filter = "grayscale(0.8)"; div.style.opacity = "0.7"; div.style.pointerEvents = "none"; div.style.borderLeft = "4px solid #333"; }

                let formattedDest = m.dest_name || "";
                if(isSpecial && formattedDest.includes('|')) {
                    formattedDest = formattedDest.split('|').map(t => `<div style="padding: 5px 0; border-bottom: 1px solid #1a1a1a;">${t.trim()}</div>`).join('');
                }

                const safeDest = (m.dest_name || "").replace(/'/g, "&apos;").replace(/"/g, "&quot;").replace(/\n/g, " ");
                const safeNote = (m.note || "").replace(/'/g, "&apos;").replace(/"/g, "&quot;").replace(/\n/g, " ");

                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: #777; font-family: var(--font-terminal); align-items: center; margin-bottom: 8px;">
                        <span>ID: ${m.id_misi.slice(-6).toUpperCase()}</span>
                        ${isApplied ? 
                            '<span style="color:#facc15; font-weight:bold;">[ SINYAL AKTIF ]</span>' : 
                            `<span style="background:${diffColor}; padding: 3px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; color: #000;">DIFF: ${m.difficulty_rate || 1}x</span>`
                        }
                    </div>
                    <div class="m-title">${isSpecial ? '📦 RINCIAN PERMINTAAN' : 'KE: ' + (m.dest_desa || 'TUJUAN').toUpperCase()}</div>
                    
                    ${isSpecial ? `<div class="special-detail-box">${formattedDest || 'Tidak ada rincian data.'}</div>` : `
                        <div style="background: #000; padding: 10px; border-radius: 4px; font-size: 12px; color: #aaa; border: 1px dashed #222;">
                            <div style="color:#fff; margin-bottom:2px;">📍 ${m.origin_name}</div>
                            <div style="font-size:10px; color:#666;">Tujuan: ${m.dest_desa}</div>
                        </div>
                    `}
                    
                    ${reportHtml}

                    <div style="font-size:10px; color:var(--theme-color); margin-top:8px; font-family:var(--font-terminal); font-weight:bold;">
                        KATEGORI: ${m.category || 'REGULER'}
                    </div>
                    <div class="m-reward">
                        <span style="font-size: 10px; color: var(--theme-color); font-weight: bold;">${jarakTeks}</span>
                        <span>${rewardDisplay}</span>
                    </div>
                    <button style="width: 100%; padding: 12px; background: var(--theme-color); color: #000; border: none; font-weight: 900; cursor: pointer; margin-top: 15px; border-radius: 4px; font-family: var(--font-terminal); letter-spacing: 1px;" 
                        ${isApplied ? 'disabled' : ''} 
                        onclick="App.UI.openModal('${m.id_misi}', ${m.reward || 0}, '${safeNote}', '${m.category || ''}', '${m.origin_name}', '${safeDest}')">
                        ${isApplied ? 'KONTRAK DALAM TINJAUAN' : 'LIHAT DETAIL / NEGO'}
                    </button>
                `;
                container.appendChild(div);
            },

            listenToContracts: function() {
                App.db4.ref(`kontrak_mission`).orderByChild('id_adventurer').equalTo(App.user.uid).on('child_added', snap => {
                    const k = snap.val();
                    if (k.status === 'briefing') {
                        AudioEngine.play('alert');
                        document.getElementById('alTitle').innerText = "KONTRAK DISETUJUI!";
                        document.getElementById('alMsg').innerText = "Requester telah memilih Anda. Segera pindah ke ruang pengarahan.";
                        const btn = document.getElementById('btnAlertClose');
                        if(btn) {
                            btn.innerText = "MASUK BRIEFING ROOM";
                            btn.style.background = "#00ff00";
                            btn.onclick = () => {
                                sessionStorage.setItem('active_contract_id', k.id_kontrak);
                                window.location.href = "briefing_room.html";
                            };
                        }
                        document.getElementById('alertOverlay').style.display = 'flex';
                    }
                });
            },

            checkDailyLogin: async function() {
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0]; 
                const lastLoginLocal = localStorage.getItem('last_login_date');
                
                if (lastLoginLocal === todayStr) return; 

                try {
                    // Cek tabel login user di Profil (DB1)
                    const userRef = App.db1.ref(`users/${App.user.uid}/login_stats`);
                    const snap = await userRef.once('value');
                    let stats = snap.val() || { count: 0, last_claim: "" };

                    if (stats.last_claim !== todayStr) {
                        stats.count += 1;
                        stats.last_claim = todayStr;

                        let reward = "SMALL STAMINA POTION";
                        if (stats.count % 7 === 0) reward = "PRIORITY TICKET";

                        // Update Database Inventory (Menuju root adventurer_inventory sesuai gambar referensi Anda)
                        const invRef = App.db1.ref(`adventurer_inventory/${App.user.uid}`);
const invSnap = await invRef.once('value');
let inv = invSnap.val() || { id_adventurer: App.user.uid };

if (reward === "SMALL STAMINA POTION") {
    inv.small_stamina_potion = (inv.small_stamina_potion || 0) + 1;
} else if (reward === "PRIORITY TICKET") {
    inv.priority_ticket = (inv.priority_ticket || 0) + 1;
}

await invRef.set(inv); 

                        // Simpan Data
                        await userRef.set(stats);
                        await invRef.update(inv);
                        localStorage.setItem('last_login_date', todayStr);

                        App.UI.showLoginModal(stats.count, reward);
                    } else {
                        localStorage.setItem('last_login_date', todayStr);
                    }
                } catch (e) {
                    console.error("Daily Login Error:", e);
                }
            }
        }
    };

    window.onload = () => App.init();
</script>
