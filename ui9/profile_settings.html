<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - User Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 20px; }
        .profile-box { background: #111; border: 1px solid #333; padding: 20px; text-align: center; border-radius: 10px; }
        .avatar { width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid #00ffff; }
        .info { margin-bottom: 20px; text-align: left; }
        .info label { color: #555; font-size: 11px; }
        .info p { margin: 2px 0 15px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn-out { background: #ff0055; color: white; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="profile-box">
    <div class="avatar" id="avatarIcon">?</div>
    <h2 id="pNick" style="margin:5px 0; color:#00ffff;">-</h2>
    <p id="pRole" style="font-size:12px; color:#888; margin-bottom:30px;">-</p>

    <div class="info">
        <label>ID USER (MASTER):</label>
        <p id="pUid">-</p>
        
        <label>ZONA OPERASIONAL:</label>
        <p id="pZone">-</p>

        <label>STATUS AKUN:</label>
        <p id="pStatus" style="color:#00ff00;">Verified</p>
    </div>

    <button class="btn-out" onclick="logoutTotal()">KELUAR DARI SISTEM</button>
</div>

<script>
    // 1. Ambil data dari Session (Gelas Kosong)
    const user = Clearchance.enforceIdentity();
    
    // Tampilkan data ke UI
    document.getElementById('pNick').innerText = user.nick;
    document.getElementById('pRole').innerText = user.role.toUpperCase();
    document.getElementById('pUid').innerText = user.uid;
    document.getElementById('pZone').innerText = user.zone;
    document.getElementById('avatarIcon').innerText = user.nick.charAt(0).toUpperCase();

    function logoutTotal() {
        if (confirm("Anda akan keluar dan menghapus seluruh sesi aktif. Lanjutkan?")) {
            // Jalankan Nuclear Reset agar tidak ada data sisa (Security)
            Clearchance.nuclearWipe();
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
