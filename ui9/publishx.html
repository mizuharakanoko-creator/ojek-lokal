<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Publish Quest V2</title>
    <style>
        :root {
            --bg-dark: #050505; --bg-card: #111111; --border: #333333;
            --primary: #ff0055; --primary-glow: rgba(255, 0, 85, 0.4);
            --success: #00ff00; --info: #00ffff; --locked: #555555;
            --text-light: #ffffff; --text-dim: #aaaaaa;
        }

        body { background: var(--bg-dark); color: var(--text-light); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; display: flex; justify-content: center; }
        .quest-board { background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h2.title { color: var(--primary); text-align: center; margin: 0 0 20px 0; text-shadow: 0 0 10px var(--primary-glow); font-family: monospace; border-bottom: 1px dashed var(--primary); padding-bottom: 10px; }

        .step-container { display: none; animation: slideIn 0.4s ease-out forwards; }
        .step-container.active { display: block; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* STEP 1 */
        .grid-kategori { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card-kat { background: #1a1a1a; border: 2px solid var(--border); border-radius: 10px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .card-kat.unlocked { border-color: var(--primary); }
        .card-kat.unlocked:hover { background: #2a111a; box-shadow: 0 0 15px var(--primary-glow); transform: scale(1.05); }
        .card-kat.locked { opacity: 0.6; border-color: var(--locked); background: #0a0a0a;}
        .card-kat .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .card-kat .title { font-weight: bold; font-size: 14px; }

        /* STEP 2 */
        .radar-box { background: #001a00; border: 2px solid var(--success); border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 15px; transition: 0.3s; }
        .radar-box.disabled { opacity: 0.3; border-color: #444; background: #111; }
        .location-text { font-size: 20px; font-weight: bold; color: var(--success); margin: 10px 0; text-transform: uppercase;}
        .location-sub { font-size: 13px; color: #88cc88; font-family: monospace; }

        .btn-ubah { background: transparent; border: 1px solid var(--info); color: var(--info); padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; width: 100%; transition: 0.2s; margin-bottom: 15px; }
        .btn-ubah.active { background: rgba(0, 255, 255, 0.1); }

        /* TAB OPSI 2 & 3 */
        .opsi-box { background: #1a1a1a; border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: none; }
        .opsi-box.active { display: block; animation: slideIn 0.3s; }
        .tab-opsi { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #222; border: none; color: #888; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .tab-btn.active { background: var(--info); color: #000; }

        /* FORM INPUTS & AUTOCOMPLETE */
        input, select, textarea { width: 100%; padding: 12px; background: #050505; border: 1px solid #444; color: var(--text-light); border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; font-family: 'Segoe UI', sans-serif;}
        .autocomplete-wrapper { position: relative; }
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #222; border: 1px solid #444; border-radius: 0 0 5px 5px; z-index: 10; max-height: 150px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; font-size: 14px; }
        .suggestion-item:hover { background: var(--primary); }
        .suggestion-item small { color: #aaa; font-size: 11px; display: block; }
        
        /* LOCK STATE */
        .locked-state { border-color: var(--success) !important; background: #001a00 !important; pointer-events: none; opacity: 0.8; }
        .btn-reset-lock { background: #ff4444; color: white; border: none; padding: 8px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; display: none; }

        .btn-lanjut { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #aa0033; }
        .btn-lanjut:active { transform: translateY(4px); box-shadow: 0 0 0 #aa0033; }
    </style>
</head>
<body>

<div class="quest-board">
    <h2 class="title" id="mainTitle">[ MISI BARU ]</h2>

    <div id="step1" class="step-container active">
        <p style="text-align: center; color: var(--text-dim);">Pilih jenis bantuan yang Anda butuhkan:</p>
        <div class="grid-kategori">
            <div class="card-kat unlocked" onclick="pilihKategori('motor')">
                <span class="icon">🏍️</span><span class="title">MOTOR RIDE</span>
            </div>
            <div class="card-kat locked"><span class="icon">🚗</span><span class="title">CAR RIDE</span></div>
            <div class="card-kat locked"><span class="icon">📦</span><span class="title">PICK & DROP</span></div>
            <div class="card-kat locked"><span class="icon">🛍️</span><span class="title">TITIP BELI</span></div>
            <div class="card-kat locked"><span class="icon">🤝</span><span class="title">HELP LAINNYA</span></div>
            <div class="card-kat locked"><span class="icon">❓</span><span class="title">UPDATE</span></div>
        </div>
    </div>

    <div id="step2" class="step-container">
        <p style="text-align: center; color: var(--info); margin-top: 0; font-weight: bold;">Langkah 1: Titik Penjemputan</p>
        
        <div class="radar-box" id="radarBox">
            <div style="font-size: 30px;" id="gpsIcon">📡</div>
            <div class="location-text" id="gpsDesa">Mencari Koordinat...</div>
            <div class="location-sub" id="gpsKecamatan">Mohon tunggu sebentar</div>
        </div>

        <button class="btn-ubah" id="btnToggleOpsi" onclick="toggleOpsiManual()">Ubah Titik Jemput / Pesankan Orang Lain</button>

        <div id="opsiLanjutan" class="opsi-box">
            <div class="tab-opsi">
                <button class="tab-btn active" id="tabOpsi2" onclick="pindahTab('opsi2')">📍 Pilih Manual</button>
                <button class="tab-btn" id="tabOpsi3" onclick="pindahTab('opsi3')">✍️ Ketik Bebas</button>
            </div>

            <div id="kontenOpsi2">
                <div class="autocomplete-wrapper">
                    <input type="text" id="inputCariDesa" placeholder="🔍 Ketik Nama Desa/Kelurahan..." autocomplete="off">
                    <div class="suggestions" id="saranDesa"></div>
                </div>

                <select id="selKecJemput" onchange="updateDropdownDesa()">
                    <option value="">-- Pilih Kecamatan --</option>
                </select>
                <select id="selDesaJemput">
                    <option value="">-- Pilih Desa --</option>
                </select>
                
                <input type="text" id="inputPatokan" placeholder="Detail Patokan (Misal: Pagar Hitam)">
                <button class="btn-reset-lock" id="btnResetOpsi2" onclick="bukaKunciOpsi2()">🔄 Reset Pilihan Desa</button>
            </div>

            <div id="kontenOpsi3" style="display: none;">
                <textarea rows="3" placeholder="Ceritakan alamat penjemputan dengan bahasa Anda sendiri..."></textarea>
                <button style="background: #8a2be2; color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold;">✨ Rapihkan dengan AI Guild</button>
                <p style="font-size: 11px; color: #888; text-align: center;">*Sistem Ongkos: NEGO</p>
            </div>
        </div>

        <button class="btn-lanjut" onclick="lanjutStep3()">LANJUT KE TUJUAN ➔</button>
    </div>

</div>

<script>
    // ================= DATA DATABASE LOKAL =================
    const LOKASI_DB = {
        "Cigugur": {
            desa: [{ name: "Kelurahan Cigugur" }, { name: "Kelurahan Cigadung" }, { name: "Desa Cisantana" }]
        },
        "Kuningan Kota": {
            desa: [{ name: "Kuningan" }, { name: "Purwawinangun" }, { name: "Cijoho" }, { name: "Cirendang" }]
        }
    };

    // Extract semua desa untuk Auto-complete
    let daftarSemuaDesa = [];
    for (const kec in LOKASI_DB) {
        LOKASI_DB[kec].desa.forEach(d => {
            daftarSemuaDesa.push({ namaDesa: d.name, namaKec: kec });
        });
    }

    // ================= AUDIO (GAMIFIKASI) =================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type, duration) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function sfxClick() { playSfx(600, 'sine', 0.1); }
    function sfxSuccess() { playSfx(400, 'sine', 0.1); setTimeout(()=>playSfx(600, 'sine', 0.2), 100); }
    function sfxLock() { playSfx(800, 'square', 0.1); }

    // ================= LOGIKA STEP 1 =================
    function pilihKategori(kat) {
        sfxSuccess();
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        initDropdownKecamatan();
        
        // Simulasi Pencarian GPS
        setTimeout(() => {
            document.getElementById('gpsIcon').innerText = "📍";
            document.getElementById('gpsDesa').innerText = "Cirendang";
            document.getElementById('gpsKecamatan').innerText = "Kecamatan Kuningan Kota";
            sfxSuccess();
        }, 1500);
    }

    // ================= LOGIKA STEP 2 (OPSI & LOCKING) =================
    let modeAktif = 'opsi1'; // opsi1, opsi2, opsi3

    function toggleOpsiManual() {
        sfxClick();
        const box = document.getElementById('opsiLanjutan');
        const radar = document.getElementById('radarBox');
        const btnToggle = document.getElementById('btnToggleOpsi');

        if (box.classList.contains('active')) {
            // Kembali ke Opsi 1 (GPS)
            box.classList.remove('active');
            radar.classList.remove('disabled');
            btnToggle.innerText = "Ubah Titik Jemput / Pesankan Orang Lain";
            modeAktif = 'opsi1';
        } else {
            // Pindah ke Opsi Manual/Nego
            box.classList.add('active');
            radar.classList.add('disabled'); // Matikan UI GPS
            btnToggle.innerText = "Kembali ke GPS Otomatis";
            modeAktif = 'opsi2';
        }
    }

    function pindahTab(opsi) {
        sfxClick(); modeAktif = opsi;
        document.getElementById('tabOpsi2').classList.toggle('active', opsi === 'opsi2');
        document.getElementById('tabOpsi3').classList.toggle('active', opsi === 'opsi3');
        document.getElementById('kontenOpsi2').style.display = (opsi === 'opsi2') ? 'block' : 'none';
        document.getElementById('kontenOpsi3').style.display = (opsi === 'opsi3') ? 'block' : 'none';
    }

    // ================= AUTOCOMPLETE & DROPDOWN DATA =================
    function initDropdownKecamatan() {
        const selKec = document.getElementById('selKecJemput');
        selKec.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
        for (const kec in LOKASI_DB) {
            selKec.innerHTML += `<option value="${kec}">${kec}</option>`;
        }
    }

    function updateDropdownDesa(preSelectedDesa = null) {
        const kec = document.getElementById('selKecJemput').value;
        const selDesa = document.getElementById('selDesaJemput');
        selDesa.innerHTML = '<option value="">-- Pilih Desa --</option>';
        if (LOKASI_DB[kec]) {
            LOKASI_DB[kec].desa.forEach(d => {
                selDesa.innerHTML += `<option value="${d.name}">${d.name}</option>`;
            });
            if(preSelectedDesa) selDesa.value = preSelectedDesa;
        }
    }

    // Input Autocomplete logic
    const inputCari = document.getElementById('inputCariDesa');
    const boxSaran = document.getElementById('saranDesa');

    inputCari.addEventListener('input', function() {
        const val = this.value.toLowerCase();
        boxSaran.innerHTML = '';
        if (!val) { boxSaran.style.display = 'none'; return; }
        
        const filterData = daftarSemuaDesa.filter(d => d.namaDesa.toLowerCase().includes(val));
        
        if (filterData.length > 0) {
            boxSaran.style.display = 'block';
            filterData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `${item.namaDesa} <small>Kec. ${item.namaKec}</small>`;
                div.onclick = () => kunciPilihan(item.namaDesa, item.namaKec);
                boxSaran.appendChild(div);
            });
        } else {
            boxSaran.style.display = 'none';
        }
    });

    // Kunci Dropdown setelah dipilih lewat autocomplete
    function kunciPilihan(namaDesa, namaKec) {
        sfxLock();
        // Isi dropdown
        document.getElementById('selKecJemput').value = namaKec;
        updateDropdownDesa(namaDesa);
        
        // Bersihkan pencarian
        inputCari.value = namaDesa;
        boxSaran.style.display = 'none';

        // Terapkan efek visual "Terkunci"
        document.getElementById('selKecJemput').classList.add('locked-state');
        document.getElementById('selDesaJemput').classList.add('locked-state');
        inputCari.classList.add('locked-state');
        
        // Tampilkan tombol reset
        document.getElementById('btnResetOpsi2').style.display = 'block';
    }

    // Buka kunci (Reset Opsi 2)
    function bukaKunciOpsi2() {
        sfxClick();
        document.getElementById('selKecJemput').classList.remove('locked-state');
        document.getElementById('selDesaJemput').classList.remove('locked-state');
        inputCari.classList.remove('locked-state');
        
        document.getElementById('selKecJemput').value = "";
        document.getElementById('selDesaJemput').innerHTML = '<option value="">-- Pilih Desa --</option>';
        inputCari.value = "";
        
        document.getElementById('btnResetOpsi2').style.display = 'none';
    }

    function lanjutStep3() {
        alert("Melanjutkan Data dengan Mode Aktif: " + modeAktif.toUpperCase());
    }
</script>
</body>
</html>
