<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Publish Quest (Gamified)</title>
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: #111111;
            --border: #333333;
            --primary: #ff0055;
            --primary-glow: rgba(255, 0, 85, 0.4);
            --success: #00ff00;
            --info: #00ffff;
            --locked: #555555;
            --text-light: #ffffff;
            --text-dim: #aaaaaa;
        }

        body { 
            background: var(--bg-dark); color: var(--text-light); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 15px; margin: 0; display: flex; justify-content: center;
        }

        .quest-board {
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 12px; width: 100%; max-width: 500px;
            padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden; position: relative;
        }

        h2.title {
            color: var(--primary); text-align: center; margin: 0 0 20px 0;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
            font-family: monospace; border-bottom: 1px dashed var(--primary); padding-bottom: 10px;
        }

        /* --- WIZARD STEPS --- */
        .step-container { display: none; animation: slideIn 0.4s ease-out forwards; }
        .step-container.active { display: block; }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- STEP 1: GRID KATEGORI --- */
        .grid-kategori {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        .card-kat {
            background: #1a1a1a; border: 2px solid var(--border); border-radius: 10px;
            padding: 20px 10px; text-align: center; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        
        .card-kat.unlocked { border-color: var(--primary); }
        .card-kat.unlocked:hover { background: #2a111a; box-shadow: 0 0 15px var(--primary-glow); transform: scale(1.05); }
        
        .card-kat.locked { opacity: 0.6; cursor: not-allowed; border-color: var(--locked); background: #0a0a0a;}
        
        .card-kat .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .card-kat .title { font-weight: bold; font-size: 14px; }
        .badge-lock { position: absolute; top: 5px; right: 5px; font-size: 12px; }

        /* --- STEP 2: TITIK JEMPUT --- */
        .radar-box {
            background: #001a00; border: 2px solid var(--success); border-radius: 8px;
            padding: 20px; text-align: center; margin-bottom: 15px; position: relative;
            overflow: hidden;
        }
        
        .radar-scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--success);
            box-shadow: 0 0 10px var(--success); animation: scan 2s linear infinite; opacity: 0;
        }
        .radar-box.scanning .radar-scan-line { opacity: 1; }

        @keyframes scan {
            0% { top: 0; } 50% { top: 100%; } 100% { top: 0; }
        }

        .location-text { font-size: 18px; font-weight: bold; color: var(--success); margin: 10px 0; }
        .location-sub { font-size: 12px; color: #88cc88; font-family: monospace; }

        .btn-ubah {
            background: transparent; border: 1px solid var(--info); color: var(--info);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px;
            margin-top: 15px; transition: 0.2s; width: 100%;
        }
        .btn-ubah:hover { background: rgba(0, 255, 255, 0.1); }

        /* Pilihan Manual & Nego */
        .opsi-box {
            background: #1a1a1a; border: 1px solid var(--border); padding: 15px;
            border-radius: 8px; margin-top: 10px; display: none;
        }
        .opsi-box.active { display: block; animation: slideIn 0.3s; }

        .tab-opsi { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px; background: #222; border: none; color: #888;
            cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 12px;
        }
        .tab-btn.active { background: var(--info); color: #000; }

        input, select, textarea {
            width: 100%; padding: 12px; background: #050505; border: 1px solid #444;
            color: var(--text-light); border-radius: 5px; margin-bottom: 10px;
            box-sizing: border-box; font-size: 14px;
        }
        
        .btn-ai { background: #8a2be2; color: white; border: none; padding: 8px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px;}

        .btn-lanjut {
            background: var(--primary); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #aa0033;
        }
        .btn-lanjut:active { transform: translateY(4px); box-shadow: 0 0 0 #aa0033; }
        
        .alert-toast {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.9); padding: 10px 20px; border-radius: 20px;
            font-size: 12px; font-weight: bold; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div class="quest-board">
    <div id="alertToast" class="alert-toast">⚠️ Fitur Terkunci!</div>
    
    <h2 class="title" id="mainTitle">[ MISI BARU ]</h2>

    <div id="step1" class="step-container active">
        <p style="text-align: center; color: var(--text-dim); margin-top: 0;">Pilih jenis bantuan yang Anda butuhkan:</p>
        
        <div class="grid-kategori">
            <div class="card-kat unlocked" onclick="pilihKategori('motor')">
                <span class="icon">🏍️</span>
                <span class="title">MOTOR RIDE</span>
            </div>
            <div class="card-kat locked" onclick="showLockedAlert('Car Ride')">
                <span class="badge-lock">🔒</span>
                <span class="icon">🚗</span>
                <span class="title">CAR RIDE</span>
            </div>
            <div class="card-kat locked" onclick="showLockedAlert('Pick & Drop')">
                <span class="badge-lock">🔒</span>
                <span class="icon">📦</span>
                <span class="title">PICK & DROP</span>
            </div>
            <div class="card-kat locked" onclick="showLockedAlert('Titip Beli')">
                <span class="badge-lock">🔒</span>
                <span class="icon">🛍️</span>
                <span class="title">TITIP BELI</span>
            </div>
            <div class="card-kat locked" onclick="showLockedAlert('Help Lainnya')">
                <span class="badge-lock">🔒</span>
                <span class="icon">🤝</span>
                <span class="title">HELP LAINNYA</span>
            </div>
            <div class="card-kat locked" onclick="showLockedAlert('Segera Hadir')">
                <span class="badge-lock">⏳</span>
                <span class="icon">❓</span>
                <span class="title">UPDATE</span>
            </div>
        </div>
    </div>

    <div id="step2" class="step-container">
        <p style="text-align: center; color: var(--info); margin-top: 0; font-weight: bold;">Langkah 1: Titik Penjemputan</p>
        
        <div class="radar-box scanning" id="radarBox">
            <div class="radar-scan-line"></div>
            <div style="font-size: 30px;">📡</div>
            <div class="location-text" id="gpsResultText">Mencari Koordinat...</div>
            <div class="location-sub" id="gpsSubText">Mohon tunggu sebentar</div>
        </div>

        <button class="btn-ubah" id="btnUbahTitik" onclick="bukaOpsiManual()">Ubah Titik Jemput / Pesankan Orang Lain</button>

        <div id="opsiLanjutan" class="opsi-box">
            <div class="tab-opsi">
                <button class="tab-btn active" id="tabOpsi2" onclick="pindahOpsi('opsi2')">📍 Pilih Manual</button>
                <button class="tab-btn" id="tabOpsi3" onclick="pindahOpsi('opsi3')">✍️ Ketik Bebas</button>
            </div>

            <div id="kontenOpsi2">
                <select id="selKecJemput">
                    <option value="">-- Pilih Kecamatan --</option>
                    <option value="KNG">Kuningan Kota</option>
                    <option value="CIG">Cigugur</option>
                </select>
                <select id="selDesaJemput">
                    <option value="">-- Pilih Desa --</option>
                    </select>
                <input type="text" placeholder="Detail Patokan (Misal: Pagar Hitam)">
            </div>

            <div id="kontenOpsi3" style="display: none;">
                <textarea rows="3" placeholder="Ceritakan alamat penjemputan dengan bahasa Anda sendiri..."></textarea>
                <button class="btn-ai" onclick="sfxPowerUp()">✨ Rapihkan dengan AI Guild</button>
                <p style="font-size: 11px; color: #888; text-align: center;">*Memilih mode ini akan mengubah status ongkos menjadi NEGO.</p>
            </div>
        </div>

        <button class="btn-lanjut" onclick="lanjutStep3()">LANJUT KE TUJUAN ➔</button>
    </div>

</div>

<script>
    // ================= GAMIFICATION SOUNDS (Web Audio API) =================
    // Dibuat otomatis pakai kode agar tidak perlu link MP3
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration, vol=0.1) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function sfxClick() { playTone(600, 'sine', 0.1, 0.1); }
    function sfxError() { playTone(150, 'sawtooth', 0.3, 0.1); playTone(100, 'sawtooth', 0.4, 0.1); }
    function sfxSuccess() { playTone(400, 'sine', 0.1); setTimeout(()=>playTone(600, 'sine', 0.2), 100); }
    function sfxPowerUp() { playTone(300, 'triangle', 0.1); setTimeout(()=>playTone(500, 'triangle', 0.1), 100); setTimeout(()=>playTone(800, 'triangle', 0.3), 200); }
    // =======================================================================

    // --- LOGIKA STEP 1 ---
    function showLockedAlert(fitur) {
        sfxError();
        const alert = document.getElementById('alertToast');
        alert.innerText = `⚠️ ${fitur} belum tersedia atau butuh Login!`;
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 2000);
    }

    function pilihKategori(kat) {
        sfxSuccess();
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('mainTitle').innerText = "[ MOTOR RIDE ]";
        
        // Mulai simulasi pencarian GPS Otomatis (Opsi 1)
        jalankanRadarGPS();
    }

    // --- LOGIKA STEP 2 ---
    let modeJemputAktif = 'opsi1'; // opsi1, opsi2, opsi3

    function jalankanRadarGPS() {
        // Simulasi loading 2 detik agar terasa teknologinya bekerja
        const radar = document.getElementById('radarBox');
        setTimeout(() => {
            radar.classList.remove('scanning');
            document.getElementById('gpsResultText').innerText = "📍 ALUN-ALUN KUNINGAN";
            document.getElementById('gpsSubText').innerText = "Kecamatan Kuningan | Koordinat Terkunci";
            sfxPowerUp(); // Bunyi ting-ting-ting sukses
        }, 2000);
    }

    function bukaOpsiManual() {
        sfxClick();
        document.getElementById('opsiLanjutan').classList.toggle('active');
        modeJemputAktif = 'opsi2'; // Default ke dropdown jika dibuka
    }

    function pindahOpsi(opsi) {
        sfxClick();
        modeJemputAktif = opsi;
        
        // Ubah warna Tab
        document.getElementById('tabOpsi2').classList.toggle('active', opsi === 'opsi2');
        document.getElementById('tabOpsi3').classList.toggle('active', opsi === 'opsi3');
        
        // Tampilkan konten yang sesuai
        document.getElementById('kontenOpsi2').style.display = (opsi === 'opsi2') ? 'block' : 'none';
        document.getElementById('kontenOpsi3').style.display = (opsi === 'opsi3') ? 'block' : 'none';

        // Jika user memilih Nego/Bebas, ubah warna UI agar terasa berbeda
        if(opsi === 'opsi3') {
            document.getElementById('radarBox').style.opacity = '0.3'; // Redupkan GPS
            document.getElementById('btnUbahTitik').innerText = "Mode Bebas (Sistem Nego Aktif)";
            document.getElementById('btnUbahTitik').style.color = "#ff0055";
            document.getElementById('btnUbahTitik').style.borderColor = "#ff0055";
        } else {
            document.getElementById('radarBox').style.opacity = '1';
            document.getElementById('btnUbahTitik').innerText = "Ubah Titik Jemput / Pesankan Orang Lain";
            document.getElementById('btnUbahTitik').style.color = "var(--info)";
            document.getElementById('btnUbahTitik').style.borderColor = "var(--info)";
        }
    }

    function lanjutStep3() {
        sfxClick();
        let message = "";
        if(modeJemputAktif === 'opsi1') message = "Melanjutkan dengan GPS Otomatis...";
        else if(modeJemputAktif === 'opsi2') message = "Melanjutkan dengan Alamat Manual...";
        else if(modeJemputAktif === 'opsi3') message = "Melanjutkan Mode Bebas. Tujuan & Harga di-SKIP (Nego).";
        
        alert(message + "\n\n(Ini akan masuk ke Step 3 di kode selanjutnya)");
    }
</script>
</body>
</html>
