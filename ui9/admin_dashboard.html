<!DOCTYPE html>
<html lang="id">
<head>
    <title>Sovereign Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <style>
        body { background:#000; color:#0f0; font-family:monospace; padding:20px; }
        .stat-card { border:1px solid #0f0; padding:15px; margin-bottom:10px; }
    </style>
</head>
<body>
    <h2>OVERSEER DASHBOARD</h2>
    <div id="stats"></div>

    <script>
        // Admin memantau Buku Induk di FB1 untuk melihat sebaran beban data
        const masterDB = getTerminal('FB1_MASTER');
        masterDB.ref('buku_induk/misi').on('value', snap => {
            const total = snap.numChildren();
            document.getElementById('stats').innerHTML = `TOTAL MISI DISELURUH TERMINAL: ${total}`;
        });
    </script>
</body>
</html>
