<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Admin - Command Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 20px; max-width: 1200px; margin: auto; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #ffaa00; margin-top: 30px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00ff00; }
        .info b { color: #00ffff; }
        button { font-family: monospace; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; padding: 10px 15px; }
        .btn-verify { background: #00ff00; color: #000; }
        .btn-action { background: #ffaa00; color: #000; width: 100%; margin-top: 10px; }
        .btn-danger { background: #ff4444; color: #fff; width: 100%; margin-top: 10px; }
        .btn-scan { background: #00ffff; color: #000; font-size: 16px; padding: 15px; width: 100%; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .stat-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 5px; }
        .stat-val { font-size: 24px; color: #00ffff; font-weight: bold; display: block; margin: 10px 0; }
        input[type="text"] { width: 90%; padding: 10px; background: #000; color: #00ffff; border: 1px solid #444; font-family: monospace; margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>SISTEM RADAR & KONTROL SOVEREIGN</h2>
<button class="btn-scan" onclick="scanSystem()">[ Pindai Jaringan Database Sekarang ]</button>

<div class="admin-grid">
    <div class="stat-card">
        <h3>RADAR LALU LINTAS (FB4/FB1)</h3>
        Misi Terindeks: <span class="stat-val" id="valMisi">0</span>
        Sinyal Bids Terdeteksi: <span class="stat-val" id="valBids">0</span>
        <button class="btn-action" onclick="cleanOrphanBids()">SAPU BERSIH BIDS RESIDU</button>
    </div>

    <div class="stat-card">
        <h3>KONTRAK AKTIF (FB5)</h3>
        Kontrak Berjalan: <span class="stat-val" id="valKontrak">0</span>
    </div>

    <div class="stat-card" style="border-color: #ff4444;">
        <h3 style="color: #ff4444;">KEAMANAN SISTEM</h3>
        <input type="text" id="targetUid" placeholder="Masukkan ID_ADV User...">
        <button class="btn-danger" onclick="banUser()">BANNED USER (FB1)</button>
        <button class="btn-danger" onclick="toggleMaintenance()" id="btnMaint">MODE PERBAIKAN: OFF</button>
    </div>
</div>

<h2>PENGAJUAN REGISTER_PENDING</h2>
<div id="pendingList">Memuat antrean...</div>

<script>
    const db1 = getTerminal('FB1_MASTER');
    const db2 = getTerminal('FB2_RUNNER');
    const db4 = getTerminal('FB4_BOARD');
    const db5 = getTerminal('FB5_DEAL');

    // MENDENGARKAN ANTREAN PENDAFTARAN
    db1.ref('register_pending').on('value', snap => {
        const list = document.getElementById('pendingList');
        list.innerHTML = "";
        if (!snap.exists()) {
            list.innerHTML = "<p style='color:#555'>Tidak ada antrean pendaftaran saat ini.</p>";
            return;
        }
        snap.forEach(child => {
            const u = child.val();
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="info">
                    <b>${u.nickname}</b> [${u.id_adv}]<br>
                    Role: ${u.role} | Domisili: ${u.domisili}
                </div>
                <button class="btn-verify" onclick="verifikasiUser('${u.id_adv}')">TERIMA & AKTIFKAN (9 TABEL FB2)</button>
            `;
            list.appendChild(div);
        });
    });

    async function verifikasiUser(idAdv) {
        if (!confirm("Aktifkan user? Sistem akan menginisialisasi 9 Tabel Gamifikasi di FB2.")) return;
        
        try {
            const snap = await db1.ref(`register_pending/${idAdv}`).once('value');
            const data = snap.val();
            if (!data) return;

            // --- 1. TABEL IDENTITAS DASAR (FB2) ---
            const identitasLama = {
                id_adv: data.id_adv,
                nickname: data.nickname,
                password: data.password,
                role: data.role,
                kategori: data.kategori,
                area_tugas: data.domisili,
                create_at: data.created_at
            };

            // --- 2. SEMBILAN TABEL GAMIFIKASI (FB2) ---
            
            const t_profile = { 
                id_adventurer: idAdv, 
                gelar: "Novice Traveler", 
                level: 1, 
                rank: "F" 
            };

            const t_experience = {
                id_adventurer: idAdv, 
                exp: 0, 
                max_exp: 100, 
                current_stamina: 100, 
                max_stamina: 100,
                last_stamina_update: Date.now(), 
                limit_harian: 0,
                max_limit: 10
            };

            const t_reputation = {
                id_adventurer: idAdv, 
                reputation_score: 0, 
                star_5: 0, star_4: 0, star_3: 0, star_2: 0, star_1: 0,
                total_mission_completed: 0, 
                total_mission_canceled: 0
            };

            const t_judge = { 
                id_adventurer: idAdv, 
                is_suspended: false, 
                suspension_lift_time: 0 
            };

            const t_inventory = {
                id_adventurer: idAdv, 
                small_stamina_potion: 3, 
                medium_stamina_potion: 0, 
                large_stamina_potion: 0,
                priority_ticket: 0, 
                smoke_bomb: 0
            };

            const t_coxin = { 
                id_adventurer: idAdv, 
                green_stone: 10, 
                white_stone: 0, 
                red_stone: 0, 
                purple_stone: 0 
            };

            const t_diagram = {
                id_adventurer: idAdv, 
                nilai_kecerdasan: 10, 
                nilai_kepercayaan: 10, 
                nilai_keamanan: 10, 
                nilai_keramahan: 10, 
                nilai_penampilan: 10
            };

            // TABEL ITEM KONTRAK (PENTING: UNTUK BIDDING)
            const t_contracts = {
                id_adventurer: idAdv,
                kontrak_lusuh: 10,
                kontrak_normal: 5,
                kontrak_medium: 1,
                kontrak_premium: 0,
                kontrak_emas: 0
            };

            // --- 3. INDEX LOGIN (FB1) ---
            const targetIndex = (data.role === 'adventurer') ? 'adventurer_index' : 'requester_index';
            const indexData = {
                id_adv: data.id_adv, 
                nickname: data.nickname, 
                password: data.password,
                role: data.role, 
                kategori: data.kategori, 
                area_tugas: data.domisili, 
                shard_id: "FB2_RUNNER"
            };

            // EKSEKUSI SEMUA TRANSMISI (FB1 & FB2)
            await Promise.all([
                // Update Index di FB1
                db1.ref(`${targetIndex}/${idAdv}`).set(indexData),
                
                // Buat 9 Tabel di FB2
                db2.ref(`adventurer-${data.domisili}/Umum/${idAdv}`).set(identitasLama),
                db2.ref(`adventurer_profile/${idAdv}`).set(t_profile),
                db2.ref(`adventurer_experience/${idAdv}`).set(t_experience),
                db2.ref(`adventurer_reputation/${idAdv}`).set(t_reputation),
                db2.ref(`adventurer_judge/${idAdv}`).set(t_judge),
                db2.ref(`adventurer_inventory/${idAdv}`).set(t_inventory),
                db2.ref(`adventurer_coxin/${idAdv}`).set(t_coxin),
                db2.ref(`adventurer_diagram/${idAdv}`).set(t_diagram),
                db2.ref(`adventurer_contracts/${idAdv}`).set(t_contracts),
                
                // Hapus dari antrean pending
                db1.ref(`register_pending/${idAdv}`).remove()
            ]);

            alert(`BERHASIL! Karakter ${data.nickname} telah bangkit dengan 9 tabel gamifikasi di FB2.`);
        } catch (e) { 
            console.error(e); 
            alert("GAGAL KRITIKAL: Terjadi kesalahan sinkronisasi database."); 
        }
    }

    // --- FUNGSI MAINTENANCE & SCANNER ---

    async function scanSystem() {
        try {
            const [sMisi, sBids, sKontrak] = await Promise.all([
                db1.ref('misi_index').once('value'), 
                db4.ref('bids').once('value'), 
                db5.ref('kontrak_detail').once('value')
            ]);
            document.getElementById('valMisi').innerText = sMisi.numChildren() || 0;
            document.getElementById('valBids').innerText = sBids.numChildren() || 0;
            document.getElementById('valKontrak').innerText = sKontrak.numChildren() || 0;
        } catch (e) { console.error(e); }
    }

    async function cleanOrphanBids() {
        if (!confirm("Sapu bersih sinyal bids tanpa misi induk?")) return;
        const bidsSnap = await db4.ref('bids').once('value');
        if (!bidsSnap.exists()) return alert("Radar bersih.");
        let count = 0;
        for (let mid in bidsSnap.val()) {
            const idx = await db1.ref(`misi_index/${mid}`).once('value');
            if (!idx.exists()) { 
                await db4.ref(`bids/${mid}`).remove(); 
                count++; 
            }
        }
        alert(`Pembersihan residu selesai: ${count} sinyal dihapus.`);
        scanSystem();
    }

    async function banUser() {
        const uid = document.getElementById('targetUid').value.trim();
        if (!uid) return alert("Masukkan ID User!");
        await db1.ref(`adventurer_index/${uid}`).update({ is_banned: true });
        alert(`User ${uid} telah di-Banned dari sistem.`);
    }

    async function toggleMaintenance() {
        const snap = await db1.ref('system_config/is_maintenance').once('value');
        const next = !snap.val();
        await db1.ref('system_config').update({ is_maintenance: next });
        location.reload();
    }

    // Inisialisasi status Maintenance saat load
    db1.ref('system_config/is_maintenance').once('value').then(snap => {
        const btn = document.getElementById('btnMaint');
        if (snap.val()) {
            btn.innerText = "MODE PERBAIKAN: ON"; 
            btn.style.background = "#ff4444"; 
            btn.style.color = "white";
        }
    });
</script>
</body>
</html>
