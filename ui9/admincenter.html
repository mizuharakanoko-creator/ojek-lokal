<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | COMMAND CENTER</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>

    <style>
        /* TEMA MERAH (BLOOD PROTOCOL) */
        :root {
            --neon-red: #ff1a1a;
            --dark-red: #8b0000;
            --neon-cyan: #00ffff; /* Dipertahankan untuk elemen Radar pembantu */
            --neon-orange: #ffaa00; /* Untuk tombol aksi */
            --bg-main: #050000;
            --bg-card: #0f0000;
            --bg-input: #1a0000;
            --border-color: #330000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body { background-color: var(--bg-main); color: var(--text-main); font-family: var(--font-main); margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* HEADER & TYPOGRAPHY */
        .header-title { color: var(--neon-red); text-align: center; font-size: 24px; letter-spacing: 5px; font-family: var(--font-terminal); border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 30px; text-shadow: 0 0 10px rgba(255,0,0,0.4); }
        .section-title { color: var(--text-main); font-size: 16px; letter-spacing: 2px; font-family: var(--font-terminal); margin-top: 40px; margin-bottom: 15px; border-left: 4px solid var(--neon-red); padding-left: 10px; }

        /* GRID & CARDS */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon-red); }
        .stat-card h3 { margin-top: 0; color: var(--text-muted); font-size: 12px; letter-spacing: 1px; }
        .stat-val { font-size: 28px; color: var(--neon-red); font-family: var(--font-terminal); font-weight: bold; display: block; margin: 10px 0; text-shadow: 0 0 8px rgba(255,0,0,0.3); }

        /* INPUT & BUTTONS */
        input[type="text"] { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); font-family: var(--font-terminal); margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--neon-red); outline: none; }
        
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-family: var(--font-terminal); font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; width: 100%; text-transform: uppercase; }
        .btn-scan { background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red); font-size: 14px; padding: 15px; margin-bottom: 20px; letter-spacing: 3px; box-shadow: inset 0 0 10px rgba(255,0,0,0.1); }
        .btn-scan:hover { background: rgba(255,0,0,0.1); text-shadow: 0 0 5px var(--neon-red); }
        .btn-warning { background: var(--neon-orange); color: #000; margin-top: 10px; }
        .btn-danger { background: var(--neon-red); color: #fff; margin-top: 10px; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .btn-success { background: #00ff00; color: #000; box-shadow: 0 0 10px rgba(0,255,0,0.3); }

        /* DOSSIER CARDS (PENDING LIST) */
        .dossier-card { background: var(--bg-card); border: 1px solid #330000; border-radius: 8px; margin-bottom: 15px; overflow: hidden; animation: fadeIn 0.5s ease-out; }
        .dossier-header { background: #1a0000; padding: 12px 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-terminal); }
        .dossier-header .id-badge { color: var(--neon-red); font-weight: bold; font-size: 13px; }
        .dossier-header .role-badge { background: #330000; color: #fff; padding: 3px 8px; border-radius: 3px; font-size: 10px; letter-spacing: 1px; }
        .dossier-body { padding: 15px; font-size: 12px; color: #ccc; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .data-group { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; border-left: 2px solid #550000; }
        .data-label { color: var(--text-muted); font-size: 10px; margin-bottom: 4px; font-weight: bold; font-family: var(--font-terminal); }
        .data-value { color: #fff; font-size: 13px; }
        .dossier-footer { padding: 15px; background: rgba(26,0,0,0.5); border-top: 1px solid var(--border-color); display: flex; gap: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CUSTOM ALERT */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 99999; backdrop-filter: blur(5px); }
        .modal-box { width: 85%; max-width: 400px; padding: 25px; border: 1px solid var(--neon-red); background: #0a0000; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
    </style>
</head>
<body>

<h1 class="header-title">COMMAND CENTER<br><span style="font-size: 12px; color: #888; letter-spacing: 2px;">SOVEREIGN DATABASE OVERSIGHT</span></h1>

<button class="btn btn-scan" onclick="scanSystem()">[ PINDAI JARINGAN TERMINAL SEKARANG ]</button>

<div class="admin-grid">
    <div class="stat-card" style="border-left-color: var(--neon-cyan);">
        <h3 style="color: var(--neon-cyan);">RADAR LALU LINTAS (FB4/FB1)</h3>
        <div style="display:flex; justify-content: space-between;">
            <div>Misi Terindeks:<span class="stat-val" id="valMisi" style="color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan);">0</span></div>
            <div>Sinyal Bids:<span class="stat-val" id="valBids" style="color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan);">0</span></div>
        </div>
        <button class="btn btn-warning" onclick="cleanOrphanBids()">SAPU BERSIH BIDS RESIDU</button>
    </div>

    <div class="stat-card" style="border-left-color: #00ff00;">
        <h3 style="color: #00ff00;">KONTRAK AKTIF (FB5)</h3>
        <div>Kontrak Berjalan:<span class="stat-val" id="valKontrak" style="color: #00ff00; text-shadow: 0 0 8px #00ff00;">0</span></div>
    </div>

    <div class="stat-card" style="border-left-color: var(--neon-red);">
        <h3 style="color: var(--neon-red);">KEAMANAN SISTEM (FB1)</h3>
        <input type="text" id="targetUid" placeholder="Masukkan ID_ADV User...">
        <button class="btn btn-danger" onclick="banUser()">BANNED USER</button>
        <button class="btn" style="background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); margin-top: 10px;" onclick="toggleMaintenance()" id="btnMaint">MODE PERBAIKAN: OFF</button>
    </div>
</div>

<h2 class="section-title">ANTREAN PENDAFTARAN (REGISTER_PENDING)</h2>
<div id="pendingList">
    <div style="color:#555; font-family: monospace; text-align: center; padding: 20px;">Menghubungkan ke Terminal...</div>
</div>

<div class="modal-overlay" id="customAlert">
    <div class="modal-box">
        <h2 id="alertTitle" class="header-title" style="border:none; margin-bottom:10px; font-size:18px;">INFO</h2>
        <p id="alertMsg" style="font-size:13px; color:#ddd; line-height:1.6; margin-bottom: 20px;"></p>
        <button class="btn btn-danger" onclick="closeAlert()">MENGERTI</button>
    </div>
</div>

<script>
    // INISIALISASI DATABASE DARI ROUTER
    const db1 = getTerminal('FB1_MASTER');
    const db2 = getTerminal('FB2_RUNNER');
    const db4 = getTerminal('FB4_BOARD');
    const db5 = getTerminal('FB5_DEAL');

    // UTILS ALERT
    function showAlert(msg, title = "PERINGATAN SISTEM") { 
        document.getElementById('alertTitle').innerText = title; 
        document.getElementById('alertMsg').innerText = msg; 
        document.getElementById('customAlert').style.display = 'flex'; 
    }
    function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }

    // ==========================================
    // 1. LISTENER DATA PENDAFTARAN (FB1)
    // ==========================================
    db1.ref('register_pending').on('value', snap => {
        const list = document.getElementById('pendingList');
        list.innerHTML = "";
        
        if (!snap.exists()) {
            list.innerHTML = "<div style='color:#555; text-align:center; padding:20px; font-family: monospace;'>[ KOSONG ] Tidak ada antrean pendaftaran saat ini.</div>";
            return;
        }

        snap.forEach(child => {
            const u = child.val();
            
            // Fallback mapping untuk kompatibilitas data lama vs baru
            const areaTugas = u.domisili_lengkap?.area_tugas || u.domisili || "UNK";
            const kendaraan = u.arsenal ? `${u.arsenal.jenis} (${u.arsenal.plat})` : (u.kategori || "UNK");
            const namaAsli = u.nama_lengkap || "Tanpa Nama";
            const nik = u.nik_ktp || "---";
            const kontak = u.nomor_telepon || "---";

            const div = document.createElement('div');
            div.className = 'dossier-card';
            div.innerHTML = `
                <div class="dossier-header">
                    <span class="id-badge">ID: ${u.id_adv} | <span style="color:#fff;">${u.nickname.toUpperCase()}</span></span>
                    <span class="role-badge">${(u.role || 'ADVENTURER').toUpperCase()}</span>
                </div>
                <div class="dossier-body">
                    <div class="data-group">
                        <div class="data-label">IDENTITAS ASLI</div>
                        <div class="data-value">${namaAsli}<br><span style="color:#888; font-size:10px;">NIK: ${nik}</span></div>
                    </div>
                    <div class="data-group">
                        <div class="data-label">OPERASIONAL & KONTAK</div>
                        <div class="data-value">Area: <span style="color:var(--neon-red);">${areaTugas.toUpperCase()}</span><br><span style="color:#888; font-size:10px;">WA: +${kontak}</span></div>
                    </div>
                    <div class="data-group">
                        <div class="data-label">ARSENAL (KENDARAAN)</div>
                        <div class="data-value">${kendaraan.toUpperCase()}</div>
                    </div>
                </div>
                <div class="dossier-footer">
                    <button class="btn btn-success" onclick="verifikasiUser('${u.id_adv}')">TERIMA & BANGKITKAN (FB2)</button>
                    <button class="btn btn-danger" style="width: auto; margin-top: 0; padding: 12px 25px;" onclick="tolakUser('${u.id_adv}')">TOLAK</button>
                </div>
            `;
            list.appendChild(div);
        });
    });

    // ==========================================
    // 2. LOGIKA VERIFIKASI (MENGISI 9 TABEL)
    // ==========================================
    async function verifikasiUser(idAdv) {
        if (!confirm("Peringatan: Tindakan ini akan menginisialisasi 9 Tabel Gamifikasi di FB2_RUNNER dan memasukkan data ke Index Utama. Lanjutkan?")) return;
        
        try {
            const snap = await db1.ref(`register_pending/${idAdv}`).once('value');
            const data = snap.val();
            if (!data) return showAlert("Data tidak ditemukan di server!", "ERROR");

            // Mapping fallback area_tugas untuk memastikan routing FB2 akurat
            const targetDomisili = data.domisili_lengkap?.area_tugas || data.domisili || "UNKNOWN";
            const targetKategori = data.starter_kit || data.kategori || "UMUM";

            // --- A. TABEL IDENTITAS DASAR (FB2) ---
            const identitasLama = {
                id_adv: data.id_adv,
                nickname: data.nickname,
                password: data.password,
                role: data.role,
                kategori: targetKategori,
                area_tugas: targetDomisili,
                create_at: data.created_at || Date.now()
            };

            // --- B. SEMBILAN TABEL GAMIFIKASI (FB2) ---
            const t_profile = { id_adventurer: idAdv, gelar: data.julukan || "Novice Traveler", level: 1, rank: data.rank || "F" };
            
            const t_experience = {
                id_adventurer: idAdv, exp: 0, max_exp: 100, 
                current_stamina: 100, max_stamina: 100,
                last_stamina_update: Date.now(), limit_harian: 0, max_limit: 10
            };

            const t_reputation = {
                id_adventurer: idAdv, reputation_score: 0, 
                star_5: 0, star_4: 0, star_3: 0, star_2: 0, star_1: 0,
                total_mission_completed: 0, total_mission_canceled: 0
            };

            const t_judge = { id_adventurer: idAdv, is_suspended: false, suspension_lift_time: 0 };
            
            const t_inventory = { id_adventurer: idAdv, small_stamina_potion: 3, medium_stamina_potion: 0, large_stamina_potion: 0, priority_ticket: 0, smoke_bomb: 0 };
            
            const t_coxin = { id_adventurer: idAdv, green_stone: 10, white_stone: 0, red_stone: 0, purple_stone: 0 };
            
            const t_diagram = { id_adventurer: idAdv, nilai_kecerdasan: 10, nilai_kepercayaan: 10, nilai_keamanan: 10, nilai_keramahan: 10, nilai_penampilan: 10 };

            const t_contracts = { id_adventurer: idAdv, kontrak_lusuh: 10, kontrak_normal: 5, kontrak_medium: 1, kontrak_premium: 0, kontrak_emas: 0 };

            // --- C. INDEX LOGIN (FB1) ---
            const targetIndex = (data.role === 'adventurer') ? 'adventurer_index' : 'requester_index';
            const indexData = {
                id_adv: data.id_adv, 
                nickname: data.nickname, 
                password: data.password,
                role: data.role, 
                kategori: targetKategori, 
                area_tugas: targetDomisili, 
                shard_id: "FB2_RUNNER",
                is_banned: false
            };

            // EKSEKUSI TRANSMISI
            await Promise.all([
                db1.ref(`${targetIndex}/${idAdv}`).set(indexData), // Index FB1
                db2.ref(`adventurer-${targetDomisili}/Umum/${idAdv}`).set(identitasLama), // Identitas FB2
                db2.ref(`adventurer_profile/${idAdv}`).set(t_profile),
                db2.ref(`adventurer_experience/${idAdv}`).set(t_experience),
                db2.ref(`adventurer_reputation/${idAdv}`).set(t_reputation),
                db2.ref(`adventurer_judge/${idAdv}`).set(t_judge),
                db2.ref(`adventurer_inventory/${idAdv}`).set(t_inventory),
                db2.ref(`adventurer_coxin/${idAdv}`).set(t_coxin),
                db2.ref(`adventurer_diagram/${idAdv}`).set(t_diagram),
                db2.ref(`adventurer_contracts/${idAdv}`).set(t_contracts),
                db1.ref(`register_pending/${idAdv}`).remove() // Hapus dari antrean
            ]);

            showAlert(`BERHASIL!\n\nKarakter ${data.nickname.toUpperCase()} telah dibangkitkan.\n9 Tabel Gamifikasi telah dicetak di FB2.`, "TRANSMISI SUKSES");
        } catch (e) { 
            console.error(e); 
            showAlert("Terjadi kesalahan sinkronisasi database: " + e.message, "GAGAL KRITIKAL"); 
        }
    }

    async function tolakUser(idAdv) {
        if (!confirm("Hapus data pendaftaran ini secara permanen?")) return;
        try {
            await db1.ref(`register_pending/${idAdv}`).remove();
        } catch (e) { console.error(e); }
    }

    // ==========================================
    // 3. FUNGSI KONTROL SISTEM (MAINTENANCE, SCAN, BAN)
    // ==========================================
    async function scanSystem() {
        try {
            const [sMisi, sBids, sKontrak] = await Promise.all([
                db1.ref('misi_index').once('value'), 
                db4.ref('bids').once('value'), 
                db5.ref('kontrak_detail').once('value')
            ]);
            document.getElementById('valMisi').innerText = sMisi.numChildren() || 0;
            document.getElementById('valBids').innerText = sBids.numChildren() || 0;
            document.getElementById('valKontrak').innerText = sKontrak.numChildren() || 0;
        } catch (e) { console.error(e); }
    }

    async function cleanOrphanBids() {
        if (!confirm("Sapu bersih sinyal bids tanpa misi induk?")) return;
        const bidsSnap = await db4.ref('bids').once('value');
        if (!bidsSnap.exists()) return showAlert("Radar bersih. Tidak ada residu.", "INFO");
        
        let count = 0;
        for (let mid in bidsSnap.val()) {
            const idx = await db1.ref(`misi_index/${mid}`).once('value');
            if (!idx.exists()) { 
                await db4.ref(`bids/${mid}`).remove(); 
                count++; 
            }
        }
        showAlert(`Pembersihan residu selesai:\n${count} Sinyal Bids mati telah dihapus.`, "LAPORAN RADAR");
        scanSystem();
    }

    async function banUser() {
        const uid = document.getElementById('targetUid').value.trim();
        if (!uid) return showAlert("Masukkan ID_ADV User terlebih dahulu!", "ERROR");
        if (!confirm(`Eksekusi BANNED pada UID: ${uid} ?`)) return;
        
        try {
            await db1.ref(`adventurer_index/${uid}`).update({ is_banned: true });
            showAlert(`User [${uid}] telah diputus aksesnya dari sistem secara permanen.`, "BANNED SUKSES");
            document.getElementById('targetUid').value = '';
        } catch (e) {
            showAlert("Gagal melakukan Banned: " + e.message, "ERROR");
        }
    }

    async function toggleMaintenance() {
        if (!confirm("Ubah status Mode Perbaikan Database?")) return;
        try {
            const snap = await db1.ref('system_config/is_maintenance').once('value');
            const next = !snap.val();
            await db1.ref('system_config').update({ is_maintenance: next });
            location.reload();
        } catch(e) { console.error(e); }
    }

    // Load status Maintenance
    db1.ref('system_config/is_maintenance').once('value').then(snap => {
        const btn = document.getElementById('btnMaint');
        if (snap.val()) {
            btn.innerText = "MODE PERBAIKAN: ON"; 
            btn.style.background = "var(--neon-red)"; 
            btn.style.color = "white";
        }
    });

    // Auto-scan saat pertama kali load
    setTimeout(scanSystem, 1000);
</script>
</body>
</html>
