<style>
    .nota-page {
        padding: 25px;
        padding-bottom: 120px;
        min-height: 100vh;
        background: var(--dark-bg);
        animation: fadeIn 0.5s ease;
    }

    .nota-paper {
        background: #fff;
        color: #000;
        padding: 30px 20px;
        border-radius: 4px;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        font-family: 'JetBrains Mono', monospace;
    }

    /* Efek Potongan Kertas di Bawah */
    .nota-paper::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 0;
        width: 100%;
        height: 10px;
        background: linear-gradient(-45deg, transparent 5px, #fff 5px), 
                    linear-gradient(45deg, transparent 5px, #fff 5px);
        background-size: 10px 10px;
    }

    .nota-header {
        text-align: center;
        border-bottom: 2px dashed #000;
        padding-bottom: 20px;
        margin-bottom: 20px;
    }

    .nota-logo {
        font-weight: 900;
        font-size: 18px;
        letter-spacing: -1px;
    }

    .nota-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 12px;
    }

    .nota-divider {
        border-top: 1px dashed #ccc;
        margin: 15px 0;
    }

    .nota-total-box {
        background: #000;
        color: #fff;
        padding: 15px;
        text-align: center;
        margin-top: 20px;
        border-radius: 4px;
    }

    .total-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }
    .total-amount { font-size: 20px; font-weight: 900; display: block; }

    .status-stamp {
        border: 3px solid #000;
        color: #000;
        padding: 5px 15px;
        display: inline-block;
        transform: rotate(-10deg);
        font-weight: 900;
        margin-top: 20px;
        opacity: 0.8;
    }

    .btn-save-nota {
        width: 100%;
        margin-top: 40px;
        padding: 15px;
        background: var(--neon-blue);
        color: #000;
        border: none;
        border-radius: 12px;
        font-weight: 900;
        font-size: 13px;
        cursor: pointer;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

<div class="nota-page">
    <div class="nota-paper" id="nota-content">
        <div class="nota-header">
            <div class="nota-logo">SOVEREIGN GUILD</div>
            <div style="font-size: 9px; margin-top: 5px;">OFFICIAL MISSION REPORT</div>
        </div>

        <div class="nota-row">
            <span>CONTRACT ID</span>
            <span id="n-contract-id">---</span>
        </div>
        <div class="nota-row">
            <span>DATE</span>
            <span id="n-date">---</span>
        </div>
        <div class="nota-row">
            <span>CATEGORY</span>
            <span id="n-category">---</span>
        </div>

        <div class="nota-divider"></div>

        <div class="nota-row">
            <span>ADVENTURER</span>
            <span id="n-adv-name">---</span>
        </div>
        <div class="nota-row">
            <span>REQUESTER</span>
            <span id="n-req-name">---</span>
        </div>

        <div class="nota-divider"></div>

        <div class="nota-row">
            <span>BASE REWARD</span>
            <span id="n-base-reward">Rp 0</span>
        </div>
        <div class="nota-row">
            <span>TAX/GUILD FEE</span>
            <span>Rp 0</span>
        </div>

        <div class="nota-total-box">
            <span class="total-label">Final Payout / Cost</span>
            <span class="total-amount" id="n-final-amount">Rp 0</span>
        </div>

        <div style="text-align: center;">
            <div class="status-stamp" id="n-status">PAID & CLOSED</div>
        </div>

        <div style="font-size: 8px; text-align: center; margin-top: 30px; opacity: 0.5;">
            Thank you for using Sovereign Guild services.<br>
            Authentication Hash: <span id="n-hash">---</span>
        </div>
    </div>

    <button class="btn-save-nota" onclick="window.print()">
        <i class="fa-solid fa-download"></i> SIMPAN SEBAGAI DOKUMEN
    </button>
</div>

<script>
    window.initNotaModule = function() {
        console.log("📄 Nota Module: Generating Report...");
        
        const state = window.SovereignState;
        const data = state.currentMissionData;
        
        if (!data || !data.mission) return;

        const m = data.mission;
        const detail = m.full_mission_data || {};

        document.getElementById('n-contract-id').innerText = state.activeContractId || "UNKNOWN";
        document.getElementById('n-date').innerText = new Date().toLocaleDateString();
        document.getElementById('n-category').innerText = (detail.category || m.category || "GENERAL").toUpperCase();
        
        document.getElementById('n-adv-name').innerText = m.adventurer_nick || "---";
        document.getElementById('n-req-name').innerText = detail.client_name || "---";
        
        const reward = m.reward || 0;
        document.getElementById('n-base-reward').innerText = "Rp " + Number(reward).toLocaleString();
        document.getElementById('n-final-amount').innerText = "Rp " + Number(reward).toLocaleString();
        
        // Buat hash dummy untuk estetika
        document.getElementById('n-hash').innerText = Math.random().toString(36).substring(2, 15).toUpperCase();
        
        if (typeof updateAI === 'function') {
            updateAI("Laporan misi telah diterbitkan.", "success");
        }
    };

    // Jalankan init
    initNotaModule();
</script>
