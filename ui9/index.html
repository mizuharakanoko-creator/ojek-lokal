<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>SOVEREIGN - GATEWAY</title>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 10px; border: 1px solid #333; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #00ffff; text-shadow: 0 0 10px #00ffff; letter-spacing: 3px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; background: transparent; border: 2px solid; cursor: pointer; color: white; font-weight: bold; font-size: 16px; border-radius: 5px; transition: 0.3s; }
        .btn-quest { border-color: #00ffff; }
        .btn-quest:hover { background: #00ffff; color: #000; }
        .btn-login { border-color: #ffaa00; }
        .btn-login:hover { background: #ffaa00; color: #000; }
        #status { color: #ff0055; font-size: 12px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>SOVEREIGN</h1>
    <p style="color:#888; font-size: 12px; margin-bottom:30px;">Pilih jalur akses Anda</p>

    <button class="btn btn-quest" onclick="masukSebagaiQuest()">CARI JASA (QUEST)</button>
    
    <button class="btn btn-login" onclick="masukKeLogin()">MASUK / DRIVER</button>

    <div id="status">STERILISASI SISTEM BERJALAN...</div>
</div>

<script>
    // Langsung hapus apapun yang ada saat halaman ini dibuka pertama kali
    window.onload = function() {
        Clearchance.nuclearWipe();
    };

    function masukSebagaiQuest() {
        document.getElementById('status').style.display = "block";
        
        // Buat identitas Guest sekali pakai
        const guestData = {
            uid: "GUEST-" + Date.now(),
            nick: "Quest-" + Math.floor(Math.random() * 9000),
            role: "quest",
            zone: "KUNINGAN" // Default zona untuk guest
        };
        
        // Simpan ke Session Storage (bukan Local Storage, biar hilang pas tab ditutup)
        sessionStorage.setItem('pickme_user', JSON.stringify(guestData));
        
        setTimeout(() => {
            window.location.href = "publish.html"; // Langsung lempar ke pembuatan misi
        }, 800);
    }

    function masukKeLogin() {
        document.getElementById('status').style.display = "block";
        setTimeout(() => {
            window.location.href = "login.html"; // Lempar ke form login
        }, 800);
    }
</script>

</body>
</html>
