<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MISSION PROGRESS | SOVEREIGN GUILD</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --dark-bg: #050508;
            --card-bg: rgba(10, 10, 15, 0.95);
            --border-glow: rgba(0, 242, 255, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: row; /* Flex row agar konten utama dan menu bisa berdampingan jika perlu */
            overflow: hidden;
        }

        /* Container Utama */
        .main-content {
            flex: 1;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .tab-pane {
            display: none;
            height: 100%;
            width: 100%;
            overflow-y: auto;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Floating Bubble Navigation (Kanan Layar) */
        .bubble-nav {
            position: fixed;
            right: 15px;
            bottom: 30px; /* Posisi dekat jempol */
            display: flex;
            flex-direction: column-reverse; /* Urutan dari bawah ke atas */
            gap: 15px;
            z-index: 5000;
        }

        .bubble-link {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Tooltip Nama Menu */
        .bubble-link::before {
            content: attr(data-label);
            position: absolute;
            right: 70px;
            background: var(--neon-blue);
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: 0.3s;
            pointer-events: none;
            text-transform: uppercase;
        }

        .bubble-link:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        .bubble-link.active {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 20px var(--border-glow);
            transform: scale(1.1);
        }

        .bubble-link i { transition: 0.3s; }
        .bubble-link.active i { transform: scale(1.2); }

        /* Khusus Warna Berbeda untuk Tiap Role/Fungsi */
        .bubble-link[data-label="NOTA"] { border-color: rgba(0, 255, 136, 0.3); }
        .bubble-link[data-label="NOTA"].active { color: #00ff88; border-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }

        /* Loader */
        #master-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-circle { width: 50px; height: 50px; border: 2px solid var(--border-glow); border-top: 2px solid var(--neon-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="master-loader">
        <div class="loader-circle"></div>
        <p style="margin-top: 15px; font-size: 10px; letter-spacing: 2px; color: var(--neon-blue);">RECALIBRATING INTERFACE...</p>
    </div>

    <main class="main-content">
        <div id="tab-hq" class="tab-pane active"></div>
        <div id="tab-maps" class="tab-pane"></div>
        <div id="tab-comms" class="tab-pane"></div>
        <div id="tab-profile" class="tab-pane"></div>
        </main>

    <nav class="bubble-nav">
        <div class="bubble-link active" data-label="HQ" onclick="switchTab('tab-hq', 'fet_missioncardhq.html', this)">
            <i class="fa-solid fa-house-chimney"></i>
        </div>
        <div class="bubble-link" data-label="MAPS" onclick="switchTab('tab-maps', 'fet_maps_view_location.html', this)">
            <i class="fa-solid fa-map-location-dot"></i>
        </div>
        <div class="bubble-link" data-label="COMMS" onclick="switchTab('tab-comms', 'fet_comms_peer.html', this)">
            <i class="fa-solid fa-comment-dots"></i>
        </div>
        <div class="bubble-link" data-label="NOTA" onclick="window.showGlobalNota()">
            <i class="fa-solid fa-file-invoice-dollar"></i>
        </div>
        <div class="bubble-link" data-label="PROFILE" onclick="window.showPartnerProfile()">
            <i class="fa-solid fa-user-shield"></i>
        </div>
    </nav>

    <div id="modal-rating-container"></div>
    <div id="modal-profile-container"></div>
    <div id="nota-report-container"></div>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA",
            authDomain: "PROJECT_ID.firebaseapp.com",
            projectId: "PROJECT_ID",
            storageBucket: "PROJECT_ID.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();





        // --- TAMBAHKAN LOGIC PENDUKUNG DI SINI ---

// 1. Fungsi Identitas (Agar sistem tahu siapa yang login)
window.Clearchance = {
    enforceIdentity: () => {
        // Mengambil data user dari sessionStorage yang biasanya diisi saat login
        const saved = sessionStorage.getItem('user_data');
        if (saved) return JSON.parse(saved);
        // Fallback jika tidak ada (untuk testing)
        return { role: 'adventurer', uid: 'USER_ID_ASLI', name: 'User' };
    }
};

// 2. Fungsi Ambil Data Asli (Mining Data)
window.getSupremeData = async (contractId) => {
    try {
        // Ambil data misi dari Firestore secara real-time
        const doc = await db.collection('contracts').doc(contractId).get();
        if (!doc.exists) throw new Error("Kontrak tidak ditemukan di database");
        
        const data = doc.data();
        // Return struktur yang diharapkan oleh komponen HQ
        return {
            mission: data,
            adventurer: data.adventurer_data || {},
            requester: data.requester_data || {}
        };
    } catch (err) {
        console.error("Mining Error:", err);
        // Jika gagal ke firestore, coba ambil dari session storage
        return JSON.parse(sessionStorage.getItem('current_mission_full'));
    }
};

// 3. Fungsi Get Terminal (Jika Anda menggunakan Realtime Database untuk status OTW)
window.getTerminal = (type) => {
    if (type === 'FB5_DEAL') {
        // Pastikan Anda sudah mengaktifkan Firebase Realtime Database di Firebase Console
        return firebase.database(); 
    }
    return null;
};

// 4. Perbaikan Typo Maps (PENTING)
// Pastikan di file fet_missioncardhq.html, baris window.open menggunakan `${...}` bukan `{...}`



        
        // 2. COMPONENT LOADER
        async function fetchComponent(containerId, filePath) {
    const container = document.getElementById(containerId);
    if (container.innerHTML.trim() !== "") return;

    try {
        const response = await fetch(filePath);
        const html = await response.text();
        container.innerHTML = html;

        const scripts = container.querySelectorAll("script");
        for (const oldScript of scripts) {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            container.appendChild(newScript); // Masukkan ke container agar tereksitasi
        }
        
        // PASTI KAN FUNGSI INIT DIPANGGIL SETELAH SCRIPT TERMUAT
        if (containerId === 'tab-hq' && typeof initHQModule === 'function') {
            setTimeout(initHQModule, 100); 
        }
    } catch (err) { console.error(err); }
}


        // 3. TAB LOGIC
        function switchTab(tabId, fileName, element) {
            // Animasi Haptic sederhana
            if(navigator.vibrate) navigator.vibrate(10);

            document.querySelectorAll('.bubble-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            
            element.classList.add('active');
            const targetPane = document.getElementById(tabId);
            if(targetPane) targetPane.classList.add('active');

            fetchComponent(tabId, fileName);
        }

        // 4. INITIAL BOOTSTRAP
        window.onload = async () => {
            // Load Default Tab
            await fetchComponent('tab-hq', 'fet_missioncardhq.html');
            
            // Background Loading untuk Modals & Nota
            fetchComponent('modal-rating-container', 'fet_modalrating.html');
            fetchComponent('modal-profile-container', 'fet_modalshowprofile.html');
            fetchComponent('nota-report-container', 'fet_nota_report.html');

            // Fade out loader
            setTimeout(() => {
                const loader = document.getElementById('master-loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }, 800);
        };
    </script>
</body>
</html>
