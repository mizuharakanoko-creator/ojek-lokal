<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Mission Progress</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        /* === BASE THEME === */
        body { background: #050505; color: white; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* === HEADER & PROGRESS === */
        .mission-header { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #333; position: relative; z-index: 10; }
        .progress-bar { height: 4px; background: #1a1a1a; width: 100%; margin-top: 10px; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff00, #008800); width: 65%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px #00ff00; }

        /* === MAIN CONTENT === */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 180px; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        /* === RATING SYSTEM (EXPANDABLE) === */
        .rating-container { background: #0d0d0d; border: 1px solid #222; border-radius: 8px; margin-top: 20px; overflow: hidden; transition: 0.4s; }
        .rating-header { background: #151515; padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #222; }
        .rating-body { padding: 15px; display: none; animation: slideDown 0.3s ease-out; }
        .rating-body.active { display: block; }
        
        .rating-row { margin-bottom: 15px; }
        .rating-label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .star-row { display: flex; gap: 8px; }
        .star { font-size: 22px; color: #222; cursor: pointer; transition: 0.2s; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .star.active { color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5); }
        
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 12px; margin-top: 10px; resize: none; border-radius: 4px; }

        /* === COMM-LINK PANEL (CHAT) === */
        #chatPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #0a0a0a; border-top: 2px solid #00ffff; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; z-index: 1000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 -10px 30px rgba(0, 255, 255, 0.1); }
        #chatPanel.open { transform: translateY(0); }
        
        .chat-header { background: #001a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #004444; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 4px; max-width: 80%; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #004444; color: #00ffff; border-left: 2px solid #00ffff; }
        .msg.them { align-self: flex-start; background: #1a1a1a; color: #ccc; border-left: 2px solid #555; }
        
        .chat-input-area { padding: 15px; background: #050505; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .chat-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; cursor: pointer; }
        .chat-send { background: #00ffff; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; }

        /* === FIXED ACTIONS === */
        .action-zone { position: fixed; bottom: 20px; left: 0; width: 100%; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
        .btn-main { pointer-events: auto; width: 100%; padding: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-finish { background: #00ff00; color: #000; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .btn-nav { background: #0044ff; color: #fff; box-shadow: 0 0 15px rgba(0, 68, 255, 0.3); }
        .btn-wa { background: #25d366; color: #fff; opacity: 0.4; cursor: not-allowed; }
        
        /* Floating Chat Trigger */
        .chat-trigger { position: fixed; bottom: 170px; left: 20px; background: #00ffff; color: #000; border: none; border-radius: 50%; width: 55px; height: 55px; font-weight: bold; z-index: 99; box-shadow: 0 0 15px #00ffff; cursor: pointer; pointer-events: auto; }

        /* === SOVEREIGN MODAL === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: #0a0a0a; border: 1px solid #00ffff; padding: 20px; width: 100%; max-width: 320px; text-align: center; }
        .modal-box.danger { border-color: #ff4444; }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="mission-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <span id="mId" style="font-size: 10px; color: #555; display: block;">ID: LOAD...</span>
            <b id="missionTitle" style="color: #00ffff; font-size: 14px;">ON-GOING MISSION</b>
        </div>
        <div style="text-align: right;">
            <span style="color: #00ff00; font-size: 10px; display: block;">• SIGNAL ACTIVE</span>
            <span id="clock" style="font-size: 12px;">00:00:00</span>
        </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
</div>

<div class="content">
    <div id="missionDetail" style="background: #0d0d0d; padding: 15px; border-left: 3px solid #00ffff;">
        <p id="routeDesc" style="font-size: 13px; margin: 0; color: #e0e0e0;"></p>
        <small id="missionNote" style="color: #666; font-style: italic; margin-top: 5px; display: block;"></small>
    </div>

    <div class="rating-container">
        <div class="rating-header" onclick="toggleRating()">
            <span style="font-size: 12px; font-weight: bold; color: #aaa;" id="ratingLabel">BERI PENILAIAN PARTNER (OPSIONAL)</span>
            <span id="ratingArrow">▼</span>
        </div>
        <div class="rating-body" id="ratingBody">
            <div class="rating-row">
                <span class="rating-label">Ketepatan Waktu / Respon:</span>
                <div class="star-row" data-type="time">
                    <span class="star" onclick="setRating('time', 1)">★</span>
                    <span class="star" onclick="setRating('time', 2)">★</span>
                    <span class="star" onclick="setRating('time', 3)">★</span>
                    <span class="star" onclick="setRating('time', 4)">★</span>
                    <span class="star" onclick="setRating('time', 5)">★</span>
                </div>
            </div>
            <div class="rating-row">
                <span class="rating-label">Kerapihan & Kesopanan:</span>
                <div class="star-row" data-type="attitude">
                    <span class="star" onclick="setRating('attitude', 1)">★</span>
                    <span class="star" onclick="setRating('attitude', 2)">★</span>
                    <span class="star" onclick="setRating('attitude', 3)">★</span>
                    <span class="star" onclick="setRating('attitude', 4)">★</span>
                    <span class="star" onclick="setRating('attitude', 5)">★</span>
                </div>
            </div>
            <textarea id="reviewText" placeholder="Berikan ulasan singkat untuk meningkatkan reputasi mitra..."></textarea>
        </div>
    </div>
</div>

<div id="chatPanel">
    <div class="chat-header">
        <b style="color: #00ffff; letter-spacing: 2px;">COMM-LINK: ACTIVE</b>
        <button onclick="toggleChat()" style="background:none; border:none; color:#ff4444; font-weight:bold;">[ CLOSE ]</button>
    </div>
    <div class="chat-msgs" id="chatMsgs">
        <div class="msg them">Sistem: Jalur komunikasi terenkripsi telah dibuka.</div>
    </div>
    <div class="chat-input-area">
        <button class="chat-btn" onclick="alert('Kamera dikunci')">📷</button>
        <button class="chat-btn" onclick="quickChat()">⚡</button>
        <input type="text" id="msgInput" placeholder="Ketik pesan..." style="flex:1; background:#111; border:1px solid #333; color:#fff; padding:10px;">
        <button class="chat-send" onclick="sendMsg()">></button>
    </div>
</div>

<button class="chat-trigger" onclick="toggleChat()">CHAT</button>

<div class="action-zone">
    <div id="roleActions"></div>
</div>

<div id="sovModal" class="modal-overlay">
    <div class="modal-box" id="sovModalBox">
        <h3 id="sovModalTitle" style="color: #00ffff; margin-top: 0;">ALERT</h3>
        <p id="sovModalMsg" style="font-size: 12px; color: #888; margin-bottom: 20px;"></p>
        <div id="sovModalBtns" style="display: flex; justify-content: center; gap: 10px;"></div>
    </div>
</div>

<script>
    const user = Clearchance.enforceIdentity();
    const contractId = sessionStorage.getItem('active_contract_id');
    const mission = JSON.parse(sessionStorage.getItem('current_mission_full'));

    const dealDB = getTerminal('FB5_DEAL');
    const boardDB = getTerminal('FB4_BOARD');
    const masterDB = getTerminal('FB1_MASTER');

    let ratings = { time: 0, attitude: 0 };

    function init() {
        document.getElementById('mId').innerText = `ID: ${mission.id_misi}`;
        document.getElementById('routeDesc').innerText = `${mission.origin_desa} (${mission.origin_name}) ➔ ${mission.dest_desa}`;
        document.getElementById('missionNote').innerText = mission.catatan || "Tidak ada instruksi tambahan.";
        
        renderButtons();
        listenStatus();
        startTime();
    }

    // === UI UTILS ===
    function startTime() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);
    }

    function toggleRating() {
        const body = document.getElementById('ratingBody');
        const arrow = document.getElementById('ratingArrow');
        body.classList.toggle('active');
        arrow.innerText = body.classList.contains('active') ? '▲' : '▼';
    }

    function setRating(type, val) {
        ratings[type] = val;
        const row = document.querySelector(`.star-row[data-type="${type}"]`);
        const stars = row.querySelectorAll('.star');
        stars.forEach((s, i) => s.classList.toggle('active', i < val));
    }

    function toggleChat() {
        document.getElementById('chatPanel').classList.toggle('open');
    }

    function quickChat() {
        const msg = prompt("Pesan Cepat: 1. OTW, 2. Sampai, 3. Ada kendala");
        const map = { "1": "Saya sedang menuju lokasi.", "2": "Saya sudah sampai di titik koordinat.", "3": "Maaf, ada sedikit kendala di jalur." };
        if (map[msg]) {
            document.getElementById('msgInput').value = map[msg];
            sendMsg();
        }
    }

    // === SOVEREIGN MODAL ENGINE ===
    function showSovAlert(title, msg, type = 'normal') {
        const modal = document.getElementById('sovModal');
        const box = document.getElementById('sovModalBox');
        document.getElementById('sovModalTitle').innerText = title;
        document.getElementById('sovModalMsg').innerText = msg;
        box.className = 'modal-box ' + (type === 'danger' ? 'danger' : '');
        
        const btnArea = document.getElementById('sovModalBtns');
        btnArea.innerHTML = `<button class="btn-main" style="width:auto; padding:10px 30px; margin:0;" onclick="closeSovModal()">MENGERTI</button>`;
        modal.style.display = 'flex';
    }

    function showSovConfirm(title, msg, onConfirm) {
        const modal = document.getElementById('sovModal');
        document.getElementById('sovModalTitle').innerText = title;
        document.getElementById('sovModalMsg').innerText = msg;
        
        const btnArea = document.getElementById('sovModalBtns');
        btnArea.innerHTML = `
            <button class="btn-main" style="width:auto; background:#333; color:#fff; margin:0;" onclick="closeSovModal()">BATAL</button>
            <button class="btn-main" style="width:auto; background:#00ff00; color:#000; margin:0;" id="btnSovYes">KONFIRMASI</button>
        `;
        modal.style.display = 'flex';
        document.getElementById('btnSovYes').onclick = () => { closeSovModal(); onConfirm(); };
    }

    function closeSovModal() { document.getElementById('sovModal').style.display = 'none'; }

    // === CORE LOGIC ===
    function renderButtons() {
        const area = document.getElementById('roleActions');
        if (user.role === 'adventurer') {
            area.innerHTML = `
                <button class="btn-main btn-nav" onclick="openGmaps()">PELACAKAN NAVIGASI (GMAPS)</button>
                <div style="font-size:9px; color:#555; text-align:center; padding-bottom:10px;">MENUNGGU REQUESTER MENUTUP KONTRAK</div>
            `;
        } else {
            area.innerHTML = `
                <button class="btn-main btn-wa" disabled>HUBUNGI VIA WA (LOCKED)</button>
                <button class="btn-main btn-finish" onclick="checkRatingBeforeFinish()">KONFIRMASI SELESAI & BAYAR</button>
            `;
        }
    }

    function openGmaps() {
        const coords = mission.origin_coords || mission.coords;
        if (!coords) return showSovAlert("SISTEM ERROR", "Koordinat lokasi tidak ditemukan.", "danger");
        window.open(`https://www.google.com/maps/search/?api=1&query=${coords}`, '_blank');
    }

    function checkRatingBeforeFinish() {
        if (ratings.time === 0 || ratings.attitude === 0) {
            showSovConfirm("RATING KOSONG", "Anda belum memberikan penilaian penuh. Tetap selesaikan misi?", () => finishMission());
        } else {
            showSovConfirm("SELESAIKAN MISI", "Adventurer akan menerima bayaran dan kontrak akan ditutup. Lanjutkan?", () => finishMission());
        }
    }

    async function finishMission() {
        try {
            // 1. Kirim Rating & Close Contract di FB5
            await dealDB.ref(`kontrak_detail/${contractId}`).update({
                status: 'completed',
                ratings: ratings, // Menyimpan rating spesifik
                review: document.getElementById('reviewText').value,
                end_at: Date.now()
            });

            // 2. Update Buku Induk di FB1
            await masterDB.ref(`buku_induk/misi/${mission.id_misi}`).update({
                status: 'completed',
                finish_timestamp: Date.now()
            });

            showSovAlert("SUKSES", "Misi telah berhasil diarsipkan.");
        } catch (e) {
            showSovAlert("KEGAGALAN SISTEM", e.message, "danger");
        }
    }

    function listenStatus() {
        dealDB.ref(`kontrak_detail/${contractId}/status`).on('value', snap => {
            if (snap.val() === 'completed') {
                setTimeout(() => {
                    Clearchance.clearActiveMission();
                    window.location.href = "index.html";
                }, 2000);
            }
        });
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        const chatMsgs = document.getElementById('chatMsgs');
        const div = document.createElement('div');
        div.className = 'msg me';
        div.innerText = input.value;
        chatMsgs.appendChild(div);
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
        input.value = "";
        // Logika pengiriman chat ke Firebase bisa ditambahkan di sini jika diperlukan
    }

    init();
</script>

</body>
</html>
