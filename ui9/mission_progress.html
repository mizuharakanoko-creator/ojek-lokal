<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Mission Progress</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header Info */
        .mission-header { padding: 15px; background: #111; border-bottom: 1px solid #333; }
        .progress-bar { height: 4px; background: #222; width: 100%; margin-top: 10px; }
        .progress-fill { height: 100%; background: #00ff00; width: 50%; transition: 0.5s; }

        /* Main Content Area */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; } /* Padding bottom agar tombol tidak tertutup */
        
        /* Rating Section */
        .rating-box { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .star-row { display: flex; gap: 10px; margin: 10px 0; }
        .star { font-size: 24px; color: #444; cursor: pointer; }
        .star.active { color: #ffaa00; }

        /* Floating Chat Tool */
        #chatPanel { position: fixed; bottom: 150px; right: 20px; width: 250px; background: #111; border: 1px solid #00ffff; border-radius: 8px; display: none; flex-direction: column; z-index: 100; }
        .chat-header { background: #004444; padding: 8px; font-size: 12px; display: flex; justify-content: space-between; }
        .chat-msgs { height: 150px; overflow-y: auto; padding: 10px; font-size: 11px; }
        
        /* Action Buttons (Safe Zone: ~5cm dari bawah disimulasikan dengan margin/padding) */
        .action-fixed { position: fixed; bottom: 80px; left: 0; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .btn-finish { background: #00ff00; color: #000; }
        .btn-nav { background: #0044ff; color: #fff; }
        .btn-wa { background: #25d366; color: #fff; opacity: 0.5; cursor: not-allowed; } /* Locked */
    </style>
</head>
<body>

<div class="mission-header">
    <div style="display: flex; justify-content: space-between; font-size: 12px;">
        <span id="mId">ID: Loading...</span>
        <span style="color: #00ff00;">STATUS: ON-PROGRESS</span>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<div class="content">
    <div id="missionDetail">
        <h3 style="margin: 0; color: #ffaa00;">Sedang Berlangsung...</h3>
        <p id="routeDesc" style="font-size: 13px; color: #aaa;"></p>
    </div>

    <div class="rating-box">
        <b id="ratingTitle">Penilaian untuk Mitra:</b>
        <div class="star-row">
            <span class="star" onclick="setStar(1)">★</span>
            <span class="star" onclick="setStar(2)">★</span>
            <span class="star" onclick="setStar(3)">★</span>
            <span class="star" onclick="setStar(4)">★</span>
            <span class="star" onclick="setStar(5)">★</span>
        </div>
        <textarea id="reviewText" placeholder="Catatan tambahan (opsional)..." style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:5px; box-sizing:border-box;"></textarea>
    </div>
</div>

<div id="chatPanel">
    <div class="chat-header">
        <span>COMM-LINK</span>
        <span onclick="toggleChat()" style="cursor:pointer;">[ _ ]</span>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div style="display: flex; padding: 5px;">
        <input type="text" id="msgInput" style="flex:1; background:#000; color:#fff; border:1px solid #333;">
        <button onclick="sendLocalChat()" style="background:#00ffff; border:none;">></button>
    </div>
</div>

<button onclick="toggleChat()" style="position:fixed; bottom:160px; left:20px; background:#00ffff; border:none; border-radius:50%; width:50px; height:50px; font-weight:bold; z-index:99;">CHAT</button>

<div class="action-fixed">
    <div id="roleActions"></div>
</div>

<script>
    const user = Clearchance.enforceIdentity();
    const contractId = sessionStorage.getItem('active_contract_id');
    const mission = JSON.parse(sessionStorage.getItem('current_mission_full'));

    const dealDB = getTerminal('FB5_DEAL');
    const boardDB = getTerminal('FB4_BOARD');
    const masterDB = getTerminal('FB1_MASTER');

    let currentRating = 0;

    function init() {
        document.getElementById('mId').innerText = `ID: ${mission.id_misi}`;
        document.getElementById('routeDesc').innerText = `${mission.origin_desa} (${mission.origin_name}) ➔ ${mission.dest_desa}`;
        document.getElementById('ratingTitle').innerText = user.role === 'requester' ? "Nilai Adventurer:" : "Nilai Requester:";
        
        renderButtons();
        listenStatus();
    }

    function renderButtons() {
        const area = document.getElementById('roleActions');
        if (user.role === 'adventurer') {
            area.innerHTML = `
                <button class="btn-main btn-nav" onclick="openGmaps()">BUKA TRACKING (GMAPS)</button>
                <div style="font-size:10px; color:#555; text-align:center; margin-bottom:5px;">Hanya Requester yang bisa menyelesaikan</div>
            `;
        } else {
            area.innerHTML = `
                <button class="btn-main btn-wa" onclick="alert('Fitur dikunci sampai update selanjutnya')">HUBUNGI VIA WA (LOCKED)</button>
                <button class="btn-main btn-finish" onclick="finishMission()">KONFIRMASI SELESAI & KIRIM NILAI</button>
            `;
        }
    }

    function openGmaps() {
        // Asumsi coords format: "-6.123,106.123"
        const coords = mission.origin_coords || mission.coords;
        window.open(`https://www.google.com/maps/search/?api=1&query=${coords}`, '_blank');
    }

    function setStar(n) {
        currentRating = n;
        const stars = document.querySelectorAll('.star');
        stars.forEach((s, i) => {
            s.classList.toggle('active', i < n);
        });
    }

    function toggleChat() {
        const p = document.getElementById('chatPanel');
        p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
    }

    async function finishMission() {
        if (currentRating === 0) return alert("Harap berikan rating bintang!");
        if (!confirm("Akhiri misi dan kirim pembayaran?")) return;

        try {
            // 1. Kirim Rating & Close Contract di FB5
            await dealDB.ref(`kontrak_detail/${contractId}`).update({
                status: 'completed',
                rating: currentRating,
                review: document.getElementById('reviewText').value,
                end_at: Date.now()
            });

            // 2. Update Buku Induk di FB1
            await masterDB.ref(`buku_induk/misi/${mission.id_misi}`).update({
                status: 'completed',
                finish_timestamp: Date.now()
            });

            // 3. Notifikasi sukses ditangkap oleh listener status
        } catch (e) {
            alert("Gagal: " + e.message);
        }
    }

    function listenStatus() {
        dealDB.ref(`kontrak_detail/${contractId}/status`).on('value', snap => {
            if (snap.val() === 'completed') {
                alert("MISI SELESAI! Menghapus memori sesi...");
                Clearchance.clearActiveMission();
                window.location.href = "index.html"; // Atau ke history
            }
        });
    }

    init();
</script>

</body>
</html>
