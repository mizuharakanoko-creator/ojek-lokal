<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLEFIELD | SOVEREIGN HUB</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal_router.js"></script>
    <script src="router_lokal.js"></script>
    <script src="clearchance.js"></script>

    <style>
        :root[data-theme="dark"] {
            --bg-main: #050508; 
            --bg-glass: rgba(10, 10, 15, 0.85);
            --text-main: #ffffff; 
            --neon-blue: #00f3ff; 
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); overflow: hidden; margin: 0; }
        #map { width: 100%; height: 100vh; position: absolute; z-index: 1; }
        [data-theme="dark"] #map { filter: brightness(0.5) invert(1) hue-rotate(180deg); }

        .hud-top, .hud-bottom { position: absolute; left: 0; width: 100%; z-index: 10; padding: 15px; box-sizing: border-box; pointer-events: none; }
        .hud-top { top: 0; background: linear-gradient(to bottom, rgba(5,5,8,0.9), transparent); }
        .hud-bottom { bottom: 0; background: linear-gradient(to top, rgba(5,5,8,0.9), transparent); }
        .hud-top > *, .hud-bottom > * { pointer-events: auto; }

        .info-card { 
            background: var(--bg-glass); backdrop-filter: blur(12px); border: 1px solid var(--neon-blue);
            border-radius: 15px; padding: 12px; display: flex; align-items: flex-start; gap: 12px;
            box-shadow: var(--border-glow); position: relative;
        }
        
        .pfp-container { position: relative; cursor: pointer; }
        .pfp-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover; }
        .pfp-hint { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); font-size: 8px; background: var(--neon-blue); color: #000; padding: 2px 6px; border-radius: 10px; font-weight: bold; white-space: nowrap;}

        .btn-circle { width: 45px; height: 45px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: var(--bg-glass); color: var(--text-main); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-finish { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; margin-top: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-finish.active { background: linear-gradient(45deg, #00b359, var(--neon-green)); color: #000; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        .btn-finish.disabled { background: #1a1a1a; color: #666; border: 1px solid #333; cursor: not-allowed; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-glass); border: 1px solid var(--neon-blue); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }

        /* DEBUG STYLES */
        #debug-btn { position: fixed; top: 10px; right: 10px; z-index: 9999; background: rgba(0, 255, 136, 0.2); color: #0f0; border: 1px solid #0f0; border-radius: 5px; padding: 5px 10px; font-size: 10px; cursor: pointer; pointer-events: auto; }
        #debug-console { position: fixed; inset: 10px; background: rgba(0,0,0,0.95); border: 1px solid var(--neon-green); z-index: 10000; padding: 15px; border-radius: 15px; display: none; flex-direction: column; }
        #debug-text { flex: 1; overflow: auto; font-family: monospace; font-size: 11px; color: #0f0; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="debug-btn" onclick="toggleDebug()">DEBUG DATA</div>

    <div id="debug-console">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
            <span style="color:var(--neon-green); font-weight:bold;">SOVEREIGN_SYSTEM_LOG</span>
            <button onclick="toggleDebug()" style="background:none; border:1px solid #f00; color:#f00; border-radius:4px; padding:2px 8px;">CLOSE</button>
        </div>
        <div id="debug-text"></div>
    </div>

    <div id="map"></div>

    <div class="hud-top">
        <div class="info-card">
            <div class="pfp-container" onclick="openProfileCard()">
                <img id="target-pfp" src="https://via.placeholder.com/100" class="pfp-circle">
                <div class="pfp-hint">TAP INFO</div>
            </div>
            <div style="flex:1;">
                <div id="mission-id" style="font-size:10px; color: #888;">SINKRONISASI...</div>
                <div id="target-name" style="font-weight:bold; font-size:15px;">MEMUAT...</div>
                <div id="target-status" style="font-size:11px; color: var(--neon-blue);"><i class="fa-solid fa-satellite-dish"></i> JALUR AKTIF</div>
                <div id="reward-container"></div>
            </div>
        </div>
    </div>

    <div class="hud-bottom">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="btn-circle" style="flex:1; border-radius: 12px; width: auto;" onclick="alert('Module Standby')">COMMS</button>
            <button class="btn-circle" style="flex:1; border-radius: 12px; width: auto;" onclick="openGmaps()">NAVIGASI</button>
        </div>
        <div id="roleActions"></div>
    </div>

    <script>
        // --- DATA & STATE ---
        const user = Clearchance.enforceIdentity();
        const contractId = sessionStorage.getItem('active_contract_id');
        const mission = JSON.parse(sessionStorage.getItem('current_mission_full') || "{}");
        const dealDB = getTerminal('FB5_DEAL');
        const masterDB = getTerminal('FB1_MASTER');

        let missionData = null;
        let targetProfileData = null;

        // --- DEBUG LOGIC ---
        function toggleDebug() {
            const con = document.getElementById('debug-console');
            const txt = document.getElementById('debug-text');
            if(con.style.display === 'flex') {
                con.style.display = 'none';
            } else {
                con.style.display = 'flex';
                const logData = {
                    SESSION_STORAGE: {
                        active_contract_id: contractId,
                        mission_raw: mission
                    },
                    USER_AUTH: {
                        uid: user.uid,
                        role: user.role
                    },
                    FETCHED_MISSION: missionData,
                    FETCHED_TARGET: targetProfileData
                };
                txt.innerText = JSON.stringify(logData, null, 2);
            }
        }

        window.onload = async () => {
            initMap();
            await performHandshake();
            loadUIInfo();
        };

        async function performHandshake() {
            const idMisi = mission.id_misi || contractId;
            document.getElementById('mission-id').innerText = `ID: ${idMisi}`;

            try {
                // Tarik data misi
                const snapM = await masterDB.ref(`buku_induk/misi/${idMisi}`).once('value');
                if (snapM.exists()) {
                    const idShard = snapM.val().id_shard;
                    const boardDB = getTerminal('FB4_BOARD');
                    const snapD = await boardDB.ref(`missions/${idShard}/${idMisi}`).once('value');
                    if (snapD.exists()) {
                        missionData = snapD.val();
                    }
                }

                // Cari target (lawan bicara)
                const targetUid = user.role === 'adventurer' ? (missionData?.requester_uid || "UNKNOWN") : mission.adv_uid;
                const snapIndex = await masterDB.ref(`${user.role === 'adventurer' ? 'requester_index' : 'adventurer_index'}/${targetUid}`).once('value');
                
                if (snapIndex.exists()) {
                    const snapP = await masterDB.ref(`users/${targetUid}`).once('value');
                    if (snapP.exists()) targetProfileData = snapP.val();
                }
            } catch (e) { console.error(e); }
        }

        function loadUIInfo() {
            if(missionData) {
                document.getElementById('target-name').innerText = missionData.title || "Misi Khusus";
                document.getElementById('reward-container').innerHTML = `<span style="color:var(--neon-green)">${missionData.rpg_reward?.greenStone || 0} STONES</span>`;
            }
            const roleArea = document.getElementById('roleActions');
            if(user.role === 'adventurer') {
                roleArea.innerHTML = `<button class="btn-finish disabled" disabled>MENUNGGU KONFIRMASI...</button>`;
            } else {
                roleArea.innerHTML = `<button class="btn-finish active" onclick="alert('Evaluasi Dibuka')">KONFIRMASI SELESAI</button>`;
            }
        }

        function initMap() {
            const map = L.map('map', { zoomControl: false }).setView([-6.97, 108.48], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function openGmaps() {
            const c = mission.origin_coords || mission.coords;
            if(!c) return;
            window.open(`https://www.google.com/maps?q=${c.lat},${c.lng}`, '_blank');
        }
    </script>
</body>
</html>
