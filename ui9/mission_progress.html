<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLEFIELD | SOVEREIGN HUB</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal_router.js"></script>
    <script src="router_lokal.js"></script>
    <script src="clearchance.js"></script>

    <style>
        /* === TEMA QUANTUM === */
        :root[data-theme="dark"] {
            --bg-main: #050508; 
            --bg-glass: rgba(10, 10, 15, 0.85);
            --text-main: #ffffff; 
            --neon-blue: #00f3ff; 
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); overflow: hidden; margin: 0; user-select: none; }
        
        /* Map Layer */
        #map { width: 100%; height: 100vh; position: absolute; z-index: 1; }
        [data-theme="dark"] #map { filter: brightness(0.5) invert(1) hue-rotate(180deg); }

        /* Floating HUD */
        .hud-top, .hud-bottom { position: absolute; left: 0; width: 100%; z-index: 10; padding: 15px; box-sizing: border-box; pointer-events: none; }
        .hud-top { top: 0; background: linear-gradient(to bottom, rgba(5,5,8,0.9), transparent); }
        .hud-bottom { bottom: 0; background: linear-gradient(to top, rgba(5,5,8,0.9), transparent); }
        .hud-top > *, .hud-bottom > * { pointer-events: auto; }

        /* Info Card */
        .info-card { 
            background: var(--bg-glass); backdrop-filter: blur(12px); border: 1px solid var(--neon-blue);
            border-radius: 15px; padding: 12px; display: flex; align-items: flex-start; gap: 12px;
            box-shadow: var(--border-glow); position: relative;
        }
        
        .pfp-container { position: relative; cursor: pointer; }
        .pfp-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover; }
        .pfp-hint { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); font-size: 8px; background: var(--neon-blue); color: #000; padding: 2px 6px; border-radius: 10px; font-weight: bold; white-space: nowrap;}

        /* Action Buttons */
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: var(--bg-glass); color: var(--text-main); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-circle:hover { border-color: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
        
        .btn-finish { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; margin-top: 10px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-finish.active { background: linear-gradient(45deg, #00b359, var(--neon-green)); color: #000; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        .btn-finish.disabled { background: #1a1a1a; color: #666; border: 1px solid #333; cursor: not-allowed; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-glass); border: 1px solid var(--neon-blue); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; text-align: center; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #888; cursor: pointer; }

        /* Rating Styles */
        .rating-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 10px; }
        .star-rating i { font-size: 20px; color: #444; cursor: pointer; margin-left: 5px; }
        .star-rating .active { color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.6); }
        .btn-boolean { flex: 1; padding: 10px; border: 1px solid #444; background: #111; color: #fff; border-radius: 8px; cursor: pointer; }
        .btn-boolean.selected-yes { background: rgba(0, 255, 136, 0.2); border-color: var(--neon-green); color: var(--neon-green); }
        .btn-boolean.selected-no { background: rgba(255, 51, 102, 0.2); border-color: var(--neon-red); color: var(--neon-red); }

        /* Arcade & Game */
        .arcade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .arcade-slot { background: #0a0a0a; border: 1px dashed #333; border-radius: 10px; padding: 20px 10px; cursor: pointer; }
        .arcade-slot.active { border-style: solid; border-color: var(--neon-blue); background: rgba(0, 243, 255, 0.05); }
        .mana-orb { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, var(--neon-blue), #000); margin: 20px auto; cursor: pointer; box-shadow: 0 0 20px var(--neon-blue); }

        /* === QUANTUM DEBUGGER UI === */
        #mobile-debug-btn { position: fixed; top: 80px; right: 10px; z-index: 10000; background: rgba(0,255,0,0.2); color: #0f0; border: 1px solid #0f0; border-radius: 50%; width: 40px; height: 40px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); pointer-events: auto; }
        #debug-panel { position: fixed; inset: 20px; background: rgba(0,0,0,0.95); color: #0f0; padding: 20px; z-index: 10001; border: 1px solid #0f0; border-radius: 15px; display: none; flex-direction: column; }
        #debug-output { flex: 1; overflow: auto; font-family: monospace; font-size: 11px; white-space: pre-wrap; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="mobile-debug-btn" onclick="toggleDebug()">DBG</div>
    <div id="debug-panel">
        <div style="display:flex; justify-content:space-between;">
            <strong>DATA_INSPECTOR_V1</strong>
            <span onclick="toggleDebug()" style="color:red; cursor:pointer;">[CLOSE]</span>
        </div>
        <div id="debug-output"></div>
    </div>

    <audio id="sfx-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="sfx-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="map"></div>

    <div class="hud-top">
        <div class="info-card">
            <div class="pfp-container" onclick="openProfileCard()">
                <img id="target-pfp" src="https://via.placeholder.com/100" class="pfp-circle">
                <div class="pfp-hint">TAP INFO</div>
            </div>
            <div style="flex:1;">
                <div id="mission-id" style="font-size:10px; color: #888;">SYNCING...</div>
                <div id="target-name" style="font-weight:bold; font-size:15px; margin-bottom: 2px;">LOADING...</div>
                <div id="target-status" style="font-size:11px; color: var(--neon-blue); font-weight: bold;"><i class="fa-solid fa-satellite-dish"></i> JALUR AKTIF</div>
                <div id="reward-container"></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="btn-circle" id="btn-wa" onclick="directWA()"><i class="fa-brands fa-whatsapp" style="color:#25d366"></i></button>
                <button class="btn-circle" id="btn-arcade" onclick="openArcade()" style="display: none;"><i class="fa-solid fa-gamepad" style="color:var(--neon-blue)"></i></button>
            </div>
        </div>
    </div>

    <div class="hud-bottom">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="btn-circle" style="flex:1; border-radius: 12px; width: auto;" onclick="alert('Chat module standby')"><i class="fa-solid fa-comments"></i> COMMS</button>
            <button id="btn-nav" class="btn-circle" style="flex:1; border-radius: 12px; width: auto;" onclick="openGmaps()"><i class="fa-solid fa-location-arrow"></i> NAVIGASI</button>
        </div>
        <div id="roleActions"></div>
    </div>

    <div id="modalProfile" class="modal"><div class="modal-content"><i class="fa-solid fa-xmark modal-close" onclick="closeModal('modalProfile')"></i><h3 style="color: var(--neon-blue);">IDENTITY CARD</h3><img id="modal-pfp" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon-blue); margin: 10px 0;"><h2 id="modal-name">-</h2><div id="modal-role-badge" style="font-size: 12px; color: #888; margin-bottom: 15px;">-</div><div id="modal-stats-container" style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; text-align: left; font-size: 13px;"></div></div></div>

    <div id="modalArcade" class="modal"><div class="modal-content"><i class="fa-solid fa-xmark modal-close" onclick="closeModal('modalArcade')"></i><h3 style="color: var(--neon-blue);">QUANTUM ARCADE</h3><div class="arcade-grid"><div class="arcade-slot active" onclick="startGame()"><i class="fa-solid fa-gem" style="font-size: 24px; color: var(--neon-blue);"></i><div style="margin-top: 10px; font-size: 12px; font-weight: bold;">MANA REFINER</div></div><div class="arcade-slot"><i class="fa-solid fa-lock" style="color: #444;"></i></div></div></div></div>

    <div id="modalGame" class="modal"><div class="modal-content"><i class="fa-solid fa-arrow-left modal-close" style="left:15px; right:auto;" onclick="closeModal('modalGame')"></i><h3 style="color: var(--neon-blue);">MANA REFINER</h3><div class="mana-orb" onclick="mineMana()"></div><div style="font-size: 24px; font-weight: bold;"><span id="mana-score">0</span> <span style="font-size: 12px; color: var(--neon-blue);">REFINED</span></div></div></div>

    <div id="modalEvalAdv" class="modal"><div class="modal-content"><h3 style="color: var(--neon-green);">EVALUASI KONTRAK</h3><div id="hex-rating-container"></div><button class="btn-finish active" style="margin-top: 25px;" onclick="executeSettlementAdv()">KIRIM & TRANSFER REWARD</button></div></div>

    <div id="modalEvalReq" class="modal"><div class="modal-content"><h3 style="color: var(--neon-blue);">LAPORAN KLIEN</h3><div id="bool-rating-container"></div><button class="btn-finish active" style="margin-top: 25px;" onclick="executeSettlementReq()">SELESAI & KEMBALI KE GUILD</button></div></div>

    <script>
        // === 1. STATE & INIT ===
        const user = Clearchance.enforceIdentity();
        const contractId = sessionStorage.getItem('active_contract_id');
        const mission = JSON.parse(sessionStorage.getItem('current_mission_full') || "{}");
        const dealDB = getTerminal('FB5_DEAL');
        const masterDB = getTerminal('FB1_MASTER');

        let map, myMarker, targetMarker;
        let missionData = null, targetProfileData = null, isStranger = false;
        let hexRatings = { keamanan: 0, kecerdasan: 0, kepercayaan: 0, keramahan: 0, penampilan: 0 };
        let boolRatings = { baik: null, tips: null, cash: null, extra: null };
        let manaScore = 0;

        window.onload = async () => {
            initMap();
            await performHandshake();
            loadUIInfo();
            startTracking();
            listenStatus();
        };

        // === 2. DEBUGGER LOGIC ===
        function toggleDebug() {
            const panel = document.getElementById('debug-panel');
            const out = document.getElementById('debug-output');
            if(panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'flex';
                out.innerText = JSON.stringify({
                    USER_AUTH: user,
                    SESSION_CONTRACT: contractId,
                    SESSION_MISSION_RAW: mission,
                    FETCHED_MISSION: missionData,
                    FETCHED_TARGET: targetProfileData
                }, null, 2);
            }
        }

        // === 3. CORE LOGIC ===
        async function performHandshake() {
            const idMisi = mission.id_misi || contractId;
            document.getElementById('mission-id').innerText = `ID: ${idMisi}`;
            try {
                const snapMaster = await masterDB.ref(`buku_induk/misi/${idMisi}`).once('value');
                if (snapMaster.exists()) {
                    const idShard = snapMaster.val().id_shard;
                    const boardDB = getTerminal('FB4_BOARD');
                    const snapDetail = await boardDB.ref(`missions/${idShard}/${idMisi}`).once('value');
                    if (snapDetail.exists()) {
                        const d = snapDetail.val();
                        missionData = { judul: d.title, exp: d.rpg_reward?.exp || 0, greenStone: d.rpg_reward?.greenStone || 0, shard: idShard, reqUid: d.requester_uid };
                    }
                }
                const targetUid = user.role === 'adventurer' ? (missionData?.reqUid || "UNKNOWN") : mission.adv_uid;
                const indexPath = user.role === 'adventurer' ? `requester_index/${targetUid}` : `adventurer_index/${targetUid}`;
                const snapIndex = await masterDB.ref(indexPath).once('value');
                if (snapIndex.exists()) {
                    const snapProfile = await masterDB.ref(`users/${targetUid}`).once('value');
                    if (snapProfile.exists()) targetProfileData = snapProfile.val();
                    if(targetProfileData) targetProfileData.uid = targetUid;
                } else { isStranger = true; targetProfileData = { nama: "Stranger (Unverified)" }; }
            } catch (e) { console.error("Handshake Error:", e); }
        }

        function loadUIInfo() {
            const titleElement = document.getElementById('target-name');
            const rewardContainer = document.getElementById('reward-container');
            const roleArea = document.getElementById('roleActions');

            if (missionData) {
                titleElement.innerText = missionData.judul;
                rewardContainer.innerHTML = `<div style="margin-top: 8px; border-top: 1px solid rgba(0,243,255,0.2); padding-top: 6px;"><div style="display: flex; gap: 15px;"><span style="color: var(--neon-blue); font-size: 11px; font-weight: bold;"><i class="fa-solid fa-bolt"></i> ${missionData.exp} EXP</span><span style="color: var(--neon-green); font-size: 11px; font-weight: bold;"><i class="fa-solid fa-gem"></i> ${missionData.greenStone}</span></div></div>`;
            }
            if (targetProfileData?.foto_url) document.getElementById('target-pfp').src = targetProfileData.foto_url;

            if (user.role === 'adventurer') {
                document.getElementById('btn-wa').style.display = 'none';
                roleArea.innerHTML = `<button class="btn-finish disabled" disabled><i class="fa-solid fa-clock"></i><span>MENUNGGU KONFIRMASI KLIEN</span></button>`;
            } else {
                document.getElementById('btn-arcade').style.display = 'flex';
                roleArea.innerHTML = `<button class="btn-finish active" onclick="openRatingAdv()"><i class="fa-solid fa-check-double"></i><span>KONFIRMASI SELESAI & BAYAR</span></button>`;
            }
        }

        // === 4. MAPS & TRACKING ===
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-6.97, 108.48], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            const createIcon = (color) => L.divIcon({ className:'custom', html:`<div style="background:${color}; width:12px; height:12px; border-radius:50%; box-shadow:0 0 10px ${color}"></div>`});
            myMarker = L.marker([0,0], {icon: createIcon(user.role === 'adventurer' ? '#00ff88' : '#00f3ff')}).addTo(map);
            targetMarker = L.marker([0,0], {icon: createIcon(user.role === 'adventurer' ? '#00f3ff' : '#00ff88')}).addTo(map);
        }

        function startTracking() {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    myMarker.setLatLng([latitude, longitude]);
                    map.panTo([latitude, longitude]);
                    dealDB.ref(`kontrak_detail/${contractId}/tracking/${user.uid}`).set({ lat: latitude, lng: longitude });
                    dealDB.ref(`kontrak_detail/${contractId}/tracking`).on('value', snap => {
                        snap.forEach(child => { if(child.key !== user.uid) targetMarker.setLatLng([child.val().lat, child.val().lng]); });
                    });
                });
            }
        }

        function openGmaps() {
            let coords = mission.origin_coords || mission.coords;
            if (!coords) return;
            window.open(`https://www.google.com/maps?q=${coords.lat},${coords.lng}`, '_blank');
        }

        function directWA() { window.open(`https://wa.me/?text=Halo, saya Requester kontrak ${contractId}`); }

        // === 5. RATING & SETTLEMENT ===
        function openRatingAdv() {
            const cats = ['Keamanan', 'Kecerdasan', 'Kepercayaan', 'Keramahan', 'Penampilan'];
            const container = document.getElementById('hex-rating-container');
            container.innerHTML = '';
            cats.forEach(cat => {
                const key = cat.toLowerCase();
                container.innerHTML += `<div class="rating-row"><span>${cat}</span><div class="star-rating" id="stars-${key}">${[1,2,3,4,5].map(i => `<i class="fa-solid fa-star" onclick="setHexRating('${key}', ${i})"></i>`).join('')}</div></div>`;
            });
            openModal('modalEvalAdv');
        }

        function setHexRating(cat, val) {
            hexRatings[cat] = val;
            const stars = document.getElementById(`stars-${cat}`).children;
            for(let i=0; i<5; i++) stars[i].classList.toggle('active', i < val);
            playSfx('sfx-click');
        }

        async function executeSettlementAdv() {
            if(Object.values(hexRatings).includes(0)) return alert("Isi semua rating!");
            try {
                const advUid = targetProfileData.uid;
                let updates = {};
                if (!isStranger) {
                    updates[`users/${advUid}/adventurer_coxin/green_stone`] = firebase.database.ServerValue.increment(missionData.greenStone);
                    updates[`users/${advUid}/adventurer_experience/exp`] = firebase.database.ServerValue.increment(missionData.exp);
                    Object.keys(hexRatings).forEach(k => { updates[`users/${advUid}/adventurer_diagram/nilai_${k}`] = firebase.database.ServerValue.increment(hexRatings[k]); });
                    updates[`users/${advUid}/adventurer_reputation/total_mission_completed`] = firebase.database.ServerValue.increment(1);
                    await masterDB.ref().update(updates);
                }
                await masterDB.ref(`buku_induk/misi/${contractId}`).update({ status: 'completed', finish_timestamp: Date.now() });
                await dealDB.ref(`kontrak_detail/${contractId}`).update({ status: 'completed_req' });
                alert("Kontrak Selesai!"); window.location.href = "index.html";
            } catch (e) { alert(e.message); }
        }

        function listenStatus() {
            dealDB.ref(`kontrak_detail/${contractId}/status`).on('value', snap => {
                if (snap.val() === 'completed_req' && user.role === 'adventurer') openRatingReq();
            });
        }

        function openRatingReq() {
            const q = [{k:'baik', q:'Requester baik?'}, {k:'tips', q:'Ada tips?'}, {k:'cash', q:'Uang pas?'}, {k:'extra', q:'Kerja ekstra?'}];
            const container = document.getElementById('bool-rating-container');
            container.innerHTML = q.map(i => `<div style="margin-bottom:15px; text-align:left;"><div style="font-size:12px;">${i.q}</div><div style="display:flex; gap:10px; margin-top:5px;"><button class="btn-boolean" id="btn-${i.k}-y" onclick="setBoolRating('${i.k}', true)">YA</button><button class="btn-boolean" id="btn-${i.k}-n" onclick="setBoolRating('${i.k}', false)">TIDAK</button></div></div>`).join('');
            openModal('modalEvalReq');
        }

        function setBoolRating(key, val) {
            boolRatings[key] = val;
            document.getElementById(`btn-${key}-y`).classList.toggle('selected-yes', val);
            document.getElementById(`btn-${key}-n`).classList.toggle('selected-no', !val);
            playSfx('sfx-click');
        }

        async function executeSettlementReq() {
            if(Object.values(boolRatings).includes(null)) return alert("Jawab semua!");
            try {
                const reqUid = targetProfileData.uid;
                if(!isStranger) {
                    let up = {};
                    if(boolRatings.baik) up[`users/${reqUid}/requester_reputation/yabaik`] = firebase.database.ServerValue.increment(1);
                    await masterDB.ref().update(up);
                }
                Clearchance.clearActiveMission();
                window.location.href = "index.html";
            } catch(e) { alert(e.message); }
        }

        // === UTILS ===
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function playSfx(id) { const a = document.getElementById(id); if(a) a.play().catch(()=>{}); }
        function openArcade() { openModal('modalArcade'); }
        function startGame() { closeModal('modalArcade'); openModal('modalGame'); }
        function mineMana() { manaScore++; document.getElementById('mana-score').innerText = manaScore; }
        function openProfileCard() { 
            const p = targetProfileData;
            document.getElementById('modal-pfp').src = p.foto_url || "";
            document.getElementById('modal-name').innerText = p.nama || "Stranger";
            document.getElementById('modal-stats-container').innerText = user.role === 'adventurer' ? `Reputasi Klien: ${p.requester_reputation?.yabaik || 0}` : `Rank: ${p.adventurer_stats?.rank || 'F'}`;
            openModal('modalProfile'); 
        }
    </script>
</body>
</html>
