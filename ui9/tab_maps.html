<style>
    .mp-container {
        position: relative;
        width: 100%;
        height: calc(100vh - 130px); /* Presisi memotong batas header dan footer global */
        background: #08080c;
    }

    /* Target Div Utama untuk Map Leaflet */
    #map {
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    /* Floating HUD Matrix Overlay */
    .mp-hud-overlay {
        position: absolute;
        top: 15px;
        left: 15px;
        right: 15px;
        z-index: 1000;
        pointer-events: none; /* Klik tembus ke map kecuali pada elemen anak dengan pointer-events: all */
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Telemetry HUD Panel */
    .mp-hud-card {
        pointer-events: all;
        background: rgba(5, 5, 8, 0.85);
        border: 1px solid var(--neon-blue);
        border-radius: 8px;
        padding: 10px 14px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0, 243, 255, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .mp-telemetry-data {
        font-family: var(--font-mono);
        font-size: 11px;
        color: #fff;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .mp-telemetry-label {
        font-size: 9px;
        color: var(--neon-blue);
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* Emergency AFK Protocol Zone (Bagian Bawah Map) */
    .mp-emergency-zone {
        position: absolute;
        bottom: 15px;
        left: 15px;
        right: 15px;
        z-index: 1000;
        background: rgba(20, 5, 10, 0.9);
        border: 1px solid var(--neon-red);
        border-radius: 10px;
        padding: 12px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 25px rgba(255, 51, 102, 0.2);
        animation: mp-pulse-border 1.5s infinite alternate;
    }

    @keyframes mp-pulse-border {
        0% { border-color: rgba(255, 51, 102, 0.4); box-shadow: 0 0 15px rgba(255, 51, 102, 0.1); }
        100% { border-color: var(--neon-red); box-shadow: 0 0 25px rgba(255, 51, 102, 0.3); }
    }

    .mp-em-timer-text {
        font-family: var(--font-mono);
        font-size: 11px;
        color: #ffb3c1;
        text-align: center;
        line-height: 1.4;
        font-weight: bold;
        letter-spacing: 0.5px;
    }

    /* Slider Konfirmasi Gaya Cyberpunk */
    .mp-slider-container {
        margin-top: 10px;
        position: relative;
        background: rgba(0, 0, 0, 0.5);
        height: 45px;
        border-radius: 8px;
        border: 1px solid rgba(255, 51, 102, 0.3);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .mp-slider-label-bg {
        position: absolute;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 2px;
        color: var(--neon-red);
        font-family: var(--font-sans);
        pointer-events: none;
        text-transform: uppercase;
        animation: mp-blink-text 1s infinite;
    }

    @keyframes mp-blink-text { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .mp-input-range-track {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        margin: 0;
        cursor: pointer;
        z-index: 2;
    }

    .mp-input-range-track::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 50px;
        height: 43px;
        background: var(--neon-red);
        border-radius: 6px;
        box-shadow: 0 0 15px var(--neon-red);
        cursor: grab;
        transition: background 0.2s;
    }
    .mp-input-range-track::-webkit-slider-thumb:active { cursor: grabbing; background: #ff6688; }

    /* Customisasi Marker Leaflet via CSS Global agar menyatu dengan peta gelap */
    .leaflet-popup-content-wrapper {
        background: rgba(10, 10, 15, 0.95) !important;
        color: #fff !important;
        border: 1px solid var(--neon-blue) !important;
        border-radius: 6px !important;
        font-family: var(--font-mono) !important;
    }
    .leaflet-popup-tip { background: var(--neon-blue) !important; }
</style>

<div class="mp-container">

    <div class="mp-hud-overlay">
        <div class="mp-hud-card">
            <div class="mp-telemetry-data">
                <span class="mp-telemetry-label"><i class="fa-solid fa-satellite"></i> GPS Telemetry</span>
                <span id="mp-gps-coords">-6.200000, 106.816667</span>
            </div>
            <div class="mp-telemetry-data" style="text-align: right;">
                <span class="mp-telemetry-label"><i class="fa-solid fa-compass"></i> Heading Track</span>
                <span id="mp-compass-bearing">0° N / STATIC</span>
            </div>
        </div>

        <div id="mp-route-hud-box" class="mp-hud-card hide" style="border-color: var(--neon-green); box-shadow: 0 4px 20px rgba(0, 255, 136, 0.1);">
            <div class="mp-telemetry-data">
                <span class="mp-telemetry-label" style="color: var(--neon-green);"><i class="fa-solid fa-route"></i> Jalur Navigasi</span>
                <span id="mp-route-status-text">Menghitung rute optimal...</span>
            </div>
            <div id="mp-route-eta-badge" style="font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--neon-green); background: rgba(0,255,136,0.1); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(0,255,136,0.2);">
                -- MIN
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="mp-emergency-afk-zone" class="mp-emergency-zone hide">
        <div id="mp-emergency-timer-msg" class="mp-em-timer-text">
            TOMBOL SELESAI DARURAT AKAN MUNCUL DALAM 10S... GUNAKAN INI APABILA PEMESAN AFK TANPA MENGKONFIRMASI SELESAI
        </div>
        
        <div id="mp-slider-container-em" class="mp-slider-container" style="display: none;">
            <div class="mp-slider-label-bg">GESER UNTUK SELESAI PAKSA</div>
            <input type="range" id="em-slider" class="mp-input-range-track" min="0" max="100" value="0">
        </div>
    </div>

</div>
