<style>
    .profile-modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 5, 8, 0.9);
        z-index: 4000;
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(15px);
        padding: 20px;
    }

    .profile-modal-overlay.open { display: flex; animation: fadeIn 0.3s ease; }

    .profile-card {
        background: #0d0d14;
        border: 1px solid var(--border-glow);
        width: 100%;
        max-width: 360px;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
    }

    /* Scanning Effect Header */
    .profile-scan-line {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 2px;
        background: var(--neon-blue);
        box-shadow: 0 0 15px var(--neon-blue);
        z-index: 5;
        animation: scanMove 3s infinite linear;
    }

    @keyframes scanMove {
        0% { top: 0; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
    }

    .profile-hero {
        height: 120px;
        background: linear-gradient(to bottom, rgba(0, 243, 255, 0.1), transparent);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 20px;
    }

    .profile-avatar-frame {
        width: 80px;
        height: 80px;
        border: 2px solid var(--neon-blue);
        border-radius: 50%;
        padding: 5px;
        background: #0d0d14;
        position: relative;
    }

    .profile-avatar-frame img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }

    .profile-content { padding: 25px; }

    .p-name { font-size: 22px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 5px; letter-spacing: 1px; }
    .p-role-tag { font-size: 10px; color: var(--neon-purple); text-align: center; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

    /* Stats Grid */
    .p-stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
    .p-stat-box { 
        background: rgba(255,255,255,0.03); 
        border: 1px solid rgba(255,255,255,0.08); 
        padding: 10px; 
        border-radius: 12px; 
        text-align: center; 
    }
    .p-stat-val { display: block; font-size: 16px; font-weight: bold; color: var(--neon-blue); font-family: 'JetBrains Mono', monospace; }
    .p-stat-lbl { display: block; font-size: 8px; color: #666; text-transform: uppercase; margin-top: 4px; }

    /* Radar/Diagram Area Placeholder */
    .p-info-list { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; }
    .p-info-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; }
    .p-info-lbl { color: #555; }
    .p-info-val { color: #ccc; font-weight: bold; }

    .btn-close-profile {
        width: 100%;
        padding: 15px;
        background: rgba(255,255,255,0.05);
        border: none;
        color: #888;
        font-weight: bold;
        font-size: 12px;
        cursor: pointer;
        border-top: 1px solid rgba(255,255,255,0.08);
        transition: 0.3s;
    }
    .btn-close-profile:hover { background: rgba(255,51,102,0.1); color: #ff3366; }
</style>

<div id="modal-profile-ui" class="profile-modal-overlay">
    <div class="profile-card">
        <div class="profile-scan-line"></div>
        
        <div class="profile-hero">
            <div class="profile-avatar-frame">
                <img id="p-img" src="https://via.placeholder.com/150" alt="Avatar">
            </div>
        </div>

        <div class="profile-content">
            <div id="p-name" class="p-name">LOADING...</div>
            <div id="p-role" class="p-role-tag">SECURE IDENTITY</div>

            <div class="p-stats-grid">
                <div class="p-stat-box">
                    <span id="p-stat-misi" class="p-stat-val">0</span>
                    <span class="p-stat-lbl">Misi</span>
                </div>
                <div class="p-stat-box">
                    <span id="p-stat-rank" class="p-stat-val">-</span>
                    <span class="p-stat-lbl">Rank</span>
                </div>
                <div class="p-stat-box">
                    <span id="p-stat-trust" class="p-stat-val">0%</span>
                    <span class="p-stat-lbl">Trust</span>
                </div>
            </div>

            <div class="p-info-list">
                <div class="p-info-item">
                    <span class="p-info-lbl">Member Sejak</span>
                    <span id="p-info-date" class="p-info-val">--/--/--</span>
                </div>
                <div class="p-info-item">
                    <span class="p-info-lbl">Spesialisasi</span>
                    <span id="p-info-spec" class="p-info-val">Generalist</span>
                </div>
                <div class="p-info-item">
                    <span class="p-info-lbl">Status Shard</span>
                    <span class="p-info-val" style="color: #00ff88;">VERIFIED</span>
                </div>
            </div>
        </div>

        <button class="btn-close-profile" onclick="closeProfileModal()">TUTUP DOSSIER</button>
    </div>
</div>

<script>
    window.profile_contractId = sessionStorage.getItem('active_contract_id');

    async function openProfileModal() {
        const modal = document.getElementById('modal-profile-ui');
        modal.classList.add('open');
        
        if(navigator.vibrate) navigator.vibrate(15);

        await loadPartnerDossier();
    }

    function closeProfileModal() {
        document.getElementById('modal-profile-ui').classList.remove('open');
    }

    async function loadPartnerDossier() {
        try {
            if(typeof getSupremeData === 'undefined') return;
            const DATA = await getSupremeData(window.profile_contractId);
            
            // Tentukan siapa partnernya
            const isAdv = (typeof Clearchance !== 'undefined' && Clearchance.enforceIdentity().role === 'adventurer');
            const partner = isAdv ? DATA.requester : DATA.adventurer;
            const profile = partner.profile || {};

            // Injeksi Data ke UI
            document.getElementById('p-name').innerText = profile.nama || "Unknown";
            document.getElementById('p-img').src = profile.foto || "https://i.ibb.co/S6p7C9T/avatar-default.png";
            
            if(isAdv) {
                // Menampilkan profil Requester
                document.getElementById('p-role').innerText = "Guild Requester";
                document.getElementById('p-stat-misi').innerText = partner.reputation?.misi_selesai || 0;
                document.getElementById('p-stat-rank').innerText = `T${profile.tier || 1}`;
                document.getElementById('p-stat-trust').innerText = (partner.reputation?.poin || 0) + " RP";
                document.getElementById('p-info-spec').innerText = "Mission Provider";
            } else {
                // Menampilkan profil Adventurer
                document.getElementById('p-role').innerText = "Certified Adventurer";
                document.getElementById('p-stat-misi').innerText = partner.statistik?.misi_selesai || 0;
                document.getElementById('p-stat-rank').innerText = profile.rank || "F";
                document.getElementById('p-stat-trust').innerText = (partner.diagram?.nilai_kepercayaan || 0) + "%";
                document.getElementById('p-info-spec').innerText = profile.spesialisasi || "Combat/Courier";
            }

            document.getElementById('p-info-date').innerText = profile.join_date || "2024";

        } catch (e) {
            console.error("Gagal memuat dossier:", e);
            document.getElementById('p-name').innerText = "ERROR SCANNING";
        }
    }

    // Daftarkan ke window agar bisa diakses dari HQ Header
    window.showPartnerProfile = openProfileModal;

</script>
