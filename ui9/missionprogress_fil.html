<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BATTLEFIELD HUB | GUILD</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050508">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>

    <script src="brain_comms.js" defer></script>
    <script src="brain_tactical.js" defer></script>
    <script src="brain_actions.js" defer></script>

    <style>
        /* === QUANTUM DESIGN SYSTEM SYSTEM-WIDE === */
        :root {
            --bg-main: #050508;
            --bg-panel: rgba(13, 13, 20, 0.8);
            --neon-blue: #00f3ff;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --neon-purple: #bc13fe;
            --neon-yellow: #ffcc00;
            --text-main: #e0e0e0;
            --glass: rgba(5, 5, 8, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --font-sans: 'Inter', -apple-system, sans-serif;
        }

        /* NATIVE APP FEEL FIXES */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            box-sizing: border-box;
            scrollbar-width: none;
        }
        *::-webkit-scrollbar { display: none; }
        input, textarea { user-select: text !important; }

        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at top right, #111, var(--bg-main)); 
            color: var(--text-main); 
            font-family: var(--font-sans); 
            overflow: hidden; 
            height: 100%; width: 100%; 
            overscroll-behavior-y: none;
            touch-action: manipulation;
        }
        
        button, input { font-family: inherit; outline: none; }
        .hide { display: none !important; }

        /* GLOBAL HEADER */
        #global-header { 
            position: absolute; top: 0; width: 100%; z-index: 2000; 
            background: var(--glass); border-bottom: 1px solid var(--glass-border); 
            padding: 12px 15px; backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .identity-badge { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.2s; }
        .identity-badge:active { transform: scale(0.95); }
        .rank-frame { 
            width: 45px; height: 45px; border: 2px solid var(--neon-blue); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
            background: rgba(0, 243, 255, 0.05); color: var(--neon-blue); 
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .btn-refresh {
            background: rgba(0,243,255,0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue);
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(0,243,255,0.2);
        }
        .btn-refresh:active { transform: rotate(180deg) scale(0.9); }

        /* VIEWPORT CONTAINERS */
        .viewport { position: absolute; top: 65px; bottom: 65px; width: 100%; overflow: hidden; }
        .tab-pane { 
            position: absolute; inset: 0; 
            opacity: 0; pointer-events: none; transform: translateY(15px); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; overflow-x: hidden;
            padding-bottom: 30px;
        }
        .tab-pane.active { opacity: 1; pointer-events: all; transform: translateY(0); }

        /* GLOBAL BUTTON STYLE PRESET */
        .btn-main {
            background: linear-gradient(135deg, rgba(0,243,255,0.1), rgba(0,243,255,0.02));
            border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 14px; border-radius: 12px; text-transform: uppercase; font-weight: 900;
            letter-spacing: 1px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; width: 100%; font-size: 13px;
        }
        .btn-main:hover, .btn-main:active { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px rgba(0,243,255,0.4); transform: translateY(-2px); }

        /* GLOBAL FOOTER NAV */
        #global-footer { position: absolute; bottom: 0; width: 100%; height: 65px; z-index: 3000; background: var(--glass); border-top: 1px solid var(--glass-border); backdrop-filter: blur(20px); }
        .nav-grid { display: flex; height: 100%; }
        .nav-item { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #666; cursor: pointer; transition: 0.3s; font-weight: 500; letter-spacing: 1px; }
        .nav-item.active { color: var(--neon-blue); background: linear-gradient(0deg, rgba(0,243,255,0.05), transparent); }
        .nav-item i { font-size: 20px; margin-bottom: 5px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.active i { transform: translateY(-3px) scale(1.1); text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        .nav-badge { position: absolute; top: 8px; right: 25%; background: var(--neon-red); color: #fff; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 10px; box-shadow: 0 0 10px var(--neon-red); display: none; }
        .nav-badge.show { display: inline-block; animation: pulseBadge 1s infinite alternate; }
        @keyframes pulseBadge { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        /* MODALS LAYOUT GLOBAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { background: rgba(10, 10, 15, 0.98); width: 95%; max-width: 400px; max-height: 85vh; padding: 2rem 1.5rem; overflow-y: auto; position: relative; border: 1px solid var(--neon-blue); border-radius: 4px; display: flex; flex-direction: column; align-items: center; text-align: center; transform: scale(0.95); animation: modalSlideIn 0.3s forwards; }
        .modal-box::before { content: ""; position: absolute; top: -2px; left: -2px; width: 20px; height: 20px; border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); }
        @keyframes modalSlideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-box.danger { border-color: #ff4444; box-shadow: 0 0 30px rgba(255, 68, 68, 0.1); }
        .modal-box.danger::before { border-color: #ff4444; }
        .modalTitle { width: 100%; margin: 0 0 1rem 0; padding-bottom: 10px; border-bottom: 1px solid #222; color: var(--neon-blue); font-size: 14px; letter-spacing: 3px; font-family: var(--font-mono); font-weight: 900; text-align: center; }
        .modal-box.danger .modalTitle { color: #ff4444; }
        .modalMsg { width: 100%; margin-bottom: 1.5rem; font-size: 13px; color: #bbb; line-height: 1.6; font-family: var(--font-mono); text-align: center; }
        .modal-input { width: 100%; max-width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; padding: 10px; margin-bottom: 1.5rem; text-align: center; }
        .modal-btn-group { display: flex; gap: 10px; width: 100%; margin-top: 20px; }
        .modal-btn-group .btn-main { flex: 1; padding: 12px; font-size: 12px; }
    </style>
</head>
<body>

    <audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="notif-sfx" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <header id="global-header">
        <div class="identity-badge" onclick="window.toggleProfileDrawer()">
            <div id="u-rank" class="rank-frame">?</div>
            <div>
                <div id="u-role" style="font-size: 10px; color: #888; letter-spacing: 1.5px; text-transform: uppercase;">SINKRONISASI...</div>
                <div id="u-name" style="font-weight: 700; font-size: 16px;">Memuat Data</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-refresh" onclick="window.forceRefreshData()" title="Re-Fetch Shard Data"><i class="fa-solid fa-rotate"></i></button>
            <img src="ai_irene_face.png" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--neon-purple); box-shadow: 0 0 10px rgba(188,19,254,0.4);" alt="AI">
        </div>
    </header>

    <main class="viewport">
        <div id="tab-hq" class="tab-pane active"></div>
        <div id="tab-comms" class="tab-pane"></div>
        <div id="tab-maps" class="tab-pane"></div>
        <div id="tab-bill-note" class="tab-pane"></div>
        <div id="tab-profile" class="tab-pane"></div>
        <div id="tab-settings" class="tab-pane"></div>
    </main>

    <footer id="global-footer">
        <div class="nav-grid">
            <div class="nav-item active" onclick="window.switchTab('tab-hq', this)"><i class="fa-solid fa-shield-halved"></i>HQ</div>
            <div class="nav-item" onclick="window.switchTab('tab-comms', this)"><i class="fa-solid fa-satellite-dish"></i>COMMS<span id="badge-comms" class="nav-badge">0</span></div>
            <div class="nav-item" onclick="window.switchTab('tab-maps', this)"><i class="fa-solid fa-map-location-dot"></i>MAPS</div>
            <div class="nav-item" onclick="window.switchTab('tab-bill-note', this)"><i class="fa-solid fa-receipt"></i>BILL</div>
            <div class="nav-item" onclick="window.switchTab('tab-profile', this)"><i class="fa-solid fa-user-gear"></i>PROFILE</div>
            <div class="nav-item" onclick="window.switchTab('tab-settings', this)"><i class="fa-solid fa-gamepad"></i>MENU</div>
        </div>
    </footer>

    <div id="sys-modal" class="modal-overlay">
        <div id="sys-modal-box" class="modal-box">
            <div id="sys-modal-title" class="modalTitle">NOTIFICATION</div>
            <div id="sys-modal-msg" class="modalMsg">--</div>
            <input type="text" id="sys-modal-input" class="modal-input hide" placeholder="...">
            <div class="modal-btn-group">
                <button id="sys-modal-cancel" class="btn-main" style="border-color:#ff3366; color:#ff3366;">CANCEL</button>
                <button id="sys-modal-confirm" class="btn-main">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        // Router Tab Internal Global Gateway
        window.switchTab = function(tabId, element) {
            document.getElementById('click-sfx').play().catch(()=>{});
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            if(element) element.classList.add('active');

            // Trigger khusus apabila berpindah ke tab maps agar Leaflet merender ulang ukuran layer gridnya
            if(tabId === 'tab-maps' && window.tacticalMap) {
                setTimeout(() => { window.tacticalMap.invalidateSize(); }, 200);
            }
        };

        async function injectComponent(targetId, filePath, callback) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`Terminal Shard gagal memuat: ${filePath}`);
                const htmlData = await response.text();
                document.getElementById(targetId).innerHTML = htmlData;
                if(callback) callback();
            } catch (err) {
                console.error("[SHARD INJECTOR ERROR]", err);
            }
        }

        // Pemuatan Seluruh Tab Terpisah secara Paralel Asinkronus saat Aplikasi Siap
        document.addEventListener("DOMContentLoaded", () => {
            injectComponent("tab-hq", "tab_hq.html", () => {
                if (window.initActionsHQ) window.initActionsHQ();
            });
            injectComponent("tab-comms", "tab_comms.html", () => {
                if (window.initCommsChat) window.initCommsChat();
            });
            injectComponent("tab-maps", "tab_maps.html", () => {
                if (window.initTacticalMap) window.initTacticalMap();
            });
            injectComponent("tab-bill-note", "tab_bill_note.html", () => {
                if (window.initBillEngine) window.initBillEngine();
            });
            injectComponent("tab-profile", "tab_profile.html");
            injectComponent("tab-settings", "tab_settings.html");
        });
    </script>
</body>
</html>
