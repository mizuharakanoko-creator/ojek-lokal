<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign - Register Adventurer</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="terminal_router.js"></script>
    <script src="clearchance.js"></script>
    <style>
        body { background: #050505; color: white; font-family: monospace; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #888; font-size: 12px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ffff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #333; color: #777; }
        .msg { font-size: 12px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="color: #00ffff; text-align: center; margin-bottom: 25px;">REGISTRASI ADVENTURER</h2>
    
    <div class="input-group">
        <label>NICKNAME (Unik)</label>
        <input type="text" id="nick" placeholder="Contoh: ShadowHunter">
    </div>

    <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="pass" placeholder="******">
    </div>

    <div class="input-group">
        <label>DOMISILI (Area Kerja)</label>
        <select id="domisili">
            <option value="KNG">Kuningan</option>
            <option value="KGD">Kadugede</option>
            <option value="CGR">Cigugur</option>
        </select>
    </div>

    <div class="input-group">
        <label>KATEGORI KENDARAAN</label>
        <select id="kategori">
            <option value="MOTOR">Sepeda Motor</option>
            <option value="MOBIL">Mobil / Roda 4</option>
        </select>
    </div>

    <button id="btnReg" onclick="prosesDaftar()">AJUKAN PENDAFTARAN</button>
    <div id="statusMsg" class="msg"></div>
</div>

<script>
    async function prosesDaftar() {
        const nick = document.getElementById('nick').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const dom = document.getElementById('domisili').value;
        const kat = document.getElementById('kategori').value;
        const btn = document.getElementById('btnReg');
        const msg = document.getElementById('statusMsg');

        if (!nick || !pass) return alert("Nickname dan Password wajib diisi!");

        btn.disabled = true;
        msg.innerText = "Memvalidasi nickname...";

        const db1 = getTerminal('FB1_MASTER');

        try {
            // --- STEP 1: TRIPLE CHECK NICKNAME ---
            // Cek di register_pending, adventurer_index, dan requester_index
            const checkPaths = ['register_pending', 'adventurer_index', 'requester_index'];
            let isTaken = false;

            for (let path of checkPaths) {
                const snap = await db1.ref(path).orderByChild('nickname').equalTo(nick).once('value');
                if (snap.exists()) {
                    isTaken = true;
                    break;
                }
            }

            if (isTaken) {
                alert("Nickname sudah terdaftar! Gunakan nama lain.");
                btn.disabled = false;
                msg.innerText = "";
                return;
            }

            // --- STEP 2: GENERATE AUTOMATIC DATA ---
            const timestamp = Date.now();
            const dateObj = new Date();
            const monthYear = (dateObj.getMonth() + 1) + "-" + dateObj.getFullYear();
            
            // Generate ID: adv-kng-16583920 (prefix-domisili-random)
            const randomID = Math.floor(Math.random() * 9000) + 1000;
            const generatedID = `adv-${dom.toLowerCase()}-${timestamp.toString().slice(-4)}${randomID}`;

            const payload = {
                id_adv: generatedID,
                nickname: nick,
                password: pass, // Saran: Enkripsi di masa depan
                role: "adventurer",
                kategori: kat,
                domisili: dom,
                status_verified: "pending",
                created_at: monthYear,
                raw_timestamp: timestamp
            };

            // --- STEP 3: KIRIM KE FB1 register_pending ---
            await db1.ref(`register_pending/${generatedID}`).set(payload);

            msg.style.color = "#00ff00";
            msg.innerText = "Pendaftaran Berhasil dikirim! ID Anda: " + generatedID;
            
            alert("Berhasil! Simpan ID Anda: " + generatedID);
            // window.location.href = "login.html";

        } catch (e) {
            console.error(e);
            alert("Terjadi kesalahan sistem.");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
