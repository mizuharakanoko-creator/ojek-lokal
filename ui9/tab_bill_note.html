<style>
    .bl-wrapper {
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Cyber Ledger Card Master Balance */
    .bl-master-card {
        background: linear-gradient(135deg, rgba(0, 243, 255, 0.08), rgba(5, 5, 8, 0.9));
        border: 1px solid var(--neon-blue);
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .bl-ledger-title {
        font-size: 11px;
        color: var(--neon-blue);
        letter-spacing: 2px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        font-weight: 700;
    }

    .bl-ledger-amount {
        font-family: var(--font-mono);
        font-size: 26px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    /* Breakdown Multi-split Fee Income */
    .bl-breakdown-box {
        background: var(--bg-panel);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 12px 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .bl-split-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
    }

    .bl-split-label {
        color: #888;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .bl-split-value {
        font-family: var(--font-mono);
        font-weight: 700;
        color: #fff;
    }

    /* Encrypted Memory Pad / Notes */
    .bl-notepad-area {
        background: #06060a;
        border: 1px solid #1a1a26;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .bl-textarea-custom {
        width: 100%;
        height: 130px;
        background: rgba(0,0,0,0.4);
        border: 1px solid #222;
        border-radius: 6px;
        color: #e0e0e0;
        padding: 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        resize: none;
        line-height: 1.5;
        transition: border-color 0.3s;
    }

    .bl-textarea-custom:focus {
        border-color: var(--neon-purple);
    }

    .bl-save-indicator {
        font-family: var(--font-mono);
        font-size: 10px;
        color: #444;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    
    .bl-save-indicator.synced {
        color: var(--neon-green);
    }
</style>

<div class="bl-wrapper">
    
    <div class="bl-master-card">
        <div class="bl-ledger-title">OPERATIONAL NET STATEMENT</div>
        <div id="bl-total-revenue" class="bl-ledger-amount">Rp 0</div>
        <div style="font-size: 10px; color: #555; margin-top: 2px;">Terhitung otomatis berdasarkan bagi hasil sistem shard</div>
    </div>

    <div class="bl-breakdown-box">
        <div class="bl-ledger-title" style="font-size: 9px; margin-bottom: 5px; color: #555;">DISTRIBUSI ALOKASI DANA</div>
        
        <div class="bl-split-row">
            <span class="bl-split-label"><i class="fa-solid fa-user-shield" style="color: var(--neon-blue);"></i> Bagian Player (80%)</span>
            <span id="bl-fee-player" class="bl-split-value" style="color: var(--neon-green);">Rp 0</span>
        </div>
        
        <div class="bl-split-row" style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
            <span class="bl-split-label"><i class="fa-solid fa-building-shield" style="color: var(--neon-purple);"></i> Kas Guild Tax (20%)</span>
            <span id="bl-fee-guild" class="bl-split-value">Rp 0</span>
        </div>

        <div class="bl-split-row" style="padding-top: 4px;">
            <span class="bl-split-label"><i class="fa-solid fa-receipt"></i> Total Omset Bruto</span>
            <span id="bl-fee-gross" class="bl-split-value" style="color: #aaa;">Rp 0</span>
        </div>
    </div>

    <div class="bl-notepad-area">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="bl-ledger-title" style="letter-spacing: 1px;"><i class="fa-solid fa-signature"></i> FIELD PROTOCOL NOTE</span>
            <div id="bl-sync-status" class="bl-save-indicator">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span>LOCAL CACHE ONLY</span>
            </div>
        </div>

        <textarea id="bl-field-notepad" class="bl-textarea-custom" placeholder="Ketik memo taktis lapangan, koordinat cadangan, atau catatan misi penting di sini... Data akan tersimpan otomatis." autocomplete="off" spellcheck="false"></textarea>
        
        <button id="bl-btn-clear-note" class="btn-main" style="border-color: rgba(255,51,102,0.4); color: rgba(255,51,102,0.8); padding: 8px; font-size: 10px;" onclick="window.handleClearFieldNotepad()">
            <i class="fa-solid fa-eraser"></i> WIPE ENCRYPTED DATA MEMORY
        </button>
    </div>

</div>

<script>
    window.initBillEngine = function() {
        console.log("[SHARD] BILL & NOTE Engine components fully initialized.");
        
        const notepad = document.getElementById('bl-field-notepad');
        const syncStatus = document.getElementById('bl-sync-status');
        
        // Memuat otomatis memo lokal yang tersimpan dalam LocalStorage browser
        if (notepad) {
            const cachedNote = localStorage.getItem('shard_field_memo');
            if (cachedNote) {
                notepad.value = cachedNote;
                if(syncStatus) {
                    syncStatus.classList.add('synced');
                    syncStatus.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>SECURE CACHED</span>`;
                }
            }

            // Fitur Autosave Pintar: Menyimpan otomatis setiap ada pengetikan dengan jeda pengetikan (Debounce)
            let saveTimeout;
            notepad.addEventListener('input', function() {
                if(syncStatus) {
                    syncStatus.classList.remove('synced');
                    syncStatus.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>WRITING...</span>`;
                }
                
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    localStorage.setItem('shard_field_memo', notepad.value);
                    if(syncStatus) {
                        syncStatus.classList.add('synced');
                        syncStatus.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>SECURE CACHED</span>`;
                    }
                }, 800); // Menyimpan otomatis setelah 800ms berhenti mengetik
            });
        }
    };

    // Fungsi Wiping Data Notepad
    window.handleClearFieldNotepad = async function() {
        if(window.sysConfirm) {
            const konfirm = await window.sysConfirm("WIPE ACTION", "HAPUS SELURUH CATATAN MEMORI LAPANGAN?\\n\\nTindakan ini bersifat permanen.", true);
            if(konfirm) {
                const notepad = document.getElementById('bl-field-notepad');
                const syncStatus = document.getElementById('bl-sync-status');
                if(notepad) notepad.value = "";
                localStorage.removeItem('shard_field_memo');
                if(syncStatus) {
                    syncStatus.classList.remove('synced');
                    syncStatus.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> <span>DATA WIPED</span>`;
                }
            }
        }
    };
</script>
