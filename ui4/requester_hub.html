<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SELECTION HUB | PICK ME GUILD</title>
    
    <link rel="stylesheet" href="guild_system.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { background: var(--bg-black); color: #fff; text-align: center; padding: 20px; }
        
        /* RADAR ANIMATION */
        .radar-container { position: relative; width: 120px; height: 120px; margin: 30px auto; }
        .radar-core { width: 100%; height: 100%; background: rgba(0, 217, 255, 0.1); border: 2px solid var(--neon-blue); border-radius: 50%; box-shadow: 0 0 20px rgba(0,217,255,0.4); }
        .radar-sweep { position: absolute; top: 0; left: 50%; width: 50%; height: 50%; background: linear-gradient(to right, transparent, rgba(0,217,255,0.8)); transform-origin: bottom left; animation: sweep 2s infinite linear; border-radius: 0 100% 0 0; }
        @keyframes sweep { to { transform: rotate(360deg); } }

        /* TIMER & TIPS */
        .timer-box { font-size: 28px; font-family: 'Courier New', monospace; font-weight: bold; color: var(--neon-gold); margin: 10px 0; }
        .tips-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; font-size: 11px; color: #aaa; min-height: 50px; display: flex; align-items: center; justify-content: center; font-style: italic; transition: opacity 0.5s; }

        /* CANDIDATE LIST */
        .candidate-area { margin-top: 30px; text-align: left; }
        .c-card { background: #0a0a0a; border: 1px solid #222; border-left: 4px solid var(--neon-blue); border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; animation: slideIn 0.3s ease-out; }
        .c-header { display: flex; justify-content: space-between; align-items: center; }
        .c-name { font-size: 16px; font-weight: bold; color: #fff; }
        .c-rank { background: #222; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-family: monospace; }
        .c-stats { display: flex; gap: 15px; font-size: 11px; color: #888; }
        .c-stats span { display: flex; align-items: center; gap: 5px; }
        
        .c-nego-box { background: rgba(255, 204, 0, 0.1); border: 1px dashed var(--neon-gold); padding: 10px; border-radius: 5px; font-size: 12px; color: var(--neon-gold); display: none; }

        .btn-hire { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); border-radius: 8px; font-family: monospace; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-hire:active { background: var(--neon-blue); color: #000; }
        
        .btn-cancel { margin-top: 20px; padding: 10px 20px; background: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="radar-container">
        <div class="radar-core"></div>
        <div class="radar-sweep"></div>
    </div>

    <div style="font-size:12px; color:#888; letter-spacing:2px;">MENYIARKAN MISI...</div>
    <div class="timer-box" id="dispTimer">00:00</div>

    <div class="tips-box" id="dispTips">"Tip: Adventurer dengan Rank tinggi memiliki jaminan keselamatan barang yang lebih baik."</div>

    <div class="candidate-area">
        <h3 style="font-size:14px; border-bottom:1px solid #333; padding-bottom:10px; color:var(--neon-blue);">ADVENTURER YANG MELAMAR</h3>
        <div id="listCandidates">
            <div style="text-align:center; padding:30px; color:#555; font-size:12px;">Menunggu transmisi lamaran masuk...</div>
        </div>
    </div>

    <button class="btn-cancel" onclick="HubEngine.cancelMission()">BATALKAN MISI (HAPUS DATA)</button>

    <audio id="sndPing" src="assets/ping.mp3" preload="auto"></audio>
    <audio id="sndHire" src="assets/success.mp3" preload="auto"></audio>

    <script src="requester_hub_engine.js"></script>
</body>
</html>
