<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BOARD | PICK ME GUILD</title>
    
    <link rel="stylesheet" href="guild_system.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* Dashboard Layout Specific */
        .dashboard-header {
            padding: 20px;
            background: linear-gradient(to bottom, #000, transparent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-item {
            background: var(--glass);
            border: 1px solid #222;
            padding: 5px 15px;
            border-radius: 5px;
        }

        .stone-count { color: var(--neon-gold); font-weight: bold; }
        
        .stamina-container {
            width: 100%;
            height: 4px;
            background: #111;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .stamina-fill {
            height: 100%;
            background: var(--neon-blue);
            width: 100%; /* Dynamic */
            transition: width 0.5s ease-in-out;
        }

        .quest-board {
            padding: 0 20px 100px;
            height: calc(100vh - 150px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .quest-card {
            background: var(--bg-card);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.3s;
        }

        .quest-card:active { transform: scale(0.96); background: #111; }

        .rank-badge {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        /* Floating Action Button (FAB) */
        .fab-map {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--neon-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            animation: bounce 2s infinite;
            z-index: 999;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }



    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: #0a0a0a; border: 1px solid var(--neon-blue); padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; box-shadow: 0 0 30px rgba(0,217,255,0.2); }
    .input-group { margin-top: 15px; text-align: left; }
    .input-group label { font-size: 10px; color: var(--neon-gold); display: block; margin-bottom: 5px; }
    .guild-input, .guild-textarea { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-family: monospace; box-sizing: border-box; }
    .btn-confirm { background: var(--neon-blue); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; }
    .btn-cancel { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 12px; border-radius: 8px; }


        
    </style>
</head>
<body>

    <div id="guild-watermark"></div>

    <div id="ghost-cleanup">
        <h1 class="gold-text" style="font-size: 1.5rem;">ACTIVE MISSION DETECTED</h1>
        <p style="color: #555;">Teleporting back to battlefield...</p>
    </div>

    <div class="level-up-overlay" id="lvlUp">
        <div class="gold-text">LEVEL UP!</div>
        <p id="lvlDetail">Adventurer Rank Increased</p>
    </div>

    <div class="dashboard-header">
        <div class="stats-bar">
            <div class="stat-item">
                <span style="font-size: 10px; color:#555;">RANK:</span>
                <span id="txtRank" style="color:var(--neon-blue)">-</span>
            </div>
            <div class="stat-item">
                <span id="txtStone" class="stone-count">0</span> <span style="font-size:10px;">STONE</span>
            </div>
        </div>
        <div class="stamina-container">
            <div id="staminaBar" class="stamina-fill"></div>
        </div>
    </div>

    <div class="quest-board" id="questBoard">
        <div class="quest-card shimmer" style="height: 120px;"></div>
        <div class="quest-card shimmer" style="height: 120px;"></div>
        <div class="quest-card shimmer" style="height: 120px;"></div>
    </div>

    <div class="fab-map" onclick="location.href='world_map.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M1 6V22L8 18L16 22L23 18V2L16 6L8 2L1 6Z"/><path d="M8 2V18"/><path d="M16 6V22"/></svg>
    </div>


    <div id="modalApply" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h2 style="color:var(--neon-gold); font-size:18px; margin-top:0;">[ AJUKAN LAMARAN ]</h2>
        <p style="font-size:12px; color:#888;">Tawarkan tarif nego atau berikan catatan tambahan kepada Requester.</p>
        
        <input type="hidden" id="targetQuestId">
        
        <div class="input-group">
            <label>HARGA DASAR: <span id="basePrice" style="color:#fff;">0</span> STONE</label>
            <input type="number" id="inpNego" placeholder="Masukkan Harga Nego (Stone)..." class="guild-input">
        </div>

        <div class="input-group">
            <label>CATATAN (SKILL / ALASAN):</label>
            <textarea id="inpNote" placeholder="Contoh: Saya sedang di dekat lokasi Anda..." class="guild-textarea"></textarea>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-cancel" onclick="Engine.closeApplyForm()" style="flex:1;">BATAL</button>
            <button class="btn-confirm" onclick="Engine.submitApplication()" style="flex:2;">KIRIM LAMARAN</button>
        </div>
    </div>
</div>




    <audio id="sndClick" src="assets/click.mp3" preload="auto"></audio>
    <audio id="sndQuest" src="assets/trumpet.mp3" preload="auto"></audio>
    <audio id="sndLevel" src="assets/levelup.mp3" preload="auto"></audio>

    <script src="dashboard_engine.js"></script>
</body>
</html>
