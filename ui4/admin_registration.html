<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BECOME ARCHITECT | SOVEREIGN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #ff4757; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: #ff4757; border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #status { font-size: 12px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#ff4757">ADMIN GATE</h2>
        <p style="font-size: 13px;">Daftarkan Akun sebagai Admin Utama</p>
        
        <input type="email" id="email" placeholder="Email Admin">
        <input type="password" id="pass" placeholder="Password Akun">
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <input type="password" id="master_key" placeholder="SECRET MASTER KEY">
        
        <button onclick="registerAdmin()">DAFTAR SEBAGAI ADMIN</button>
        <div id="status">Menunggu instruksi...</div>
    </div>

    <script>
        // CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();

        async function registerAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const masterKey = document.getElementById('master_key').value;
            const status = document.getElementById('status');

            // KEAMANAN SEDERHANA: Ganti 'SOVEREIGN2026' dengan kata kunci rahasia Anda sendiri
            if (masterKey !== 'SOVEREIGN2026') {
                status.innerText = "Gagal: Secret Master Key Salah!";
                status.style.color = "red";
                return;
            }

            status.innerText = "Sedang memproses...";

            try {
                // 1. Buat Akun di Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;

                // 2. Daftarkan UID ke node 'admins' di Database
                // Note: Untuk pertama kali, matikan dulu Rules .write: false di Firebase jika error
                await db.ref('admins/' + uid).set(true);

                status.innerText = "BERHASIL! UID: " + uid + " kini adalah Admin.";
                status.style.color = "#00ff88";
                
                alert("Pendaftaran Sukses! Sekarang Anda bisa login ke Admin Console.");
                
            } catch (error) {
                status.innerText = "Error: " + error.message;
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
