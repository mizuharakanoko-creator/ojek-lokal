<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Interface High-Precision</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --neon-purple: #bd00ff;
            --neon-blue: #00d1ff;
            --gold: #ffd700;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            /* Tekstur latar belakang gelap sesuai Gambar 1 */
            background-image: radial-gradient(circle, #1a0b2e 0%, #000 80%);
        }

        /* Container Utama dengan Rasio Gambar 1 */
        .ui-container {
            width: 1000px;
            height: 550px;
            position: relative;
            box-sizing: border-box;
        }

        /* ASET GAMBAR 3: HEADER PANEL */
        .header-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 850px;
            height: 120px;
            background: url('1001152331.png') no-repeat center;
            background-size: contain;
            z-index: 10;
        }

        /* ASET GAMBAR 2: PHOTO FRAME & LEVEL */
        .profile-section {
            position: absolute;
            top: 120px;
            left: 30px;
            width: 320px;
            height: 350px;
            background: url('1001152308.png') no-repeat center;
            background-size: contain;
        }

        .driver-img {
            position: absolute;
            top: 62px;
            left: 68px;
            width: 180px;
            height: 200px;
            /* Memotong foto menjadi hexagon sesuai Gambar 1 & 2 */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background-size: cover;
            background-position: center;
        }

        .level-number {
            position: absolute;
            top: 102px;
            right: 48px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        /* AREA DATA TENGAH (NAMA & INFO) */
        .info-center {
            position: absolute;
            top: 155px;
            left: 380px;
            width: 300px;
        }

        .tag-status {
            display: inline-block;
            padding: 2px 12px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            background: rgba(0, 209, 255, 0.1);
            margin-bottom: 8px;
        }

        .driver-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .id-label { font-size: 1rem; color: #888; margin: 4px 0; }
        .id-label span { color: var(--neon-purple); font-weight: bold; }

        .points-box {
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--gold);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        /* ASET GAMBAR 4: BADGE & ENERGY */
        .badge-section {
            position: absolute;
            top: 120px;
            right: 30px;
            width: 300px;
            height: 350px;
            background: url('1001152338.png') no-repeat center;
            background-size: contain;
        }

        /* Progress Bar di Area Kosong Aset 4 */
        .energy-module {
            position: absolute;
            bottom: 65px;
            left: 55px;
            width: 190px;
        }

        .energy-text {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            margin-bottom: 4px;
        }

        .bar-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* FOOTER QUOTE */
        .quote-footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-style: italic;
            color: #aaa;
            font-size: 1.1rem;
            border-top: 1px solid rgba(189, 0, 255, 0.2);
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="ui-container">
    <div class="header-panel"></div>

    <div class="profile-section">
        <div class="driver-img" style="background-image: url('URL_FOTO_ANDA_DISINI');"></div>
        <div class="level-number">12</div>
    </div>

    <div class="info-center">
        <div class="tag-status">Full Time Associate</div>
        <h2 class="driver-name">Rizal "Speedster"</h2>
        <p class="id-label">ID Driver • <span>DRV123456</span></p>
        <div class="points-box">4,850 PTS</div>
    </div>

    <div class="badge-section">
        <div class="energy-module">
            <div class="energy-text">
                <span>ENERGY</span>
                <span>63%</span>
            </div>
            <div class="bar-track">
                <div class="bar-fill" style="width: 63%;"></div>
            </div>
        </div>
    </div>

    <footer class="quote-footer">
        "Driver hebat tidak hanya cepat, tetapi selalu sampai dengan selamat."
    </footer>
</div>

</body>
</html>
