<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Interface High-Precision</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --neon-purple: #bd00ff;
            --neon-blue: #00d1ff;
            --gold: #ffd700;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            /* Latar belakang radial sesuai Gambar 1 */
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #05020a 100%);
            overflow: hidden;
        }

        /* Container Utama - Diperlebar agar presisi */
        .ui-container {
            width: 1100px;
            height: 600px;
            position: relative;
            box-sizing: border-box;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* HEADER PANEL (Gunakan aset 1001152331.png) */
        .header-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 140px;
            background: url('1001152331.png') no-repeat center;
            background-size: contain;
            z-index: 10;
        }

        /* PROFILE SECTION (Gunakan aset 1001152308.png) */
        .profile-section {
            position: absolute;
            top: 160px;
            left: 40px;
            width: 340px;
            height: 380px;
            background: url('1001152308.png') no-repeat center;
            background-size: contain;
            z-index: 5;
        }

        .driver-img {
            position: absolute;
            top: 66px;
            left: 72px;
            width: 195px;
            height: 215px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background-size: cover;
            background-position: center;
            z-index: -1; /* Supaya tertutup bingkai aset */
        }

        .level-number {
            position: absolute;
            top: 112px;
            right: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px var(--neon-purple);
        }

        /* INFO TENGAH - Disesuaikan agar pas di sela-sela frame */
        .info-center {
            position: absolute;
            top: 210px;
            left: 410px;
            width: 350px;
        }

        .tag-status {
            display: inline-block;
            padding: 3px 15px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0, 209, 255, 0.1);
            margin-bottom: 12px;
        }

        .driver-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.6rem;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .id-label { 
            font-size: 1.1rem; 
            color: #ccc; 
            margin: 8px 0; 
            letter-spacing: 1px;
        }
        .id-label span { color: var(--neon-purple); font-weight: 700; }

        .sub-info {
            font-size: 1.1rem;
            color: #999;
            margin: 5px 0;
            line-height: 1.4;
        }

        .points-box {
            margin-top: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            border-left: 3px solid var(--gold);
            padding-left: 15px;
        }

        /* BADGE SECTION (Gunakan aset 1001152338.png) */
        .badge-section {
            position: absolute;
            top: 160px;
            right: 40px;
            width: 320px;
            height: 380px;
            background: url('1001152338.png') no-repeat center;
            background-size: contain;
            z-index: 5;
        }

        .energy-module {
            position: absolute;
            bottom: 75px;
            left: 58px;
            width: 205px;
        }

        .energy-text {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .bar-track {
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* FOOTER QUOTE */
        .quote-footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-style: italic;
            color: #888;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(189, 0, 255, 0.15);
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="ui-container">
    <div class="header-panel"></div>

    <div class="profile-section">
        <div class="driver-img" style="background-image: url('FOTO_DRIVER.jpg');"></div>
        <div class="level-number">12</div>
    </div>

    <div class="info-center">
        <div class="tag-status">Full Time Associate</div>
        <h2 class="driver-name">Rizal "Speedster"</h2>
        <p class="id-label">ID Driver • <span>DRV123456</span></p>
        
        <div class="sub-info">
            Motor: NMAX • AB 1234 XY <br>
            Wilayah: Sleman • Yogyakarta
        </div>

        <div class="points-box">
            TOTAL POINTS: 4,850
        </div>
    </div>

    <div class="badge-section">
        <div class="energy-module">
            <div class="energy-text">
                <span>ENERGY</span>
                <span>63%</span>
            </div>
            <div class="bar-track">
                <div class="bar-fill" style="width: 63%;"></div>
            </div>
        </div>
    </div>

    <footer class="quote-footer">
        "Driver hebat tidak hanya cepat, tetapi selalu sampai dengan selamat."
    </footer>
</div>

</body>
</html>
