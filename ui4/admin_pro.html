<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ARCHITECT | SOVEREIGN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #141418; --border: #333; --text: #eee; --accent: #ff4757; --accent-hover: #ff6b81; --success: #2ed573; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: var(--accent-hover); }
        
        /* DASHBOARD */
        #dashboard { display: none; max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        h1 { color: var(--accent); margin: 0; font-size: 24px; }
        
        /* TABLE */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #1a1a20; color: #888; font-weight: normal; }
        tr:hover { background: #1f1f25; }
        .badge-pending { background: rgba(255, 165, 2, 0.2); color: #ffa502; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-verified { background: rgba(46, 213, 115, 0.2); color: var(--success); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        
        .btn-edit { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; width: auto; }
        .btn-edit:hover { background: var(--accent); color: white; }

        /* MODAL */
        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 400px; padding: 25px; border-radius: 12px; border: 1px solid var(--accent); position: relative; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; color: var(--accent); }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        select { width: 100%; padding: 12px; background: #222; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-close { background: #333; margin-top: 10px; }
        .btn-close:hover { background: #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--accent); margin-top:0;">MASTER ACCESS</h2>
            <input type="email" id="admin-email" placeholder="Email Admin">
            <input type="password" id="admin-pass" placeholder="Password">
            <button onclick="login()">AUTHORIZE</button>
            <p id="login-msg" style="color:#888; font-size:12px;"></p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <div>
                <h1>ARCHITECT COMMAND CENTER</h1>
                <p style="color:#888; font-size:14px; margin:5px 0 0 0;">Shard Aktif: <b>KNG_01</b></p>
            </div>
            <button onclick="logout()" style="width: auto; padding: 10px 20px; background: #333;">LOGOUT</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID User</th>
                    <th>Nama Lengkap</th>
                    <th>Rank</th>
                    <th>Status</th>
                    <th>Stamina</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="user-table-body">
                <tr><td colspan="6" style="text-align:center;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <h3>EDIT ADVENTURER</h3>
            <p id="edit-userid" style="color:#888; font-size:12px; margin-top:-10px; margin-bottom: 20px;"></p>
            
            <div class="form-group">
                <label>Status Verifikasi</label>
                <select id="edit-status">
                    <option value="WAITING_ROOM">WAITING ROOM (Pending)</option>
                    <option value="VERIFIED">VERIFIED (Aktif)</option>
                    <option value="BANNED">BANNED (Blokir)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Rank Adventurer</label>
                <select id="edit-rank">
                    <option value="TRAINER">TRAINER</option>
                    <option value="E-RANK">E-RANK</option>
                    <option value="D-RANK">D-RANK</option>
                    <option value="C-RANK">C-RANK</option>
                    <option value="B-RANK">B-RANK</option>
                    <option value="A-RANK">A-RANK</option>
                    <option value="S-RANK">S-RANK</option>
                </select>
            </div>

            <div class="form-group">
                <label>Stamina Saat Ini</label>
                <input type="number" id="edit-stamina">
            </div>

            <div class="form-group">
                <label>EXP Saat Ini</label>
                <input type="number" id="edit-exp">
            </div>

            <div class="form-group">
                <label>Jumlah Batu (Trust Score / Mata Uang)</label>
                <input type="number" id="edit-trust">
            </div>

            <button onclick="saveChanges()" id="btn-save">SIMPAN PERUBAHAN</button>
            <button class="btn-close" onclick="closeModal()">BATAL</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const SHARD = "KNG_01"; // Target Folder Anda
        let currentEditingId = "";

        // --- SISTEM AUTENTIKASI ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadUsers(); // Muat data jika sudah login
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        function login() {
            const em = document.getElementById('admin-email').value;
            const pw = document.getElementById('admin-pass').value;
            const msg = document.getElementById('login-msg');
            msg.innerText = "Memverifikasi...";
            
            auth.signInWithEmailAndPassword(em, pw)
                .catch(err => { msg.innerText = "Akses Ditolak: " + err.message; msg.style.color = "red"; });
        }

        function logout() { auth.signOut(); }

        // --- SISTEM PENGAMBILAN DATA (READ) ---
        async function loadUsers() {
            const tbody = document.getElementById('user-table-body');
            
            try {
                // Ambil data profil
                const idSnap = await db.ref(`identity_adventurer/${SHARD}`).once('value');
                // Ambil data status (stamina, dll)
                const statSnap = await db.ref(`adventurer_status/${SHARD}`).once('value');
                
                const identities = idSnap.val() || {};
                const statuses = statSnap.val() || {};
                
                tbody.innerHTML = '';

                // Looping semua user yang ada
                for (let userId in identities) {
                    const user = identities[userId];
                    const stat = statuses[userId] || { current_stamina: 0 }; // Default jika belum ada status
                    
                    const statusClass = user.status_terverifikasi === "VERIFIED" ? "badge-verified" : "badge-pending";
                    
                    // Simpan data gabungan di memory tombol untuk dilempar ke Modal
                    const safeUserData = encodeURIComponent(JSON.stringify({...user, ...stat}));

                    tbody.innerHTML += `
                        <tr>
                            <td style="color:var(--accent)">${userId}</td>
                            <td>${user.nama || 'Tanpa Nama'}</td>
                            <td><b>${user.rank || 'TRAINER'}</b></td>
                            <td><span class="${statusClass}">${user.status_terverifikasi || 'WAITING_ROOM'}</span></td>
                            <td>${stat.current_stamina} / ${stat.max_stamina || 100}</td>
                            <td>
                                <button class="btn-edit" onclick="openModal('${userId}', '${safeUserData}')">EDIT</button>
                            </td>
                        </tr>
                    `;
                }

                if(Object.keys(identities).length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Belum ada Adventurer di Shard ini.</td></tr>';
                }

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" style="color:red;">Error membaca data: ${error.message} <br> Pastikan Rules Firebase sudah diupdate.</td></tr>`;
            }
        }

        // --- SISTEM PENGELOLAAN DATA (UPDATE) ---
        function openModal(userId, encodedData) {
            currentEditingId = userId;
            const data = JSON.parse(decodeURIComponent(encodedData));
            
            document.getElementById('edit-userid').innerText = "ID: " + userId;
            
            // Isi nilai modal dengan data saat ini
            document.getElementById('edit-status').value = data.status_terverifikasi || "WAITING_ROOM";
            document.getElementById('edit-rank').value = data.rank || "TRAINER";
            document.getElementById('edit-stamina').value = data.current_stamina || 0;
            document.getElementById('edit-exp').value = data.exp || 0;
            document.getElementById('edit-trust').value = data.trust_score || 0;
            
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditingId = "";
        }

        async function saveChanges() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "MENYIMPAN...";
            
            // 1. Ambil nilai baru dari Modal
            const newStatus = document.getElementById('edit-status').value;
            const newRank = document.getElementById('edit-rank').value;
            const newTrust = parseInt(document.getElementById('edit-trust').value) || 0;
            const newStamina = parseInt(document.getElementById('edit-stamina').value) || 0;
            const newExp = parseInt(document.getElementById('edit-exp').value) || 0;

            try {
                // 2. Update node 'identity_adventurer'
                await db.ref(`identity_adventurer/${SHARD}/${currentEditingId}`).update({
                    status_terverifikasi: newStatus,
                    rank: newRank,
                    trust_score: newTrust
                });

                // 3. Update node 'adventurer_status'
                await db.ref(`adventurer_status/${SHARD}/${currentEditingId}`).update({
                    current_stamina: newStamina,
                    exp: newExp
                });

                // Jika sukses
                closeModal();
                loadUsers(); // Refresh tabel untuk melihat perubahan
                alert("Data berhasil diubah!");

            } catch (error) {
                alert("Gagal menyimpan: " + error.message);
            } finally {
                btn.innerText = "SIMPAN PERUBAHAN";
            }
        }
    </script>
</body>
</html>
