<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUEST CLEARANCE | RESULT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-gold: #ffcc00; --neon-blue: #00f3ff; --bg: #050508; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .clear-container {
            text-align: center; width: 90%; max-width: 400px;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stamp {
            font-size: 80px; color: var(--neon-gold); font-weight: 900;
            text-transform: uppercase; letter-spacing: -5px; line-height: 1;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.5); margin-bottom: 20px;
        }
        .reward-grid {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 15px; padding: 20px; margin: 20px 0;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .stat-box { font-size: 12px; color: #888; }
        .stat-val { font-size: 18px; color: #fff; font-weight: bold; display: block; }
        
        .tip-box {
            background: rgba(0, 243, 255, 0.05); border-left: 3px solid var(--neon-blue);
            padding: 15px; text-align: left; margin-bottom: 30px; font-size: 13px;
        }
        .btn-return {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--neon-blue); color: #000; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(1.5); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="clear-container">
        <div class="stamp">CLEARED</div>
        <p style="color:var(--neon-gold); letter-spacing: 2px;">MISI BERHASIL DISELESAIKAN</p>

        <div class="reward-grid">
            <div class="stat-box">EXP GAINED <span class="stat-val" id="res-exp">+0</span></div>
            <div class="stat-box">REWARD <span class="stat-val" id="res-stone">0 STONE</span></div>
            <div class="stat-box">STAMINA <span class="stat-val" style="color:#ff4444">-25 HP</span></div>
            <div class="stat-box">STATUS <span class="stat-val" style="color:#00ff88">SUCCESS</span></div>
        </div>

        <div class="tip-box">
            <strong style="color:var(--neon-blue); display: block; margin-bottom: 5px;">[ EDUKASI ADVENTURER ]</strong>
            <span id="edu-text">Selalu bersihkan cache browser Anda secara berkala agar performa sinyal P2P tetap stabil saat berada di Battlefield.</span>
        </div>

        <p style="font-size: 11px; color: #444; margin-bottom: 15px;">MEMBERSIHKAN JALUR SINYAL (CLEANING DATA)...</p>
        <button class="btn-return" onclick="finalizeAndReturn()">KEMBALI KE GUILD</button>
    </div>

    <script>
        const eduTips = [
            "Pastikan baterai perangkat di atas 20% sebelum menerima misi peringkat B ke atas.",
            "Gunakan fitur 'Quick Chat' untuk melapor dengan cepat tanpa mengganggu konsentrasi berkendara.",
            "Rating yang baik dari Requester akan mempercepat kenaikan Rank Anda ke Tier S.",
            "Terima kasih telah menjaga keamanan dan kenyamanan warga di sektor ini!"
        ];

        window.onload = () => {
            // Pilih edukasi acak
            document.getElementById('edu-text').innerText = eduTips[Math.floor(Math.random() * eduTips.length)];
            
            // Ambil data reward dari URL atau LocalStorage (Dummy untuk demo)
            document.getElementById('res-exp').innerText = "+500 EXP";
            document.getElementById('res-stone').innerText = "2 GREEN STONE";

            // Trigger pembersihan otomatis di background
            cleanMissionGarbage();
        };

        function cleanMissionGarbage() {
            // Membersihkan semua jejak misi di browser
            localStorage.removeItem('active_mission_id');
            localStorage.removeItem('last_quest_node');
            // Menutup koneksi P2P jika ada variabel global (jika menggunakan library P2P)
            if(window.peer) window.peer.destroy();
            console.log("Memory Cleaned.");
        }

        function finalizeAndReturn() {
            // Redirect ke halaman utama (Dashboard)
            window.location.replace('dashboard.html');
        }
    </script>
</body>
</html>
