<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Driver - Ojek Lokal</title>
    <link rel="stylesheet" href="css/style-main.css">
    <style>
        .login-container { padding: 30px; text-align: center; margin-top: 50px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-login { width: 100%; padding: 15px; background: #FFD700; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Ojek Lokal</h1>
        <p>Registrasi Driver Baru</p>
        <br>
        <div class="input-group">
            <label>Nomor NIK (KTP):</label>
            <input type="number" id="login-nik" placeholder="Contoh: 3208...">
        </div>
        <div class="input-group">
            <label>Nama Lengkap:</label>
            <input type="text" id="login-nama" placeholder="Masukkan nama asli">
        </div>
        <button class="btn-login" onclick="prosesLogin()">DAFTAR / MASUK</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        function prosesLogin() {
            const nik = document.getElementById('login-nik').value;
            const nama = document.getElementById('login-nama').value;

            if(nik.length < 5 || nama.length < 3) {
                alert("Data tidak valid!");
                return;
            }

            // Simpan data ke Firebase agar Admin bisa melihat
            db.ref('drivers/' + nik).set({
                nama: nama,
                status: "pending", // Defaultnya pending (terkunci)
                saldo: 0,
                rating: 5
            }).then(() => {
                // Simpan di memori HP agar index.html tahu siapa yang masuk
                localStorage.setItem('driver_nik', nik);
                localStorage.setItem('driver_nama', nama);
                
                alert("Pendaftaran berhasil! Tunggu aktivasi Admin.");
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
