<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | Seleksi Ksatria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.1); }
        
        .card-candidate {
            animation: slideIn 0.4s ease-out;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .pulse-gold { box-shadow: 0 0 0 0 rgba(202, 138, 4, 0.4); animation: pulseGold 2s infinite; }
        @keyframes pulseGold { 70% { box-shadow: 0 0 0 15px rgba(202, 138, 4, 0); } 100% { box-shadow: 0 0 0 0 rgba(202, 138, 4, 0); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-6 pt-12 glass rounded-b-[2rem] z-50">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-xl font-black italic gold-text uppercase">Seleksi Ksatria</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1" id="quest-id-display">Misi: ...</p>
            </div>
            <div class="bg-slate-900 px-3 py-2 rounded-2xl border border-slate-800 text-center">
                <p id="candidate-count" class="text-lg font-black text-yellow-500">0</p>
                <p class="text-[8px] text-slate-500 uppercase font-bold">Pendaftar</p>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-4" id="candidate-list">
        <div id="waiting-state" class="flex flex-col items-center justify-center h-64 text-center space-y-4">
            <div class="w-16 h-16 border-4 border-yellow-500/20 border-t-yellow-500 rounded-full animate-spin"></div>
            <p class="text-xs text-slate-500 italic">Menyebarkan sinyal ke radar terdekat...</p>
        </div>
    </main>

    <footer class="p-6 bg-slate-950/80 border-t border-slate-900">
        <button onclick="cancelMission()" class="w-full py-4 text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-red-400 transition-colors">
            Batalkan Publikasi Misi
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = getFirestore(app);
        const rtdb = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');
        document.getElementById('quest-id-display').innerText = `ID: ${questId.substring(0, 12)}`;

        // 1. LISTEN PENDAFTAR (RTDB)
        function startCandidateListener() {
            const negoRef = ref(rtdb, `Active_Short_Quests/${questId}/negotiation_list`);
            
            onValue(negoRef, (snapshot) => {
                const list = snapshot.val();
                const container = document.getElementById('candidate-list');
                
                if (!list) {
                    document.getElementById('candidate-count').innerText = "0";
                    return;
                }

                container.innerHTML = ''; // Reset View
                document.getElementById('waiting-state').style.display = 'none';
                
                const uids = Object.keys(list);
                document.getElementById('candidate-count').innerText = uids.length;

                uids.forEach(async (uid) => {
                    // Ambil detail Adventurer dari Firestore (1x Read per candidate)
                    const userSnap = await getDoc(doc(firestore, "identity_adventurer", uid));
                    if (userSnap.exists()) {
                        renderCandidateCard(uid, userSnap.data());
                    }
                });
            });
        }

        function renderCandidateCard(uid, data) {
            const html = `
                <div class="card-candidate p-5 rounded-[2rem] flex items-center justify-between shadow-xl">
                    <div class="flex items-center space-x-4">
                        <div class="w-14 h-14 rounded-2xl bg-slate-800 border-2 border-slate-700 overflow-hidden">
                            <img src="https://ui-avatars.com/api/?name=${data.nickname}&background=0f172a&color=ca8a04" alt="Avatar">
                        </div>
                        <div>
                            <h3 class="font-black text-sm uppercase text-white">${data.nickname}</h3>
                            <div class="flex items-center space-x-2 mt-1">
                                <span class="text-[9px] bg-yellow-600 text-black px-2 py-0.5 rounded font-black">${data.rank}</span>
                                <span class="text-[9px] text-slate-400 font-bold">LVL ${data.level}</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="assignAdventurer('${uid}', '${data.nickname}')" class="bg-yellow-500 text-black w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                        <i class="fas fa-handshake text-xl"></i>
                    </button>
                </div>
            `;
            document.getElementById('candidate-list').insertAdjacentHTML('beforeend', html);
            playAudio('alert');
        }

        // 2. PILIH KSATRIA (The Contract Signing)
        window.assignAdventurer = async (uid, name) => {
            if (confirm(`Pilih ${name} untuk mengerjakan misi ini?`)) {
                try {
                    // Update RTDB: Tentukan pemenang
                    await update(ref(rtdb, `Active_Short_Quests/${questId}`), {
                        assigned_adventurer_id: uid,
                        status: "Assigned"
                    });

                    // Update Firestore: Status Misi
                    await updateDoc(doc(firestore, "quest_board_detail", questId), {
                        assigned_adventurer_id: uid,
                        status: "On-Going"
                    });

                    // Redirect ke Pusat Kendali Requester
                    window.location.href = `requester-control.html?id=${questId}`;
                } catch (e) { alert(e.message); }
            }
        };

        window.cancelMission = async () => {
            if(confirm("Batalkan misi ini? Saldo (jika ada) akan dikembalikan.")) {
                await remove(ref(rtdb, `Active_Short_Quests/${questId}`));
                window.location.href = "requester-dashboard.html";
            }
        };

        function playAudio(type) {
            const audio = new Audio(`assets/sounds/${type}.mp3`);
            audio.play().catch(()=>{});
        }

        auth.onAuthStateChanged(user => { if(user) startCandidateListener(); });
    </script>
</body>
</html>
