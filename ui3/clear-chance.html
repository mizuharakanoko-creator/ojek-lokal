<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | CLEAR CHANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        .clear-bg {
            background: radial-gradient(circle at center, #ca8a04 0%, #020617 70%);
            animation: bgFlash 1.5s ease-out;
        }
        @keyframes bgFlash { 0% { opacity: 0; } 100% { opacity: 1; } }

        .title-animate {
            font-size: 4rem; font-weight: 900; font-style: italic;
            letter-spacing: -0.05em; line-height: 0.8;
            background: linear-gradient(to bottom, #fff 30%, #fde047 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: titleDrop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes titleDrop { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .loot-card { animation: slideUp 0.5s ease-out 0.8s both; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .exp-bar { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .exp-progress { height: 100%; background: #10b981; width: 0%; transition: width 2s ease-in-out 1.2s; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 clear-bg">

    <div class="text-center mb-12">
        <h1 class="title-animate">CLEAR<br>CHANCE</h1>
        <p class="text-yellow-500 font-black tracking-[0.3em] uppercase mt-4 animate-pulse">Mission Accomplished</p>
    </div>

    <div class="loot-card w-full max-w-xs bg-slate-950/80 backdrop-blur-2xl border-2 border-yellow-500/30 rounded-[2.5rem] p-8 shadow-[0_0_50px_rgba(202,138,4,0.3)]">
        <h3 class="text-center text-[10px] font-black uppercase text-slate-500 tracking-widest mb-6">Acquired Rewards</h3>
        
        <div class="space-y-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-gem text-emerald-400 text-xl"></i>
                    <span class="text-xs font-bold text-slate-300">Green Stone</span>
                </div>
                <span id="reward-price" class="font-black text-white">+0</span>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-bolt text-yellow-500 text-xl"></i>
                    <span class="text-xs font-bold text-slate-300">Experience</span>
                </div>
                <span id="reward-exp" class="font-black text-emerald-400">+0 EXP</span>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-2">
                    <span>Rank Progress</span>
                    <span id="exp-percent">0%</span>
                </div>
                <div class="exp-bar">
                    <div id="exp-fill" class="exp-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <button onclick="backToBoard()" class="loot-card mt-12 w-full max-w-xs py-4 bg-white text-black font-black rounded-2xl uppercase tracking-widest active:scale-95 transition-all">
        Selesai & Tutup Jurnal
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = getFirestore(app);
        const rtdb = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');

        async function processRewards() {
            const user = auth.currentUser;
            if(!user) return;

            // 1. Ambil data Reward dari Firestore
            const qRef = doc(firestore, "quest_board_detail", questId);
            const qSnap = await getDoc(qRef);
            
            if(qSnap.exists()) {
                const data = qSnap.data();
                const amount = data.initial_price;
                const exp = data.exp;

                document.getElementById('reward-price').innerText = `+${amount.toLocaleString()}`;
                document.getElementById('reward-exp').innerText = `+${exp} EXP`;

                // 2. Tambah Wallet & EXP (Firestore)
                await updateDoc(doc(firestore, "wallet", user.uid), {
                    green_stone: increment(amount)
                });
                await updateDoc(doc(firestore, "adventurer_status", user.uid), {
                    current_exp: increment(exp),
                    current_quest_id: null, // Bebaskan status ksatria
                    mission_step: 0
                });

                // 3. PURGE DATA RTDB (0-Byte Strategy)
                // Hapus jejak misi & chat di RTDB agar database tetap ringan
                await remove(ref(rtdb, `Active_Short_Quests/${questId}`));
                await remove(ref(rtdb, `messages/${questId}`));

                // Animasi Bar
                setTimeout(() => {
                    document.getElementById('exp-fill').style.width = "65%"; // Contoh progress
                    document.getElementById('exp-percent').innerText = "65%";
                }, 500);
                
                playAudio('victory');
            }
        }

        window.backToBoard = () => {
            window.location.href = "board.html";
        };

        function playAudio(type) {
            const audio = new Audio(`assets/sounds/${type}.mp3`);
            audio.play().catch(()=>{});
        }

        // Jalankan proses otomatis saat load
        auth.onAuthStateChanged(user => { if(user) processRewards(); });
    </script>
</body>
</html>
