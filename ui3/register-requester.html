<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | Registrasi Requester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
        }

        .input-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(234, 179, 8, 0.1);
            transition: all 0.3s ease;
        }
        .input-box:focus-within {
            border-color: #ca8a04;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #ca8a04;
            color: #fde047;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen justify-center">

    <div class="text-center mb-10">
        <div class="inline-block p-4 rounded-full bg-yellow-500/10 border border-yellow-500/20 mb-4">
            <i class="fas fa-crown text-3xl text-yellow-500"></i>
        </div>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Daftar Sebagai <span class="text-yellow-500">Requester</span></h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-2">Dapatkan akses untuk memasang misi di Guild</p>
    </div>

    <div class="glass-panel p-8 space-y-6 shadow-2xl">
        
        <div class="space-y-2">
            <label class="text-[9px] font-black uppercase text-slate-500 ml-2 italic">Nama Lengkap / Instansi</label>
            <div class="input-box flex items-center px-4 py-4 rounded-2xl">
                <i class="fas fa-building text-slate-600 mr-3"></i>
                <input type="text" id="full-name" class="bg-transparent w-full text-sm outline-none" placeholder="Contoh: Circle Delive" required>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-[9px] font-black uppercase text-slate-500 ml-2 italic">WhatsApp Aktif</label>
            <div class="input-box flex items-center px-4 py-4 rounded-2xl">
                <i class="fab fa-whatsapp text-emerald-500 mr-3 text-lg"></i>
                <input type="tel" id="phone" class="bg-transparent w-full text-sm outline-none" placeholder="08123456xxxx" required>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-[9px] font-black uppercase text-slate-500 ml-2 italic">Tipe Requester</label>
            <select id="requester-type" class="input-box w-full bg-slate-900 px-4 py-4 rounded-2xl text-sm outline-none appearance-none">
                <option value="Personal">Personal (Individu)</option>
                <option value="Merchant">Merchant (Toko/Bisnis)</option>
                <option value="Corporate">Corporate (Perusahaan)</option>
            </select>
        </div>

        <div class="space-y-2">
            <label class="text-[9px] font-black uppercase text-slate-500 ml-2 italic">Alamat Domisili Utama</label>
            <textarea id="address" class="input-box w-full bg-slate-900 px-4 py-4 rounded-2xl text-sm outline-none h-20" placeholder="Jl. Raya Kuningan No. 123..."></textarea>
        </div>

        <div class="flex items-start space-x-3 p-2">
            <input type="checkbox" id="terms" class="mt-1 accent-yellow-500">
            <label for="terms" class="text-[9px] text-slate-500 leading-tight">Saya setuju untuk menjamin keamanan Adventurer dan membayar imbalan tepat waktu sesuai kontrak Guild.</label>
        </div>

        <button onclick="registerRequester()" class="btn-premium w-full py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs active:scale-95 transition-all">
            Aktifkan Akun Patron
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* CONFIG ANDA */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = getFirestore(app);

        window.registerRequester = async () => {
            const user = auth.currentUser;
            const terms = document.getElementById('terms').checked;
            
            if(!user) return alert("Silakan Login terlebih dahulu!");
            if(!terms) return alert("Anda harus menyetujui kode etik Requester.");

            const fullName = document.getElementById('full-name').value;
            const phone = document.getElementById('phone').value;
            const type = document.getElementById('requester-type').value;
            const address = document.getElementById('address').value;

            if(!fullName || !phone) return alert("Nama dan WhatsApp wajib diisi!");

            try {
                // 1. Simpan Identitas Requester di Firestore
                await setDoc(doc(firestore, "identity_requester", user.uid), {
                    full_name: fullName,
                    phone: phone,
                    requester_type: type,
                    main_address: address,
                    is_verified: false, // Perlu review admin untuk status 'Elite Patron'
                    total_mission_posted: 0,
                    created_at: serverTimestamp()
                });

                // 2. Inisialisasi Wallet Requester (Jika belum ada)
                await setDoc(doc(firestore, "wallet", user.uid), {
                    green_stone: 0,
                    last_update: serverTimestamp()
                }, { merge: true });

                // 3. Update Global User Type (Agar App tahu user ini masuk ke dashboard mana)
                await setDoc(doc(firestore, "users", user.uid), {
                    role: "Requester"
                }, { merge: true });

                alert("Pendaftaran Berhasil! Anda sekarang adalah Patron.");
                window.location.href = "requester-dashboard.html";
                
            } catch (error) {
                alert("Gagal mendaftar: " + error.message);
            }
        };
    </script>
</body>
</html>
