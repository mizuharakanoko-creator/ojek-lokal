<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>PICK ME | Pusat Kendali Misi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css' rel='stylesheet' />
    
    <style>
        /* THE IRON WALL */
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(234, 179, 8, 0.2); }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        /* CHAT BUBBLES */
        .msg-adv { background: #ca8a04; color: black; border-radius: 1.2rem 1.2rem 0 1.2rem; align-self: flex-end; }
        .msg-req { background: #1e293b; color: white; border-radius: 1.2rem 1.2rem 1.2rem 0; align-self: flex-start; }

        #map-container { height: 40vh; width: 100%; transition: all 0.5s ease; }
        #chat-container { height: 60vh; display: flex; flex-direction: column; transition: all 0.5s ease; }
        
        /* VIEW TOGGLE STATES */
        .focus-map #map-container { height: 85vh; }
        .focus-map #chat-container { height: 15vh; }

        .btn-action {
            background: linear-gradient(45deg, #1e293b, #0f172a);
            border: 1px solid #ca8a04;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }

        #watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.02; font-size: 10px; z-index: 9998; display: flex; flex-wrap: wrap; }
    </style>
</head>
<body class="flex flex-col">

    <div id="watermark"></div>

    <header class="glass p-4 pt-10 flex justify-between items-center z-50">
        <div class="flex items-center space-x-3">
            <div id="status-indicator" class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></div>
            <div>
                <h2 id="current-step-label" class="text-xs font-black uppercase gold-text">Menuju Lokasi (OTW)</h2>
                <p class="text-[9px] text-slate-500 uppercase tracking-widest">Target: <span id="target-name">Requester</span></p>
            </div>
        </div>
        <button onclick="toggleView()" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-yellow-500 border border-slate-700">
            <i id="toggle-icon" class="fas fa-comments"></i>
        </button>
    </header>

    <div id="map-container">
        <div id="map" class="w-full h-full"></div>
    </div>

    <div id="chat-container" class="glass border-t border-slate-800">
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4">
            <div class="msg-req p-3 max-w-[80%] text-xs shadow-lg">
                Sistem: Hubungi Requester jika Anda kesulitan menemukan titik lokasi.
            </div>
        </div>

        <div class="p-4 bg-slate-950 flex items-center space-x-2">
            <input type="text" id="chat-input" class="flex-1 bg-slate-900 border border-slate-800 rounded-full px-4 py-3 text-xs text-white" placeholder="Kirim pesan ke Requester...">
            <button onclick="sendMessage()" class="w-12 h-12 bg-yellow-500 text-black rounded-full flex items-center justify-center shadow-lg active:scale-90">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-24 left-0 right-0 px-6 z-[60]">
        <button id="main-action-btn" onclick="handleMainAction()" class="btn-action w-full py-4 rounded-2xl text-yellow-500 font-black uppercase tracking-widest text-sm shadow-2xl active:scale-95 transition-all">
            Sampai di Lokasi <i class="fas fa-map-marker-alt ml-2"></i>
        </button>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-slate-950 border-t border-slate-800 flex justify-around items-center z-50">
        <button onclick="window.location.href='board.html'" class="text-slate-500 text-xl"><i class="fas fa-home"></i></button>
        <button class="text-yellow-500 text-xl"><i class="fas fa-shield-alt"></i></button>
        <button onclick="triggerEmergency()" class="text-red-500 text-xl"><i class="fas fa-exclamation-triangle"></i></button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, push, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* PASTE CONFIG ANDA */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = getFirestore(app);
        const rtdb = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');
        let myUid = null;
        let currentStep = 2; // Default OTW
        let map;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                initMissionControl();
                initChat();
            } else {
                window.location.href = "login.html";
            }
        });

        // 1. MISSION LOGIC & STEPS
        function initMissionControl() {
            // Listen status misi di RTDB
            const questRef = ref(rtdb, `Active_Short_Quests/${questId}`);
            onSnapshot(doc(firestore, "quest_board_detail", questId), (ds) => {
                if(ds.exists()) {
                    const data = ds.data();
                    initMap(data.lat_start, data.long_start, data.lat_end, data.long_end);
                }
            });

            // Listen progress step
            onSnapshot(doc(firestore, "adventurer_status", myUid), (ds) => {
                if(ds.exists()) {
                    currentStep = ds.data().mission_step;
                    updateUIByStep(currentStep);
                }
            });
        }

        function updateUIByStep(step) {
            const btn = document.getElementById('main-action-btn');
            const label = document.getElementById('current-step-label');
            const indicator = document.getElementById('status-indicator');

            if (step === 2) {
                label.innerText = "Menuju Lokasi (OTW)";
                btn.innerHTML = `Sampai di Lokasi <i class="fas fa-map-marker-alt ml-2"></i>`;
                indicator.className = "w-3 h-3 bg-yellow-500 rounded-full animate-pulse";
            } else if (step === 3) {
                label.innerText = "Misi Sedang Berjalan";
                btn.innerHTML = `Selesaikan Misi (Clear Chance) <i class="fas fa-check-double ml-2"></i>`;
                btn.classList.add('bg-emerald-600', 'text-white');
                indicator.className = "w-3 h-3 bg-emerald-500 rounded-full animate-pulse";
            }
        }

        window.handleMainAction = async () => {
            playAudio('click');
            try {
                let nextStep = currentStep + 1;
                
                if (currentStep === 2) {
                    // Update ke Work/Chat
                    await updateDoc(doc(firestore, "adventurer_status", myUid), { mission_step: 3 });
                    await update(ref(rtdb, `Active_Short_Quests/${questId}`), { mission_step: 3 });
                } else if (currentStep === 3) {
                    // Lanjut ke Halaman Penilaian (Clear Chance)
                    window.location.href = `clear-chance.html?id=${questId}`;
                }
            } catch (e) { alert(e.message); }
        };

        // 2. CHAT LOGIC (RTDB - Zero Latency)
        function initChat() {
            const chatRef = ref(rtdb, `messages/${questId}`);
            onChildAdded(chatRef, (snapshot) => {
                const msg = snapshot.val();
                renderMessage(msg);
            });
        }

        window.sendMessage = () => {
            const input = document.getElementById('chat-input');
            if (!input.value) return;

            const chatRef = ref(rtdb, `messages/${questId}`);
            push(chatRef, {
                senderId: myUid,
                text: input.value,
                timestamp: Date.now()
            });
            input.value = '';
            playAudio('click');
        };

        function renderMessage(msg) {
            const container = document.getElementById('chat-messages');
            const isMe = msg.senderId === myUid;
            const html = `
                <div class="${isMe ? 'msg-adv' : 'msg-req'} p-3 max-w-[80%] text-xs shadow-md
