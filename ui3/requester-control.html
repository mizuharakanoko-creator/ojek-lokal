<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | Monitor Misi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css' rel='stylesheet' />
    
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(234, 179, 8, 0.2); }
        .msg-req { background: #ca8a04; color: black; border-radius: 1.2rem 1.2rem 0 1.2rem; align-self: flex-end; }
        .msg-adv { background: #1e293b; color: white; border-radius: 1.2rem 1.2rem 1.2rem 0; align-self: flex-start; }
        
        #map-container { height: 45vh; width: 100%; position: relative; }
        #chat-container { height: 55vh; display: flex; flex-direction: column; background: #0f172a; }

        .btn-pay {
            background: linear-gradient(45deg, #10b981, #059669);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <header class="glass p-4 pt-10 flex justify-between items-center z-50">
        <div class="flex items-center space-x-3">
            <div id="status-pulse" class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <div>
                <h2 id="step-title" class="text-xs font-black uppercase text-yellow-500 italic">Ksatria Sedang OTW</h2>
                <p class="text-[9px] text-slate-500 uppercase font-bold" id="adv-name">Menghubungkan...</p>
            </div>
        </div>
        <div class="flex space-x-2">
            <button onclick="callAdventurer()" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-emerald-400 border border-slate-700">
                <i class="fas fa-phone"></i>
            </button>
        </div>
    </header>

    <div id="map-container">
        <div id="map" class="w-full h-full"></div>
        <div class="absolute top-4 right-4 bg-black/60 px-3 py-1 rounded-full text-[9px] font-black uppercase text-white backdrop-blur">
            Live Satellite Trace
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4">
            </div>

        <div id="action-area" class="p-4 bg-slate-950 border-t border-slate-900">
            <div id="chat-input-row" class="flex items-center space-x-2">
                <input type="text" id="chat-input" class="flex-1 bg-slate-900 border border-slate-800 rounded-full px-4 py-3 text-xs text-white" placeholder="Kirim instruksi tambahan...">
                <button onclick="sendMessage()" class="w-12 h-12 bg-yellow-500 text-black rounded-full flex items-center justify-center">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div id="payment-row" class="hidden flex flex-col space-y-3">
                <p class="text-center text-[10px] text-emerald-400 font-black uppercase animate-bounce">Misi Selesai! Ksatria menunggu konfirmasi.</p>
                <button onclick="finalConfirm()" class="btn-pay w-full py-4 rounded-2xl text-white font-black uppercase tracking-widest text-sm">
                    Konfirmasi & Lepaskan Reward <i class="fas fa-coins ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const firestore = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');
        let map, advMarker;

        // 1. MONITOR MISSION STEP
        function monitorProgress() {
            const questRef = ref(rtdb, `Active_Short_Quests/${questId}`);
            onValue(questRef, (snap) => {
                const data = snap.val();
                if(!data) return;

                // Update UI berdasarkan Step
                const step = data.mission_step;
                const label = document.getElementById('step-title');
                
                if(step === 2) label.innerText = "Ksatria Sedang OTW";
                if(step === 3) label.innerText = "Ksatria di Lokasi / Bekerja";
                
                // JIKA STATUS COMPLETED_WAITING_REVIEW (Adventurer sudah klik Clear Chance)
                if(data.status === "Completed_Waiting_Review") {
                    document.getElementById('chat-input-row').classList.add('hidden');
                    document.getElementById('payment-row').classList.remove('hidden');
                }
            });
        }

        // 2. LIVE CHAT (Same logic as Adventurer)
        function initChat() {
            const chatRef = ref(rtdb, `messages/${questId}`);
            onChildAdded(chatRef, (snap) => {
                const msg = snap.val();
                const isMe = msg.senderId === getAuth().currentUser.uid;
                const html = `<div class="${isMe ? 'msg-req' : 'msg-adv'} p-3 max-w-[80%] text-xs shadow-md">${msg.text}</div>`;
                document.getElementById('chat-messages').insertAdjacentHTML('beforeend', html);
                document.getElementById('chat-messages').scrollTop = 9999;
            });
        }

        window.sendMessage = () => {
            const val = document.getElementById('chat-input').value;
            if(!val) return;
            push(ref(rtdb, `messages/${questId}`), {
                senderId: getAuth().currentUser.uid,
                text: val,
                timestamp: Date.now()
            });
            document.getElementById('chat-input').value = '';
        };

        // 3. LIVE MAPS (Monitoring Adventurer Position)
        function initMap() {
            map = new maplibre-gl.Map({
                container: 'map',
                style: 'https://demotiles.maplibre.org/style.json',
                center: [106.827, -6.175], // Default Jakarta
                zoom: 14
            });

            // Listen Live Location Adventurer (Asumsi data dikirim ksatria ke RTDB)
            // Di sini kita monitor koordinat yang diupdate ksatria setiap 10 detik
        }

        window.finalConfirm = () => {
            // Requester klik konfirmasi -> Alihkan ke halaman Rating & Thank You
            window.location.href = `requester-final.html?id=${questId}`;
        };

        auth.onAuthStateChanged(user => { if(user) { monitorProgress(); initChat(); initMap(); } });
    </script>
</body>
</html>
