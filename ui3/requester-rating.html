<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | Beri Pujian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(234, 179, 8, 0.2); }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .star-active { color: #fde047; transform: scale(1.2); }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen">

    <div class="flex-1 flex flex-col justify-center items-center space-y-8">
        <div class="text-center">
            <div class="w-20 h-20 bg-yellow-500/10 rounded-full flex items-center justify-center border border-yellow-500/30 mb-4 mx-auto">
                <i class="fas fa-medal text-3xl text-yellow-500"></i>
            </div>
            <h1 class="text-2xl font-black gold-text uppercase italic">Misi Selesai!</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mt-2">Berikan apresiasi pada Ksatria Anda</p>
        </div>

        <div class="glass w-full rounded-[2.5rem] p-8 text-center space-y-6">
            <p class="text-xs font-bold text-slate-400 uppercase">Bagaimana performa Ksatria?</p>
            
            <div class="flex justify-center space-x-4 text-3xl text-slate-700" id="star-box">
                <i class="fas fa-star cursor-pointer transition-all" data-val="1"></i>
                <i class="fas fa-star cursor-pointer transition-all" data-val="2"></i>
                <i class="fas fa-star cursor-pointer transition-all" data-val="3"></i>
                <i class="fas fa-star cursor-pointer transition-all" data-val="4"></i>
                <i class="fas fa-star cursor-pointer transition-all" data-val="5"></i>
            </div>

            <textarea id="review-text" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-4 text-sm text-white focus:border-yellow-500 outline-none h-24" placeholder="Tulis testimoni singkat (opsional)..."></textarea>
        </div>
    </div>

    <button onclick="submitRating()" class="w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase tracking-widest shadow-2xl active:scale-95 transition-all mb-4">
        Konfirmasi & Bayar
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const questId = urlParams.get('id');

        let currentRating = 0;

        // Star Logic
        document.querySelectorAll('#star-box i').forEach(star => {
            star.onclick = () => {
                currentRating = star.dataset.val;
                document.querySelectorAll('#star-box i').forEach(s => {
                    s.classList.toggle('star-active', s.dataset.val <= currentRating);
                });
            };
        });

        window.submitRating = async () => {
            if(currentRating === 0) return alert("Berikan rating bintang terlebih dahulu!");
            
            try {
                // Update RTDB: Tandai bahwa Requester sudah Approve & Beri Rating
                await update(ref(rtdb, `Active_Short_Quests/${questId}`), {
                    status: "Finalized",
                    requester_rating: currentRating,
                    requester_review: document.getElementById('review-text').value
                });
                
                window.location.href = `requester-success.html?id=${questId}`;
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
