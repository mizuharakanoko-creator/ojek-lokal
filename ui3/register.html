<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>PICK ME | Form Pendaftaran Ksatria</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* THE IRON WALL */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
            outline: none; scroll-behavior: smooth;
        }
        body {
            background: #0f172a; color: #f8fafc;
            overflow-x: hidden; font-family: 'Inter', sans-serif;
        }

        /* RPG ESTETIKA */
        .gold-text {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;
        }
        .input-rpg {
            background: rgba(30, 41, 59, 0.8) !important;
            border: 1px solid #334155 !important; color: white !important;
            width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 1rem;
            transition: all 0.3s; font-size: 0.875rem;
            -webkit-user-select: text; user-select: text; /* Allow typing */
        }
        .input-rpg:focus { border-color: #ca8a04 !important; box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); }
        .icon-rpg { position: absolute; left: 1rem; top: 1.1rem; color: #64748b; }

        /* MULTI-STEP TRANSITION */
        .step-container { display: none; animation: slideIn 0.4s ease-out forwards; }
        .step-active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* LOADING & OVERLAYS */
        #global-loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 9999; backdrop-filter: blur(5px); }
        .spinner { border: 4px solid rgba(234, 179, 8, 0.3); border-top: 4px solid #ca8a04; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.02; font-size: 10px; z-index: 9998; display: flex; flex-wrap: wrap; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div id="watermark"></div>

    <div id="global-loader" class="flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <h2 class="text-yellow-500 font-bold tracking-widest text-sm animate-pulse">MEMBENTUK KONTRAK GUILD...</h2>
        <p class="text-xs text-slate-400 mt-2">Menyimpan data ke Server Pusat & Wilayah</p>
    </div>

    <div class="text-center mt-6 mb-8">
        <h1 class="text-3xl font-black italic gold-text">REGISTRASI KSATRIA</h1>
        <p class="text-[10px] tracking-widest text-slate-400 uppercase">Pick Me - Guild Life</p>
    </div>

    <div class="flex justify-between items-center mb-8 px-4 relative">
        <div class="absolute top-1/2 left-8 right-8 h-1 bg-slate-800 -z-10 rounded"></div>
        <div class="absolute top-1/2 left-8 h-1 bg-yellow-500 -z-10 rounded transition-all duration-500" id="progress-line" style="width: 0%;"></div>
        
        <div class="w-8 h-8 rounded-full bg-yellow-500 text-black flex items-center justify-center font-bold text-xs shadow-[0_0_10px_#ca8a04]" id="dot-1">1</div>
        <div class="w-8 h-8 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center font-bold text-xs" id="dot-2">2</div>
        <div class="w-8 h-8 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center font-bold text-xs" id="dot-3">3</div>
    </div>

    <div class="flex-1 bg-slate-900/50 border border-slate-800 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
        
        <div id="step-1" class="step-container step-active space-y-4">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Identitas Asli</h2>
            
            <div class="relative"><i class="fas fa-user icon-rpg"></i><input type="text" id="reg-fullname" class="input-rpg" placeholder="Nama Lengkap (Sesuai KTP)"></div>
            <div class="relative"><i class="fas fa-id-card icon-rpg"></i><input type="number" id="reg-nik" class="input-rpg" placeholder="NIK KTP (16 Digit)"></div>
            <div class="relative"><i class="fas fa-phone icon-rpg"></i><input type="number" id="reg-phone" class="input-rpg" placeholder="Nomor Telepon Aktif"></div>
            <div class="relative"><i class="fas fa-mask icon-rpg"></i><input type="text" id="reg-nickname" class="input-rpg" placeholder="Nickname Guild (Tanpa Spasi)"></div>
            
            <button onclick="nextStep(2)" class="w-full mt-6 py-4 bg-slate-800 text-yellow-500 font-bold rounded-2xl active:scale-95 transition-all border border-slate-700">Lanjutkan Identitas <i class="fas fa-arrow-right ml-2"></i></button>
        </div>

        <div id="step-2" class="step-container space-y-4">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Area & Kendaraan</h2>
            
            <div class="relative">
                <i class="fas fa-map-marker-alt icon-rpg"></i>
                <select id="reg-area" class="input-rpg appearance-none">
                    <option value="" disabled selected>Pilih Area Tugas (Kecamatan)</option>
                    <option value="cigugur">Cigugur (Kuningan)</option>
                    <option value="kramatmulya">Kramatmulya (Kuningan)</option>
                    <option value="jalaksana">Jalaksana (Kuningan)</option>
                </select>
            </div>
            
            <div class="flex space-x-2">
                <div class="relative w-1/2">
                    <i class="fas fa-motorcycle icon-rpg"></i>
                    <select id="reg-vehicle" class="input-rpg appearance-none">
                        <option value="motor">Motor</option>
                        <option value="car">Mobil</option>
                    </select>
                </div>
                <div class="relative w-1/2">
                    <i class="fas fa-briefcase icon-rpg"></i>
                    <select id="reg-job" class="input-rpg appearance-none text-xs">
                        <option value="part_time">Part Time</option>
                        <option value="full_time">Full Time</option>
                    </select>
                </div>
            </div>

            <div class="relative"><i class="fas fa-car-side icon-rpg"></i><input type="text" id="reg-merk" class="input-rpg" placeholder="Merk Kendaraan (Cth: Honda Beat)"></div>
            <div class="relative"><i class="fas fa-closed-captioning icon-rpg"></i><input type="text" id="reg-plat" class="input-rpg uppercase" placeholder="Plat Nomor (Cth: E 1234 XX)"></div>
            
            <div class="flex space-x-3 mt-6">
                <button onclick="nextStep(1)" class="px-6 py-4 bg-slate-800 text-slate-400 font-bold rounded-2xl active:scale-95"><i class="fas fa-arrow-left"></i></button>
                <button onclick="nextStep(3)" class="flex-1 py-4 bg-slate-800 text-yellow-500 font-bold rounded-2xl border border-slate-700 active:scale-95">Set Keamanan <i class="fas fa-arrow-right ml-2"></i></button>
            </div>
        </div>

        <div id="step-3" class="step-container space-y-4">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2">Kontrak Keamanan</h2>
            
            <div class="relative"><i class="fas fa-lock icon-rpg"></i><input type="password" id="reg-pass" class="input-rpg" placeholder="Password Sistem"></div>
            
            <div class="p-3 bg-slate-800/50 rounded-xl border border-slate-700 space-y-3">
                <p class="text-[10px] text-yellow-500 font-bold mb-2"><i class="fas fa-shield-alt"></i> PERTANYAAN PEMULIHAN 1</p>
                <input type="text" id="reg-q1" class="w-full bg-slate-900 border border-slate-700 text-xs p-2 rounded text-white" placeholder="Contoh: Nama hewan peliharaan pertama?">
                <input type="text" id="reg-a1" class="w-full bg-slate-900 border border-slate-700 text-xs p-2 rounded text-white mt-1" placeholder="Jawaban rahasia">
            </div>

            <div class="flex space-x-3 mt-6">
                <button onclick="nextStep(2)" class="px-6 py-4 bg-slate-800 text-slate-400 font-bold rounded-2xl active:scale-95"><i class="fas fa-arrow-left"></i></button>
                <button onclick="submitRegistration()" class="flex-1 py-4 bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black rounded-2xl shadow-[0_0_15px_rgba(234,179,8,0.4)] active:scale-95 uppercase">Tanda Tangani Kontrak</button>
            </div>
        </div>
    </div>

    <div class="text-center mt-6 mb-4">
        <button onclick="window.location.href='login.html'" class="text-xs text-slate-500 hover:text-yellow-500">Sudah punya akun? Kembali ke Gerbang</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* Paste Config Anda */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // IRON WALL SECURITY
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        window.playAudio = (type) => {
            const audio = new Audio(`assets/sounds/${type}.mp3`);
            audio.play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate(type === 'click' ? 10 : 50);
        };

        // WIZARD LOGIC
        window.nextStep = (step) => {
            playAudio('click');
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('step-active'));
            document.getElementById(`step-${step}`).classList.add('step-active');
            
            // Update Progress Bar
            const progress = step === 1 ? 0 : step === 2 ? 50 : 100;
            document.getElementById('progress-line').style.width = `${progress}%`;
            
            // Update Dots
            for(let i=1; i<=3; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= step) {
                    dot.className = "w-8 h-8 rounded-full bg-yellow-500 text-black flex items-center justify-center font-bold text-xs shadow-[0_0_10px_#ca8a04] transition-all";
                } else {
                    dot.className = "w-8 h-8 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center font-bold text-xs transition-all";
                }
            }
        };

        // CORE REGISTRATION LOGIC
        window.submitRegistration = async () => {
            playAudio('click');
            
            // Ambil Data Form
            const data = {
                fullname: document.getElementById('reg-fullname').value,
                nik: document.getElementById('reg-nik').value,
                phone: document.getElementById('reg-phone').value,
                nickname: document.getElementById('reg-nickname').value.toLowerCase().replace(/\s+/g, ''),
                area: document.getElementById('reg-area').value,
                vehicle: document.getElementById('reg-vehicle').value,
                job: document.getElementById('reg-job').value,
                merk: document.getElementById('reg-merk').value,
                plat: document.getElementById('reg-plat').value.toUpperCase(),
                pass: document.getElementById('reg-pass').value,
                q1: document.getElementById('reg-q1').value,
                a1: document.getElementById('reg-a1').value
            };

            // Validasi Sederhana
            if(!data.fullname || !data.nik || !data.nickname || !data.pass || !data.area) {
                alert("Ada form penting yang masih kosong!");
                return;
            }

            document.getElementById('global-loader').style.display = 'flex';

            try {
                // 1. Buat Auth Email Buatan (Format: nickname@guild.com)
                const guildEmail = `${data.nickname}@guild.com`;
                const userCredential = await createUserWithEmailAndPassword(auth, guildEmail, data.pass);
                const uid = userCredential.user.uid;

                // Hitung Routing Server (Contoh Logika Sharding)
                // Jika area cigugur dan kendaraan motor -> kuningancigugur_01_umum
                const shardID = `kuningan${data.area}_01_${data.vehicle === 'motor' ? 'umum' : 'car'}`;
                
                // MENDISTRIBUSIKAN DATA KE 4 TABEL

                // A. Tabel Pusat: user_registry
                await setDoc(doc(db, "user_registry", uid), {
                    user_id: uid,
                    Alamat_Server: shardID,
                    status_terverifikasi: false,
                    role: "adventurer"
                });

                // B. Tabel Wilayah: identity_adventurer
                await setDoc(doc(db, "identity_adventurer", uid), {
                    nama: data.fullname,
                    user_id_adventurer: uid,
                    fcm_token: "", // Diisi nanti saat login
                    current_server_shard: shardID,
                    nickname: data.nickname,
                    nik_ktp: data.nik,
                    nomor_telpon: data.phone,
                    area_tugas: data.area,
                    // Note: Secara keamanan nyata, jangan simpan plain password. Tapi untuk skema Anda:
                    password_backup: data.pass, 
                    pertanyaan_1: data.q1,
                    jawaban_1: data.a1,
                    reputasi: "Pendatang Baru",
                    level: 1,
                    rank: "Bronze",
                    trust_score: 100,
                    specialization: data.vehicle,
                    job: data.job,
                    bulan_tahun_terdaftar: new Date().toISOString().slice(0, 7), // YYYY-MM
                    avatar_url: "",
                    status_terverifikasi: false,
                    provinsi: "Jawa Barat",
                    kabupaten: "Kuningan",
                    kecamatan: data.area,
                    vehicle_type: data.vehicle,
                    plat_nomor: data.plat,
                    merk: data.merk,
                    version_app: "1.0.0",
                    created_at: serverTimestamp()
                });

                // C. Tabel Wilayah: adventurer_status (Base Stats)
                await setDoc(doc(db, "adventurer_status", uid), {
                    user_id_adventurer: uid,
                    exp: 0,
                    max_exp: 100,
                    current_stamina: 100,
                    max_stamina: 100,
                    apply_limit_daily: 10,
                    total_misi_selesai: 0,
                    total_misi_batal: 0,
                    total_pembatalan_sepihak: 0,
                    jumlah_pelanggaran: 0,
                    current_quest_id: "",
                    mission_step: 0
                });

                // D. Tabel Wilayah: wallet (Empty)
                await setDoc(doc(db, "wallet", uid), {
                    user_id_adventurer: uid,
                    area_tugas: data.area,
                    green_stone: 0,
                    white_stone: 0,
                    red_stone: 0,
                    purple_stone: 0
                });

                playAudio('success');
                // Arahkan ke Waiting Room karena status_terverifikasi masih false
                window.location.href = "waiting-room.html";

            } catch (error) {
                playAudio('error');
                document.getElementById('global-loader').style.display = 'none';
                alert("Gagal Membentuk Kontrak: " + error.message);
            }
        };

        // FILL WATERMARK LOOP
        const wm = document.getElementById('watermark');
        for(let i=0; i<80; i++) wm.innerHTML += `<span>PICK-ME-SECURE &nbsp;</span>`;
    </script>
</body>
</html>
