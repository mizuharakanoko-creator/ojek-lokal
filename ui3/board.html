<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>PICK ME | Mission Board</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/geofire-common@6.0.0/dist/index.min.js"></script>
    
    <style>
        /* THE IRON WALL */
        * { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; outline: none; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.1); }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        /* SKELETON SHIMMER */
        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* STAMINA PULSE */
        @keyframes staminaPulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .pulse-red { animation: staminaPulse 1s infinite; background-color: #ef4444 !important; }

        /* MISSION CARD ANIMATION */
        .card-enter { animation: cardSlide 0.4s ease-out forwards; }
        @keyframes cardSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.02; font-size: 10px; z-index: 9998; display: flex; flex-wrap: wrap; }
    </style>
</head>
<body class="flex flex-col">

    <div id="watermark"></div>

    <header class="p-4 pt-10 glass rounded-b-[2.5rem] shadow-2xl z-50">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-2xl bg-slate-800 border-2 border-yellow-500 overflow-hidden shadow-[0_0_15px_rgba(234,179,8,0.3)]">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=Ksatria&background=ca8a04&color=fff" alt="Avatar">
                </div>
                <div>
                    <h2 id="user-nickname" class="font-black text-sm uppercase tracking-tighter">Loading...</h2>
                    <div class="flex items-center space-x-1">
                        <span id="user-rank" class="text-[9px] bg-slate-700 px-2 py-0.5 rounded-full text-yellow-500 font-bold">BRONZE</span>
                        <span id="user-level" class="text-[9px] text-slate-400">LVL 1</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <div class="flex items-center space-x-2 bg-slate-900/80 px-3 py-1.5 rounded-xl border border-slate-700">
                    <i class="fas fa-gem text-emerald-400 text-xs"></i>
                    <span id="wallet-green" class="text-xs font-bold font-mono">0</span>
                </div>
            </div>
        </div>

        <div class="space-y-1">
            <div class="flex justify-between text-[9px] font-bold uppercase tracking-widest text-slate-500">
                <span>Energy Stamina</span>
                <span id="stamina-val">100/100</span>
            </div>
            <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                <div id="stamina-bar" class="h-full bg-yellow-500 transition-all duration-500" style="width: 100%;"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4" id="mission-container">
        <div class="flex justify-between items-center px-1">
            <h3 class="text-xs font-black uppercase text-slate-500 tracking-[0.2em]">Papan Misi Radius 3KM</h3>
            <div class="flex items-center space-x-1">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-emerald-500 font-bold uppercase">Live Radar</span>
            </div>
        </div>

        <div id="board-skeleton" class="space-y-4">
            <div class="w-full h-24 rounded-2xl shimmer opacity-20"></div>
            <div class="w-full h-24 rounded-2xl shimmer opacity-20"></div>
            <div class="w-full h-24 rounded-2xl shimmer opacity-20"></div>
        </div>

        <div id="active-missions" class="space-y-3">
            </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-xl border-t border-slate-800 z-50">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <button class="flex flex-col items-center space-y-1 text-yellow-500">
                <i class="fas fa-scroll text-xl"></i>
                <span class="text-[9px] font-bold uppercase">Board</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-slate-500 opacity-50" onclick="showAlert('Fitur Map sedang dikalibrasi oleh Guild.', 'info')">
                <i class="fas fa-map-marked-alt text-xl"></i>
                <span class="text-[9px] font-bold uppercase">Explore</span>
            </button>
            <button class="flex flex-col items-center space-y-1 text-slate-500 opacity-50">
                <i class="fas fa-user-shield text-xl"></i>
                <span class="text-[9px] font-bold uppercase">Rank</span>
            </button>
        </div>
    </footer>

    <div id="mission-modal" class="fixed inset-0 bg-black/90 z-[100] hidden items-end justify-center p-4">
        <div class="w-full max-w-md glass rounded-3xl p-6 card-enter">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="mod-cat" class="text-[10px] bg-yellow-600 text-black px-2 py-0.5 rounded font-black uppercase">Loading...</span>
                    <h2 id="mod-title" class="text-xl font-black mt-2 leading-tight">Detail Misi</h2>
                </div>
                <button onclick="closeMission()" class="text-slate-500"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            
            <div class="space-y-4 mb-8">
                <div class="flex items-center space-x-4 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                    <i class="fas fa-coins text-yellow-500 text-xl"></i>
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase">Imbalan Dasar</p>
                        <p id="mod-price" class="font-black text-lg text-white">Rp 0</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-900/50 p-3 rounded-xl">
                        <p class="text-[9px] text-slate-500 uppercase">Difficulty</p>
                        <p id="mod-diff" class="text-xs font-bold text-slate-200 uppercase">Normal</p>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-xl">
                        <p class="text-[9px] text-slate-500 uppercase">EXP Reward</p>
                        <p id="mod-exp" class="text-xs font-bold text-emerald-400">+0 EXP</p>
                    </div>
                </div>
            </div>

            <button onclick="takeMission()" class="w-full py-4 bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black rounded-2xl shadow-xl active:scale-95 transition-transform uppercase tracking-widest">
                Terima Kontrak & Briefing
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, onValue, query, orderByChild, startAt, endAt } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* PASTE CONFIG ANDA */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = getFirestore(app);
        const rtdb = getDatabase(app);

        let userCoords = null;
        let selectedQuestId = null;

        // IRON WALL SECURITY
        document.addEventListener('contextmenu', e => e.preventDefault());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadUserProfile(user.uid);
                startLiveRadar();
            } else {
                window.location.href = "login.html";
            }
        });

        // 1. LOAD PROFILE & WALLET (Firestore)
        async function loadUserProfile(uid) {
            // Real-time listener untuk status & stamina
            onSnapshot(doc(firestore, "adventurer_status", uid), (ds) => {
                if(ds.exists()) {
                    const d = ds.data();
                    document.getElementById('stamina-val').innerText = `${d.current_stamina}/${d.max_stamina}`;
                    const percent = (d.current_stamina / d.max_stamina) * 100;
                    const sBar = document.getElementById('stamina-bar');
                    sBar.style.width = percent + "%";
                    
                    if(percent < 20) sBar.classList.add('pulse-red');
                    else sBar.classList.remove('pulse-red');
                }
            });

            onSnapshot(doc(firestore, "identity_adventurer", uid), (ds) => {
                if(ds.exists()) {
                    document.getElementById('user-nickname').innerText = ds.data().nickname;
                    document.getElementById('user-rank').innerText = ds.data().rank;
                    document.getElementById('user-level').innerText = `LVL ${ds.data().level}`;
                }
            });

            onSnapshot(doc(firestore, "wallet", uid), (ds) => {
                if(ds.exists()) document.getElementById('wallet-green').innerText = ds.data().green_stone;
            });
        }

        // 2. LIVE RADAR 3KM (Geolocation + RTDB Geohash)
        function startLiveRadar() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const center = [userCoords.lat, userCoords.lng];
                    const radiusInM = 3000; // 3km

                    // GEOPREFIX LOGIC: Dapatkan range geohash untuk radius 3km
                    const bounds = geofire.geohashQueryBounds(center, radiusInM);
                    
                    // Fetch dari RTDB (Misi Aktif Wilayah)
                    // Note: Sesuaikan path sesuai shard wilayah user
                    const questRef = ref(rtdb, "Active_Short_Quests");
                    
                    // Bersihkan board sebelum render ulang (opsional untuk performa)
                    document.getElementById('active-missions').innerHTML = '';
                    document.getElementById('board-skeleton').style.display = 'none';

                    bounds.forEach((b) => {
                        const q = query(questRef, orderByChild('geohash'), startAt(b[0]), endAt(b[1]));
                        onValue(q, (snapshot) => {
                            snapshot.forEach((child) => {
                                const quest = child.val();
                                renderMissionCard(child.key, quest);
                            });
                        });
                    });
                });
            }
        }

        // 3. RENDER UI MISSION CARD
        function renderMissionCard(id, data) {
            // Cek jika kartu sudah ada agar tidak duplikat
            if(document.getElementById(`card-${id}`)) return;

            const html = `
                <div id="card-${id}" onclick="openMission('${id}')" class="bg-slate-900/40 border border-slate-800 p-4 rounded-2xl flex items-center justify-between card-enter active:scale-95 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center text-yellow-500 border border-slate-700">
                            <i class="${data.category_icon || 'fas fa-box'} text-xl"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-slate-200">${data.brief_description}</h4>
                            <p class="text-[10px] text-slate-500 italic"><i class="fas fa-map-marker-alt mr-1"></i> ±3 km dari lokasi Anda</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black text-yellow-500">Rp ${data.initial_price.toLocaleString()}</p>
                        <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-tighter">${data.status}</p>
                    </div>
                </div>
            `;
            document.getElementById('active-missions').insertAdjacentHTML('beforeend', html);
            playAudio('alert'); // Bunyi saat ada misi masuk radar
        }

        // 4. DETAIL MISI (1x Read Firestore)
        window.openMission = async (id) => {
            selectedQuestId = id;
            playAudio('click');
            
            // Tampilkan Modal
            document.getElementById('mission-modal').style.display = 'flex';
            
            // Fetch Detail Lengkap dari Firestore
            const docRef = doc(firestore, "quest_board_detail", id);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const d = docSnap.data();
                document.getElementById('mod-cat').innerText = d.kategori_misi;
                document.getElementById('mod-title').innerText = d.reward; // Deskripsi lengkap reward
                document.getElementById('mod-price').innerText = `Rp ${d.initial_price.toLocaleString()}`;
                document.getElementById('mod-diff').innerText = d.difficulty_tier;
                document.getElementById('mod-exp').innerText = `+${d.exp} EXP`;
            }
        };

        window.closeMission = () => {
            document.getElementById('mission-modal').style.display = 'none';
        };

        window.takeMission = () => {
            playAudio('success');
            // Logika lanjut ke halaman Selected / Chat
            window.location.href = `mission-on-going.html?id=${selectedQuestId}`;
        };

        function playAudio(type) {
            const audio = new Audio(`assets/sounds/${type}.mp3`);
            audio.play().catch(()=>{});
        }

        window.showAlert = (msg) => { alert(msg); };

    </script>
</body>
</html>
