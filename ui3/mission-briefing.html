<html lang="id">

    <meta name="google" content="notranslate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>PICK ME | Briefing Misi</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js'></script>

    <style>
        /* THE IRON WALL */
        * { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; outline: none; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(234, 179, 8, 0.2); }
        .gold-text { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        /* SCROLL EFFECT */
        .briefing-scroll {
            background: #1e293b;
            border-left: 4px solid #ca8a04;
            position: relative;
            overflow: hidden;
        }
        .briefing-scroll::before {
            content: ""; position: absolute; top: 0; right: 0;
            width: 50px; height: 100%;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.2));
        }

        #map { width: 100%; height: 200px; border-radius: 1.5rem; border: 2px solid #1e293b; }

        .btn-otw {
            background: linear-gradient(45deg, #ca8a04, #fde047);
            box-shadow: 0 10px 20px rgba(202, 138, 4, 0.3);
        }

        #watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.02; font-size: 10px; z-index: 9998; display: flex; flex-wrap: wrap; }
    </style>
</head>
