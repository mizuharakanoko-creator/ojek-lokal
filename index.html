<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojek Kuningan - User</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="screen-order" class="active-screen">
        <div class="card header-main">
            <h1>📍 Ojek Kuningan</h1>
            <p>Tarif Pasti, Driver Lokal, Tanpa Receh</p>
            <button class="btn-gps" onclick="userAmbilLokasi()" id="btn-gps">
                <span class="icon">📍</span> GUNAKAN LOKASI SAYA
            </button>
        </div>

        <div class="card">
            <label>Pilih Tujuan (Kecamatan):</label>
            <select id="select-kecamatan" onchange="renderDesa()">
                <option value="">-- Pilih Kecamatan --</option>
                </select>

            <label>Pilih Desa/Kelurahan:</label>
            <select id="select-desa" onchange="prosesHitungTarif()" style="display:none;"></select>
            
            <div id="price-section" style="display: none;">
                <div class="info-badge">
                    <span id="display-jarak">0 KM</span>
                </div>
                
                <div class="price-grid">
                    <div class="price-card" onclick="pilihTipeHarga(this, 3000)">
                        <small>Hemat</small>
                        <b id="p-hemat">-</b>
                    </div>
                    <div class="price-card active" onclick="pilihTipeHarga(this, 4000)">
                        <small>Reguler</small>
                        <b id="p-reguler">-</b>
                    </div>
                    <div class="price-card" onclick="pilihTipeHarga(this, 5000)">
                        <small>Kilat</small>
                        <b id="p-kilat">-</b>
                    </div>
                </div>
                <button class="btn-confirm" onclick="buatPesanan()">PESAN SEKARANG</button>
            </div>
        </div>
    </div>

    <div id="screen-waiting" class="screen">
        <div class="card text-center">
            <div class="loader-ring"></div>
            <h3>Mencari Driver...</h3>
            <p class="text-muted">Estimasi tunggu: 1 - 3 Menit</p>
            <div id="container-tawaran"></div>
            <button class="btn-cancel" onclick="userBatalkanPesanan()">BATALKAN PESANAN</button>
        </div>
    </div>

    <div id="screen-trip" class="screen">
        <div class="card">
            <div class="status-badge">Driver Menuju Lokasi</div>
            <div id="info-driver-trip"></div>
            
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-group">
                    <input type="text" id="input-pesan" placeholder="Kirim pesan...">
                    <button onclick="userKirimChat()">Kirim</button>
                </div>
            </div>

            <button class="btn-finish" onclick="userKlikSelesai()">SAYA SUDAH SAMPAI</button>
            <button class="btn-cancel-trip" onclick="userBatalkanPesanan()">BATALKAN (DRIVER LAMA)</button>
        </div>
    </div>

    <div id="screen-rating" class="screen">
        <div class="card">
            <h2>Beri Nilai Driver ⭐</h2>
            <div id="rating-form">
                <div class="rating-row">
                    <span>🚀 Kecepatan</span>
                    <div class="stars" data-cat="kecepatan">
                        <span onclick="setRating('kecepatan',1)">★</span>
                        <span onclick="setRating('kecepatan',2)">★</span>
                        <span onclick="setRating('kecepatan',3)">★</span>
                        <span onclick="setRating('kecepatan',4)">★</span>
                        <span onclick="setRating('kecepatan',5)">★</span>
                    </div>
                </div>
                <div class="rating-row">
                    <span>😊 Kesopanan</span>
                    <div class="stars" data-cat="kesopanan">
                        <span onclick="setRating('kesopanan',1)">★</span>
                        <span onclick="setRating('kesopanan',2)">★</span>
                        <span onclick="setRating('kesopanan',3)">★</span>
                        <span onclick="setRating('kesopanan',4)">★</span>
                        <span onclick="setRating('kesopanan',5)">★</span>
                    </div>
                </div>
            </div>
            <textarea id="input-ulasan" placeholder="Tulis masukan untuk driver..."></textarea>
            <button class="btn-confirm" onclick="kirimRatingFinal()">KIRIM ULASAN</button>
        </div>
    </div>
</div>

<script src="wilayah.js"></script>
<script src="core.js"></script>
<script src="user-logic.js"></script>

</body>
                                                                      </html>
