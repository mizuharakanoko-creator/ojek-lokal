<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Apps - Ojek Lokal</title>

    <link rel="stylesheet" href="css/style-main.css"> <link rel="stylesheet" href="css/style-overlay.css"> <link rel="stylesheet" href="css/style-sharding.css"> <link rel="stylesheet" href="css/style-market.css"> <link rel="stylesheet" href="css/style-modal.css"> <link rel="stylesheet" href="css/style-nav.css"> <link rel="stylesheet" href="css/style-chat.css"> <link rel="stylesheet" href="css/style-stats.css"> <link rel="stylesheet" href="css/style-wallet.css"> <link rel="stylesheet" href="css/style-rank.css"> <link rel="stylesheet" href="css/style-emergency.css"> </head>
<body>

    <header id="app-header">
        <div class="status-window-mini" onclick="showFullStats()">
            <span class="rank-tag">GOLD</span>
            <span class="driver-name" id="display-name">Memuat...</span>
        </div>
        <button class="btn-sos-trigger" onclick="DriverBroadcast.triggerSOS(localStorage.getItem('driver_nik'), localStorage.getItem('driver_nama'), DriverSharding.currentRegion)">🚨 SOS</button>
    </header>

    <nav class="region-picker">
        <label class="region-label">Wilayah Aktif:</label>
        <select class="region-select" id="region-selector" onchange="DriverSharding.setRegion(this.value)">
            <option value="Kuningan">Kuningan</option>
            <option value="Cirendang">Cirendang</option>
            <option value="Kadugede">Kadugede</option>
        </select>
    </nav>

    <main id="app-content">
        <div id="market-list" class="market-container">
            <p class="loading-text">Mencari orderan di sekitar Anda...</p>
        </div>
    </main>

    <footer id="main-nav">
        <button class="nav-item active" onclick="showPage('market')">🏠<br>Bursa</button>
        <button class="nav-item" onclick="showPage('wallet')">💰<br>Dompet</button>
        <button class="nav-item" onclick="showPage('history')">📜<br>Riwayat</button>
        <button class="nav-item" onclick="showPage('profile')">👤<br>Profil</button>
    </footer>

    <div id="gate-overlay" class="full-overlay gate-locked">
        <div class="gate-icon">🔒</div>
        <h2 id="gate-message">Akses Terkunci</h2>
        <a href="https://wa.me/admin" class="btn-contact-admin">Hubungi Admin</a>
    </div>

    <div id="sos-overlay" class="sos-overlay">
        <div class="sos-card">
            <h1>🚨 DARURAT 🚨</h1>
            <p id="sos-info">Rekan Driver butuh bantuan!</p>
            <button class="btn-help">Lihat Lokasi</button>
            <button onclick="this.parentElement.parentElement.style.display='none'">Tutup</button>
        </div>
    </div>

    <div id="modal-bidding" class="modal-overlay">
        <div class="modal-content">
            <h3>Tawar Harga</h3>
            <input type="number" id="input-harga-tawar" class="wd-input">
            <div class="bid-actions">
                <button class="btn-cancel" onclick="DriverBidding.closeBidding()">Batal</button>
                <button class="btn-send" onclick="submitBid()">Kirim</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database.js"></script>
    
    <script src="js-engines/driver-auth.js"></script>
    <script src="js-engines/driver-gatekeeper.js"></script>
    <script src="js-engines/driver-sharding.js"></script>
    <script src="js-engines/driver-market.js"></script>
    <script src="js-engines/driver-bidding.js"></script>
    <script src="js-engines/driver-conflict.js"></script>
    <script src="js-engines/driver-tracker.js"></script>
    <script src="js-engines/driver-navigator.js"></script>
    <script src="js-engines/driver-messenger.js"></script>
    <script src="js-engines/driver-journal.js"></script>
    <script src="js-engines/driver-wallet.js"></script>
    <script src="js-engines/driver-rank.js"></script>
    <script src="js-engines/driver-archive.js"></script>
    <script src="js-engines/driver-recovery.js"></script>
    <script src="js-engines/driver-broadcast.js"></script>
    
    <script src="js-engines/driver-core.js"></script>

</body>
            </html>
