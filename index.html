<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Apps - Ojek Lokal</title>

    <link rel="stylesheet" href="css/style-main.css">
    <link rel="stylesheet" href="css/style-market.css">
    <link rel="stylesheet" href="css/style-modal.css">
</head>
<body>

    <div id="gate-overlay" class="full-overlay gate-locked" style="display:none;">
        <div class="gate-icon">🔒</div>
        <h2 id="gate-message">Akses Terkunci</h2>
        <a href="https://wa.me/admin" class="btn-contact-admin">Hubungi Admin</a>
    </div>

    <header id="app-header">
        <div class="driver-info-card">
            <div class="driver-photo-name">
                <div id="driver-photo-placeholder">👤</div>
                <div class="driver-meta">
                    <span class="rank-tag">GOLD</span>
                    <span class="driver-name" id="display-name">Memuat...</span>
                </div>
            </div>
            <button class="btn-sos-trigger" onclick="DriverBroadcast.triggerSOS()">🚨 SOS</button>
        </div>

        <div class="driver-stats-bar">
            <div class="stat-item">
                <span class="stat-label">Dompet</span>
                <span class="stat-value" id="display-saldo">Rp 0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Rating</span>
                <span class="stat-value" style="color: #f1c40f;">⭐ <span id="display-rating">5.0</span></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Status</span>
                <span class="stat-value" style="color: #2ecc71;">Aktif</span>
            </div>
        </div>
    </header>

    <nav class="region-picker">
        <label>Wilayah:</label>
        <select id="region-selector" onchange="DriverSharding.setRegion(this.value)" class="region-select">
            <option value="Kuningan">Kuningan</option>
            <option value="Cirendang">Cirendang</option>
            <option value="Kadugede">Kadugede</option>
        </select>
    </nav>

    <main id="app-content">
        <div id="market-list" class="market-container">
            <p class="loading-text">Mencari orderan di sekitar Anda...</p>
        </div>
    </main>

    <footer id="main-nav">
        <button class="nav-item active" onclick="DriverCore.showPage('market')">
            <span class="nav-icon">🏠</span><br>Bursa
        </button>
        <button class="nav-item" onclick="DriverCore.showPage('wallet')">
            <span class="nav-icon">💰</span><br>Dompet
        </button>
        <button class="nav-item" onclick="DriverCore.showPage('history')">
            <span class="nav-icon">📜</span><br>Riwayat
        </button>
        <button class="nav-item" onclick="DriverCore.showPage('profile')">
            <span class="nav-icon">👤</span><br>Profil
        </button>
    </footer>

    <div id="modal-bidding" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Tawar Harga</h3>
            <input type="number" id="input-harga-tawar" class="wd-input">
            <div class="bid-actions">
                <button onclick="DriverBidding.closeBidding()">Batal</button>
                <button onclick="submitBid()">Kirim</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <script src="js-engines/driver-gatekeeper.js"></script>
    <script src="js-engines/driver-sharding.js"></script>
    <script src="js-engines/driver-market.js"></script>
    <script src="js-engines/driver-bidding.js"></script>
    <script src="js-engines/driver-broadcast.js"></script>
    
    <script src="js-engines/driver-core.js"></script>

</body>
</html>
