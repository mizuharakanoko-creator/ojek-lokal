<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojek Kuningan - Pesan Ojek</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; color: var(--text); }
        .container { width: 100%; max-width: 450px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 18px; color: var(--primary); margin-top: 0; }
        select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 15px; box-sizing: border-box; }
        
        /* Lokasi & GPS */
        .btn-loc { background: #e0e7ff; color: var(--primary); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-loc:active { transform: scale(0.98); }
        
        /* Tombol Utama */
        .btn-order { background: #1e293b; color: white; border: none; font-weight: bold; padding: 18px; margin-top: 10px; cursor: pointer; border-radius: 15px; width: 100%; }
        .btn-cancel { background: none; border: 2px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }

        /* Price Options */
        .price-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .price-card { border: 2px solid #f1f5f9; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; background: white; font-size: 12px; }
        .price-card.active { border-color: var(--primary); background: #f5f7ff; font-weight: bold; }

        /* Driver List */
        .driver-item { background: white; padding: 15px; border-radius: 18px; border: 1px solid #e2e8f0; margin-top: 12px; text-align: left; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .label-fav { background: #fef08a; color: #854d0e; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        
        /* Status Screens */
        #waiting-screen, #rating-screen { display: none; text-align: center; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .star-input { font-size: 35px; color: #cbd5e1; cursor: pointer; }
        .star-input.active { color: var(--warning); }
    </style>
</head>
<body>

<div class="container">
    <div id="input-screen">
        <div class="card" style="text-align: center;">
            <h1 style="font-size: 24px; color: var(--primary); margin: 0;">Ojek Kuningan</h1>
            <p style="font-size: 12px; color: #64748b;">Aman • Cepat • Terpercaya</p>
        </div>

        <div class="card">
            <h2>📍 Titik Jemput</h2>
            <button class="btn-loc" id="btn-gps" onclick="ambilLokasi()">DAPATKAN LOKASI SAYA</button>
            <p id="status-gps" style="font-size: 12px; color: grey; text-align: center; margin-top: 8px;">GPS Belum Aktif</p>
        </div>

        <div class="card">
            <h2>🏁 Pilih Tujuan</h2>
            <select id="kecamatan" onchange="hitungTarif()">
                <option value="">-- Pilih Kecamatan --</option>
                <option value="Kuningan Kota" data-lat="-6.976" data-lon="108.483">Kuningan Kota</option>
                <option value="Ciawigebang" data-lat="-6.955" data-lon="108.591">Ciawigebang</option>
                <option value="Cilimus" data-lat="-6.885" data-lon="108.505">Cilimus</option>
                <option value="Luragung" data-lat="-7.031" data-lon="108.614">Luragung</option>
                <option value="Kramatmulya" data-lat="-6.939" data-lon="108.494">Kramatmulya</option>
            </select>
            <p id="info-jarak" style="font-weight: bold; color: var(--primary); text-align: center; margin-top: 10px;"></p>
        </div>

        <div class="price-options" id="price-container" style="display: none;">
            <div class="price-card" onclick="pilihHarga(this, 3000)"><span>Hemat</span><br><b id="p1">-</b></div>
            <div class="price-card active" onclick="pilihHarga(this, 4000)"><span>Reguler</span><br><b id="p2">-</b></div>
            <div class="price-card" onclick="pilihHarga(this, 5000)"><span>Kilat</span><br><b id="p3">-</b></div>
        </div>

        <button class="btn-order" onclick="kirimOrder()">PESAN SEKARANG</button>
    </div>

    <div id="waiting-screen" class="card">
        <div class="loader" id="main-loader"></div>
        <h3 id="wait-title">Mencari Driver...</h3>
        <p id="wait-desc" style="font-size: 13px; color: #64748b;">Pesanan akan otomatis batal dalam 5 menit jika tidak ada driver.</p>
        
        <div id="list-tawaran"></div>

        <button class="btn-cancel" onclick="batalkanPesanan()">BATALKAN PESANAN</button>
    </div>

    <div id="rating-screen" class="card">
        <h2 style="color: var(--success);">Sampai Tujuan! ⭐</h2>
        <p>Beri nilai untuk <b id="rate-driver-name"></b></p>
        
        <div style="margin: 20px 0;">
            <span class="star-input" onclick="setStar(1)">★</span>
            <span class="star-input" onclick="setStar(2)">★</span>
            <span class="star-input" onclick="setStar(3)">★</span>
            <span class="star-input" onclick="setStar(4)">★</span>
            <span class="star-input" onclick="setStar(5)">★</span>
        </div>
        
        <textarea id="ulasan-teks" placeholder="Ada pesan untuk driver?"></textarea>
        
        <button class="btn-order" style="background: var(--success);" onclick="selesaiSemua()">KIRIM & SELESAI</button>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    
    let userLat, userLon, distKm = 0, finalPrice = 0;
    let currentOrderId = null, monitorInterval = null;
    let starRating = 0, targetNik = "";

    function ambilLokasi() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                userLat = p.coords.latitude; userLon = p.coords.longitude;
                document.getElementById('status-gps').innerText = "✅ Lokasi Terkunci";
                document.getElementById('btn-gps').style.background = "#dcfce7";
                hitungTarif();
            }, () => alert("Mohon izinkan GPS untuk memesan."));
        }
    }

    function hitungTarif() {
        const sel = document.getElementById('kecamatan');
        const opt = sel.options[sel.selectedIndex];
        if (!userLat || !opt.getAttribute('data-lat')) return;

        const lat2 = parseFloat(opt.getAttribute('data-lat')), lon2 = parseFloat(opt.getAttribute('data-lon'));
        const R = 6371; // km
        const dLat = (lat2 - userLat) * Math.PI / 180, dLon = (lon2 - userLon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(userLat*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        distKm = (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(1);

        document.getElementById('info-jarak').innerText = `Jarak: ${distKm} KM`;
        document.getElementById('p1').innerText = "Rp " + Math.round(distKm * 3000).toLocaleString();
        document.getElementById('p2').innerText = "Rp " + Math.round(distKm * 4000).toLocaleString();
        document.getElementById('p3').innerText = "Rp " + Math.round(distKm * 5000).toLocaleString();
        document.getElementById('price-container').style.display = 'grid';
        if(finalPrice === 0) finalPrice = Math.round(distKm * 4000);
    }

    function pilihHarga(el, mult) {
        document.querySelectorAll('.price-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        finalPrice = Math.round(distKm * mult);
    }

    async function kirimOrder() {
        if (!userLat || !distKm) return alert("Pilih lokasi dan tujuan!");

        const payload = {
            jemput_lat: userLat, jemput_lon: userLon,
            tujuan: document.getElementById('kecamatan').value,
            upah: finalPrice, jarak: distKm,
            status: "mencari_driver",
            timestamp: new Date().getTime() // Sinkronisasi 5 Menit
        };

        const res = await fetch(`${FIREBASE_URL}/orders.json`, { method: 'POST', body: JSON.stringify(payload) });
        const resData = await res.json();
        currentOrderId = resData.name;

        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'block';

        monitorInterval = setInterval(pantauOrder, 3000);
    }

    async function pantauOrder() {
        const res = await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`);
        const data = await res.json();

        // 1. AUTO-DELETE JIKA 5 MENIT TIDAK ADA DRIVER
        const sekarang = new Date().getTime();
        if (data && data.status === "mencari_driver" && (sekarang - data.timestamp > 300000)) {
            batalkanPesanan("Waktu habis. Tidak ada driver yang tersedia saat ini.");
            return;
        }

        if (!data) return;

        // 2. JIKA DRIVER TERPILIH SUDAH JALAN
        if (data.status === "diambil") {
            clearInterval(monitorInterval);
            document.getElementById('main-loader').style.display = 'none';
            document.getElementById('wait-title').innerText = "Driver Sedang Menuju Lokasi!";
            document.getElementById('wait-desc').innerHTML = `Driver: <b>${data.driver_pilihan}</b><br><button onclick="pindahKeRating('${data.driver_pilihan}', '${data.driver_nik}')" class="btn-order">SAYA SUDAH SAMPAI</button>`;
            document.getElementById('list-tawaran').innerHTML = "";
            return;
        }

        // 3. TAMPILKAN DAFTAR TAWARAN
        if (data.tawaran) {
            document.getElementById('main-loader').style.display = 'none';
            let html = "<h4>Driver Melamar:</h4>";
            let favs = JSON.parse(localStorage.getItem('ojek_fav')) || [];

            for (const key in data.tawaran) {
                const t = data.tawaran[key];
                const isFav = favs.includes(t.driver_nik);
                
                html += `
                <div class="driver-item">
                    ${isFav ? '<div class="label-fav">⭐ LANGGANAN ANDA</div>' : ''}
                    <b>${t.nama_driver}</b> <small>(${t.plat_nomor})</small><br>
                    <span style="color:var(--success); font-weight:bold;">Rp ${t.harga_tawar.toLocaleString()}</span>
                    <button onclick="pilihDriver('${t.nama_driver}', '${t.driver_nik}', ${t.harga_tawar})" style="background:var(--primary); color:white; border:none; padding:8px; border-radius:8px; float:right; cursor:pointer;">PILIH</button>
                </div>`;
            }
            document.getElementById('list-tawaran').innerHTML = html;
        }
    }

    async function pilihDriver(nama, nik, harga) {
        await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ status: "diambil", driver_pilihan: nama, driver_nik: nik, upah_final: harga })
        });
    }

    async function batalkanPesanan(pesan = "") {
        if(pesan) alert(pesan);
        clearInterval(monitorInterval);
        if(currentOrderId) await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`, { method: 'DELETE' });
        location.reload();
    }

    function pindahKeRating(nama, nik) {
        targetNik = nik;
        document.getElementById('rate-driver-name').innerText = nama;
        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('rating-screen').style.display = 'block';
    }

    function setStar(n) {
        starRating = n;
        document.querySelectorAll('.star-input').forEach((s, i) => s.classList.toggle('active', i < n));
    }

    async function selesaiSemua() {
        if (starRating === 0) return alert("Beri rating terlebih dahulu!");
        
        // Update stats driver (Sederhana)
        await fetch(`${FIREBASE_URL}/drivers/${targetNik}/stats.json`, {
            method: 'PATCH',
            body: JSON.stringify({ kepuasan: starRating })
        });

        // HAPUS DARI DATABASE (Clean up)
        await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`, { method: 'DELETE' });

        alert("Terima kasih sudah menggunakan Ojek Kuningan!");
        location.reload();
    }
</script>
</body>
    </html>
