<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojek Kuningan - User Dashboard</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { width: 100%; max-width: 450px; margin: auto; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        select, button, textarea, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; box-sizing: border-box; }
        
        .btn-order { background: var(--dark); color: white; border: none; font-weight: bold; padding: 16px; border-radius: 15px; cursor: pointer; background: #1e293b; }
        .btn-cancel { background: #fee2e2; color: var(--danger); border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Price Cards */
        .price-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .price-card { border: 2px solid #f1f5f9; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; }
        .price-card.active { border-color: var(--primary); background: #f5f7ff; font-weight: bold; }

        /* Chat System */
        #chat-box { background: #f9fafb; border-radius: 15px; height: 120px; overflow-y: auto; padding: 10px; margin: 10px 0; border: 1px solid #eee; text-align: left; font-size: 13px; }
        .msg-driver { color: var(--success); font-weight: bold; }
        .msg-user { color: var(--primary); font-weight: bold; }

        /* Rating Stars */
        .rating-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; background: #f8fafc; padding: 8px; border-radius: 10px; }
        .star-group { font-size: 20px; color: #cbd5e1; cursor: pointer; }
        .star-group span.active { color: var(--warning); }

        #waiting-screen, #rating-screen, #trip-panel { display: none; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="input-screen">
        <div class="card">
            <h1 style="font-size: 20px; color: var(--primary); margin: 0;">📍 Ojek Kuningan</h1>
            <p style="font-size: 11px; color: #64748b;">Tarif Transparan & Driver Lokal</p>
            <button class="btn-order" style="background:#e0e7ff; color:var(--primary); border:2px dashed var(--primary)" onclick="ambilLokasi()" id="btn-gps">KLIK: GUNAKAN LOKASI SAYA</button>
        </div>

        <div class="card">
            <label style="font-size: 12px; font-weight: bold;">Pilih Destinasi:</label>
            <select id="kecamatan" onchange="updateDesa()">
                <option value="">-- Pilih Kecamatan --</option>
                <option value="Kuningan" data-lat="-6.976" data-lon="108.483">Kuningan Kota</option>
                <option value="Ciawigebang" data-lat="-6.955" data-lon="108.591">Ciawigebang</option>
                <option value="Cilimus" data-lat="-6.885" data-lon="108.505">Cilimus</option>
                <option value="Luragung" data-lat="-7.001" data-lon="108.611">Luragung</option>
                <option value="Kadugede" data-lat="-6.995" data-lon="108.465">Kadugede</option>
            </select>
            <select id="desa" onchange="hitungTarif()" style="display: none;"></select>
            
            <div id="price-section" style="display: none;">
                <p id="info-jarak" style="font-size: 13px; color: var(--primary); margin: 10px 0;"></p>
                <div class="price-options">
                    <div class="price-card" onclick="pilihHarga(this, 3000)"><span>Hemat</span><br><b id="p1">-</b></div>
                    <div class="price-card active" onclick="pilihHarga(this, 4000)"><span>Reguler</span><br><b id="p2">-</b></div>
                    <div class="price-card" onclick="pilihHarga(this, 5000)"><span>Kilat</span><br><b id="p3">-</b></div>
                </div>
                <button class="btn-order" style="margin-top: 15px;" onclick="kirimOrder()">PESAN OJEK SEKARANG</button>
            </div>
        </div>
    </div>

    <div id="waiting-screen" class="card">
        <div class="loader"></div>
        <h3>Mencari Driver...</h3>
        <p style="font-size: 12px; color: #64748b;">Estimasi menunggu: <b>1 - 3 Menit</b></p>
        <div id="list-tawaran"></div>
        <button class="btn-cancel" onclick="batalkanPesanan()">BATALKAN PESANAN</button>
    </div>

    <div id="trip-panel" class="card">
        <h3 style="color: var(--success); margin: 0;">Driver Sedang Menuju Lokasi</h3>
        <p id="trip-info" style="font-size: 14px; margin: 10px 0;"></p>
        
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Pesan ke driver...">
            <button onclick="kirimChat()" style="width: 80px; background: var(--primary); color: white; border: none; border-radius: 12px;">Kirim</button>
        </div>

        <p style="font-size: 11px; color: #64748b; margin-top: 15px;">Mohon tunggu di titik jemput.</p>
        <button class="btn-order" style="background: var(--success);" onclick="bukaRating()">SAYA SUDAH SAMPAI</button>
        <button class="btn-cancel" onclick="batalkanPesanan()">BATALKAN (DRIVER LAMA)</button>
    </div>

    <div id="rating-screen" class="card">
        <h2>Beri Nilai Driver ⭐</h2>
        <div id="rating-area">
            <div class="rating-row"><span>🚀 Kecepatan</span><div class="star-group" id="stars-kecepatan"><span onclick="setStar('kecepatan',1)">★</span><span onclick="setStar('kecepatan',2)">★</span><span onclick="setStar('kecepatan',3)">★</span><span onclick="setStar('kecepatan',4)">★</span><span onclick="setStar('kecepatan',5)">★</span></div></div>
            <div class="rating-row"><span>😊 Kesopanan</span><div class="star-group" id="stars-kesopanan"><span onclick="setStar('kesopanan',1)">★</span><span onclick="setStar('kesopanan',2)">★</span><span onclick="setStar('kesopanan',3)">★</span><span onclick="setStar('kesopanan',4)">★</span><span onclick="setStar('kesopanan',5)">★</span></div></div>
            </div>
        <textarea id="ulasan-teks" placeholder="Tulis ulasan Anda..."></textarea>
        <button class="btn-order" onclick="selesaiSemua()">KIRIM RATING</button>
    </div>
</div>

<script>
    const DB_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    const dataWilayah = {
        "Kuningan": ["Ancaran", "Cijoho", "Cipurwasari", "Kuningan", "Windusengkahan"],
        "Ciawigebang": ["Ciawigebang", "Kapandayan", "Sidaraja", "Sukadana"],
        "Cilimus": ["Bandorasa Wetan", "Bojong", "Cilimus", "Sampora"],
        "Luragung": ["Luragung Landeuh", "Luragung Heuyeuh", "Cirahayu"],
        "Kadugede": ["Kadugede", "Cipadu", "Sindangjawa"]
    };

    let userLat, userLon, distKm, finalPrice, currentOrderId, monitorInterval;
    let ratings = { kecepatan: 0, kesopanan: 0, ketelitian: 5, kepuasan: 5 }; // default 5 untuk yang tidak diisi
    let dNik = "", dNama = "";

    function ambilLokasi() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                userLat = p.coords.latitude; userLon = p.coords.longitude;
                document.getElementById('btn-gps').innerText = "LOKASI TERKUNCI ✅";
                document.getElementById('btn-gps').style.background = "#dcfce7";
            });
        }
    }

    function updateDesa() {
        const kec = document.getElementById('kecamatan').value;
        const dSel = document.getElementById('desa');
        dSel.innerHTML = '<option value="">-- Pilih Desa --</option>';
        if (dataWilayah[kec]) {
            dataWilayah[kec].forEach(d => dSel.innerHTML += `<option value="${d}">${d}</option>`);
            dSel.style.display = 'block';
        }
    }

    // PERBAIKAN POIN 2: Pembulatan Ribuan
    function hitungTarif() {
        const opt = document.getElementById('kecamatan').options[document.getElementById('kecamatan').selectedIndex];
        if (!userLat) return alert("Klik 'Gunakan Lokasi Saya' dahulu!");
        const lat2 = parseFloat(opt.getAttribute('data-lat')), lon2 = parseFloat(opt.getAttribute('data-lon'));
        
        const R = 6371;
        const dLat = (lat2-userLat)*Math.PI/180, dLon = (lon2-userLon)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(userLat*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        distKm = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);

        document.getElementById('info-jarak').innerText = `Estimasi Jarak: ${distKm} KM`;
        
        // Pembulatan ke ribuan terdekat (misal 14.200 jadi 14.000)
        const round = (val) => Math.round(val / 1000) * 1000;
        
        document.getElementById('p1').innerText = "Rp " + round(distKm * 3000).toLocaleString();
        document.getElementById('p2').innerText = "Rp " + round(distKm * 4000).toLocaleString();
        document.getElementById('p3').innerText = "Rp " + round(distKm * 5000).toLocaleString();
        
        document.getElementById('price-section').style.display = 'block';
        finalPrice = round(distKm * 4000);
    }

    function pilihHarga(el, mult) {
        document.querySelectorAll('.price-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        finalPrice = Math.round((distKm * mult) / 1000) * 1000;
    }

    async function kirimOrder() {
        const payload = {
            jemput_lat: userLat, jemput_lon: userLon,
            tujuan: document.getElementById('desa').value,
            upah: finalPrice, status: "mencari_driver", timestamp: new Date().getTime()
        };
        const res = await fetch(`${DB_URL}/orders.json`, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        currentOrderId = data.name;
        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'block';
        monitorInterval = setInterval(pantauOrder, 3000);
    }

    async function pantauOrder() {
        const res = await fetch(`${DB_URL}/orders/${currentOrderId}.json`);
        const data = await res.json();
        if (!data) return;

        // Sinkronisasi Selesai dari sisi Driver (Poin 1 & 3 di Driver)
        if (data.status_driver === "selesai") {
            alert("Driver menandai pesanan selesai.");
            bukaRating();
            return;
        }

        if (data.status === "diambil") {
            dNik = data.driver_nik; dNama = data.driver_pilihan;
            document.getElementById('waiting-screen').style.display = 'none';
            document.getElementById('trip-panel').style.display = 'block';
            document.getElementById('trip-info').innerHTML = `Driver: <b>${dNama}</b><br>Biaya: <b>Rp ${data.upah_final.toLocaleString()}</b>`;
            
            // Muat Chat Real-time
            if (data.chat) {
                let cHtml = "";
                for (const id in data.chat) {
                    const c = data.chat[id];
                    cHtml += `<div><span class="${c.sender==='user'?'msg-user':'msg-driver'}">${c.sender}:</span> ${c.txt}</div>`;
                }
                document.getElementById('chat-box').innerHTML = cHtml;
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            }
            return;
        }

        if (data.tawaran) {
            let html = "<h4>Tawaran Driver:</h4>";
            for (const key in data.tawaran) {
                const t = data.tawaran[key];
                html += `<div style="background:#f0f4ff; padding:10px; border-radius:10px; margin-bottom:5px;">
                    <b>${t.nama_driver}</b> - Rp ${t.harga_tawar.toLocaleString()}
                    <button onclick="pilihDriver('${t.nama_driver}','${t.driver_nik}',${t.harga_tawar})" style="width:70px; float:right; margin:0; padding:5px;">PILIH</button>
                </div>`;
            }
            document.getElementById('list-tawaran').innerHTML = html;
        }
    }

    async function pilihDriver(nama, nik, harga) {
        await fetch(`${DB_URL}/orders/${currentOrderId}.json`, {
            method: 'PATCH', body: JSON.stringify({ status: "diambil", driver_pilihan: nama, driver_nik: nik, upah_final: harga })
        });
    }

    async function kirimChat() {
        const txt = document.getElementById('chat-input').value;
        if(!txt) return;
        await fetch(`${DB_URL}/orders/${currentOrderId}/chat.json`, {
            method: 'POST', body: JSON.stringify({ sender: 'user', txt: txt })
        });
        document.getElementById('chat-input').value = "";
    }

    function setStar(kat, n) {
        ratings[kat] = n;
        const stars = document.getElementById(`stars-${kat}`).getElementsByTagName('span');
        for (let i = 0; i < 5; i++) stars[i].classList.toggle('active', i < n);
    }

    function bukaRating() {
        clearInterval(monitorInterval);
        document.getElementById('trip-panel').style.display = 'none';
        document.getElementById('rating-screen').style.display = 'block';
    }

    async function selesaiSemua() {
        if (ratings.kecepatan === 0 || ratings.kesopanan === 0) return alert("Berikan bintang dahulu!");
        await fetch(`${DB_URL}/drivers/${dNik}.json`, { method: 'PATCH', body: JSON.stringify({ ulasan_terbaru: document.getElementById('ulasan-teks').value, stats_update: ratings }) });
        await fetch(`${DB_URL}/orders/${currentOrderId}.json`, { method: 'DELETE' });
        alert("Terima kasih!"); location.reload();
    }

    async function batalkanPesanan() {
        if (!confirm("Batalkan pesanan ini?")) return;
        await fetch(`${DB_URL}/orders/${currentOrderId}.json`, { method: 'DELETE' });
        location.reload();
    }
</script>
</body>
</html>
