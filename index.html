<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojek Kuningan - Beta Version</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; color: var(--text); }
        .container { width: 100%; max-width: 450px; }
        
        /* Badge Beta */
        .beta-badge { background: var(--warning); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 16px; color: var(--primary); margin-top: 0; }
        
        select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; box-sizing: border-box; }
        
        /* Perbaikan Tombol GPS */
        .btn-loc { background: #e0e7ff; color: var(--primary); border: 2px dashed var(--primary); font-weight: bold; cursor: pointer; display: block; }
        .btn-loc.locked { background: var(--success); color: white; border: none; }

        .btn-order { background: #1e293b; color: white; border: none; font-weight: bold; padding: 18px; margin-top: 10px; cursor: pointer; border-radius: 15px; }
        .btn-cancel { background: none; border: 2px solid var(--danger); color: var(--danger); font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 12px; }

        .price-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .price-card { border: 2px solid #f1f5f9; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; }
        .price-card.active { border-color: var(--primary); background: #f5f7ff; font-weight: bold; }

        #waiting-screen, #rating-screen { display: none; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .driver-item { background: #f9fafb; padding: 12px; border-radius: 15px; border: 1px solid #e5e7eb; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="input-screen">
        <div class="card" style="text-align: center;">
            <div class="beta-badge">VERSI BETA - TAHAP PERCOBAAN</div>
            <h1 style="font-size: 22px; color: var(--primary); margin: 0;">Ojek Kuningan</h1>
            <p style="font-size: 11px; color: #64748b;">Layanan transportasi lokal berbasis komunitas</p>
        </div>

        <div class="card">
            <h2>📍 Lokasi Penjemputan</h2>
            <button class="btn-loc" id="btn-gps" onclick="ambilLokasi()">KLIK: AMBIL POSISI GPS</button>
            <p id="status-gps" style="font-size: 11px; color: #ef4444; text-align: center; margin-top: 5px;">GPS belum terkunci</p>
        </div>

        <div class="card">
            <h2>🏁 Destinasi Tujuan</h2>
            <select id="kecamatan" onchange="updateDesa()">
                <option value="">-- Pilih Kecamatan --</option>
                <option value="Kuningan" data-lat="-6.976" data-lon="108.483">Kuningan Kota</option>
                <option value="Ciawigebang" data-lat="-6.955" data-lon="108.591">Ciawigebang</option>
                <option value="Cilimus" data-lat="-6.885" data-lon="108.505">Cilimus</option>
            </select>
            
            <select id="desa" onchange="hitungTarif()" style="display: none;">
                <option value="">-- Pilih Desa/Kelurahan --</option>
            </select>
            
            <p id="info-jarak" style="font-weight: bold; color: var(--primary); text-align: center; margin-top: 10px; font-size: 13px;"></p>
        </div>

        <div id="price-section" style="display: none;">
            <div class="price-options">
                <div class="price-card" onclick="pilihHarga(this, 3500)"><span>Hemat</span><br><b id="p1">-</b></div>
                <div class="price-card active" onclick="pilihHarga(this, 4500)"><span>Reguler</span><br><b id="p2">-</b></div>
                <div class="price-card" onclick="pilihHarga(this, 5500)"><span>Kilat</span><br><b id="p3">-</b></div>
            </div>
            <button class="btn-order" onclick="kirimOrder()">PESAN OJEK SEKARANG</button>
        </div>
    </div>

    <div id="waiting-screen" class="card">
        <div class="loader"></div>
        <h3>Mencari Driver Terdekat...</h3>
        <p style="font-size: 12px; color: #64748b;">Mohon tunggu, sistem sedang membersihkan orderan kadaluwarsa.</p>
        <div id="list-tawaran"></div>
        <button class="btn-cancel" onclick="batalkanPesanan()">BATALKAN PESANAN</button>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app";
    
    // Data Desa Sederhana (Contoh)
    const dataWilayah = {
        "Kuningan": ["Ancaran", "Cijoho", "Cipurwasari", "Kuningan", "Windusengkahan"],
        "Ciawigebang": ["Ciawigebang", "Kapandayan", "Sidaraja", "Sukadana"],
        "Cilimus": ["Bandorasa Wetan", "Boijong", "Cilimus", "Sampora"]
    };

    let userLat = null, userLon = null, distKm = 0, finalPrice = 0;
    let currentOrderId = null, monitorInterval = null;

    function ambilLokasi() {
        const btn = document.getElementById('btn-gps');
        const st = document.getElementById('status-gps');
        
        btn.innerText = "SEDANG MENCARI...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                userLat = p.coords.latitude;
                userLon = p.coords.longitude;
                btn.innerText = "LOKASI TERKUNCI ✅";
                btn.className = "btn-loc locked";
                st.innerText = "Koordinat: " + userLat.toFixed(4) + ", " + userLon.toFixed(4);
                st.style.color = "#10b981";
                if(document.getElementById('kecamatan').value) hitungTarif();
            }, (err) => {
                btn.innerText = "GAGAL AMBIL LOKASI";
                alert("Error: " + err.message + ". Pastikan GPS aktif dan gunakan HTTPS.");
            }, { enableHighAccuracy: true });
        } else {
            alert("Browser tidak mendukung GPS.");
        }
    }

    function updateDesa() {
        const kec = document.getElementById('kecamatan').value;
        const desaSel = document.getElementById('desa');
        desaSel.innerHTML = '<option value="">-- Pilih Desa/Kelurahan --</option>';
        
        if (dataWilayah[kec]) {
            dataWilayah[kec].forEach(d => {
                let opt = document.createElement('option');
                opt.value = d; opt.innerText = d;
                desaSel.appendChild(opt);
            });
            desaSel.style.display = 'block';
        } else {
            desaSel.style.display = 'none';
        }
    }

    function hitungTarif() {
        const sel = document.getElementById('kecamatan');
        const opt = sel.options[sel.selectedIndex];
        if (!userLat || !opt.getAttribute('data-lat')) return;

        const lat2 = parseFloat(opt.getAttribute('data-lat')), lon2 = parseFloat(opt.getAttribute('data-lon'));
        
        // Rumus Haversine
        const R = 6371; 
        const dLat = (lat2 - userLat) * Math.PI / 180;
        const dLon = (lon2 - userLon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(userLat*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        distKm = (R * c).toFixed(1);

        document.getElementById('info-jarak').innerText = `Estimasi Jarak: ${distKm} KM`;
        document.getElementById('p1').innerText = "Rp " + Math.round(distKm * 3500).toLocaleString();
        document.getElementById('p2').innerText = "Rp " + Math.round(distKm * 4500).toLocaleString();
        document.getElementById('p3').innerText = "Rp " + Math.round(distKm * 5500).toLocaleString();
        
        document.getElementById('price-section').style.display = 'block';
        finalPrice = Math.round(distKm * 4500);
    }

    function pilihHarga(el, mult) {
        document.querySelectorAll('.price-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        finalPrice = Math.round(distKm * mult);
    }

    async function kirimOrder() {
        if (!userLat || !distKm) return alert("Lengkapi lokasi dan tujuan!");

        const payload = {
            jemput_lat: userLat, jemput_lon: userLon,
            tujuan: document.getElementById('kecamatan').value + " (" + document.getElementById('desa').value + ")",
            upah: finalPrice, jarak: distKm,
            status: "mencari_driver",
            timestamp: new Date().getTime()
        };

        const res = await fetch(`${FIREBASE_URL}/orders.json`, { method: 'POST', body: JSON.stringify(payload) });
        const resData = await res.json();
        currentOrderId = resData.name;

        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('waiting-screen').style.display = 'block';

        monitorInterval = setInterval(pantauOrder, 3000);
    }

    async function pantauOrder() {
        const res = await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`);
        const data = await res.json();

        // Auto-Delete 5 Menit
        const sekarang = new Date().getTime();
        if (data && data.status === "mencari_driver" && (sekarang - data.timestamp > 300000)) {
            batalkanPesanan("Waktu habis. Tidak ada driver tersedia.");
            return;
        }

        if (!data) return;

        if (data.status === "diambil") {
            clearInterval(monitorInterval);
            alert("Driver " + data.driver_pilihan + " sedang menuju lokasi!");
            location.reload(); // Untuk simulasi, kembali ke awal
        }

        if (data.tawaran) {
            let html = "<h4 style='text-align:left'>Driver yang tersedia:</h4>";
            for (const key in data.tawaran) {
                const t = data.tawaran[key];
                html += `
                <div class="driver-item">
                    <b>${t.nama_driver}</b> <small>(${t.plat_nomor})</small><br>
                    <span style="color:var(--success); font-weight:bold;">Tawaran: Rp ${t.harga_tawar.toLocaleString()}</span>
                    <button onclick="pilihDriver('${t.nama_driver}', '${t.driver_nik}', ${t.harga_tawar})" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:8px; float:right; width:auto; margin:0;">PILIH</button>
                </div>`;
            }
            document.getElementById('list-tawaran').innerHTML = html;
        }
    }

    async function pilihDriver(nama, nik, harga) {
        await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ status: "diambil", driver_pilihan: nama, driver_nik: nik, upah_final: harga })
        });
    }

    async function batalkanPesanan(pesan = "") {
        if(pesan) alert(pesan);
        if(currentOrderId) await fetch(`${FIREBASE_URL}/orders/${currentOrderId}.json`, { method: 'DELETE' });
        location.reload();
    }
</script>
</body>
</html>
