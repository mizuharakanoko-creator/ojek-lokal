<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERIFICATION | S-CLASS ADMIN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-red: #ff3c3c;
            --bg-dark: #050505;
        }

        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container Utama menyerupai Gambar 8 */
        .admin-container { 
            width: 100%;
            max-width: 450px; 
            border: 1px solid var(--p-purple); 
            padding: 20px; 
            background: rgba(188, 0, 255, 0.05);
            box-shadow: 0 0 20px rgba(188, 0, 255, 0.2);
            box-sizing: border-box;
        }

        .header { 
            text-align: center; 
            border-bottom: 1px solid var(--p-purple); 
            margin-bottom: 25px; 
            padding-bottom: 10px;
        }

        .header h3 {
            color: var(--p-purple);
            text-shadow: 0 0 10px rgba(188, 0, 255, 0.7);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Card Driver menyerupai UI Dashboard */
        .card { 
            border: 1px solid #333; 
            background: rgba(0, 0, 0, 0.6); 
            padding: 15px; 
            margin-bottom: 20px; 
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--p-cyan);
            box-shadow: 0 0 10px var(--p-cyan);
        }

        .info-row { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        label { 
            font-size: 9px; 
            color: var(--p-cyan); 
            display: block; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .value { 
            font-size: 13px; 
            color: #fff; 
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        /* Grid Foto Biometrik */
        .img-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            margin: 15px 0; 
        }

        .img-item {
            border: 1px solid #444;
            background: #000;
            padding: 5px;
            text-align: center;
        }

        .img-item img { 
            width: 100%; 
            height: 100px; 
            object-fit: cover; 
            border: 1px solid #222;
        }

        .img-item small {
            font-size: 8px;
            color: var(--p-purple);
            display: block;
            margin-bottom: 4px;
        }

        /* Tombol S-Class Style */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        
        button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            font-family: 'Orbitron', sans-serif !important; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-approve { 
            background: var(--p-purple); 
            color: #fff; 
            box-shadow: 0 0 10px rgba(188, 0, 255, 0.4);
        }

        .btn-reject { 
            background: transparent; 
            color: var(--p-red); 
            border: 1px solid var(--p-red);
        }

        button:active { transform: scale(0.95); opacity: 0.8; }

        #empty-msg { 
            text-align: center; 
            color: #444; 
            margin-top: 50px; 
            font-size: 10px; 
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h3>VERIFICATION CENTER</h3>
        <p style="font-size: 8px; color: #888; margin-top: 5px; letter-spacing: 1px;">S-CLASS AUTHORITY LEVEL: ADMIN</p>
    </div>

    <div id="list-container">
        <div id="empty-msg">SCANNING PENDING DATA...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('pending_verifications').on('value', (snapshot) => {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        
        if(!snapshot.exists()) {
            container.innerHTML = '<div id="empty-msg">NO DATA DETECTED IN RADIUS.</div>';
            return;
        }

        snapshot.forEach((child) => {
            const data = child.val();
            const id = child.key;

            const card = `
                <div class="card">
                    <div class="info-row">
                        <label>Identity Name</label>
                        <span class="value">${data.nama_lengkap}</span>
                    </div>
                    <div class="info-row">
                        <label>NIK Registry</label>
                        <span class="value">${data.nomor_ktp}</span>
                    </div>
                    <div class="info-row">
                        <label>Communication ID</label>
                        <span class="value">${data.nomor_telepon}</span>
                    </div>
                    
                    <div class="img-grid">
                        <div class="img-item">
                            <small>KTP SCAN</small>
                            <img src="${data.url_foto_ktp}">
                        </div>
                        <div class="img-item">
                            <small>BIOMETRIC</small>
                            <img src="${data.url_foto_profil}">
                        </div>
                    </div>

                    <div class="btn-group">
                        <button class="btn-approve" onclick="approveDriver('${id}')">Initialize</button>
                        <button class="btn-reject" onclick="rejectDriver('${id}')">Purge</button>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    });

    async function approveDriver(phoneId) {
        if(!confirm("Initialize S-Class System?")) return;
        try {
            const snapshot = await db.ref('pending_verifications/' + phoneId).once('value');
            const d = snapshot.val();
            const date = new Date();
            const joinDate = date.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});

            const finalData = {
                id_driver: "DRV" + Math.floor(Math.random() * 900000),
                nama_lengkap: d.nama_lengkap,
                nomor_telepon: d.nomor_telepon,
                nomor_ktp: d.nomor_ktp,
                domisili: d.domisili || "Jakarta",
                area_tugas: d.area_tugas,
                tanggal_terdaftar: joinDate,
                kategori_mitra: "Full Time",
                pin_transaksi: d.pin_transaksi,
                status_verifikasi: "Verified",
                jenis_kendaraan: d.jenis_kendaraan,
                plat_nomor: d.plat_nomor || "-",
                url_foto_profil: d.url_foto_profil,
                url_foto_ktp: d.url_foto_ktp,
                level: 1, current_xp: 0, max_xp: 100, rank_class: "F",
                stamina_current: 100, stamina_max: 100,
                saldo_gold: 0, total_points: 0,
                order_selesai: 0, order_batal: 0
            };

            await db.ref('users_driver/' + phoneId).set(finalData);
            await db.ref('registered_niks/' + d.nomor_ktp).set({owner: phoneId, status: "LOCKED"});
            await db.ref('pending_verifications/' + phoneId).remove();

            alert("SYSTEM: Driver " + d.nama_lengkap + " Activated.");
        } catch (e) { alert("ADMIN ERROR: " + e.message); }
    }

    async function rejectDriver(id) {
        if(!confirm("Purge this data?")) return;
        await db.ref('pending_verifications/' + id).remove();
        alert("Data Purged.");
    }
</script>
</body>
</html>
