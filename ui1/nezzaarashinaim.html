<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN VERIFICATOR | PICK ME SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-cyan: #00fff2; --p-purple: #bc00ff; --p-red: #ff3c3c; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; padding: 10px; }
        .admin-header { border-bottom: 2px solid var(--p-purple); padding: 10px; text-align: center; margin-bottom: 20px; }
        .card { border: 1px solid #333; background: #111; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .card.pending { border-left: 5px solid var(--p-cyan); }
        .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .img-item img { width: 100%; border: 1px solid #444; border-radius: 3px; }
        .info { font-size: 11px; margin-bottom: 5px; color: #aaa; }
        .info b { color: var(--p-cyan); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
        .btn-approve { background: var(--p-cyan); color: #000; }
        .btn-reject { background: var(--p-red); color: #fff; }
        #empty-msg { text-align: center; color: #555; margin-top: 50px; font-size: 12px; }
    </style>
</head>
<body>

<div class="admin-header">
    <h2 style="color: var(--p-purple); margin: 0;">VERIFICATION CENTER</h2>
    <small style="color: #666;">AUTHORITY LEVEL: ADMIN</small>
</div>

<div id="list-container">
    <div id="empty-msg">SCANNING FOR PENDING INITIALIZATIONS...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Ambil data dari pending_verifications
    db.ref('pending_verifications').on('value', (snapshot) => {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        
        if(!snapshot.exists()) {
            container.innerHTML = '<div id="empty-msg">NO PENDING DRIVERS FOUND.</div>';
            return;
        }

        snapshot.forEach((child) => {
            const data = child.val();
            const id = child.key;

            const card = `
                <div class="card pending">
                    <div class="info">NAME: <b>${data.nama_lengkap}</b></div>
                    <div class="info">NIK: <b>${data.nomor_ktp}</b></div>
                    <div class="info">PHONE: <b>${data.nomor_telepon}</b></div>
                    <div class="info">AREA: <b>${data.area_tugas}</b></div>
                    
                    <div class="img-grid">
                        <div class="img-item"><small>KTP</small><img src="${data.url_foto_ktp}"></div>
                        <div class="img-item"><small>SELFIE</small><img src="${data.url_foto_profil}"></div>
                    </div>

                    <div class="btn-group">
                        <button class="btn-approve" onclick="approveDriver('${id}')">APPROVE</button>
                        <button class="btn-reject" onclick="rejectDriver('${id}')">REJECT</button>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    });

    // 2. LOGIKA APPROVE FINAL (Menyuntikkan Poin 1-6)
    async function approveDriver(phoneId) {
        if(!confirm("Initialize S-Class System for this driver?")) return;

        try {
            const snapshot = await db.ref('pending_verifications/' + phoneId).once('value');
            const d = snapshot.val();

            // Tanggal hari ini
            const date = new Date();
            const joinDate = date.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});

            // DATA FINAL SESUAI PERMINTAAN POIN 1-6
            const finalData = {
                // 1. Identitas & Keamanan
                id_driver: phoneId,
                nama_lengkap: d.nama_lengkap,
                nomor_telepon: d.nomor_telepon,
                nomor_ktp: d.nomor_ktp,
                domisili: d.domisili,
                area_tugas: d.area_tugas,
                tanggal_terdaftar: joinDate,
                kategori_mitra: "Newbie Pilot",
                pin_transaksi: d.pin_transaksi,
                device_id: d.device_id,
                status_verifikasi: "Verified",

                // 2. Kendaraan & Media
                jenis_kendaraan: d.jenis_kendaraan,
                plat_nomor: d.plat_nomor,
                url_foto_profil: d.url_foto_profil,
                url_foto_ktp: d.url_foto_ktp,
                url_foto_sim: d.url_foto_sim,
                url_foto_stnk: d.url_foto_stnk,

                // 3. Progresi RPG & Skill
                level: 1,
                current_xp: 0,
                max_xp: 100,
                rank_class: "F",
                stamina_current: 100,
                stamina_max: 100,
                baterai_tipe: "Lead Acid",
                aliansi_guild: "None",
                rekruter_id: "System",
                active_skill_slots: ["Empty"],

                // 4. Finansial
                saldo_gold: 0,
                total_points: 0,
                saldo_silver: 0,
                saldo_bronze: 0,
                saldo_mengendap: 10000,

                // 5. Akumulasi & Rating
                order_selesai: 0,
                order_batal: 0,
                total_pendapatan_all_time: 0,
                total_bintang_1: 0, total_bintang_2: 0, total_bintang_3: 0, total_bintang_4: 0, total_bintang_5: 0,

                // 6. Counter Statistik (Radar UI)
                count_penampilan_sopan: 0, count_penampilan_kurang: 0,
                count_nyaman_baik: 0, count_nyaman_buruk: 0,
                count_aman_baik: 0, count_aman_buruk: 0,
                count_kecepatan_tinggi: 0, count_kecepatan_rendah: 0,
                count_teliti_tinggi: 0, count_teliti_rendah: 0,
                count_puas_tinggi: 0, count_puas_rendah: 0,
                count_personality_like: 0, count_personality_dislike: 0
            };

            // Simpan ke users_driver
            await db.ref('users_driver/' + phoneId).set(finalData);
            
            // Kunci NIK agar tidak bisa daftar lagi
            await db.ref('registered_niks/' + d.nomor_ktp).set({
                owner: phoneId,
                status: "LOCKED"
            });

            // Hapus dari antrean
            await db.ref('pending_verifications/' + phoneId).remove();

            alert("SYSTEM INITIALIZED: Driver " + d.nama_lengkap + " is now Active!");

        } catch (e) {
            alert("ADMIN ERROR: " + e.message);
        }
    }

    async function rejectDriver(id) {
        if(!confirm("Reject this driver? Data will be deleted.")) return;
        await db.ref('pending_verifications/' + id).remove();
        alert("Driver rejected.");
    }
</script>

</body>
</html>
