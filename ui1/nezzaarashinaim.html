<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-CLASS ADMIN | GLOBAL COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-cyan: #00fff2; --p-purple: #bc00ff; --bg-dark: #050505; }
        body { 
            background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; 
            padding: 30px 20px; margin: 0; font-weight: 400; font-style: italic;
        }
        .container { max-width: 900px; margin: auto; }
        .header { 
            border-bottom: 1px solid var(--p-purple); padding-bottom: 15px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        h2 { color: var(--p-purple); font-size: 22px; letter-spacing: 4px; text-transform: uppercase; margin: 0; font-weight: 400; }
        .sub-h { font-size: 9px; color: #555; letter-spacing: 2px; }

        .card-list { display: grid; gap: 20px; }
        .driver-card { 
            background: rgba(10, 10, 10, 0.8); border: 1px solid #222; padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
        }
        .driver-card::before {
            content: ""; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--p-purple);
        }
        
        .info span { display: block; font-size: 9px; color: var(--p-cyan); margin-bottom: 6px; letter-spacing: 1px; }
        .info h3 { margin: 0; font-size: 16px; letter-spacing: 2px; color: #fff; font-weight: 400; text-transform: uppercase; }
        .info p { margin: 8px 0 0; font-size: 11px; color: #888; letter-spacing: 1px; }

        .action-btns { display: flex; gap: 15px; }
        button { 
            padding: 12px 20px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
            text-transform: uppercase; border: 1px solid; background: transparent; 
            font-style: italic; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-approve { border-color: var(--p-cyan); color: var(--p-cyan); }
        .btn-approve:hover { background: var(--p-cyan); color: #000; box-shadow: 0 0 15px var(--p-cyan); }
        
        .btn-reject { border-color: #ff0055; color: #ff0055; }
        .btn-reject:hover { background: #ff0055; color: #fff; }

        #empty-msg { text-align: center; color: #333; margin-top: 100px; font-size: 14px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2>PENDING PILOTS</h2>
            <div class="sub-h">VERIFICATION GATEWAY PROTOCOL</div>
        </div>
        <div class="sub-h" id="count-display">STREAMS: 0</div>
    </div>

    <div id="driver-list" class="card-list">
        <div id="empty-msg">SCANNING GLOBAL NETWORK...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Listen data pendaftaran
    db.ref('pending_verifications').on('value', (snapshot) => {
        const listContainer = document.getElementById('driver-list');
        const countDisplay = document.getElementById('count-display');
        listContainer.innerHTML = '';

        if (!snapshot.exists()) {
            listContainer.innerHTML = '<div id="empty-msg">NO SIGNALS DETECTED.</div>';
            countDisplay.innerText = "STREAMS: 0";
            return;
        }

        let count = 0;
        snapshot.forEach((child) => {
            count++;
            const data = child.val();
            const wa = child.key;

            const card = `
                <div class="driver-card">
                    <div class="info">
                        <span>SIGNAL ID: ${wa}</span>
                        <h3>${data.nama}</h3>
                        <p>IDENT: ${data.nik} | SECTOR: ${data.area || 'UNKNOWN'}</p>
                        <p style="color:#444; font-size: 9px; margin-top: 4px;">UNIT: ${data.plat || 'NONE'}</p>
                    </div>
                    <div class="action-btns">
                        <button class="btn-approve" onclick="approveDriver('${wa}')">Authorize</button>
                        <button class="btn-reject" onclick="rejectDriver('${wa}')">Purge</button>
                    </div>
                </div>
            `;
            listContainer.innerHTML += card;
        });
        countDisplay.innerText = "STREAMS: " + count;
    });

    async function approveDriver(wa) {
        if (!confirm("AUTHORIZE THIS PILOT INTO S-CLASS DATABASE?")) return;

        try {
            const snap = await db.ref('pending_verifications/' + wa).once('value');
            if (!snap.exists()) return;
            const d = snap.val();

            // FULL DATABASE INJECTION (60+ ELEMENTS)
            const fullDriverData = {
                // 1. Identitas & Keamanan
                id_driver: wa,
                nama_lengkap: d.nama,
                nomor_telepon: d.wa,
                nomor_ktp: d.nik,
                domisili: d.area || "-",
                area_tugas: d.area || "-",
                tanggal_terdaftar: Date.now(),
                kategori_mitra: "S-CLASS PILOT",
                pin_transaksi: d.pin,
                device_id: "",
                fcm_token: "",
                status_verifikasi: "VERIFIED",

                // 2. Kendaraan & Media
                jenis_kendaraan: d.plat ? d.plat.split('-')[0].trim() : "MOTOR",
                plat_nomor: d.plat || "-",
                url_foto_profil: "default",
                url_foto_ktp: "skip_storage",
                url_foto_sim: "skip_storage",
                url_foto_stnk: "skip_storage",

                // 3. Progresi RPG & Skill
                level: 1,
                current_xp: 0,
                max_xp: 100,
                rank_class: "F-RANK",
                stamina_current: 100,
                stamina_max: 100,
                baterai_tipe: "STANDARD",
                aliansi_guild: "INDEPENDENT",
                rekruter_id: "SYSTEM",
                shadower_id: "NONE",
                active_skill_slots: ["NAVIGATOR"],
                daily_quests: { status: "READY", count: 0 },
                activity_log_streak: 0,

                // 4. Finansial (Economy System)
                saldo_gold: 0,
                total_points: 0,
                saldo_silver: 0,
                saldo_bronze: 0,
                saldo_mengendap: 10000,
                charge_zeus_lightning: 0,
                charge_shield_angel: 0,

                // 5. Akumulasi Global & Rating
                order_selesai: 0,
                order_batal: 0,
                total_pendapatan_all_time: 0,
                total_bintang_1: 0,
                total_bintang_2: 0,
                total_bintang_3: 0,
                total_bintang_4: 0,
                total_bintang_5: 0,

                // 6. Counter Statistik (Radar UI)
                count_penampilan_sopan: 0, count_penampilan_kurang: 0,
                count_nyaman_baik: 0, count_nyaman_buruk: 0,
                count_aman_baik: 0, count_aman_buruk: 0,
                count_kecepatan_tinggi: 0, count_kecepatan_rendah: 0,
                count_teliti_tinggi: 0, count_teliti_rendah: 0,
                count_puas_tinggi: 0, count_puas_rendah: 0,
                count_personality_like: 0, count_personality_dislike: 0
            };

            // Simpan ke Database Utama
            await db.ref('drivers/' + wa).set(fullDriverData);
            // Kunci NIK
            await db.ref('registered_niks/' + d.nik).set(true);
            // Hapus dari antrean
            await db.ref('pending_verifications/' + wa).remove();

            alert("PROTOCOL SUCCESS: PILOT " + d.nama + " IS NOW ACTIVE.");
        } catch (e) {
            alert("PROTOCOL ERROR: " + e.message);
        }
    }

    async function rejectDriver(wa) {
        if (!confirm("PURGE THIS DATA FROM GLOBAL STREAMS?")) return;
        await db.ref('pending_verifications/' + wa).remove();
        alert("DATA PURGED.");
    }
</script>
</body>
</html>
