<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-CLASS ADMIN | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-cyan: #00fff2; --p-purple: #bc00ff; --bg-dark: #050505; }
        body { 
            background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; 
            padding: 30px 20px; margin: 0; font-weight: 400; font-style: italic;
        }
        .container { max-width: 600px; margin: auto; }
        .header { 
            border-bottom: 1px solid var(--p-purple); padding-bottom: 15px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        h2 { color: var(--p-purple); font-size: 20px; letter-spacing: 3px; text-transform: uppercase; margin: 0; font-weight: 400; }
        .sub-h { font-size: 9px; color: #555; letter-spacing: 2px; }

        .card-list { display: grid; gap: 20px; }
        .driver-card { 
            background: #000; border: 1px solid #1a1a1a; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 3px solid var(--p-purple);
        }
        
        .info span { display: block; font-size: 8px; color: var(--p-cyan); margin-bottom: 5px; letter-spacing: 1px; }
        .info h3 { margin: 0; font-size: 14px; letter-spacing: 2px; color: #fff; font-weight: 400; text-transform: uppercase; }
        .info p { margin: 6px 0 0; font-size: 10px; color: #777; letter-spacing: 1px; }

        .action-btns { display: flex; flex-direction: column; gap: 8px; }
        button { 
            padding: 10px 15px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
            text-transform: uppercase; border: 1px solid; background: transparent; 
            font-style: italic; transition: 0.3s; letter-spacing: 1px; width: 100px;
        }
        .btn-approve { border-color: var(--p-cyan); color: var(--p-cyan); }
        .btn-approve:hover { background: var(--p-cyan); color: #000; box-shadow: 0 0 10px var(--p-cyan); }
        .btn-reject { border-color: #ff0055; color: #ff0055; }
        .btn-reject:hover { background: #ff0055; color: #fff; }

        #empty-msg { text-align: center; color: #222; margin-top: 100px; font-size: 12px; letter-spacing: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2>PENDING PILOTS</h2>
            <div class="sub-h">VERIFICATION GATEWAY</div>
        </div>
        <div class="sub-h" id="count-display">STREAMS: 0</div>
    </div>

    <div id="driver-list" class="card-list">
        <div id="empty-msg">SCANNING NEURAL NETWORK...</div>
    </div>
</div>

<script>
    // Konfigurasi Anda (Pastikan ini sesuai dengan Project Settings di Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Fungsi untuk memantau data pendaftaran
    db.ref('pending_verifications').on('value', (snapshot) => {
        const listContainer = document.getElementById('driver-list');
        const countDisplay = document.getElementById('count-display');
        
        console.log("Data diterima dari Firebase:", snapshot.val()); // Cek di F12 Console

        listContainer.innerHTML = '';

        if (!snapshot.exists()) {
            listContainer.innerHTML = '<div id="empty-msg">NO SIGNALS DETECTED IN DATABASE.</div>';
            countDisplay.innerText = "STREAMS: 0";
            return;
        }

        let count = 0;
        snapshot.forEach((child) => {
            count++;
            const d = child.val();
            const wa = child.key;

            // Jika data d adalah string (karena salah format di register), 
            // kita buat tampilan darurat agar tetap muncul di dashboard
            const name = (typeof d === 'object') ? (d.nama || "UNNAMED") : "UNKNOWN ENTITY";
            const nik = (typeof d === 'object') ? (d.nik || "-") : "INVALID DATA";

            const card = `
                <div class="driver-card">
                    <div class="info">
                        <span>SIGNAL ID: ${wa}</span>
                        <h3>${name.toUpperCase()}</h3>
                        <p>IDENT: ${nik} | SECURE CHANNEL ACTIVE</p>
                    </div>
                    <div class="action-btns">
                        <button class="btn-approve" onclick="approveDriver('${wa}')">Authorize</button>
                        <button class="btn-reject" onclick="rejectDriver('${wa}')">Purge</button>
                    </div>
                </div>
            `;
            listContainer.innerHTML += card;
        });
        countDisplay.innerText = "STREAMS: " + count;
    }, (error) => {
        // Jika ada masalah di Rules, akan muncul di sini
        console.error("Firebase Error:", error);
        document.getElementById('driver-list').innerHTML = `<div id="empty-msg" style="color:red">ERROR: ${error.message}</div>`;
    });

    async function approveDriver(wa) {
        if (!confirm("CONFIRM AUTHORIZATION?")) return;
        try {
            const snap = await db.ref('pending_verifications/' + wa).once('value');
            const d = snap.val();

            // Suntikkan Database Lengkap (62 Element)
            const payload = {
                id_driver: wa,
                nama_lengkap: d.nama || "Pilot",
                nomor_telepon: wa,
                nomor_ktp: d.nik || "0",
                domisili: d.area || "-",
                area_tugas: d.area || "-",
                tanggal_terdaftar: Date.now(),
                kategori_mitra: "S-CLASS PILOT",
                pin_transaksi: d.pin || "123456",
                status_verifikasi: "VERIFIED",
                level: 1, current_xp: 0, max_xp: 100, rank_class: "F-RANK",
                stamina_current: 100, stamina_max: 100,
                saldo_gold: 0, total_points: 0, saldo_silver: 0, saldo_bronze: 0,
                order_selesai: 0, order_batal: 0,
                count_penampilan_sopan: 0, count_nyaman_baik: 0,
                count_aman_baik: 0, count_kecepatan_tinggi: 0,
                count_teliti_tinggi: 0, count_puas_tinggi: 0,
                count_personality_like: 0
            };

            await db.ref('drivers/' + wa).set(payload);
            if(d.nik) await db.ref('registered_niks/' + d.nik).set(true);
            await db.ref('pending_verifications/' + wa).remove();
            alert("PILOT ACTIVATED");
        } catch (e) {
            alert("COMMAND FAILED: " + e.message);
        }
    }

    async function rejectDriver(wa) {
        if (confirm("PURGE DATA?")) await db.ref('pending_verifications/' + wa).remove();
    }
</script>
    
</body>
</html>
