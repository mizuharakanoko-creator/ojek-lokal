<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Driver Interface (SDI)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Rajdhani:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style-core.css">      <link rel="stylesheet" href="css/atmosphere.css">      <link rel="stylesheet" href="css/identity-stats.css">  <link rel="stylesheet" href="css/command-hub.css">     <link rel="stylesheet" href="css/analytics.css">       <link rel="stylesheet" href="css/interaction.css">     <link rel="stylesheet" href="css/info-panel.css">      </head>
<body class="rank-s"> <div id="atmosphere-layer">
        <div class="runic-outer-ring">
            <div class="runic-text" id="runic-loop"></div>
        </div>
        <div id="weather-effect" class="weather-none">
            <div class="rain-particles"></div>
        </div>
        <div id="battery-glitch-overlay"></div>
        <div class="vignette"></div>
    </div>

    <main class="sdi-container">
        
        <header id="section-identity" class="glass-panel">
            <div class="header-main-content">
    <div class="avatar-container">
        <div class="avatar-frame" id="rank-frame">
            <svg viewBox="0 0 100 100" class="frame-svg">
                <polygon points="30,5 70,5 95,30 95,70 70,95 30,95 5,70 5,30" class="frame-border"/>
            </svg>
            <div class="avatar-image-clip">
                <img src="https://via.placeholder.com/150/111/fff?text=DRIVER" alt="Sovereign Driver" id="driver-photo">
            </div>
            <div class="rank-badge">S</div>
        </div>
    </div>

    <div class="driver-info">
        <div class="name-id-row">
            <h2 id="display-name">SUNG JIN-WOO</h2>
            <span class="driver-id">ID: #777-SDI</span>
        </div>
        <div class="class-title">
            <span class="rank-text">RANK S</span> 
            <span class="divider">|</span> 
            <span class="class-type">SHADOW SOVEREIGN</span>
        </div>
        <div class="vehicle-detail">
            <span class="unit">PHANTOM V4</span>
            <span class="plate-number">B 1337 SLV</span>
        </div>
    </div>
</div>

<div class="motto-bar">
    <div class="motto-content" id="motto-text">"The system has chosen you to become the strongest driver."</div>
                </div>
            
            </header>




        
        
        <section id="section-stats" class="grid-stats">
            <div id="resource-bars" class="glass-panel">
    <div class="bar-container">
        <div class="bar-label">
            <span>STAMINA (HP)</span>
            <span id="stamina-val">850 / 1000</span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill stamina" style="width: 85%;"></div>
            <div class="bar-glimmer"></div>
        </div>
    </div>

    <div class="bar-container">
        <div class="bar-label">
            <span>EXP PROGRESS</span>
            <span id="exp-val">65%</span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill exp" style="width: 65%;"></div>
            <div class="bar-glimmer"></div>
        </div>
    </div>
</div>

<div id="attribute-chart" class="glass-panel">
    <div class="chart-header">
        <span>DIAGONAL ATTRIBUTE ANALYTICS</span>
        <div class="status-slots">
            <div class="slot debuff" title="Licin Aktif" id="slot-rain"></div>
            <div class="slot buff" title="Double Exp" id="slot-event"></div>
        </div>
    </div>
    
    <div class="hexagon-wrapper">
        <svg viewBox="0 0 200 200" class="radar-svg">
            <polygon points="100,20 170,60 170,140 100,180 30,140 30,60" class="grid-line"/>
            <polygon points="100,60 135,80 135,120 100,140 65,120 65,80" class="grid-line"/>
            
            <line x1="100" y1="20" x2="100" y2="180" class="axis-line" />
            <line x1="30" y1="60" x2="170" y2="140" class="axis-line" />
            <line x1="30" y1="140" x2="170" y2="60" class="axis-line" />

            <polygon points="100,30 160,70 165,130 100,170 40,135 35,65" class="ghost-line"/>
            
            <polygon points="100,50 140,80 150,130 100,160 60,120 50,70" class="data-line"/>
        </svg>

        <div class="label l-1">RUTE</div>
        <div class="label l-2">CEPAT</div>
        <div class="label l-3">AMAN</div>
        <div class="label l-4">NYAMAN</div>
        <div class="label l-5">PAKAIAN</div>
        <div class="label l-6">PUAS</div>
    </div>
</div>




            
            <div id="resource-bars"></div>  <div id="attribute-chart"></div> </section>

        <nav id="section-command-hub">
            </nav>

        <section id="section-analytics" class="glass-panel">
            </section>

        <footer id="section-info-panel">
            </footer>

    </main>

    <div id="notification-system"></div>
    <div id="visual-burst-layer"></div>

    <script src="js/atmosphere.js"></script>    <script src="js/identity-stats.js"></script> <script src="js/command-hub.js"></script>    <script src="js/analytics.js"></script>      <script src="js/interaction.js"></script>    <script src="js/info-panel.js"></script>     </body>
</html>
