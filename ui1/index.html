<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Driver Interface (SDI)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Rajdhani:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style-core.css">      <link rel="stylesheet" href="css/atmosphere.css">      <link rel="stylesheet" href="css/identity-stats.css">  <link rel="stylesheet" href="css/command-hub.css">     <link rel="stylesheet" href="css/analytics.css">       <link rel="stylesheet" href="css/interaction.css">     <link rel="stylesheet" href="css/info-panel.css">      </head>
<body class="rank-s"> <div id="atmosphere-layer">
        <div class="runic-outer-ring">
            <div class="runic-text" id="runic-loop"></div>
        </div>
        <div id="weather-effect" class="weather-none">
            <div class="rain-particles"></div>
        </div>
        <div id="battery-glitch-overlay"></div>
        <div class="vignette"></div>
    </div>

    <main class="sdi-container">
        
        <header id="section-identity" class="glass-panel">
            </header>

        <section id="section-stats" class="grid-stats">
            <div id="resource-bars"></div>  <div id="attribute-chart"></div> </section>

        <nav id="section-command-hub">
            </nav>

        <section id="section-analytics" class="glass-panel">
            </section>

        <footer id="section-info-panel">
            </footer>

    </main>

    <div id="notification-system"></div>
    <div id="visual-burst-layer"></div>

    <script src="js/atmosphere.js"></script>    <script src="js/identity-stats.js"></script> <script src="js/command-hub.js"></script>    <script src="js/analytics.js"></script>      <script src="js/interaction.js"></script>    <script src="js/info-panel.js"></script>     </body>
</html>
