<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Active - SOVEREIGN DRIVER</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p-cyan: #00f3ff; --p-pink: #ff00ea; --p-bg: #050505; }
        body { background: var(--p-bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 15px; }

        /* Header Info */
        .mission-header { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .client-box { background: #111; padding: 15px; border-radius: 8px; border-left: 4px solid var(--p-pink); display: flex; justify-content: space-between; align-items: center; }

        /* Action Buttons */
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-op { padding: 12px; border: none; font-weight: bold; font-family: 'Rajdhani'; cursor: pointer; border-radius: 5px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-nav { background: var(--p-cyan); color: #000; }
        .btn-wa-req { background: #25D366; color: white; }

        /* Chat Terminal Style */
        .chat-container { background: #000; border: 1px solid #222; height: 300px; margin-top: 20px; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 4px; max-width: 80%; line-height: 1.4; }
        .msg.driver { align-self: flex-end; background: var(--p-cyan); color: #000; }
        .msg.client { align-self: flex-start; background: #222; color: #fff; }
        
        .input-area { display: flex; border-top: 1px solid #222; }
        .input-area input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
        .btn-send { background: var(--p-cyan); border: none; padding: 0 20px; font-weight: bold; }

        .finish-area { margin-top: 30px; text-align: center; }
        .btn-finish { width: 100%; background: linear-gradient(45deg, #004e52, #00f3ff); color: white; padding: 15px; border: none; font-family: 'Orbitron'; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="mission-header">
        <div style="font-size: 10px; color: var(--p-cyan); letter-spacing: 2px;">ACTIVE MISSION PHASE</div>
        <div id="m-id" style="font-family: 'Orbitron'; font-size: 18px;">ID: LOADING...</div>
    </div>

    <div class="client-box">
        <div>
            <label style="font-size: 10px; color: #666; display: block;">TARGET CUSTOMER</label>
            <span id="c-name" style="font-size: 18px; font-weight: bold;">Mencari...</span>
        </div>
        <div style="text-align: right;">
            <label style="font-size: 10px; color: #666; display: block;">DEAL PRICE</label>
            <span id="m-price" style="color: var(--p-cyan); font-weight: bold;">Rp 0</span>
        </div>
    </div>

    <div class="grid-actions">
        <button onclick="openGmaps()" class="btn-op btn-nav">
            📍 BUKA NAVIGASI
        </button>
        <button onclick="requestWA()" class="btn-op btn-wa-req">
            📱 MINTA NO. WA
        </button>
    </div>

    <div class="chat-container">
        <div style="background: #111; padding: 5px 10px; font-size: 10px; color: #555;">SECURE COMMS CHANNEL v1.0</div>
        <div id="chat-list" class="chat-msgs" style="display: flex; flex-direction: column;"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Ketik pesan pesan manual...">
            <button onclick="sendChat()" class="btn-send">KIRIM</button>
        </div>
    </div>

    <div class="finish-area">
        <button onclick="finishMission()" class="btn-finish">SELESAIKAN MISI</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const activeMissionID = localStorage.getItem('active_mission_id') || "MISI_TEST";
        let pickupLocation = "";

        // 1. Ambil Data Misi
        db.ref(`missions/${activeMissionID}`).on('value', snap => {
            const m = snap.val();
            if(!m) return;

            document.getElementById('m-id').innerText = "ID: " + activeMissionID.slice(-8).toUpperCase();
            document.getElementById('c-name').innerText = m.clientName;
            document.getElementById('m-price').innerText = "Rp " + m.price.toLocaleString();
            pickupLocation = m.pickupCoords; // Format: "lat,lng"
        });

        // 2. Fungsi Navigasi
        function openGmaps() {
            if(!pickupLocation) return alert("Koordinat tidak ditemukan!");
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${pickupLocation}&travelmode=driving`, '_blank');
        }

        // 3. Fungsi Minta WA
        function requestWA() {
            const msg = "Halo, boleh minta nomor WhatsApp agar koordinasi penjemputan lebih mudah? Terima kasih.";
            sendChat(msg);
        }

        // 4. Sistem Chat
        function sendChat(customMsg = null) {
            const input = document.getElementById('chat-input');
            const text = customMsg || input.value;
            if(!text) return;

            db.ref(`missions/${activeMissionID}/chats`).push({
                sender: 'driver',
                msg: text,
                timestamp: Date.now()
            });
            input.value = "";
        }

        db.ref(`missions/${activeMissionID}/chats`).on('child_added', snap => {
            const chat = snap.val();
            const list = document.getElementById('chat-list');
            const isMe = chat.sender === 'driver';
            
            list.innerHTML += `<div class="msg ${isMe ? 'driver' : 'client'}">${chat.msg}</div>`;
            list.scrollTop = list.scrollHeight;
        });

        // 5. Selesaikan Misi
        function finishMission() {
            if(confirm("Pastikan penumpang sudah sampai di tujuan! Selesaikan?")) {
                db.ref(`missions/${activeMissionID}`).update({ status: 'completed' })
                .then(() => {
                    alert("MISI SELESAI! Menghitung reputasi...");
                    window.location.replace('mission-hub.html');
                });
            }
        }
    </script>
</body>
</html>
