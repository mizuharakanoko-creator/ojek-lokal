<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVER REGISTRY | S-CLASS SYSTEM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        :root { 
            --p-cyan: #00fff2; 
            --p-purple: #bc00ff; 
            --p-yellow: #f4ff00; 
            --bg-dark: #050505; 
        }

        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            padding: 20px; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }

        /* Container dengan Border Ungu Sesuai Gambar 10 & 11 */
        .reg-container { 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid var(--p-purple); 
            padding: 30px 20px; 
            background: rgba(0, 0, 0, 0.8); 
            box-shadow: 0 0 25px rgba(188, 0, 255, 0.15);
        }

        .header { 
            text-align: center; 
            border-bottom: 1px solid var(--p-purple); 
            margin-bottom: 30px; 
            padding-bottom: 15px; 
        }

        .header h2 {
            color: var(--p-purple);
            text-shadow: 0 0 10px rgba(188, 0, 255, 0.7);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
        }

        .header p {
            font-size: 9px;
            color: #888;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Gaya Input Sesuai Gambar 11 */
        .form-group { margin-bottom: 20px; }
        
        label { 
            font-size: 10px; 
            color: var(--p-cyan); 
            display: block; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            background: #0a0a0a; 
            border: 1px solid #222; 
            color: #fff; 
            outline: none; 
            box-sizing: border-box; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 12px;
            transition: 0.3s;
        }

        input::placeholder {
            color: #444;
            font-style: italic;
        }

        input:focus { 
            border-color: var(--p-cyan); 
            box-shadow: 0 0 10px rgba(0, 255, 242, 0.2);
        }

        /* Grid Upload Gambar 11 */
        .upload-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .upload-box { 
            border: 1px dashed #333; 
            padding: 15px 5px; 
            text-align: center; 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.01);
            transition: 0.3s;
        }

        .upload-box:hover { border-color: var(--p-cyan); background: rgba(0, 255, 242, 0.03); }
        
        .upload-box span {
            font-size: 9px;
            color: var(--p-cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .preview-img { 
            width: 100%; 
            height: 90px; 
            object-fit: cover; 
            display: none; 
            margin-top: 10px; 
            border: 1px solid var(--p-purple); 
        }

        /* Tombol Initialize Account Ungu Glow (Gambar 10) */
        .btn-reg { 
            width: 100%; 
            padding: 18px; 
            background: var(--p-purple); 
            border: none; 
            color: #fff; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 3px;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(188, 0, 255, 0.4);
            transition: 0.3s;
        }

        .btn-reg:hover { background: #d000ff; box-shadow: 0 0 20px rgba(188, 0, 255, 0.6); }
        .btn-reg:active { transform: scale(0.98); }
        .btn-reg:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }

        #status-msg { 
            font-size: 9px; 
            color: var(--p-yellow); 
            text-align: center; 
            margin-top: 20px; 
            display: none; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h2>NEW DRIVER REGISTRY</h2>
        <p>S-CLASS PILOT DATABASE SYSTEM</p>
    </div>

    <div class="upload-grid">
        <div class="upload-box" onclick="document.getElementById('file-ktp').click()">
            <span>SCAN KTP</span>
            <input type="file" id="file-ktp" accept="image/*" style="display:none" onchange="preview(this, 'p-ktp')">
            <img id="p-ktp" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('file-selfie').click()">
            <span>SELFIE</span>
            <input type="file" id="file-selfie" accept="image/*" style="display:none" capture="user" onchange="preview(this, 'p-selfie')">
            <img id="p-selfie" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('file-sim').click()">
            <span>SCAN SIM</span>
            <input type="file" id="file-sim" accept="image/*" style="display:none" onchange="preview(this, 'p-sim')">
            <img id="p-sim" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('file-stnk').click()">
            <span>SCAN STNK</span>
            <input type="file" id="file-stnk" accept="image/*" style="display:none" onchange="preview(this, 'p-stnk')">
            <img id="p-stnk" class="preview-img">
        </div>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Sesuai Identitas">
    </div>

    <div class="form-group">
        <label>NIK Number (16 Digits)</label>
        <input type="number" id="reg-nik" placeholder="32xxxxxxxxxxxxxx">
    </div>

    <div class="form-group">
        <label>WhatsApp Number</label>
        <input type="number" id="reg-phone" placeholder="08xxxxxxxx">
    </div>

    <div class="form-group">
        <label>Domisili & Area Tugas</label>
        <input type="text" id="reg-domisili" placeholder="Contoh: Jakarta - Tebet">
    </div>

    <div class="form-group">
        <label>Vehicle Model & Plate</label>
        <input type="text" id="reg-v-plate" placeholder="Contoh: Vario - B 1234 ABC">
    </div>

    <div class="form-group">
        <label>Secure PIN (6 Digits)</label>
        <input type="password" maxlength="6" id="reg-pin" placeholder="******">
    </div>

    <button class="btn-reg" id="btn-submit" onclick="submitRegistration()">Initialize Account</button>
    <div id="status-msg">Accessing Global Database... Uploading Protocol...</div>
</div>

<script>
    // Config Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    function preview(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                input.parentElement.querySelector('span').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function submitRegistration() {
        const d = id => document.getElementById(id).value;
        const f = id => document.getElementById(id).files[0];

        if(!d('reg-name') || !d('reg-nik') || !d('reg-phone') || !d('reg-pin') || !f('file-ktp') || !f('file-selfie')) {
            alert("SYSTEM: Incomplete identity protocol detected!");
            return;
        }

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('status-msg').style.display = 'block';

        try {
            const nikRef = await db.ref('registered_niks/' + d('reg-nik')).once('value');
            if(nikRef.exists()) throw new Error("NIK identity already locked in system!");

            const phone = d('reg-phone');
            
            const uploadMedia = async (file, name) => {
                if(!file) return "";
                const ref = storage.ref(`pending_drivers/${phone}/${name}.jpg`);
                await ref.put(file);
                return await ref.getDownloadURL();
            };

            const urls = {
                ktp: await uploadMedia(f('file-ktp'), 'ktp'),
                selfie: await uploadMedia(f('file-selfie'), 'selfie'),
                sim: await uploadMedia(f('file-sim'), 'sim'),
                stnk: await uploadMedia(f('file-stnk'), 'stnk')
            };

            await db.ref('pending_verifications/' + phone).set({
                nama_lengkap: d('reg-name'),
                nomor_ktp: d('reg-nik'),
                nomor_telepon: phone,
                domisili: d('reg-domisili'),
                plat_nomor: d('reg-v-plate'),
                pin_transaksi: d('reg-pin'),
                url_foto_profil: urls.selfie,
                url_foto_ktp: urls.ktp,
                url_foto_sim: urls.sim,
                url_foto_stnk: urls.stnk,
                status_verifikasi: "Pending",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            alert("INITIALIZATION SUCCESS! Syncing with Admin Verificator...");
            window.location.reload();

        } catch (e) {
            alert("SYSTEM ERROR: " + e.message);
            document.getElementById('btn-submit').disabled = false;
        }
    }
</script>
</body>
</html>
