<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVER REGISTRY | S-CLASS SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-cyan: #00fff2; --p-purple: #bc00ff; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .reg-container { width: 100%; max-width: 450px; border: 1px solid var(--p-purple); padding: 30px 20px; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 20px rgba(188, 0, 255, 0.2); }
        .header { text-align: center; border-bottom: 1px solid var(--p-purple); margin-bottom: 25px; padding-bottom: 15px; }
        .header h2 { color: var(--p-purple); margin: 0; text-transform: uppercase; font-size: 18px; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 15px; }
        label { font-size: 10px; color: var(--p-cyan); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; box-sizing: border-box; font-family: 'Orbitron'; font-size: 12px; outline: none; }
        input:focus { border-color: var(--p-cyan); box-shadow: 0 0 5px var(--p-cyan); }
        
        .btn-reg { width: 100%; padding: 15px; background: var(--p-purple); border: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; font-family: 'Orbitron'; }
        .btn-reg:disabled { background: #222; color: #555; cursor: not-allowed; }

        #status-area { margin-top: 20px; display: none; text-align: center; color: var(--p-cyan); font-size: 10px; border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h2>PILOT REGISTRY</h2>
        <p style="font-size: 8px; color: #888;">GLOBAL DATABASE SYSTEM S-CLASS</p>
    </div>

    <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Sesuai Identitas"></div>
    <div class="form-group"><label>NIK (16 Digits)</label><input type="number" id="nik" placeholder="32xxxxxxxxxxxxxx"></div>
    <div class="form-group"><label>WhatsApp Number</label><input type="number" id="wa" placeholder="08xxxxxxxx"></div>
    <div class="form-group"><label>Domisili & Area Tugas</label><input type="text" id="area" placeholder="Contoh: Jakarta - Tebet"></div>
    <div class="form-group"><label>Vehicle Model & Plate</label><input type="text" id="plate" placeholder="Contoh: Vario - B 1234 ABC"></div>
    <div class="form-group"><label>Secure PIN (6 Digits)</label><input type="password" id="pin" maxlength="6" placeholder="******"></div>

    <button class="btn-reg" id="btn-sub" onclick="startReg()">INITIALIZE ACCOUNT</button>

    <div id="status-area">
        ACCESSING GLOBAL DATABASE...<br>UPLOADING PROTOCOL...
    </div>
</div>

<script>
    // Konfigurasi sesuai project Anda
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function startReg() {
        const val = id => document.getElementById(id).value;
        const btn = document.getElementById('btn-sub');
        const status = document.getElementById('status-area');

        // Validasi input
        if(!val('name') || !val('nik') || !val('wa') || !val('pin')) {
            return alert("Harap lengkapi data wajib (Nama, NIK, WA, PIN)!");
        }

        btn.disabled = true;
        status.style.display = 'block';

        try {
            // 1. Cek duplikasi NIK
            const nikSnap = await db.ref('registered_niks/' + val('nik')).once('value');
            if(nikSnap.exists()) {
                throw new Error("NIK ini sudah terdaftar dalam sistem!");
            }

            // 2. Kirim data ke Antrean Pendaftaran (tanpa foto)
            const wa = val('wa');
            await db.ref('pending_verifications/' + wa).set({
                nama: val('name'),
                nik: val('nik'),
                wa: wa,
                area: val('area'),
                plat: val('plate'),
                pin: val('pin'),
                status: "MENUNGGU_APPROVE",
                tgl_daftar: Date.now()
            });

            alert("INITIALIZATION COMPLETE! Data Anda telah masuk antrean S-Class. Admin akan menghubungi Anda via WhatsApp untuk verifikasi foto.");
            window.location.reload(); // Reset form

        } catch (e) {
            alert("SYSTEM ERROR: " + e.message);
            btn.disabled = false;
            status.style.display = 'none';
        }
    }
</script>
</body>
</html>
