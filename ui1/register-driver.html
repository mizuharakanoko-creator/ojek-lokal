<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE DRIVER REGISTRY | PICK ME SYSTEM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>

    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-red: #ff3c3c;
            --p-yellow: #f4ff00;
            --bg-dark: #050505;
        }
        body { background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; padding: 15px; margin: 0; }
        .secure-container { width: 100%; max-width: 480px; margin: auto; border: 1px solid var(--p-cyan); padding: 20px; box-sizing: border-box; background: rgba(0, 255, 242, 0.02); }
        
        .header { text-align: center; border-bottom: 2px solid var(--p-cyan); margin-bottom: 25px; padding-bottom: 15px; position: relative; }
        .security-badge { position: absolute; top: 10px; right: 10px; color: var(--p-cyan); font-size: 8px; border: 1px solid var(--p-cyan); padding: 3px 6px; }

        .form-group { margin-bottom: 18px; }
        label { font-size: 10px; color: var(--p-cyan); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;}
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; outline: none; box-sizing: border-box; font-size: 13px; font-family: 'Orbitron', sans-serif; }
        input:focus { border-color: var(--p-yellow); box-shadow: 0 0 10px rgba(244, 255, 0, 0.2); }
        input:disabled { opacity: 0.5; cursor: not-allowed;}
        
        /* Step Indicator */
        .step-indicators { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .step { color: #555; text-align: center;}
        .step.active { color: var(--p-cyan); font-weight: bold;}
        .step.done { color: var(--p-purple);}

        /* Media Upload Area */
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .upload-box { border: 1px dashed #555; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; background: rgba(255, 255, 255, 0.02);}
        .upload-box:hover { border-color: var(--p-cyan); background: rgba(0, 255, 242, 0.05); }
        .upload-box.done { border-color: var(--p-purple); }
        .preview-img { width: 100%; max-height: 100px; object-fit: cover; display: none; border: 1px solid var(--p-purple); margin-top: 10px;}

        /* Buttons */
        .btn-secure { width: 100%; padding: 16px; background: var(--p-cyan); border: none; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; transition: 0.2s; box-shadow: 0 0 15px rgba(0, 255, 242, 0.2);}
        .btn-secure:active { opacity: 0.8; transform: scale(0.98); }
        .btn-otp { background: transparent; border: 1px solid var(--p-cyan); color: var(--p-cyan); margin-top: 5px;}

        /* Status & Error */
        .status-box { display: none; border: 1px solid var(--p-yellow); padding: 10px; color: var(--p-yellow); font-size: 10px; text-align: center; margin-bottom: 15px; background: rgba(244, 255, 0, 0.05); animation: pulse 1.5s infinite;}
        .error-msg { color: var(--p-red); font-size: 10px; margin-top: -10px; display: none; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div class="secure-container">
    <div class="header">
        <div class="security-badge">HARDENED SECURITY SYSTEM</div>
        <h3 style="color: var(--p-cyan); margin-bottom: 5px;">NEW DRIVER PROTOCOL</h3>
        <p style="font-size: 9px; color: #888; margin-top: 0;">S-CLASS TRANSPORTATION NETWORK OTONOMOUS INITIALIZATION</p>
    </div>

    <div class="step-indicators">
        <div class="step active" id="step1-in">STEP 1: PHONE</div>
        <div class="step" id="step2-in">STEP 2: BIOMETRIC</div>
        <div class="step" id="step3-in">STEP 3: DRIVER DATA</div>
    </div>

    <div class="status-box" id="global-status">SYSTEM INITIALIZING... PLEASE WAIT...</div>

    <div id="section-1">
        <div class="form-group">
            <label>Secure Communication Line (WhatsApp)</label>
            <input type="tel" id="reg-phone" placeholder="08XXXXXXXXXX" required>
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn-secure btn-otp" id="btn-send-otp" onclick="sendOTP()">Send Verification Code</button>

        <div class="form-group" id="otp-group" style="display: none; margin-top: 15px;">
            <label>System Verification Code</label>
            <input type="number" id="reg-otp" placeholder="CODE: XXXXXX">
            <button class="btn-secure" onclick="verifyOTP()">Authenticate Line</button>
        </div>
    </div>

    <div id="section-2" style="display: none;">
        <div class="upload-row">
            <div class="upload-box" onclick="document.getElementById('ktp-file').click()" id="ktp-box">
                <span style="font-size: 9px; color: #aaa;">[KLIK UNTUK SCAN KTP]</span>
                <input type="file" id="ktp-file" accept="image/*" style="display: none;" onchange="previewKTP(this)">
                <img id="ktp-preview-img" class="preview-img">
            </div>
            <div class="upload-box" onclick="document.getElementById('selfie-file').click()" id="selfie-box">
                <span style="font-size: 9px; color: #aaa;">[KLIK UNTUK SELFIE]</span>
                <input type="file" id="selfie-file" accept="image/*" style="display: none;" capture="user" onchange="previewSelfie(this)">
                <img id="selfie-preview-img" class="preview-img">
            </div>
        </div>
        <button class="btn-secure" onclick="toSection3()">Analyze Media & Continue</button>
    </div>

    <div id="section-3" style="display: none;">
        <div class="form-group">
            <label>Verified Name (From KTP)</label>
            <input type="text" id="reg-name" placeholder="Waiting for media..." disabled>
        </div>

        <div class="form-group">
            <label>Verified NIK (From KTP)</label>
            <input type="number" id="reg-ktp" placeholder="Waiting for media..." disabled>
        </div>

        <div class="form-group">
            <label>Vehicle Type & Year</label>
            <input type="text" id="reg-vehicle" placeholder="Contoh: Honda Vario 2021">
        </div>

        <div class="form-group">
            <label>License Plate</label>
            <input type="text" id="reg-plate" placeholder="B 1234 XXX">
        </div>

        <button class="btn-secure" onclick="registerFinal()">Initialize Account</button>
    </div>

</div>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b",
        measurementId: "G-KBGEL1G22Y"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();

    let confirmationResult;
    let finalKTPBase64, finalSelfieBase64;
    let extractedName, extractedNIK;

    // Helper: Show/Hide Section
    function showSection(num) {
        document.getElementById('section-1').style.display = 'none';
        document.getElementById('section-2').style.display = 'none';
        document.getElementById('section-3').style.display = 'none';
        
        document.getElementById('step1-in').classList.remove('active');
        document.getElementById('step2-in').classList.remove('active');
        document.getElementById('step3-in').classList.remove('active');

        document.getElementById('section-' + num).style.display = 'block';
        document.getElementById('step' + num + '-in').classList.add('active');
    }

    // Helpter: Update Status
    function updateStatus(msg, color='#f4ff00') {
        const box = document.getElementById('global-status');
        box.innerText = msg;
        box.style.color = color;
        box.style.borderColor = color;
        box.style.display = 'block';
    }

    // === LOGIKA TAHAP 1: VERIFIKASI TELEPON ===
    window.onload = function() {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });
    };

    function sendOTP() {
        const phoneInput = document.getElementById('reg-phone').value;
        const cleanedPhone = "+62" + phoneInput.replace(/^0+/, ''); // Format Indonesia

        if(phoneInput.length < 9) { alert("Format Nomor Salah."); return; }
        
        updateStatus("SYSTEM: Sending OTP Line via SMS/WhatsApp...");
        
        const appVerifier = window.recaptchaVerifier;
        auth.signInWithPhoneNumber(cleanedPhone, appVerifier)
            .then((confResult) => {
                confirmationResult = confResult;
                document.getElementById('btn-send-otp').style.display = 'none';
                document.getElementById('otp-group').style.display = 'block';
                document.getElementById('reg-phone').disabled = true;
                updateStatus("OTP SENT! Authenticate secure line to proceed.");
            }).catch((error) => {
                alert("ERROR AUTH: " + error.message);
                updateStatus("AUTHENTICATION LINE ERROR.", "#ff3c3c");
                recaptchaVerifier.render().then(function(widgetId) { grecaptcha.reset(widgetId); });
            });
    }

    function verifyOTP() {
        const code = document.getElementById('reg-otp').value;
        confirmationResult.confirm(code).then((result) => {
            const user = result.user;
            updateStatus("SYSTEM: Communication Line Authenticated. Step 1 Complete.", "#00fff2");
            // Tandai Step 1 selesai dan pindah ke step 2
            document.getElementById('step1-in').classList.add('done');
            setTimeout(() => { showSection(2); }, 1500);
        }).catch((error) => {
            alert("Kode Salah.");
            updateStatus("OTP INVALID.", "#ff3c3c");
        });
    }

    // === LOGIKA TAHAP 2: MEDIA UPLOAD & AUTO-FILL ===
    
    // Preview KTP + OCR Sisi Klien untuk Auto-Fill (Lebih Cepat)
    function previewKTP(input) {
        if (input.files && input.files[0]) {
            updateStatus("SYSTEM: Reading Identity Data from Media...");
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('ktp-preview-img').src = e.target.result;
                document.getElementById('ktp-preview-img').style.display = 'block';
                document.getElementById('ktp-box').classList.add('done');
                finalKTPBase64 = e.target.result; // Simpan untuk Cloud Function

                // OCR Sisi Klien (Tesseract.js) untuk Auto-Fill
                Tesseract.recognize(e.target.result, 'ind', { logger: m => console.log(m) })
                .then(({ data: { text } }) => {
                    extractKTPData(text);
                });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Fungsi bantu Ekstraksi Data dari Tesseract (Dummy, perlu disesuaikan dengan format KTP)
    function extractKTPData(text) {
        console.log("OCR RAW TEXT:", text);
        // RegEx sederhana untuk cari NIK (16 digit)
        const nikMatches = text.match(/\d{16}/);
        if(nikMatches) { 
            document.getElementById('reg-ktp').value = nikMatches[0];
            extractedNIK = nikMatches[0];
        }
        // Mencari nama (Masih sulit, butuh Cloud Vision API Google untuk akurat 100%)
        document.getElementById('reg-name').value = "AUTOFILLED NAME FROM SCAN"; // Dummy
        extractedName = "AUTOFILLED NAME FROM SCAN";
        updateStatus("IDENTITY MEDIA READ. Fill Other Data.");
    }

    // Preview Selfie
    function previewSelfie(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('selfie-preview-img').src = e.target.result;
                document.getElementById('selfie-preview-img').style.display = 'block';
                document.getElementById('selfie-box').classList.add('done');
                finalSelfieBase64 = e.target.result; // Simpan untuk Cloud Function
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toSection3() {
        if(!finalKTPBase64 || !finalSelfieBase64) {
            alert("SYSTEM: Biometric & Identity Media Required!");
            return;
        }
        document.getElementById('step2-in').classList.add('done');
        showSection(3);
    }

    // === LOGIKA TAHAP 3: REGISTRASI FINAL OTONOM (Cloud Function Trigger) ===
    
    function registerFinal() {
        const vehicle = document.getElementById('reg-vehicle').value;
        const plate = document.getElementById('reg-plate').value;
        const user = auth.currentUser; // Ambil User UID dari Step 1

        if(!vehicle || !plate) {
            alert("Data Kendaraan Wajib Diisi."); return;
        }

        updateStatus("SYSTEM: Running Otonomous Identity Matching & Fraud Check... PLEASE WAIT...");
        
        // --- 1. Unggah Foto ke Firebase Storage ---
        const phone = user.phoneNumber;
        const uid = user.uid;
        const metadata = { contentType: 'image/jpeg' };
        
        // Upload Base64 (Convert ke Blob)
        function base64ToBlob(base64, mime) {
            let byteString = atob(base64.split(',')[1]);
            let ab = new ArrayBuffer(byteString.length);
            let ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], {type: mime});
        }

        const ktpBlob = base64ToBlob(finalKTPBase64, 'image/jpeg');
        const selfieBlob = base64ToBlob(finalSelfieBase64, 'image/jpeg');

        // Menjalankan upload paralel
        const ktpRef = storage.ref().child(`driver_verification/${uid}_ktp.jpg`);
        const selfieRef = storage.ref().child(`driver_verification/${uid}_selfie.jpg`);

        updateStatus("SYSTEM: Securely Uploading Identity Media...");

        Promise.all([
            ktpRef.put(ktpBlob, metadata),
            selfieRef.put(selfieBlob, metadata)
        ]).then(async ([ktpSnap, selfieSnap]) => {
            // Ambil URL Foto
            const ktpUrl = await ktpSnap.ref.getDownloadURL();
            const selfieUrl = await selfieSnap.ref.getDownloadURL();

            updateStatus("SYSTEM: Matching Biometrics & NIK Check (Sercer-Side)...");

            // --- 2. JALANKAN CLOUD FUNCTION OTONOM (ANTI-HACKER) ---
            // Kita menulis data temp ke database, Cloud Function akan ter-trigger
            // Ini adalah celah keamanan jika aturan RTDB tidak dikunci total seperti di atas.
            // Arsitektur terbaik: Gunakan HTTPS Callable Function. Di sini contoh menggunakan RTDB Trigger.

            const tempId = uid;
            
            // Simpan data pendaftaran ke node "temp" yang hanya bisa ditulis oleh user ini (via Security Rules)
            db.ref('pending_verifications/' + tempId).set({
                // Data KTP Mentah dari Foto (Diisi oleh Cloud Function nanti)
                uid: uid,
                phoneNumber: phone,
                ktp_url: ktpUrl,
                selfie_url: selfieUrl,
                jenis_kendaraan: vehicle,
                plat_nomor: plate,
                
                // Menghubungkan fungsi otonom: Cloud Function akan memproses NIK dan Nama dari foto KTP.
                // Cloud Function akan memeriksa registered_niks, mencocokkan wajah, dan jika lulus:
                // Menulis ke users_driver dan menghapus pending_verifications
                status: 'PROCESS', 
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // Tampilkan layar loading berputar/scanline siber
            showFinalProcessingUI();

        }).catch((error) => {
            console.error("Firebase Error:", error);
            updateStatus("SYSTEM ERROR: Failed to upload media.", "#ff3c3c");
        });
    }

    function showFinalProcessingUI() {
        const container = document.querySelector('.secure-container');
        container.innerHTML = `
            <div style="text-align: center; color: var(--p-cyan); padding: 50px;">
                <div style="font-size: 50px; position: relative;">
                    <div style="font-family: Orbitron;">[PICK ME]</div>
                    <div style="width: 100%; height: 2px; background: var(--p-cyan); position: absolute; top: 0; animation: scanline 2s linear infinite;"></div>
                </div>
                <p style="color: var(--p-yellow); font-size: 10px; margin-top: 20px;">AI INITIALIZING DRIVER PROTOCOL... DO NOT CLOSE...</p>
                <div id="check-stat-nik" style="color: #555; font-size: 12px; margin-top: 10px;">[ Checking NIK Database ]</div>
                <div id="check-stat-face" style="color: #555; font-size: 12px; margin-top: 10px;">[ Matching Face Identity ]</div>
            </div>
        `;
        
        // Logika sederhana untuk polling hasil Cloud Function
        // Di dunia nyata, gunakan Firestore onSnapshot atau Firebase Functions HTTPS
        const userUid = auth.currentUser.uid;
        let pollCount = 0;
        const pollInterval = setInterval(() => {
            pollCount++;
            if(pollCount > 10) { // Timeout 30 detik
                clearInterval(pollInterval);
                updateStatus("AUTHENTICATION TIMEOUT. Check Internet Connection.");
            }
            // Periksa apakah Cloud Function sudah memproses dan menghapus pending_verifications
            db.ref('pending_verifications/' + userUid).once('value', (snapshot) => {
                if(!snapshot.exists()){
                    // Data temp dihapus oleh Cloud Function, berarti Berhasil/Gagal
                    clearInterval(pollInterval);
                    checkFinalDatabase(userUid);
                }
            });
        }, 3000); // Poll setiap 3 detik
    }

    function checkFinalDatabase(uid) {
        // Cek apakah driver UID sudah ada di database final users_driver
        db.ref('users_driver/' + uid).once('value', (snapshot) => {
            if(snapshot.exists()) {
                const driver = snapshot.val();
                if(driver.status_verifikasi === 'Verified') {
                    document.querySelector('.secure-container').innerHTML = `
                        <div style="text-align: center; padding: 50px;">
                            <h2 style="color: var(--p-purple);">REGISTRATION SECURED</h2>
                            <p style="font-size: 11px;">WELCOME, VERIFIED CITIZEN DRIVER.</p>
                            <a href="driver-dashboard.html" class="btn-secure" style="text-decoration: none; padding: 15px 30px; display: inline-block;">Initialize Dashboard</a>
                        </div>
                    `;
                } else {
                     alert("SYSTEM: Registrasi ditolak (Salah Identitas/Duplikasi).");
                     window.location.reload();
                }
            } else {
                 alert("SYSTEM: Registrasi ditolak total (Identitas palsu terdeteksi).");
                 window.location.reload();
            }
        });
    }

</script>

</body>
</html>
