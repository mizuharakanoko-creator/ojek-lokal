<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILOT REGISTRY | S-CLASS SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --p-cyan: #00fff2; 
            --p-purple: #bc00ff; 
            --bg-dark: #050505; 
        }
        
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            padding: 20px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }

        .reg-container { 
            width: 100%; 
            max-width: 450px; 
            border: 2px solid var(--p-purple); 
            padding: 30px 20px; 
            background: rgba(0, 0, 0, 0.9); 
            box-shadow: 0 0 20px rgba(188, 0, 255, 0.3);
        }

        .header { 
            text-align: center; 
            border-bottom: 1px solid var(--p-purple); 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
        }

        /* Gaya Font Gambar 1: Tebal & Miring */
        .header h2 { 
            color: var(--p-purple); 
            margin: 0; 
            text-transform: uppercase; 
            font-size: 24px; 
            letter-spacing: 2px;
            font-weight: 900;
            font-style: italic;
        }
        
        .form-group { margin-bottom: 15px; }

        /* Label Gaya Gambar 1: Cyan & Miring */
        label { 
            font-size: 11px; 
            color: var(--p-cyan); 
            display: block; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            font-weight: 800;
            font-style: italic;
        }

        /* Input Gaya Gambar 1: Bold & Italic */
        input { 
            width: 100%; 
            padding: 12px; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            box-sizing: border-box; 
            font-family: 'Orbitron'; 
            font-size: 14px; 
            font-weight: 700;
            font-style: italic;
            outline: none; 
        }

        input:focus { 
            border-color: var(--p-cyan); 
            box-shadow: 0 0 5px var(--p-cyan); 
        }
        
        /* Tombol Gaya Gambar 1: Besar & Miring */
        .btn-reg { 
            width: 100%; 
            padding: 18px; 
            background: var(--p-purple); 
            border: none; 
            color: #fff; 
            font-weight: 900; 
            font-style: italic;
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 10px; 
            font-family: 'Orbitron'; 
            font-size: 16px;
        }

        .btn-reg:disabled { background: #222; color: #555; }

        #status-area { 
            margin-top: 20px; 
            display: none; 
            text-align: center; 
            color: var(--p-cyan); 
            font-size: 10px; 
            font-style: italic;
            border: 1px solid #333; 
            padding: 10px; 
        }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h2>NEW CITIZEN REGISTRY</h2>
        <p style="font-size: 8px; color: #888; font-weight: bold;">GLOBAL DATABASE SYSTEM S-CLASS</p>
    </div>

    <div class="form-group"><label>Full Name / Identity</label><input type="text" id="name" placeholder="Contoh: Budi Santoso"></div>
    <div class="form-group"><label>Unique NIK (16 Digits)</label><input type="number" id="nik" placeholder="32xxxxxxxxxxxxxx"></div>
    <div class="form-group"><label>Phone Number / WhatsApp</label><input type="number" id="wa" placeholder="08xxxxxxxx"></div>
    <div class="form-group"><label>Domisili / Area</label><input type="text" id="area" placeholder="Contoh: Kuningan"></div>
    <div class="form-group"><label>Vehicle & Plate</label><input type="text" id="plate" placeholder="Contoh: Vario - B 1234 ABC"></div>
    <div class="form-group"><label>Secure PIN (6 Digits)</label><input type="password" id="pin" maxlength="6" placeholder="******"></div>

    <button class="btn-reg" id="btn-sub" onclick="startReg()">INITIALIZE ACCOUNT</button>

    <div id="status-area">
        ACCESSING GLOBAL DATABASE...<br>UPLOADING PROTOCOL...
    </div>
</div>

<script>
    // Konfigurasi Project Anda
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function startReg() {
        const val = id => document.getElementById(id).value;
        const btn = document.getElementById('btn-sub');
        const status = document.getElementById('status-area');

        if(!val('name') || !val('nik') || !val('wa') || !val('pin')) {
            return alert("Harap lengkapi data!");
        }

        btn.disabled = true;
        status.style.display = 'block';

        try {
            // Cek NIK di database
            const nikSnap = await db.ref('registered_niks/' + val('nik')).once('value');
            if(nikSnap.exists()) {
                throw new Error("NIK sudah terdaftar!");
            }

            // Simpan data teks langsung ke pending_verifications
            const wa = val('wa');
            await db.ref('pending_verifications/' + wa).set({
                nama: val('name'),
                nik: val('nik'),
                wa: wa,
                area: val('area'),
                plat: val('plate'),
                pin: val('pin'),
                status: "PENDING",
                tgl_daftar: Date.now()
            });

            alert("Pendaftaran Berhasil Dikirim ke S-Class System!");
            window.location.reload();

        } catch (e) {
            alert("SYSTEM ERROR: " + e.message);
            btn.disabled = false;
            status.style.display = 'none';
        }
    }
</script>
</body>
</html>
