<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILOT REGISTRY | S-CLASS SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --p-cyan: #00fff2; 
            --p-purple: #bc00ff; 
            --bg-dark: #050505; 
        }
        
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            padding: 20px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }

        .reg-container { 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid var(--p-purple); 
            padding: 30px 20px; 
            background: rgba(0, 0, 0, 0.9); 
        }

        .header { 
            text-align: center; 
            border-bottom: 1px solid var(--p-purple); 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
        }

        /* Gaya: Miring tapi TIPIS (font-weight: 400) */
        .header h2 { 
            color: var(--p-purple); 
            margin: 0; 
            text-transform: uppercase; 
            font-size: 22px; 
            letter-spacing: 2px;
            font-weight: 400; 
            font-style: italic;
        }
        
        .form-group { margin-bottom: 18px; }

        label { 
            font-size: 10px; 
            color: var(--p-cyan); 
            display: block; 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            font-weight: 400;
            font-style: italic;
            letter-spacing: 1px;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            background: #0a0a0a; 
            border: 1px solid #222; 
            color: #ccc; 
            box-sizing: border-box; 
            font-family: 'Orbitron'; 
            font-size: 13px; 
            font-weight: 400;
            font-style: italic;
            outline: none; 
            transition: 0.3s;
        }

        input:focus { 
            border-color: var(--p-cyan); 
            color: #fff;
        }
        
        .btn-reg { 
            width: 100%; 
            padding: 18px; 
            background: transparent; 
            border: 1px solid var(--p-purple);
            color: var(--p-purple); 
            font-weight: 400; 
            font-style: italic;
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-top: 15px; 
            font-family: 'Orbitron'; 
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-reg:hover {
            background: var(--p-purple);
            color: #fff;
            box-shadow: 0 0 15px var(--p-purple);
        }

        .btn-reg:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        #status-area { 
            margin-top: 20px; 
            display: none; 
            text-align: center; 
            color: var(--p-cyan); 
            font-size: 9px; 
            font-style: italic;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h2>NEW CITIZEN REGISTRY</h2>
        <p style="font-size: 8px; color: #555; font-style: italic;">S-CLASS PILOT DATABASE</p>
    </div>

    <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="ENTRY NAME..."></div>
    <div class="form-group"><label>Unique NIK</label><input type="number" id="nik" placeholder="IDENTIFICATION NO..."></div>
    <div class="form-group"><label>WhatsApp</label><input type="number" id="wa" placeholder="COMMS LINE..."></div>
    <div class="form-group"><label>Area</label><input type="text" id="area" placeholder="DOMICILE..."></div>
    <div class="form-group"><label>Vehicle Plate</label><input type="text" id="plate" placeholder="UNIT ID..."></div>
    <div class="form-group"><label>Secure PIN</label><input type="password" id="pin" maxlength="6" placeholder="******"></div>

    <button class="btn-reg" id="btn-sub" onclick="startReg()">INITIALIZE</button>

    <div id="status-area">
        CONNECTING TO S-CLASS SERVER...<br>TRANSMITTING DATA...
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function startReg() {
        const val = id => document.getElementById(id).value;
        const btn = document.getElementById('btn-sub');
        const status = document.getElementById('status-area');

        if(!val('name') || !val('nik') || !val('wa') || !val('pin')) {
            return alert("PROTOCOL ERROR: INCOMPLETE DATA");
        }

        btn.disabled = true;
        status.style.display = 'block';

        try {
            const nikSnap = await db.ref('registered_niks/' + val('nik')).once('value');
            if(nikSnap.exists()) throw new Error("NIK ALREADY REGISTERED");

            const wa = val('wa');
            await db.ref('pending_verifications/' + wa).set({
                nama: val('name'),
                nik: val('nik'),
                wa: wa,
                area: val('area'),
                plat: val('plate'),
                pin: val('pin'),
                status: "PENDING",
                tgl_daftar: Date.now()
            });

            alert("REGISTRATION SENT. REDIRECTING TO AUTH INTERFACE...");
            // Lempar ke halaman login dengan parameter nomor WA untuk cek status nanti
            window.location.href = "login.html?reg=" + wa;

        } catch (e) {
            alert("SYSTEM ERROR: " + e.message);
            btn.disabled = false;
            status.style.display = 'none';
        }
    }
</script>
</body>
</html>
