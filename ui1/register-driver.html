<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVER REGISTRY | S-CLASS SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        :root { --p-cyan: #00fff2; --p-purple: #bc00ff; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .reg-container { width: 100%; max-width: 450px; border: 1px solid var(--p-purple); padding: 30px 20px; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 20px rgba(188, 0, 255, 0.2); }
        .header { text-align: center; border-bottom: 1px solid var(--p-purple); margin-bottom: 25px; padding-bottom: 15px; }
        .header h2 { color: var(--p-purple); margin: 0; text-transform: uppercase; font-size: 18px; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .upload-box { border: 1px dashed #444; padding: 10px; text-align: center; cursor: pointer; font-size: 9px; color: var(--p-cyan); }
        .preview-img { width: 100%; height: 80px; object-fit: cover; display: none; margin-top: 5px; border: 1px solid var(--p-purple); }

        .form-group { margin-bottom: 15px; }
        label { font-size: 9px; color: var(--p-cyan); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; box-sizing: border-box; font-family: 'Orbitron'; font-size: 11px; }
        
        .btn-reg { width: 100%; padding: 15px; background: var(--p-purple); border: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-reg:disabled { background: #222; color: #555; cursor: not-allowed; }

        #status-area { margin-top: 20px; display: none; text-align: center; }
        .progress-bg { width: 100%; background: #222; height: 5px; margin-top: 10px; }
        .progress-fill { width: 0%; background: var(--p-cyan); height: 100%; transition: 0.3s; box-shadow: 0 0 10px var(--p-cyan); }
        #status-txt { font-size: 10px; color: #f4ff00; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h2>PILOT REGISTRATION</h2>
        <p style="font-size: 8px; color: #666;">MANUAL VERIFICATION REQUIRED</p>
    </div>

    <div class="upload-grid">
        <div class="upload-box" onclick="document.getElementById('f-ktp').click()">
            <span id="t-ktp">UPLOAD KTP</span>
            <input type="file" id="f-ktp" hidden onchange="pv(this, 'p-ktp', 't-ktp')">
            <img id="p-ktp" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('f-selfie').click()">
            <span id="t-selfie">UPLOAD SELFIE</span>
            <input type="file" id="f-selfie" hidden onchange="pv(this, 'p-selfie', 't-selfie')">
            <img id="p-selfie" class="preview-img">
        </div>
    </div>

    <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Nama Lengkap"></div>
    <div class="form-group"><label>NIK (16 Digits)</label><input type="number" id="nik" placeholder="320xxxxxxxxxxxxx"></div>
    <div class="form-group"><label>WhatsApp</label><input type="number" id="wa" placeholder="08xxxxxxxx"></div>
    <div class="form-group"><label>PIN (6 Digits)</label><input type="password" id="pin" maxlength="6" placeholder="******"></div>

    <button class="btn-reg" id="btn-sub" onclick="startReg()">INITIALIZE ACCOUNT</button>

    <div id="status-area">
        <div id="status-txt">UPLOADING: <span id="perc">0</span>%</div>
        <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
    </div>
</div>

<script>
    // MASUKKAN CONFIG FIREBASE ANDA DI SINI
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    function pv(i, img, txt) {
        if (i.files[0]) {
            document.getElementById(img).src = URL.createObjectURL(i.files[0]);
            document.getElementById(img).style.display = 'block';
            document.getElementById(txt).style.display = 'none';
        }
    }

    async function startReg() {
        const val = id => document.getElementById(id).value;
        const file = id => document.getElementById(id).files[0];
        
        if(!val('name') || !val('nik') || !val('wa') || !file('f-ktp') || !file('f-selfie')) {
            return alert("Harap lengkapi semua data dan foto!");
        }

        document.getElementById('btn-sub').disabled = true;
        document.getElementById('status-area').style.display = 'block';

        try {
            // Cek apakah NIK sudah terdaftar
            const snap = await db.ref('registered_niks/' + val('nik')).once('value');
            if(snap.exists()) throw new Error("NIK sudah terdaftar!");

            const wa = val('wa');
            const files = [
                { f: file('f-ktp'), n: 'ktp' },
                { f: file('f-selfie'), n: 'selfie' }
            ];

            let urls = {};
            for(let i=0; i < files.length; i++) {
                const ref = st.ref(`pending_drivers/${wa}/${files[i].n}.jpg`);
                const task = ref.put(files[i].f);

                await new Promise((res, rej) => {
                    task.on('state_changed', (s) => {
                        let p = Math.round((s.bytesTransferred / s.totalBytes) * 100);
                        document.getElementById('bar').style.width = p + '%';
                        document.getElementById('perc').innerText = p;
                    }, rej, async () => {
                        urls[files[i].n] = await ref.getDownloadURL();
                        res();
                    });
                });
            }

            // Simpan ke antrean manual
            await db.ref('pending_verifications/' + wa).set({
                nama: val('name'),
                nik: val('nik'),
                wa: wa,
                pin: val('pin'),
                foto_ktp: urls.ktp,
                foto_selfie: urls.selfie,
                status: "MENUNGGU_APPROVE",
                tgl: Date.now()
            });

            alert("Data terkirim! Silakan hubungi Admin untuk aktivasi akun.");
            window.location.href = "login.html"; // Lempar ke login

        } catch (e) {
            alert("Error: " + e.message);
            document.getElementById('btn-sub').disabled = false;
        }
    }
</script>
</body>
</html>
