<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVER REGISTRY | PICK ME FINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        :root { --p-cyan: #00fff2; --p-purple: #bc00ff; --p-yellow: #f4ff00; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; margin: 0; }
        .reg-container { width: 100%; max-width: 450px; border: 1px solid var(--p-cyan); padding: 25px; background: rgba(0, 255, 242, 0.02); margin: auto; box-shadow: 0 0 20px rgba(0, 255, 242, 0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--p-cyan); margin-bottom: 20px; padding-bottom: 10px; }
        .form-section { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .section-title { font-size: 10px; color: var(--p-purple); margin-bottom: 15px; letter-spacing: 2px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 9px; color: var(--p-cyan); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; outline: none; box-sizing: border-box; font-family: 'Orbitron'; font-size: 12px; }
        input:focus { border-color: var(--p-yellow); }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .upload-box { border: 1px dashed #444; padding: 10px; text-align: center; cursor: pointer; background: rgba(255, 255, 255, 0.02); }
        .upload-box:hover { border-color: var(--p-cyan); }
        .preview-img { width: 100%; height: 80px; object-fit: cover; display: none; margin-top: 8px; border: 1px solid var(--p-purple); }
        
        .btn-reg { width: 100%; padding: 18px; background: var(--p-cyan); border: none; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: 'Orbitron'; letter-spacing: 2px; }
        .btn-reg:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status-msg { font-size: 10px; color: var(--p-yellow); text-align: center; margin-top: 15px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h3 style="color: var(--p-cyan); margin-bottom: 5px;">DRIVER INITIALIZATION</h3>
        <p style="font-size: 8px; color: #888; margin-top: 0;">S-CLASS TRANSPORTATION PROTOCOL</p>
    </div>

    <div class="form-section">
        <div class="section-title">01. BIOMETRIC & IDENTITY</div>
        <div class="upload-grid">
            <div class="upload-box" onclick="document.getElementById('file-ktp').click()">
                <label>FOTO KTP</label>
                <input type="file" id="file-ktp" accept="image/*" style="display:none" onchange="preview(this, 'p-ktp')">
                <img id="p-ktp" class="preview-img">
            </div>
            <div class="upload-box" onclick="document.getElementById('file-selfie').click()">
                <label>SELFIE</label>
                <input type="file" id="file-selfie" accept="image/*" style="display:none" capture="user" onchange="preview(this, 'p-selfie')">
                <img id="p-selfie" class="preview-img">
            </div>
        </div>
        <div class="upload-grid">
            <div class="upload-box" onclick="document.getElementById('file-sim').click()">
                <label>FOTO SIM</label>
                <input type="file" id="file-sim" accept="image/*" style="display:none" onchange="preview(this, 'p-sim')">
                <img id="p-sim" class="preview-img">
            </div>
            <div class="upload-box" onclick="document.getElementById('file-stnk').click()">
                <label>FOTO STNK</label>
                <input type="file" id="file-stnk" accept="image/*" style="display:none" onchange="preview(this, 'p-stnk')">
                <img id="p-stnk" class="preview-img">
            </div>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Sesuai KTP">
        </div>
        <div class="form-group">
            <label>NIK KTP (16 Digits)</label>
            <input type="number" id="reg-nik" placeholder="32xxxxxxxxxxxxxx">
        </div>
    </div>

    <div class="form-section">
        <div class="section-title">02. OPERATIONAL DATA</div>
        <div class="form-group">
            <label>WhatsApp Number</label>
            <input type="number" id="reg-phone" placeholder="08xxxxxxxx">
        </div>
        <div class="form-group">
            <label>Domisili (Kota/Kab)</label>
            <input type="text" id="reg-domisili" placeholder="Contoh: Jakarta Selatan">
        </div>
        <div class="form-group">
            <label>Area Tugas Specific</label>
            <input type="text" id="reg-area" placeholder="Contoh: Tebet, Pancoran">
        </div>
        <div class="form-group">
            <label>Jenis Kendaraan</label>
            <input type="text" id="reg-v-type" placeholder="Contoh: Honda Vario 2022">
        </div>
        <div class="form-group">
            <label>Plat Nomor</label>
            <input type="text" id="reg-v-plate" placeholder="B 1234 ABC">
        </div>
        <div class="form-group">
            <label>Transaction PIN (6 Digits)</label>
            <input type="password" maxlength="6" id="reg-pin" placeholder="******">
        </div>
    </div>

    <button class="btn-reg" id="btn-submit" onclick="submitRegistration()">Initialize Account</button>
    <div id="status-msg">PROCESSING PROTOCOL... UPLOADING MEDIA...</div>
</div>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    function preview(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                document.getElementById(id).src = e.target.result;
                document.getElementById(id).style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function submitRegistration() {
        const d = id => document.getElementById(id).value;
        const f = id => document.getElementById(id).files[0];

        if(!d('reg-name') || !d('reg-nik') || !d('reg-phone') || !d('reg-pin') || !f('file-ktp') || !f('file-selfie')) {
            alert("SYSTEM: Data Identitas & Media Wajib Dilengkapi!");
            return;
        }

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('status-msg').style.display = 'block';

        try {
            // Cek Duplikasi NIK
            const nikRef = await db.ref('registered_niks/' + d('reg-nik')).once('value');
            if(nikRef.exists()) throw new Error("NIK sudah terdaftar!");

            const phone = d('reg-phone');
            
            // Upload Semua Media (KTP, Selfie, SIM, STNK)
            const uploadMedia = async (file, name) => {
                if(!file) return "";
                const ref = storage.ref(`pending_drivers/${phone}/${name}.jpg`);
                await ref.put(file);
                return await ref.getDownloadURL();
            };

            const urls = {
                ktp: await uploadMedia(f('file-ktp'), 'ktp'),
                selfie: await uploadMedia(f('file-selfie'), 'selfie'),
                sim: await uploadMedia(f('file-sim'), 'sim'),
                stnk: await uploadMedia(f('file-stnk'), 'stnk')
            };

            // Simpan ke Antrean Pending
            await db.ref('pending_verifications/' + phone).set({
                nama_lengkap: d('reg-name'),
                nomor_ktp: d('reg-nik'),
                nomor_telepon: phone,
                domisili: d('reg-domisili'),
                area_tugas: d('reg-area'),
                jenis_kendaraan: d('reg-v-type'),
                plat_nomor: d('reg-v-plate'),
                pin_transaksi: d('reg-pin'), // Dalam prod nyata ini harus di-hash
                url_foto_profil: urls.selfie,
                url_foto_ktp: urls.ktp,
                url_foto_sim: urls.sim,
                url_foto_stnk: urls.stnk,
                status_verifikasi: "Pending",
                device_id: navigator.userAgent, // Sederhana untuk deteksi perangkat
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            alert("INITIALIZATION SUCCESS! Mohon tunggu verifikasi Admin.");
            window.location.reload();

        } catch (e) {
            alert("SYSTEM ERROR: " + e.message);
            document.getElementById('btn-submit').disabled = false;
        }
    }
</script>
</body>
</html>
