<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | DRIVER DATABASE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --bg-dark: #050505;
        }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .reg-container { 
            width: 100%;
            max-width: 450px; 
            border: 1px solid var(--p-purple); 
            padding: 20px; 
            background: rgba(188, 0, 255, 0.05);
            box-shadow: 0 0 20px rgba(188, 0, 255, 0.2);
            box-sizing: border-box;
        }
        .header { text-align: center; border-bottom: 1px solid var(--p-purple); margin-bottom: 25px; }
        
        /* Grid untuk upload foto agar rapi */
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .upload-box { 
            border: 1px dashed #444; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            background: rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }
        .upload-box:hover { border-color: var(--p-cyan); }
        .upload-box label { cursor: pointer; color: var(--p-cyan); font-size: 8px; }
        .preview-img { width: 100%; height: 80px; object-fit: cover; display: none; margin-top: 8px; border: 1px solid var(--p-purple); }

        .form-group { margin-bottom: 15px; }
        label { font-size: 10px; color: var(--p-cyan); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; 
            color: #fff; outline: none; box-sizing: border-box; font-size: 13px;
            font-family: 'Orbitron', sans-serif;
        }
        input:focus { border-color: var(--p-cyan); }
        
        .btn-reg { 
            width: 100%; padding: 15px; background: var(--p-purple); border: none; 
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px; font-family: 'Orbitron';
        }
        .btn-reg:disabled { opacity: 0.5; background: #333; }
        #status-msg { font-size: 9px; color: #f4ff00; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h3 style="color: var(--p-purple); margin-bottom: 5px;">NEW DRIVER REGISTRY</h3>
        <p style="font-size: 9px; color: #888; margin-top: 0;">S-CLASS PILOT DATABASE SYSTEM</p>
    </div>

    <div class="upload-grid">
        <div class="upload-box" onclick="document.getElementById('f-ktp').click()">
            <label>SCAN KTP</label>
            <input type="file" id="f-ktp" accept="image/*" style="display:none" onchange="prev(this, 'p-ktp')">
            <img id="p-ktp" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('f-selfie').click()">
            <label>SELFIE</label>
            <input type="file" id="f-selfie" accept="image/*" style="display:none" capture="user" onchange="prev(this, 'p-selfie')">
            <img id="p-selfie" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('f-sim').click()">
            <label>SCAN SIM</label>
            <input type="file" id="f-sim" accept="image/*" style="display:none" onchange="prev(this, 'p-sim')">
            <img id="p-sim" class="preview-img">
        </div>
        <div class="upload-box" onclick="document.getElementById('f-stnk').click()">
            <label>SCAN STNK</label>
            <input type="file" id="f-stnk" accept="image/*" style="display:none" onchange="prev(this, 'p-stnk')">
            <img id="p-stnk" class="preview-img">
        </div>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Sesuai Identitas">
    </div>

    <div class="form-group">
        <label>NIK Number (16 Digits)</label>
        <input type="number" id="reg-nik" placeholder="32xxxxxxxxxxxxxx">
    </div>

    <div class="form-group">
        <label>WhatsApp Number</label>
        <input type="number" id="reg-phone" placeholder="08xxxxxxxx">
    </div>

    <div class="form-group">
        <label>Domisili & Area Tugas</label>
        <input type="text" id="reg-area" placeholder="Contoh: Jakarta - Tebet">
    </div>

    <div class="form-group">
        <label>Vehicle Model & Plate</label>
        <input type="text" id="reg-vehicle" placeholder="Contoh: Vario - B 1234 ABC">
    </div>

    <div class="form-group">
        <label>Secure PIN (6 Digits)</label>
        <input type="password" maxlength="6" id="reg-pin" placeholder="******">
    </div>

    <button class="btn-reg" id="btn-submit" onclick="startReg()">Initialize Account</button>
    <div id="status-msg">SYSTEM: UPLOADING BIOMETRIC DATA...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    function prev(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                document.getElementById(id).src = e.target.result;
                document.getElementById(id).style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function startReg() {
        const d = id => document.getElementById(id).value;
        const f = id => document.getElementById(id).files[0];

        if(!d('reg-name') || !d('reg-nik') || !d('reg-phone') || !f('f-ktp') || !f('f-selfie')) {
            alert("SYSTEM: Data Identitas & Biometrik Wajib!");
            return;
        }

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('status-msg').style.display = 'block';

        try {
            // Cek Duplikasi NIK
            const nikRef = await db.ref('registered_niks/' + d('reg-nik')).once('value');
            if(nikRef.exists()) throw new Error("NIK SUDAH TERDAFTAR");

            const phone = d('reg-phone');
            
            // Helper Upload
            const up = async (file, path) => {
                if(!file) return "";
                const ref = storage.ref(`pending_drivers/${phone}/${path}.jpg`);
                await ref.put(file);
                return await ref.getDownloadURL();
            };

            const urls = {
                ktp: await up(f('f-ktp'), 'ktp'),
                selfie: await up(f('f-selfie'), 'selfie'),
                sim: await up(f('f-sim'), 'sim'),
                stnk: await up(f('f-stnk'), 'stnk')
            };

            // Simpan ke Antrean
            await db.ref('pending_verifications/' + phone).set({
                nama_lengkap: d('reg-name'),
                nomor_ktp: d('reg-nik'),
                nomor_telepon: phone,
                area_tugas: d('reg-area'),
                jenis_kendaraan: d('reg-vehicle'),
                pin_transaksi: d('reg-pin'),
                url_foto_profil: urls.selfie,
                url_foto_ktp: urls.ktp,
                url_foto_sim: urls.sim,
                url_foto_stnk: urls.stnk,
                status_verifikasi: "Pending",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            alert("BERHASIL! Menunggu Verifikasi Admin S-Class.");
            location.reload();

        } catch (e) {
            alert("ERROR: " + e.message);
            document.getElementById('btn-submit').disabled = false;
        }
    }
</script>

</body>
</html>
