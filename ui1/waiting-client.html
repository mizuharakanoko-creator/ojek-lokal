<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mencari Driver - Ojek Lokal</title>
    <style>
        :root { --p-cyan: #00ffcc; --p-red: #ff4d4d; --p-orange: #ffb84d; --p-purple: #bc00ff; }
        body { background: #0d0d0d; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; color: white; }
        
        .waiting-container { text-align: center; max-width: 400px; margin: auto; padding-top: 40px; }
        
        /* Loader Gahar */
        .loader-ring {
            width: 80px; height: 80px; border: 3px solid transparent;
            border-top: 3px solid var(--p-cyan); border-radius: 50%;
            margin: 20px auto; animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #timer-status { font-family: 'Courier New', monospace; font-size: 2em; color: var(--p-cyan); font-weight: bold; margin: 15px 0; }
        .blink { animation: blinker 1s linear infinite; color: var(--p-red) !important; }
        @keyframes blinker { 50% { opacity: 0; } }

        .edu-card { background: rgba(188, 0, 255, 0.1); border: 1px dashed var(--p-purple); padding: 15px; border-radius: 10px; margin: 25px 0; font-size: 12px; color: #ccc; text-align: left; }
        
        /* Driver List Styling */
        .driver-card { 
            background: #151515; 
            border: 1px solid #333; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            text-align: left; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 4px solid var(--p-cyan); 
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .driver-info h4 { margin: 0; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        .driver-info small { color: #888; display: block; margin-top: 4px; font-size: 11px; }
        
        .driver-photo { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--p-cyan); object-fit: cover; margin-right: 12px; }

        .btn-choose { background: var(--p-cyan); color: black; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-choose:active { transform: scale(0.95); }
        
        .btn-cancel { background: none; border: 1px solid #444; color: #888; width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; margin-top: 30px; font-weight: bold; }

        #retry-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

    <div class="waiting-container">
        <div class="loader-ring"></div>
        <h2 style="letter-spacing: 2px; font-size: 18px;">MENCARI DRIVER...</h2>
        <div id="timer-status">01:30</div>
        
        <div class="edu-card">
            <span style="color: var(--p-cyan); font-weight: bold;">TIPS RADAR:</span><br>
            Tunggu sebentar, penawaran dari driver terdekat akan muncul di sini secara otomatis.
        </div>

        <h3 style="font-family: 'Courier New'; color: var(--p-cyan); font-size: 11px; text-align: center; margin-top: 20px; letter-spacing: 1px;">
            UNIT TERDETEKSI: <span id="applicant-count">0</span>
        </h3>

        <div id="applicants-list">
            <p style="color: #444; font-style: italic; font-size: 13px; margin-top: 20px;">Menghubungkan ke satelit...</p>
        </div>

        <button onclick="cancelOrder()" class="btn-cancel">BATALKAN PESANAN</button>
    </div>

    <div id="retry-dialog">
        <h3 style="color: var(--p-orange);">TIME OUT</h3>
        <p style="color: #888; text-align: center;">Belum ada driver di jangkauan Anda saat ini.</p>
        <button onclick="location.reload()" class="btn-choose" style="width: 200px; margin-bottom: 10px;">ULANGI PENCARIAN</button>
        <button onclick="exitWaiting()" class="btn-cancel" style="width: 200px;">KEMBALI KE MENU</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // 1. FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84",
            storageBucket: "ojeklokal-42b84.firebasestorage.app",
            messagingSenderId: "320198748498",
            appId: "1:320198748498:web:3e6038249edc6af20b328b"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const missionId = localStorage.getItem('active_mission_id');
        if (!missionId || missionId === "null") { 
            window.location.replace('order-client.html'); 
        }

        const mRef = db.ref('missions/' + missionId);

        // 2. MONITORING MISSION STATUS (Jika dipilih/dibatalkan)
        mRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) { exitWaiting(); return; }

            // Jika misi sudah dalam proses (berhasil memilih driver)
            if (data.status === "on_process") {
                mRef.off();
                alert("DRIVER TERKONFIRMASI! Membuka koordinat penjemputan...");
                window.location.replace('tracking-client.html');
                return;
            }
        });

        // 3. LISTEN FOR APPLICANTS (Sistem Bursa Driver)
        function listenForApplicants() {
            db.ref(`missions/${missionId}/applicants`).on('value', (snapshot) => {
                const listDiv = document.getElementById('applicants-list');
                const countLabel = document.getElementById('applicant-count');
                listDiv.innerHTML = "";

                const applicants = snapshot.val();
                if (!applicants) {
                    countLabel.innerText = "0";
                    listDiv.innerHTML = '<p style="color: #444; font-style: italic; margin-top: 20px; font-size: 12px;">Menunggu respon driver...</p>';
                    return;
                }

                const keys = Object.keys(applicants);
                countLabel.innerText = keys.length;

                keys.forEach(id => {
                    const d = applicants[id];
                    const card = `
                        <div class="driver-card">
                            <div style="display:flex; align-items:center;">
                                <img src="${d.driverPhoto || 'https://via.placeholder.com/50'}" class="driver-photo">
                                <div class="driver-info">
                                    <h4>${d.driverName}</h4>
                                    <small>⭐ ${d.driverRating || '5.0'} • Posisi: ${d.distanceToPickup || '?'}</small>
                                    <small style="color:var(--p-orange); font-weight:bold;">Est: ${d.eta || '?'}</small>
                                </div>
                            </div>
                            <div style="text-align:right;">
                                <div style="color:var(--p-cyan); font-weight:bold; font-size:14px; margin-bottom:5px;">Rp ${d.dealPrice.toLocaleString()}</div>
                                <button onclick="selectDriver('${id}', '${d.driverName}', ${d.dealPrice})" class="btn-choose">PILIH</button>
                            </div>
                        </div>
                    `;
                    listDiv.insertAdjacentHTML('beforeend', card);
                });
            });
        }

        // 4. SELECT DRIVER LOGIC
        function selectDriver(dId, dName, finalPrice) {
            if (confirm(`Pilih ${dName} untuk pesanan ini?`)) {
                mRef.update({
                    status: "on_process",
                    driverId: dId,
                    driverName: dName,
                    price: finalPrice, // Mengunci harga deal (jika ada nego)
                    acceptedTime: firebase.database.ServerValue.TIMESTAMP
                }).catch(err => alert("Gagal mengunci driver: " + err.message));
            }
        }

        // 5. TIMER LOGIC
        let countdown = 90; 
        const timerInterval = setInterval(() => {
            countdown--;
            let min = Math.floor(countdown / 60);
            let sec = countdown % 60;
            document.getElementById('timer-status').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;

            if (countdown <= 10) document.getElementById('timer-status').classList.add('blink');

            if (countdown <= 0) {
                clearInterval(timerInterval);
                document.getElementById('retry-dialog').style.display = 'flex';
            }
        }, 1000);

        // 6. CLEANUP & CANCEL
        function cancelOrder() {
            if (confirm("Batalkan pesanan ini?")) {
                mRef.remove().then(() => exitWaiting());
            }
        }

        function exitWaiting() {
            mRef.off();
            db.ref(`missions/${missionId}/applicants`).off();
            localStorage.removeItem('active_mission_id');
            window.location.replace('order-client.html');
        }

        // Jalankan pemantau driver saat halaman dimuat
        listenForApplicants();

        // Anti-Back
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = () => window.history.go(1);
    </script>
</body>
</html>
