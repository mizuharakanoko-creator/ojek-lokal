<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Driver - SOVEREIGN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABEL TEMA GELAP & TERANG --- */
        :root { 
            --p-cyan: #00f3ff; --p-pink: #ff00ea; 
            --p-bg: #050505; --p-text: #ffffff;
            --p-glass: rgba(10, 10, 10, 0.85);
            --p-card-border: rgba(0, 243, 255, 0.3);
            --p-chat-bg: #111; --p-msg-them: #222;
            --map-filter: grayscale(0.6) contrast(1.2);
        }

        [data-theme="light"] {
            --p-cyan: #008cff; --p-pink: #d000ff;
            --p-bg: #f4f4f9; --p-text: #111111;
            --p-glass: rgba(255, 255, 255, 0.9);
            --p-card-border: rgba(0, 140, 255, 0.3);
            --p-chat-bg: #e0e0e0; --p-msg-them: #ffffff;
            --map-filter: none;
        }

        body { 
            background: var(--p-bg); color: var(--p-text); 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; overflow: hidden; transition: background 0.3s, color 0.3s;
        }

        /* --- HEADER & DRIVER CARD --- */
        .driver-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 2000;
            padding: 15px; background: linear-gradient(to bottom, var(--p-bg), transparent);
        }

        .driver-card-top {
            background: var(--p-glass); backdrop-filter: blur(10px);
            border: 1px solid var(--p-card-border); border-left: 4px solid var(--p-cyan);
            border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); cursor: pointer;
        }

        .photo-frame {
            width: 55px; height: 55px; border-radius: 12px; 
            border: 2px solid var(--p-cyan); overflow: hidden; 
            box-shadow: 0 0 10px var(--p-cyan);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .info-main { flex: 1; }
        .info-main h2 { font-family: 'Orbitron'; font-size: 15px; margin: 0; letter-spacing: 1px; }
        .info-main p { font-size: 12px; margin: 2px 0; color: var(--p-cyan); font-weight: bold; }

        .theme-btn {
            position: absolute; top: 15px; right: 15px; z-index: 2001;
            background: var(--p-glass); border: 1px solid var(--p-cyan);
            color: var(--p-cyan); padding: 8px; border-radius: 50%; cursor: pointer;
        }

        /* --- MAP --- */
        #map { width: 100%; height: 100vh; z-index: 1; filter: var(--map-filter); transition: filter 0.5s; }

        /* --- NOTIFIKASI MELAYANG --- */
        #popup-notif {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 5000; background: var(--p-cyan); color: #000;
            padding: 12px 20px; border-radius: 30px; font-weight: bold; font-size: 13px;
            display: none; box-shadow: 0 5px 15px rgba(0, 243, 255, 0.4);
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, fadeOut 0.3s 3.5s forwards;
            display: flex; align-items: center; gap: 10px;
        }
        @keyframes slideDown { from { top: 60px; opacity: 0; } to { top: 90px; opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

        /* --- CHAT SYSTEM --- */
        #chat-window {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh;
            background: var(--p-bg); z-index: 4000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        #chat-window.active { bottom: 0; }

        .chat-header { 
            padding: 15px; background: var(--p-chat-bg); 
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 20px 20px 0 0; border-bottom: 2px solid var(--p-cyan);
        }

        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Balon Chat yang Diperbaiki */
        .msg { 
            max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; 
            position: relative; animation: popIn 0.3s ease; line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .msg .time { font-size: 10px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }
        .msg img { width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        .msg.me { 
            align-self: flex-end; background: var(--p-cyan); color: #000; 
            border-bottom-right-radius: 4px; 
        }
        .msg.them { 
            align-self: flex-start; background: var(--p-msg-them); color: var(--p-text); 
            border-bottom-left-radius: 4px; border: 1px solid var(--p-card-border);
        }

        /* --- MODAL (DETAIL & RATING) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            background: var(--p-bg); border: 1px solid var(--p-cyan); border-radius: 15px;
            width: 100%; max-width: 350px; padding: 25px; text-align: center; color: var(--p-text);
        }
        .stars i { font-size: 30px; color: #555; cursor: pointer; margin: 0 5px; transition: 0.2s; }
        .stars i.active { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* --- ACTION BAR --- */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 15px 30px; background: linear-gradient(to top, var(--p-bg), transparent);
            z-index: 2000; display: flex; gap: 10px;
        }
        .btn-round {
            flex: 1; height: 50px; border: none; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
        }
        .btn-finish { background: var(--p-pink); color: white; box-shadow: 0 0 15px rgba(255,0,234,0.3); }
        .btn-chat-trigger { background: var(--p-cyan); color: #000; }
        
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>

    <div id="popup-notif" style="display: none;"><i class="fa-solid fa-bell"></i> <span id="notif-text"></span></div>

    <div class="driver-header">
        <div class="driver-card-top" onclick="document.getElementById('modal-detail').style.display='flex'">
            <div class="photo-frame"><img id="d-photo" src="https://via.placeholder.com/100"></div>
            <div class="info-main">
                <h2 id="d-name">Loading...</h2>
                <p id="d-vehicle">Sovereign Unit</p>
                <div style="font-size: 11px; color: var(--p-text);"><i class="fa-solid fa-location-arrow"></i> Jarak: <span id="distance-text">Menghitung...</span></div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-nav">
        <button onclick="toggleChat()" class="btn-round btn-chat-trigger"><i class="fa-solid fa-comment-dots"></i> CHAT</button>
        <button id="wa-btn" class="btn-round" style="background:#25D366; color:white;"><i class="fa-brands fa-whatsapp"></i> WA</button>
        <button onclick="showRatingModal()" class="btn-round btn-finish"><i class="fa-solid fa-flag-checkered"></i> SELESAI</button>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <span style="font-family: Orbitron; font-size: 14px;">SECURE COMM</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:var(--p-text); font-size:24px;">&times;</button>
        </div>
        <div id="chat-msgs" class="chat-msgs"></div>
        
        <div style="padding: 15px; background: var(--p-chat-bg); display: flex; gap: 10px; align-items: center;">
            <input type="file" id="img-upload" accept="image/*" style="display: none;" onchange="uploadImage(event)">
            
            <button onclick="document.getElementById('img-upload').click()" style="background: none; border: none; color: var(--p-cyan); font-size: 20px;">
                <i class="fa-solid fa-camera"></i>
            </button>
            <input type="text" id="chat-input" placeholder="Ketik pesan..." style="flex: 1; background: var(--p-bg); border: 1px solid #333; color: var(--p-text); padding: 12px; border-radius: 10px;">
            <button onclick="sendChat()" style="background: var(--p-cyan); border: none; padding: 12px 15px; border-radius: 10px; color: #000;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="modal-detail" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <img id="m-detail-img" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--p-cyan);">
            <h3 id="m-detail-name" style="font-family:Orbitron; margin:10px 0 5px;">-</h3>
            <p style="color:var(--p-cyan); font-size:14px; margin:0 0 20px;" id="m-detail-plat"></p>
            
            <div style="display:flex; justify-content:space-between; text-align:left; border-top:1px solid #333; padding-top:15px; font-size:13px;">
                <div>
                    <div style="color:#888;">Exp Tier</div>
                    <strong style="color:var(--p-cyan);">Vanguard</strong>
                </div>
                <div>
                    <div style="color:#888;">Misi Selesai</div>
                    <strong id="m-detail-missions">0</strong>
                </div>
                <div>
                    <div style="color:#888;">Rating</div>
                    <strong>⭐ <span id="m-detail-rating">0.0</span></strong>
                </div>
            </div>
            <button onclick="document.getElementById('modal-detail').style.display='none'" style="margin-top:20px; width:100%; padding:10px; border-radius:8px; background:var(--p-chat-bg); color:var(--p-text); border:1px solid #555;">Tutup</button>
        </div>
    </div>

    <div id="modal-rating" class="modal-overlay">
        <div class="modal-box">
            <h3 style="font-family:Orbitron; color:var(--p-cyan);">MISI SELESAI</h3>
            <p style="font-size:14px; color:#aaa;">Berikan rating untuk performa driver ini.</p>
            <div class="stars" id="star-container" style="margin:20px 0;">
                <i class="fa-solid fa-star" onclick="setRating(1)"></i>
                <i class="fa-solid fa-star" onclick="setRating(2)"></i>
                <i class="fa-solid fa-star" onclick="setRating(3)"></i>
                <i class="fa-solid fa-star" onclick="setRating(4)"></i>
                <i class="fa-solid fa-star" onclick="setRating(5)"></i>
            </div>
            <button onclick="submitFinish()" style="width:100%; padding:12px; border-radius:8px; background:var(--p-pink); color:white; border:none; font-family:Orbitron; font-weight:bold; cursor:pointer;">KONFIRMASI SELESAI</button>
            <button onclick="document.getElementById('modal-rating').style.display='none'" style="margin-top:10px; width:100%; background:none; color:#888; border:none; cursor:pointer;">Batal</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const missionId = localStorage.getItem('active_mission_id') || "MISI_DEFAULT";
        let driverData = null;
        let selectedRating = 5; // Default bintang 5
        let pickupCoords = null;

        // --- TEMA GELAP/TERANG ---
        let isLight = false;
        const tileDark = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        const tileLight = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        
        const map = L.map('map', { zoomControl: false }).setView([-6.9585, 108.5096], 15);
        let mapLayer = L.tileLayer(tileDark).addTo(map);

        function toggleTheme() {
            isLight = !isLight;
            document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isLight ? "fa-solid fa-sun" : "fa-solid fa-moon";
            mapLayer.setUrl(isLight ? tileLight : tileDark);
        }

        // --- INISIALISASI MARKER & GARIS BIRU ---
        let driverMarker = L.marker([0,0]).addTo(map);
        let pickupMarker = L.marker([0,0], {icon: L.divIcon({className: '', html: '📍', iconSize: [24, 24]})}).addTo(map);
        
        // Garis Biru (Vector Tracker)
        let routeLine = L.polyline([], {color: '#00f3ff', weight: 4, dashArray: '10, 10', opacity: 0.8}).addTo(map);

        // --- LOAD DATA ---
        db.ref(`missions/${missionId}`).on('value', snap => {
            const m = snap.val();
            if (!m) return;

            if (m.pickupCoords) {
                const [lat, lng] = m.pickupCoords.split(',').map(Number);
                pickupCoords = [lat, lng];
                pickupMarker.setLatLng(pickupCoords);
            }

            if (m.driverId) {
                db.ref(`drivers/${m.driverId}`).on('value', dSnap => {
                    driverData = dSnap.val();
                    if (driverData) {
                        // Update UI Header
                        document.getElementById('d-name').innerText = driverData.name;
                        document.getElementById('d-vehicle').innerText = driverData.vehicle;
                        document.getElementById('d-photo').src = driverData.photo || "https://via.placeholder.com/100";
                        
                        // Update UI Modal Detail
                        document.getElementById('m-detail-img').src = driverData.photo;
                        document.getElementById('m-detail-name').innerText = driverData.name;
                        document.getElementById('m-detail-plat').innerText = driverData.vehicle;
                        document.getElementById('m-detail-missions').innerText = driverData.totalMissions || 0;
                        document.getElementById('m-detail-rating').innerText = driverData.rating || "5.0";

                        // WA
                        document.getElementById('wa-btn').onclick = () => {
                            window.open(`https://wa.me/${driverData.phone}?text=Halo Pak, saya dari misi ${missionId}`, '_blank');
                        };

                        // Update Posisi & Garis
                        if (driverData.coords && pickupCoords) {
                            const dPos = [driverData.coords.lat, driverData.coords.lng];
                            driverMarker.setLatLng(dPos);
                            
                            // Gambar Garis Biru
                            routeLine.setLatLngs([pickupCoords, dPos]);
                            
                            // Hitung Jarak Kasar
                            const dist = map.distance(pickupCoords, dPos);
                            document.getElementById('distance-text').innerText = dist > 1000 ? (dist/1000).toFixed(1) + ' km' : Math.round(dist) + ' meter';
                        }
                    }
                });
            }
        });

        // --- CHAT & NOTIFIKASI ---
        let initialLoad = true;
        db.ref(`missions/${missionId}/chats`).on('child_added', snap => {
            const chat = snap.val();
            appendChat(chat);

            if (!initialLoad && chat.sender === 'driver') {
                showNotif(chat.type === 'image' ? "Mengirim gambar" : chat.msg);
            }
        });
        db.ref(`missions/${missionId}/chats`).once('value', () => initialLoad = false);

        function showNotif(text) {
            const pop = document.getElementById('popup-notif');
            document.getElementById('notif-text').innerText = "Driver: " + text;
            pop.style.display = 'flex';
            
            // Trigger ulang animasi
            pop.style.animation = 'none';
            pop.offsetHeight; 
            pop.style.animation = 'slideDown 0.4s forwards, fadeOut 0.3s 3.5s forwards';
        }

        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('active');
        }

        function formatTime(ms) {
            const d = new Date(ms);
            return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        function appendChat(chat) {
            const box = document.getElementById('chat-msgs');
            const isMe = chat.sender === 'client';
            let content = chat.type === 'image' ? `<img src="${chat.msg}" onclick="window.open(this.src)">` : chat.msg;
            
            box.innerHTML += `
                <div class="msg ${isMe ? 'me' : 'them'}">
                    ${content}
                    <span class="time">${formatTime(chat.timestamp)}</span>
                </div>`;
            box.scrollTop = box.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            db.ref(`missions/${missionId}/chats`).push({ sender: 'client', msg: input.value, type: 'text', timestamp: Date.now() });
            input.value = "";
        }

        // --- UPLOAD GAMBAR (BASE64) ---
        function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                db.ref(`missions/${missionId}/chats`).push({ sender: 'client', msg: base64, type: 'image', timestamp: Date.now() });
            };
            reader.readAsDataURL(file); // Konversi gambar ke text base64
        }

        // --- RATING & SELESAI ---
        function showRatingModal() {
            document.getElementById('modal-rating').style.display = 'flex';
            setRating(5); // Reset ke bintang 5
        }

        function setRating(val) {
            selectedRating = val;
            const stars = document.getElementById('star-container').children;
            for(let i=0; i<5; i++) {
                stars[i].className = i < val ? "fa-solid fa-star active" : "fa-solid fa-star";
            }
        }

        async function submitFinish() {
            if(!driverData) return;
            try {
                // 1. Update total misi & log rating ke driver
                const driverRef = db.ref(`drivers/${driverData.id || driverData.phone}`); // Sesuaikan key driver kamu
                
                // (Opsi) Simpan riwayat rating
                db.ref(`drivers/${driverData.id || driverData.phone}/ratings`).push({
                    score: selectedRating, date: Date.now(), missionId: missionId
                });

                // 2. Hapus Misi
                await db.ref(`missions/${missionId}`).remove();
                localStorage.removeItem('active_mission_id');
                
                alert("Misi berhasil diselesaikan! Terima kasih.");
                window.location.href = 'index.html';
            } catch (e) {
                console.error(e);
                alert("Misi selesai offline/lokal.");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
