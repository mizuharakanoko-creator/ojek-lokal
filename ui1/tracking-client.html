<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Driver - SOVEREIGN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-cyan: #00f3ff; --p-pink: #ff00ea; --p-bg: #050505; --p-glass: rgba(10, 10, 10, 0.95); }
        body { background: var(--p-bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; }

        /* HEADER - DATA DRIVER */
        .driver-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 2000;
            background: linear-gradient(to bottom, var(--p-bg) 60%, transparent);
            padding: 20px 15px 40px;
        }

        .driver-card-top {
            background: var(--p-glass);
            border: 1px solid #333;
            border-top: 3px solid var(--p-cyan);
            border-radius: 8px;
            padding: 12px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .photo-frame {
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--p-cyan); overflow: hidden; background: #111;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .info-main { flex: 1; }
        .info-main h2 { font-family: 'Orbitron'; font-size: 15px; margin: 0; color: #fff; text-transform: uppercase; }
        .info-main p { font-size: 11px; margin: 2px 0; color: var(--p-cyan); letter-spacing: 1px; }

        .price-box { text-align: right; }
        .price-box .amt { color: var(--p-pink); font-family: 'Orbitron'; font-size: 14px; display: block; }
        .price-box label { font-size: 9px; color: #666; }

        /* MAP */
        #map { width: 100%; height: 100vh; z-index: 1; background: #000; }

        /* ACTION BUTTONS & BADGE */
        .bottom-actions {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            z-index: 2000; display: flex; gap: 10px;
        }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 5px;
            font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-transform: uppercase; position: relative;
        }
        .btn-wa { background: #25D366; color: white; border-bottom: 3px solid #128C7E; }
        .btn-chat { background: var(--p-cyan); color: #000; border-bottom: 3px solid #00b8c4; }

        /* Balon Notifikasi pada Tombol */
        .chat-badge {
            position: absolute; top: -5px; right: -5px;
            background: var(--p-pink); color: white;
            font-size: 10px; padding: 2px 6px; border-radius: 10px;
            box-shadow: 0 0 10px var(--p-pink); display: none;
            animation: bounce 0.5s infinite alternate;
        }

        /* CHAT WINDOW */
        #chat-window {
            position: fixed; top: 100%; left: 0; width: 100%; height: 85vh;
            background: var(--p-bg); z-index: 3000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; border-top: 2px solid var(--p-cyan);
        }
        #chat-window.active { top: 15vh; }
        
        .chat-header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 20px 20px; }
        
        /* Notifikasi Popup Melayang */
        #chat-toast {
            position: fixed; top: 110px; left: 15px; right: 15px;
            background: rgba(0, 243, 255, 0.95); color: #000;
            padding: 10px 15px; border-radius: 8px; font-weight: bold;
            z-index: 2500; display: flex; align-items: center; gap: 10px;
            transform: translateY(-150%); transition: 0.5s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #chat-toast.show { transform: translateY(0); }

        .quick-replies { display: flex; gap: 8px; padding: 10px 15px; background: #0a0a0a; overflow-x: auto; white-space: nowrap; border-top: 1px solid #222; }
        .qr-btn { background: #222; color: var(--p-cyan); border: 1px solid #333; padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: 600; cursor: pointer; }

        .chat-input-area { padding: 15px; background: #111; display: flex; gap: 10px; padding-bottom: 35px; }
        .chat-input-area input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; font-family: 'Rajdhani'; outline: none; }
        .btn-send { background: var(--p-cyan); border: none; padding: 0 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--p-cyan); color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }
    </style>
</head>
<body>

    <div id="chat-toast" onclick="toggleChat()">
        <span style="font-size: 20px;">💬</span>
        <div style="flex:1">
            <div style="font-size: 10px; opacity: 0.7;">PESAN BARU DARI DRIVER</div>
            <div id="toast-msg" style="font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">...</div>
        </div>
    </div>

    <div class="driver-header">
        <div class="driver-card-top">
            <div class="photo-frame"><img id="d-photo" src="https://via.placeholder.com/50"></div>
            <div class="info-main">
                <h2 id="d-name">Sovereign Driver</h2>
                <p id="d-vehicle">Memuat kendaraan...</p>
                <div id="eta-badge" style="font-size: 10px; color: #888;">Menghitung lokasi...</div>
            </div>
            <div class="price-box">
                <label>TARIF DEAL</label>
                <span class="amt" id="m-price">Rp 0</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-actions">
        <button onclick="toggleChat()" class="btn btn-chat">
            💬 CHAT SYSTEM
            <div id="notif-badge" class="chat-badge">NEW</div>
        </button>
        <button id="wa-link" class="btn btn-wa">📲 WHATSAPP</button>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <span style="font-family:Orbitron; font-size:11px; color: var(--p-cyan);">ENCRYPTED CHANNEL</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; font-size:28px;">×</button>
        </div>
        <div id="chat-msgs" class="chat-msgs"></div>
        <div class="quick-replies">
            <button class="qr-btn" onclick="quickSend('Oke, ditunggu ya.')">Oke, ditunggu ya</button>
            <button class="qr-btn" onclick="quickSend('Sesuai aplikasi ya pak.')">Sesuai aplikasi</button>
            <button class="qr-btn" onclick="quickSend('Saya sudah di titik jemput.')">Sudah di titik</button>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Tulis balasan..." onkeydown="if(event.key === 'Enter') sendChat()">
            <button onclick="sendChat()" class="btn-send">KIRIM</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const missionId = localStorage.getItem('active_mission_id');

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-6.9585, 108.5096], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let driverMarker = L.marker([0,0], {icon: L.divIcon({className: 'd-icon', html: "<div style='background:var(--p-cyan); width:12px; height:12px; border:2px solid #fff; border-radius:50%; box-shadow:0 0 10px var(--p-cyan);'></div>"})}).addTo(map);
        let pickupMarker = L.marker([0,0], {icon: L.divIcon({html: "📍", iconSize:[30,30], iconAnchor:[15,30]})}).addTo(map);
        let routeLine = L.polyline([], {color: '#00f3ff', weight: 2, dashArray: '5, 8', opacity: 0.6}).addTo(map);

        let isChatOpen = false;

        if (missionId) {
            db.ref(`missions/${missionId}`).on('value', snap => {
                const m = snap.val();
                if (!m) return;
                document.getElementById('m-price').innerText = "Rp " + (m.price || 0).toLocaleString('id-ID');
                if (m.pickupCoords) {
                    const [pLat, pLng] = m.pickupCoords.split(',').map(Number);
                    pickupMarker.setLatLng([pLat, pLng]);
                    if (m.driverId) {
                        db.ref(`drivers/${m.driverId}/coords`).on('value', cs => {
                            if(cs.val()){
                                const dPos = [cs.val().lat, cs.val().lng];
                                driverMarker.setLatLng(dPos);
                                routeLine.setLatLngs([dPos, [pLat, pLng]]);
                                map.flyTo(dPos, 16);
                            }
                        });
                    }
                }
            });

            // LOGIKA NOTIFIKASI CHAT
            db.ref(`missions/${missionId}/chats`).on('child_added', snap => {
                const chat = snap.val();
                const box = document.getElementById('chat-msgs');
                const isMe = chat.sender === 'client';
                
                box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${chat.msg}</div>`;
                box.scrollTop = box.scrollHeight;

                // Tampilkan Balon & Toast jika pengirimnya Driver dan chat sedang tertutup
                if (!isMe && !isChatOpen) {
                    showChatNotification(chat.msg);
                }
            });
        }

        function showChatNotification(msg) {
            // Tampilkan badge di tombol
            document.getElementById('notif-badge').style.display = 'block';
            
            // Tampilkan toast melayang
            const toast = document.getElementById('chat-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');

            // Sembunyikan toast otomatis setelah 4 detik
            setTimeout(() => { toast.classList.remove('show'); }, 4000);

            // Bunyi notifikasi sederhana
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3').play(); } catch(e){}
        }

        function toggleChat() {
            const win = document.getElementById('chat-window');
            isChatOpen = !isChatOpen;
            win.classList.toggle('active');
            
            if (isChatOpen) {
                // Sembunyikan notifikasi saat chat dibuka
                document.getElementById('notif-badge').style.display = 'none';
                document.getElementById('chat-toast').classList.remove('show');
            }
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            db.ref(`missions/${missionId}/chats`).push({
                sender: 'client', msg: input.value, timestamp: Date.now()
            });
            input.value = "";
        }

        function quickSend(txt) {
            db.ref(`missions/${missionId}/chats`).push({
                sender: 'client', msg: txt, timestamp: Date.now()
            });
        }
    </script>
</body>
</html>
