<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Driver - SOVEREIGN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --p-cyan: #00f3ff; 
            --p-pink: #ff00ea; 
            --p-bg: #050505; 
            --p-glass: rgba(10, 10, 10, 0.85);
            --p-border: rgba(0, 243, 255, 0.3);
        }

        body { 
            background: var(--p-bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- HEADER & DRIVER CARD --- */
        .driver-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 2000;
            padding: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .driver-card-top {
            background: var(--p-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--p-border);
            border-left: 4px solid var(--p-cyan);
            border-radius: 12px;
            padding: 12px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .driver-card-top:active { transform: scale(0.98); }

        .photo-frame {
            width: 55px; height: 55px; border-radius: 12px; 
            border: 2px solid var(--p-cyan); overflow: hidden; 
            background: #111; cursor: pointer;
            box-shadow: 0 0 10px var(--p-cyan);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .info-main { flex: 1; }
        .info-main h2 { font-family: 'Orbitron'; font-size: 15px; margin: 0; color: #fff; letter-spacing: 1px; }
        .info-main p { font-size: 12px; margin: 2px 0; color: var(--p-cyan); opacity: 0.8; }

        .badge-status {
            background: rgba(0, 243, 255, 0.1);
            color: var(--p-cyan);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid var(--p-cyan);
        }

        /* --- MAP --- */
        #map { width: 100%; height: 100vh; z-index: 1; filter: grayscale(0.5) contrast(1.2); }

        /* --- FLOATING NOTIFICATION --- */
        #popup-notif {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            z-index: 5000; width: 80%; background: var(--p-cyan);
            color: #000; padding: 10px 15px; border-radius: 8px;
            font-weight: bold; font-size: 13px; text-align: center;
            display: none; animation: slideDown 0.3s forwards, fadeOut 0.3s 2.7s forwards;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        @keyframes slideDown { from { top: 80px; opacity: 0; } to { top: 100px; opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

        /* --- CHAT SYSTEM (REIMAGINED) --- */
        #chat-window {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh;
            background: var(--p-bg); z-index: 4000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-radius: 20px 20px 0 0;
            border-top: 2px solid var(--p-cyan);
        }
        #chat-window.active { bottom: 0; }

        .chat-header { 
            padding: 15px; background: #111; 
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 20px 20px 0 0;
        }

        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { 
            max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 14px; 
            position: relative; animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .msg.me { align-self: flex-end; background: var(--p-cyan); color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #1a1a1a; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .msg img { width: 100%; border-radius: 8px; margin-top: 5px; }

        /* Quick Chat Pills */
        .quick-chat {
            display: flex; gap: 8px; padding: 10px; overflow-x: auto;
            background: #0a0a0a; border-top: 1px solid #222;
        }
        .pill {
            white-space: nowrap; padding: 6px 12px; background: #222;
            border-radius: 20px; font-size: 12px; color: var(--p-cyan);
            border: 1px solid var(--p-cyan); cursor: pointer;
        }

        /* --- DRIVER MODAL --- */
        #driver-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #111; border: 1px solid var(--p-cyan); border-radius: 15px;
            width: 100%; max-width: 400px; padding: 20px; text-align: center;
        }

        /* --- ACTION BAR --- */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 15px 35px; background: linear-gradient(to top, #000, transparent);
            z-index: 2000; display: flex; gap: 10px;
        }
        .btn-round {
            flex: 1; height: 50px; border: none; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; text-transform: uppercase;
        }
        .btn-finish { background: var(--p-pink); color: white; box-shadow: 0 0 15px rgba(255,0,234,0.3); }
        .btn-wa { background: #25D366; color: white; }
        .btn-chat-trigger { background: var(--p-cyan); color: #000; position: relative; }
        .notif-dot { 
            position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; 
            background: red; border-radius: 50%; display: none; border: 2px solid #000;
        }
    </style>
</head>
<body>

    <div id="popup-notif">Pesan baru masuk!</div>

    <div class="driver-header">
        <div class="driver-card-top" onclick="showDriverDetail()">
            <div class="photo-frame">
                <img id="d-photo" src="https://via.placeholder.com/100">
            </div>
            <div class="info-main">
                <h2 id="d-name">Loading...</h2>
                <p id="d-vehicle">Sovereign Unit</p>
                <span class="badge-status" id="eta-badge">MENGHITUNG JARAK</span>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 9px; color: #888;">HARGA</div>
                <div id="m-price" style="font-family: Orbitron; color: var(--p-pink); font-size: 14px;">Rp 0</div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-nav">
        <button onclick="toggleChat()" class="btn-round btn-chat-trigger">
            <i class="fa-solid fa-comment-dots"></i> CHAT
            <div id="notif-dot" class="notif-dot"></div>
        </button>
        <button id="wa-btn" class="btn-round btn-wa">
            <i class="fa-brands fa-whatsapp"></i> WA
        </button>
        <button onclick="finishMission()" class="btn-round btn-finish">
            <i class="fa-solid fa-check-double"></i> SELESAI
        </button>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 30px; height: 30px; border-radius: 50%; overflow: hidden; border: 1px solid var(--p-cyan);">
                    <img id="chat-driver-img" src="" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <span style="font-family: Orbitron; font-size: 12px;" id="chat-driver-name">DRIVER</span>
            </div>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; font-size:28px;">&times;</button>
        </div>

        <div id="chat-msgs" class="chat-msgs"></div>

        <div class="quick-chat">
            <div class="pill" onclick="quickSend('Saya sudah di titik jemput')">📍 Sudah di titik</div>
            <div class="pill" onclick="quickSend('Ditunggu ya pak')">⏳ Ditunggu</div>
            <div class="pill" onclick="quickSend('Otw keluar rumah')">🚶 Otw keluar</div>
            <div class="pill" onclick="sendImage()">📷 Kirim Foto</div>
        </div>

        <div style="padding: 15px; background: #111; display: flex; gap: 10px; align-items: center;">
            <input type="text" id="chat-input" placeholder="Ketik pesan..." 
                   style="flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none;">
            <button onclick="sendChat()" style="background: var(--p-cyan); border: none; width: 45px; height: 45px; border-radius: 10px; color: #000;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="driver-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-img" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--p-cyan); margin-bottom: 15px;">
            <h3 id="modal-name" style="font-family: Orbitron; margin: 5px 0;">-</h3>
            <p id="modal-desc" style="color: #888; font-size: 14px; margin-bottom: 20px;">Unit: <span id="modal-unit" style="color: var(--p-cyan);"></span></p>
            <div style="display: flex; justify-content: space-around; border-top: 1px solid #333; padding-top: 15px;">
                <div><div style="font-size: 10px; color: #666;">RATING</div><div style="color: gold;">⭐ 4.9</div></div>
                <div><div style="font-size: 10px; color: #666;">TOTAL MISI</div><div id="modal-missions">0</div></div>
            </div>
            <button onclick="document.getElementById('driver-modal').style.display='none'" 
                    style="margin-top: 20px; background: none; border: 1px solid #444; color: white; padding: 8px 20px; border-radius: 5px;">Tutup</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const missionId = localStorage.getItem('active_mission_id') || "MISI_DEFAULT"; // Pastikan ID ada
        let driverData = null;
        let isChatOpen = false;

        // 1. MAP SETUP
        const map = L.map('map', { zoomControl: false }).setView([-6.9585, 108.5096], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let driverMarker = L.marker([0,0]).addTo(map);

        // 2. DATA MONITORING
        if (missionId) {
            db.ref(`missions/${missionId}`).on('value', snap => {
                const m = snap.val();
                if (!m) {
                    alert("Misi telah berakhir atau tidak ditemukan.");
                    window.location.href = 'index.html'; 
                    return;
                }

                document.getElementById('m-price').innerText = "Rp " + m.price.toLocaleString();
                
                if (m.driverId) {
                    db.ref(`drivers/${m.driverId}`).once('value', dSnap => {
                        driverData = dSnap.val();
                        if (driverData) {
                            document.getElementById('d-name').innerText = driverData.name;
                            document.getElementById('d-photo').src = driverData.photo || "https://via.placeholder.com/100";
                            document.getElementById('chat-driver-img').src = driverData.photo;
                            document.getElementById('chat-driver-name').innerText = driverData.name;
                            
                            document.getElementById('wa-btn').onclick = () => {
                                window.open(`https://wa.me/${driverData.phone}?text=Halo Pak ${driverData.name}, saya pelanggan misi ${missionId}`, '_blank');
                            };
                        }
                    });

                    // Real-time Coords
                    db.ref(`drivers/${m.driverId}/coords`).on('value', cSnap => {
                        const c = cSnap.val();
                        if (c) {
                            const newPos = [c.lat, c.lng];
                            driverMarker.setLatLng(newPos);
                            map.flyTo(newPos, 16);
                            document.getElementById('eta-badge').innerText = "DRIVER SEDANG MENUJU LOKASI";
                        }
                    });
                }
            });

            // Chat Logic with Notifications
            let initialLoad = true;
            db.ref(`missions/${missionId}/chats`).on('child_added', snap => {
                const chat = snap.val();
                appendChat(chat);

                if (!initialLoad && chat.sender === 'driver') {
                    showPopup(chat.msg);
                    if(!isChatOpen) document.getElementById('notif-dot').style.display = 'block';
                }
            });
            
            // Set initialLoad false after data loaded
            db.ref(`missions/${missionId}/chats`).once('value', () => { initialLoad = false; });
        }

        // --- FUNCTIONS ---

        function toggleChat() {
            const win = document.getElementById('chat-window');
            isChatOpen = !isChatOpen;
            win.classList.toggle('active');
            if(isChatOpen) document.getElementById('notif-dot').style.display = 'none';
        }

        function appendChat(chat) {
            const box = document.getElementById('chat-msgs');
            const isMe = chat.sender === 'client';
            let content = chat.msg;
            
            if(chat.type === 'image') {
                content = `<img src="${chat.msg}" onclick="window.open(this.src)">`;
            }

            box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${content}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            
            db.ref(`missions/${missionId}/chats`).push({
                sender: 'client',
                msg: input.value,
                type: 'text',
                timestamp: Date.now()
            });
            input.value = "";
        }

        function quickSend(text) {
            db.ref(`missions/${missionId}/chats`).push({
                sender: 'client',
                msg: text,
                type: 'text',
                timestamp: Date.now()
            });
        }

        function sendImage() {
            const url = prompt("Masukkan URL Gambar (Gunakan link imgur/hosting lain):");
            if(url) {
                db.ref(`missions/${missionId}/chats`).push({
                    sender: 'client',
                    msg: url,
                    type: 'image',
                    timestamp: Date.now()
                });
            }
        }

        function showPopup(text) {
            const pop = document.getElementById('popup-notif');
            pop.innerText = "Driver: " + text;
            pop.style.display = 'block';
            setTimeout(() => { pop.style.display = 'none'; }, 3000);
        }

        function showDriverDetail() {
            if(!driverData) return;
            document.getElementById('modal-img').src = driverData.photo;
            document.getElementById('modal-name').innerText = driverData.name;
            document.getElementById('modal-unit').innerText = driverData.vehicle || "Standard Unit";
            document.getElementById('modal-missions').innerText = driverData.totalMissions || "120+";
            document.getElementById('driver-modal').style.display = 'flex';
        }

        async function finishMission() {
            if(confirm("Apakah misi sudah selesai? Data misi akan dihapus dari sistem.")) {
                try {
                    await db.ref(`missions/${missionId}`).remove();
                    localStorage.removeItem('active_mission_id');
                    alert("Misi diselesaikan. Terima kasih!");
                    window.location.href = 'index.html'; // Sesuaikan file utama kamu
                } catch (e) {
                    alert("Gagal menghapus misi: " + e.message);
                }
            }
        }
    </script>
</body>
</html>
