<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Driver - SOVEREIGN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-cyan: #00f3ff; --p-pink: #ff00ea; --p-bg: #050505; --p-glass: rgba(10, 10, 10, 0.95); }
        body { background: var(--p-bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; }

        /* HEADER - DATA DRIVER (PINDAH KE ATAS) */
        .driver-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 2000;
            background: linear-gradient(to bottom, var(--p-bg), transparent);
            padding: 20px 15px 40px;
        }

        .driver-card-top {
            background: var(--p-glass);
            border: 1px solid #333;
            border-top: 3px solid var(--p-cyan);
            border-radius: 8px;
            padding: 12px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .photo-frame {
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--p-cyan); overflow: hidden; background: #111;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .info-main { flex: 1; }
        .info-main h2 { font-family: 'Orbitron'; font-size: 16px; margin: 0; color: #fff; }
        .info-main p { font-size: 11px; margin: 2px 0; color: var(--p-cyan); letter-spacing: 1px; }

        .price-box { text-align: right; }
        .price-box .amt { color: var(--p-pink); font-family: 'Orbitron'; font-size: 14px; display: block; }
        .price-box label { font-size: 9px; color: #666; }

        /* MAP FULLSCREEN */
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* ACTION BUTTONS (FLOATING BOTTOM) */
        .bottom-actions {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            z-index: 2000; display: flex; gap: 10px;
        }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 5px;
            font-family: 'Orbitron'; font-size: 12px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-wa { background: #25D366; color: white; }
        .btn-chat { background: var(--p-cyan); color: #000; }

        /* CHAT WINDOW (MINIMALIS) */
        #chat-window {
            position: fixed; top: 100%; left: 0; width: 100%; height: 80vh;
            background: var(--p-bg); z-index: 3000; transition: 0.4s;
            display: flex; flex-direction: column; border-top: 2px solid var(--p-cyan);
        }
        #chat-window.active { top: 20vh; }
        .chat-header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 5px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--p-cyan); color: #000; }
        .msg.them { align-self: flex-start; background: #222; color: #fff; }
    </style>
</head>
<body>

    <div class="driver-header">
        <div class="driver-card-top">
            <div class="photo-frame">
                <img id="d-photo" src="https://via.placeholder.com/50">
            </div>
            <div class="info-main">
                <h2 id="d-name">Mencari Driver...</h2>
                <p id="d-vehicle">NMAX - B 1234 ABC</p>
                <div id="eta-badge" style="font-size: 10px; color: #888;">Menghitung lokasi...</div>
            </div>
            <div class="price-box">
                <label>TARIF DEAL</label>
                <span class="amt" id="m-price">Rp 0</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-actions">
        <button onclick="toggleChat()" class="btn btn-chat">💬 CHAT SYSTEM</button>
        <button id="wa-link" class="btn btn-wa">📲 WHATSAPP</button>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <span style="font-family:Orbitron; font-size:12px;">ENCRYPTED CHANNEL</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; font-size:24px;">×</button>
        </div>
        <div id="chat-msgs" class="chat-msgs"></div>
        <div style="padding:15px; background:#111; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Tulis pesan..." style="flex:1; background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;">
            <button onclick="sendChat()" style="background:var(--p-cyan); border:none; padding:10px 15px; border-radius:5px; font-weight:bold;">KIRIM</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const missionId = localStorage.getItem('active_mission_id');
        
        // 1. INIT MAP DENGAN FIX
        const map = L.map('map', { zoomControl: false }).setView([-6.9585, 108.5096], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let driverMarker = L.marker([0,0]).addTo(map);
        let pickupMarker = L.marker([0,0], {icon: L.divIcon({className: 'pickup-point', html: '📍'})}).addTo(map);

        // 2. AMBIL DATA REAL-TIME
        if (missionId) {
            db.ref(`missions/${missionId}`).on('value', snap => {
                const m = snap.val();
                if (!m) return;

                document.getElementById('m-price').innerText = "Rp " + m.price.toLocaleString();
                
                // Set Titik Jemput di Peta
                if (m.pickupCoords) {
                    const [pLat, pLng] = m.pickupCoords.split(',').map(Number);
                    pickupMarker.setLatLng([pLat, pLng]);
                }

                // Ambil Info Driver
                if (m.driverId) {
                    db.ref(`drivers/${m.driverId}`).once('value', dSnap => {
                        const d = dSnap.val();
                        if (d) {
                            document.getElementById('d-name').innerText = d.name || "Sovereign Driver";
                            document.getElementById('d-vehicle').innerText = d.vehicle || "NMAX - B 1234 ABC";
                            document.getElementById('d-photo').src = d.photo || "https://via.placeholder.com/50";
                            
                            document.getElementById('wa-link').onclick = () => {
                                window.open(`https://wa.me/${d.phone}?text=Halo Pak ${d.name}, saya client misi ${missionId}`, '_blank');
                            };
                        }
                    });

                    // Update Posisi Motor Driver
                    db.ref(`drivers/${m.driverId}/coords`).on('value', cSnap => {
                        const coords = cSnap.val();
                        if (coords) {
                            const newPos = [coords.lat, coords.lng];
                            driverMarker.setLatLng(newPos);
                            map.flyTo(newPos, 16); // Fokus ke driver
                            document.getElementById('eta-badge').innerText = "Driver sedang bergerak...";
                        }
                    });
                }
            });

            // 3. CHAT LOGIC
            db.ref(`missions/${missionId}/chats`).on('child_added', snap => {
                const chat = snap.val();
                const box = document.getElementById('chat-msgs');
                const isMe = chat.sender === 'client';
                box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${chat.msg}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- UI FUNCTIONS ---
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('active');
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            db.ref(`missions/${missionId}/chats`).push({
                sender: 'client',
                msg: input.value,
                timestamp: Date.now()
            });
            input.value = "";
        }
    </script>
</body>
</html>
