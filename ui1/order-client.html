    // Fungsi ini yang bertugas mengisi dropdown Desa berdasarkan Kecamatan yang dipilih
function loadCities(kecamatan) {
    const citySelect = document.getElementById('dest-city'); // Dropdown Desa
    const wrapper = document.getElementById('city-wrapper'); // Kontainer Dropdown Desa
    
    if (!citySelect || !wrapper) return;

}
    

    // 3. LOGIKA GPS & REVERSE GEOCODE (Nama Tempat Otomatis)
    function handleGPS() {
        const btn = document.getElementById('btn-location');
        const txt = document.getElementById('gps-text');
        const icon = document.getElementById('gps-icon');

        btn.classList.add('scanning');
        txt.innerText = "TRIANGULATING...";
        icon.innerText = "⌛";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                document.getElementById('cust-pickup-coords').value = `${lat},${lon}`;

                // Mengambil nama tempat secara gratis (OpenStreetMap)
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                    .then(res => res.json())
                    .then(data => {
                        const road = data.address.road || data.address.village || "COORDINATES SECURED";
                        btn.classList.remove('scanning');
                        btn.classList.add('location-locked');
                        txt.innerText = road.toUpperCase();
                        icon.innerText = "📍";
                        checkRequirementsForPrice();
                    });
            }, (error) => {
                btn.classList.remove('scanning');
                txt.innerText = "SIGNAL LOST - RETRY";
                icon.innerText = "❌";
                alert("GPS Error: " + error.message);
            });
        }
    }



    const searchInput = document.getElementById('destinationSearch');
const suggestionBox = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', function() {

});

    // 4. HITUNG JARAK & TARIF DINAMIS (Haversine & Terrain Multiplier)
    function calculateRealDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius Bumi (KM)
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function checkRequirementsForPrice() {
    const kecName = document.getElementById('dest-kecamatan').value;
    const desaIndex = document.getElementById('dest-city').value; // Ini sekarang berisi angka index
    const coords = document.getElementById('cust-pickup-coords').value;

    if (kecName !== "" && desaIndex !== "" && coords !== "") {
        const [lat1, lon1] = coords.split(',').map(Number);
        
        // Ambil data spesifik desa berdasarkan index yang dipilih
        const selectedDesa = dataWilayah[kecName].desa[parseInt(desaIndex)];
        
        // 1. Hitung Jarak Real ke Desa Tersebut
        let distanceKM = calculateRealDistance(lat1, lon1, selectedDesa.lat, selectedDesa.lng);
        
        // 2. Ambil Faktor Kesulitan (Ketinggian/Difficulty) Desa Tersebut
        let difficulty = selectedDesa.diff || 1.0;

        // 3. Tampilkan & Update Harga
        document.getElementById('price-section').classList.add('price-section-show');
        updateBountyDisplay(distanceKM, difficulty);
    }
}



    function updateBountyDisplay(km, diff) {
        // Rumus: (Jarak * Harga/KM) * Faktor Medan
        const h = (km * 2000) * diff;
        const r = (km * 3500) * diff;
        const e = (km * 5000) * diff;

        // Minimal tarif 10.000
        document.getElementById('price-hemat').innerText = Math.max(10000, h).toLocaleString('id-ID');
        document.getElementById('price-reguler').innerText = Math.max(10000, r).toLocaleString('id-ID');
        document.getElementById('price-express').innerText = Math.max(10000, e).toLocaleString('id-ID');
        
        // Info Jarak Terdeteksi
        console.log(`Distance: ${km.toFixed(2)} KM | Multiplier: x${diff}`);
    }

    function selectPrice(element, type) {
        document.querySelectorAll('.price-card').forEach(card => card.style.borderColor = '#333');
        element.style.borderColor = 'var(--p-cyan)';
        const priceValue = element.querySelector('div').innerText.replace(/\D/g,'');
        document.getElementById('final-price').value = priceValue;
    }

    // 5. KIRIM MISI KE FIREBASE
    function sendMission() {
        const pickupCoords = document.getElementById('cust-pickup-coords').value;
        const price = document.getElementById('final-price').value;
        const cityIdx = document.getElementById('dest-city').value;
        const wilayahKey = document.getElementById('dest-kecamatan').value;

        if(!pickupCoords || price == "0" || cityIdx == "") {
            return alert("SISTEM: Lokasi atau Paket Bounty belum dipilih!");
        }

        const destName = dataWilayah[wilayahKey][cityIdx].name;
        const isUrgent = document.getElementById('is-urgent').checked;
        const missionRef = db.ref('missions').push();
        const mID = missionRef.key;

        missionRef.set({
            id: mID,
            clientId: currentUID,
            clientName: userProfile.name,
            stats: {
                totalOrders: (userProfile.totalOrders || 0) + 1,
                reputation: userProfile.reputation
            },
            price: parseInt(price),
            pickup: pickupCoords, 
            destination: destName,
            note: document.getElementById('cust-note').value,
            rank: isUrgent ? "CHAOS" : "MORTAL",
            status: "available",
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('mission-tracker').style.display = 'block';
            trackMissionStatus(mID);
            
            db.ref('users_customer/' + currentUID).update({
                totalOrders: (userProfile.totalOrders || 0) + 1
            });
            alert("QUEST PUBLISHED! Sinyal telah disebarkan.");
        });
    }

    function trackMissionStatus(idMisi) {
        const display = document.getElementById('status-display');
        db.ref('missions/' + idMisi).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === "accepted") {
                display.innerText = "DRIVER EN ROUTE";
                display.className = "status-box status-accepted";
                document.getElementById('driver-info').style.display = 'block';
                document.getElementById('active-driver-name').innerText = data.driverName || "S-Class Driver";
            }
        });
    }

    function logout() {
        localStorage.removeItem('current_customer_id');
        window.location.href = 'login.html';
    }
                    </script>
