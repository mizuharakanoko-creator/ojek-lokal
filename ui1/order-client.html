<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        input:focus, textarea:focus { border-color: var(--p-cyan); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="order-container">
    <div class="user-ribbon">
        <div class="user-info">
            <span id="display-name">INITIALIZING...</span>
            <span id="display-reputation">RANK: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="terminal-header">
        <h2>Publish New Quest</h2>
    </div>

    <div class="form-group">
        <label>Client Identity (Verified)</label>
        <input type="text" id="cust-name" readonly style="background-color: #111; color: var(--p-cyan);">
    </div>

    <div class="form-group">
        <label>Quest Rank / Difficulty</label>
        <select id="cust-rank">
            <option value="MORTAL">MORTAL (Normal Order)</option>
            <option value="CHAOS">CHAOS (Urgent / High Risk)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Bounty Reward (IDR)</label>
        <input type="number" id="cust-price" value="15000">
    </div>

    <div class="form-group">
        <label>Pickup Location</label>
        <input type="text" id="cust-pickup" placeholder="Lokasi jemput..." value="Pusat Kota">
    </div>

    <div class="form-group">
        <label>Mission Briefing (Notes)</label>
        <textarea id="cust-note" rows="3">Tolong antar tepat waktu.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()">Broadcast Quest</button>
</div>

<script>
    // === 1. CONFIG FIREBASE (Sesuai Database Anda) ===
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // === 2. AUTH CHECK & PROFILE LOAD ===
    const currentUID = localStorage.getItem('current_customer_id');

    if (!currentUID) {
        alert("ACCESS DENIED: Silahkan login terlebih dahulu.");
        window.location.href = 'login.html';
    }

    let userProfile = {}; 

    // Tarik Data Profil Pemesan secara Real-time
    db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
        userProfile = snapshot.val();
        if (userProfile) {
            document.getElementById('display-name').innerText = userProfile.name;
            document.getElementById('display-reputation').innerText = "RANK: " + userProfile.reputation;
            document.getElementById('cust-name').value = userProfile.name;
        } else {
            alert("Sistem: ID tidak ditemukan di Database.");
            logout();
        }
    });

    // === 3. FUNGSI KIRIM MISI KE DRIVER ===
    function sendMission() {
        const rank = document.getElementById('cust-rank').value;
        const price = document.getElementById('cust-price').value;
        const pickup = document.getElementById('cust-pickup').value;
        const note = document.getElementById('cust-note').value;

        if(!price || !pickup) {
            alert("SISTEM: Harap lengkapi detail misi!");
            return;
        }

        // Simpan misi baru ke folder 'missions'
        const missionRef = db.ref('missions').push();
        missionRef.set({
            id: missionRef.key,
            clientId: currentUID,
            clientName: userProfile.name,
            
            // DATA REPUTASI (Dilihat oleh Driver)
            stats: {
                joinDate: userProfile.joinDate,
                totalOrders: userProfile.totalOrders,
                cancellations: userProfile.cancellations,
                likes: userProfile.likes,
                dislikes: userProfile.dislikes,
                reputation: userProfile.reputation
            },

            // DETAIL PESANAN
            price: parseInt(price),
            pickup: pickup,
            note: note,
            rank: rank,
            status: "available",
            timestamp: Date.now()
        }).then(() => {
            // Update total order di database profil pemesan
            db.ref('users_customer/' + currentUID).update({
                totalOrders: (userProfile.totalOrders || 0) + 1
            });
            
            alert("QUEST PUBLISHED! Sinyal telah dikirim ke hub driver.");
        }).catch((err) => {
            alert("ERROR: " + err.message);
        });
    }

    function logout() {
        localStorage.removeItem('current_customer_id');
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
