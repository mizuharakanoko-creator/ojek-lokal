<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        input:focus, textarea:focus { border-color: var(--p-cyan); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    

        /* Custom Cyber Checkbox Container */
.cyber-checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(188, 0, 255, 0.05);
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cyber-checkbox-wrapper:hover {
    border-color: var(--p-purple);
    background: rgba(188, 0, 255, 0.1);
}

/* Sembunyikan Checkbox Asli */
.cyber-checkbox-wrapper input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--p-purple);
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efek saat Centang */
.cyber-checkbox-wrapper input[type="checkbox"]:checked {
    background: var(--p-purple);
    box-shadow: 0 0 10px var(--p-purple);
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked::after {
    content: "✔";
    color: #fff;
    font-size: 14px;
    font-weight: bold;
}

.cyber-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked + .cyber-label {
    color: var(--p-cyan);
    text-shadow: 0 0 5px var(--p-cyan);
               }
    


        /* Container Tracker */
.status-tracker {
    margin-top: 30px;
    padding: 15px;
    border: 1px dashed #444;
    background: rgba(0, 255, 242, 0.02);
    display: none; /* Sembunyi sebelum ada misi */
}

.tracker-header {
    font-size: 10px;
    color: var(--p-cyan);
    margin-bottom: 10px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.status-box {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid #333;
    letter-spacing: 2px;
    transition: 0.5s;
}

/* Animasi Pulse untuk mencari driver */
.status-searching {
    color: #888;
    border-color: #444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Status saat Driver Mengambil Misi */
.status-accepted {
    background: var(--p-purple);
    color: #fff;
    border-color: var(--p-cyan);
    box-shadow: 0 0 15px var(--p-purple);
    }




        .gps-btn-large {
    width: 100%;
    padding: 20px;
    background: #000;
    border: 1px solid var(--p-cyan);
    color: var(--p-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.5s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Animasi saat scanning */
.scanning {
    background: rgba(0, 255, 242, 0.1);
    border-color: #fff;
    color: #fff;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; box-shadow: 0 0 20px var(--p-cyan); }
}

/* Tampilan saat lokasi terkunci */
.location-locked {
    background: var(--p-cyan);
    color: #000;
    border-color: #fff;
    font-weight: bold;
}


        #price-section {
    display: none; /* Sembunyi di awal */
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.price-section-show {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
}

.price-card {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #000;
    transition: 0.3s;
}
        
    
    
    </style>
</head>
<body>



<div class="order-container">
    <div class="user-ribbon">
        <div class="user-info">
            <span id="display-name">LAGI LOADING...</span>
            <span id="display-reputation">LEVEL: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">KELUAR</button>
    </div>

    <div class="terminal-header">
        <h2>PESAN OJEK BARU</h2>
    </div>

    <div class="form-group">
        <label>Nama Kamu (Sudah Pas)</label>
        <input type="text" id="cust-name" readonly style="background-color: #111; color: var(--p-cyan);">
    </div>

    <div class="form-group">
        <label>Pilih Kecepatan</label>
        <div class="cyber-checkbox-wrapper" onclick="document.getElementById('is-urgent').click()" style="border: 1px solid #ff0055; padding: 10px; border-radius: 5px;">
            <input type="checkbox" id="is-urgent" onclick="event.stopPropagation()">
            <span class="cyber-label" style="color: #ff0055; font-weight: bold;">NYALAKAN MODE DARURAT (CEPAT BANGET)</span>
        </div>
    </div>

    <div class="form-group">
        <label>Titik Jemput Kamu</label>
        <div id="pickup-container">
            <button type="button" id="btn-location" onclick="handleGPS()" class="gps-btn-large">
                <span id="gps-icon">📍</span> 
                <span id="gps-text">KLIK: CARI LOKASI SAYA</span>
            </button>
            <input type="hidden" id="cust-pickup-coords">
        </div>
    </div>

    <div class="form-group" style="position: relative; z-index: 1000;">
        <label>Cari Desa/Dusun Tujuan</label>
        <input type="text" id="destinationSearch" placeholder="KETIK NAMA DESA DI SINI..." 
               style="width: 100%; padding: 15px; background: #000; color: #00ffcc; 
                      border: 2px solid #00ffcc; border-radius: 5px; font-family: 'Courier New', monospace;
                      text-transform: uppercase; box-shadow: 0 0 10px #00ffcc; outline: none;">
        
        <div id="searchSuggestions" style="display: none; position: absolute; top: 75px; left: 0; width: 100%; 
             background: #1a1a1a; border: 1px solid #00ffcc; z-index: 9999; max-height: 200px; 
             overflow-y: auto; border-radius: 0 0 5px 5px; box-shadow: 0 5px 15px rgba(0,255,204,0.5);">
        </div>
    </div>

    <div class="form-group">
        <label>Kecamatan Tujuan</label>
        <select id="dest-kecamatan" onchange="loadCities(this.value)" style="width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <option value="">-- Pilih Kecamatan --</option>
        </select>
    </div>

    <div class="form-group" id="city-wrapper" style="display:none;">
        <label>Desa/Area Tujuan</label>
        <select id="dest-city" onchange="checkRequirementsForPrice()" style="width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <option value="">-- Pilih Desa --</option>
        </select>
    </div>

    <div id="price-section" class="form-group" style="display:none;">
        <label>Pilih Harga Ongkos</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div class="price-card" onclick="selectPrice(this, 'hemat')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer;">
                <span style="font-size: 10px; color: #00ffcc;">HEMAT</span>
                <div id="price-hemat" style="font-weight: bold;">0</div>
            </div>
            <div class="price-card" onclick="selectPrice(this, 'reguler')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer;">
                <span style="font-size: 10px; color: #bc00ff;">BIASA</span>
                <div id="price-reguler" style="font-weight: bold;">0</div>
            </div>
            <div class="price-card" onclick="selectPrice(this, 'express')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer;">
                <span style="font-size: 10px; color: #ffcc00;">KILAT</span>
                <div id="price-express" style="font-weight: bold;">0</div>
            </div>
        </div>
        <input type="hidden" id="final-price" value="0">
    </div>

    <div class="form-group">
        <label>Pesan untuk Sopir (Opsional)</label>
        <textarea id="cust-note" rows="2" placeholder="Contoh: Depan warung, baju merah...">Tolong antar tepat waktu.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()" style="width: 100%; padding: 15px; background: #00ffcc; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">
        PANGGIL OJEK SEKARANG!
    </button>

    <div id="mission-tracker" class="status-tracker" style="display:none; margin-top: 20px;">
        <div class="tracker-header">
            <span>RADAR PENCARIAN SOPIR</span>
        </div>
        <div id="status-display" class="status-box status-searching" style="padding: 15px; background: #222; text-align: center; margin-top: 10px;">
            SEDANG MENCARI SOPIR TERDEKAT...
        </div>
        <div id="driver-info" style="margin-top: 10px; font-size: 12px; color: #00ffcc; display: none;">
            SOPIR KETEMU: <span id="active-driver-name" style="color: #fff; font-weight: bold;">-</span>
        </div>
    </div>
                </div>
    





    



<script src="wilayah.js"></script>
    
    

<script>
    // 1. KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 2. GLOBAL VARIABLES
    const currentUID = localStorage.getItem('current_customer_id');
    if (!currentUID) { window.location.href = 'login.html'; }
    let userProfile = {}; 

    window.onload = () => {
        // Inisialisasi list kecamatan ke dropdown
        const kecSelect = document.getElementById('dest-kecamatan');
        for (let kec in dataWilayah) {
            let opt = document.createElement('option');
            opt.value = kec;
            opt.innerText = kec.toUpperCase();
            kecSelect.appendChild(opt);
        }
        
        // Load Profile
        db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
            userProfile = snapshot.val();
            if (userProfile) {
                document.getElementById('display-name').innerText = userProfile.name;
                document.getElementById('display-reputation').innerText = "RANK: " + userProfile.reputation;
                document.getElementById('cust-name').value = userProfile.name;
            }
        });
    };

    // 3. LOGIKA DROPDOWN & WILAYAH
    function loadCities(kecamatan) {
        const citySelect = document.getElementById('dest-city');
        const wrapper = document.getElementById('city-wrapper');
        
        if (!citySelect || !wrapper) return;
        citySelect.innerHTML = '<option value="">-- PILIH DESA/AREA --</option>';
        
        if (kecamatan && dataWilayah[kecamatan]) {
            wrapper.style.display = 'block';
            dataWilayah[kecamatan].desa.forEach((desa, index) => {
                let opt = document.createElement('option');
                opt.value = index; // Gunakan index untuk memudahkan pencarian data
                opt.innerText = desa.name;
                citySelect.appendChild(opt);
            });
        } else {
            wrapper.style.display = 'none';
        }
    }

    // 4. SISTEM GLOBAL SEARCH (FIXED)
    // 4. SISTEM GLOBAL SEARCH (FIXED & STYLED)
const searchInput = document.getElementById('destinationSearch');
const suggestionBox = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', function() {
    const keyword = this.value.toLowerCase();
    suggestionBox.innerHTML = ''; 

    if (keyword.length < 2) {
        suggestionBox.style.display = 'none';
        return;
    }

    let matches = [];
    // Loop untuk mencari desa di dalam dataWilayah
    for (let kec in dataWilayah) {
        dataWilayah[kec].desa.forEach((desa, index) => {
            // Pastikan kita mengakses properti .name karena desa adalah Object
            if (desa.name && desa.name.toLowerCase().includes(keyword)) {
                matches.push({
                    name: desa.name,
                    kec: kec,
                    index: index
                });
            }
        });
    }

    if (matches.length > 0) {
        suggestionBox.style.display = 'block';
        // Tambahkan z-index tinggi agar tidak tertutup dropdown bawah
        suggestionBox.style.zIndex = "9999"; 
        
        matches.slice(0, 8).forEach(match => {
            const div = document.createElement('div');
            // Style agar teks terbaca (Latar gelap, teks neon)
            div.style = "padding: 12px; border-bottom: 1px solid #333; cursor: pointer; background: #1a1a1a; color: #fff; font-family: sans-serif;";
            
            div.innerHTML = `<span style="color:#00ffcc; font-weight:bold;">${match.name.toUpperCase()}</span><br>
                             <small style="color:#888;">Kecamatan ${match.kec}</small>`;
            
            div.onclick = function() {
                // Set value ke input search
                searchInput.value = match.name.toUpperCase();
                
                // Sinkronisasi otomatis ke Dropdown Original
                const kecSelect = document.getElementById('dest-kecamatan');
                const citySelect = document.getElementById('dest-city');
                
                kecSelect.value = match.kec;
                loadCities(match.kec); // Panggil fungsi load desa
                
                // Beri jeda dikit agar dropdown desa sempat terisi
                setTimeout(() => {
                    citySelect.value = match.index;
                    suggestionBox.style.display = 'none';
                    // Trigger hitung harga
                    if(typeof checkRequirementsForPrice === "function") checkRequirementsForPrice();
                }, 100);
            };
            suggestionBox.appendChild(div);
        });
    } else {
        suggestionBox.style.display = 'none';
    }
});


    // 5. GPS & TRACKING
    function handleGPS() {
        const btn = document.getElementById('btn-location');
        const txt = document.getElementById('gps-text');
        btn.classList.add('scanning');
        txt.innerText = "TRIANGULATING...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                document.getElementById('cust-pickup-coords').value = `${lat},${lon}`;

                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                    .then(res => res.json())
                    .then(data => {
                        const road = data.address.road || data.address.village || "LOCATION SECURED";
                        btn.classList.remove('scanning');
                        btn.classList.add('location-locked');
                        txt.innerText = road.toUpperCase();
                        checkRequirementsForPrice();
                    });
            }, (error) => {
                alert("GPS Error: " + error.message);
            });
        }
    }

    // 6. KALKULASI TARIF (HAVERSINE)
    function calculateRealDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function checkRequirementsForPrice() {
        const kecName = document.getElementById('dest-kecamatan').value;
        const desaIdx = document.getElementById('dest-city').value;
        const coords = document.getElementById('cust-pickup-coords').value;

        if (kecName && desaIdx !== "" && coords) {
            const [lat1, lon1] = coords.split(',').map(Number);
            const selectedDesa = dataWilayah[kecName].desa[parseInt(desaIdx)];
            
            let distanceKM = calculateRealDistance(lat1, lon1, selectedDesa.lat, selectedDesa.lng);
            let difficulty = selectedDesa.diff || 1.0;

            document.getElementById('price-section').classList.add('price-section-show');
            updateBountyDisplay(distanceKM, difficulty);
        }
    }

    function updateBountyDisplay(km, diff) {
        const h = (km * 2000) * diff;
        const r = (km * 3500) * diff;
        const e = (km * 5000) * diff;

        document.getElementById('price-hemat').innerText = Math.max(10000, Math.round(h)).toLocaleString('id-ID');
        document.getElementById('price-reguler').innerText = Math.max(10000, Math.round(r)).toLocaleString('id-ID');
        document.getElementById('price-express').innerText = Math.max(10000, Math.round(e)).toLocaleString('id-ID');
    }

    function selectPrice(element, type) {
        document.querySelectorAll('.price-card').forEach(card => card.style.borderColor = '#333');
        element.style.borderColor = '#00ffcc';
        const priceValue = element.querySelector('div').innerText.replace(/\D/g,'');
        document.getElementById('final-price').value = priceValue;
    }

    // 7. KIRIM DATA KE FIREBASE
    function sendMission() {
        const pickupCoords = document.getElementById('cust-pickup-coords').value;
        const price = document.getElementById('final-price').value;
        const kecName = document.getElementById('dest-kecamatan').value;
        const desaIdx = document.getElementById('dest-city').value;

        if(!pickupCoords || price == "0" || desaIdx == "") {
            return alert("SISTEM: Lokasi atau Paket Bounty belum dipilih!");
        }

        const desaData = dataWilayah[kecName].desa[parseInt(desaIdx)];
        const isUrgent = document.getElementById('is-urgent').checked;
        const missionRef = db.ref('missions').push();

        missionRef.set({
            id: missionRef.key,
            clientId: currentUID,
            clientName: userProfile.name,
            price: parseInt(price),
            pickup: pickupCoords, 
            destination: desaData.name,
            note: document.getElementById('cust-note').value,
            rank: isUrgent ? "CHAOS" : "MORTAL",
            status: "available",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            alert("QUEST PUBLISHED! Sinyal telah disebarkan.");
        });
    }

    function logout() {
        localStorage.removeItem('current_customer_id');
        window.location.href = 'login.html';
    }
</script>



            
    

</body>
