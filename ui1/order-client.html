<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>

    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        input:focus, textarea:focus { border-color: var(--p-cyan); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    

        /* Custom Cyber Checkbox Container */
.cyber-checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(188, 0, 255, 0.05);
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cyber-checkbox-wrapper:hover {
    border-color: var(--p-purple);
    background: rgba(188, 0, 255, 0.1);
}

/* Sembunyikan Checkbox Asli */
.cyber-checkbox-wrapper input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--p-purple);
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efek saat Centang */
.cyber-checkbox-wrapper input[type="checkbox"]:checked {
    background: var(--p-purple);
    box-shadow: 0 0 10px var(--p-purple);
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked::after {
    content: "✔";
    color: #fff;
    font-size: 14px;
    font-weight: bold;
}

.cyber-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked + .cyber-label {
    color: var(--p-cyan);
    text-shadow: 0 0 5px var(--p-cyan);
               }
    


        /* Container Tracker */
.status-tracker {
    margin-top: 30px;
    padding: 15px;
    border: 1px dashed #444;
    background: rgba(0, 255, 242, 0.02);
    display: none; /* Sembunyi sebelum ada misi */
}

.tracker-header {
    font-size: 10px;
    color: var(--p-cyan);
    margin-bottom: 10px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.status-box {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid #333;
    letter-spacing: 2px;
    transition: 0.5s;
}

/* Animasi Pulse untuk mencari driver */
.status-searching {
    color: #888;
    border-color: #444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Status saat Driver Mengambil Misi */
.status-accepted {
    background: var(--p-purple);
    color: #fff;
    border-color: var(--p-cyan);
    box-shadow: 0 0 15px var(--p-purple);
    }




        .gps-btn-large {
    width: 100%;
    padding: 20px;
    background: #000;
    border: 1px solid var(--p-cyan);
    color: var(--p-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.5s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Animasi saat scanning */
.scanning {
    background: rgba(0, 255, 242, 0.1);
    border-color: #fff;
    color: #fff;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; box-shadow: 0 0 20px var(--p-cyan); }
}

/* Tampilan saat lokasi terkunci */
.location-locked {
    background: var(--p-cyan);
    color: #000;
    border-color: #fff;
    font-weight: bold;
}


        #price-section {
    display: none; /* Tetap sembunyi di awal */
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    
    /* TAMBAHAN AGAR TIDAK TERTIMPA */
    position: relative; 
    z-index: 10; 
    width: 100%;
    margin-top: 25px;    /* Memberi jarak atas agar tidak mepet */
    margin-bottom: 25px; /* Memberi jarak bawah */
    clear: both;         /* Memastikan elemen bersih dari float */
    pointer-events: auto; /* Memastikan input sentuhan aktif */
}

.price-section-show {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
    /* Memastikan elemen benar-benar terlihat dan mengambil ruang di layar */
    visibility: visible !important; 
}


.price-card {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #000;
    transition: 0.3s;
}
        
    
    
    </style>

<body>



<div class="order-container">
    <div class="user-ribbon">

            <span id="display-reputation">LEVEL: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">KELUAR</button>
    </div>

    <div class="terminal-header">
        <h2>PESAN OJEK BARU</h2>
    </div>

    <div class="form-group">
        <label>Nama Kamu (Sudah Pas)</label>
        <input type="text" id="cust-name" readonly style="background-color: #111; color: var(--p-cyan);">
    </div>

    <div class="form-group">
        <label>Pilih Kecepatan</label>
        <div class="cyber-checkbox-wrapper" onclick="document.getElementById('is-urgent').click()" style="border: 1px solid #ff0055; padding: 10px; border-radius: 5px;">
            <input type="checkbox" id="is-urgent" onclick="event.stopPropagation()">
            <span class="cyber-label" style="color: #ff0055; font-weight: bold;">NYALAKAN MODE DARURAT (CEPAT BANGET)</span>

    </div>

    <div class="form-group">

            <button type="button" id="btn-location" onclick="handleGPS()" class="gps-btn-large">

        </div>

    <div class="form-group" style="position: relative; z-index: 1000;">

        <input type="text" id="destinationSearch" placeholder="KETIK NAMA DESA DI SINI..." 
               style="width: 100%; padding: 15px; background: #000; color: #00ffcc; 
                      border: 2px solid #00ffcc; border-radius: 5px; font-family: 'Courier New', monospace;
                      text-transform: uppercase; box-shadow: 0 0 10px #00ffcc; outline: none;">
        
        <div id="searchSuggestions" style="display: none; position: absolute; top: 75px; left: 0; width: 100%; 
             background: #1a1a1a; border: 1px solid #00ffcc; z-index: 9999; max-height: 200px; 
             overflow-y: auto; border-radius: 0 0 5px 5px; box-shadow: 0 5px 15px rgba(0,255,204,0.5);">
        </div>
    </div>

    <div class="form-group">
    <label>Kecamatan Tujuan</label>

        <option value="">-- Pilih Kecamatan --</option>

</div>

<div class="form-group" id="city-wrapper" style="display:none;">

    <select id="dest-city" onchange="checkRequirementsForPrice()">

</div>

<div id="price-section" class="form-group" style="display:none;">

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <div class="price-card" onclick="selectPrice(this, 'hemat')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px;">
            <span style="font-size: 10px; color: #00ffcc;">HEMAT</span>
            <div id="price-hemat" style="font-weight: bold; color: #fff;">0</div>
        </div>
        <div class="price-card" onclick="selectPrice(this, 'reguler')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px;">
            <span style="font-size: 10px; color: #bc00ff;">BIASA</span>
            <div id="price-reguler" style="font-weight: bold; color: #fff;">0</div>
        </div>
        <div class="price-card" onclick="selectPrice(this, 'express')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px;">
            <span style="font-size: 10px; color: #ffcc00;">KILAT</span>

    </div>
    <input type="hidden" id="final-price" value="0">
</div>


    <div class="form-group">
        <label>Pesan untuk Sopir (Opsional)</label>

    </div>

    <button class="btn-send" onclick="sendMission()" style="width: 100%; padding: 15px; background: #00ffcc; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">
        PANGGIL OJEK SEKARANG!
    </button>

    <div id="mission-tracker" class="status-tracker" style="display:none; margin-top: 20px;">

            SEDANG MENCARI SOPIR TERDEKAT...

<script src="wilayah.js"></script>
    
    
<script>
                                                



        // 1. KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 2. GLOBAL VARIABLES
    const currentUID = localStorage.getItem('current_customer_id');
    const activeMissionID = localStorage.getItem('active_mission_id');
    let userProfile = {}; 
    let currentEstimatedKm = 0; 

    if (!currentUID) { window.location.href = 'login.html'; }

    // --- FUNGSI 1: INITIALIZATION (WINDOW ONLOAD) ---
    window.onload = () => {
        // Anti-Loop: Cek apakah misi benar-benar ada di DB sebelum redirect
        if (activeMissionID && activeMissionID !== "null") {
            db.ref('missions/' + activeMissionID).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data && (data.status === "searching" || data.status === "on_process")) {
                    window.location.replace('waiting-client.html');
                } else {
                    localStorage.removeItem('active_mission_id');
                }
            });
        }

        // Load Dropdown Kecamatan
        const kecSelect = document.getElementById('dest-kecamatan');
        if (kecSelect && typeof dataWilayah !== 'undefined') {
            kecSelect.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
            for (let kec in dataWilayah) {
                let opt = document.createElement('option');
                opt.value = kec;
                opt.innerText = kec.toUpperCase();
                kecSelect.appendChild(opt);
            }
        }

        // Ambil Data Profil
        db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
            const profile = snapshot.val();
            if (profile) {
                userProfile = profile; 
                document.getElementById('display-name').innerText = profile.name;
                document.getElementById('display-reputation').innerText = "LEVEL: " + (profile.reputation || '0');
                document.getElementById('cust-name').value = profile.name;
            }
        });
    };

    // --- FUNGSI 2: LOAD CITIES (DROPDOWN) ---
    function loadCities(kecamatan) {
        const citySelect = document.getElementById('dest-city');
        const wrapper = document.getElementById('city-wrapper');
        if (!citySelect || !wrapper) return;
        
        citySelect.innerHTML = '<option value="">--- PILIH DESA/AREA ---</option>';
        if (kecamatan && dataWilayah[kecamatan]) {
            wrapper.style.display = 'block';
            dataWilayah[kecamatan].desa.forEach((desa, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerText = desa.name;
                citySelect.appendChild(opt);
            });
        } else {
            wrapper.style.display = 'none';
        }
    }

    // --- FUNGSI 3: GLOBAL SEARCH (AUTOCOMPLETE) ---
    const searchInput = document.getElementById('destinationSearch');
    const suggestionBox = document.getElementById('searchSuggestions');

    searchInput.addEventListener('input', function() {
        const keyword = this.value.toLowerCase();
        suggestionBox.innerHTML = ''; 
        if (keyword.length < 2) { suggestionBox.style.display = 'none'; return; }

        let matches = [];
        for (let kec in dataWilayah) {
            dataWilayah[kec].desa.forEach((desa, index) => {
                if (desa.name && desa.name.toLowerCase().includes(keyword)) {
                    matches.push({ name: desa.name, kec: kec, index: index });
                }
            });
        }

        if (matches.length > 0) {
            suggestionBox.style.display = 'block';
            matches.slice(0, 8).forEach(match => {
                const div = document.createElement('div');
                div.className = "suggestion-item"; // Tambahkan style di CSS jika perlu
                div.style = "padding: 12px; border-bottom: 1px solid #333; cursor: pointer; background: #1a1a1a;";
                div.innerHTML = `<span style="color:#00ffcc;">${match.name.toUpperCase()}</span><br><small>Kec ${match.kec}</small>`;
                div.onclick = function() {
                    searchInput.value = match.name.toUpperCase();
                    document.getElementById('dest-kecamatan').value = match.kec;
                    loadCities(match.kec);
                    setTimeout(() => {
                        document.getElementById('dest-city').value = match.index;
                        suggestionBox.style.display = 'none';
                        checkRequirementsForPrice();
                    }, 200);
                };
                suggestionBox.appendChild(div);
            });
        } else { suggestionBox.style.display = 'none'; }
    });

    // --- FUNGSI 4: GPS HANDLE ---
    function handleGPS() {
        const btn = document.getElementById('btn-location');
        const txt = document.getElementById('gps-text');
        btn.classList.add('scanning');
        txt.innerText = "MENCARI SINYAL...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const coords = `${pos.coords.latitude},${pos.coords.longitude}`;
                document.getElementById('cust-pickup-coords').value = coords;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
                    .then(res => res.json()).then(data => {
                        const road = data.address.road || data.address.village || "LOKASI DITEMUKAN";
                        btn.classList.remove('scanning'); btn.classList.add('location-locked');
                        txt.innerText = road.toUpperCase();
                        checkRequirementsForPrice();
                    });
            }, () => { 
                btn.classList.remove('scanning'); alert("Gagal ambil GPS"); 
            }, { enableHighAccuracy: true });
        }
    }

    // --- FUNGSI 5: CALCULATE DISTANCE (HAVERSINE) ---
    function calculateRealDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // --- FUNGSI 6: UPDATE BOUNTY (HARGA) ---
    function updateBountyDisplay(km, diff) {
        const roundToThousands = (num) => Math.ceil(num / 1000) * 1000;
        document.getElementById('price-hemat').innerText = Math.max(10000, roundToThousands((km * 2000) * diff)).toLocaleString('id-ID');
        document.getElementById('price-reguler').innerText = Math.max(12000, roundToThousands((km * 3000) * diff)).toLocaleString('id-ID');
        document.getElementById('price-express').innerText = Math.max(15000, roundToThousands((km * 4000) * diff)).toLocaleString('id-ID');
    }

    // --- FUNGSI 7: CHECK REQUIREMENTS ---
    function checkRequirementsForPrice() {
        const kec = document.getElementById('dest-kecamatan').value;
        const desaIdx = document.getElementById('dest-city').value;
        const coords = document.getElementById('cust-pickup-coords').value;
        if (kec && desaIdx !== "") {
            const desa = dataWilayah[kec].desa[parseInt(desaIdx)];
            let lat1, lon1;
            if (coords && coords.includes(',')) {
                [lat1, lon1] = coords.split(',').map(Number);
            } else { lat1 = desa.lat; lon1 = desa.lng; }
            
            const dist = calculateRealDistance(lat1, lon1, desa.lat, desa.lng);
            currentEstimatedKm = (dist * 1.5).toFixed(1); // Simpan jarak dengan 1 angka di belakang koma
            updateBountyDisplay(dist * 1.5, desa.diff || 1.0);
            document.getElementById('price-section').style.display = 'block';
            document.getElementById('price-section').classList.add('price-section-show');
        }
    }


    // --- FUNGSI 8.5 ---
    function selectPrice(element, type) {
        document.querySelectorAll('.price-card').forEach(c => { c.style.borderColor = "#333"; c.style.background = "none"; });
        element.style.borderColor = "#00ffcc"; element.style.background = "rgba(0,255,204,0.1)";
        document.getElementById('final-price').value = element.querySelector('div').innerText.replace(/\D/g, '');
    }



    // --- FUNGSI 8.5: SELECT PRICE ---
    // A. Logika Menentukan Tier Ikan berdasarkan Tarif
function getFishTier(price) {
    if (price < 15000) return "TERI";
    if (price < 25000) return "KEMBUNG";
    if (price < 40000) return "BANDENG";
    if (price < 60000) return "KAKAP";
    if (price < 100000) return "TUNA";
    if (price < 200000) return "HIU";
    return "PAUS";
}

// B. Logika Menentukan Label Reputasi
function getReputationLabel(profile) {
    if (!profile.misiSelesai || profile.misiSelesai < 5) return "PENGGUNA BARU";
    
    // Hitung sederhana: jika dislike lebih dari 10% total feedback
    const totalFeedback = (profile.like || 0) + (profile.dislike || 0);
    if (totalFeedback > 0 && (profile.dislike / totalFeedback) > 0.1) return "BERESIKO";
    if (profile.cancel > 10) return "BERESIKO";
    
    if (profile.reputation >= 50) return "TERPERCAYA";
    return "NETRAL";
}
    

    // --- FUNGSI 9: SEND MISSION (FIREBASE) ---
    async function sendMission() {
    const pickupCoords = document.getElementById('cust-pickup-coords').value;
    const pickupName = document.getElementById('gps-text').innerText; // Ambil nama jalan dari tombol GPS
    const price = parseInt(document.getElementById('final-price').value);
    const kecName = document.getElementById('dest-kecamatan').value;
    const desaIdx = document.getElementById('dest-city').value;
    const note = document.getElementById('cust-note').value;
    const isUrgent = document.getElementById('is-urgent').checked;

    if (!pickupCoords || !price || price === 0) {
        return alert("LENGKAPI DATA: Lokasi & Paket Ongkos wajib dipilih!");
    }

    // 1. Ambil data desa tujuan
    const desaData = dataWilayah[kecName].desa[parseInt(desaIdx)];
    
    // 2. Buat ID Misi baru
    const missionRef = db.ref('missions').push();
    const mKey = missionRef.key;

    // 3. Susun data lengkap untuk Driver
    const missionData = {
        // Identitas & Status
        id: mKey,
        clientId: currentUID,
        clientName: userProfile.name || "Anonim",
        status: "searching",
        timestamp: firebase.database.ServerValue.TIMESTAMP,

        // Detail Pekerjaan
        pickupName: pickupName,
        pickupCoords: pickupCoords,
        destinationName: desaData.name.toUpperCase(),
        distanceEstimate: currentEstimatedKm + " KM", 
        price: price,
        note: note || "Tolong antar tepat waktu.",

        // Klasifikasi (Ikan & Rank)
        rank: isUrgent ? "DARURAT" : "BIASA",
        clientRankTier: getFishTier(price), // Menggunakan logika ikan

        // Reputasi (Berdasarkan profil user yang sedang login)
        clientReputationLabel: getReputationLabel(userProfile),
        
        // Statistik (Data mentah untuk dihitung Driver)
        clientStats: {
            misiSelesai: userProfile.misiSelesai || 0,
            like: userProfile.like || 0,
            dislike: userProfile.dislike || 0,
            cancel: userProfile.cancel || 0,
            memberSince: userProfile.memberSince || "2026"
        }
    };

    console.log("Mengirim misi dengan Tier: " + missionData.clientRankTier);

    // 4. Kirim ke Firebase
    missionRef.set(missionData)
        .then(() => {
            localStorage.setItem('active_mission_id', mKey);
            window.location.replace('waiting-client.html');
        })
        .catch((error) => {
            console.error("Gagal:", error);
            alert("Koneksi gagal: " + error.message);
        });
    }
    
        

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    
        
          

    
</script>
