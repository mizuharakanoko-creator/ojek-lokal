<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        input:focus, textarea:focus { border-color: var(--p-cyan); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    

        /* Custom Cyber Checkbox Container */
.cyber-checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(188, 0, 255, 0.05);
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cyber-checkbox-wrapper:hover {
    border-color: var(--p-purple);
    background: rgba(188, 0, 255, 0.1);
}

/* Sembunyikan Checkbox Asli */
.cyber-checkbox-wrapper input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--p-purple);
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efek saat Centang */
.cyber-checkbox-wrapper input[type="checkbox"]:checked {
    background: var(--p-purple);
    box-shadow: 0 0 10px var(--p-purple);
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked::after {
    content: "✔";
    color: #fff;
    font-size: 14px;
    font-weight: bold;
}

.cyber-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked + .cyber-label {
    color: var(--p-cyan);
    text-shadow: 0 0 5px var(--p-cyan);
               }
    


        /* Container Tracker */
.status-tracker {
    margin-top: 30px;
    padding: 15px;
    border: 1px dashed #444;
    background: rgba(0, 255, 242, 0.02);
    display: none; /* Sembunyi sebelum ada misi */
}

.tracker-header {
    font-size: 10px;
    color: var(--p-cyan);
    margin-bottom: 10px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.status-box {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid #333;
    letter-spacing: 2px;
    transition: 0.5s;
}

/* Animasi Pulse untuk mencari driver */
.status-searching {
    color: #888;
    border-color: #444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Status saat Driver Mengambil Misi */
.status-accepted {
    background: var(--p-purple);
    color: #fff;
    border-color: var(--p-cyan);
    box-shadow: 0 0 15px var(--p-purple);
    }




        .gps-btn-large {
    width: 100%;
    padding: 20px;
    background: #000;
    border: 1px solid var(--p-cyan);
    color: var(--p-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.5s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Animasi saat scanning */
.scanning {
    background: rgba(0, 255, 242, 0.1);
    border-color: #fff;
    color: #fff;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; box-shadow: 0 0 20px var(--p-cyan); }
}

/* Tampilan saat lokasi terkunci */
.location-locked {
    background: var(--p-cyan);
    color: #000;
    border-color: #fff;
    font-weight: bold;
}


        #price-section {
    display: none; /* Sembunyi di awal */
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.price-section-show {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
}

.price-card {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #000;
    transition: 0.3s;
}
        
    
    
    </style>
</head>
<body>

<div class="order-container">
    <div class="user-ribbon">
        <div class="user-info">
            <span id="display-name">INITIALIZING...</span>
            <span id="display-reputation">RANK: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="terminal-header">
        <h2>Publish New Quest</h2>
    </div>

    <div class="form-group">
        <label>Client Identity (Verified)</label>
        <input type="text" id="cust-name" readonly style="background-color: #111; color: var(--p-cyan);">
    </div>

<div class="form-group">
    <label>Mission Priority</label>
    <div class="cyber-checkbox-wrapper" onclick="document.getElementById('is-urgent').click()">
        <input type="checkbox" id="is-urgent" onclick="event.stopPropagation()">
        <span class="cyber-label">Activate Chaos Rank (Urgent)</span>
    </div>
</div>



    <div class="form-group">
    <label>Pickup Point Status</label>
    <div id="pickup-container">
        <button type="button" id="btn-location" onclick="handleGPS()" class="gps-btn-large">
            <span id="gps-icon">📡</span> 
            <span id="gps-text">ESTABLISH PICKUP SIGNAL</span>
        </button>
        <input type="hidden" id="cust-pickup-coords">
    </div>
</div>


<div class="form-group">
    <label>Destination (Step 1)</label>
    <select id="dest-kecamatan" onchange="loadCities(this.value)">
        <option value="">-- Pilih Kecamatan --</option>
    </select>
</div>

<div class="form-group" id="city-wrapper" style="display:none;">
    <label>Destination (Step 2)</label>
    <select id="dest-city" onchange="showBountyPackages()">
        <option value="">-- Pilih Kelurahan --</option>
    </select>
</div>

<div id="price-section" class="form-group">
    <label>Choose Bounty Package</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <div class="price-card" onclick="selectPrice(this, 'hemat')">
            <span style="font-size: 9px; color: var(--p-cyan);">HEMAT</span>
            <div id="price-hemat">0</div>
        </div>
        <div class="price-card" onclick="selectPrice(this, 'reguler')">
            <span style="font-size: 9px; color: var(--p-purple);">REGULER</span>
            <div id="price-reguler">0</div>
        </div>
        <div class="price-card" onclick="selectPrice(this, 'express')">
            <span style="font-size: 9px; color: var(--p-gold);">EXPRESS</span>
            <div id="price-express">0</div>
        </div>
    </div>
    <input type="hidden" id="final-price" value="0">
</div>



    <div class="form-group">
        <label>Mission Briefing (Notes)</label>
        <textarea id="cust-note" rows="3">Tolong antar tepat waktu.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()">Broadcast Quest</button>

    <div id="mission-tracker" class="status-tracker">
    <div class="tracker-header">
        <span>ACTIVE SIGNAL TRACKER</span>
        <span id="mission-id-display" style="font-size: 8px; color: #555;">ID: ---</span>
    </div>
    <div id="status-display" class="status-box status-searching">
        SCANNING FOR NEAREST DRIVER...
    </div>
    <div id="driver-info" style="margin-top: 10px; font-size: 11px; color: var(--p-cyan); display: none;">
        DRIVER DETECTED: <span id="active-driver-name" style="color: #fff;">-</span>
    </div>
    </div>
    


</div>



<script src="wilayah.js"></script> <script>
    // 1. KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. GLOBAL VARIABLES & AUTH CHECK
    const currentUID = localStorage.getItem('current_customer_id');
    if (!currentUID) { window.location.href = 'login.html'; }
    let userProfile = {}; 

    // Load Data Profil & Inisialisasi Wilayah
    window.onload = () => {
        if(typeof initWilayah === "function") initWilayah();
        
        db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
            userProfile = snapshot.val();
            if (userProfile) {
                document.getElementById('display-name').innerText = userProfile.name;
                document.getElementById('display-reputation').innerText = "RANK: " + userProfile.reputation;
                document.getElementById('cust-name').value = userProfile.name;
            }
        });
    };

    // 3. LOGIKA GPS (PICKUP POINT)
    function handleGPS() {
        const btn = document.getElementById('btn-location');
        const txt = document.getElementById('gps-text');
        const icon = document.getElementById('gps-icon');

        btn.classList.add('scanning');
        txt.innerText = "TRIANGULATING...";
        icon.innerText = "⌛";

        if (navigator.geolocation) {
            setTimeout(() => {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    document.getElementById('cust-pickup-coords').value = `${lat},${lon}`;
                    btn.classList.remove('scanning');
                    btn.classList.add('location-locked');
                    txt.innerText = "COORDINATES SECURED";
                    icon.innerText = "📍";
                    
                    // Cek apakah pintu tarif bisa dibuka
                    checkRequirementsForPrice();
                }, (error) => {
                    btn.classList.remove('scanning');
                    txt.innerText = "SIGNAL LOST - RETRY";
                    icon.innerText = "❌";
                    alert("GPS Error: " + error.message);
                });
            }, 1500);
        }
    }

    // 4. LOGIKA DESTINATION & HARGA (BOUNTY)
    function checkRequirementsForPrice() {
        const city = document.getElementById('dest-city').value;
        const coords = document.getElementById('cust-pickup-coords').value;

        if (city && coords) {
            calculateDistance();
            const section = document.getElementById('price-section');
            section.classList.add('price-section-show');
        }
    }

    function calculateDistance() {
        const distance = Math.floor(Math.random() * 10) + 2; 
        const h = Math.max(10000, distance * 2000);
        const r = Math.max(10000, (distance * 3000) + 2000);
        const e = Math.max(10000, distance * 5000);

        document.getElementById('price-hemat').innerText = h.toLocaleString();
        document.getElementById('price-reguler').innerText = r.toLocaleString();
        document.getElementById('price-express').innerText = e.toLocaleString();
    }

    function selectPrice(element, type) {
        document.querySelectorAll('.price-card').forEach(card => card.style.borderColor = '#333');
        element.style.borderColor = 'var(--p-cyan)';
        const priceValue = element.querySelector('div').innerText.replace(/\D/g,'');
        document.getElementById('final-price').value = priceValue;
    }

    // 5. KIRIM MISI (SEND TO DRIVERS)
    function sendMission() {
        const pickup = document.getElementById('cust-pickup-coords').value;
        const price = document.getElementById('final-price').value;
        const destination = document.getElementById('dest-city').value;

        if(!pickup || price == "0" || !destination) {
            return alert("SISTEM: Lokasi & Tarif belum lengkap!");
        }

        const isUrgent = document.getElementById('is-urgent').checked;
        const missionRef = db.ref('missions').push();
        const mID = missionRef.key;

        missionRef.set({
            id: mID,
            clientId: currentUID,
            clientName: userProfile.name,
            stats: {
                totalOrders: userProfile.totalOrders || 0,
                reputation: userProfile.reputation
            },
            price: parseInt(price),
            pickup: pickup, // Koordinat GPS
            destination: destination,
            note: document.getElementById('cust-note').value,
            rank: isUrgent ? "CHAOS" : "MORTAL",
            status: "available",
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('mission-tracker').style.display = 'block';
            trackMissionStatus(mID);
            
            db.ref('users_customer/' + currentUID).update({
                totalOrders: (userProfile.totalOrders || 0) + 1
            });
            alert("QUEST PUBLISHED!");
        });
    }

    function trackMissionStatus(idMisi) {
        const display = document.getElementById('status-display');
        db.ref('missions/' + idMisi).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === "accepted") {
                display.innerText = "DRIVER EN ROUTE";
                display.className = "status-box status-accepted";
                document.getElementById('driver-info').style.display = 'block';
                document.getElementById('active-driver-name').innerText = data.driverName || "S-Class Driver";
            }
        });
    }

    function logout() {
        localStorage.removeItem('current_customer_id');
        window.location.href = 'login.html';
    }
</script>
    


            
    

</body>
</html>
