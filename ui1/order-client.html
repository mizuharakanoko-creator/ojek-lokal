<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        input:focus, textarea:focus { border-color: var(--p-cyan); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    

        /* Custom Cyber Checkbox Container */
.cyber-checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(188, 0, 255, 0.05);
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cyber-checkbox-wrapper:hover {
    border-color: var(--p-purple);
    background: rgba(188, 0, 255, 0.1);
}

/* Sembunyikan Checkbox Asli */
.cyber-checkbox-wrapper input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--p-purple);
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efek saat Centang */
.cyber-checkbox-wrapper input[type="checkbox"]:checked {
    background: var(--p-purple);
    box-shadow: 0 0 10px var(--p-purple);
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked::after {
    content: "✔";
    color: #fff;
    font-size: 14px;
    font-weight: bold;
}

.cyber-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked + .cyber-label {
    color: var(--p-cyan);
    text-shadow: 0 0 5px var(--p-cyan);
               }
    


        /* Container Tracker */
.status-tracker {
    margin-top: 30px;
    padding: 15px;
    border: 1px dashed #444;
    background: rgba(0, 255, 242, 0.02);
    display: none; /* Sembunyi sebelum ada misi */
}

.tracker-header {
    font-size: 10px;
    color: var(--p-cyan);
    margin-bottom: 10px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.status-box {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid #333;
    letter-spacing: 2px;
    transition: 0.5s;
}

/* Animasi Pulse untuk mencari driver */
.status-searching {
    color: #888;
    border-color: #444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Status saat Driver Mengambil Misi */
.status-accepted {
    background: var(--p-purple);
    color: #fff;
    border-color: var(--p-cyan);
    box-shadow: 0 0 15px var(--p-purple);
    }




        .gps-btn-large {
    width: 100%;
    padding: 20px;
    background: #000;
    border: 1px solid var(--p-cyan);
    color: var(--p-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.5s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Animasi saat scanning */
.scanning {
    background: rgba(0, 255, 242, 0.1);
    border-color: #fff;
    color: #fff;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; box-shadow: 0 0 20px var(--p-cyan); }
}

/* Tampilan saat lokasi terkunci */
.location-locked {
    background: var(--p-cyan);
    color: #000;
    border-color: #fff;
    font-weight: bold;
}


        #price-section {
    display: none; /* Tetap sembunyi di awal */
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    
    /* TAMBAHAN AGAR TIDAK TERTIMPA */
    position: relative; 
    z-index: 10; 
    width: 100%;
    margin-top: 25px;    /* Memberi jarak atas agar tidak mepet */
    margin-bottom: 25px; /* Memberi jarak bawah */
    clear: both;         /* Memastikan elemen bersih dari float */
    pointer-events: auto; /* Memastikan input sentuhan aktif */
}

.price-section-show {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
    /* Memastikan elemen benar-benar terlihat dan mengambil ruang di layar */
    visibility: visible !important; 
}


.price-card {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #000;
    transition: 0.3s;
}
        
    
    
    </style>
</head>
<body>



<div class="order-container">
    <div class="user-ribbon">
        <div class="user-info">
            <span id="display-name">LAGI LOADING...</span>
            <span id="display-reputation">LEVEL: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">KELUAR</button>
    </div>

    <div class="terminal-header">
        <h2>PESAN OJEK BARU</h2>
    </div>

    <div class="form-group">
        <label>Nama Kamu (Sudah Pas)</label>
        <input type="text" id="cust-name" readonly style="background-color: #111; color: var(--p-cyan);">
    </div>

    <div class="form-group">
        <label>Pilih Kecepatan</label>
        <div class="cyber-checkbox-wrapper" onclick="document.getElementById('is-urgent').click()" style="border: 1px solid #ff0055; padding: 10px; border-radius: 5px;">
            <input type="checkbox" id="is-urgent" onclick="event.stopPropagation()">
            <span class="cyber-label" style="color: #ff0055; font-weight: bold;">NYALAKAN MODE DARURAT (CEPAT BANGET)</span>
        </div>
    </div>

    <div class="form-group">
        <label>Titik Jemput Kamu</label>
        <div id="pickup-container">
            <button type="button" id="btn-location" onclick="handleGPS()" class="gps-btn-large">
                <span id="gps-icon">📍</span> 
                <span id="gps-text">KLIK: CARI LOKASI SAYA</span>
            </button>
            <input type="hidden" id="cust-pickup-coords">
        </div>
    </div>

    <div class="form-group" style="position: relative; z-index: 1000;">
        <label>Cari Desa/Dusun Tujuan</label>
        <input type="text" id="destinationSearch" placeholder="KETIK NAMA DESA DI SINI..." 
               style="width: 100%; padding: 15px; background: #000; color: #00ffcc; 
                      border: 2px solid #00ffcc; border-radius: 5px; font-family: 'Courier New', monospace;
                      text-transform: uppercase; box-shadow: 0 0 10px #00ffcc; outline: none;">
        
        <div id="searchSuggestions" style="display: none; position: absolute; top: 75px; left: 0; width: 100%; 
             background: #1a1a1a; border: 1px solid #00ffcc; z-index: 9999; max-height: 200px; 
             overflow-y: auto; border-radius: 0 0 5px 5px; box-shadow: 0 5px 15px rgba(0,255,204,0.5);">
        </div>
    </div>

    <div class="form-group">
    <label>Kecamatan Tujuan</label>
    <select id="dest-kecamatan" onchange="loadCities(this.value)">
        <option value="">-- Pilih Kecamatan --</option>
    </select>
</div>

<div class="form-group" id="city-wrapper" style="display:none;">
    <label>Desa/Area Tujuan</label>
    <select id="dest-city" onchange="checkRequirementsForPrice()">
        <option value="">-- Pilih Desa --</option>
    </select>
</div>

<div id="price-section" class="form-group" style="display:none;">
    <label>Pilih Paket Ongkos</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <div class="price-card" onclick="selectPrice(this, 'hemat')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px;">
            <span style="font-size: 10px; color: #00ffcc;">HEMAT</span>
            <div id="price-hemat" style="font-weight: bold; color: #fff;">0</div>
        </div>
        <div class="price-card" onclick="selectPrice(this, 'reguler')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px;">
            <span style="font-size: 10px; color: #bc00ff;">BIASA</span>
            <div id="price-reguler" style="font-weight: bold; color: #fff;">0</div>
        </div>
        <div class="price-card" onclick="selectPrice(this, 'express')" style="text-align: center; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px;">
            <span style="font-size: 10px; color: #ffcc00;">KILAT</span>
            <div id="price-express" style="font-weight: bold; color: #fff;">0</div>
        </div>
    </div>
    <input type="hidden" id="final-price" value="0">
</div>


    <div class="form-group">
        <label>Pesan untuk Sopir (Opsional)</label>
        <textarea id="cust-note" rows="2" placeholder="Contoh: Depan warung, baju merah...">Tolong antar tepat waktu.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()" style="width: 100%; padding: 15px; background: #00ffcc; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">
        PANGGIL OJEK SEKARANG!
    </button>

    <div id="mission-tracker" class="status-tracker" style="display:none; margin-top: 20px;">
        <div class="tracker-header">
            <span>RADAR PENCARIAN SOPIR</span>
        </div>
        <div id="status-display" class="status-box status-searching" style="padding: 15px; background: #222; text-align: center; margin-top: 10px;">
            SEDANG MENCARI SOPIR TERDEKAT...
        </div>
        <div id="driver-info" style="margin-top: 10px; font-size: 12px; color: #00ffcc; display: none;">
            SOPIR KETEMU: <span id="active-driver-name" style="color: #fff; font-weight: bold;">-</span>
        </div>
    </div>
                </div>
    





    



<script src="wilayah.js"></script>
    
    
<script>

    // 1. KONFIGURASI FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
    authDomain: "ojeklokal-42b84.firebaseapp.com",
    databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ojeklokal-42b84",
    storageBucket: "ojeklokal-42b84.firebasestorage.app",
    messagingSenderId: "320198748498",
    appId: "1:320198748498:web:3e6038249edc6af20b328b"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// 2. GLOBAL VARIABLES
const currentUID = localStorage.getItem('current_customer_id');
let userProfile = {};

if (!currentUID) { window.location.href = 'login.html'; }

window.onload = () => {
    // --- A. ANTI-LOOP & VALIDASI ---
    const savedMissionID = localStorage.getItem('active_mission_id');
    if (savedMissionID && savedMissionID !== "null") {
        db.ref('missions/' + savedMissionID).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data && (data.status === "searching" || data.status === "on_process")) {
                window.location.replace('waiting-client.html');
            } else {
                localStorage.removeItem('active_mission_id');
            }
        });
    }

    // --- B. ISI DROPDOWN KECAMATAN ---
    const kecSelect = document.getElementById('dest-kecamatan');
    if (kecSelect && typeof dataWilayah !== 'undefined') {
        kecSelect.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
        for (let kec in dataWilayah) {
            let opt = document.createElement('option');
            opt.value = kec;
            opt.innerText = kec.toUpperCase();
            kecSelect.appendChild(opt);
        }
    }

    // --- C. AMBIL PROFIL ---
    db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
        const profile = snapshot.val();
        if (profile) {
            userProfile = profile; 
            document.getElementById('display-name').innerText = profile.name;
            document.getElementById('display-reputation').innerText = "LEVEL: " + (profile.reputation || '0');
            document.getElementById('cust-name').value = profile.name;
        }
    });
};

// 3. FUNGSI GPS
function handleGPS() {
    const btn = document.getElementById('btn-location');
    const txt = document.getElementById('gps-text');
    btn.classList.add('scanning');
    txt.innerText = "MENCARI POSISI...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            document.getElementById('cust-pickup-coords').value = lat + "," + lon;

            fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon)
                .then(res => res.json())
                .then(data => {
                    const road = data.address.road || data.address.village || "LOKASI TERKUNCI";
                    btn.classList.remove('scanning');
                    btn.classList.add('location-locked');
                    txt.innerText = road.toUpperCase();
                    checkRequirementsForPrice();
                });
        }, () => {
            btn.classList.remove('scanning');
            txt.innerText = "GPS ERROR!";
        });
    }
}

// 4. LOGIKA WILAYAH & HARGA
function loadCities(kecamatan) {
    const citySelect = document.getElementById('dest-city');
    const wrapper = document.getElementById('city-wrapper');
    if (!citySelect || !wrapper) return;
    citySelect.innerHTML = '<option value="">--- PILIH DESA ---</option>';
    if (kecamatan && dataWilayah[kecamatan]) {
        wrapper.style.display = 'block';
        dataWilayah[kecamatan].desa.forEach((desa, index) => {
            let opt = document.createElement('option');
            opt.value = index;
            opt.innerText = desa.name;
            citySelect.appendChild(opt);
        });
    } else { wrapper.style.display = 'none'; }
}

function checkRequirementsForPrice() {
    const kecName = document.getElementById('dest-kecamatan').value;
    const desaIdx = document.getElementById('dest-city').value;
    const priceSection = document.getElementById('price-section');
    if (kecName && desaIdx !== "") {
        priceSection.style.display = 'block';
        priceSection.classList.add('price-section-show');
        // Contoh kalkulasi sederhana agar harga muncul
        document.getElementById('price-hemat').innerText = "10.000";
        document.getElementById('price-reguler').innerText = "15.000";
        document.getElementById('price-express').innerText = "20.000";
    }
}

function selectPrice(element, type) {
    document.querySelectorAll('.price-card').forEach(card => {
        card.style.borderColor = "#333";
        card.style.background = "transparent";
    });
    element.style.borderColor = "#00ffcc";
    element.style.background = "rgba(0, 255, 204, 0.1)";
    const rawPrice = element.querySelector('div').innerText.replace(/\D/g, '');
    document.getElementById('final-price').value = rawPrice;
}

// 5. KIRIM DATA KE FIREBASE
async function sendMission() {
    const pickupCoords = document.getElementById('cust-pickup-coords').value;
    const price = document.getElementById('final-price').value;
    const kecName = document.getElementById('dest-kecamatan').value;
    const desaIdx = document.getElementById('dest-city').value;

    if (!pickupCoords || !price || price === "0") {
        return alert("Lengkapi lokasi dan pilih harga!");
    }

    try {
        const desaData = dataWilayah[kecName].desa[parseInt(desaIdx)];
        const missionRef = db.ref('missions').push();
        const mKey = missionRef.key;

        await missionRef.set({
            id: mKey,
            clientId: currentUID,
            clientName: userProfile.name || "User",
            price: parseInt(price),
            pickup: pickupCoords,
            destination: desaData.name,
            status: "searching",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        localStorage.setItem('active_mission_id', mKey);
        window.location.replace('waiting-client.html');
    } catch (e) { alert("Error: " + e.message); }
}

function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
    }
    


    
</script>
