        .order-container {
            width: 100%; max-width: 400px;

            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);

        }

        .form-group { margin-bottom: 15px; }

        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;

            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);

        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    

        /* Custom Cyber Checkbox Container */
.cyber-checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(188, 0, 255, 0.05);
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cyber-checkbox-wrapper:hover {
    border-color: var(--p-purple);
    background: rgba(188, 0, 255, 0.1);
}

/* Sembunyikan Checkbox Asli */
.cyber-checkbox-wrapper input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--p-purple);
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efek saat Centang */
.cyber-checkbox-wrapper input[type="checkbox"]:checked {
    background: var(--p-purple);
    box-shadow: 0 0 10px var(--p-purple);
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked::after {
    content: "✔";
    color: #fff;
    font-size: 14px;
    font-weight: bold;
}

.cyber-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked + .cyber-label {
    color: var(--p-cyan);
    text-shadow: 0 0 5px var(--p-cyan);
               }
    


        /* Container Tracker */
.status-tracker {
    margin-top: 30px;
    padding: 15px;
    border: 1px dashed #444;
    background: rgba(0, 255, 242, 0.02);
    display: none; /* Sembunyi sebelum ada misi */
}

.tracker-header {
    font-size: 10px;
    color: var(--p-cyan);
    margin-bottom: 10px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.status-box {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid #333;
    letter-spacing: 2px;
    transition: 0.5s;
}

/* Animasi Pulse untuk mencari driver */
.status-searching {
    color: #888;
    border-color: #444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Status saat Driver Mengambil Misi */
.status-accepted {
    background: var(--p-purple);
    color: #fff;
    border-color: var(--p-cyan);
    box-shadow: 0 0 15px var(--p-purple);
    }




        .gps-btn-large {
    width: 100%;
    padding: 20px;
    background: #000;
    border: 1px solid var(--p-cyan);
    color: var(--p-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.5s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Animasi saat scanning */
.scanning {
    background: rgba(0, 255, 242, 0.1);
    border-color: #fff;
    color: #fff;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; box-shadow: 0 0 20px var(--p-cyan); }
}

/* Tampilan saat lokasi terkunci */
.location-locked {
    background: var(--p-cyan);
    color: #000;
    border-color: #fff;
    font-weight: bold;
}


        #price-section {
    display: none; /* Tetap sembunyi di awal */
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    
    /* TAMBAHAN AGAR TIDAK TERTIMPA */

    z-index: 10; 
    width: 100%;
    margin-top: 25px;    /* Memberi jarak atas agar tidak mepet */
    margin-bottom: 25px; /* Memberi jarak bawah */

}

.price-section-show {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
    /* Memastikan elemen benar-benar terlihat dan mengambil ruang di layar */
    visibility: visible !important; 
}


.price-card {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #000;
    transition: 0.3s;
}

<script>
            // 1. KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();



        
        // === 2. GLOBAL VARIABLES & INITIALIZATION ===
    const currentUID = localStorage.getItem('current_customer_id');
    const activeMissionID = localStorage.getItem('active_mission_id');

    // Proteksi Login
    if (!currentUID) { 
        window.location.href = 'login.html'; 
    }

    let userProfile = {}; 

    window.onload = () => {
        // --- 1. CEK MISI AKTIF (DOUBLE CHECK FIREBASE) ---
        if (activeMissionID && activeMissionID !== "null") {
            db.ref('missions/' + activeMissionID).once('value', (snapshot) => {
                const data = snapshot.val();
                // Hanya lempar ke waiting jika data benar-benar ada di database
                if (data && (data.status === "available" || data.status === "on_process")) {
                    window.location.href = 'waiting-client.html';
                } else {
                    // Jika di database sudah tidak ada, hapus jejak di storage
                    localStorage.removeItem('active_mission_id');
                }
            });
        }

        // --- 2. INISIALISASI DROPDOWN KECAMATAN ---
        const kecSelect = document.getElementById('dest-kecamatan');
        if (kecSelect && typeof dataWilayah !== 'undefined') {
            kecSelect.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
            for (let kec in dataWilayah) {
                let opt = document.createElement('option');
                opt.value = kec;
                opt.innerText = kec.toUpperCase();
                kecSelect.appendChild(opt);
            }
            
            // Pasang kembali event listener onchange
            kecSelect.onchange = function() {
                loadCities(this.value);
            };
        }

        // --- 3. AMBIL DATA PROFIL USER ---
        db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
            const profile = snapshot.val(); 
            if (profile) {
                userProfile = profile; // Update variabel global
                const displayName = document.getElementById('display-name');
                const displayRep = document.getElementById('display-reputation');
                const custNameInput = document.getElementById('cust-name');

                if (displayName) displayName.innerText = profile.name;
                if (displayRep) displayRep.innerText = "LEVEL: " + (profile.reputation || '0');
                if (custNameInput) custNameInput.value = profile.name;
            }
        }, (error) => {
            console.error("Firebase Error (Profile):", error);
        });

        // Jalankan cleanup mission lama
        if (typeof cleanupOldMissions === "function") {
            cleanupOldMissions();
        }
    }; // Akhir dari window.onload
    

    

    // 3. LOGIKA DROPDOWN & WILAYAH
    function loadCities(kecamatan) {
        const citySelect = document.getElementById('dest-city');
        const wrapper = document.getElementById('city-wrapper');
        const searchInput = document.getElementById('destinationSearch');

        if (!citySelect || !wrapper) return;
        
        citySelect.innerHTML = '<option value="">--- PILIH DESA/AREA ---</option>';

        if (kecamatan && dataWilayah[kecamatan]) {
            wrapper.style.display = 'block';
            dataWilayah[kecamatan].desa.forEach((desa, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerText = desa.name;
                citySelect.appendChild(opt);
            });

            // Picu hitung harga saat desa dipilih
            citySelect.onchange = function() {
                checkRequirementsForPrice(); 
            };
        } else {
            wrapper.style.display = 'none';
        }
    }

    // 4. SISTEM GLOBAL SEARCH
    const searchInput = document.getElementById('destinationSearch');
    const suggestionBox = document.getElementById('searchSuggestions');

    searchInput.addEventListener('input', function() {
        const keyword = this.value.toLowerCase();
        suggestionBox.innerHTML = ''; 

        if (keyword.length < 2) {
            suggestionBox.style.display = 'none';
            return;
        }

        let matches = [];
        for (let kec in dataWilayah) {
            dataWilayah[kec].desa.forEach((desa, index) => {
                if (desa.name && desa.name.toLowerCase().includes(keyword)) {
                    matches.push({ name: desa.name, kec: kec, index: index });
                }
            });
        }

        if (matches.length > 0) {
            suggestionBox.style.display = 'block';
            suggestionBox.style.zIndex = "9999"; 
            matches.slice(0, 8).forEach(match => {
                const div = document.createElement('div');
                div.style = "padding: 12px; border-bottom: 1px solid #333; cursor: pointer; background: #1a1a1a; color: #fff;";
                div.innerHTML = `<span style="color:#00ffcc; font-weight:bold;">${match.name.toUpperCase()}</span><br><small style="color:#888;">Kecamatan ${match.kec}</small>`;
                
                div.onclick = function() {
                    searchInput.value = match.name.toUpperCase();
                    document.getElementById('dest-kecamatan').value = match.kec;
                    loadCities(match.kec);
                    
                    setTimeout(() => {
                        document.getElementById('dest-city').value = match.index;
                        suggestionBox.style.display = 'none';
                        checkRequirementsForPrice();
                    }, 150);
                };
                suggestionBox.appendChild(div);
            });
        } else {
            suggestionBox.style.display = 'none';
        }
    });

    // 5. GPS & TRACKING
    function handleGPS() {
        const btn = document.getElementById('btn-location');
        const txt = document.getElementById('gps-text');
        btn.classList.add('scanning');
        txt.innerText = "MENCARI SINYAL POSISI...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                document.getElementById('cust-pickup-coords').value = `${lat},${lon}`;

                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                    .then(res => res.json())
                    .then(data => {
                        const road = data.address.road || data.address.village || data.address.suburb || "LOKASI DITEMUKAN";
                        btn.classList.remove('scanning');
                        btn.classList.add('location-locked');
                        txt.innerText = road.toUpperCase();
                        checkRequirementsForPrice();
                    });
            }, (error) => {
                btn.classList.remove('scanning');
                txt.innerText = "GAGAL! COBA KLIK LAGI";
                alert("GPS Error: Pastikan Izin Lokasi Aktif");
            }, { enableHighAccuracy: true, timeout: 7000 });
        }
    }

    // 6. KALKULASI TARIF
    function calculateRealDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function updateBountyDisplay(km, diff) {
        let h = (km * 2000) * diff;
        let r = (km * 3000) * diff;
        let e = (km * 4000) * diff;

        const roundToThousands = (num) => Math.ceil(num / 1000) * 1000;
        const finalH = Math.max(10000, roundToThousands(h));
        const finalR = Math.max(12000, roundToThousands(r));
        const finalE = Math.max(15000, roundToThousands(e));

        document.getElementById('price-hemat').innerText = finalH.toLocaleString('id-ID');
        document.getElementById('price-reguler').innerText = finalR.toLocaleString('id-ID');
        document.getElementById('price-express').innerText = finalE.toLocaleString('id-ID');
    }

    function checkRequirementsForPrice() {
        const kecName = document.getElementById('dest-kecamatan').value;
        const desaIdx = document.getElementById('dest-city').value;
        const coords = document.getElementById('cust-pickup-coords').value;
        const priceSection = document.getElementById('price-section');

        if (kecName && desaIdx !== "") {
            const selectedDesa = dataWilayah[kecName].desa[parseInt(desaIdx)];
            let lat1, lon1;

            if (coords && coords !== "0,0" && coords.includes(',')) {
                [lat1, lon1] = coords.split(',').map(Number);
            } else {
                lat1 = selectedDesa.lat; lon1 = selectedDesa.lng;
            }

            const dist = calculateRealDistance(lat1, lon1, selectedDesa.lat, selectedDesa.lng);
            updateBountyDisplay(dist * 1.5, selectedDesa.diff || 1.0);
            
            priceSection.classList.add('price-section-show');
            priceSection.style.display = 'block'; 
        } else {
            if(priceSection) priceSection.classList.remove('price-section-show');
        }
    }

    function selectPrice(element, type) {
        document.querySelectorAll('.price-card').forEach(card => {
            card.style.borderColor = "#333";
            card.style.background = "transparent";
        });
        element.style.borderColor = "#00ffcc";
        element.style.background = "rgba(0, 255, 204, 0.1)";

        const rawPrice = element.querySelector('div').innerText.replace(/\D/g, '');
        document.getElementById('final-price').value = rawPrice;
    }


    // 7. FIREBASE SEND (VERSI REDIRECT KE HALAMAN TUNGGU)
async function sendMission() {
    const pickupCoords = document.getElementById('cust-pickup-coords').value;
    const price = document.getElementById('final-price').value;
    const kecName = document.getElementById('dest-kecamatan').value;
    const desaIdx = document.getElementById('dest-city').value;

    // Validasi input
    if (!pickupCoords || pickupCoords === "0,0" || price === "0" || desaIdx === "") {
        return alert("MAAF: Lokasi jemput, tujuan, atau harga belum dipilih!");
    }

    try {
        // --- LOGIKA CLEANUP: Hapus pesanan 'available' lama milik user ini ---
        const oldMissions = await db.ref('missions').orderByChild('clientId').equalTo(currentUID).once('value');
        oldMissions.forEach(child => {
            if (child.val().status === "available") {
                child.ref.remove();
            }
        });

        // Data tujuan
        const desaData = dataWilayah[kecName].desa[parseInt(desaIdx)];
        const isUrgent = document.getElementById('is-urgent').checked;
        const missionRef = db.ref('missions').push();

        // Kirim data baru
        await missionRef.set({
            id: missionRef.key,
            clientId: currentUID,
            clientName: userProfile.name || "Customer",
            price: parseInt(price),
            pickup: pickupCoords, 
            destination: desaData.name,
            note: document.getElementById('cust-note').value,
            rank: isUrgent ? "DARURAT" : "BIASA",
            status: "available",
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });

        // Simpan ID misi di localStorage agar halaman tunggu tahu apa yang harus dipantau
        localStorage.setItem('active_mission_id', missionRef.key);
        
        // PINDAH KE HALAMAN TUNGGU
        window.location.href = 'waiting-client.html';

    } catch (error) {
        console.error("Firebase Error:", error);
        alert("Gagal mengirim pesanan, silakan coba lagi.");
    }
    }
                                          




    function watchMissionStatus(missionId) {
    const mRef = db.ref('missions/' + missionId);
    
    mRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // Jika misi selesai atau dibatalkan, hapus dari node 'missions'
        if (data.status === "completed" || data.status === "cancelled") {
            alert("Misi telah " + data.status);
            mRef.remove(); // Menghapus dari database agar tidak penuh
            localStorage.removeItem('active_mission_id');
            location.reload();
        }
    });
    }
    



    function cleanupOldMissions() {
    const twentyMinutesAgo = Date.now() - (20 * 60 * 1000);
    db.ref('missions')
      .orderByChild('timestamp')
      .endAt(twentyMinutesAgo)
      .once('value', (snapshot) => {
          snapshot.forEach((child) => {
              // Hanya hapus yang statusnya masih 'available' (kadaluarsa)
              if (child.val().status === "available") {
                  child.ref.remove();
              }
          });
      });
}

// Jalankan cleanup setiap kali user membuka aplikasi
cleanupOldMissions();
    

    

    function logout() {
    localStorage.removeItem('current_customer_id');
    localStorage.removeItem('active_mission_id'); // TAMBAHKAN INI
    localStorage.clear(); // Opsional: Bersihkan semua
    window.location.href = 'login.html';
}
