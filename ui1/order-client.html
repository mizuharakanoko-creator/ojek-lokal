<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; text-transform: uppercase; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        input:focus, textarea:focus { border-color: var(--p-cyan); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    

        /* Custom Cyber Checkbox Container */
.cyber-checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(188, 0, 255, 0.05);
    padding: 15px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.cyber-checkbox-wrapper:hover {
    border-color: var(--p-purple);
    background: rgba(188, 0, 255, 0.1);
}

/* Sembunyikan Checkbox Asli */
.cyber-checkbox-wrapper input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--p-purple);
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efek saat Centang */
.cyber-checkbox-wrapper input[type="checkbox"]:checked {
    background: var(--p-purple);
    box-shadow: 0 0 10px var(--p-purple);
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked::after {
    content: "✔";
    color: #fff;
    font-size: 14px;
    font-weight: bold;
}

.cyber-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
}

.cyber-checkbox-wrapper input[type="checkbox"]:checked + .cyber-label {
    color: var(--p-cyan);
    text-shadow: 0 0 5px var(--p-cyan);
               }
    


        /* Container Tracker */
.status-tracker {
    margin-top: 30px;
    padding: 15px;
    border: 1px dashed #444;
    background: rgba(0, 255, 242, 0.02);
    display: none; /* Sembunyi sebelum ada misi */
}

.tracker-header {
    font-size: 10px;
    color: var(--p-cyan);
    margin-bottom: 10px;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.status-box {
    padding: 10px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid #333;
    letter-spacing: 2px;
    transition: 0.5s;
}

/* Animasi Pulse untuk mencari driver */
.status-searching {
    color: #888;
    border-color: #444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Status saat Driver Mengambil Misi */
.status-accepted {
    background: var(--p-purple);
    color: #fff;
    border-color: var(--p-cyan);
    box-shadow: 0 0 15px var(--p-purple);
    }
    
    
    </style>
</head>
<body>

<div class="order-container">
    <div class="user-ribbon">
        <div class="user-info">
            <span id="display-name">INITIALIZING...</span>
            <span id="display-reputation">RANK: ---</span>
        </div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="terminal-header">
        <h2>Publish New Quest</h2>
    </div>

    <div class="form-group">
        <label>Client Identity (Verified)</label>
        <input type="text" id="cust-name" readonly style="background-color: #111; color: var(--p-cyan);">
    </div>

<div class="form-group">
    <label>Mission Priority</label>
    <div class="cyber-checkbox-wrapper" onclick="document.getElementById('is-urgent').click()">
        <input type="checkbox" id="is-urgent" onclick="event.stopPropagation()">
        <span class="cyber-label">Activate Chaos Rank (Urgent)</span>
    </div>
</div>



    <div class="form-group">
        <label>Bounty Reward (IDR)</label>
        <input type="number" id="cust-price" value="15000">
    </div>

    <div class="form-group">
        <label>Pickup Location</label>
        <input type="text" id="cust-pickup" placeholder="Lokasi jemput..." value="Pusat Kota">
    </div>

    <div class="form-group">
        <label>Mission Briefing (Notes)</label>
        <textarea id="cust-note" rows="3">Tolong antar tepat waktu.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()">Broadcast Quest</button>

    <div id="mission-tracker" class="status-tracker">
    <div class="tracker-header">
        <span>ACTIVE SIGNAL TRACKER</span>
        <span id="mission-id-display" style="font-size: 8px; color: #555;">ID: ---</span>
    </div>
    <div id="status-display" class="status-box status-searching">
        SCANNING FOR NEAREST DRIVER...
    </div>
    <div id="driver-info" style="margin-top: 10px; font-size: 11px; color: var(--p-cyan); display: none;">
        DRIVER DETECTED: <span id="active-driver-name" style="color: #fff;">-</span>
    </div>
    </div>
    


</div>

<script>
    // 1. KONFIGURASI (Gunakan data asli Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. CEK LOGIN
    const currentUID = localStorage.getItem('current_customer_id');
    if (!currentUID) { window.location.href = 'login.html'; }

    let userProfile = {}; 

    // 3. AMBIL PROFIL (Otomatis jalan saat halaman dibuka)
    db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
        userProfile = snapshot.val();
        if (userProfile) {
            document.getElementById('display-name').innerText = userProfile.name;
            document.getElementById('display-reputation').innerText = "RANK: " + userProfile.reputation;
            document.getElementById('cust-name').value = userProfile.name;
        }
    });

    // 4. FUNGSI KIRIM MISI (Hanya jalan saat tombol diklik)
    function sendMission() {
        const isUrgent = document.getElementById('is-urgent').checked;
        const rank = isUrgent ? "CHAOS" : "MORTAL";
        const price = document.getElementById('cust-price').value;
        const pickup = document.getElementById('cust-pickup').value;
        const note = document.getElementById('cust-note').value;

        const missionRef = db.ref('missions').push();
        const mID = missionRef.key;

        missionRef.set({
            id: mID,
            clientId: currentUID,
            clientName: userProfile.name,
            stats: {
                joinDate: userProfile.joinDate,
                totalOrders: userProfile.totalOrders,
                reputation: userProfile.reputation
            },
            price: parseInt(price),
            pickup: pickup,
            note: note,
            rank: rank,
            status: "available",
            timestamp: Date.now()
        }).then(() => {
            // Tampilkan panel tracker
            document.getElementById('mission-tracker').style.display = 'block';
            
            // PANGGIL TRACKER UNTUK MONITORING (Langkah Penting)
            trackMissionStatus(mID);

            alert("QUEST PUBLISHED!");
        });
    }

    // 5. FUNGSI TRACKER (Diletakkan di luar agar bisa dipantau terus-menerus)
    function trackMissionStatus(idMisi) {
        const display = document.getElementById('status-display');
        
        db.ref('missions/' + idMisi).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.status === "accepted") {
                display.innerText = "DRIVER EN ROUTE";
                display.className = "status-box status-accepted";
                document.getElementById('driver-info').style.display = 'block';
                document.getElementById('active-driver-name').innerText = data.driverName || "S-Class Driver";
            }
        });
    }

    function logout() {
        localStorage.removeItem('current_customer_id');
        window.location.href = 'login.html';
    }
</script>


</body>
</html>
