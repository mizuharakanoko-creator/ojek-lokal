<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
        }

        .order-container {
            width: 100%; max-width: 400px;
            margin: auto;
            border: 2px solid #222;
            padding: 20px;
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Profile Ribbon Baru */
        .user-ribbon {
            background: rgba(188, 0, 255, 0.1);
            border: 1px solid var(--p-purple);
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span { display: block; }
        #display-name { font-weight: bold; color: var(--p-cyan); font-size: 14px; }
        #display-reputation { font-size: 10px; color: var(--p-gold); letter-spacing: 1px; }

        .terminal-header h2 {
            margin: 0 0 20px 0; font-size: 16px; color: var(--p-cyan);
            border-bottom: 1px solid #333; padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box; outline: none;
        }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        .logout-btn { background: none; border: 1px solid #444; color: #888; font-size: 10px; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="order-container">
    <div class="user-ribbon">
        <div class="user-info">
            <span id="display-name">LOADING...</span>
            <span id="display-reputation">RANK: CHECKING...</span>
        </div>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="terminal-header">
        <h2>PUBLISH NEW QUEST</h2>
    </div>

    <div class="form-group">
        <label>Client Name (Verified)</label>
        <input type="text" id="cust-name" readonly>
    </div>

    <div class="form-group">
        <label>Bounty Reward (IDR)</label>
        <input type="number" id="cust-price" value="15000">
    </div>

    <div class="form-group">
        <label>Pickup Location</label>
        <input type="text" id="cust-pickup" placeholder="Titik Jemput..." value="Area Pusat Kota">
    </div>

    <div class="form-group">
        <label>Mission Briefing (Notes)</label>
        <textarea id="cust-note" rows="3">Antar tepat waktu, jangan lewat jalan utama.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()">SEND TO DRIVERS</button>
</div>

<script>
    // === 1. CONFIG FIREBASE ===
    const firebaseConfig = {
        apiKey: "AIza...", // Sesuaikan dengan milik Anda
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.firebaseio.com",
        projectId: "ojeklokal-42b84",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // === 2. AUTH CHECK & PROFILE LOAD ===
    const currentUID = localStorage.getItem('current_customer_id');
    if (!currentUID) {
        window.location.href = 'register-client.html';
    }

    let userProfile = {};

    // Ambil data profil dari folder users_customer
    db.ref('users_customer/' + currentUID).on('value', (snapshot) => {
        userProfile = snapshot.val();
        if (userProfile) {
            document.getElementById('display-name').innerText = userProfile.name;
            document.getElementById('display-reputation').innerText = "RANK: " + userProfile.reputation;
            document.getElementById('cust-name').value = userProfile.name;
        } else {
            alert("Sistem: ID tidak terdaftar.");
            logout();
        }
    });

    // === 3. KIRIM MISI ===
    function sendMission() {
        const price = document.getElementById('cust-price').value;
        const pickup = document.getElementById('cust-pickup').value;
        const note = document.getElementById('cust-note').value;

        if(!price || !pickup) return alert("Lengkapi detail!");

        const missionRef = db.ref('missions').push();
        missionRef.set({
            id: missionRef.key,
            clientId: currentUID,
            clientName: userProfile.name,
            
            // DATA REPUTASI DARI DATABASE PEMESAN
            stats: {
                joinDate: userProfile.joinDate,
                totalOrders: userProfile.totalOrders,
                cancellations: userProfile.cancellations,
                likes: userProfile.likes,
                dislikes: userProfile.dislikes,
                reputation: userProfile.reputation
            },

            price: parseInt(price),
            pickup: pickup,
            note: note,
            status: "available",
            timestamp: Date.now()
        }).then(() => {
            // Update jumlah order di profil user
            db.ref('users_customer/' + currentUID).update({
                totalOrders: userProfile.totalOrders + 1
            });
            alert("MISI BERHASIL DITERBITKAN!");
        });
    }

    function logout() {
        localStorage.removeItem('current_customer_id');
        window.location.href = 'register-client.html';
    }
</script>

</body>
</html>
