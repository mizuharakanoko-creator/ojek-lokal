<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE QUEST | OJEK LOKAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --p-gold: #ffcc00;
            --p-red: #ff0044;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .order-container {
            width: 100%; max-width: 400px;
            border: 2px solid #222;
            padding: 20px;
            background: linear-gradient(145deg, #0a0a0a, #111);
            position: relative;
        }

        .terminal-header {
            border-bottom: 1px solid var(--p-cyan);
            padding-bottom: 10px; margin-bottom: 20px;
        }

        .terminal-header h2 {
            margin: 0; font-size: 18px; color: var(--p-cyan);
            letter-spacing: 2px; text-transform: uppercase;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block; font-size: 10px; color: #888;
            margin-bottom: 5px; text-transform: uppercase;
        }

        input, textarea, select {
            width: 100%; padding: 12px;
            background: #000; border: 1px solid #333;
            color: #fff; box-sizing: border-box;
            font-size: 14px; outline: none;
        }

        input:focus { border-color: var(--p-purple); }

        .btn-send {
            width: 100%; padding: 15px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            margin-top: 10px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        .btn-send:active { transform: scale(0.98); }

        /* Default Values Styling */
        .default-tag {
            font-size: 9px; color: var(--p-gold); margin-top: 4px; display: block;
        }
    </style>
</head>
<body>

<div class="order-container">
    <div class="terminal-header">
        <h2>Publish New Quest</h2>
    </div>

    <div class="form-group">
        <label>Client Identity (ID)</label>
        <input type="text" id="cust-name" placeholder="Contoh: USER_ANON_12" value="PLAYER_ONE">
        <span class="default-tag">Auto-set: Berdasarkan akun aktif</span>
    </div>

    <div class="form-group">
        <label>Quest Rank / Risk Level</label>
        <select id="cust-rank">
            <option value="MORTAL">MORTAL (Aman/Normal)</option>
            <option value="CHAOS">CHAOS (Resiko Tinggi/Mendesak)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Bounty Reward (IDR)</label>
        <input type="number" id="cust-price" placeholder="Masukkan harga..." value="15000">
        <span class="default-tag">Default: Minimal Rp 15.000</span>
    </div>

    <div class="form-group">
        <label>Pickup Location</label>
        <input type="text" id="cust-pickup" placeholder="Titik Jemput..." value="Area Pusat Kota">
    </div>

    <div class="form-group">
        <label>Mission Briefing (Notes)</label>
        <textarea id="cust-note" rows="3" placeholder="Contoh: Bawa barang pecah belah atau jemput di gang sempit.">Antar tepat waktu, jangan lewat jalan utama.</textarea>
    </div>

    <button class="btn-send" onclick="sendMission()">Publish Mission</button>
</div>

<script>
    // === FIREBASE CONFIGURATION ===
    const firebaseConfig = {
        apiKey: "AIza...", 
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.firebaseio.com",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sendMission() {
        const name = document.getElementById('cust-name').value;
        const rank = document.getElementById('cust-rank').value;
        const price = document.getElementById('cust-price').value;
        const pickup = document.getElementById('cust-pickup').value;
        const note = document.getElementById('cust-note').value;

        if(!name || !price || !pickup) {
            alert("Sistem: Data tidak lengkap. Misi gagal diterbitkan.");
            return;
        }

        // Push data ke folder 'missions' di Firebase
        const missionRef = db.ref('missions').push();
        missionRef.set({
            id: missionRef.key,
            client: name,
            rank: rank,
            price: parseInt(price),
            pickup: pickup,
            note: note,
            status: "available", // Status awal agar muncul di Driver
            timestamp: Date.now(),
            // Data tambahan untuk "Peringkat Keburukan" Driver
            successRate: 100, 
            joinDate: "2026",
            totalMissions: Math.floor(Math.random() * 10) // Contoh data dummy
        }).then(() => {
            alert("MISSION PUBLISHED! Cek Mission Hub Driver.");
            // Reset form atau redirect
        }).catch((err) => {
            console.error(err);
            alert("System Error: Koneksi database terputus.");
        });
    }
</script>

</body>
</html>
