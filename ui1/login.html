<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM LOGIN | S-CLASS HUB</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }

        .login-card {
            width: 300px; padding: 30px;
            border: 1px solid var(--p-purple);
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 20px rgba(188, 0, 255, 0.3);
            text-align: center;
        }

        .glitch-text {
            color: var(--p-cyan); font-size: 18px; letter-spacing: 3px;
            margin-bottom: 30px; text-transform: uppercase;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        
        input, select {
            width: 100%; padding: 12px; background: #000;
            border: 1px solid #333; color: #fff; box-sizing: border-box;
            outline: none; font-family: 'Courier New', monospace;
        }

        input:focus { border-color: var(--p-cyan); }

        .btn-login {
            width: 100%; padding: 12px;
            background: var(--p-purple); color: #fff;
            border: none; font-weight: bold; cursor: pointer;
            margin-top: 10px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .footer-link { margin-top: 20px; font-size: 10px; color: #555; }
        .footer-link a { color: var(--p-cyan); text-decoration: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="glitch-text">AUTHENTICATION</div>
    
    <div class="input-group">
        <label>ACCESS ID (UNIQUE ID)</label>
        <input type="text" id="login-id" placeholder="Masukkan ID Anda...">
    </div>

    <div class="input-group">
        <label>USER TYPE</label>
        <select id="login-type">
            <option value="customer">PEMESAN (CUSTOMER)</option>
            <option value="driver">DRIVER (S-CLASS)</option>
        </select>
    </div>

    <button class="btn-login" onclick="processLogin()">IDENTITY VERIFY</button>

    <div class="footer-link">
        Belum punya ID? <br>
        <a href="register-client.html">REGISTER NEW ACCOUNT</a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIza...", // Gunakan milik Anda
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.firebaseio.com",
        projectId: "ojeklokal-42b84",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function processLogin() {
        const id = document.getElementById('login-id').value;
        const type = document.getElementById('login-type').value;

        if(!id) return alert("Sistem: Input ID diperlukan.");

        // Tentukan path database berdasarkan tipe
        const dbPath = (type === 'customer') ? 'users_customer/' : 'users_driver/';

        db.ref(dbPath + id).once('value', (snapshot) => {
            if (snapshot.exists()) {
                const userData = snapshot.val();
                alert(`WELCOME BACK, ${userData.name}!`);

                if (type === 'customer') {
                    localStorage.setItem('current_customer_id', id);
                    window.location.href = 'order-client.html';
                } else {
                    localStorage.setItem('current_driver_id', id);
                    window.location.href = 'mission-hub.html';
                }
            } else {
                alert("ACCESS DENIED: ID tidak ditemukan di database " + type);
            }
        });
    }
</script>

</body>
</html>
