<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | CITIZEN DATABASE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --bg-dark: #050505;
        }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .reg-container { 
            width: 100%;
            max-width: 400px; 
            border: 1px solid var(--p-purple); 
            padding: 20px; 
            background: rgba(188, 0, 255, 0.05);
            box-shadow: 0 0 20px rgba(188, 0, 255, 0.2);
            box-sizing: border-box;
        }
        .header { text-align: center; border-bottom: 1px solid var(--p-purple); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 10px; color: var(--p-cyan); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; 
            color: #fff; outline: none; box-sizing: border-box; font-size: 14px;
        }
        input:focus { border-color: var(--p-cyan); }
        .btn-reg { 
            width: 100%; padding: 15px; background: var(--p-purple); border: none; 
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-reg:active { opacity: 0.8; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h3 style="color: var(--p-purple); margin-bottom: 5px;">NEW CITIZEN REGISTRY</h3>
        <p style="font-size: 9px; color: #888; margin-top: 0;">GLOBAL DATABASE SYSTEM S-CLASS</p>
    </div>

    <div class="form-group">
        <label>Full Name / Identity</label>
        <input type="text" id="reg-name" placeholder="Contoh: Budi Santoso">
    </div>

    <div class="form-group">
        <label>Unique User ID (Untuk Login)</label>
        <input type="text" id="reg-id" placeholder="Contoh: budi99">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="number" id="reg-phone" placeholder="0812xxxx">
    </div>

    <button class="btn-reg" onclick="registerUser()">Initialize Account</button>
</div>

<script>
    // DATA KONFIGURASI ASLI DARI FIREBASE ANDA
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b",
        measurementId: "G-KBGEL1G22Y"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function registerUser() {
        const name = document.getElementById('reg-name').value;
        const userId = document.getElementById('reg-id').value;
        const phone = document.getElementById('reg-phone').value;

        // Validasi Sederhana
        if(!name || !userId) {
            alert("SYSTEM: Nama dan ID Wajib Diisi!");
            return;
        }

        // Membersihkan ID dari karakter yang dilarang Firebase
        const cleanID = userId.replace(/[.#$\[\]]/g, "");

        console.log("Mencoba mendaftarkan ID:", cleanID);

        // Simpan Data ke Database
        db.ref('users_customer/' + cleanID).set({
            name: name,
            phone: phone,
            joinDate: new Date().toLocaleDateString('id-ID', {year: 'numeric', month: 'short'}),
            totalOrders: 0,
            cancellations: 0,
            likes: 0,
            dislikes: 0,
            reputation: "MORTAL",
            status: "Verified",
            timestamp: Date.now()
        })
        .then(() => {
            alert("REGISTRASI BERHASIL!");
            localStorage.setItem('current_customer_id', cleanID);
            // Redirect ke halaman order
            window.location.href = 'order-client.html';
        })
        .catch((error) => {
            console.error("Firebase Error:", error);
            alert("SISTEM ERROR: " + error.message);
        });
    }
</script>

</body>
</html>
