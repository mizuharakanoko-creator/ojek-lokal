<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | CITIZEN DATABASE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --p-cyan: #00fff2;
            --p-purple: #bc00ff;
            --bg-dark: #050505;
        }
        body { background: var(--bg-dark); color: #fff; font-family: 'Orbitron', sans-serif; padding: 20px; }
        .reg-container { 
            max-width: 400px; margin: auto; border: 1px solid var(--p-purple); 
            padding: 20px; background: rgba(188, 0, 255, 0.05);
            box-shadow: 0 0 20px rgba(188, 0, 255, 0.2);
        }
        .header { text-align: center; border-bottom: 1px solid var(--p-purple); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 10px; color: var(--p-cyan); display: block; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 10px; background: #000; border: 1px solid #333; 
            color: #fff; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--p-cyan); }
        .btn-reg { 
            width: 100%; padding: 12px; background: var(--p-purple); border: none; 
            color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header">
        <h3 style="color: var(--p-purple);">NEW CITIZEN REGISTRY</h3>
        <p style="font-size: 9px; color: #888;">Input data ke Global Database S-Class</p>
    </div>

    <div class="form-group">
        <label>FULL NAME / IDENTITY</label>
        <input type="text" id="reg-name" placeholder="Nama Lengkap...">
    </div>

    <div class="form-group">
        <label>UNIQUE USER ID (Untuk Login)</label>
        <input type="text" id="reg-id" placeholder="Contoh: user123">
    </div>

    <div class="form-group">
        <label>PHONE NUMBER</label>
        <input type="number" id="reg-phone" placeholder="0812...">
    </div>

    <button class="btn-reg" onclick="registerUser()">REGISTER TO DATABASE</button>
</div>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIza...",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.firebaseio.com",
        projectId: "ojeklokal-42b84",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function registerUser() {
        const name = document.getElementById('reg-name').value;
        const userId = document.getElementById('reg-id').value;
        const phone = document.getElementById('reg-phone').value;

        if(!name || !userId) return alert("Data tidak lengkap!");

        // Simpan data dasar dengan nilai default (0 pembatalan, 0 likes)
        db.ref('users_customer/' + userId).set({
            name: name,
            phone: phone,
            joinDate: new Date().toLocaleDateString('id-ID', {year: 'numeric', month: 'short'}),
            totalOrders: 0,
            cancellations: 0,
            likes: 0,
            dislikes: 0,
            reputation: "MORTAL", // Default Rank
            status: "Verified"
        }).then(() => {
            alert("REGISTRASI BERHASIL! ID Anda sekarang terdaftar.");
            // Simpan ID di LocalStorage untuk sesi login
            localStorage.setItem('current_customer_id', userId);
            window.location.href = 'order-client.html';
        });
    }
</script>
</body>
</html>
