   <style>
/* --- 0. ROOT VARIABLES --- */
:root {
    --p-cyan: #00f3ff;
    --p-pink: #ff00ea;
    --p-red: #ff003c;
    --p-gold: #ffcc00;
    --p-bg: #050505;
    --terminal-font: 'Courier New', monospace;
}

/* --- 1. EFEK GLITCH DIGITAL --- */
.glitch-text {
    animation: glitch-anim 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
    text-shadow: 1px 0 var(--p-pink), -1px 0 var(--p-cyan);
    position: relative;
    display: inline-block;
}

@keyframes glitch-anim {
    0% { transform: translate(0); }
    33% { transform: translate(-1.5px, 1.5px); }
    66% { transform: translate(1.5px, -1.5px); }
    100% { transform: translate(0); }
}

/* --- 2. WARNA NEON & STATUS --- */
.txt-cyan { 
    color: var(--p-cyan); 
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); 
    font-weight: bold;
    letter-spacing: 1px;
}

.txt-red { 
    color: var(--p-red); 
    text-shadow: 0 0 10px rgba(255, 0, 60, 0.8); 
    font-weight: bold;
}

#gps-status.txt-red {
    opacity: 0.8;
    text-shadow: none;
}

.q-gold { color: var(--p-gold); font-weight: bold; }

/* --- 3. REPUTATION BOX (Detail Gambar 2 & 3) --- */
.reputation-box {
    border: 1px solid #222;
    padding: 10px;
    background: #000;
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    font-family: var(--terminal-font);
}

.stats-grid {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    border-top: 1px solid #111;
    border-bottom: 1px solid #111;
    padding: 5px 0;
    text-align: center;
}

.stats-grid span { display: block; font-size: 12px; }

/* Progress Bar Success Rate */
.rate-bar-bg {
    width: 100%;
    height: 4px;
    background: #111;
    margin: 5px 0;
    border-radius: 2px;
}

.rate-bar-fill {
    height: 100%;
    background: var(--p-cyan);
    box-shadow: 0 0 8px var(--p-cyan);
    transition: width 1s ease-in-out;
}

/* Fraud Check Labels */
.fraud-check {
    font-size: 10px;
    font-weight: bold;
    padding: 3px 0;
    text-align: center;
    border-radius: 2px;
    text-transform: uppercase;
}
.fraud-check.safe { color: var(--p-cyan); border: 1px solid var(--p-cyan); background: rgba(0, 243, 255, 0.05); }
.fraud-check.danger { color: var(--p-red); border: 1px solid var(--p-red); background: rgba(255, 0, 60, 0.05); animation: pulse 1s infinite; }

@keyframes pulse { 50% { opacity: 0.5; } }

/* --- 4. RADAR & LOG MODULE --- */
.radar-module { height: 100px; margin-bottom: 5px; }
.map-frame {
    height: 100px;
    background: linear-gradient(180deg, #050505 0%, #111 100%);
    border: 1px solid #222;
    display: flex;
    align-items: center; justify-content: center;
}

.activity-log-container {
    transition: all 0.3s ease;
    border: 1px solid #222;
    margin-top: 10px;
    background: #000;
}

.log-body {
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: none; /* Sembunyikan scrollbar Firefox */
}
.log-body::-webkit-scrollbar { display: none; } /* Sembunyikan scrollbar Chrome/Safari */

.log-item.success .log-msg { color: var(--p-cyan); }
.log-item.error .log-msg { color: var(--p-red); }
.log-item.info .log-msg { color: #888; }

.minimized { height: 35px !important; overflow: hidden; }

/* --- 5. OVERLAY MODAL (Engine Gambar 1) --- */
#global-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
    z-index: 10000;
    align-items: center; justify-content: center;
}

#global-modal.active { display: flex; }

.popup-content.modal-size {
    width: 85%;
    max-width: 320px;
    background: #050505;
    border: 1px solid var(--p-cyan);
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
    padding: 20px;
    border-radius: 4px;
    animation: modalSlideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- 6. BUTTONS & UI INTERACTION --- */
.action-row button {
    padding: 10px;
    font-family: var(--terminal-font);
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.2s;
}

.btn-nego {
    background: transparent;
    color: var(--p-gold);
    border: 1px solid var(--p-gold);
}

.btn-apply {
    background: var(--p-cyan);
    color: #000;
    border: none;
}

.btn-cancel {
    background: #111;
    color: #fff;
    border: 1px solid #333;
}

button:active { transform: scale(0.95); filter: brightness(1.2); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Font khusus untuk kesan terminal driver */
.terminal-font { font-family: var(--terminal-font); letter-spacing: 1px; }



/* Styling Rute Pengantaran */
.route-info {
    background: #0a0a0a;
    padding: 12px;
    border-radius: 4px;
    margin-bottom: 10px;
    border-left: 3px solid var(--p-cyan);
}

.route-step {
    font-size: 13px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
}

.route-line {
    width: 2px;
    height: 15px;
    background: #222;
    margin-left: 6px;
    border-left: 1px dashed #444;
}

.icon {
    font-size: 10px;
    color: var(--p-cyan);
}


</style>

<script>
  
  // 1. Database Koordinat (Pusat Data Lokasi)
const KuninganCoords = {
    "Ciporang": { lat: -6.9750, lng: 108.4950 },
    "Cipasung": { lat: -6.9950, lng: 108.4750 },
    "Ancaran": { lat: -6.9650, lng: 108.5100 },
    "Kuningan Kota": { lat: -6.9750, lng: 108.4850 },
    "Cirendang": { lat: -6.9550, lng: 108.4800 },
    "Kadugede": { lat: -7.0080, lng: 108.4620 } 
};

// 2. Kalkulator Jarak Otomatis (Haversine)
function getRealKm(p1, p2) {
    const R = 6371;
    const dLat = (p2.lat - p1.lat) * Math.PI / 180;
    const dLon = (p2.lng - p1.lng) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

  
  
  
// === 1. KORE & SECURITY ===
const currentDriverID = localStorage.getItem('current_driver_id');
if (!currentDriverID) { window.location.href = 'login.html'; }
const db = typeof firebase !== 'undefined' ? firebase.database() : null;

// === 2. DATABASE & PLAYER STATS (RPG) ===
const ghostNames = ["Bambang Setiawan", "Siti Aminah", "Eko Prasetyo", "Dewi Lestari", "Budi Santoso", "Putri Utami", "Agus Setiawan", "Rina Permata", "Dedi Kurniawan", "Sri Wahyuni",
    "Andi Saputra", "Maya Sari", "Hendra Wijaya", "Lilis Suryani", "Rian Hidayat", "Siska Amelia", "Aris Munandar", "Ani Mulyani", "Fajar Sidiq", "Indah Permata",
    "Joko Susilo", "Ratih Purwasih", "Dimas Arya", "Novi Susanti", "Yanto Sudrajat", "Mega Utami", "Taufik Hidayat", "Dina Mariana", "Bayu Saputra", "Fitri Handayani",
    "Asep Sunandar", "Elis Rahmawati", "Cecep Mulyana", "Titin Sumarni", "Maman Suherman", "Kokom Komala", "Dadang Subur", "Nanang Kosim", "Eneng Rohayati", "Ujang Hermawan"];
let userData = { hp: 550, maxHp: 1000, exp: 695, maxExp: 2000, isOnline: false, currentLevel: 12 };

// === 3. UI REFRESH & DYNAMIC REGEN (Gabungan Fungsi Regen & Night Buff) ===
function updateUI() {
    document.getElementById('hp-text').innerText = `${Math.floor(userData.hp)}/${userData.maxHp}`;
    document.getElementById('exp-text').innerText = `${userData.exp}/${userData.maxExp}`;
    document.getElementById('hp-fill').style.width = (userData.hp / userData.maxHp) * 100 + "%";
    document.getElementById('exp-fill').style.width = (userData.exp / userData.maxExp) * 100 + "%";
}

setInterval(() => {
    if(!userData.isOnline) return;
    const hours = new Date().getHours();
    const regen = (hours >= 21 || hours <= 4) ? 10 : 5; // Night Buff Otomatis
    if(userData.hp < userData.maxHp) { userData.hp = Math.min(userData.hp + regen, userData.maxHp); updateUI(); }
}, 30000);

// === 4. SYSTEM TOGGLE (GPS Real, Anti-Spam & Visual Sync) ===
let gpsWatcher = null; 
let firstLock = true; // Agar log "Signal Stable" tidak nyepam

function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    const statusLabel = document.getElementById('status-label');
    const radar = document.getElementById('radar-anim');
    const gpsStatus = document.getElementById('gps-status');

    if (userData.isOnline) {
        // Efek Awal saat mencari sinyal
        if(gpsStatus) { 
            gpsStatus.innerText = "SYNCING..."; 
            gpsStatus.className = "txt-cyan glitch-text"; 
        }
        statusLabel.innerText = "CONNECTING...";
        statusLabel.style.color = "gold";

        gpsWatcher = navigator.geolocation.watchPosition((pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            // Logika Visual & Status
            statusLabel.innerText = "ONLINE";
            statusLabel.style.color = "var(--p-cyan)";
            if(radar) radar.classList.add('scanning');
            
            // Efek GPS Live
            if(gpsStatus) { 
                gpsStatus.innerText = "GPS: LIVE"; 
                gpsStatus.classList.add('glitch-text');
                setTimeout(() => gpsStatus.classList.remove('glitch-text'), 2000);
            }
            
            // Logika Log: Hanya muncul sekali agar tidak memenuhi layar
            if (firstLock) {
                addLog("SIGNAL ACQUIRED: Koordinat Real Terkunci.", "success");
                firstLock = false; 
            }

            listenToFirebase(); // Jalankan pengambilan data misi

        }, (err) => {
            addLog("SIGNAL LOST: GPS Terputus!", "error");
            stopGPS();
        }, { 
            enableHighAccuracy: true, 
            maximumAge: 30000, 
            timeout: 27000 
        });

    } else {
        stopGPS();
    }
}

// Fungsi pembantu untuk mematikan sistem secara bersih
function stopGPS() {
    if(gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    const statusLabel = document.getElementById('status-label');
    const gpsStatus = document.getElementById('gps-status');
    const radar = document.getElementById('radar-anim');

    // Reset Semua Status
    statusLabel.innerText = "OFFLINE";
    statusLabel.style.color = "#fff";
    if(radar) radar.classList.remove('scanning');
    
    if(gpsStatus) { 
        gpsStatus.innerText = "GPS: OFFLINE"; 
        gpsStatus.className = "txt-red"; 
    }
    
    if(db) db.ref('missions').off();
    
    // Pastikan Switch & Data Sinkron
    document.getElementById('online-toggle').checked = false;
    userData.isOnline = false;
    firstLock = true; // Reset agar saat online lagi, log muncul kembali
    addLog("System Offline. GPS Disconnected.", "info");
}






// === DATA KOORDINAT (Internal untuk Kalkulasi Logis) ===
const KuninganCoords = {
    "Ciporang": { lat: -6.975, lng: 108.495 },
    "Cipasung": { lat: -6.995, lng: 108.475 },
    "Ancaran": { lat: -6.965, lng: 108.510 },
    "Kuningan Kota": { lat: -6.975, lng: 108.485 },
    "Cirendang": { lat: -6.955, lng: 108.480 },
    "Kadugede": { lat: -7.005, lng: 108.465 }
};

// Fungsi Helper Hitung Jarak (Haversine)
function getRealKm(p1, p2) {
    const R = 6371;
    const dLat = (p2.lat - p1.lat) * Math.PI / 180;
    const dLon = (p2.lng - p1.lng) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// === 5. ORDER GENERATOR (Update: Integrasi Haversine & Voice AI) ===
function generateGhostOrder() {
    // 1. Safety Check: Jangan spawn jika sedang offline atau koordinat belum siap
    if(!userData.isOnline || !userCoords) return;

    const id = "ghost-" + Math.floor(Math.random() * 9999);
    const locKeys = Object.keys(KuninganCoords);
    
    // 2. Pilih rute jemput dan tujuan secara acak
    const pickup = locKeys[Math.floor(Math.random() * locKeys.length)];
    let dropoff = locKeys[Math.floor(Math.random() * locKeys.length)];
    while(dropoff === pickup) dropoff = locKeys[Math.floor(Math.random() * locKeys.length)];

    // 3. Kalkulasi Jarak Murni (Internal) - Menggunakan fungsi 14A
    const baseDist = getRawKm(
        KuninganCoords[pickup].lat, KuninganCoords[pickup].lng, 
        KuninganCoords[dropoff].lat, KuninganCoords[dropoff].lng
    );
    
    // Faktor 1.6x untuk simulasi rute jalan raya Kuningan yang berkelok
    const tripDist = parseFloat((baseDist * 1.6).toFixed(1));

    // 4. Kalkulasi Jarak Driver ke Titik Jemput (Radius)
    // Menggunakan koordinat driver saat ini (userCoords)
    const distToUserRaw = getRawKm(userCoords.lat, userCoords.lng, KuninganCoords[pickup].lat, KuninganCoords[pickup].lng);
    
    // Memicu Suara Robot & Format Teks UI - Menggunakan fungsi 14B
    const displayRadius = formatDistanceAndVoice(distToUserRaw);

    // 5. Logika Tarif (Minimal 12rb/15rb sesuai jarak)
    const roundToThousands = (num) => Math.ceil(num / 1000) * 1000;
    const isUrgent = Math.random() > 0.7; // 30% peluang misi mendesak
    
    let finalPrice;
    if(isUrgent) {
        // Skema Urgent: Harga lebih tinggi + Bonus 20%
        finalPrice = Math.max(20000, roundToThousands(((tripDist * 4500) * 1.1) * 1.2));
    } else {
        // Skema Reguler
        finalPrice = Math.max(12000, roundToThousands(tripDist * 3500));
    }

    // 6. Logika Reputasi Klien (Trusted, Neutral, Risky)
    const likes = Math.floor(Math.random() * 200);
    const rate = (90 + (Math.random() * 10)).toFixed(1);
    let repStatus = "NEUTRAL";
    
    if(likes > 120 && rate > 97) {
        repStatus = "TRUSTED";
    } else if(rate < 93) {
        repStatus = "RISKY";
        // Tambahan: Jika Risky, beri peringatan suara tambahan
        setTimeout(() => playRobotVoice("Peringatan: Klien memiliki rating rendah."), 2500);
    }

    // 7. Kirim data ke Renderer (Bagian 6)
    renderMission({ 
        clientName: ghostNames[Math.floor(Math.random() * ghostNames.length)], 
        pickupPoint: pickup,
        dropoffPoint: dropoff,
        tripDist: tripDist, 
        radiusDist: displayRadius, // String (m/km) + Voice Trigger
        finalPrice: finalPrice,
        reputation: repStatus,
        likes: likes,
        dislikes: Math.floor(Math.random() * 8),
        successRate: rate,
        type: isUrgent ? "URGENT MISSION" : "REGULAR DELIVERY",
        noted: isUrgent ? "URGENT! Paket harus sampai dalam 15 menit." : "Antar sesuai titik, jangan lewat gang sempit."
    }, id, true);
}



// === 6. MISSION RENDERER (VERSI LENGKAP + RATE BAR) ===
function renderMission(data, id, isGhost) {
    if(document.getElementById(id)) return;

    const priceFormatted = data.finalPrice.toLocaleString('id-ID');
    const isUrgent = data.type === "URGENT MISSION";
    
    // Warna Berdasarkan Reputasi
    const repColors = { "TRUSTED": "#00f3ff", "NEUTRAL": "#fff", "RISKY": "#ff003c" };
    const accentColor = isUrgent ? "#ff003c" : (repColors[data.reputation] || "#00f3ff");

    const html = `
        <div class="quest-card blue-theme" id="${id}" style="border-left: 3px solid ${accentColor}; margin-bottom: 15px; position: relative;">
            <details open>
                <summary onclick="triggerVibration('short')">
                    <div class="q-summary-grid">
                        <div class="q-client-name terminal-font" style="font-size: 15px;">
                            ${isUrgent ? '<span style="color:#ff003c; animation: blink 0.8s infinite;">[!]</span> ' : ''}${data.clientName} 
                            <div style="font-size:10px; color:${accentColor}; opacity: 0.8; margin-top:2px;">📍 Radius: ${data.radiusDist} km</div>
                        </div>
                        <div class="q-meta-info" style="text-align: right;">
                            <span class="reward q-gold" style="font-size: 18px; font-weight: bold; ${isUrgent ? 'color:#ff003c;' : ''}">Rp ${priceFormatted}</span>
                            <div id="t-${id}" style="color: #ff003c; font-size: 11px; font-weight: bold;">05:00</div>
                        </div>
                    </div>
                </summary>

                <div class="q-details" style="padding: 12px 10px; background: rgba(0,0,0,0.2);">
                    
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 8px; border: 1px solid #222;">
                        <div style="width: 10px; height: 10px; border-radius: 50%; background: ${repColors[data.reputation]}; box-shadow: 0 0 10px ${repColors[data.reputation]};"></div>
                        <div style="font-size: 11px; letter-spacing: 1px; text-transform: uppercase;">CLIENT STATUS: <b style="color:${repColors[data.reputation]}">${data.reputation}</b></div>
                    </div>

    document.querySelector('.section-divider').insertAdjacentHTML('afterend', html);

    if(isGhost) {
        const hijackTime = (Math.random() * 20000) + 10000;
        setTimeout(() => {
            const card = document.getElementById(id);
            if(card && !card.querySelector('.btn-apply').disabled) {
                addLog(`MISI TERLEWAT: ${data.clientName} diambil driver lain.`, "error");

            }
        }, hijackTime);

}


// === 7. APPLY LOGIC (Update: Konfirmasi Modal & Hijacking) ===
function confirmApply(id, cost, isGhost) {
    if(userData.hp < cost) { 
        triggerVibration('long');
        addLog("ENERGY/HP TERLALU RENDAH!", "error"); 
        return; 
    }
    
    const card = document.getElementById(id);
    if(!card) return;
    const clientName = card.querySelector('.q-client-name').innerText;

    openModal("KONFIRMASI EKSEKUSI", `
        <div class="terminal-font" style="text-align:center; padding: 10px;">
            <p style="color:#666; font-size: 12px;">CONTRACT TARGET:</p>
            <p style="color:#fff; font-size: 16px; margin-bottom: 20px;">${clientName}</p>
            <div style="background: rgba(255,0,60,0.1); padding: 15px; border: 1px solid #ff003c; margin-bottom: 25px;">
                <span style="color:#ff003c; font-size: 24px; font-weight: bold;">-${cost} HP</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#1a1a1a; color:#fff; border:1px solid #333;">ABORT</button>
                <button onclick="executeApply('${id}', ${cost}, ${isGhost})" style="flex:2; padding:12px; background:#00f3ff; color:#000; border:none; font-weight:bold; clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);">EXECUTE</button>
            </div>
        </div>
    `);
}

function executeApply(id, cost, isGhost) {
    closeModal();
    const card = document.getElementById(id);
    if(!card) return;

    userData.hp -= cost; 
    updateUI(); 

    const btnA = card.querySelector('.btn-apply');
    if(btnA) { 
        btnA.innerHTML = '<span class="loading-blink">CONNECTING...</span>'; 
        btnA.disabled = true; 
        btnA.style.background = "#333";
        btnA.style.color = "#666";
    }

    addLog(`Establishing connection with client node...`, "info");

    setTimeout(() => {
        // Logika Persaingan: 45% kemungkinan order hilang saat di-apply
        if(isGhost && Math.random() < 0.45) { 
            triggerVibration('long');
            addLog(`CONFLICT: Data stream hijacked! Order taken by another driver.`, "error"); 
            card.remove(); 
        } else { 
            addLog("LINK ESTABLISHED: Navigation system active.", "success");
            showSuccessPopup(id); 
            card.remove(); 
        }
    }, 2000);
}





// === 9. SUCCESS SYSTEM ===
let afkTimer;
function showSuccessPopup(id) {
    const price = document.querySelector(`#${id} .reward`).innerText;
    afkTimer = setTimeout(() => {
        closeModal();
        addLog("DIBATALKAN: Anda AFK!", "error");
        document.getElementById(id)?.remove();
    }, 30000);

    openModal("MISSION SECURED", `
        <div style="text-align:center;">
            <h2 style="color:gold; margin:0;">${price}</h2>
            <p style="font-size:11px;">Konfirmasi dalam 30 detik!</p>
            <button class="btn-apply" style="width:100%; padding:15px; margin-top:10px; background:#00f3ff; font-weight:bold;" onclick="startJourney()">JALANKAN</button>
        </div>
    `);
    addExp(25);
}

function startJourney() { 
    clearTimeout(afkTimer); 
    window.location.href = 'tracking-driver.html'; 
}

// === 10. MODAL & UI ENGINE ===
function openModal(t, c) { 
    const modal = document.getElementById('global-modal');
    if(!modal) return;
    
    // Getar halus saat modal muncul
    triggerVibration('short');
    
    document.getElementById('modal-title').innerText = t; 
    document.getElementById('modal-body').innerHTML = c; 
    modal.classList.add('active'); 
    
    // Overlay click untuk menutup modal
    modal.onclick = (e) => { if(e.target === modal) closeModal(); };
}

function closeModal() { 
    const modal = document.getElementById('global-modal');
    if(modal) modal.classList.remove('active'); 
}

// === 11. RPG SYSTEM (Level Up & HP Sync) ===
function addExp(amount) {
    userData.exp += amount;
    
    if(userData.exp >= userData.maxExp) { 
        userData.currentLevel++; 
        userData.exp = userData.exp - userData.maxExp; // Sisa exp tidak hilang
        userData.maxExp += 500; 
        
        // Bonus Level Up
        userData.hp = userData.maxHp; 
        
        triggerVibration('emergency');
        addLog(`CRITICAL UPDATE: Level Up to LVL ${userData.currentLevel}!`, "success");
        
        // Efek visual singkat pada Bar EXP jika ada
        const expBar = document.querySelector('.exp-fill');
        if(expBar) { expBar.style.width = "100%"; setTimeout(() => updateUI(), 500); }
    }
    updateUI();
}

// === 12. UTILITIES (Timer & Haptic Feedback) ===
function startMissionTimer(duration, displayId, cardId) {
    let timeLeft = duration;
    const timerElement = document.getElementById(displayId);
    
    const missionInterval = setInterval(() => {
        const el = document.getElementById(displayId);
        const card = document.getElementById(cardId);
        
        // Jika kartu sudah dihapus manual (Apply/Nego gagal), hentikan timer
        if(!card) { clearInterval(missionInterval); return; }

        if (el) {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            el.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            // Berubah warna jadi merah jika sisa 30 detik
            if(timeLeft <= 30) el.style.color = "#ff003c";
        }

        if (--timeLeft < 0) {
            clearInterval(missionInterval);
            if(card) {
                card.style.opacity = "0";
                card.style.transform = "translateX(50px)";
                card.style.transition = "0.5s all";
                setTimeout(() => {
                    card.remove();
                    addLog("SIGNAL LOST: Misi kadaluarsa.", "error");
                }, 500);
            }
        }
    }, 1000);
}

function triggerVibration(pattern) { 
    if(navigator.vibrate) { 
        const patterns = {
            short: 80, 
            long: [200, 100, 200], 
            emergency: [500, 100, 500, 100, 500] 
        };
        navigator.vibrate(patterns[pattern]); 
    }
}


// === 13. INITIALIZER (Sistem Sinkronisasi) ===
window.onload = () => {
    // 1. Sinkronisasi Awal UI
    updateUI();
    
    // 2. Setup Tampilan Log (Minimalist Start)
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    if(logList) {
        logList.style.display = "none";
        if(chevron) chevron.innerText = "▲";
    }
    
    // 3. Global Haptic (Semua Button)
    document.addEventListener('click', (e) => {
        const target = e.target.closest('button');
        if (target) {
            triggerVibration('short');
        }
    });
    
    // 4. Mission Spawner (Spawn misi hantu setiap 25 detik)
    // Pastikan tidak ada lebih dari 4 misi di layar agar tidak lag
    setInterval(() => {
        const activeMissions = document.querySelectorAll('.quest-card').length;
        if(activeMissions < 4) {
            generateGhostOrder();
        }
    }, 25000);
    
    addLog("SISTEM RADAR AKTIF: Menunggu sinyal klien...", "success");
};



// === 14. FUNGSI MATEMATIKA: HAVERSINE ENGINE ===

/**
 * 14A. Haversine Murni (Angka Saja)
 * Digunakan internal untuk perhitungan tarif agar tidak Error/NaN
 */
function getRawKm(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
    const R = 6371; // Jari-jari Bumi (KM)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
              
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}

/**
 * 14B. Tampilan Jarak & Voice Trigger
 * Dipanggil hanya saat Misi Baru muncul untuk mencegah spam suara.
 */
function formatDistanceAndVoice(kmValue) {
    const dist = parseFloat(kmValue);
    
    // Voice Trigger: Hanya jika Driver Online & Layar aktif
    if (userData.isOnline) {
        const textDist = dist < 1 ? (dist * 1000).toFixed(0) + " meter" : dist.toFixed(1) + " kilometer";
        playRobotVoice(`Sinyal masuk. Jarak jemput ${textDist}`);
    }

    // Kembalikan format teks untuk UI
    return dist < 1 ? (dist * 1000).toFixed(0) + " m" : dist.toFixed(1) + " km";
}

/**
 * 14C. Global Modal Security
 * Menutup modal jika klik di area gelap (overlay)
 */
window.onclick = function(event) {
    const modal = document.getElementById('global-modal');
    if (event.target == modal) {
        closeModal();
    }
};

// === 15. VOICE ENGINE (Cyber-AI TTS) ===
function playRobotVoice(text) {
    // Cek dukungan browser & preferensi suara user (opsional)
    if ('speechSynthesis' in window) {
        // Hentikan suara yang sedang berjalan agar tidak tumpang tindih
        window.speechSynthesis.cancel(); 
        
        const msg = new SpeechSynthesisUtterance(text);
        
        // Setting Suara Robot
        msg.lang = 'id-ID'; 
        msg.pitch = 0.5;    // Sangat berat (Bass)
        msg.rate = 1.2;     // Sedikit lebih cepat agar efisien
        msg.volume = 0.8;   

        // Cari suara pria jika tersedia di sistem
        const voices = window.speechSynthesis.getVoices();
        const maleVoice = voices.find(v => v.name.includes('Indonesian') && v.name.includes('Male'));
        if(maleVoice) msg.voice = maleVoice;

        window.speechSynthesis.speak(msg);
    }
}


// === 16. LOG MINIMIZER ENGINE ===
function toggleLog() {
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    if (!logList) return;

    if (logList.classList.contains('minimized')) {
        logList.classList.remove('minimized');
        logList.style.display = "block";
        if(chevron) chevron.innerText = "▼";
    } else {
        logList.classList.add('minimized');
        logList.style.display = "none";
        if(chevron) chevron.innerText = "▲";
    }
}




// === 17. LOG ENGINE (Smart Auto-Cleaner) ===
function addLog(msg, type = 'info') {
    const logList = document.getElementById('log-list');
    if (!logList) return;

    // Ambil waktu lokal (Format 22:40)
    const time = new Date().toLocaleTimeString('id-ID', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit' 
    });

    // Buat elemen log baru
    const logItem = document.createElement('div');
    logItem.className = `log-item ${type}`;
    logItem.style.marginBottom = "3px";
    logItem.style.fontSize = "10px";
    logItem.innerHTML = `<span style="color:#555;">[${time}]</span> <span class="log-msg">${msg}</span>`;

    // Masukkan log baru di posisi paling atas agar Driver langsung baca
    logList.insertBefore(logItem, logList.firstChild);

    // LOGIKA AUTO-CLEANER:
    // Jika jumlah pesan di dalam log sudah lebih dari 20 baris
    const maxLogs = 20;
    while (logList.children.length > maxLogs) {
        logList.removeChild(logList.lastChild); // Hapus yang paling bawah (paling lama)
    }
}
