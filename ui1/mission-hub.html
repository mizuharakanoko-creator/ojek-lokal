<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
/* 1. EFEK GLITCH DIGITAL (Versi Optimasi) */
.glitch-text {
    /* Menggunakan animasi glitch-anim yang lebih cepat (0.3s) agar terasa lebih futuristik */
    animation: glitch-anim 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
    text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff;
    position: relative;
    display: inline-block;
}

@keyframes glitch-anim {
    0% { transform: translate(0); }
    33% { transform: translate(-1.5px, 1.5px); }
    66% { transform: translate(1.5px, -1.5px); }
    100% { transform: translate(0); }
}

/* 2. WARNA NEON STATUS (Paling Terang) */
.txt-cyan { 
    color: #00f3ff; 
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); 
    font-weight: bold;
    letter-spacing: 1px;
}

.txt-red { 
    color: #ff003c; 
    text-shadow: 0 0 10px rgba(255, 0, 60, 0.8); 
    font-weight: bold;
}

/* 3. TAMBAHAN: Efek Redup saat Offline agar tidak mengganggu mata */
#gps-status.txt-red {
    opacity: 0.8;
    text-shadow: none; /* Menghilangkan glow saat offline agar kontras */
}


.activity-log-container {
    transition: all 0.3s ease;
    border: 1px solid #222;
    margin-top: 10px;
}
.log-body {
    max-height: 150px;
    overflow-y: auto;
    transition: max-height 0.3s ease;
}

.radar-module {
    height: 100px; /* Diperkecil dari sebelumnya */
    margin-bottom: 5px;
}
.map-frame {
    height: 100px;
    background: linear-gradient(180deg, #050505 0%, #111 100%);
    border: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
}
.gps-overlay {
    top: 10px;
    left: 10px;
    font-size: 14px; /* Ukuran teks GPS dipertegas tapi ringkas */
}

.log-item.success .log-msg { color: #00f3ff; } /* Sinyal/Misi */
.log-item.error .log-msg { color: #ff003c; }   /* Error/Cancel */
.log-item.info .log-msg { color: #aaa; }      /* Info Biasa */

.log-body {
    max-height: 120px; /* Membatasi tinggi kotak log agar tidak meluap */
    overflow-y: hidden; /* Sembunyikan scrollbar agar bersih */
}

/* --- OVERLAY MODAL (Latar Belakang Gelap) --- */
#global-modal {
    display: none; /* Sembunyi secara default */
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9); /* Hitam pekat transparan */
    backdrop-filter: blur(4px); /* Efek blur di belakang modal */
    z-index: 10000; /* Pastikan di atas segalanya */
    align-items: center;
    justify-content: center;
}

/* Aktifkan Modal */
#global-modal.active {
    display: flex;
}

/* --- KOTAK KONTEN MODAL --- */
.popup-content.modal-size {
    width: 85%;
    max-width: 350px;
    background: #000;
    border: 1px solid var(--p-cyan);
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
    padding: 20px;
    position: relative;
    animation: modalSlideIn 0.3s ease-out;
}

/* Animasi Muncul */
@keyframes modalSlideIn {
    from { opacity: 0; transform: scale(0.9) translateY(-20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Header Modal (Judul & Tombol X) */
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
    margin-bottom: 15px;
}

#modal-title {
    font-family: 'TerminalFont', monospace;
    color: var(--p-cyan);
    font-size: 14px;
    letter-spacing: 2px;
}

.btn-close {
    background: none;
    border: none;
    color: #555;
    font-size: 18px;
    cursor: pointer;
}

/* --- TOMBOL DI DALAM MODAL --- */
.btn-cancel {
    background: #111;
    color: #fff;
    border: 1px solid #333;
    padding: 10px;
    cursor: pointer;
    font-size: 11px;
}

.btn-apply {
    border: none;
    cursor: pointer;
    font-size: 11px;
    transition: 0.2s;
}

.btn-apply:active {
    transform: scale(0.95);
    filter: brightness(1.2);
}




</style>

</head>

                <option value="99">SEMUA JARAK (RAJIN)</option>

    <section class="activity-log-container" id="log-container">

        <span class="terminal-font">SYSTEM_LOG_v1.0</span>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="clearLog(); event.stopPropagation();" style="background:none; border:none; color:#555; font-size:10px;">[CLEAR]</button>
            <span id="log-chevron" style="color:var(--p-cyan); font-size:12px;">▼</span>

        <div id="global-modal" class="quest-popup" style="display:none;">
    <div class="popup-content modal-size">
        <div class="modal-header">
            <span id="modal-title">SYSTEM SHOP</span>
            <button class="btn-close" onclick="closeModal()">X</button>
        </div>
        <div id="modal-body" class="modal-scroll">

    <div class="streak-tag">

<script>
// === 1. KORE & SECURITY ===
const currentDriverID = localStorage.getItem('current_driver_id');
if (!currentDriverID) { window.location.href = 'login.html'; }
const db = typeof firebase !== 'undefined' ? firebase.database() : null;

// === 2. DATABASE & PLAYER STATS (RPG) ===
const ghostNames = ["Bambang Setiawan", "Siti Aminah", "Eko Prasetyo", "Dewi Lestari", "Budi Santoso", "Putri Utami", "Agus Setiawan", "Rina Permata", "Dedi Kurniawan", "Sri Wahyuni",
    "Andi Saputra", "Maya Sari", "Hendra Wijaya", "Lilis Suryani", "Rian Hidayat", "Siska Amelia", "Aris Munandar", "Ani Mulyani", "Fajar Sidiq", "Indah Permata",
    "Joko Susilo", "Ratih Purwasih", "Dimas Arya", "Novi Susanti", "Yanto Sudrajat", "Mega Utami", "Taufik Hidayat", "Dina Mariana", "Bayu Saputra", "Fitri Handayani",
    "Asep Sunandar", "Elis Rahmawati", "Cecep Mulyana", "Titin Sumarni", "Maman Suherman", "Kokom Komala", "Dadang Subur", "Nanang Kosim", "Eneng Rohayati", "Ujang Hermawan"];
let userData = { hp: 550, maxHp: 1000, exp: 695, maxExp: 2000, isOnline: false, currentLevel: 12 };

// === 3. UI REFRESH & DYNAMIC REGEN (Gabungan Fungsi Regen & Night Buff) ===
function updateUI() {
    document.getElementById('hp-text').innerText = `${Math.floor(userData.hp)}/${userData.maxHp}`;
    document.getElementById('exp-text').innerText = `${userData.exp}/${userData.maxExp}`;
    document.getElementById('hp-fill').style.width = (userData.hp / userData.maxHp) * 100 + "%";
    document.getElementById('exp-fill').style.width = (userData.exp / userData.maxExp) * 100 + "%";
}

setInterval(() => {
    if(!userData.isOnline) return;
    const hours = new Date().getHours();
    const regen = (hours >= 21 || hours <= 4) ? 10 : 5; // Night Buff Otomatis
    if(userData.hp < userData.maxHp) { userData.hp = Math.min(userData.hp + regen, userData.maxHp); updateUI(); }
}, 30000);

// === 4. SYSTEM TOGGLE (GPS Real, Anti-Spam & Visual Sync) ===
let gpsWatcher = null; 
let firstLock = true; // Agar log "Signal Stable" tidak nyepam

function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    const statusLabel = document.getElementById('status-label');
    const radar = document.getElementById('radar-anim');
    const gpsStatus = document.getElementById('gps-status');

    if (userData.isOnline) {
        // Efek Awal saat mencari sinyal
        if(gpsStatus) { 
            gpsStatus.innerText = "SYNCING..."; 
            gpsStatus.className = "txt-cyan glitch-text"; 
        }
        statusLabel.innerText = "CONNECTING...";
        statusLabel.style.color = "gold";

        gpsWatcher = navigator.geolocation.watchPosition((pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            // Logika Visual & Status
            statusLabel.innerText = "ONLINE";
            statusLabel.style.color = "var(--p-cyan)";
            if(radar) radar.classList.add('scanning');
            
            // Efek GPS Live
            if(gpsStatus) { 
                gpsStatus.innerText = "GPS: LIVE"; 
                gpsStatus.classList.add('glitch-text');
                setTimeout(() => gpsStatus.classList.remove('glitch-text'), 2000);
            }
            
            // Logika Log: Hanya muncul sekali agar tidak memenuhi layar
            if (firstLock) {
                addLog("SIGNAL ACQUIRED: Koordinat Real Terkunci.", "success");
                firstLock = false; 
            }

            listenToFirebase(); // Jalankan pengambilan data misi

        }, (err) => {
            addLog("SIGNAL LOST: GPS Terputus!", "error");
            stopGPS();
        }, { 
            enableHighAccuracy: true, 
            maximumAge: 30000, 
            timeout: 27000 
        });

    } else {
        stopGPS();
    }
}

// Fungsi pembantu untuk mematikan sistem secara bersih
function stopGPS() {
    if(gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    const statusLabel = document.getElementById('status-label');
    const gpsStatus = document.getElementById('gps-status');
    const radar = document.getElementById('radar-anim');

    // Reset Semua Status
    statusLabel.innerText = "OFFLINE";
    statusLabel.style.color = "#fff";
    if(radar) radar.classList.remove('scanning');
    
    if(gpsStatus) { 
        gpsStatus.innerText = "GPS: OFFLINE"; 
        gpsStatus.className = "txt-red"; 
    }
    
    if(db) db.ref('missions').off();
    
    // Pastikan Switch & Data Sinkron
    document.getElementById('online-toggle').checked = false;
    userData.isOnline = false;
    firstLock = true; // Reset agar saat online lagi, log muncul kembali
    addLog("System Offline. GPS Disconnected.", "info");
}






// === 5. ORDER GENERATOR (Fixed for Real GPS) ===
function generateGhostOrder() {
    // Misi hanya muncul jika Online DAN GPS sudah terkunci (userCoords tidak null)
    if(!userData.isOnline || !userCoords) return;

    const id = "ghost-" + Math.floor(Math.random() * 9999);
    
    // Buat koordinat palsu yang dekat dengan driver (radius sekitar 0.01 derajat)
    const fakeLat = userCoords.lat + (Math.random() * 0.02 - 0.01);
    const fakeLng = userCoords.lng + (Math.random() * 0.02 - 0.01);

    renderMission({ 
        clientName: ghostNames[Math.floor(Math.random() * ghostNames.length)], 
        price: Math.floor(Math.random() * 35000 + 12000),
        lat: fakeLat,
        lng: fakeLng
    }, id, true);
}



// === 6. MISSION RENDERER (Final Version) ===
function renderMission(data, id, isGhost) {
    // 1. Validasi Awal: Jangan render jika ID sudah ada atau GPS belum siap
    if(document.getElementById(id) || !userCoords) return;

    // 2. Tentukan Titik Target (Misi)
    // Jika Ghost, buat koordinat acak di sekitar driver. Jika Real, pakai data koordinat asli.
    const targetLat = isGhost ? userCoords.lat + (Math.random() * 0.04 - 0.02) : data.lat;
    const targetLng = isGhost ? userCoords.lng + (Math.random() * 0.04 - 0.02) : data.lng;
    
    // 3. Ambil Nilai Angka Jarak (Panggil 15B untuk perhitungan harga)
    const distValue = calculateRealDistanceValue(userCoords.lat, userCoords.lng, targetLat, targetLng);
    
    // 4. Filter Jarak (Hanya munculkan jika masuk dalam radius pilihan driver)
    const filterElement = document.getElementById('distance-filter');
    const filterLimit = filterElement ? parseFloat(filterElement.value) : 999;
    if (distValue > filterLimit) return;

    // 5. Logika Harga (Rp 3.000 per KM, Minimal Rp 10.000)
    // Menggunakan distValue (Angka murni) untuk mencegah Rp NaN
    const rawPrice = Math.max(10000, distValue * 3000);
    const finalPrice = Math.floor(rawPrice / 1000) * 1000; // Bulatkan ke ribuan terdekat
    const priceFormatted = finalPrice.toLocaleString('id-ID');

    // 6. Format Tampilan Jarak (Cegah kata "km" dobel)
    const distanceDisplay = distValue < 1 ? (distValue * 1000).toFixed(0) + " m" : distValue.toFixed(1) + " km";

    // 7. Logika Scam (Hanya untuk Ghost Mission)
    const isScam = isGhost && Math.random() > 0.8;

    const html = `
        <div class="quest-card ${isScam ? 'red-tier' : 'blue-theme'}" id="${id}" data-type="${isGhost ? 'ghost' : 'real'}">
            <details>
                <summary onclick="triggerVibration('short')">
                    <div class="q-summary-grid">
                        <div class="q-client-name terminal-font">${data.clientName}</div>
                        
                        <div class="q-meta-info" style="display:flex; gap:10px; align-items:center;">
                            <span class="${distValue <= 1 ? 'txt-cyan' : ''}" style="font-weight:bold;">${distanceDisplay}</span>
                            <span class="reward q-gold" style="white-space:nowrap;">Rp ${priceFormatted}</span>
                            <span class="timer" id="t-${id}">05:00</span>
                        </div>
                    </div>
                </summary>
                <div class="q-details">
                    <div class="fraud-check ${isScam ? 'danger' : 'safe'}">${isScam ? '⚠️ HIGH RISK DETECTED' : '✓ TRUSTED CLIENT'}</div>
                    <p style="font-size:10px; margin:5px 0; color:#ccc;">Penjemputan terdeteksi di koordinat radar.</p>
                    
                    <div class="action-row" style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn-nego" style="flex:1;" onclick="confirmNego('${id}', ${finalPrice})">NEGO</button>
                        <button class="btn-apply" style="flex:2; background:var(--p-cyan);" onclick="confirmApply('${id}', 25, ${isGhost})">TERIMA MISI</button>
                    </div>
                </div>
            </details>
        </div>`;
    
    // Render ke layar di bawah divider
    const divider = document.querySelector('.section-divider');
    if(divider) divider.insertAdjacentHTML('afterend', html);

    // Jalankan Timer mundur untuk kartu misi ini
    startMissionTimer(300, `t-${id}`, id);
    
    // Trigger suara robot melalui fungsi calculateRealDistance (Nomor 15A)
    calculateRealDistance(userCoords.lat, userCoords.lng, targetLat, targetLng);
}





// === 7. APPLY LOGIC (Briefing & Selection) ===
function confirmApply(id, cost, isGhost) {
    // 1. Cek Stamina
    if(userData.hp < cost) {
        addLog("ENERGI TIDAK CUKUP!", "error");
        return;
    }

    const card = document.getElementById(id);
    const clientName = card.querySelector('.q-client-name').innerText;

    // 2. Buka Modal Briefing (Tampilan Tengah Layar)
    openModal("S-RANK BRIEFING", `
        <div class="briefing-container terminal-font" style="font-size:12px; color:#ccc;">
            <p style="margin-bottom:10px;">> TARGET: <span class="txt-cyan">${clientName}</span></p>
            <p>> COST: <span style="color:#ff003c;">-${cost} HP</span></p>
            <p>> STATUS: <span class="glitch-text">SYNCING...</span></p>
            
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-cancel" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:#fff;" onclick="closeModal()">BATAL</button>
                <button class="btn-apply" style="flex:2; padding:10px; background:var(--p-cyan); font-weight:bold;" onclick="executeApply('${id}', ${cost}, ${isGhost})">TERIMA MISI</button>
            </div>
        </div>
    `);
}

function executeApply(id, cost, isGhost) {
    closeModal();
    userData.hp -= cost; 
    updateUI(); 

    const card = document.getElementById(id);
    const btnA = card.querySelector('.btn-apply');
    const btnN = card.querySelector('.btn-nego');

    if(btnA) { btnA.innerText = "WAITING..."; btnA.disabled = true; }
    if(btnN) { btnN.style.display = "none"; } // Sembunyikan Nego saat proses

    addLog(`Menghubungi ${id}... Mohon tunggu.`, "info");

    setTimeout(() => {
        if(isGhost && Math.random() < 0.4) { 
            addLog("GAGAL: Driver lain lebih cepat!", "error"); 
            card.style.opacity = "0.4";
            setTimeout(() => card.remove(), 1000);
        } else { 
            addLog("MISI DITERIMA! Silakan berangkat.", "success");
            showSuccessPopup(id); 
        }
    }, 2000);
}


// === 8. NEGO LOGIC (Interface & Response) ===
function confirmNego(id, oldPrice) {
    openModal("NEGO HARGA", `
        <div class="nego-container terminal-font" style="text-align:center;">
            <p style="font-size:10px; color:#888; margin-bottom:10px;">MASUKKAN TAWARAN ANDA (Rp)</p>
            <input type="number" id="n-val" value="${oldPrice}" 
                   style="width:100%; padding:12px; background:#111; color:var(--p-cyan); border:1px solid var(--p-cyan); font-family:monospace; text-align:center; font-size:18px; margin-bottom:15px;">
            
            <div style="display:flex; gap:10px;">
                <button class="btn-cancel" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:#fff;" onclick="closeModal()">BATAL</button>
                <button class="btn-apply" style="flex:2; padding:10px; background:gold; color:#000; font-weight:bold;" onclick="executeNego('${id}')">KIRIM TAWARAN</button>
            </div>
        </div>
    `);
}

function executeNego(id) {
    const val = document.getElementById('n-val').value;
    closeModal();
    addLog(`Mengirim penawaran Rp ${parseInt(val).toLocaleString('id-ID')}...`, "info");

    setTimeout(() => {
        // Peluang Nego Diterima (50/50)
        if(Math.random() > 0.5) {
            addLog("NEGO DITERIMA! Harga telah diperbarui.", "success");
            const rewardElement = document.querySelector(`#${id} .reward`);
            if(rewardElement) {
                rewardElement.innerText = `Rp ${parseInt(val).toLocaleString('id-ID')}`;
                rewardElement.classList.add('glitch-text'); // Berikan efek kilau saat harga berubah
                setTimeout(() => rewardElement.classList.remove('glitch-text'), 2000);
            }
        } else { 
            addLog("NEGO DITOLAK: Klien tetap pada harga awal.", "error"); 
        }
    }, 2000);
}


// === 9. SUCCESS SYSTEM (Auto-Cancel & AFK) ===
let afkTimer;
function showSuccessPopup(id) {
    const price = document.querySelector(`#${id} .reward`).innerText;
    afkTimer = setTimeout(() => {
        closeModal(); showNotification("DIBATALKAN: Anda AFK!", "error");
        if(document.getElementById(id)) document.getElementById(id).remove();
    }, 30000);

    openModal("MISSION SECURED", `
        <h2 style="color:gold">${price}</h2>
        <p>Konfirmasi dalam 30 detik!</p>
        <button class="btn-apply" style="width:100%" onclick="startJourney()">JALANKAN</button>
    `);
    addExp(25);
}

function startJourney() { clearTimeout(afkTimer); window.location.href = 'tracking-driver.html'; }

// === 10. MODAL & NOTIFIKASI (UI Engine - Optimized) ===
function openModal(t, c) { 
    const modal = document.getElementById('global-modal');
    document.getElementById('modal-title').innerText = t; 
    document.getElementById('modal-body').innerHTML = c; 
    modal.classList.add('active'); // Menggunakan class agar rapi di tengah
}

function closeModal() { 
    document.getElementById('global-modal').classList.remove('active'); 
}

function showNotification(m, t='success') {
    // Fungsi ini tetap sama, atau bisa diarahkan ke addLog agar lebih ringkas
    addLog(m, t === 'error' ? 'error' : 'success');
}


// === 11. RPG SYSTEM (Level Up & Exp) ===
function addExp(a) {
    userData.exp += a;
    if(userData.exp >= userData.maxExp) { userData.currentLevel++; userData.exp=0; userData.maxExp+=500; userData.hp=userData.maxHp; alert("LVL UP!"); }

// === 12. UTILITIES (Timer & Vibration) ===
function startMissionTimer(d, dId, cId) {
    let t = d;
    const inv = setInterval(() => {
        const el = document.getElementById(dId);
        if(el) el.textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
        if(--t < 0) { clearInterval(inv); document.getElementById(cId)?.remove(); }
    }, 1000);
}
function triggerVibration(p) { if(navigator.vibrate) { const v = {short:100, long:[200,100,200], emergency:[500,100,500]}; navigator.vibrate(v[p]); }}

// === 14. FUNGSI MATEMATIKA: HAVERSINE FORMULA (Engine Jarak & Suara) ===

/**
 * 14A. Fungsi Teks Jarak
 * Digunakan untuk tampilan di Kartu Misi (Contoh: "1.2 km" atau "450 m")
 */
function calculateRealDistance(lat1, lon1, lat2, lon2) {
    const dist = calculateRealDistanceValue(lat1, lon1, lat2, lon2);

    // Trigger Suara Robot jika misi baru terdeteksi (Hanya jika Online)
    if (userData.isOnline) {
        const speakDist = dist < 1 ? (dist * 1000).toFixed(0) + " meter" : dist.toFixed(1) + " kilometer";
        playRobotVoice(`Target terdeteksi. Jarak ${speakDist}`);
    }

    // Mengembalikan string untuk UI
    return dist < 1 ? (dist * 1000).toFixed(0) + " m" : dist.toFixed(1) + " km";
}

/**
 * 14B. Fungsi Nilai Jarak (MURNI ANGKA)
 * WAJIB DIGUNAKAN untuk perhitungan harga agar tidak muncul Rp NaN
 */
function calculateRealDistanceValue(lat1, lon1, lat2, lon2) {
    const R = 6371; // Jari-jari bumi dalam KM
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
              
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; // Mengembalikan angka (Contoh: 1.2543)
}

/**
 * 14C. Modal Event Handler (Safety Exit)
 * Menutup modal secara otomatis jika area luar kotak di-klik
 */
window.addEventListener('click', (event) => {
    const modal = document.getElementById('global-modal');
    if (event.target === modal) {
        closeModal();
    }
});



// === 15. VOICE ENGINE (Text-to-Speech) ===
function playRobotVoice(text) {
    // Cek apakah browser mendukung bicara
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID'; // Bahasa Indonesia
        utterance.pitch = 0.8;    // Suara agak berat (biar keren/misterius)
        utterance.rate = 1.1;     // Kecepatan bicara normal-cepat
        
        // Mainkan suara
        window.speechSynthesis.speak(utterance);
    }
}

// === 16. LOG MINIMIZER ENGINE ===
function toggleLog() {
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    
    // Gunakan class CSS untuk transisi yang lebih halus
    if (logList.classList.contains('minimized')) {
        logList.classList.remove('minimized');
        logList.style.display = "block";
        chevron.innerText = "▼";
    } else {
        logList.classList.add('minimized');
        logList.style.display = "none";
        chevron.innerText = "▲";
    }
}



// === 17. LOG ENGINE (Smart Auto-Cleaner) ===
function addLog(msg, type = 'info') {
    const logList = document.getElementById('log-list');
    if (!logList) return;

    // Ambil waktu lokal (Format 22:40)
    const time = new Date().toLocaleTimeString('id-ID', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit' 
    });

    // Buat elemen log baru
    const logItem = document.createElement('div');
    logItem.className = `log-item ${type}`;
    logItem.style.marginBottom = "3px";
    logItem.style.fontSize = "10px";
    logItem.innerHTML = `<span style="color:#555;">[${time}]</span> <span class="log-msg">${msg}</span>`;

    // Masukkan log baru di posisi paling atas agar Driver langsung baca
    logList.insertBefore(logItem, logList.firstChild);

    // LOGIKA AUTO-CLEANER:
    // Jika jumlah pesan di dalam log sudah lebih dari 20 baris
    const maxLogs = 20;
    while (logList.children.length > maxLogs) {
        logList.removeChild(logList.lastChild); // Hapus yang paling bawah (paling lama)
    }
}
