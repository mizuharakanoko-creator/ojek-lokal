<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Hub - PICK ME</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mission-style.css">
    
   <style>
/* --- ROOT & THEME --- */
:root {
    --p-cyan: #00f3ff;
    --p-pink: #ff00ea;
    --p-red: #ff003c;
    --p-gold: #ffcc00;
    --p-bg: #050505;
    --terminal-font: 'Courier New', monospace;
}

/* --- UI COMPONENTS --- */
.reputation-box {
    border: 1px solid #222;
    padding: 10px;
    background: #000;
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
}

.stats-grid {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    border-top: 1px solid #111;
    border-bottom: 1px solid #111;
    padding: 5px 0;
}

.rate-bar-bg { width: 100%; height: 4px; background: #111; margin: 5px 0; border-radius: 2px; }
.rate-bar-fill { height: 100%; background: var(--p-cyan); box-shadow: 0 0 8px var(--p-cyan); transition: width 1s; }

.fraud-check {
    font-size: 10px; font-weight: bold; padding: 3px; text-align: center; border-radius: 2px; margin-bottom: 5px;
}
.fraud-check.danger { color: var(--p-red); border: 1px solid var(--p-red); background: rgba(255, 0, 60, 0.1); animation: pulse 1s infinite; }

@keyframes pulse { 50% { opacity: 0.5; } }

/* Radar & Log */
.radar-module { height: 100px; margin-bottom: 5px; position: relative; }
.map-frame { height: 100px; background: #050505; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }

.log-body { max-height: 120px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 5px; }
.log-item { font-family: var(--terminal-font); font-size: 10px; margin-bottom: 2px; }
.log-item.success { color: var(--p-cyan); }
.log-item.error { color: var(--p-red); }

/* Modal */
#global-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); z-index: 9999;
    align-items: center; justify-content: center;
}
#global-modal.active { display: flex; }
.popup-content { width: 85%; background: #0a0a0a; border: 1px solid var(--p-cyan); padding: 20px; }

/* Quest Card Styling (Gambar 2 & 4) */
.quest-card { background: #0c0c0c; border: 1px solid #222; margin-bottom: 15px; padding: 10px; position: relative; }
.reward-tag { color: var(--p-gold); font-weight: bold; font-size: 16px; }
</style>
</head>

<body class="mission-body">
    <header class="main-header">
        <div class="header-top">
            <a href="index.html" class="btn-return">« TERMINAL</a>
            <div class="brand-box"><span class="logo">PICK ME</span></div>
            <div class="status-box">
                <span id="status-label">OFFLINE</span>
                <label class="neon-switch">
                    <input type="checkbox" id="online-toggle" onclick="toggleSystem()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <section class="sub-header">
        <div class="resource-stack">
            <div class="res-item">
                <div class="res-label"><span>STAMINA (HP)</span> <span id="hp-text">550/1000</span></div>
                <div class="res-bar"><div id="hp-fill" class="fill hp-glow" style="width: 55%;"></div></div>
            </div>
        </div>
    </section>

    <main class="mission-container">
        <div class="radar-module">
            <div class="map-frame">
                <div id="radar-anim" class="radar-circle"></div>
                <div class="gps-overlay"><span id="gps-status" style="color:red">GPS: OFFLINE</span></div>
            </div>
        </div>

        <section class="activity-log-container">
            <div class="log-header">SYSTEM_LOG_v1.0</div>
            <div id="log-list" class="log-body"></div>
        </section>

        <div id="mission-list-wrapper" style="margin-top:20px;">
            </div>
    </main>

    <div id="global-modal">
        <div class="popup-content">
            <div id="modal-body"></div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 1. KONFIGURASI
const firebaseConfig = {
    apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
    authDomain: "ojeklokal-42b84.firebaseapp.com",
    databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ojeklokal-42b84",
    storageBucket: "ojeklokal-42b84.firebasestorage.app",
    messagingSenderId: "320198748498",
    appId: "1:320198748498:web:3e6038249edc6af20b328b"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();
const currentDriverID = localStorage.getItem('current_driver_id');

let userData = { hp: 550, maxHp: 1000, isOnline: false };
let userCoords = null;
let gpsWatcher = null;

// 2. LOGIKA JARAK & VOICE
function getRawKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function playRobotVoice(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'id-ID'; msg.pitch = 0.8; msg.rate = 1;
        window.speechSynthesis.speak(msg);
    }
}

// 3. SYSTEM CONTROL
function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    const statusLabel = document.getElementById('status-label');
    const radar = document.getElementById('radar-anim');

    if (userData.isOnline) {
        statusLabel.innerText = "ONLINE"; statusLabel.style.color = "#00f3ff";
        radar.classList.add('scanning');
        startGpsTracking();
        listenToFirebase();
        addLog("RADAR AKTIF: Mencari misi real...", "success");
    } else {
        statusLabel.innerText = "OFFLINE"; statusLabel.style.color = "#fff";
        radar.classList.remove('scanning');
        stopGpsTracking();
        db.ref('missions').off();
        document.getElementById('mission-list-wrapper').innerHTML = "";
        addLog("SYSTEM OFFLINE.", "error");
    }
}

function startGpsTracking() {
    if (navigator.geolocation) {
        gpsWatcher = navigator.geolocation.watchPosition(pos => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('gps-status').innerText = "GPS: LIVE";
            document.getElementById('gps-status').style.color = "#00f3ff";
        }, err => console.error(err), { enableHighAccuracy: true });
    }
}

function stopGpsTracking() {
    if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    document.getElementById('gps-status').innerText = "GPS: OFFLINE";
    document.getElementById('gps-status').style.color = "red";
}

// 4. FIREBASE LISTENER (Sesuai Gambar 1)
function listenToFirebase() {
    // Kita filter hanya misi yang berstatus "searching"
    db.ref('missions').orderByChild('status').equalTo('searching').on('value', snapshot => {
        const wrapper = document.getElementById('mission-list-wrapper');
        wrapper.innerHTML = "";
        
        const data = snapshot.val();
        if (!data) return;

        Object.keys(data).forEach(key => {
            const m = data[key];
            
            // Hitung Jarak Real dari posisi Driver (Gambar 2 & 4)
            let radius = "?.? km";
            if (userCoords && m.pickupCoords) {
                const [mLat, mLng] = m.pickupCoords.split(',').map(Number);
                const km = getRawKm(userCoords.lat, userCoords.lng, mLat, mLng);
                radius = km.toFixed(1) + " km";
                
                // Alert Suara jika misi baru (radius dekat)
                if (km < 3) playRobotVoice("Misi baru terdeteksi dalam jangkauan.");
            }

            renderMissionCard(m, radius);
        });
    });
}

// 5. RENDERER (Sesuai Gambar 2, 3, 4)
function renderMissionCard(m, radius) {
    const wrapper = document.getElementById('mission-list-wrapper');
    const successRate = m.clientStats ? 
        ((m.clientStats.like / (m.clientStats.like + m.clientStats.dislike || 1)) * 100).toFixed(1) : "100";
    
    // Logika Risk Detection (Gambar 4)
    const isHighRisk = m.clientReputationLabel === "BERESIKO";
    const riskHTML = isHighRisk ? `<div class="fraud-check danger">⚠️ HIGH RISK DETECTED</div>` : "";

    const html = `
        <div class="quest-card" id="card-${m.id}">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <div style="font-family:Orbitron; font-size:14px; color:#fff;">${m.clientName.toUpperCase()}</div>
                    <div style="font-size:11px; color:cyan;">📍 Radius: ${radius}</div>
                </div>
                <div class="reward-tag">Rp ${m.price.toLocaleString('id-ID')}</div>
            </div>

            <div style="background:#111; padding:8px; margin:10px 0; border:1px solid #222;">
                <div style="color:gold; font-size:11px;">ESTIMASI TUJUAN:</div>
                <div style="color:#fff; font-size:12px;">${m.destinationName}</div>
            </div>

            ${riskHTML}

            <div class="reputation-box">
                <div style="margin-bottom:5px;">REPUTATION: <span style="color:${isHighRisk?'red':'#00f3ff'}">${m.clientReputationLabel || 'NETRAL'}</span></div>
                <div class="stats-grid">
                    <span>LIKE<br><b style="color:cyan">${m.clientStats?.like || 0}</b></span>
                    <span>DISLIKE<br><b style="color:red">${m.clientStats?.dislike || 0}</b></span>
                    <span>RANK<br><b style="color:magenta">${m.clientRankTier || 'TERI'}</b></span>
                </div>
                <div style="font-size:10px;">Success Rate: ${successRate}%</div>
                <div class="rate-bar-bg"><div class="rate-bar-fill" style="width:${successRate}%"></div></div>
                <div style="margin-top:5px; color:gray;">"${m.note || 'Hati-hati di jalan.'}"</div>
            </div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="confirmMission('${m.id}', ${m.price})" style="flex:2; padding:12px; background:cyan; border:none; font-weight:bold; cursor:pointer;">TERIMA MISI</button>
                <button onclick="negoPrice('${m.id}')" style="flex:1; background:transparent; border:1px solid gold; color:gold;">NEGO</button>
            </div>
        </div>
    `;
    wrapper.innerHTML += html;
}

// 6. ACTION FUNCTIONS
function confirmMission(mId, price) {
    if (userData.hp < 50) return alert("STAMINA (HP) TIDAK CUKUP!");

    document.getElementById('global-modal').classList.add('active');
    document.getElementById('modal-body').innerHTML = `
        <div style="text-align:center; color:#fff;">
            <h3 style="color:cyan;">KONFIRMASI MISI</h3>
            <p>Anda akan menggunakan 50 HP untuk misi ini.</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#333; color:#fff; border:none;">BATAL</button>
                <button onclick="executeApply('${mId}')" style="flex:1; padding:10px; background:cyan; color:#000; border:none; font-weight:bold;">AMBIL SEKARANG</button>
            </div>
        </div>
    `;
}

function executeApply(mId) {
    // Update Firebase: Ubah status misi & pasang driverId
    db.ref('missions/' + mId).update({
        status: "on_process",
        driverId: currentDriverID,
        acceptedAt: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
        userData.hp -= 50;
        updateUI();
        closeModal();
        addLog("MISI BERHASIL DIAMBIL!", "success");
        // Redirect ke halaman tracking
        setTimeout(() => window.location.href = "tracking-driver.html?id=" + mId, 1000);
    });
}

function closeModal() { document.getElementById('global-modal').classList.remove('active'); }

function addLog(msg, type) {
    const list = document.getElementById('log-list');
    const time = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    const item = `<div class="log-item ${type}">[${time}] ${msg}</div>`;
    list.insertAdjacentHTML('afterbegin', item);
}

function updateUI() {
    document.getElementById('hp-text').innerText = `${userData.hp}/1000`;
    document.getElementById('hp-fill').style.width = (userData.hp / 10) + "%";
}

window.onload = updateUI;
</script>
</body>
</html>
