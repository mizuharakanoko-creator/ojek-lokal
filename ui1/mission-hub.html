   <style>
/* --- 0. ROOT VARIABLES --- */
:root {
    --p-cyan: #00f3ff;
    --p-pink: #ff00ea;
    --p-red: #ff003c;
    --p-gold: #ffcc00;
    --p-bg: #050505;
    --terminal-font: 'Courier New', monospace;
}

/* --- 1. EFEK GLITCH DIGITAL --- */
.glitch-text {
    animation: glitch-anim 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
    text-shadow: 1px 0 var(--p-pink), -1px 0 var(--p-cyan);
    position: relative;
    display: inline-block;
}

@keyframes glitch-anim {
    0% { transform: translate(0); }
    33% { transform: translate(-1.5px, 1.5px); }
    66% { transform: translate(1.5px, -1.5px); }
    100% { transform: translate(0); }
}

/* --- 2. WARNA NEON & STATUS --- */
.txt-cyan { 
    color: var(--p-cyan); 
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); 
    font-weight: bold;
    letter-spacing: 1px;
}

.txt-red { 
    color: var(--p-red); 
    text-shadow: 0 0 10px rgba(255, 0, 60, 0.8); 
    font-weight: bold;
}

#gps-status.txt-red {
    opacity: 0.8;
    text-shadow: none;
}

.q-gold { color: var(--p-gold); font-weight: bold; }

/* --- 3. REPUTATION BOX (Detail Gambar 2 & 3) --- */
.reputation-box {
    border: 1px solid #222;
    padding: 10px;
    background: #000;
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    font-family: var(--terminal-font);
}

.stats-grid {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    border-top: 1px solid #111;
    border-bottom: 1px solid #111;
    padding: 5px 0;
    text-align: center;
}

.stats-grid span { display: block; font-size: 12px; }

/* Progress Bar Success Rate */
.rate-bar-bg {
    width: 100%;
    height: 4px;
    background: #111;
    margin: 5px 0;
    border-radius: 2px;
}

.rate-bar-fill {
    height: 100%;
    background: var(--p-cyan);
    box-shadow: 0 0 8px var(--p-cyan);
    transition: width 1s ease-in-out;
}

/* Fraud Check Labels */
.fraud-check {
    font-size: 10px;
    font-weight: bold;
    padding: 3px 0;
    text-align: center;
    border-radius: 2px;
    text-transform: uppercase;
}
.fraud-check.safe { color: var(--p-cyan); border: 1px solid var(--p-cyan); background: rgba(0, 243, 255, 0.05); }
.fraud-check.danger { color: var(--p-red); border: 1px solid var(--p-red); background: rgba(255, 0, 60, 0.05); animation: pulse 1s infinite; }

@keyframes pulse { 50% { opacity: 0.5; } }

/* --- 4. RADAR & LOG MODULE --- */
.radar-module { height: 100px; margin-bottom: 5px; }
.map-frame {
    height: 100px;
    background: linear-gradient(180deg, #050505 0%, #111 100%);
    border: 1px solid #222;
    display: flex;
    align-items: center; justify-content: center;
}

.activity-log-container {
    transition: all 0.3s ease;
    border: 1px solid #222;
    margin-top: 10px;
    background: #000;
}

.log-body {
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: none; /* Sembunyikan scrollbar Firefox */
}
.log-body::-webkit-scrollbar { display: none; } /* Sembunyikan scrollbar Chrome/Safari */

.log-item.success .log-msg { color: var(--p-cyan); }
.log-item.error .log-msg { color: var(--p-red); }
.log-item.info .log-msg { color: #888; }

.minimized { height: 35px !important; overflow: hidden; }

/* --- 5. OVERLAY MODAL (Engine Gambar 1) --- */
#global-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
    z-index: 10000;
    align-items: center; justify-content: center;
}

#global-modal.active { display: flex; }

.popup-content.modal-size {
    width: 85%;
    max-width: 320px;
    background: #050505;
    border: 1px solid var(--p-cyan);
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
    padding: 20px;
    border-radius: 4px;
    animation: modalSlideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- 6. BUTTONS & UI INTERACTION --- */
.action-row button {
    padding: 10px;
    font-family: var(--terminal-font);
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.2s;
}

.btn-nego {
    background: transparent;
    color: var(--p-gold);
    border: 1px solid var(--p-gold);
}

.btn-apply {
    background: var(--p-cyan);
    color: #000;
    border: none;
}

.btn-cancel {
    background: #111;
    color: #fff;
    border: 1px solid #333;
}

button:active { transform: scale(0.95); filter: brightness(1.2); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Font khusus untuk kesan terminal driver */
.terminal-font { font-family: var(--terminal-font); letter-spacing: 1px; }



/* Styling Rute Pengantaran */
.route-info {
    background: #0a0a0a;
    padding: 12px;
    border-radius: 4px;
    margin-bottom: 10px;
    border-left: 3px solid var(--p-cyan);
}

.route-step {
    font-size: 13px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
}

.route-line {
    width: 2px;
    height: 15px;
    background: #222;
    margin-left: 6px;
    border-left: 1px dashed #444;
}

.icon {
    font-size: 10px;
    color: var(--p-cyan);
}


</style>


</head>
<body class="mission-body">

    <header class="main-header">
        <div class="header-top">
            <a href="index.html" class="btn-return">« TERMINAL</a>
            <div class="brand-box">
                <span class="logo">PICK ME</span>
                <span class="sub-logo">MISSION HUB</span>
            </div>
            <div class="status-box">
                <span id="status-label">OFFLINE</span>

                    <input type="checkbox" id="online-toggle" onclick="toggleSystem()">
                    <span class="slider"></span>

    <section class="sub-header">

            <div class="weather-tag">🌧️ NIGHT BUFF: EXP 1.5x</div>

        </div>
        
        <div class="resource-stack">
            <div class="res-item">
                <div class="res-label"><span>STAMINA (HP)</span> <span id="hp-text">550/1000</span></div>
                <div class="res-bar"><div id="hp-fill" class="fill hp-glow" style="width: 55%;"></div></div>
            </div>
            <div class="res-item">
                <div class="res-label"><span>EXP GAIN</span> <span id="exp-text">695/2000</span></div>

    <main class="mission-container">
    <div class="radar-module">
        <div class="map-frame">
            <div id="radar-anim" class="radar-circle"></div>
            <div class="heatmap-point pulse" style="top:50%; left:50%;"></div>
            
            <div class="gps-overlay">
                <span id="gps-status" class="txt-red">GPS: OFFLINE</span>
            </div>
        </div>
    </div>

    <div class="filter-wrapper" style="padding: 10px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="terminal-font" style="font-size: 10px; color: #555;">SCANNING_RADIUS</span>
            <select id="distance-filter" style="background: #000; color: var(--p-cyan); border: 1px solid #444; font-size: 10px; padding: 5px; text-transform: uppercase;">
                <option value="99">SEMUA JARAK (RAJIN)</option>
                <option value="1">MAKS 1.0 KM (DEKAT)</option>

            </select>
        </div>
    </div>

    <div class="section-divider" style="height: 1px; background: #222; margin-bottom: 10px;"></div>

    <section class="activity-log-container" id="log-container">
    <div class="log-header" onclick="toggleLog()" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
        <span class="terminal-font">SYSTEM_LOG_v1.0</span>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="clearLog(); event.stopPropagation();" style="background:none; border:none; color:#555; font-size:10px;">[CLEAR]</button>
            <span id="log-chevron" style="color:var(--p-cyan); font-size:12px;">▼</span>
        </div>
    </div>
    <div id="log-list" class="log-body">
        </div>
</section>

</main>


    <footer class="main-footer">
        <button class="f-btn">🛒 SHOP</button>
        <button class="f-btn highlight">🏆 RANKING</button>
        <button class="f-btn red-alert">⚡ REFILL</button>
    

        <div id="global-modal" class="quest-popup" style="display:none;">
    <div class="popup-content modal-size">
        <div class="modal-header">
            <span id="modal-title">SYSTEM SHOP</span>
            <button class="btn-close" onclick="closeModal()">X</button>
        </div>
        <div id="modal-body" class="modal-scroll">
            </div>

    <div class="streak-tag">
    STREAK: 
    <span id="streak-dots">
        <span class="streak-dot"></span>
        <span class="streak-dot"></span>

<script>
// === 1. KORE & SECURITY ===
const currentDriverID = localStorage.getItem('current_driver_id');
if (!currentDriverID) { window.location.href = 'login.html'; }
const db = typeof firebase !== 'undefined' ? firebase.database() : null;

// === 2. DATABASE & PLAYER STATS (RPG) ===
const ghostNames = ["Bambang Setiawan", "Siti Aminah", "Eko Prasetyo", "Dewi Lestari", "Budi Santoso", "Putri Utami", "Agus Setiawan", "Rina Permata", "Dedi Kurniawan", "Sri Wahyuni",
    "Andi Saputra", "Maya Sari", "Hendra Wijaya", "Lilis Suryani", "Rian Hidayat", "Siska Amelia", "Aris Munandar", "Ani Mulyani", "Fajar Sidiq", "Indah Permata",
    "Joko Susilo", "Ratih Purwasih", "Dimas Arya", "Novi Susanti", "Yanto Sudrajat", "Mega Utami", "Taufik Hidayat", "Dina Mariana", "Bayu Saputra", "Fitri Handayani",
    "Asep Sunandar", "Elis Rahmawati", "Cecep Mulyana", "Titin Sumarni", "Maman Suherman", "Kokom Komala", "Dadang Subur", "Nanang Kosim", "Eneng Rohayati", "Ujang Hermawan"];
let userData = { hp: 550, maxHp: 1000, exp: 695, maxExp: 2000, isOnline: false, currentLevel: 12 };

// === 3. UI REFRESH & DYNAMIC REGEN (Gabungan Fungsi Regen & Night Buff) ===
function updateUI() {
    document.getElementById('hp-text').innerText = `${Math.floor(userData.hp)}/${userData.maxHp}`;
    document.getElementById('exp-text').innerText = `${userData.exp}/${userData.maxExp}`;
    document.getElementById('hp-fill').style.width = (userData.hp / userData.maxHp) * 100 + "%";
    document.getElementById('exp-fill').style.width = (userData.exp / userData.maxExp) * 100 + "%";
}

setInterval(() => {
    if(!userData.isOnline) return;
    const hours = new Date().getHours();
    const regen = (hours >= 21 || hours <= 4) ? 10 : 5; // Night Buff Otomatis
    if(userData.hp < userData.maxHp) { userData.hp = Math.min(userData.hp + regen, userData.maxHp); updateUI(); }
}, 30000);

// === 4. SYSTEM TOGGLE (GPS Real, Anti-Spam & Visual Sync) ===
let gpsWatcher = null; 
let firstLock = true; // Agar log "Signal Stable" tidak nyepam

function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    const statusLabel = document.getElementById('status-label');
    const radar = document.getElementById('radar-anim');
    const gpsStatus = document.getElementById('gps-status');

    if (userData.isOnline) {
        // Efek Awal saat mencari sinyal
        if(gpsStatus) { 
            gpsStatus.innerText = "SYNCING..."; 
            gpsStatus.className = "txt-cyan glitch-text"; 
        }
        statusLabel.innerText = "CONNECTING...";
        statusLabel.style.color = "gold";

        gpsWatcher = navigator.geolocation.watchPosition((pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            // Logika Visual & Status
            statusLabel.innerText = "ONLINE";
            statusLabel.style.color = "var(--p-cyan)";
            if(radar) radar.classList.add('scanning');
            
            // Efek GPS Live
            if(gpsStatus) { 
                gpsStatus.innerText = "GPS: LIVE"; 
                gpsStatus.classList.add('glitch-text');
                setTimeout(() => gpsStatus.classList.remove('glitch-text'), 2000);
            }
            
            // Logika Log: Hanya muncul sekali agar tidak memenuhi layar
            if (firstLock) {
                addLog("SIGNAL ACQUIRED: Koordinat Real Terkunci.", "success");
                firstLock = false; 
            }

            listenToFirebase(); // Jalankan pengambilan data misi

        }, (err) => {
            addLog("SIGNAL LOST: GPS Terputus!", "error");
            stopGPS();
        }, { 
            enableHighAccuracy: true, 
            maximumAge: 30000, 
            timeout: 27000 
        });

    } else {
        stopGPS();
    }
}

// Fungsi pembantu untuk mematikan sistem secara bersih
function stopGPS() {
    if(gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    const statusLabel = document.getElementById('status-label');
    const gpsStatus = document.getElementById('gps-status');
    const radar = document.getElementById('radar-anim');

    // Reset Semua Status
    statusLabel.innerText = "OFFLINE";
    statusLabel.style.color = "#fff";
    if(radar) radar.classList.remove('scanning');
    
    if(gpsStatus) { 
        gpsStatus.innerText = "GPS: OFFLINE"; 
        gpsStatus.className = "txt-red"; 
    }
    
    if(db) db.ref('missions').off();
    
    // Pastikan Switch & Data Sinkron
    document.getElementById('online-toggle').checked = false;
    userData.isOnline = false;
    firstLock = true; // Reset agar saat online lagi, log muncul kembali
    addLog("System Offline. GPS Disconnected.", "info");
}






// === 5. ORDER GENERATOR (Sinkronisasi Tarif Pemesan + Bonus Urgent) ===
function generateGhostOrder() {
    if(!userData.isOnline || !userCoords) return;

    const id = "ghost-" + Math.floor(Math.random() * 9999);
    
    const locations = ["Ciporang", "Cipasung", "Ancaran", "Kuningan Kota", "Cirendang", "Kadugede"];
    const pickup = locations[Math.floor(Math.random() * locations.length)];
    let dropoff = locations[Math.floor(Math.random() * locations.length)];
    while(dropoff === pickup) dropoff = locations[Math.floor(Math.random() * locations.length)];

    // 1. Jarak Real (Simulasi dist * 1.5 seperti kode pemesan)
    const rawDist = parseFloat((Math.random() * 8 + 1).toFixed(1));
    const calcKm = rawDist * 1.5; 

    // 2. Faktor Wilayah (Simulasi desa.diff)
    const diff = 1.0 + (Math.random() * 0.2);
    const roundToThousands = (num) => Math.ceil(num / 1000) * 1000;

    // 3. Penentuan Tipe & Bonus Urgent 20%
    const isUrgent = Math.random() > 0.7;
    const missionType = isUrgent ? "URGENT MISSION" : "REGULAR DELIVERY";
    
    // Tarif dasar: Mengikuti standar Reguler Pemesan (3000/km)
    let basePrice = (calcKm * 3000) * diff;
    
    // Kalkulasi Akhir
    let finalPrice;
    if(isUrgent) {
        // Urgent menggunakan tier Express (4000/km) + Bonus Tambahan 20%
        let urgentBase = (calcKm * 4000) * diff;
        finalPrice = roundToThousands(urgentBase * 1.2); 
        finalPrice = Math.max(18000, finalPrice); // Min 18rb untuk Urgent
    } else {
        finalPrice = Math.max(12000, roundToThousands(basePrice));
    }

    // 4. Metadata Reputasi (Gambar 2 & 3)
    const likes = Math.floor(Math.random() * 150 + 10);
    const dislikes = Math.floor(Math.random() * 5);
    const rate = (100 - (dislikes * 1.5) - (Math.random() * 2)).toFixed(1);

    renderMission({ 
        clientName: ghostNames[Math.floor(Math.random() * ghostNames.length)], 
        pickupPoint: pickup,
        dropoffPoint: dropoff,
        tripDist: parseFloat(calcKm.toFixed(1)),
        finalPrice: finalPrice,
        reputation: likes > 100 ? "TRUSTWORTHY" : "MORTAL",
        likes: likes,
        dislikes: dislikes,
        rank: likes > 100 ? "MORAL" : "NEUTRAL",
        successRate: rate,
        memberSince: "Mar 2026",
        type: missionType,
        noted: isUrgent ? "URGENT! Tolong prioritaskan pengantaran ini." : "Antar sesuai titik jemput, terima kasih."
    }, id, true);
}


// === 6. MISSION RENDERER (Restorasi UI Elegan + Night Mode Effect) ===
function renderMission(data, id, isGhost) {
    if(document.getElementById(id)) return;

    const priceFormatted = data.finalPrice.toLocaleString('id-ID');
    const isUrgent = data.type === "URGENT MISSION";
    
    // Night Mode Effect
    const isNight = document.querySelector('.night-buff') || (new Date().getHours() >= 18 || new Date().getHours() < 6);
    
    // Logika Warna Aksen
    let accentColor = isNight ? "#ff00ea" : "#00f3ff"; // Ungu vs Cyan
    if(isUrgent) accentColor = "#ff003c"; // Merah jika Urgent

    const html = `
        <div class="quest-card blue-theme" id="${id}" style="border-left: 3px solid ${accentColor}; ${isUrgent ? 'box-shadow: inset 0 0 15px rgba(255,0,60,0.1);' : ''}">
            <details open>
                <summary onclick="triggerVibration('short')">
                    <div class="q-summary-grid">
                        <div class="q-client-name terminal-font">
                            ${isUrgent ? '<span style="color:#ff003c; font-weight:bold; animation: blink 0.8s infinite;">[!]</span> ' : ''}${data.clientName} 
                            <span style="color:${accentColor}; font-size:14px; margin-left:5px;">${data.tripDist} km</span>
                        </div>
                        <div class="q-meta-info" style="display:flex; gap:10px; align-items:center;">
                            <span class="reward q-gold" style="font-weight:bold; ${isUrgent ? 'color:#ff003c; text-shadow: 0 0 5px rgba(255,0,60,0.5);' : ''}">Rp ${priceFormatted}</span>
                            <span class="timer" id="t-${id}" style="border: 1px solid #ff003c; padding: 2px 5px; color: #ff003c; font-size: 10px;">05:00</span>
                        </div>
                    </div>
                </summary>
                <div class="q-details" style="padding: 15px 10px;">
                    <div class="route-display" style="border-left: 1px dashed #444; margin-left: 5px; padding-left: 15px; position: relative; margin-bottom: 15px;">
                        <div style="position: absolute; left: -4px; top: 0; color: ${accentColor}">◎</div>
                        <div style="font-size: 12px; color: #fff; margin-bottom: 10px;"><b>${data.pickupPoint}</b> <span style="color:#666; font-size:10px;">(Jemput)</span></div>
                        <div style="position: absolute; left: -4px; bottom: 0; color: #ff003c">▼</div>
                        <div style="font-size: 12px; color: #fff;"><b>${data.dropoffPoint}</b> <span style="color:#666; font-size:10px;">(Tujuan)</span></div>
                    </div>

                    <div class="reputation-container" style="background: rgba(255,255,255,0.03); padding: 10px; border: 1px solid #222;">
                        <div style="font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px;">Reputation: <span style="color:${data.reputation === 'TRUSTWORTHY' ? accentColor : '#ff003c'}">${data.reputation}</span></div>
                        
                        <div class="stats-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                            <div style="background:#111; padding: 5px; text-align: center; font-size: 9px;">LIKE<br><span style="color:${accentColor}">${data.likes}</span></div>
                            <div style="background:#111; padding: 5px; text-align: center; font-size: 9px;">DISLIKE<br><span style="color:#ff003c}">${data.dislikes}</span></div>
                            <div style="background:#111; padding: 5px; text-align: center; font-size: 9px;">RANK<br><span style="color:#ff00ea">${data.rank}</span></div>
                        </div>

                        <div style="font-size: 11px; margin: 3px 0; color: #aaa;">Member Since: <span style="color:#fff">${data.memberSince}</span></div>
                        <div style="font-size: 11px; margin: 3px 0; color: #aaa;">Success Rate: <span style="color:#fff">${data.successRate}%</span></div>
                        
                        <div class="rate-bar-bg" style="width:100%; height:4px; background:#000; margin: 8px 0; border: 1px solid #222;">
                            <div class="rate-bar-fill" style="width:${data.successRate}%; height:100%; background:${accentColor}; box-shadow: 0 0 8px ${accentColor}; transition: width 1s ease-in-out;"></div>
                        </div>

                        <div style="font-size: 11px; color: ${isUrgent ? '#ff003c' : 'gold'}; margin-top: 5px; font-weight: bold; border-top: 1px solid #222; padding-top: 5px;">Type: ${data.type}</div>
                        <div style="font-size: 11px; color: #777; font-style: italic; margin-top: 5px;">"${data.noted}"</div>
                    </div>

                    <div class="action-row" style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-nego" style="flex:1; background:transparent; border:1px solid gold; color:gold; height: 40px;" onclick="confirmNego('${id}', ${data.finalPrice})">NEGO</button>
                        <button class="btn-apply" style="flex:2; background:${accentColor}; color:#000; font-weight:bold; height: 40px; border:none; clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);" onclick="confirmApply('${id}', 25, ${isGhost})">TERIMA MISI</button>
                    </div>
                </div>
            </details>
        </div>`;
    
    document.querySelector('.section-divider').insertAdjacentHTML('afterend', html);
    startMissionTimer(300, `t-${id}`, id);

    if (isGhost) {
        setTimeout(() => {
            const card = document.getElementById(id);
            if (card && !card.querySelector('.btn-apply').disabled) {
                addLog(`MISI TERLEWAT: ${data.clientName} diambil driver lain.`, "error");
                card.remove();
            }
        }, Math.floor(Math.random() * 20000) + 15000);
    }
}


// === 7. APPLY LOGIC (Update Notif & Cleanup) ===
function confirmApply(id, cost, isGhost) {
    if(userData.hp < cost) { addLog("HP TIDAK CUKUP!", "error"); return; }
    
    const card = document.getElementById(id);
    const clientName = card.querySelector('.q-client-name').innerText;

    openModal("KONFIRMASI MISI", `
        <div class="terminal-font" style="text-align:center;">
            <p style="color:#888;">TARGET: ${clientName}</p>
            <p style="font-size:18px; color:#ff003c;">-${cost} HP</p>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#222; color:#fff; border:none;">BATAL</button>
                <button onclick="executeApply('${id}', ${cost}, ${isGhost})" style="flex:2; padding:10px; background:#00f3ff; color:#000; border:none; font-weight:bold;">AMBIL</button>
            </div>
        </div>
    `);
}

function executeApply(id, cost, isGhost) {
    closeModal();
    const card = document.getElementById(id);
    if(!card) return;

    userData.hp -= cost; 
    updateUI(); 

    const btnA = card.querySelector('.btn-apply');
    if(btnA) { btnA.innerText = "WAITING..."; btnA.disabled = true; }

    addLog(`Menghubungi client...`, "info");

    setTimeout(() => {
        if(isGhost && Math.random() < 0.45) { 
            addLog(`GAGAL: ${id} sudah diambil driver lain!`, "error"); 
            card.remove(); 
        } else { 
            addLog("MISI DITERIMA! Sistem navigasi aktif.", "success");
            showSuccessPopup(id); 
            card.remove(); 
        }
    }, 2000);
}

// === 8. NEGO LOGIC (Update Visual Nego) ===
function confirmNego(id, oldPrice) {
    openModal("NEGO HARGA", `
        <div class="terminal-font">
            <input type="number" id="n-val" value="${oldPrice}" style="width:100%; padding:15px; background:#111; color:gold; border:1px solid gold; text-align:center; font-size:20px;">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#222; color:#fff; border:none;">BATAL</button>
                <button onclick="executeNego('${id}')" style="flex:2; padding:10px; background:gold; color:#000; border:none; font-weight:bold;">KIRIM TAWARAN</button>
            </div>
        </div>
    `);
}

function executeNego(id) {
    const val = document.getElementById('n-val').value;
    closeModal();
    addLog(`Mengirim penawaran Rp ${parseInt(val).toLocaleString('id-ID')}...`, "info");

    setTimeout(() => {
        const card = document.getElementById(id);
        if(!card) return;

        if(Math.random() > 0.5) {
            addLog("NEGO DITERIMA!", "success");
            card.querySelector('.reward').innerText = `Rp ${parseInt(val).toLocaleString('id-ID')}`;
            card.querySelector('.reward').style.color = "gold";
        } else { 
            addLog("NEGO DITOLAK: Client memilih driver lain.", "error"); 
            card.remove(); 
        }
    }, 1500);
}







// === 9. SUCCESS SYSTEM ===
let afkTimer;
function showSuccessPopup(id) {
    const price = document.querySelector(`#${id} .reward`).innerText;
    afkTimer = setTimeout(() => {
        closeModal();
        addLog("DIBATALKAN: Anda AFK!", "error");
        document.getElementById(id)?.remove();
    }, 30000);

    openModal("MISSION SECURED", `
        <div style="text-align:center;">
            <h2 style="color:gold; margin:0;">${price}</h2>
            <p style="font-size:11px;">Konfirmasi dalam 30 detik!</p>
            <button class="btn-apply" style="width:100%; padding:15px; margin-top:10px; background:#00f3ff; font-weight:bold;" onclick="startJourney()">JALANKAN</button>
        </div>
    `);
    addExp(25);
}

function startJourney() { 
    clearTimeout(afkTimer); 
    window.location.href = 'tracking-driver.html'; 
}

// === 10. MODAL & UI ENGINE ===
function openModal(t, c) { 
    const modal = document.getElementById('global-modal');
    if(!modal) return;
    document.getElementById('modal-title').innerText = t; 
    document.getElementById('modal-body').innerHTML = c; 
    modal.classList.add('active'); 
}

function closeModal() { 
    document.getElementById('global-modal').classList.remove('active'); 
}



// === 11. RPG SYSTEM (Level Up & Exp) ===
function addExp(a) {
    userData.exp += a;
    if(userData.exp >= userData.maxExp) { userData.currentLevel++; userData.exp=0; userData.maxExp+=500; userData.hp=userData.maxHp; alert("LVL UP!"); }
    updateUI();
}

// === 12. UTILITIES (Timer & Vibration) ===
function startMissionTimer(d, dId, cId) {
    let t = d;
    const inv = setInterval(() => {
        const el = document.getElementById(dId);
        if(el) el.textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
        if(--t < 0) { clearInterval(inv); document.getElementById(cId)?.remove(); }
    }, 1000);
}
function triggerVibration(p) { if(navigator.vibrate) { const v = {short:100, long:[200,100,200], emergency:[500,100,500]}; navigator.vibrate(v[p]); }}


// === 13. INITIALIZER (Haptic & Start Engine) ===
window.onload = () => {
    updateUI();
    
    // Tutup log secara otomatis saat awal masuk agar layar lega (Cyber-look)
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    if(logList) {
        logList.classList.add('minimized');
        logList.style.display = "none";
        if(chevron) chevron.innerText = "▲";
    }
    
    // Global Event Listener untuk Getar Tombol (Menggunakan Delegation agar tombol baru tetap getar)
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
            triggerVibration('short');
        }
    });
    
    // Interval pemunculan misi hantu (Setiap 25 detik)
    setInterval(() => generateGhostOrder(), 25000);
    
    addLog("SISTEM RADAR AKTIF...", "success");
};

// === 14. FUNGSI MATEMATIKA: HAVERSINE FORMULA (Engine Jarak & Suara) ===

/**
 * 14A. Fungsi Teks Jarak
 * Digunakan untuk tampilan di Kartu Misi & Memicu Suara Robot
 */
function calculateRealDistance(lat1, lon1, lat2, lon2) {
    const dist = calculateRealDistanceValue(lat1, lon1, lat2, lon2);

    // Trigger Suara Robot hanya jika Driver sedang Online
    if (userData.isOnline) {
        const speakDist = dist < 1 ? (dist * 1000).toFixed(0) + " meter" : dist.toFixed(1) + " kilometer";
        playRobotVoice(`Misi baru terdeteksi. Jarak ${speakDist}`);
    }

    // Mengembalikan string untuk tampilan UI (km atau m)
    return dist < 1 ? (dist * 1000).toFixed(0) + " m" : dist.toFixed(1) + " km";
}

/**
 * 14B. Fungsi Nilai Jarak (MURNI ANGKA)
 * Digunakan untuk perkalian harga (Mencegah Rp NaN)
 */
function calculateRealDistanceValue(lat1, lon1, lat2, lon2) {
    const R = 6371; // Jari-jari bumi (KM)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
              
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}

/**
 * 14C. Modal Safety Exit
 * Menutup modal jika driver klik di luar kotak (area overlay)
 */
window.addEventListener('click', (event) => {
    const modal = document.getElementById('global-modal');
    if (event.target === modal) {
        closeModal();
    }
});

// === 15. VOICE ENGINE (Text-to-Speech) ===
function playRobotVoice(text) {
    if ('speechSynthesis' in window) {
        // Batalkan suara sebelumnya agar tidak tumpang tindih
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID'; 
        utterance.pitch = 0.7;    // Suara berat khas AI Sci-fi
        utterance.rate = 1.1;     
        
        window.speechSynthesis.speak(utterance);
    }
}

// === 16. LOG MINIMIZER ENGINE ===
function toggleLog() {
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    if (!logList) return;

    if (logList.classList.contains('minimized')) {
        logList.classList.remove('minimized');
        logList.style.display = "block";
        if(chevron) chevron.innerText = "▼";
    } else {
        logList.classList.add('minimized');
        logList.style.display = "none";
        if(chevron) chevron.innerText = "▲";
    }
}




// === 17. LOG ENGINE (Smart Auto-Cleaner) ===
function addLog(msg, type = 'info') {
    const logList = document.getElementById('log-list');
    if (!logList) return;

    // Ambil waktu lokal (Format 22:40)
    const time = new Date().toLocaleTimeString('id-ID', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit' 
    });

    // Buat elemen log baru
    const logItem = document.createElement('div');
    logItem.className = `log-item ${type}`;
    logItem.style.marginBottom = "3px";
    logItem.style.fontSize = "10px";
    logItem.innerHTML = `<span style="color:#555;">[${time}]</span> <span class="log-msg">${msg}</span>`;

    // Masukkan log baru di posisi paling atas agar Driver langsung baca
    logList.insertBefore(logItem, logList.firstChild);

    // LOGIKA AUTO-CLEANER:
    // Jika jumlah pesan di dalam log sudah lebih dari 20 baris
    const maxLogs = 20;
    while (logList.children.length > maxLogs) {
        logList.removeChild(logList.lastChild); // Hapus yang paling bawah (paling lama)
    }
}
