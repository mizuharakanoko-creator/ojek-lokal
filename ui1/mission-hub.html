<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Hub - SOVEREIGN SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
   <style>
/* --- ROOT & THEME --- */
:root {
    --p-cyan: #00f3ff;
    --p-pink: #ff00ea;
    --p-red: #ff003c;
    --p-gold: #ffcc00;
    --p-bg: #050505;
    --terminal-font: 'Courier New', monospace;
}

body {
    background-color: var(--p-bg);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    padding: 0;
}

/* --- HEADER & RESOURCES --- */
.main-header { background: #000; padding: 10px; border-bottom: 1px solid #222; }
.header-top { display: flex; justify-content: space-between; align-items: center; }
.brand-box { font-family: 'Orbitron'; color: var(--p-cyan); letter-spacing: 2px; }

.sub-header { padding: 10px; background: rgba(255,255,255,0.02); }
.res-bar { width: 100%; height: 6px; background: #111; border-radius: 3px; overflow: hidden; }
.fill { height: 100%; transition: width 0.5s; }
.hp-glow { background: var(--p-cyan); box-shadow: 0 0 10px var(--p-cyan); }

/* --- QUEST CARD STYLING (Sovereign Style) --- */
.quest-card { 
    background: #0c0c0c; 
    border: 1px solid #222; 
    margin-bottom: 20px; 
    padding: 15px; 
    position: relative;
    border-left: 4px solid var(--p-cyan);
}

.quest-card.urgent { 
    border-left: 4px solid var(--p-pink); 
    background: linear-gradient(to right, rgba(255, 0, 234, 0.05), #0c0c0c);
}

.reward-tag { color: var(--p-gold); font-weight: bold; font-size: 18px; font-family: 'Orbitron'; }

/* Status Reputasi Menjol */
.reputation-banner {
    padding: 5px;
    text-align: center;
    font-weight: bold;
    font-size: 12px;
    letter-spacing: 1px;
    margin: 10px 0;
    text-transform: uppercase;
}
.banner-trustworthy { border: 1px solid var(--p-cyan); color: var(--p-cyan); background: rgba(0, 243, 255, 0.05); }
.banner-risk { border: 1px solid var(--p-red); color: var(--p-red); background: rgba(255, 0, 60, 0.1); animation: pulse-red 1.5s infinite; }

@keyframes pulse-red { 0% { box-shadow: 0 0 0px var(--p-red); } 50% { box-shadow: 0 0 10px var(--p-red); } 100% { box-shadow: 0 0 0px var(--p-red); } }

/* Rute & Jarak */
.route-info {
    background: #000;
    border: 1px solid #222;
    padding: 10px;
    margin: 10px 0;
    font-size: 13px;
}
.route-step { display: flex; align-items: center; margin-bottom: 5px; }
.route-step i { margin-right: 10px; font-style: normal; }
.route-dist { color: var(--p-gold); font-weight: bold; border-top: 1px solid #222; padding-top: 5px; margin-top: 5px; font-size: 11px; }

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin: 10px 0;
    text-align: center;
}
.stat-box { background: #111; padding: 5px; border: 1px solid #222; }
.stat-box label { font-size: 9px; color: #666; display: block; }
.stat-box b { font-size: 11px; color: #fff; }

.rate-bar-bg { width: 100%; height: 3px; background: #222; margin: 5px 0; }
.rate-bar-fill { height: 100%; background: var(--p-cyan); }

/* System Log */
.log-body { max-height: 100px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 5px; font-family: var(--terminal-font); font-size: 10px; }
.log-item.success { color: var(--p-cyan); }
.log-item.error { color: var(--p-red); }

/* Buttons */
.btn-main { padding: 12px; border: none; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; transition: 0.3s; }
.btn-accept { background: var(--p-cyan); color: #000; }
.btn-accept.urgent { background: var(--p-pink); color: #fff; }
.btn-nego { background: transparent; border: 1px solid var(--p-gold); color: var(--p-gold); }
</style>
</head>

<body>
    <header class="main-header">
        <div class="header-top">
            <div class="brand-box">SOVEREIGN MISSION</div>
            <div class="status-box" style="font-size: 12px;">
                <span id="status-label">SYSTEM OFFLINE</span>
                <input type="checkbox" id="online-toggle" onclick="toggleSystem()">
            </div>
        </div>
    </header>

    <section class="sub-header">
        <div class="res-item">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:3px;">
                <span>STAMINA (HP)</span> <span id="hp-text">550/1000</span>
            </div>
            <div class="res-bar"><div id="hp-fill" class="fill hp-glow" style="width: 55%;"></div></div>
        </div>
    </section>

    <main style="padding: 15px;">
        <div class="log-header" style="font-size:10px; color:var(--p-pink); margin-bottom:5px;">SYSTEM_LOG_v1.0</div>
        <div id="log-list" class="log-body"></div>

        <div id="mission-list-wrapper" style="margin-top:20px;">
            </div>
    </main>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. KONFIGURASI & INITIALISASI
const firebaseConfig = {
    apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
    authDomain: "ojeklokal-42b84.firebaseapp.com",
    databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ojeklokal-42b84"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();
const currentDriverID = localStorage.getItem('current_driver_id') || "320855565"; // Default dari screenshot

let userData = { hp: 550, isOnline: false };
let userCoords = null;
let gpsWatcher = null;

// 2. FUNGSI KALKULASI JARAK REAL-TIME
function getRawKm(lat1, lon1, lat2, lon2) {
    const R = 6371; // Radius bumi dalam km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 3. SYSTEM CONTROL & GPS
function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    if (userData.isOnline) {
        startGpsTracking();
        listenToFirebase();
        addLog("RADAR AKTIF: Mencari misi...", "success");
    } else {
        stopGpsTracking();
        db.ref('missions').off();
        document.getElementById('mission-list-wrapper').innerHTML = "";
        addLog("SYSTEM OFFLINE.", "error");
    }
}

function startGpsTracking() {
    if (navigator.geolocation) {
        gpsWatcher = navigator.geolocation.watchPosition(pos => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            // Refresh list saat posisi berubah untuk update jarak
            listenToFirebase(); 
        }, err => console.error(err), { enableHighAccuracy: true });
    }
}

function stopGpsTracking() {
    if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
}

// 4. LISTEN & RENDER MISSION (Update Data Statis & Peringkat)
function listenToFirebase() {
    db.ref('missions').orderByChild('status').equalTo('searching').on('value', snapshot => {
        const wrapper = document.getElementById('mission-list-wrapper');
        wrapper.innerHTML = "";
        const data = snapshot.val();
        if (!data) return;

        Object.keys(data).forEach(key => {
            const m = data[key];
            
            // Hitung Jarak Real-time ke Titik Jemput
            let distToPickup = "Menghitung...";
            let rawDist = 0;
            if (userCoords && m.pickupCoords) {
                const [mLat, mLng] = m.pickupCoords.split(',').map(Number);
                rawDist = getRawKm(userCoords.lat, userCoords.lng, mLat, mLng);
                distToPickup = rawDist.toFixed(1) + " km";
            }

            // Integrasi Data Baru dari Database
            const successRate = m.clientStats ? 
                ((m.clientStats.misiSelesai / (m.clientStats.misiSelesai + m.clientStats.cancel || 1)) * 100).toFixed(1) : "0.0";
            
            const isUrgent = m.rank === "DARURAT"; // Sesuai database
            const reputationLabel = m.clientReputationLabel || "PENGGUNA BARU";
            const isBeresiko = reputationLabel === "BERESIKO";

            const html = `
                <div class="quest-card ${isUrgent ? 'urgent' : ''}">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-size:10px; color:${isUrgent?'#ff00ea':'#888'}">${isUrgent ? '◈ DARURAT' : '◇ NORMAL'}</span>
                        <span style="font-size:10px; color:#666;">Member Since: ${m.clientStats?.memberSince || '2026'}</span>
                    </div>

                    <div style="display:flex; justify-content:space-between; margin-top:5px;">
                        <div style="font-family:Orbitron; font-size:15px; color:#fff;">${m.clientName}</div>
                        <div class="reward-tag">Rp ${m.price.toLocaleString('id-ID')}</div>
                    </div>

                    <div class="reputation-banner ${isBeresiko ? 'banner-risk' : 'banner-trustworthy'}">
                        ${reputationLabel}
                    </div>

                    <div class="route-info">
                        <div class="route-step"><i style="color:cyan">⦿</i> ${m.pickupName || 'Titik Jemput'}</div>
                        <div class="route-step"><i style="color:red">▼</i> ${m.destinationName || 'Titik Tujuan'}</div>
                        <div class="route-dist">JARAK KE JEMPUTAN: ${distToPickup}</div>
                        <div class="route-dist" style="border:none; padding:0; color:#888;">ESTIMASI JALAN: 2.4 km</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-box"><label>LIKE</label><b style="color:cyan">${m.clientStats?.like || 0}</b></div>
                        <div class="stat-box"><label>DISLIKE</label><b style="color:red">${m.clientStats?.dislike || 0}</b></div>
                        <div class="stat-box"><label>CANCEL</label><b>${m.clientStats?.cancel || 0}</b></div>
                        <div class="stat-box"><label>SELESAI</label><b>${m.clientStats?.misiSelesai || 0}</b></div>
                    </div>
                    
                    <div style="text-align:center; font-size:11px; margin:5px 0; color:magenta;">
                        PERINGKAT: <b>${m.clientRankTier || 'PAUS'}</b>
                    </div>

                    <div style="background:#1a1a1a; padding:5px; font-size:11px; color:gray; border-left:2px solid gold; margin:5px 0;">
                        Note: "${m.note || '-'}"
                    </div>

                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <button onclick="confirmMission('${key}', ${rawDist})" class="btn-main btn-accept ${isUrgent ? 'urgent' : ''}" style="flex:2;">DAFTARKAN DIRI</button>
                        <button onclick="openNego('${key}', ${m.price})" class="btn-main btn-nego" style="flex:1;">NEGO</button>
                    </div>
                </div>`;
            wrapper.innerHTML += html;
        });
    });
}

// 5. POPUP DAFTARKAN DIRI (AMBIL DATA DRIVER DARI DB)
async function confirmMission(mId, rawDist) {
    const driverSnap = await db.ref('drivers/' + currentDriverID).once('value');
    const driverData = driverSnap.val() || { name: "Driver", rating: "5.0" };
    
    const estTime = Math.ceil(rawDist * 3); // Estimasi 3 menit per km

    document.getElementById('global-modal').classList.add('active');
    document.getElementById('modal-body').innerHTML = `
        <div style="color:#fff; text-align:center;">
            <h3 style="color:cyan; font-family:Orbitron;">DAFTARKAN DIRI</h3>
            <p style="font-size:12px;">Kirim profil Anda ke pemesan?</p>
            <div style="background:#111; padding:10px; text-align:left; font-size:11px; border:1px solid #333;">
                <div>Driver: ${driverData.name || 'Sovereign Driver'}</div>
                <div>Jarak: ${rawDist.toFixed(1)} km</div>
                <div>Estimasi Sampai: ${estTime} Menit</div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#333; color:#fff; border:none;">BATAL</button>
                <button onclick="applyToMission('${mId}', ${rawDist}, ${estTime})" style="flex:1; padding:10px; background:cyan; font-weight:bold; border:none;">KIRIM LAMARAN</button>
            </div>
        </div>`;
}

// 6. POPUP NEGO TARIF
function openNego(mId, currentPrice) {
    document.getElementById('global-modal').classList.add('active');
    document.getElementById('modal-body').innerHTML = `
        <div style="color:#fff; text-align:center;">
            <h3 style="color:gold; font-family:Orbitron;">NEGO TARIF</h3>
            <p style="font-size:12px;">Harga Saat Ini: Rp ${currentPrice.toLocaleString()}</p>
            <input type="number" id="nego-val" placeholder="Masukkan Tarif Baru" style="width:100%; padding:10px; background:#000; border:1px solid gold; color:gold; text-align:center;">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#333; color:#fff; border:none;">BATAL</button>
                <button onclick="submitNego('${mId}')" style="flex:1; padding:10px; background:gold; font-weight:bold; border:none;">KIRIM PENAWARAN</button>
            </div>
        </div>`;
}

// 7. KIRIM BALIK KE PEMESAN (FIREBASE UPDATE)
async function applyToMission(mId, dist, time) {
    const driverSnap = await db.ref('drivers/' + currentDriverID).once('value');
    const d = driverSnap.val();

    db.ref(`missions/${mId}/applicants/${currentDriverID}`).set({
        driverName: d?.name || "Driver",
        driverPhoto: d?.photo || "",
        distance: dist.toFixed(1) + " km",
        eta: time + " min",
        status: "pending"
    }).then(() => {
        closeModal();
        addLog("LAMARAN TERKIRIM. Menunggu respon...", "success");
    });
}

function submitNego(mId) {
    const newVal = document.getElementById('nego-val').value;
    if (!newVal) return alert("Masukkan harga!");

    db.ref(`missions/${mId}/applicants/${currentDriverID}`).update({
        negoPrice: parseInt(newVal),
        status: "negotiating"
    }).then(() => {
        closeModal();
        addLog("TAWARAN HARGA TERKIRIM: Rp " + parseInt(newVal).toLocaleString(), "success");
    });
}

function closeModal() { document.getElementById('global-modal').classList.remove('active'); }
function addLog(msg, type) {
    const list = document.getElementById('log-list');
    const time = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    const item = `<div class="log-item ${type}">[${time}] ${msg}</div>`;
    list.insertAdjacentHTML('afterbegin', item);
}

</script>
</body>
</html>
