<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Hub - PICK ME</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mission-style.css">
    
    <style>
/* 1. EFEK GLITCH DIGITAL (Versi Optimasi) */
.glitch-text {
    /* Menggunakan animasi glitch-anim yang lebih cepat (0.3s) agar terasa lebih futuristik */
    animation: glitch-anim 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
    text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff;
    position: relative;
    display: inline-block;
}

@keyframes glitch-anim {
    0% { transform: translate(0); }
    33% { transform: translate(-1.5px, 1.5px); }
    66% { transform: translate(1.5px, -1.5px); }
    100% { transform: translate(0); }
}

/* 2. WARNA NEON STATUS (Paling Terang) */
.txt-cyan { 
    color: #00f3ff; 
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); 
    font-weight: bold;
    letter-spacing: 1px;
}

.txt-red { 
    color: #ff003c; 
    text-shadow: 0 0 10px rgba(255, 0, 60, 0.8); 
    font-weight: bold;
}

/* 3. TAMBAHAN: Efek Redup saat Offline agar tidak mengganggu mata */
#gps-status.txt-red {
    opacity: 0.8;
    text-shadow: none; /* Menghilangkan glow saat offline agar kontras */
}
</style>

</head>
<body class="mission-body">

    <header class="main-header">
        <div class="header-top">
            <a href="index.html" class="btn-return">« TERMINAL</a>
            <div class="brand-box">
                <span class="logo">PICK ME</span>
                <span class="sub-logo">MISSION HUB</span>
            </div>
            <div class="status-box">
                <span id="status-label">OFFLINE</span>
                <label class="neon-switch">
                    <input type="checkbox" id="online-toggle" onclick="toggleSystem()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <section class="sub-header">
        <div class="buff-row">
            <div class="weather-tag">🌧️ NIGHT BUFF: EXP 1.5x</div>
            <div class="streak-tag">STREAK: 2/3</div>
        </div>
        
        <div class="resource-stack">
            <div class="res-item">
                <div class="res-label"><span>STAMINA (HP)</span> <span id="hp-text">550/1000</span></div>
                <div class="res-bar"><div id="hp-fill" class="fill hp-glow" style="width: 55%;"></div></div>
            </div>
            <div class="res-item">
                <div class="res-label"><span>EXP GAIN</span> <span id="exp-text">695/2000</span></div>
                <div class="res-bar"><div id="exp-fill" class="fill exp-glow" style="width: 35%;"></div></div>
            </div>
        </div>
    </section>

    <main class="mission-container">
    <div class="radar-module">
        <div class="map-frame">
            <div id="radar-anim" class="radar-circle"></div>
            <div class="heatmap-point pulse" style="top:50%; left:50%;"></div>
            
            <div class="gps-overlay">
                <span id="gps-status" class="txt-red">GPS: OFFLINE</span>
            </div>
        </div>
    </div>

    <div class="filter-wrapper" style="padding: 10px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="terminal-font" style="font-size: 10px; color: #555;">SCANNING_RADIUS</span>
            <select id="distance-filter" style="background: #000; color: var(--p-cyan); border: 1px solid #444; font-size: 10px; padding: 5px; text-transform: uppercase;">
                <option value="99">SEMUA JARAK (RAJIN)</option>
                <option value="1">MAKS 1.0 KM (DEKAT)</option>
                <option value="3">MAKS 3.0 KM</option>
                <option value="5">MAKS 5.0 KM</option>
            </select>
        </div>
    </div>

    <div class="section-divider" style="height: 1px; background: #222; margin-bottom: 10px;"></div>

    <section class="activity-log-container">
        <div class="log-header">
            <span class="terminal-font">SYSTEM_LOG_v1.0</span>
            <button onclick="clearLog()" style="background:none; border:none; color:#555; font-size:10px;">[CLEAR]</button>
        </div>
        <div id="log-list" class="log-body">
            </div>
    </section>
</main>


    <footer class="main-footer">
        <button class="f-btn">🛒 SHOP</button>
        <button class="f-btn highlight">🏆 RANKING</button>
        <button class="f-btn red-alert">⚡ REFILL</button>
    

        <div id="global-modal" class="quest-popup" style="display:none;">
    <div class="popup-content modal-size">
        <div class="modal-header">
            <span id="modal-title">SYSTEM SHOP</span>
            <button class="btn-close" onclick="closeModal()">X</button>
        </div>
        <div id="modal-body" class="modal-scroll">
            </div>
    </div>
        </div>



    <div class="streak-tag">
    STREAK: 
    <span id="streak-dots">
        <span class="streak-dot"></span>
        <span class="streak-dot"></span>
        <span class="streak-dot"></span>
    </span>
    <div id="streak-bonus-msg" class="streak-bonus-text" style="display:none;">BUFF: 0 HP COST ACTIVE!</div>
    </div>

        
        
    </footer>



<audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-failed" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<div id="toast-container" class="toast-wrapper"></div>
    







<script>
// === 1. KORE & SECURITY ===
const currentDriverID = localStorage.getItem('current_driver_id');
if (!currentDriverID) { window.location.href = 'login.html'; }
const db = typeof firebase !== 'undefined' ? firebase.database() : null;

// === 2. DATABASE & PLAYER STATS (RPG) ===
const ghostNames = ["Bambang Setiawan", "Siti Aminah", "Eko Prasetyo", "Dewi Lestari", "Budi Santoso", "Putri Utami", "Agus Setiawan", "Rina Permata", "Dedi Kurniawan", "Sri Wahyuni",
    "Andi Saputra", "Maya Sari", "Hendra Wijaya", "Lilis Suryani", "Rian Hidayat", "Siska Amelia", "Aris Munandar", "Ani Mulyani", "Fajar Sidiq", "Indah Permata",
    "Joko Susilo", "Ratih Purwasih", "Dimas Arya", "Novi Susanti", "Yanto Sudrajat", "Mega Utami", "Taufik Hidayat", "Dina Mariana", "Bayu Saputra", "Fitri Handayani",
    "Asep Sunandar", "Elis Rahmawati", "Cecep Mulyana", "Titin Sumarni", "Maman Suherman", "Kokom Komala", "Dadang Subur", "Nanang Kosim", "Eneng Rohayati", "Ujang Hermawan"];
let userData = { hp: 550, maxHp: 1000, exp: 695, maxExp: 2000, isOnline: false, currentLevel: 12 };

// === 3. UI REFRESH & DYNAMIC REGEN (Gabungan Fungsi Regen & Night Buff) ===
function updateUI() {
    document.getElementById('hp-text').innerText = `${Math.floor(userData.hp)}/${userData.maxHp}`;
    document.getElementById('exp-text').innerText = `${userData.exp}/${userData.maxExp}`;
    document.getElementById('hp-fill').style.width = (userData.hp / userData.maxHp) * 100 + "%";
    document.getElementById('exp-fill').style.width = (userData.exp / userData.maxExp) * 100 + "%";
}

setInterval(() => {
    if(!userData.isOnline) return;
    const hours = new Date().getHours();
    const regen = (hours >= 21 || hours <= 4) ? 10 : 5; // Night Buff Otomatis
    if(userData.hp < userData.maxHp) { userData.hp = Math.min(userData.hp + regen, userData.maxHp); updateUI(); }
}, 30000);

// === 4. SYSTEM TOGGLE (GPS Real, Glitch & Battery Save) ===
let gpsWatcher = null; // Variable untuk menghentikan pelacakan saat offline

function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    const statusLabel = document.getElementById('status-label');
    const radar = document.getElementById('radar-anim');
    const gpsStatus = document.getElementById('gps-status');

    if (userData.isOnline) {
        if(gpsStatus) { 
            gpsStatus.innerText = "SYNCING..."; 
            gpsStatus.className = "txt-cyan glitch-text"; 
        }

        // Menggunakan watchPosition: Lebih akurat & hanya update jika posisi berubah
        gpsWatcher = navigator.geolocation.watchPosition((pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            statusLabel.innerText = "ONLINE";
            statusLabel.style.color = "var(--p-cyan)";
            if(radar) radar.classList.add('scanning');
            
            if(gpsStatus) { 
                gpsStatus.innerText = "GPS: LIVE"; 
                // Efek glitch muncul tiap kali koordinat terupdate (keren!)
                gpsStatus.classList.add('glitch-text');
                setTimeout(() => gpsStatus.classList.remove('glitch-text'), 2000);
            }
            
            addLog("SIGNAL STABLE: Koordinat diperbarui.", "success");
            listenToFirebase();

        }, (err) => {
            addLog("SIGNAL LOST: GPS Terputus!", "error");
            stopGPS();
        }, { 
            enableHighAccuracy: true, 
            maximumAge: 30000, // Cache lokasi selama 30 detik (Hemat Baterai)
            timeout: 27000 
        });

    } else {
        stopGPS();
    }
}

// Fungsi pembantu untuk mematikan GPS total saat Offline
function stopGPS() {
    if(gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    const statusLabel = document.getElementById('status-label');
    const gpsStatus = document.getElementById('gps-status');
    const radar = document.getElementById('radar-anim');

    statusLabel.innerText = "OFFLINE";
    statusLabel.style.color = "#fff";
    if(radar) radar.classList.remove('scanning');
    if(gpsStatus) { 
        gpsStatus.innerText = "GPS: OFFLINE"; 
        gpsStatus.className = "txt-red"; 
    }
    if(db) db.ref('missions').off();
    document.getElementById('online-toggle').checked = false;
    userData.isOnline = false;
}





// === 5. ORDER GENERATOR (Ghost & Real Firebase) ===
function generateGhostOrder() {
    if(!userData.isOnline) return;
    const id = "ghost-" + Math.floor(Math.random() * 9999);
    
    // Logika pembulatan ribuan: (Random * Range + Base) dibulatkan ke bawah per 1000
    const rawPrice = Math.floor(Math.random() * 35000 + 12000);
    const roundedPrice = Math.floor(rawPrice / 1000) * 1000; 

    renderMission({ 
        clientName: ghostNames[Math.floor(Math.random() * ghostNames.length)], 
        price: roundedPrice 
    }, id, true);
}

function listenToFirebase() {
    if(!db) return;
    db.ref('missions').on('value', (snap) => {
        if (!userData.isOnline) return;
        document.querySelectorAll('.quest-card[data-type="real"]').forEach(c => c.remove());
        const data = snap.val();
        if (data) Object.keys(data).forEach(k => { 
            if (data[k].status === "searching") renderMission(data[k], k, false); 
        });
    });
}


// === 6. MISSION RENDERER (Real Distance Logic) ===
function renderMission(data, id, isGhost) {
    if(document.getElementById(id) || !userCoords) return;

    // 1. HITUNG JARAK ASLI (Bukan Random Lagi!)
    // Jika ghost mission, kita buat koordinat palsu di sekitar driver agar masuk akal
    const targetLat = isGhost ? userCoords.lat + (Math.random() * 0.04 - 0.02) : data.lat;
    const targetLng = isGhost ? userCoords.lng + (Math.random() * 0.04 - 0.02) : data.lng;
    
    const distance = calculateRealDistance(userCoords.lat, userCoords.lng, targetLat, targetLng);
    
    // 2. FILTER JARAK (Sesuai pilihan Driver di UI)
    const filterLimit = parseFloat(document.getElementById('distance-filter').value);
    if (parseFloat(distance) > filterLimit) return;

    // 3. LOGIKA HARGA (Rp 2.500 per KM, minimal Rp 12.000)
    let dynamicPrice = Math.max(12000, distance * 2500);
    const finalPrice = Math.floor(dynamicPrice / 1000) * 1000;
    const priceFormatted = finalPrice.toLocaleString('id-ID');

    const html = `
        <div class="quest-card" id="${id}">
            <details>
                <summary onclick="triggerVibration('short')">
                    <div class="q-summary-grid">
                        <div class="q-client-name terminal-font">${data.clientName}</div>
                        <div class="q-meta-info" style="display:flex; gap:10px; align-items:center;">
                            <span class="${distance <= 1 ? 'txt-cyan' : ''}" style="font-weight:bold;">${distance} km</span>
                            <span class="reward q-gold">Rp ${priceFormatted}</span>
                            <span class="timer" id="t-${id}">05:00</span>
                        </div>
                    </div>
                </summary>
                <div class="q-details">
                    <p style="font-size:10px; color:#888;">Posisi jemput terdeteksi pada radar.</p>
                    <div class="action-row">
                        <button class="btn-apply" style="width:100%" onclick="confirmApply('${id}', 25, ${isGhost})">TERIMA MISI</button>
                    </div>
                </div>
            </details>
        </div>`;
    
    document.querySelector('.section-divider').insertAdjacentHTML('afterend', html);
    startMissionTimer(300, `t-${id}`, id);
}



// === 7. APPLY LOGIC (Briefing & Selection) ===
function confirmApply(id, cost, isGhost) {
    if(userData.hp < cost) return showNotification("Energi Kurang!", "error");
    const client = document.querySelector(`#${id} .q-client-name`).innerText;
    openModal("S-RANK BRIEFING", `
        <p>Target: <b>${client}</b></p>
        <p>Biaya: <span style="color:red">-${cost} HP</span></p>
        <button class="btn-apply" style="width:100%; margin-top:15px;" onclick="executeApply('${id}', ${cost}, ${isGhost})">TERIMA MISI</button>
    `);
}

function executeApply(id, cost, isGhost) {
    closeModal(); userData.hp -= cost; updateUI();
    const btn = document.querySelector(`#${id} .btn-apply`);
    btn.innerText = "WAITING..."; btn.disabled = true;

    setTimeout(() => {
        if(isGhost && Math.random() < 0.4) { 
            showNotification("Gagal: Driver lain lebih cepat", "error"); 
            document.getElementById(id).remove(); 
        } else { showSuccessPopup(id); }
    }, 2000);
}

// === 8. NEGO LOGIC (Interface & Respon) ===
function confirmNego(id, oldPrice) {
    openModal("NEGO HARGA", `
        <input type="number" id="n-val" value="${oldPrice}" style="width:100%; padding:10px; background:#000; color:#fff;">
        <button class="btn-apply" style="width:100%; margin-top:10px;" onclick="executeNego('${id}')">TAWAR</button>
    `);
}

function executeNego(id) {
    const val = document.getElementById('n-val').value;
    closeModal(); showNotification("Menunggu Nego...");
    setTimeout(() => {
        if(Math.random() > 0.5) {
            showNotification("Nego Diterima!");
            document.querySelector(`#${id} .reward`).innerText = `Rp ${parseInt(val).toLocaleString('id-ID')}`;
        } else { showNotification("Nego Ditolak", "error"); }
    }, 2000);
}

// === 9. SUCCESS SYSTEM (Auto-Cancel & AFK) ===
let afkTimer;
function showSuccessPopup(id) {
    const price = document.querySelector(`#${id} .reward`).innerText;
    afkTimer = setTimeout(() => {
        closeModal(); showNotification("DIBATALKAN: Anda AFK!", "error");
        if(document.getElementById(id)) document.getElementById(id).remove();
    }, 30000);

    openModal("MISSION SECURED", `
        <h2 style="color:gold">${price}</h2>
        <p>Konfirmasi dalam 30 detik!</p>
        <button class="btn-apply" style="width:100%" onclick="startJourney()">JALANKAN</button>
    `);
    addExp(25);
}

function startJourney() { clearTimeout(afkTimer); window.location.href = 'tracking-driver.html'; }

// === 10. MODAL & NOTIFIKASI (UI Engine) ===
function openModal(t, c) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-body').innerHTML = c; document.getElementById('global-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('global-modal').style.display = 'none'; }
function showNotification(m, t='success') {
    const toast = document.createElement('div'); toast.className = `toast-item ${t==='error'?'error':''}`; toast.innerText = m;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

// === 11. RPG SYSTEM (Level Up & Exp) ===
function addExp(a) {
    userData.exp += a;
    if(userData.exp >= userData.maxExp) { userData.currentLevel++; userData.exp=0; userData.maxExp+=500; userData.hp=userData.maxHp; alert("LVL UP!"); }
    updateUI();
}

// === 12. UTILITIES (Timer & Vibration) ===
function startMissionTimer(d, dId, cId) {
    let t = d;
    const inv = setInterval(() => {
        const el = document.getElementById(dId);
        if(el) el.textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
        if(--t < 0) { clearInterval(inv); document.getElementById(cId)?.remove(); }
    }, 1000);
}
function triggerVibration(p) { if(navigator.vibrate) { const v = {short:100, long:[200,100,200], emergency:[500,100,500]}; navigator.vibrate(v[p]); }}

// === 13. LOGGING & BUFFS ===
function addLog(m, t) {
    const l = document.getElementById('log-list');
    if(!l) return;
    l.insertAdjacentHTML('afterbegin', `<div class="log-item ${t}">[${new Date().toLocaleTimeString()}] ${m}</div>`);
}

// === 14. INITIALIZER (Haptic & Start) ===
window.onload = () => {
    updateUI();
    document.querySelectorAll('button').forEach(b => b.addEventListener('mousedown', () => triggerVibration('short')));
    setInterval(() => generateGhostOrder(), 25000);
};


// === 15. FUNGSI MATEMATIKA: HAVERSINE FORMULA (Updated with Voice) ===
function calculateRealDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const dist = R * c;

    // Trigger Suara Robot jika misi baru terdeteksi (Hanya jika Online)
    if (userData.isOnline) {
        const speakDist = dist < 1 ? (dist * 1000).toFixed(0) + " meter" : dist.toFixed(1) + " kilometer";
        playRobotVoice(`Target terdeteksi. Jarak ${speakDist}`);
    }

    return dist < 1 ? (dist * 1000).toFixed(0) + " m" : dist.toFixed(1) + " km";
}


// === 16. VOICE ENGINE (Text-to-Speech) ===
function playRobotVoice(text) {
    // Cek apakah browser mendukung bicara
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID'; // Bahasa Indonesia
        utterance.pitch = 0.8;    // Suara agak berat (biar keren/misterius)
        utterance.rate = 1.1;     // Kecepatan bicara normal-cepat
        
        // Mainkan suara
        window.speechSynthesis.speak(utterance);
    }
}


</script>
