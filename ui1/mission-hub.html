<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Mission Hub - PICK ME</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mission-style.css">
    
   <style>
/* --- 0. ROOT VARIABLES --- */
:root {
    --p-cyan: #00f3ff;
    --p-pink: #ff00ea;
    --p-red: #ff003c;
    --p-gold: #ffcc00;
    --p-bg: #050505;
    --terminal-font: 'Courier New', monospace;
}

/* --- 1. EFEK GLITCH DIGITAL --- */
.glitch-text {
    animation: glitch-anim 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
    text-shadow: 1px 0 var(--p-pink), -1px 0 var(--p-cyan);
    position: relative;
    display: inline-block;
}

@keyframes glitch-anim {
    0% { transform: translate(0); }
    33% { transform: translate(-1.5px, 1.5px); }
    66% { transform: translate(1.5px, -1.5px); }
    100% { transform: translate(0); }
}

/* --- 2. WARNA NEON & STATUS --- */
.txt-cyan { 
    color: var(--p-cyan); 
    text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); 
    font-weight: bold;
    letter-spacing: 1px;
}

.txt-red { 
    color: var(--p-red); 
    text-shadow: 0 0 10px rgba(255, 0, 60, 0.8); 
    font-weight: bold;
}

#gps-status.txt-red {
    opacity: 0.8;
    text-shadow: none;
}

.q-gold { color: var(--p-gold); font-weight: bold; }

/* --- 3. REPUTATION BOX (Detail Gambar 2 & 3) --- */
.reputation-box {
    border: 1px solid #222;
    padding: 10px;
    background: #000;
    font-size: 11px;
    color: #aaa;
    margin-top: 10px;
    font-family: var(--terminal-font);
}

.stats-grid {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    border-top: 1px solid #111;
    border-bottom: 1px solid #111;
    padding: 5px 0;
    text-align: center;
}

.stats-grid span { display: block; font-size: 12px; }

/* Progress Bar Success Rate */
.rate-bar-bg {
    width: 100%;
    height: 4px;
    background: #111;
    margin: 5px 0;
    border-radius: 2px;
}

.rate-bar-fill {
    height: 100%;
    background: var(--p-cyan);
    box-shadow: 0 0 8px var(--p-cyan);
    transition: width 1s ease-in-out;
}

/* Fraud Check Labels */
.fraud-check {
    font-size: 10px;
    font-weight: bold;
    padding: 3px 0;
    text-align: center;
    border-radius: 2px;
    text-transform: uppercase;
}
.fraud-check.safe { color: var(--p-cyan); border: 1px solid var(--p-cyan); background: rgba(0, 243, 255, 0.05); }
.fraud-check.danger { color: var(--p-red); border: 1px solid var(--p-red); background: rgba(255, 0, 60, 0.05); animation: pulse 1s infinite; }

@keyframes pulse { 50% { opacity: 0.5; } }

/* --- 4. RADAR & LOG MODULE --- */
.radar-module { height: 100px; margin-bottom: 5px; }
.map-frame {
    height: 100px;
    background: linear-gradient(180deg, #050505 0%, #111 100%);
    border: 1px solid #222;
    display: flex;
    align-items: center; justify-content: center;
}

.activity-log-container {
    transition: all 0.3s ease;
    border: 1px solid #222;
    margin-top: 10px;
    background: #000;
}

.log-body {
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: none; /* Sembunyikan scrollbar Firefox */
}
.log-body::-webkit-scrollbar { display: none; } /* Sembunyikan scrollbar Chrome/Safari */

.log-item.success .log-msg { color: var(--p-cyan); }
.log-item.error .log-msg { color: var(--p-red); }
.log-item.info .log-msg { color: #888; }

.minimized { height: 35px !important; overflow: hidden; }

/* --- 5. OVERLAY MODAL (Engine Gambar 1) --- */
#global-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
    z-index: 10000;
    align-items: center; justify-content: center;
}

#global-modal.active { display: flex; }

.popup-content.modal-size {
    width: 85%;
    max-width: 320px;
    background: #050505;
    border: 1px solid var(--p-cyan);
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
    padding: 20px;
    border-radius: 4px;
    animation: modalSlideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- 6. BUTTONS & UI INTERACTION --- */
.action-row button {
    padding: 10px;
    font-family: var(--terminal-font);
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.2s;
}

.btn-nego {
    background: transparent;
    color: var(--p-gold);
    border: 1px solid var(--p-gold);
}

.btn-apply {
    background: var(--p-cyan);
    color: #000;
    border: none;
}

.btn-cancel {
    background: #111;
    color: #fff;
    border: 1px solid #333;
}

button:active { transform: scale(0.95); filter: brightness(1.2); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Font khusus untuk kesan terminal driver */
.terminal-font { font-family: var(--terminal-font); letter-spacing: 1px; }

</style>


</head>
<body class="mission-body">

    <header class="main-header">
        <div class="header-top">
            <a href="index.html" class="btn-return">« TERMINAL</a>

    <div class="filter-wrapper" style="padding: 10px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222;">

            <span class="terminal-font" style="font-size: 10px; color: #555;">SCANNING_RADIUS</span>
            <select id="distance-filter" style="background: #000; color: var(--p-cyan); border: 1px solid #444; font-size: 10px; padding: 5px; text-transform: uppercase;">
                <option value="99">SEMUA JARAK (RAJIN)</option>
                <option value="1">MAKS 1.0 KM (DEKAT)</option>

    <div class="section-divider" style="height: 1px; background: #222; margin-bottom: 10px;"></div>

    <section class="activity-log-container" id="log-container">
    <div class="log-header" onclick="toggleLog()" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">

        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="clearLog(); event.stopPropagation();" style="background:none; border:none; color:#555; font-size:10px;">[CLEAR]</button>
            <span id="log-chevron" style="color:var(--p-cyan); font-size:12px;">▼</span>
        </div>
    </div>
    <div id="log-list" class="log-body">
        </div>
</section>

</main>


    <footer class="main-footer">
        <button class="f-btn">🛒 SHOP</button>

        <button class="f-btn red-alert">⚡ REFILL</button>
    

        <div id="global-modal" class="quest-popup" style="display:none;">
    <div class="popup-content modal-size">
        <div class="modal-header">
            <span id="modal-title">SYSTEM SHOP</span>
            <button class="btn-close" onclick="closeModal()">X</button>
        </div>
        <div id="modal-body" class="modal-scroll">
            </div>
    </div>
        </div>



    <div class="streak-tag">
    STREAK: 
    <span id="streak-dots">
        <span class="streak-dot"></span>

<script>
// === 1. KORE & SECURITY ===
const currentDriverID = localStorage.getItem('current_driver_id');
if (!currentDriverID) { window.location.href = 'login.html'; }
const db = typeof firebase !== 'undefined' ? firebase.database() : null;

// === 2. DATABASE & PLAYER STATS (RPG) ===
const ghostNames = ["Bambang Setiawan", "Siti Aminah", "Eko Prasetyo", "Dewi Lestari", "Budi Santoso", "Putri Utami", "Agus Setiawan", "Rina Permata", "Dedi Kurniawan", "Sri Wahyuni",
    "Andi Saputra", "Maya Sari", "Hendra Wijaya", "Lilis Suryani", "Rian Hidayat", "Siska Amelia", "Aris Munandar", "Ani Mulyani", "Fajar Sidiq", "Indah Permata",
    "Joko Susilo", "Ratih Purwasih", "Dimas Arya", "Novi Susanti", "Yanto Sudrajat", "Mega Utami", "Taufik Hidayat", "Dina Mariana", "Bayu Saputra", "Fitri Handayani",
    "Asep Sunandar", "Elis Rahmawati", "Cecep Mulyana", "Titin Sumarni", "Maman Suherman", "Kokom Komala", "Dadang Subur", "Nanang Kosim", "Eneng Rohayati", "Ujang Hermawan"];
let userData = { hp: 550, maxHp: 1000, exp: 695, maxExp: 2000, isOnline: false, currentLevel: 12 };

// === 3. UI REFRESH & DYNAMIC REGEN (Gabungan Fungsi Regen & Night Buff) ===
function updateUI() {
    document.getElementById('hp-text').innerText = `${Math.floor(userData.hp)}/${userData.maxHp}`;
    document.getElementById('exp-text').innerText = `${userData.exp}/${userData.maxExp}`;
    document.getElementById('hp-fill').style.width = (userData.hp / userData.maxHp) * 100 + "%";
    document.getElementById('exp-fill').style.width = (userData.exp / userData.maxExp) * 100 + "%";
}

setInterval(() => {
    if(!userData.isOnline) return;
    const hours = new Date().getHours();
    const regen = (hours >= 21 || hours <= 4) ? 10 : 5; // Night Buff Otomatis
    if(userData.hp < userData.maxHp) { userData.hp = Math.min(userData.hp + regen, userData.maxHp); updateUI(); }
}, 30000);

// === 4. SYSTEM TOGGLE (GPS Real, Anti-Spam & Visual Sync) ===
let gpsWatcher = null; 
let firstLock = true; // Agar log "Signal Stable" tidak nyepam

function toggleSystem() {
    userData.isOnline = document.getElementById('online-toggle').checked;
    const statusLabel = document.getElementById('status-label');
    const radar = document.getElementById('radar-anim');
    const gpsStatus = document.getElementById('gps-status');

    if (userData.isOnline) {
        // Efek Awal saat mencari sinyal
        if(gpsStatus) { 
            gpsStatus.innerText = "SYNCING..."; 
            gpsStatus.className = "txt-cyan glitch-text"; 
        }
        statusLabel.innerText = "CONNECTING...";
        statusLabel.style.color = "gold";

        gpsWatcher = navigator.geolocation.watchPosition((pos) => {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            // Logika Visual & Status
            statusLabel.innerText = "ONLINE";
            statusLabel.style.color = "var(--p-cyan)";
            if(radar) radar.classList.add('scanning');
            
            // Efek GPS Live
            if(gpsStatus) { 
                gpsStatus.innerText = "GPS: LIVE"; 
                gpsStatus.classList.add('glitch-text');
                setTimeout(() => gpsStatus.classList.remove('glitch-text'), 2000);
            }
            
            // Logika Log: Hanya muncul sekali agar tidak memenuhi layar
            if (firstLock) {
                addLog("SIGNAL ACQUIRED: Koordinat Real Terkunci.", "success");
                firstLock = false; 
            }

            listenToFirebase(); // Jalankan pengambilan data misi

        }, (err) => {
            addLog("SIGNAL LOST: GPS Terputus!", "error");
            stopGPS();
        }, { 
            enableHighAccuracy: true, 
            maximumAge: 30000, 
            timeout: 27000 
        });

    } else {
        stopGPS();
    }
}

// Fungsi pembantu untuk mematikan sistem secara bersih
function stopGPS() {
    if(gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    const statusLabel = document.getElementById('status-label');
    const gpsStatus = document.getElementById('gps-status');
    const radar = document.getElementById('radar-anim');

    // Reset Semua Status
    statusLabel.innerText = "OFFLINE";
    statusLabel.style.color = "#fff";
    if(radar) radar.classList.remove('scanning');
    
    if(gpsStatus) { 
        gpsStatus.innerText = "GPS: OFFLINE"; 
        gpsStatus.className = "txt-red"; 
    }
    
    if(db) db.ref('missions').off();
    
    // Pastikan Switch & Data Sinkron
    document.getElementById('online-toggle').checked = false;
    userData.isOnline = false;
    firstLock = true; // Reset agar saat online lagi, log muncul kembali
    addLog("System Offline. GPS Disconnected.", "info");
}






// === 5. ORDER GENERATOR (Data Reputasi Lengkap) ===
function generateGhostOrder() {
    if(!userData.isOnline || !userCoords) return;

    const id = "ghost-" + Math.floor(Math.random() * 9999);
    
    // Koordinat acak radius dekat driver
    const fakeLat = userCoords.lat + (Math.random() * 0.02 - 0.01);
    const fakeLng = userCoords.lng + (Math.random() * 0.02 - 0.01);

    // Data Reputasi untuk tampilan Mewah (Gambar 2 & 3)
    const likes = Math.floor(Math.random() * 150 + 10);
    const dislikes = Math.floor(Math.random() * 5);
    const rate = (100 - (dislikes * 1.5) - (Math.random() * 2)).toFixed(1);
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const year = 2023 + Math.floor(Math.random() * 2);

    renderMission({ 
        clientName: ghostNames[Math.floor(Math.random() * ghostNames.length)], 
        lat: fakeLat,
        lng: fakeLng,
        reputation: likes > 100 ? "TRUSTWORTHY" : "MORTAL",
        likes: likes,
        dislikes: dislikes,
        rank: likes > 100 ? "MORAL" : "NEUTRAL",
        memberSince: `${months[Math.floor(Math.random()*12)]} ${year}`,
        successRate: rate,
        type: Math.random() > 0.7 ? "URGENT MISSION" : "REGULAR DELIVERY",
        noted: likes > 120 ? "Antar paket secepatnya, ada bonus!" : "Hati-hati di jalan."
    }, id, true);
}


// === 6. MISSION RENDERER (Gabungan GPS & Detail Reputasi) ===
function renderMission(data, id, isGhost) {
    if(document.getElementById(id) || !userCoords) return;

    const targetLat = isGhost ? userCoords.lat + (Math.random() * 0.04 - 0.02) : data.lat;
    const targetLng = isGhost ? userCoords.lng + (Math.random() * 0.04 - 0.02) : data.lng;
    
    // Gunakan VALUE (angka murni) untuk harga
    const distValue = calculateRealDistanceValue(userCoords.lat, userCoords.lng, targetLat, targetLng);
    
    const filterLimit = parseFloat(document.getElementById('distance-filter')?.value || 999);
    if (distValue > filterLimit) return;

    const rawPrice = Math.max(10000, distValue * 3000);
    const finalPrice = Math.floor(rawPrice / 1000) * 1000;
    const priceFormatted = finalPrice.toLocaleString('id-ID');

    // Tampilan teks jarak (km/m)
    const distanceDisplay = distValue < 1 ? (distValue * 1000).toFixed(0) + " m" : distValue.toFixed(1) + " km";
    const isScam = isGhost && (data.dislikes > 3 || Math.random() > 0.9);

    const html = `
        <div class="quest-card ${isScam ? 'red-tier' : 'blue-theme'}" id="${id}">
            <details>
                <summary onclick="triggerVibration('short')">
                    <div class="q-summary-grid">
                        <div class="q-client-name terminal-font">${data.clientName}</div>
                        <div class="q-meta-info" style="display:flex; gap:10px; align-items:center;">
                            <span class="${distValue <= 1 ? 'txt-cyan' : ''}" style="font-weight:bold;">${distanceDisplay}</span>
                            <span class="reward q-gold">Rp ${priceFormatted}</span>
                            <span class="timer" id="t-${id}">05:00</span>
                        </div>
                    </div>
                </summary>
                <div class="q-details">
                    <div class="fraud-check ${isScam ? 'danger' : 'safe'}" style="margin-bottom:10px;">
                        ${isScam ? '⚠️ HIGH RISK DETECTED' : '✓ TRUSTED CLIENT'}
                    </div>

                    <div class="reputation-box" style="border:1px solid #222; padding:10px; background:#050505; font-size:11px; color:#aaa; margin-bottom:10px;">
                        <p style="text-transform:uppercase; font-size:10px; margin-bottom:5px;">Reputation: <span style="color:${data.reputation === 'TRUSTWORTHY'?'#00f3ff':'#ff003c'}">${data.reputation}</span></p>
                        
                        <div class="stats-grid" style="display:flex; justify-content:space-between; margin:10px 0; border-top:1px solid #111; border-bottom:1px solid #111; padding:5px 0;">
                            <div style="text-align:center;">LIKE<br><span style="color:#00f3ff; font-weight:bold;">${data.likes}</span></div>
                            <div style="text-align:center;">DISLIKE<br><span style="color:#ff003c; font-weight:bold;">${data.dislikes}</span></div>
                            <div style="text-align:center;">RANK<br><span style="color:#ff00ea; font-weight:bold;">${data.rank}</span></div>
                        </div>

                        <p>> Member Since: <span style="color:#fff;">${data.memberSince}</span></p>
                        <p>> Success Rate: <span style="color:#fff;">${data.successRate}%</span></p>
                        
                        <div class="rate-bar-bg" style="width:100%; height:3px; background:#111; margin:5px 0;">
                            <div class="rate-bar-fill" style="width:${data.successRate}%; height:100%; background:#00f3ff;"></div>
                        </div>

                        <p style="margin-top:10px;">Type: <span style="color:gold; font-weight:bold;">${data.type}</span></p>
                        <p style="font-style:italic; color:#888; margin-top:5px;">"${data.noted}"</p>
                    </div>

                    <div class="action-row" style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn-nego" onclick="confirmNego('${id}', ${finalPrice})">NEGO</button>
                        <button class="btn-apply" style="flex:2; background:#00f3ff; color:#000; font-weight:bold;" onclick="confirmApply('${id}', 25, ${isGhost})">TERIMA MISI</button>
                    </div>
                </div>
            </details>
        </div>`;
    
    document.querySelector('.section-divider').insertAdjacentHTML('afterend', html);
    startMissionTimer(300, `t-${id}`, id);
    
    // Pemicu suara "Misi Baru Terdeteksi"
    calculateRealDistance(userCoords.lat, userCoords.lng, targetLat, targetLng);
}


// === 7. APPLY LOGIC (Tombol Terima) ===
function confirmApply(id, cost, isGhost) {
    if(userData.hp < cost) {
        addLog("ENERGI TIDAK CUKUP!", "error");
        return;
    }

    const card = document.getElementById(id);
    if(!card) return;
    const clientName = card.querySelector('.q-client-name').innerText;

    openModal("S-RANK BRIEFING", `
        <div class="terminal-font" style="font-size:12px; color:#ccc;">
            <p>> TARGET: <span style="color:#00f3ff">${clientName}</span></p>
            <p>> COST: <span style="color:#ff003c;">-${cost} HP</span></p>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-cancel" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:#fff;" onclick="closeModal()">BATAL</button>
                <button class="btn-apply" style="flex:2; padding:10px; background:#00f3ff; font-weight:bold; color:#000;" onclick="executeApply('${id}', ${cost}, ${isGhost})">TERIMA MISI</button>
            </div>
        </div>
    `);
}

function executeApply(id, cost, isGhost) {
    closeModal();
    const card = document.getElementById(id);
    if(!card) return;

    userData.hp -= cost; 
    updateUI(); 

    const btnA = card.querySelector('.btn-apply');
    const btnN = card.querySelector('.btn-nego');

    if(btnA) { btnA.innerText = "WAITING..."; btnA.disabled = true; }
    if(btnN) { btnN.style.display = "none"; }

    addLog(`Menghubungi server...`, "info");

    setTimeout(() => {
        if(isGhost && Math.random() < 0.4) { 
            addLog("GAGAL: Driver lain lebih cepat!", "error"); 
            card.remove(); 
        } else { 
            addLog("MISI DITERIMA!", "success");
            showSuccessPopup(id); 
        }
    }, 2000);
}


// === 8. NEGO LOGIC (Tombol Nego) ===
function confirmNego(id, oldPrice) {
    openModal("NEGO HARGA", `
        <div class="terminal-font" style="text-align:center;">
            <p style="font-size:10px; color:#888;">TAWARAN ANDA (Rp)</p>
            <input type="number" id="n-val" value="${oldPrice}" style="width:100%; padding:10px; background:#111; color:#00f3ff; border:1px solid #00f3ff; text-align:center; margin:10px 0; font-size:16px;">
            <div style="display:flex; gap:10px;">
                <button class="btn-cancel" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:#fff;" onclick="closeModal()">BATAL</button>
                <button class="btn-apply" style="flex:2; padding:10px; background:gold; color:#000; font-weight:bold;" onclick="executeNego('${id}')">KIRIM</button>
            </div>
        </div>
    `);
}

function executeNego(id) {
    const input = document.getElementById('n-val');
    if(!input) return;
    const val = input.value;
    closeModal();
    
    addLog(`Menawar Rp ${parseInt(val).toLocaleString('id-ID')}...`, "info");

    setTimeout(() => {
        if(Math.random() > 0.5) {
            addLog("NEGO DITERIMA!", "success");
            const rewardEl = document.querySelector(`#${id} .reward`);
            if(rewardEl) rewardEl.innerText = `Rp ${parseInt(val).toLocaleString('id-ID')}`;
        } else { 
            addLog("NEGO DITOLAK", "error"); 
        }
    }, 1500);
}



// === 9. SUCCESS SYSTEM ===
let afkTimer;
function showSuccessPopup(id) {
    const price = document.querySelector(`#${id} .reward`).innerText;
    afkTimer = setTimeout(() => {
        closeModal();
        addLog("DIBATALKAN: Anda AFK!", "error");
        document.getElementById(id)?.remove();
    }, 30000);

    openModal("MISSION SECURED", `
        <div style="text-align:center;">
            <h2 style="color:gold; margin:0;">${price}</h2>
            <p style="font-size:11px;">Konfirmasi dalam 30 detik!</p>
            <button class="btn-apply" style="width:100%; padding:15px; margin-top:10px; background:#00f3ff; font-weight:bold;" onclick="startJourney()">JALANKAN</button>
        </div>
    `);
    addExp(25);
}

function startJourney() { 
    clearTimeout(afkTimer); 
    window.location.href = 'tracking-driver.html'; 
}

// === 10. MODAL & UI ENGINE ===
function openModal(t, c) { 
    const modal = document.getElementById('global-modal');
    if(!modal) return;
    document.getElementById('modal-title').innerText = t; 
    document.getElementById('modal-body').innerHTML = c; 
    modal.classList.add('active'); 
}

function closeModal() { 
    document.getElementById('global-modal').classList.remove('active'); 
}



// === 11. RPG SYSTEM (Level Up & Exp) ===
function addExp(a) {
    userData.exp += a;
    if(userData.exp >= userData.maxExp) { userData.currentLevel++; userData.exp=0; userData.maxExp+=500; userData.hp=userData.maxHp; alert("LVL UP!"); }
    updateUI();
}

// === 12. UTILITIES (Timer & Vibration) ===
function startMissionTimer(d, dId, cId) {
    let t = d;
    const inv = setInterval(() => {
        const el = document.getElementById(dId);
        if(el) el.textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
        if(--t < 0) { clearInterval(inv); document.getElementById(cId)?.remove(); }
    }, 1000);
}
function triggerVibration(p) { if(navigator.vibrate) { const v = {short:100, long:[200,100,200], emergency:[500,100,500]}; navigator.vibrate(v[p]); }}


// === 13. INITIALIZER (Haptic & Start Engine) ===
window.onload = () => {
    updateUI();
    
    // Tutup log secara otomatis saat awal masuk agar layar lega (Cyber-look)
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    if(logList) {
        logList.classList.add('minimized');
        logList.style.display = "none";
        if(chevron) chevron.innerText = "▲";
    }
    
    // Global Event Listener untuk Getar Tombol (Menggunakan Delegation agar tombol baru tetap getar)
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
            triggerVibration('short');
        }
    });
    
    // Interval pemunculan misi hantu (Setiap 25 detik)
    setInterval(() => generateGhostOrder(), 25000);
    
    addLog("SISTEM RADAR AKTIF...", "success");
};

// === 14. FUNGSI MATEMATIKA: HAVERSINE FORMULA (Engine Jarak & Suara) ===

/**
 * 14A. Fungsi Teks Jarak
 * Digunakan untuk tampilan di Kartu Misi & Memicu Suara Robot
 */
function calculateRealDistance(lat1, lon1, lat2, lon2) {
    const dist = calculateRealDistanceValue(lat1, lon1, lat2, lon2);

    // Trigger Suara Robot hanya jika Driver sedang Online
    if (userData.isOnline) {
        const speakDist = dist < 1 ? (dist * 1000).toFixed(0) + " meter" : dist.toFixed(1) + " kilometer";
        playRobotVoice(`Misi baru terdeteksi. Jarak ${speakDist}`);
    }

    // Mengembalikan string untuk tampilan UI (km atau m)
    return dist < 1 ? (dist * 1000).toFixed(0) + " m" : dist.toFixed(1) + " km";
}

/**
 * 14B. Fungsi Nilai Jarak (MURNI ANGKA)
 * Digunakan untuk perkalian harga (Mencegah Rp NaN)
 */
function calculateRealDistanceValue(lat1, lon1, lat2, lon2) {
    const R = 6371; // Jari-jari bumi (KM)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
              
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}

/**
 * 14C. Modal Safety Exit
 * Menutup modal jika driver klik di luar kotak (area overlay)
 */
window.addEventListener('click', (event) => {
    const modal = document.getElementById('global-modal');
    if (event.target === modal) {
        closeModal();
    }
});

// === 15. VOICE ENGINE (Text-to-Speech) ===
function playRobotVoice(text) {
    if ('speechSynthesis' in window) {
        // Batalkan suara sebelumnya agar tidak tumpang tindih
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID'; 
        utterance.pitch = 0.7;    // Suara berat khas AI Sci-fi
        utterance.rate = 1.1;     
        
        window.speechSynthesis.speak(utterance);
    }
}

// === 16. LOG MINIMIZER ENGINE ===
function toggleLog() {
    const logList = document.getElementById('log-list');
    const chevron = document.getElementById('log-chevron');
    if (!logList) return;

    if (logList.classList.contains('minimized')) {
        logList.classList.remove('minimized');
        logList.style.display = "block";
        if(chevron) chevron.innerText = "▼";
    } else {
        logList.classList.add('minimized');
        logList.style.display = "none";
        if(chevron) chevron.innerText = "▲";
    }
}




// === 17. LOG ENGINE (Smart Auto-Cleaner) ===
function addLog(msg, type = 'info') {
    const logList = document.getElementById('log-list');
    if (!logList) return;

    // Ambil waktu lokal (Format 22:40)
    const time = new Date().toLocaleTimeString('id-ID', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit' 
    });

    // Buat elemen log baru
    const logItem = document.createElement('div');
    logItem.className = `log-item ${type}`;
    logItem.style.marginBottom = "3px";
    logItem.style.fontSize = "10px";
    logItem.innerHTML = `<span style="color:#555;">[${time}]</span> <span class="log-msg">${msg}</span>`;

    // Masukkan log baru di posisi paling atas agar Driver langsung baca
    logList.insertBefore(logItem, logList.firstChild);

    // LOGIKA AUTO-CLEANER:
    // Jika jumlah pesan di dalam log sudah lebih dari 20 baris
    const maxLogs = 20;
    while (logList.children.length > maxLogs) {
        logList.removeChild(logList.lastChild); // Hapus yang paling bawah (paling lama)
    }
}
