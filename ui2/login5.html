<!DOCTYPE html>
<html lang="en" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | TERMINAL</title>
    <link rel="stylesheet" href="master.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* 2. LOADING TRANSITION LAYER */
        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader-bar {
            width: 200px; height: 2px; background: rgba(255,255,255,0.1);
            position: relative; overflow: hidden; margin-top: 20px;
        }
        .loader-progress {
            width: 0%; height: 100%; background: var(--neon-cyan);
            position: absolute; animation: loadAnim 2s infinite;
        }
        @keyframes loadAnim {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        /* 3. ICON TRANSITION (Sun to Moon) */
        .theme-toggle {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
        }
        .icon-svg { transition: opacity 0.3s, transform 0.3s; position: absolute; }
        [data-theme="dark"] #moonIcon { opacity: 0; transform: scale(0); }
        [data-theme="light"] #sunIcon { opacity: 0; transform: scale(0); }

        /* NATIVE APP BEHAVIOR */
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior-y: contain; background-color: #000; color: #fff; min-height: 100vh; }
        input { -webkit-user-select: text; user-select: text; }

        /* ROLE SELECTOR CSS */
        .role-container { display: flex; background: #111; border-radius: 12px; padding: 5px; margin-bottom: 25px; border: 1px solid #222; }
        .role-btn { flex: 1; padding: 15px; text-align: center; font-size: 11px; font-weight: 800; border-radius: 8px; transition: 0.4s; color: #444; }
        .role-btn.active[data-role="worker"] { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan-dim); }
        .role-btn.active[data-role="client"] { background: var(--neon-pink); color: #000; box-shadow: 0 0 20px var(--neon-pink-dim); }
    </style>
</head>
<body class="notranslate">

<div id="page-loader">
    <h2 class="text-neon-pink" style="letter-spacing: 5px; font-size: 14px;">SYSTEM PROCESSING</h2>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="app-container">
    <div style="display:flex; justify-content: flex-end; padding:20px;">
        <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <svg id="sunIcon" class="icon-svg text-neon-cyan" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="moonIcon" class="icon-svg text-neon-pink" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </div>
    </div>

    <div style="text-align:center; margin-bottom:40px;">
        <h1 class="text-neon-pink" style="font-size:50px; margin:0; letter-spacing:8px;">PICK ME</h1>
        <p style="color:var(--neon-cyan); font-size:9px; letter-spacing:4px; font-family:monospace;">GUILD LIFE RPG : MISSION TERMINAL</p>
    </div>

    <div class="card" style="background: rgba(5,5,5,0.9); border: 1px solid #111;">
        <div class="role-container">
            <div class="role-btn active" data-role="worker" onclick="setRole('worker')">ADVENTURER</div>
            <div class="role-btn" data-role="client" onclick="setRole('client')">REQUESTER</div>
        </div>

        <div class="input-group">
            <label>TERMINAL ACCESS ID</label>
            <input type="text" id="accessId" class="input-field" placeholder="ID Number...">
        </div>

        <div class="input-group">
            <label>ENCRYPTION CODE</label>
            <input type="password" id="accessPass" class="input-field" placeholder="******">
        </div>

        <div class="input-group" style="border: 1px solid rgba(255,255,255,0.05); padding:15px; border-radius:12px;">
            <label>HUMAN CHECK: <span id="mathQ" class="text-neon-cyan"></span></label>
            <input type="number" id="mathA" class="input-field" placeholder="?">
        </div>

        <button class="btn btn-primary" onclick="handleLogin()" id="btnLogin" style="margin-top:15px; height:60px;">AUTHORIZE ACCESS</button>

        <div style="text-align:center; margin-top:35px; font-size:10px; opacity:0.6;">
            <span>UNREGISTERED CITIZEN?</span><br><br>
            <a href="javascript:void(0)" onclick="navigateTo('register.html')" style="color:var(--neon-cyan); text-decoration:none; font-weight:800; border:1px solid; padding:8px 15px; border-radius:5px;">APPLY FOR STATUS</a>
        </div>
    </div>
</div>

<script>
    // 1. Firebase (Tetap)
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
        storageBucket: "ojeklokal-42b84.firebasestorage.app",
        messagingSenderId: "320198748498",
        appId: "1:320198748498:web:3e6038249edc6af20b328b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. LOADING & NAVIGATION SYSTEM
    function navigateTo(url) {
        if(navigator.vibrate) navigator.vibrate(50);
        document.getElementById('page-loader').style.display = 'flex';
        document.getElementById('page-loader').style.opacity = '1';
        setTimeout(() => { window.location.href = url; }, 800);
    }

    window.onload = () => {
        genCap();
        setTimeout(() => {
            document.getElementById('page-loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('page-loader').style.display = 'none'; }, 500);
        }, 1000);
    };

    // 3. THEME TOGGLE (Sun to Moon Animation)
    function toggleTheme() {
        if(navigator.vibrate) navigator.vibrate(30);
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        
        document.getElementById('themeBtn').style.transform = "rotate(360deg)";
        setTimeout(() => {
            html.setAttribute('data-theme', next);
            document.getElementById('themeBtn').style.transform = "rotate(0deg)";
        }, 300);
    }

    // 4. CORE LOGIC (Simplified for UX)
    let currentRole = 'worker';
    function setRole(r) {
        if(navigator.vibrate) navigator.vibrate(20);
        currentRole = r;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-role="${r}"]`).classList.add('active');
    }

    let n1, n2;
    function genCap() {
        n1 = Math.floor(Math.random()*10); n2 = Math.floor(Math.random()*10);
        document.getElementById('mathQ').innerText = `${n1} + ${n2}`;
    }

    async function handleLogin() {
        const id = document.getElementById('accessId').value.trim();
        const pass = document.getElementById('accessPass').value;
        const ans = document.getElementById('mathA').value;
        
        if(!id || !pass || parseInt(ans) !== (n1+n2)) {
            if(navigator.vibrate) navigator.vibrate(200);
            return alert("ACCESS DENIED: Check your credentials or captcha.");
        }

        const btn = document.getElementById('btnLogin');
        btn.innerText = "AUTHORIZING..."; btn.disabled = true;

        const path = currentRole === 'worker' ? 'drivers/' : 'users_customer/';
        try {
            const snap = await db.ref(path + id).once('value');
            if(snap.exists() && snap.val().password === pass) {
                navigateTo(currentRole === 'worker' ? 'mission_hub.html' : 'order_client.html');
            } else {
                alert("IDENTITY NOT VERIFIED.");
                btn.innerText = "AUTHORIZE ACCESS"; btn.disabled = false;
            }
        } catch (e) {
            alert("SYSTEM ERROR.");
            btn.innerText = "AUTHORIZE ACCESS"; btn.disabled = false;
        }
    }
</script>
</body>
</html>
