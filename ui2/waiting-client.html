<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | WAITING TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-gold: #ffcc00;
            --neon-red: #ff003c;
            --bg-ultra: #020205;
            --glass: rgba(20, 20, 25, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-ultra: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.1);
            --neon-cyan: #008ba3;
            --neon-pink: #c200b2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-ultra); color: #fff; font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; transition: 0.3s;
        }
        [data-theme="light"] body { color: #222; }

        /* --- NEURAL LINK HEADER --- */
        .status-bar {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color);
        }
        .neural-link { display: flex; align-items: center; gap: 8px; font-family: 'Orbitron'; font-size: 10px; color: var(--neon-cyan); }
        .dot { width: 6px; height: 6px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--neon-cyan); animation: pulse 1s infinite; }

        /* --- RADAR CORE --- */
        .radar-box { height: 260px; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .radar-scan {
            position: absolute; width: 200px; height: 200px; border: 1px solid var(--neon-cyan);
            border-radius: 50%; opacity: 0.3;
        }
        .scanner-line {
            position: absolute; width: 100px; height: 100px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent);
            transform-origin: bottom right; animation: rotate 3s linear infinite;
            top: 30px; left: 30px; border-right: 2px solid var(--neon-cyan);
        }

        /* --- APPLICANT LIST --- */
        .container { padding: 0 20px 100px 20px; }
        .section-title { font-family: 'Orbitron'; font-size: 11px; letter-spacing: 2px; color: var(--neon-gold); margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .card-applicant {
            background: var(--glass); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative; overflow: hidden;
        }
        .card-applicant::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--neon-cyan); }
        
        .avatar { width: 55px; height: 55px; border-radius: 12px; border: 2px solid var(--neon-cyan); object-fit: cover; }
        .info { flex: 1; }
        .name { font-family: 'Orbitron'; font-size: 14px; color: var(--neon-cyan); }
        .rank { font-size: 10px; color: var(--neon-gold); font-weight: bold; }
        .price-tag { font-size: 16px; font-weight: bold; margin-top: 4px; color: #fff; }
        [data-theme="light"] .price-tag { color: #000; }

        .btn-select {
            background: var(--neon-cyan); color: #000; border: none; padding: 10px 15px;
            border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer;
        }

        /* --- UTILITY BUTTONS --- */
        .bottom-actions { position: fixed; bottom: 20px; left: 0; width: 100%; padding: 0 20px; display: flex; gap: 10px; }
        .btn-util { 
            flex: 1; padding: 15px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; 
            font-weight: bold; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s;
        }
        .btn-cancel { background: rgba(255, 0, 60, 0.1); color: var(--neon-red); border-color: var(--neon-red); }

        /* --- MODAL --- */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 1000; align-items: center; justify-content: center; padding: 30px;
            backdrop-filter: blur(10px);
        }
        .modal-box { 
            background: var(--bg-ultra); border: 1px solid var(--neon-pink); padding: 25px; 
            border-radius: 15px; text-align: center; width: 100%;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body onload="initTerminal()">

    <div class="status-bar">
        <div class="neural-link">
            <div id="link-dot" class="dot"></div>
            <span id="link-text">NEURAL LINK: STABLE</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="toggleTheme()" style="background:none; border:none; color:var(--neon-cyan); font-size:18px; cursor:pointer;">🌓</button>
            <button id="audio-toggle" onclick="toggleAudio()" style="background:none; border:none; color:var(--neon-gold); font-size:18px; cursor:pointer;">🔊</button>
        </div>
    </div>

    <div class="radar-box">
        <div class="radar-scan" style="width:240px; height:240px;"></div>
        <div class="radar-scan" style="width:160px; height:160px;"></div>
        <div class="radar-scan" style="width:80px; height:80px;"></div>
        <div class="scanner-line"></div>
        <div style="position:absolute; bottom:20px; font-family:'Orbitron'; font-size:9px; color:var(--neon-cyan); letter-spacing:2px;">SCANNING FOR ADVENTURERS...</div>
    </div>

    <div class="container">
        <div class="section-title">
            <span>INCOMING APPLICATIONS</span>
            <span id="app-count" style="color:var(--neon-cyan)">0</span>
        </div>
        <div id="applicant-list">
            <div style="text-align:center; padding:40px; opacity:0.3; font-size:12px;">MENUNGGU RESPONS SERVER...</div>
        </div>
    </div>

    <div class="bottom-actions">
        <button class="btn-util btn-cancel" onclick="askCancel()">ABORT MISSION</button>
    </div>

    <div id="modal-cancel" class="modal">
        <div class="modal-box">
            <h2 style="font-family:'Orbitron'; color:var(--neon-red); margin-bottom:10px;">ABORT MISSION?</h2>
            <p style="font-size:13px; color:#888; margin-bottom:20px;">Data misi akan dihapus permanen dari sistem Guild. Energi tidak dapat dikembalikan.</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-util" onclick="closeModal()" style="background:var(--bg-input);">TIDAK</button>
                <button class="btn-util" onclick="confirmDelete()" style="background:var(--neon-red); color:#fff; border:none;">YA, HAPUS</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- SESSION DATA ---
        const questId = localStorage.getItem('active_quest_id');
        const serverNode = localStorage.getItem('active_server_node');
        let isAudioOn = true;
        let isProcessing = false;

        // --- AUDIO ---
        const sndRadar = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const sndFound = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3');
        sndRadar.loop = true;

        function initTerminal() {
            if (!questId || !serverNode) return window.location.href = 'create-mission.html';
            
            // Sync Theme
            if(localStorage.getItem('theme') === 'light') toggleTheme();
            
            startNeuralLink();
            listenToApplicants();
            listenToMissionStatus();
        }

        // --- REALTIME LOGIC ---
        function startNeuralLink() {
            const linkDot = document.getElementById('link-dot');
            const linkText = document.getElementById('link-text');
            
            db.ref(".info/connected").on("value", (snap) => {
                if (snap.val() === true) {
                    linkDot.style.background = "var(--neon-cyan)";
                    linkText.innerText = "NEURAL LINK: STABLE";
                    if(isAudioOn) sndRadar.play();
                } else {
                    linkDot.style.background = "var(--neon-red)";
                    linkText.innerText = "NEURAL LINK: LOST";
                    sndRadar.pause();
                }
            });
        }

        function listenToApplicants() {
            const listEl = document.getElementById('applicant-list');
            const countEl = document.getElementById('app-count');

            db.ref(`database_regional/${serverNode}/missions/${questId}/applicants`).on('value', snap => {
                const data = snap.val();
                listEl.innerHTML = "";
                
                if (!data) {
                    listEl.innerHTML = `<div style="text-align:center; padding:40px; opacity:0.3; font-size:12px;">MENUNGGU PENDAFTAR...</div>`;
                    countEl.innerText = "0";
                    return;
                }

                const keys = Object.keys(data);
                countEl.innerText = keys.length;
                if(isAudioOn) sndFound.play();

                keys.forEach(key => {
                    const app = data[key];
                    const card = `
                        <div class="card-applicant">
                            <img src="${app.photo || 'https://via.placeholder.com/60'}" class="avatar">
                            <div class="info">
                                <div class="name">${key.toUpperCase()}</div>
                                <div class="rank">RANK ${app.rank || 'F'}</div>
                                <div class="price-tag">Rp ${(app.price || 0).toLocaleString()}</div>
                            </div>
                            <button class="btn-select" onclick="selectAdventurer('${key}', ${app.price})">PICK</button>
                        </div>
                    `;
                    listEl.innerHTML += card;
                });
            });
        }

        function listenToMissionStatus() {
            // Anti-Ghosting: Jika misi sudah diambil orang lain/selesai, pindah halaman
            db.ref(`database_regional/${serverNode}/missions/${questId}/status`).on('value', snap => {
                const status = snap.val();
                if (status === 'ON_THE_WAY' || status === 'TAKEN') {
                    window.location.href = 'on-trip-client.html';
                }
            });
        }

        // --- CORE ACTIONS ---
        async function selectAdventurer(nick, finalPrice) {
            if (isProcessing) return;
            isProcessing = true;

            const updates = {};
            // 1. Set Status & Eksekutor
            updates[`database_regional/${serverNode}/missions/${questId}/status`] = "ON_THE_WAY";
            updates[`database_regional/${serverNode}/missions/${questId}/rpgSystem/adventurer`] = nick;
            updates[`database_regional/${serverNode}/missions/${questId}/rpgSystem/status`] = "TAKEN";
            updates[`database_regional/${serverNode}/missions/${questId}/bounty/price`] = finalPrice;
            
            // 2. Bersihkan dari Board Publik
            updates[`board_central/active_quests/${questId}`] = null;

            try {
                await db.ref().update(updates);
                // Listener di listenToMissionStatus akan menangani perpindahan halaman
            } catch (e) {
                alert("SYSTEM ERROR: " + e.message);
                isProcessing = false;
            }
        }

        // --- HARD DELETE LOGIC ---
        function askCancel() { document.getElementById('modal-cancel').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-cancel').style.display = 'none'; }

        async function confirmDelete() {
            const updates = {};
            updates[`database_regional/${serverNode}/missions/${questId}`] = null; // Hapus Regional
            updates[`board_central/active_quests/${questId}`] = null;             // Hapus Central

            try {
                await db.ref().update(updates);
                localStorage.removeItem('active_quest_id');
                window.location.href = 'create-mission.html';
            } catch (e) {
                alert("DELETE FAILED: " + e.message);
            }
        }

        // --- UTILS ---
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function toggleAudio() {
            isAudioOn = !isAudioOn;
            const btn = document.getElementById('audio-toggle');
            if(isAudioOn) {
                btn.innerText = "🔊";
                sndRadar.play();
            } else {
                btn.innerText = "🔇";
                sndRadar.pause();
            }
        }
    </script>
</body>
</html>
