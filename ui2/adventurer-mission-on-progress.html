<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MISSION ON PROGRESS | SOVEREIGN</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p-cyan: #00f3ff; --p-pink: #ff00ea; --p-gold: #ffcc00;
            --p-bg: #050505; --glass: rgba(10, 10, 20, 0.9);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Rajdhani', sans-serif; background: var(--p-bg); color: #fff; overflow: hidden; }

        /* MAP DARK MODE FILTER */
        #map { height: 100vh; width: 100%; z-index: 1; filter: brightness(0.6) contrast(1.2) invert(100%) hue-rotate(180deg); }

        /* UI OVERLAYS */
        .overlay { position: absolute; z-index: 10; width: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* TOP INFO: TARGET CLIENT */
        .top-info { top: 15px; padding: 0 15px; }
        .target-card { 
            background: var(--glass); border: 1px solid var(--p-cyan); padding: 12px; 
            border-radius: 8px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .client-pfp { width: 45px; height: 45px; border-radius: 4px; border: 1px solid var(--p-cyan); }

        /* BOTTOM UI: ACTIONS & NAVIGATION */
        .bottom-ui { bottom: 0; padding: 15px; background: linear-gradient(transparent, #000 40%); }
        .progress-stepper { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 10px; color: #444; }
        .step-active { color: var(--p-cyan); font-weight: bold; }

        /* BUTTONS */
        .btn { 
            width: 100%; padding: 15px; border: none; font-family: 'Orbitron'; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 8px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s;
        }
        .btn-arrived { background: var(--p-gold); color: #000; }
        .btn-start { background: var(--p-cyan); color: #000; }
        .btn-finish { background: #00ff00; color: #000; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }

        /* MODAL CLEAR MISSION */
        .modal-clear {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .reward-box { background: #111; border: 1px solid var(--p-gold); width: 100%; padding: 20px; text-align: center; }
        .loot-item { font-size: 24px; color: var(--p-gold); font-family: 'Orbitron'; margin: 10px 0; }

        /* RATING SECTION */
        .rating-grid { display: flex; gap: 20px; margin: 20px 0; }
        .rate-btn { 
            padding: 15px; border: 1px solid #333; background: #000; color: #fff; 
            flex: 1; text-align: center; cursor: pointer; 
        }
        .rate-btn.selected-like { border-color: var(--p-cyan); color: var(--p-cyan); box-shadow: inset 0 0 10px var(--p-cyan); }
        .rate-btn.selected-dislike { border-color: var(--p-pink); color: var(--p-pink); box-shadow: inset 0 0 10px var(--p-pink); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay top-info">
        <div class="target-card interactive">
            <img src="https://via.placeholder.com/50" class="client-pfp">
            <div style="flex: 1;">
                <div id="ui-client-name" style="font-weight: bold; font-size: 14px;">CLIENT_NAME</div>
                <div id="ui-client-rep" style="font-size: 10px; color: var(--p-cyan);">REPUTASI: TERPERCAYA</div>
            </div>
            <div style="text-align: right;">
                <div style="color: var(--p-pink); font-size: 11px;">CASH ONLY</div>
                <div id="ui-price" style="font-weight: bold; color: #fff;">Rp 0</div>
            </div>
        </div>
    </div>

    <div class="overlay bottom-ui">
        <div class="progress-stepper">
            <span id="step-1" class="step-active">1. MENUJU LOKASI</span>
            <span id="step-2">2. TRIP AKTIF</span>
            <span id="step-3">3. TITIK TUJUAN</span>
        </div>

        <div class="interactive">
            <button id="btn-arrived" class="btn btn-arrived" onclick="updateStage('ARRIVED')">SAYA SUDAH SAMPAI</button>
            <button id="btn-start" class="btn btn-start" style="display:none;" onclick="updateStage('ON_TRIP')">MULAI PERJALANAN</button>
            <button id="btn-finish" class="btn btn-finish" style="display:none;" onclick="showClearModal()">SELESAIKAN MISI (TAGIH CASH)</button>

            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <button class="btn" style="flex:1; background:#222; font-size: 11px;" onclick="openChat()">HUBUNGI CLIENT</button>
                <button class="btn" style="flex:1; background:#222; font-size: 11px;" onclick="openNavigation()">NAVIGASI (GMAPS)</button>
            </div>
        </div>
    </div>

    <div id="modal-clear" class="modal-clear">
        <h2 style="font-family: 'Orbitron'; color: var(--p-cyan);">MISSION CLEAR</h2>
        
        <div class="reward-box">
            <div style="font-size: 12px; color: #666;">SYSTEM REWARDS:</div>
            <div class="loot-item">+500 EXP</div>
            <div class="loot-item" style="color: #00ff88;">+2 GREEN STONE</div>
            <div style="font-size: 11px; color: var(--p-pink); margin-top: 10px;">STAMINA TERPAKAI: -25 HP</div>
        </div>

        <p style="margin-top: 30px; font-size: 13px;">BAGAIMANA PENGALAMAN DENGAN CLIENT?</p>
        <div class="rating-grid">
            <div id="rate-like" class="rate-btn" onclick="selectRate('LIKE')">👍 LIKE</div>
            <div id="rate-dislike" class="rate-btn" onclick="selectRate('DISLIKE')">👎 DISLIKE</div>
        </div>

        <textarea id="review-client" placeholder="Catatan untuk Adventurer lain (opsional)..." style="width:100%; background:#111; border:1px solid #333; color:white; padding:10px; height:80px;"></textarea>

        <button class="btn btn-finish" style="margin-top: 30px;" onclick="finalizeMission()">KONFIRMASI & AMBIL HADIAH</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Init Firebase (Gunakan Config Anda)
        const firebaseConfig = { /* ... config ... */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const questId = localStorage.getItem('active_mission_id');
        const node = localStorage.getItem('active_server_node');
        const driverId = localStorage.getItem('current_driver_id');

        let map, driverMarker, currentStage = 'OTW';
        let userRating = null;

        function init() {
            initMap();
            syncData();
            startTracking();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-6.97, 108.48], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            const icon = L.divIcon({
                className: 'custom-icon',
                html: `<div style="background:var(--p-cyan); width:12px; height:12px; border-radius:50%; box-shadow:0 0 10px var(--p-cyan);"></div>`
            });
            driverMarker = L.marker([0,0], {icon}).addTo(map);
        }

        function syncData() {
            db.ref(`database_regional/${node}/missions/${questId}`).on('value', snap => {
                const data = snap.val();
                if (!data) return;

                document.getElementById('ui-client-name').innerText = data.client_name;
                document.getElementById('ui-price').innerText = `Rp ${data.price.toLocaleString()}`;
                
                // Set UI state berdasarkan status di DB
                if (data.status === "ARRIVED") toggleUI('btn-start');
                if (data.status === "ON_TRIP") toggleUI('btn-finish');
            });
        }

        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                driverMarker.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);

                // Update Real-time Tracking untuk Client
                db.ref(`database_regional/${node}/tracking/${questId}`).update({
                    lat: latitude, lng: longitude, last_updated: Date.now()
                });
            }, null, { enableHighAccuracy: true });
        }

        function updateStage(status) {
            const updates = {};
            updates[`database_regional/${node}/missions/${questId}/status`] = status;
            
            db.ref().update(updates).then(() => {
                if(status === 'ARRIVED') toggleUI('btn-start');
                if(status === 'ON_TRIP') toggleUI('btn-finish');
            });
        }

        function toggleUI(showBtnId) {
            document.getElementById('btn-arrived').style.display = 'none';
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-finish').style.display = 'none';
            document.getElementById(showBtnId).style.display = 'block';

            // Update Stepper
            if(showBtnId === 'btn-start') document.getElementById('step-2').className = 'step-active';
            if(showBtnId === 'btn-finish') document.getElementById('step-3').className = 'step-active';
        }

        function showClearModal() {
            document.getElementById('modal-clear').style.display = 'flex';
        }

        function selectRate(val) {
            userRating = val;
            document.getElementById('rate-like').className = 'rate-btn' + (val === 'LIKE' ? ' selected-like' : '');
            document.getElementById('rate-dislike').className = 'rate-btn' + (val === 'DISLIKE' ? ' selected-dislike' : '');
        }

        function finalizeMission() {
            if (!userRating) return alert("Beri rating Client terlebih dahulu!");

            const reviewText = document.getElementById('review-client').value;

            // Logika Hadiah & Stamina
            const finalUpdates = {};
            finalUpdates[`database_regional/${node}/missions/${questId}/status`] = "COMPLETED";
            finalUpdates[`database_regional/${node}/missions/${questId}/client_review_by_driver`] = {
                rating: userRating,
                note: reviewText
            };
            
            // Tambahkan EXP & Green Stone, Kurangi Stamina
            const driverRef = db.ref(`drivers/${driverId}`);
            driverRef.transaction(current => {
                if (current) {
                    current.stamina = Math.max(0, (current.stamina || 0) - 25);
                    current.exp = (current.exp || 0) + 500;
                    current.green_stone = (current.green_stone || 0) + 2;
                    current.total_missions = (current.total_missions || 0) + 1;
                }
                return current;
            });

            db.ref().update(finalUpdates).then(() => {
                alert("MISI SELESAI! Hadiah telah ditambahkan ke profil Anda.");
                window.location.replace('adventurer-hub.html');
            });
        }

        function openNavigation() {
            // Logika membuka Google Maps dengan koordinat tujuan
            window.open(`https://www.google.com/maps/dir/?api=1&destination=-6.97,108.48`);
        }

        window.onload = init;
    </script>
</body>
</html>
