<!DOCTYPE html>
<html lang="id" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | ADVENTURER HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-gold: #ffcc00;
            --neon-red: #ff003c;
            --bg-ultra: #020205;
            --glass: rgba(20, 20, 25, 0.85);
            --terminal-font: 'Courier New', monospace;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-ultra); color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* --- HEADER & STAMINA --- */
        .top-nav { padding: 15px 20px 10px 20px; background: linear-gradient(to bottom, #000, transparent); position: relative; z-index: 100; }
        
        .stamina-container {
            width: 100%; height: 24px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 4px; position: relative; overflow: hidden;
        }
        .stamina-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-red), var(--neon-cyan)); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .stamina-text { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-family: 'Orbitron'; font-size: 10px; text-shadow: 0 0 5px #000; z-index: 2; }

        .rank-badge {
            background: linear-gradient(45deg, #0a0a0a, #1a1a1a); padding: 10px 15px;
            border-left: 3px solid var(--neon-gold); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px;
        }

        /* --- SYSTEM LOG CONSOLE --- */
        .log-box {
            margin: 0 20px; background: rgba(0,0,0,0.8); border: 1px solid #222;
            height: 60px; overflow-y: auto; padding: 8px; font-family: var(--terminal-font); font-size: 10px; border-radius: 4px;
        }
        .log-cyan { color: var(--neon-cyan); }
        .log-red { color: var(--neon-red); }
        .log-gold { color: var(--neon-gold); }

        /* --- RADAR TOGGLE --- */
        .system-switch { display: flex; justify-content: center; margin: 15px 0; }
        .radar-toggle {
            width: 80%; padding: 12px 20px; border-radius: 50px; border: 1px solid #333;
            background: #0a0a0a; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.5s;
        }
        .radar-toggle.active { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        .status-label { font-family: 'Orbitron'; font-size: 12px; letter-spacing: 2px; }
        
        .toggle-knob { width: 20px; height: 20px; background: #333; border-radius: 50%; transition: 0.5s; }
        .active .toggle-knob { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

        /* --- MISSION BOARD --- */
        #mission-board {
            height: calc(100% - 280px); overflow-y: auto; padding: 0 15px 90px 15px;
            mask-image: linear-gradient(to bottom, transparent, black 2%, black 90%, transparent);
        }

        .quest-card {
            background: var(--glass); border: 1px solid #222; margin-bottom: 15px; padding: 15px;
            border-radius: 8px; border-left: 4px solid var(--neon-cyan); position: relative; animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(10px);
        }
        .quest-card.urgent { border-left-color: var(--neon-red); background: linear-gradient(135deg, rgba(255,0,0,0.05), var(--glass)); }
        
        /* Premium Data Styling */
        .client-rep { font-size: 10px; padding: 4px; text-align: center; border-radius: 2px; margin: 8px 0; font-weight: bold; letter-spacing: 1px; }
        .rep-trust { border: 1px solid var(--neon-cyan); color: var(--neon-cyan); background: rgba(0, 243, 255, 0.05); }
        .rep-risk { border: 1px solid var(--neon-red); color: var(--neon-red); background: rgba(255, 0, 60, 0.1); }
        
        .route-box { background: #000; border: 1px solid #1a1a1a; padding: 10px; margin: 10px 0; font-size: 12px; border-radius: 4px; }
        .point { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #ddd; }
        .point-icon { width: 6px; height: 6px; border-radius: 50%; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin-bottom: 15px; }
        .stat-item { background: #000; padding: 5px; border: 1px solid #222; border-radius: 4px; }
        .stat-item label { display: block; font-size: 9px; color: #666; }
        .stat-item b { font-size: 12px; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; font-family: 'Rajdhani'; font-weight: bold; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-apply { background: var(--neon-cyan); color: #000; }
        .btn-nego { background: transparent; border: 1px solid var(--neon-gold); color: var(--neon-gold); }
        .btn-apply:active { transform: scale(0.95); }

        /* --- TOAST NOTIFICATION --- */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.9); border: 1px solid var(--neon-cyan); color: #fff; padding: 12px 20px; border-radius: 4px; font-family: 'Orbitron'; font-size: 12px; box-shadow: 0 0 15px rgba(0,243,255,0.2); animation: dropIn 0.3s forwards; }
        .toast.error { border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255,0,60,0.2); color: var(--neon-red); }

        /* --- MODAL NEGO --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: var(--glass); border: 1px solid var(--neon-gold); padding: 25px; width: 85%; border-radius: 8px; box-shadow: 0 0 30px rgba(255,204,0,0.1); }
        .modal-input { width: 100%; background: #000; border: 1px solid #333; color: var(--neon-gold); padding: 15px; margin: 15px 0; font-size: 20px; font-weight: bold; text-align: center; border-radius: 4px; outline: none; font-family: 'Orbitron'; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .bottom-dock { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .dock-item { text-align: center; color: #555; font-size: 10px; font-family: 'Orbitron'; }
        .dock-item.active { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body onload="initHub()">

    <div id="toast-container"></div>

    <div class="top-nav">
        <div style="display:flex; justify-content: space-between; margin-bottom: 5px;">
            <span style="font-size: 10px; color: #888; letter-spacing: 1px;">VITALITY / STAMINA</span>
            <span id="stamina-val" style="font-size: 10px; color: var(--neon-cyan);">0 / 1000</span>
        </div>
        <div class="stamina-container">
            <div id="stamina-bar" class="stamina-fill"></div>
            <div class="stamina-text">NEURAL LINK STABILITY</div>
        </div>

        <div class="rank-badge">
            <div>
                <div style="font-size: 9px; color: #666;">CURRENT RANK</div>
                <div id="ui-rank" style="font-family:'Orbitron'; font-size:14px; color:var(--neon-gold);">LOADING...</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 9px; color: #666;">DAILY LIMIT</div>
                <div id="ui-limit" style="font-family:'Orbitron'; font-size:14px;">0/0</div>
            </div>
        </div>
    </div>

    <div class="log-box" id="system-logs">
        <div class="log-cyan">[SYS] SYSTEM INITIALIZED. READY.</div>
    </div>

    <div class="system-switch">
        <div id="radar-btn" class="radar-toggle" onclick="toggleRadar()">
            <span id="radar-text" class="status-label" style="color:#555;">RADAR OFFLINE</span>
            <div class="toggle-knob"></div>
        </div>
    </div>

    <div id="mission-board">
        <div style="text-align: center; color: #333; margin-top: 50px;">
            <p style="font-family:'Orbitron';">RADAR STANDBY</p>
            <p style="font-size: 10px;">AKTIFKAN SISTEM UNTUK MENCARI KONTRAK</p>
        </div>
    </div>

    <div class="bottom-dock">
        <div class="dock-item active">TERMINAL</div>
        <div class="dock-item" onclick="location.href='inventory.html'">VAULT</div>
        <div class="dock-item" onclick="location.href='profile.html'">PROFILE</div>
    </div>

    <div id="negoModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color:var(--neon-gold); font-family:'Orbitron'; margin:0 0 5px 0; text-align:center;">AJUKAN NEGO</h3>
            <p style="font-size:12px; color:#888; text-align:center; margin:0;">Harga saat ini: <span id="nego-current-price" style="color:#fff;">Rp 0</span></p>
            <input type="number" id="nego-input" class="modal-input" placeholder="0">
            <div class="btn-row">
                <button class="btn btn-nego" onclick="closeNego()">BATAL</button>
                <button class="btn btn-apply" style="background:var(--neon-gold);" onclick="submitNego()">KIRIM SINYAL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
            authDomain: "ojeklokal-42b84.firebaseapp.com",
            databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ojeklokal-42b84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const myNick = localStorage.getItem('user_nickname') || "nezza";
        let myData = null;
        let isRadarOnline = false;
        let selectedMissionId = null;

        // Sound FX
        const sfxOnline = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const sfxOffline = new Audio('https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3');
        const sfxApply = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        async function initHub() {
            db.ref(`users_adventurer/${myNick}`).on('value', snap => {
                myData = snap.val();
                if(myData) updateUserUI();
            });
        }

        function updateUserUI() {
            const cur = myData.vitality.stamina_current || 0; 
            const max = myData.vitality.stamina_max || 1000;
            document.getElementById('stamina-bar').style.width = (cur/max*100) + "%";
            document.getElementById('stamina-val').innerText = `${cur} / ${max}`;
            document.getElementById('ui-rank').innerText = myData.rank || "UNRANKED";
            
            const limit = myData.vitality.apply_limit_daily || 10;
            const done = myData.stats?.total_missions_today || 0;
            document.getElementById('ui-limit').innerText = `${done} / ${limit}`;
        }

        // --- CUSTOM TOAST & LOGS ---
        function showToast(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = msg;
            container.appendChild(toast);
            if(navigator.vibrate) navigator.vibrate(type === 'error' ? [50, 50, 50] : 50);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function addLog(msg, type = "log-cyan") {
            const box = document.getElementById('system-logs');
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            box.innerHTML = `<div class="${type}">[${time}] ${msg}</div>` + box.innerHTML;
        }

        function toggleRadar() {
            isRadarOnline = !isRadarOnline;
            const btn = document.getElementById('radar-btn');
            const txt = document.getElementById('radar-text');

            if(isRadarOnline) {
                btn.classList.add('active');
                txt.innerText = "RADAR ACTIVE";
                txt.style.color = "var(--neon-cyan)";
                sfxOnline.play();
                addLog("SCANNING REGIONAL DATA...", "log-gold");
                startListeningMissions();
            } else {
                btn.classList.remove('active');
                txt.innerText = "RADAR OFFLINE";
                txt.style.color = "#555";
                sfxOffline.play();
                addLog("RADAR DISCONNECTED.", "log-red");
                db.ref('board_central/active_quests').off();
                document.getElementById('mission-board').innerHTML = `<div style="text-align: center; color: #333; margin-top: 50px;"><p style="font-family:'Orbitron';">RADAR STANDBY</p></div>`;
            }
        }

        function startListeningMissions() {
            const board = document.getElementById('mission-board');
            board.innerHTML = `<div style="text-align:center; color:var(--neon-cyan); margin-top:30px; font-family:'Orbitron';">SYNCING DATA...</div>`;

            // MENGGUNAKAN IDE AWAL (Board Central) yang support Data Lengkap
            db.ref('board_central/active_quests').on('value', snapshot => {
                board.innerHTML = ""; 
                const quests = snapshot.val();

                if (!quests) {
                    board.innerHTML = `<div style="text-align:center; margin-top:50px; color:#444;">TIDAK ADA KONTRAK AKTIF</div>`;
                    return;
                }

                Object.keys(quests).forEach(mId => {
                    const m = quests[mId];
                    if (m.status === "SEARCHING" || (m.rpgSystem && m.rpgSystem.status === "SEARCHING")) {
                        
                        // Sistem Anti-Fraud & Reputasi
                        let repClass = "rep-trust"; let repText = "CLIENT TERVERIFIKASI";
                        if(m.client_stats?.cancel > 10) { repClass = "rep-risk"; repText = "⚠️ BERESIKO (SERING BATAL)"; }
                        
                        board.innerHTML += `
                            <div class="quest-card ${m.is_urgent ? 'urgent' : ''}">
                                <div style="display:flex; justify-content:space-between; font-family:'Orbitron';">
                                    <span style="color:var(--neon-cyan);">${m.category || 'QUEST'} CONTRACT</span>
                                    <span style="font-size:10px; color:#666;">#${mId.substring(0,8)}</span>
                                </div>
                                
                                <div style="font-size:22px; color:var(--neon-gold); font-weight:bold; margin:5px 0;">
                                    Rp ${(m.price || m.bounty || 0).toLocaleString()}
                                </div>

                                <div class="client-rep ${repClass}">${repText}</div>

                                <div class="route-box">
                                    <div class="point"><div class="point-icon" style="background:var(--neon-cyan)"></div> <b>JEMPUT:</b> ${m.pickup_area || m.route?.pickup || 'Lokasi Dirahasiakan'}</div>
                                    <div class="point"><div class="point-icon" style="background:var(--neon-red)"></div> <b>TUJUAN:</b> ${m.dest_area || m.route?.destination || 'Sesuai Arahan'}</div>
                                </div>

                                <div class="stats-grid">
                                    <div class="stat-item"><label>LIKE</label><b style="color:var(--neon-cyan)">${m.client_stats?.like || 0}</b></div>
                                    <div class="stat-item"><label>DISLIKE</label><b style="color:var(--neon-red)">${m.client_stats?.dislike || 0}</b></div>
                                    <div class="stat-item"><label>CANCEL</label><b style="color:#888">${m.client_stats?.cancel || 0}</b></div>
                                    <div class="stat-item"><label>FINISH</label><b style="color:var(--neon-gold)">${m.client_stats?.total_finish || 0}</b></div>
                                </div>

                                <div class="btn-row">
                                    <button class="btn btn-nego" onclick="openNego('${mId}', ${m.price || m.bounty || 0})">NEGO</button>
                                    <button class="btn btn-apply" onclick="applyForMission('${mId}', 50)">TERIMA MISI</button>
                                </div>
                            </div>
                        `;
                    }
                });
            });
        }

        async function applyForMission(mId, cost) {
            if (!myData) return showToast("Gagal memuat profil!", "error");
            
            const curStamina = myData.vitality.stamina_current || 0;
            if (curStamina < cost) return showToast("CRITICAL: STAMINA TIDAK CUKUP!", "error");

            sfxApply.play();
            addLog(`Mendaftarkan diri ke Misi #${mId.substring(0,5)}...`, "log-cyan");
            
            try {
                await db.ref(`board_central/active_quests/${mId}/applicants/${myNick}`).set({
                    nickname: myNick,
                    rank: myData.rank,
                    timestamp: Date.now()
                });
                showToast("TRANSMISI SUKSES! Menunggu Konfirmasi.");
                addLog("Pendaftaran terkirim. Standby.", "log-gold");
            } catch (e) {
                showToast("ERROR: " + e.message, "error");
            }
        }

        // --- SISTEM NEGO PREMIUM ---
        function openNego(mId, price) {
            selectedMissionId = mId;
            document.getElementById('nego-current-price').innerText = `Rp ${price.toLocaleString()}`;
            document.getElementById('nego-input').value = price;
            document.getElementById('negoModal').style.display = 'flex';
        }

        function closeNego() {
            document.getElementById('negoModal').style.display = 'none';
        }

        function submitNego() {
            const negoPrice = document.getElementById('nego-input').value;
            if(!negoPrice || negoPrice <= 0) return showToast("Masukkan harga valid!", "error");

            db.ref(`board_central/active_quests/${selectedMissionId}/nego_requests/${myNick}`).set({
                offered_price: parseInt(negoPrice),
                status: 'PENDING',
                timestamp: Date.now()
            }).then(() => {
                showToast("HARGA NEGO DIAJUKAN!");
                addLog(`Nego Rp ${negoPrice} diajukan untuk #${selectedMissionId.substring(0,5)}`, "log-cyan");
                closeNego();
            }).catch(e => showToast("Gagal: " + e.message, "error"));
        }
    </script>
</body>
</html>
