<!DOCTYPE html>
<html lang="en" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICK ME | MISSION TERMINAL</title>
    <link rel="stylesheet" href="master.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-cyan-dim: rgba(0, 243, 255, 0.3);
            --neon-pink-dim: rgba(255, 0, 234, 0.3);
        }

        /* --- FONDASI NATIVE APP FEEL --- */
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { overscroll-behavior-y: contain; background-color: #000; color: #fff; min-height: 100vh; margin: 0; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        input { -webkit-user-select: text; user-select: text; font-family: monospace; }

        .app-container { padding: 20px; max-width: 450px; margin: auto; }

        /* 1. STATUS JARINGAN */
        .network-status {
            position: fixed; top: 15px; left: 15px; display: flex; align-items: center; gap: 8px; font-size: 9px; letter-spacing: 1px; z-index: 1001;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
        .status-dot.online { background: #00ff00; box-shadow: 0 0 8px #00ff00; }

        /* 2. LOADING LAYER */
        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; margin-top: 20px; }
        .loader-progress { width: 0%; height: 100%; background: var(--neon-cyan); position: absolute; animation: loadAnim 2s infinite; }
        @keyframes loadAnim { 0% { width: 0%; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0%; left: 100%; } }

        /* 3. INPUT STYLING */
        .card { background: rgba(10,10,10,0.9); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; color: #555; margin-bottom: 8px; letter-spacing: 1px; }
        .input-field { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #222; 
            padding: 15px; color: #fff; border-radius: 8px; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.05); }

        /* 4. PASS WRAPPER */
        .pass-wrapper { position: relative; width: 100%; }
        .toggle-pass { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            color: #444; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 5; 
        }

        /* 5. ROLE SELECTOR */
        .role-container { display: flex; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 4px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .role-btn { flex: 1; padding: 12px; text-align: center; font-size: 11px; font-weight: bold; border-radius: 6px; transition: 0.3s; color: #666; cursor: pointer; }
        .role-btn.active[data-role="worker"] { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan-dim); }
        .role-btn.active[data-role="client"] { background: var(--neon-pink); color: #000; box-shadow: 0 0 15px var(--neon-pink-dim); }

        /* 6. BUTTONS */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: 0.3s; }
        .btn-primary { background: var(--neon-pink); color: #fff; text-shadow: 0 0 5px #fff; box-shadow: 0 0 20px var(--neon-pink-dim); }
        .btn-secondary { background: #222; color: #fff; border: 1px solid #333; }
        .btn:active { transform: scale(0.98); }

        /* 7. MODAL */
        #customModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-box { width: 100%; max-width: 350px; padding: 30px; border: 1px solid var(--neon-pink); background: #0a0a0a; text-align: center; border-radius: 10px; }
        
        .text-neon-pink { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .text-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body class="notranslate">

<div class="network-status">
    <div id="netDot" class="status-dot"></div>
    <span id="netText">SYSTEM OFFLINE</span>
</div>

<div id="page-loader">
    <h2 class="text-neon-pink" style="letter-spacing: 5px; font-size: 14px;">INITIALIZING TERMINAL</h2>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="app-container">
    <div style="text-align:center; margin: 60px 0 40px 0;">
        <h1 class="text-neon-pink" style="font-size:45px; margin:0; letter-spacing:8px; font-family: 'Orbitron';">SOVEREIGN</h1>
        <p style="color:var(--neon-cyan); font-size:10px; letter-spacing:3px; font-family:monospace; margin-top:5px;">REAL-TIME MISSION INTERFACE</p>
    </div>

    <div class="card">
        <label style="font-size:9px; color:#555; margin-bottom:10px; display:block; text-align: center;">IDENTIFY ACCESS PATH:</label>
        <div class="role-container">
            <div class="role-btn active" data-role="worker" onclick="setRole('worker')">ADVENTURER</div>
            <div class="role-btn" data-role="client" onclick="setRole('client')">REQUESTER</div>
        </div>

        <div class="input-group">
            <label>IDENTITY NICKNAME</label>
            <input id="accessId" class="input-field" placeholder="Ex: nezza" spellcheck="false">
        </div>

        <div class="input-group">
            <label>ACCESS CODE (PASSWORD)</label>
            <div class="pass-wrapper">
                <input type="password" id="accessPass" class="input-field" placeholder="******">
                <span class="toggle-pass" onclick="togglePass()">SHOW</span>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 10px; color: #555;">
            <div style="display:flex; align-items:center; gap:5px;">
                <input type="checkbox" id="rememberMe"> <label for="rememberMe" style="margin:0;">SAVE SESSION</label>
            </div>
            <span style="color: var(--neon-cyan); cursor: pointer;" onclick="forgotAccess()">LOST CODE?</span>
        </div>

        <div class="input-group" style="border: 1px solid rgba(0,255,255,0.1); padding:15px; border-radius:8px;">
            <label>HUMAN VERIFICATION: <span id="mathQ" style="color:var(--neon-cyan)"></span></label>
            <input type="number" id="mathA" class="input-field" placeholder="Result?">
        </div>

        <button class="btn btn-primary" onclick="handleLogin()" id="btnLogin" style="margin-top:10px;">DECRYPT ACCESS</button>

        <div style="text-align:center; margin-top:30px; font-size:11px;">
            <span style="color:#444;">UNREGISTERED CITIZEN?</span><br>
            <a href="register.html" style="color:var(--neon-cyan); text-decoration:none; font-weight:bold;">APPLY FOR STATUS</a>
        </div>
    </div>
</div>

<div id="customModal">
    <div class="modal-box">
        <h2 id="modalTitle" class="text-neon-pink" style="margin-top:0; font-size: 18px;">NOTICE</h2>
        <p id="modalMsg" style="font-size:13px; color:#ccc; line-height:1.6;"></p>
        <div id="modalExtra"></div> 
        <div style="display:flex; gap:10px; justify-content:center; margin-top: 20px;">
            <button class="btn btn-secondary" id="modalActionBtn" onclick="closeModal()" style="padding: 12px;">ACKNOWLEDGE</button>
            <button class="btn btn-secondary" id="modalCancelBtn" style="display:none; padding: 12px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyA8gSce2OvSC0hece_r_kifBKoG8mkVZBk",
        authDomain: "ojeklokal-42b84.firebaseapp.com",
        databaseURL: "https://ojeklokal-42b84-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ojeklokal-42b84",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. NETWORK MONITOR ---
    function updateNet() {
        const dot = document.getElementById('netDot');
        const txt = document.getElementById('netText');
        if(navigator.onLine) {
            dot.className = "status-dot online"; txt.innerText = "TERMINAL ONLINE";
        } else {
            dot.className = "status-dot"; txt.innerText = "SYSTEM OFFLINE";
        }
    }
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);

    // --- 3. UI UTILS ---
    function hapticClick() { if(navigator.vibrate) navigator.vibrate(20); }

    function togglePass() {
        const p = document.getElementById('accessPass');
        const t = document.querySelector('.toggle-pass');
        p.type = (p.type === 'password') ? 'text' : 'password';
        t.innerText = (p.type === 'password') ? 'SHOW' : 'HIDE';
    }

    let currentRole = 'worker';
    function setRole(role) {
        hapticClick();
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.role-btn[data-role="${role}"]`).classList.add('active');
    }

    let n1, n2;
    function genCap() {
        n1 = Math.floor(Math.random()*10); n2 = Math.floor(Math.random()*10);
        document.getElementById('mathQ').innerText = `${n1} + ${n2}`;
    }

    // --- 4. LOGIN LOGIC (FIXED TO NICKNAME) ---
    async function handleLogin() {
        const nickname = document.getElementById('accessId').value.trim().toLowerCase(); // Nickname di DB kecil semua biasanya
        const pass = document.getElementById('accessPass').value;
        const ans = document.getElementById('mathA').value;
        const remember = document.getElementById('rememberMe').checked;
        
        if(!nickname || !pass) return showMsg("Identity and Code are required.");
        if(parseInt(ans) !== (n1+n2)) return showMsg("Human verification failed.");

        hapticClick();
        const btn = document.getElementById('btnLogin');
        btn.innerText = "AUTHENTICATING..."; btn.disabled = true;

        // Path disesuaikan dengan gambar
        const path = currentRole === 'worker' ? 'users_adventurer/' : 'users_customer/';
        
        try {
            // Kita tembak langsung ke node nickname
            const snap = await db.ref(path + nickname).once('value');
            
            if(snap.exists()){
                const user = snap.val();
                if(user.password === pass) {
                    if(remember) localStorage.setItem('saved_nickname', nickname);
                    else localStorage.removeItem('saved_nickname');

                    localStorage.setItem('user_nickname', nickname);
                    localStorage.setItem('user_role', currentRole);
                    
                    // Cek Verifikasi
                    if(currentRole === 'worker' && user.status_verifikasi !== 'VERIFIED') {
                        window.location.href = 'waiting_room.html';
                    } else {
                        window.location.href = 'adventurer-hub.html';
                    }
                } else { showMsg("Invalid Access Code."); }
            } else { showMsg("Identity not found in database."); }
        } catch (e) { 
            showMsg("Terminal Error: " + e.message); 
            console.error(e);
        }
        
        btn.innerText = "DECRYPT ACCESS"; btn.disabled = false;
        genCap();
    }

    // --- 5. FORGOT PASSWORD ---
    async function forgotAccess() {
        const id = document.getElementById('accessId').value.trim().toLowerCase();
        if(!id) return showMsg("Please enter your Nickname first.");
        
        const path = currentRole === 'worker' ? 'users_adventurer/' : 'users_customer/';
        try {
            const snap = await db.ref(path + id).once('value');
            if(snap.exists()) {
                const user = snap.val();
                document.getElementById('modalTitle').innerText = "SECURITY CHALLENGE";
                document.getElementById('modalMsg').innerText = `Question: ${user.pertanyaan_lupa_password || 'Who are you?'}`;
                
                const extra = document.getElementById('modalExtra');
                extra.innerHTML = `<input type="text" id="securityAns" class="input-field" placeholder="Answer..." style="margin-top:15px; text-align:center;">`;
                
                const actionBtn = document.getElementById('modalActionBtn');
                actionBtn.innerText = "VERIFY";
                actionBtn.onclick = () => {
                    const ans = document.getElementById('securityAns').value.trim().toLowerCase();
                    if(ans === user.jawaban_lupa_password.toLowerCase()) {
                        showMsg(`ACCESS RECOVERED. Your Code is: ${user.password}`);
                        extra.innerHTML = "";
                    } else {
                        alert("Verification Failed.");
                    }
                };
                document.getElementById('modalCancelBtn').style.display = 'block';
                document.getElementById('customModal').style.display = 'flex';
            } else { showMsg("Nickname not found."); }
        } catch(e) { showMsg("Error: " + e.message); }
    }

    function showMsg(m) {
        document.getElementById('modalMsg').innerText = m;
        document.getElementById('customModal').style.display = 'flex';
    }

    function closeModal() { 
        document.getElementById('customModal').style.display = 'none'; 
        document.getElementById('modalExtra').innerHTML = "";
        document.getElementById('modalCancelBtn').style.display = 'none';
        document.getElementById('modalActionBtn').innerText = "ACKNOWLEDGE";
        document.getElementById('modalActionBtn').onclick = closeModal;
    }

    // --- 6. INITIALIZATION ---
    window.onload = () => {
        updateNet();
        genCap();
        
        const saved = localStorage.getItem('saved_nickname');
        if(saved) {
            document.getElementById('accessId').value = saved;
            document.getElementById('rememberMe').checked = true;
        }

        setTimeout(() => {
            document.getElementById('page-loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('page-loader').style.display = 'none'; }, 500);
        }, 1200);
    };
</script>
</body>
</html>
