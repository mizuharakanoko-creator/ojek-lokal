<!DOCTYPE html>
<html lang="en" data-theme="dark" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PICK ME | SELECT ROLE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-cyan-dim: rgba(0, 255, 255, 0.4);
            --neon-pink: #f0f;
            --neon-pink-dim: rgba(255, 0, 255, 0.4);
            --dark-bg: #030303;
            --panel-bg: rgba(10, 10, 10, 0.75);
        }

        /* 1. NATIVE APP FEEL */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { display: none; }
        
        body {
            font-family: 'Rajdhani', sans-serif; overscroll-behavior-y: none;
            background-color: var(--dark-bg); color: #fff; margin: 0; padding: 0;
            min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 2. SCANLINES OVERLAY */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 9998; pointer-events: none; opacity: 0.4;
        }

        /* 3. LOADING TRANSITION LAYER */
        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-bar { width: 220px; height: 3px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; margin-top: 25px; border-radius: 2px; }
        .loader-progress { width: 0%; height: 100%; background: var(--neon-cyan); position: absolute; animation: loadAnim 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite; }
        @keyframes loadAnim { 0% { width: 0%; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0%; left: 100%; } }

        /* HEADER & NAVIGATION */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: relative; z-index: 10; }
        .btn-back { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; color: #fff; }
        .btn-back:active { transform: scale(0.85); background: rgba(255,255,255,0.1); }
        
        /* 4. THEME TOGGLE */
        .theme-toggle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); position: relative; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .theme-toggle:active { transform: scale(0.85); }
        .icon-svg { transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); position: absolute; }
        [data-theme="dark"] #moonIcon { opacity: 0; transform: scale(0) rotate(-90deg); }
        [data-theme="light"] #sunIcon { opacity: 0; transform: scale(0) rotate(90deg); }

        .text-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan-dim); }
        .text-neon-pink { color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink-dim); }

        /* 5. MAIN CONTAINER & ROLE CARDS */
        .app-container { padding: 0 20px 50px 20px; position: relative; z-index: 10; text-align: center; }
        
        .role-card {
            background: var(--panel-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 30px 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .role-card:active { transform: scale(0.96); }
        
        .role-card.adventurer { border-left: 4px solid var(--neon-cyan); }
        .role-card.adventurer:active { box-shadow: 0 0 20px var(--neon-cyan-dim); }
        
        .role-card.requester { border-left: 4px solid var(--neon-pink); }
        .role-card.requester:active { box-shadow: 0 0 20px var(--neon-pink-dim); }

        .role-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .role-title { font-size: 24px; font-weight: 700; letter-spacing: 4px; margin: 0; }
        .role-subtitle { font-size: 11px; color: #888; letter-spacing: 2px; margin-top: 5px; font-weight: 600; }

        /* THE STRANGER BUTTON */
        .btn-stranger {
            display: inline-block; margin-top: 20px; padding: 15px 30px;
            background: transparent; border: 1px dashed rgba(255,255,255,0.3); border-radius: 8px;
            color: #aaa; font-size: 13px; font-weight: 700; letter-spacing: 3px; cursor: pointer; transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-stranger:active { background: rgba(255,255,255,0.05); transform: scale(0.95); color: #fff; border-color: #fff; }

        /* 6. DYNAMIC PREVIEW MODAL (GLASSMORPHISM) */
        #previewModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-box {
            width: 85%; max-width: 340px; padding: 30px 25px;
            background: linear-gradient(145deg, rgba(20,20,20,0.95), rgba(5,5,5,0.95));
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: scale(0.8) translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #previewModal.show { opacity: 1; }
        #previewModal.show .modal-box { transform: scale(1) translateY(0); }

        .modal-desc { font-size: 14px; color: #ccc; line-height: 1.6; letter-spacing: 1px; margin: 20px 0; text-align: justify; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn-cancel { background: #111; color: #fff; border: 1px solid #333; }
        .btn-cancel:active { background: #222; transform: scale(0.95); }
        .btn-confirm { background: transparent; color: #fff; border: 1px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .btn-confirm:active { transform: scale(0.95); background: #fff; color: #000; }
    </style>
</head>
<body class="notranslate">

<div class="scanlines"></div>

<div id="page-loader">
    <h2 class="text-neon-cyan" style="letter-spacing: 6px; font-size: 15px; margin-bottom: 5px;">ROUTING PATH</h2>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="header">
    <div class="btn-back" onclick="navigateBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </div>
    <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
        <svg id="sunIcon" class="icon-svg text-neon-cyan" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moonIcon" class="icon-svg text-neon-pink" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </div>
</div>

<div class="app-container">
    <div style="margin-bottom: 35px;">
        <h1 style="font-size:32px; margin:0; letter-spacing:4px; font-weight:700;">CHOOSE PATH</h1>
        <p style="color:#666; font-size:12px; letter-spacing:2px; margin-top:5px; font-weight:600;">CITIZEN REGISTRATION PROTOCOL</p>
    </div>

    <div class="role-card adventurer" onclick="openPreview('adventurer')">
        <span class="role-icon text-neon-cyan">⚔️</span>
        <h2 class="role-title text-neon-cyan">ADVENTURER</h2>
        <p class="role-subtitle">MERCENARY / DRIVER</p>
    </div>

    <div class="role-card requester" onclick="openPreview('requester')">
        <span class="role-icon text-neon-pink">👑</span>
        <h2 class="role-title text-neon-pink">REQUESTER</h2>
        <p class="role-subtitle">CLIENT / WORKSHOP OWNER</p>
    </div>

    <button class="btn-stranger" onclick="openPreview('stranger')">
        [ ENTER AS STRANGER ]
    </button>
</div>

<div id="previewModal">
    <div class="modal-box" id="modalBox">
        <h2 id="previewTitle" style="margin-top:0; font-size: 26px; letter-spacing: 4px;">TITLE</h2>
        <p id="previewDesc" class="modal-desc">Description goes here.</p>
        <div class="btn-group">
            <button class="btn-modal btn-cancel" onclick="closePreview()">CANCEL</button>
            <button class="btn-modal btn-confirm" id="btnConfirm" onclick="proceedRegistration()">ACCEPT</button>
        </div>
    </div>
</div>

<script>
    // 1. AUDIO & HAPTIC SYSTEM
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playBeep(f, d) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type="sine"; o.frequency.value=f; g.gain.value=0.05;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+d);
    }
    function hapticClick() { initAudio(); if(navigator.vibrate) navigator.vibrate(15); playBeep(800, 0.05); }
    function hapticBack() { initAudio(); if(navigator.vibrate) navigator.vibrate([20]); playBeep(400, 0.08); } // Nada lebih rendah untuk aksi "Kembali"
    function hapticConfirm() { initAudio(); if(navigator.vibrate) navigator.vibrate([30, 50, 30]); playBeep(1200, 0.1); } // Nada tinggi untuk sukses

    // 2. NAVIGATION SYSTEM
    function navigateTo(url) {
        const loader = document.getElementById('page-loader');
        loader.style.display = 'flex'; void loader.offsetWidth; loader.style.opacity = '1';
        setTimeout(() => { window.location.href = url; }, 600);
    }
    function navigateBack() {
        hapticBack();
        navigateTo('login.html'); // Mengarah kembali ke halaman login
    }

    // 3. THEME TOGGLE
    function toggleTheme() {
        hapticClick();
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        
        document.getElementById('themeBtn').style.transform = "rotate(360deg) scale(0.9)";
        setTimeout(() => {
            html.setAttribute('data-theme', next);
            document.getElementById('themeBtn').style.transform = "rotate(0deg) scale(1)";
        }, 300);
    }

    // 4. DYNAMIC PREVIEW LOGIC
    let targetUrl = '';

    const roleData = {
        adventurer: {
            title: "ADVENTURER",
            color: "var(--neon-cyan)",
            url: "adventure-register.html",
            desc: "Daftar sebagai penyedia jasa yang akan menerima misi, mengeksekusi tugas, dan mendapatkan imbalan. Anda bekerja secara independen dan dibayar langsung oleh pemberi misi."
        },
        requester: {
            title: "REQUESTER",
            color: "var(--neon-pink)",
            url: "requester-register.html",
            desc: "Daftar sebagai pencari bantuan (Client) yang memberikan misi kepada para Adventurer. Anda juga mendapatkan akses untuk membuka Workshop pribadi dan menjadi penjual di Market."
        },
        stranger: {
            title: "STRANGER",
            color: "#aaa",
            url: "dashboard-guest.html",
            desc: "Belum berminat menjadi Citizen? Anda bisa bergabung menjadi Stranger terlebih dahulu. Nickname akan dibuat anonim, semua data disamarkan (Unknown), namun akses Anda akan dibatasi."
        }
    };

    function openPreview(roleKey) {
        hapticClick();
        const data = roleData[roleKey];
        targetUrl = data.url;

        // Inject Data ke Modal
        const titleEl = document.getElementById('previewTitle');
        titleEl.innerText = data.title;
        titleEl.style.color = data.color;
        titleEl.style.textShadow = `0 0 10px ${data.color}`;
        
        document.getElementById('previewDesc').innerText = data.desc;
        
        // Ganti warna border modal menyesuaikan role
        document.getElementById('modalBox').style.borderColor = data.color;
        
        // Ganti gaya tombol konfirmasi
        const btnConfirm = document.getElementById('btnConfirm');
        btnConfirm.style.borderColor = data.color;
        btnConfirm.style.color = data.color;

        // Tampilkan Modal
        const modal = document.getElementById('previewModal');
        modal.style.display = 'flex';
        setTimeout(() => { modal.classList.add('show'); }, 10);
    }

    function closePreview() {
        hapticBack();
        const modal = document.getElementById('previewModal');
        modal.classList.remove('show');
        setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    function proceedRegistration() {
        hapticConfirm();
        closePreview();
        setTimeout(() => { navigateTo(targetUrl); }, 200);
    }

    // 5. ONLOAD & ANTI-PULL-TO-REFRESH
    window.onload = () => {
        setTimeout(() => {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }, 800);

        let touchStart;
        document.addEventListener('touchstart', e => { touchStart = e.touches[0].pageY; }, {passive: false});
        document.addEventListener('touchmove', e => {
            if (document.documentElement.scrollTop === 0 && e.touches[0].pageY > touchStart) e.preventDefault();
        }, {passive: false});

        document.body.addEventListener('click', initAudio, { once: true });
        document.body.addEventListener('touchstart', initAudio, { once: true });
    };
</script>

</body>
</html>
