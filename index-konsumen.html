<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojek Lokal - Penumpang</title>
    <link rel="stylesheet" href="css/style-main.css">
    <style>
        /* CSS KHUSUS KONSUMEN - MODERN & CLEAN */
        :root { --primary: #1a1a1a; --accent: #ffd700; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* Beta & Donation Banner */
        .top-info-bar {
            background: var(--primary); color: var(--accent);
            padding: 8px 15px; font-size: 11px; text-align: center;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-donate-small { 
            background: var(--accent); color: #000; padding: 3px 8px; 
            border-radius: 4px; text-decoration: none; font-weight: bold;
        }

        /* Header User */
        .user-header {
            padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .user-greet h2 { margin: 0; font-size: 20px; color: #333; }
        .balance-box {
            background: white; padding: 10px 15px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: right;
        }
        .balance-box small { color: #888; display: block; font-size: 10px; }
        .balance-box b { font-size: 16px; color: var(--primary); }

        /* Service Grid - Hexagonal Style */
        .service-section { padding: 0 20px; margin-top: 10px; }
        .service-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }
        .service-card {
            background: white; padding: 25px 15px; border-radius: 20px;
            text-align: center; transition: 0.3s; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid transparent;
        }
        .service-card:active { transform: scale(0.95); border-color: var(--accent); }
        .service-card .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .service-card span { font-weight: bold; font-size: 14px; color: #444; }

        /* Route Input Card (Hidden Initially) */
        .route-card {
            margin: 20px; padding: 20px; background: white; 
            border-radius: 20px; display: none; /* Sembunyi dulu */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: slideUp 0.4s ease;
        }
        .route-card h3 { margin-top: 0; font-size: 16px; margin-bottom: 15px; }
        .input-box {
            background: #f1f3f5; border-radius: 10px; padding: 10px; margin-bottom: 10px;
            display: flex; align-items: center;
        }
        .input-box input {
            border: none; background: transparent; width: 100%; 
            padding: 5px 10px; font-size: 14px; outline: none;
        }

        /* Floating Price Popup */
        .price-float {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: var(--primary); color: white; padding: 15px 20px;
            border-radius: 20px; display: none; /* Sembunyi */
            justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .btn-order {
            background: var(--accent); color: #000; border: none;
            padding: 12px 25px; border-radius: 12px; font-weight: bold;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="top-info-bar">
        <span>🚀 <b>Versi Beta</b> - Dalam Pengembangan</span>
        <a href="#" class="btn-donate-small" onclick="alert('Terima kasih! Fitur donasi pro sedang disiapkan.')">☕ Donasi Pro</a>
    </div>

    <div class="user-header">
        <div class="user-greet">
            <p style="margin:0; color:#888; font-size: 13px;">Halo,</p>
            <h2 id="user-name">Pelanggan Setia</h2>
        </div>
        <div class="balance-box">
            <small>Saldo Anda</small>
            <b id="user-balance">Rp 0</b>
        </div>
    </div>

    <div class="service-section">
        <div class="service-grid">
            <div class="service-card" onclick="selectService('Motor', '🛵')">
                <span class="icon">🛵</span>
                <span>Ojek Motor</span>
            </div>
            <div class="service-card" onclick="selectService('Mobil', '🚗')">
                <span class="icon">🚗</span>
                <span>Ojek Mobil</span>
            </div>
            <div class="service-card" onclick="selectService('Makan', '🍔')">
                <span class="icon">🍔</span>
                <span>Pesan Makan</span>
            </div>
            <div class="service-card" onclick="selectService('Barang', '📦')">
                <span class="icon">📦</span>
                <span>Kirim Barang</span>
            </div>
        </div>
    </div>

    <div id="route-container" class="route-card">
        <h3 id="selected-service-title">Mau ke mana hari ini?</h3>
        <div class="input-box">
            <span>📍</span>
            <input type="text" id="start-point" placeholder="Titik Jemput..." oninput="checkInputs()">
        </div>
        <div class="input-box">
            <span>🏁</span>
            <input type="text" id="end-point" placeholder="Tujuan..." oninput="checkInputs()">
        </div>
    </div>

    <div id="price-float" class="price-float">
        <div>
            <small style="color: #aaa; font-size: 11px; display: block;">Estimasi Biaya</small>
            <span style="font-size: 18px; font-weight: bold; color: var(--accent);" id="display-price">Rp 0</span>
        </div>
        <button class="btn-order" onclick="processOrder()">PESAN SEKARANG</button>
    </div>

    <script>
        let currentService = "";

        // Fungsi saat memilih jasa
        function selectService(name, icon) {
            currentService = name;
            // Tampilkan container rute
            document.getElementById('route-container').style.display = 'block';
            document.getElementById('selected-service-title').innerText = `Pesan ${name} ${icon}`;
            
            // Scroll otomatis ke bawah
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Fungsi cek input untuk munculkan harga
        function checkInputs() {
            const start = document.getElementById('start-point').value;
            const end = document.getElementById('end-point').value;
            const pricePanel = document.getElementById('price-float');

            if (start.length > 3 && end.length > 3) {
                // Simulasi harga (Nanti ganti dengan logika jarak asli)
                document.getElementById('display-price').innerText = "Rp 12.000";
                pricePanel.style.display = 'flex';
            } else {
                pricePanel.style.display = 'none';
            }
        }

        function processOrder() {
            alert(`Pesanan ${currentService} Anda sedang dikirim ke driver terdekat!`);
        }
    </script>

</body>
</html>
