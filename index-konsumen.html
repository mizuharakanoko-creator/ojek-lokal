<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojek Lokal - Konsumen</title>
    
    <style>
        :root {
            --cyber-blue: #00a8ff;
            --dark: #1a1a1a;
            --light-grey: #f4f7f9;
            --border-color: #e1e8ed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #ffffff; color: var(--dark); padding-bottom: 50px; }

        /* Header & Info */
        .app-header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyber-blue); }
        .wallet-card { background: var(--light-grey); padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border-color); text-align: right; }
        .wallet-card b { color: var(--cyber-blue); }

        /* Grid Jasa */
        .service-section { padding: 20px; }
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .service-item { border: 1px solid var(--border-color); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; }
        .service-item img { width: 45px; margin-bottom: 10px; }

        /* Order Sheet */
        .order-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            border-top: 3px solid var(--cyber-blue); border-radius: 25px 25px 0 0;
            padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: 0.4s ease; z-index: 1000;
        }
        .order-sheet.active { transform: translateY(0); }
        
        /* Input & Dropdowns */
        .input-group { background: #f1f3f5; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; }
        .input-group input, .input-group select { border: none; background: transparent; width: 100%; outline: none; font-size: 0.9rem; }
        
        /* Animation for Location */
        .loading-loc { font-size: 0.7rem; color: var(--cyber-blue); display: none; margin-left: 10px; }

        /* Ongkos Options */
        .ongkos-container { display: none; margin-top: 15px; }
        .ongkos-option {
            background: #fff; border: 2px solid var(--border-color);
            padding: 12px; border-radius: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; cursor: pointer;
        }
        .ongkos-option.selected { border-color: var(--cyber-blue); background: #e3f2fd; }

        .btn-confirm { width: 100%; background: var(--cyber-blue); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="user-profile"><small>Halo,</small><h2>Pelanggan Setia</h2></div>
        <div class="wallet-card"><small>SALDO</small><b id="client-saldo">Rp 0</b></div>
    </header>

    <section class="service-section">
        <div class="service-grid">
            <div class="service-item" onclick="openOrder('Ojek Motor', '🛵')">
                <img src="https://cdn-icons-png.flaticon.com/512/1165/1165961.png"><span>Ojek Motor</span>
            </div>
            <div class="service-item" onclick="openOrder('Ojek Mobil', '🚗')">
                <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png"><span>Ojek Mobil</span>
            </div>
        </div>
    </section>

    <div id="order-sheet" class="order-sheet">
        <div style="width: 40px; height: 4px; background: #ddd; margin: 0 auto 15px; border-radius: 10px;" onclick="closeOrder()"></div>
        <h3 id="order-title" style="margin-bottom: 15px;">Pemesanan</h3>
        
        <div class="input-group" onclick="getLocation()">
            <span>📍</span>
            <input type="text" id="loc-start" placeholder="Klik untuk Lokasi Terkini..." readonly>
            <span id="loc-anim" class="loading-loc">Menentukan...</span>
        </div>

        <div class="input-group">
            <span>🏘️</span>
            <select id="select-kecamatan" onchange="updateDesa()">
                <option value="">Pilih Kecamatan Tujuan</option>
                <option value="kuningan">Kuningan</option>
                <option value="cigugur">Cigugur</option>
            </select>
        </div>

        <div class="input-group">
            <span>🏠</span>
            <select id="select-desa" onchange="showOngkos()">
                <option value="">Pilih Desa Tujuan</option>
            </select>
        </div>

        <div id="ongkos-list" class="ongkos-container">
            <p style="font-size: 0.8rem; margin-bottom: 10px; color: #666;">Pilih Paket Perjalanan:</p>
            <div class="ongkos-option" onclick="selectOngkos(this, '10.000')">
                <span>Hemat (Tanpa Helm)</span><b>Rp 10.000</b>
            </div>
            <div class="ongkos-option" onclick="selectOngkos(this, '15.000')">
                <span>Standar (Helm + Masker)</span><b>Rp 15.000</b>
            </div>
            <div class="ongkos-option" onclick="selectOngkos(this, '20.000')">
                <span>Express (Prioritas)</span><b>Rp 20.000</b>
            </div>
        </div>

        <button id="btn-order" class="btn-confirm" onclick="processOrder()">KIRIM PESANAN</button>
    </div>

    <script>
        const dataWilayah = {
            "kuningan": ["Ancaran", "Cijoho", "Ciporang", "Kuningan"],
            "cigugur": ["Cigadung", "Cisantana", "Sukajadi"]
        };

        function openOrder(service, icon) {
            document.getElementById('order-title').innerText = "Pesan " + service;
            document.getElementById('order-sheet').classList.add('active');
        }

        function closeOrder() { document.getElementById('order-sheet').classList.remove('active'); }

        // Fitur Lokasi Terkini
        function getLocation() {
            const status = document.getElementById('loc-start');
            const anim = document.getElementById('loc-anim');
            
            anim.style.display = "inline";
            status.value = "Mencari koordinat...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    setTimeout(() => {
                        anim.style.display = "none";
                        status.value = "Lokasi Terkini Terdeteksi (Lat: " + position.coords.latitude.toFixed(4) + ")";
                    }, 1500); // Animasi simulasi
                }, () => {
                    anim.style.display = "none";
                    status.value = "Gagal mengambil lokasi.";
                });
            }
        }

        // Dropdown Desa Otomatis
        function updateDesa() {
            const kec = document.getElementById('select-kecamatan').value;
            const desaSelect = document.getElementById('select-desa');
            desaSelect.innerHTML = '<option value="">Pilih Desa Tujuan</option>';
            
            if(dataWilayah[kec]) {
                dataWilayah[kec].forEach(desa => {
                    desaSelect.innerHTML += `<option value="${desa}">${desa}</option>`;
                });
            }
        }

        function showOngkos() {
            document.getElementById('ongkos-list').style.display = 'block';
        }

        function selectOngkos(el, harga) {
            document.querySelectorAll('.ongkos-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('btn-order').style.display = 'block';
        }

        function processOrder() {
            alert("Pesanan Terkirim! Menunggu konfirmasi driver...");
            closeOrder();
        }
    </script>
</body>
</html>
