<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojek Lokal - Pesan Sekarang</title>

    <link rel="stylesheet" href="css/style-main.css">
    <link rel="stylesheet" href="css/consumer-style.css"> </head>
<body>

    <header class="user-header">
        <div class="user-info">
            <span class="greeting">Halo,</span>
            <b id="user-name">Pelanggan Setia</b>
        </div>
        <div class="user-wallet" onclick="location.href='topup.html'">
            <small>Saldo</small>
            <div id="user-balance">Rp 50.000</div>
        </div>
    </header>

    <main class="menu-container">
        <div class="service-grid">
            <div class="service-item" onclick="openOrderForm('motor')">
                <div class="icon-circle motor">🛵</div>
                <span>Ojek Motor</span>
            </div>
            <div class="service-item" onclick="openOrderForm('mobil')">
                <div class="icon-circle mobil">🚗</div>
                <span>Ojek Mobil</span>
            </div>
            <div class="service-item" onclick="openOrderForm('food')">
                <div class="icon-circle food">🍔</div>
                <span>Pesan Makan</span>
            </div>
            <div class="service-item" onclick="openOrderForm('send')">
                <div class="icon-circle send">📦</div>
                <span>Kirim Barang</span>
            </div>
        </div>

        <section id="order-form" class="order-box">
            <h3>Mau ke mana hari ini?</h3>
            <div class="input-group">
                <input type="text" id="loc-pickup" placeholder="📍 Titik Jemput" readonly>
                <input type="text" id="loc-dest" placeholder="🏁 Titik Tujuan">
            </div>
            <div class="price-estimate">
                <span>Estimasi Harga:</span>
                <b id="est-price">Rp 0</b>
            </div>
            <button class="btn-order-now" onclick="createOrder()">PESAN SEKARANG</button>
        </section>
    </main>

    <div id="modal-bids" class="bid-overlay">
        <div class="bid-container">
            <h4>Driver yang Menawar:</h4>
            <div id="list-driver-bids">
                </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database.js"></script>
    <script src="js-engines/consumer-core.js"></script>

</body>
</html>
